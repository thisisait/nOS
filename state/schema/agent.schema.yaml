# JSON Schema for files/anatomy/agents/<name>/agent.yml
# Anatomy A14 — AgentKit runtime (2026-05-07).
#
# Validated by tests/anatomy/test_agent_schema.py on every CI push.
# Runtime loader (App\AgentKit\AgentLoader) re-validates at agent load time
# so a bad agent.yml can never reach the LLM.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://nos.thisisait.eu/schema/agent.yml"
title: "AIT Agent Definition"
type: object
additionalProperties: false
required:
  - name
  - version
  - description
  - model
  - audit
properties:
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]{1,38}[a-z0-9]$"
    description: |
      Stable identifier matching the agent's directory name under
      files/anatomy/agents/. Lowercase + dashes only.
  version:
    type: integer
    minimum: 1
    description: "Bumped on every breaking change to system prompt or tool roster."
  description:
    type: string
    minLength: 16
    description: "One-paragraph human description for the /agents UI + audit trail."
  model:
    type: object
    additionalProperties: false
    required:
      - primary
    properties:
      primary:
        type: string
        # URI scheme: <provider>-<model-id>, dashes throughout.
        pattern: "^(anthropic|openclaw|openai|local)-[a-z0-9.-]+$"
        description: |
          URI of the primary LLM backend. Format <provider>-<model>.
          Known providers: anthropic, openclaw, openai, local.
          Examples: anthropic-claude-opus-4-7, openclaw-qwen-coder-32b.
      fallback:
        type: string
        pattern: "^(anthropic|openclaw|openai|local)-[a-z0-9.-]+$"
        description: |
          Fallback URI used when primary fails (rate-limited, network error,
          model unavailable). The protocol is platform-agnostic so an
          openclaw fallback for an anthropic primary is safe.
  system_prompt_path:
    type: string
    description: |
      Path relative to the agent.yml directory. Markdown loaded verbatim
      and passed as the LLM `system` parameter. If absent, no system prompt
      is set (agent runs with default model behaviour).
  tools:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          enum:
            - bash-read-only
            - bash-write
            - mcp-wing
            - mcp-bone
            - mcp-pulse
        config:
          type: object
          description: "Tool-specific config; opaque to the schema."
  multiagent:
    type: object
    additionalProperties: false
    required: [type]
    properties:
      type:
        type: string
        enum: [solo, coordinator]
      roster:
        type: array
        description: "Names of agents this coordinator may delegate to."
        items:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name:
              type: string
              pattern: "^[a-z][a-z0-9-]{1,38}[a-z0-9]$"
            version:
              type: integer
              minimum: 1
              description: "Pin to a specific version, else latest is used."
      max_concurrent_threads:
        type: integer
        minimum: 1
        maximum: 16
        default: 4
        description: |
          Cap on parallel sub-agent threads (Coordinator::runWithChildren).
          ProcessPool clamps silently into [1, 16]. Default 4 is the
          A14-multiagent-followup baseline; bump for batch consolidation
          jobs (Dreams / Pulse fan-out) where more parallelism helps.
  outcomes:
    type: object
    additionalProperties: false
    properties:
      rubric_path:
        type: string
        description: "Markdown rubric, relative to agent.yml dir."
      max_iterations:
        type: integer
        minimum: 1
        maximum: 10
        default: 3
  audit:
    type: object
    additionalProperties: false
    required:
      - capability_scopes
      - pii_classification
    properties:
      capability_scopes:
        type: array
        items:
          type: string
          # Scopes match Authentik client scopes + custom nOS verbs.
          pattern: "^[a-z][a-z._-]+$"
        description: |
          What this agent is authorised to do. Scope strings appear in
          every audit event so the trail is grep-able. Examples:
          wing.read, wing.write, events.write, mcp.tool_use,
          bash.read, network.outbound.
      pii_classification:
        type: string
        enum: [none, low, high]
        description: |
          GDPR Article 35 hint. `high` blocks anthropic-* primary (forces
          local fallback) when nos_strict_pii_routing is true.
  vault:
    type: object
    additionalProperties: false
    properties:
      required_credentials:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [scope]
          properties:
            scope:
              type: string
              # Examples: anthropic-api, mcp-wing, mcp-bone, infisical
              pattern: "^[a-z][a-z0-9-]+$"
            optional:
              type: boolean
              default: false
  subscribe:
    type: array
    description: |
      Per-agent webhook auto-fan-out (post-A14). Each entry registers the
      agent itself as a webhook receiver for one event type. When an event
      fires whose `data` matches the optional `filter:` map (exact-string
      equality, no regex/glob/eval), WebhookDispatcher POSTs to the
      Wing-internal operator-trigger endpoint to launch a fresh run of THIS
      agent. The dispatcher refuses to fan out to the agent that produced
      the originating event (self-loop guard) — mass-action loops require
      explicit operator intervention.
    items:
      type: object
      additionalProperties: false
      required: [event_type]
      properties:
        event_type:
          type: string
          # Only A14 agent_* event types are valid fan-out triggers today.
          # Extend as needed when new event families are added.
          enum:
            - agent_session_start
            - agent_session_end
            - agent_thread_start
            - agent_thread_end
            - agent_iteration_start
            - agent_iteration_end
            - agent_tool_use
            - agent_tool_result
            - agent_message
            - agent_grader_decision
            - agent_webhook_dispatch
            - agent_vault_resolved
        filter:
          type: object
          additionalProperties:
            type: string
          description: |
            Map of event-payload field name → expected exact-string value.
            ALL declared keys must match for the fan-out to fire. No regex,
            no glob, no eval — values are compared with strict ===.
        trigger_arg:
          type: string
          enum: [prompt, vault]
          default: prompt
          description: |
            How the upstream event flows into the new agent run. Today
            only `prompt` is implemented; `vault` is reserved for the
            B4 vault-refresh follow-up.
  dream:
    type: object
    additionalProperties: false
    description: |
      Dreams (memory consolidation, post-A14). Optional. When `enabled: true`
      this agent participates in the dream cycle — bin/dream-agent.php reads
      recent agent_sessions for this agent + the current agent_memory_stores
      entries, runs the agent under the restricted `tool_roster` below, and
      writes a deduplicated output store. The roster MUST be a strict subset
      of read-only tools (no bash, no mcp_wing write endpoints) — the dream
      Runner refuses to invoke any tool not in this list, by structural
      enforcement (App\AgentKit\Memory\Dreamer).
    properties:
      enabled:
        type: boolean
        default: false
        description: |
          Default false. Dream cycle skips agents that haven't explicitly
          opted in — keeps the cycle's blast radius narrow.
      tool_roster:
        type: array
        description: |
          Tool ids the agent is allowed to invoke during a dream cycle.
          MUST be a subset of read-only tools (mcp-wing-read, mcp-bone-read).
          The Runner enforces the restriction at session-open time; a tool
          outside the roster returns is_error=true with a refusal message.
        items:
          type: string
          enum:
            - mcp-wing-read
            - mcp-bone-read
      max_entries:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
        description: |
          Soft cap on the number of memory entries this agent's store
          holds at the end of a dream cycle. The Dreamer prunes oldest
          first when the store exceeds this number.
  metadata:
    type: object
    additionalProperties: true
    description: "Free-form key/value pairs, surfaced in Wing /agents UI."
