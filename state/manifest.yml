---
# ==============================================================================
# nOS State Manifest — source of truth for expected system shape.
#
# Consumed by:
#   - nos_state (introspect)        — reports installed version per service
#   - nos_migrate                   — detects coexistence support, reads identifiers
#   - Wing Upgrades matrix     — list of services to poll
#   - Bone /api/state/services      — canonical list
#
# When you add a Docker service, append an entry here. Entries are validated
# against state/schema/manifest.schema.json.
#
# `install_flag` maps directly to the `install_<service>` boolean in
# default.config.yml — introspect skips services whose flag is false.
# ==============================================================================

schema_version: 1

nos:
  brand: "nOS"
  engine_name: "nOS"
  public_name: "This is AIT"
  tagline: "the engine behind AIT"
  state_dir: "~/.nos"
  launchd_prefix: "eu.thisisait.nos"
  rbac_group_prefix: "nos-"
  oidc_client_prefix: "nos-"
  # Container name pattern. {stack} and {id} are substituted from each
  # service entry. Services whose compose service-name differs from the
  # manifest `id` (hyphens vs underscores, multi-container services)
  # override with explicit `container_name` or `container_names:`.
  container_pattern: "{stack}-{id}-1"

services:
  # -------------------------------------------------------------- infra stack
  - id: postgresql
    category: database
    stack: infra
    install_flag: install_postgresql
    version_var: postgresql_version
    version_source: docker_image
    image: postgres
    data_path_var: postgresql_data_dir
    port_var: postgresql_port
    health_check:
      type: exec
      command: "docker exec infra-postgresql-1 pg_isready -U postgres"
      expect_rc: 0
      timeout_sec: 10
    upgrade_recipe: upgrades/postgresql.yml
    breaking_boundaries: ["15->16", "16->17"]
    coexistence_supported: true

  - id: mariadb
    category: database
    stack: infra
    install_flag: install_mariadb
    version_var: mariadb_version
    version_source: docker_image
    image: mariadb
    data_path_var: mariadb_data_dir
    port_var: mariadb_port
    health_check:
      type: exec
      command: "docker exec infra-mariadb-1 healthcheck.sh --connect"
      expect_rc: 0
      timeout_sec: 10
    upgrade_recipe: upgrades/mariadb.yml
    breaking_boundaries: ["10->11", "11->12"]
    coexistence_supported: true

  - id: redis
    category: cache
    stack: infra
    install_flag: install_redis
    version_var: redis_version
    version_source: docker_image
    image: redis
    data_path_var: redis_data_dir
    port_var: redis_port
    health_check:
      type: exec
      command: "docker exec infra-redis-1 redis-cli ping"
      expect_rc: 0
    upgrade_recipe: upgrades/redis.yml
    breaking_boundaries: ["6->7", "7->8"]

  - id: authentik
    category: identity
    stack: infra
    install_flag: install_authentik
    version_var: authentik_version
    version_source: docker_image
    image: ghcr.io/goauthentik/server
    container_names:
      - infra-authentik-server-1
      - infra-authentik-worker-1
    domain_var: authentik_domain
    port_var: authentik_port
    data_path_var: authentik_data_dir
    health_check:
      type: http
      url_template: "http://localhost:{{ authentik_port }}/-/health/live/"
      expect_status: 204
      timeout_sec: 15
    upgrade_recipe: upgrades/authentik.yml
    breaking_boundaries: ["2024->2025", "2025->2026"]
    coexistence_supported: true
    oidc: native

  - id: infisical
    category: vault
    stack: infra
    install_flag: install_infisical
    version_var: infisical_version
    version_source: docker_image
    image: infisical/infisical
    domain_var: infisical_domain
    port_var: infisical_port
    data_path_var: infisical_data_dir
    health_check:
      type: http
      url_template: "http://localhost:{{ infisical_port }}/api/status"
      expect_status: 200
    upgrade_recipe: upgrades/infisical.yml
    oidc: native                            # env-seeded org SSO config; requires one-time Security→SSO toggle in UI post-install

  - id: portainer
    category: devops
    stack: infra
    install_flag: install_portainer
    version_var: portainer_version
    version_source: docker_image
    image: portainer/portainer-ce
    domain_var: portainer_domain
    port_var: portainer_port
    data_path_var: portainer_data_dir
    health_check:
      type: tcp
      host: localhost
      port_var: portainer_port
    oidc: native

  - id: traefik
    category: proxy
    stack: infra
    install_flag: install_traefik
    version_var: traefik_image_version
    version_source: docker_image
    image: traefik
    domain_var: traefik_domain
