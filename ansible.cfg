[defaults]
nocows = True
roles_path = ./roles:/etc/ansible/roles
inventory = inventory
become = True
callback_result_format = yaml
interpreter_python = auto
deprecation_warnings = False

# Native logging: Ansible writes full output to this file AND keeps stdout
# free for live prompts + ANSI colors in the terminal. Replaces the tee
# pattern (which would pipe-buffer prompts and strip colors).
# Ignored if the parent dir does not exist yet on first run; after main.yml
# creates ~/.nos/, logging starts working from the next run.
log_path = ~/.nos/ansible.log
