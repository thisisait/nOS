[defaults]
nocows = True
roles_path = ./roles:/etc/ansible/roles
inventory = inventory
become = True
callback_result_format = yaml
interpreter_python = auto
deprecation_warnings = False

# Native logging: Ansible writes full output to this file AND keeps stdout
# free for live prompts + ANSI colors in the terminal. Replaces the tee
# pattern (which would pipe-buffer prompts and strip colors).
# Ignored if the parent dir does not exist yet on first run; after main.yml
# creates ~/.nos/, logging starts working from the next run.
log_path = ~/.nos/ansible.log

# ── State & Migration Framework wire-up ──────────────────────────────────────
# Custom modules under library/ (nos_state, nos_migrate, nos_authentik,
# nos_coexistence). Ansible auto-discovers them via library path.
#
# 2026-05-03: anatomy A1 — modules + module_utils moved into files/anatomy/.
# Legacy ./library and ./module_utils paths dropped. Ansible's plugin
# loader picks up nos_state, nos_migrate, nos_authentik, nos_coexistence,
# nos_apps_render from the new location.
library = ./files/anatomy/library
module_utils = ./files/anatomy/module_utils

# Telemetry callback plugin → Wing event sink. Plugin honours a dual-gate:
# the callback name must be in callbacks_enabled here *and* the plugin only
# activates at runtime when NOS_TELEMETRY_ENABLED=1 (or wing_telemetry_enabled:
# true is set in play vars). Enabled by default now that the Wing endpoint
# is verified — operators who want to silence it can unset NOS_TELEMETRY_ENABLED.
callback_plugins = ./callback_plugins
callbacks_enabled = wing_telemetry
