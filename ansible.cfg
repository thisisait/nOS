[defaults]
nocows = True
roles_path = ./roles:/etc/ansible/roles
inventory = inventory
become = True
callback_result_format = yaml
interpreter_python = auto
deprecation_warnings = False

# Native logging: Ansible writes full output to this file AND keeps stdout
# free for live prompts + ANSI colors in the terminal. Replaces the tee
# pattern (which would pipe-buffer prompts and strip colors).
# Ignored if the parent dir does not exist yet on first run; after main.yml
# creates ~/.nos/, logging starts working from the next run.
log_path = ~/.nos/ansible.log

# ── State & Migration Framework wire-up ──────────────────────────────────────
# Custom modules under library/ (nos_state, nos_migrate, nos_authentik,
# nos_coexistence). Ansible auto-discovers them via library path.
library = ./library
module_utils = ./module_utils

# Telemetry callback plugin → Glasswing event sink. Plugin is a zero-overhead
# no-op unless NOS_TELEMETRY_ENABLED=1 or wing_telemetry_enabled: true is
# set in play vars. Enable opt-in, not by default, until the Glasswing ingest
# endpoint is verified locally.
callback_plugins = ./callback_plugins
# callbacks_enabled = wing_telemetry           # uncomment after verifying endpoint
