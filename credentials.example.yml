---
# credentials.yml – HESLA, TOKENY a OSOBNÍ NASTAVENÍ
# ─────────────────────────────────────────────────────────────────────────────
# Tento soubor je v .gitignore – NIKDY ho necommituj!
#
# Použití:
#   cp credentials.example.yml credentials.yml
#   nano credentials.yml        # vyplň hesla, případně přepiš cesty
#
# Generování náhodných hesel (spusť v terminálu):
#   openssl rand -hex 32
#
# Poznámka: cesty jsou volitelné – výchozí hodnoty z default.config.yml
#           používají /Users/<tvůj-uživatel>/ automaticky (ansible_user_id).
#           Přepiš jen pokud chceš jiné umístění.
# ─────────────────────────────────────────────────────────────────────────────

# ==============================================================================
# SYSTÉMOVÉ SLUŽBY
# ==============================================================================

# SSH (pouze pokud enable_ssh: true v config.yml)
# ssh_port: 22
# ssh_allow_groups: "admin staff"

# Samba (pouze pokud enable_samba: true)
# samba_workgroup: "WORKGROUP"
# samba_shares:
#   - name: "projects"
#     path: "/Users/{{ ansible_user_id }}/projects"
#     comment: "{{ ansible_user_id }} projects"
#     browseable: true
#     writable: true

# VNC (pouze pokud enable_vnc: true)
# vnc_password: ""   # VYPLŇ – prázdné = VNC se nespustí bezpečně

# Mac App Store (pouze pokud install_mas_apps: true)
# mas_password: ""

# Tailscale pre-auth key (volitelné – bez něj proběhne interaktivní login)
# tailscale_auth_key: ""    # Získej na: https://login.tailscale.com/admin/settings/keys

# ==============================================================================
# DATABÁZE – MariaDB (pouze pokud install_mariadb: true)
# ==============================================================================

mariadb_root_password: "changeme_root"   # PŘEPIŠ! (openssl rand -hex 32)

mariadb_users:
  - name: "wordpress"
    password: "changeme_wp"              # PŘEPIŠ!
    priv: "wordpress.*:ALL"
  - name: "nextcloud"
    password: "changeme_nc"              # PŘEPIŠ!
    priv: "nextcloud.*:ALL"

# ==============================================================================
# WORDPRESS (pouze pokud install_wordpress: true)
# ==============================================================================

wordpress_db_password: "changeme_wp"    # Musí odpovídat mariadb_users výše
# wordpress_dir: "/Users/{{ ansible_user_id }}/projects/wordpress"

# ==============================================================================
# NEXTCLOUD (pouze pokud install_nextcloud: true)
# ==============================================================================

nextcloud_db_password: "changeme_nc"    # Musí odpovídat mariadb_users výše
nextcloud_admin_password: "changeme_admin"   # PŘEPIŠ!
# nextcloud_dir: "/Users/{{ ansible_user_id }}/projects/nextcloud"
# nextcloud_data_dir: "/Users/{{ ansible_user_id }}/nextcloud-data"

# ==============================================================================
# OBSERVABILITY (pouze pokud install_observability: true)
# ==============================================================================

grafana_admin_password: "changeme_grafana"   # PŘEPIŠ!
# prometheus_storage_path: "/Users/{{ ansible_user_id }}/observability/prometheus"
# loki_storage_path: "/Users/{{ ansible_user_id }}/observability/loki"
# tempo_storage_path: "/Users/{{ ansible_user_id }}/observability/tempo"

# ==============================================================================
# GITEA (pouze pokud install_gitea: true)
# ==============================================================================

gitea_admin_email: ""                          # VYPLŇ!
gitea_secret_key: "changeme_random_32_chars"   # PŘEPIŠ! (openssl rand -hex 32)
gitea_internal_token: "changeme_internal_tok"  # PŘEPIŠ! (openssl rand -hex 32)
# gitea_data_dir: "/Users/{{ ansible_user_id }}/gitea"

# ==============================================================================
# WOODPECKER CI (pouze pokud install_woodpecker: true)
# Vyžaduje OAuth2 aplikaci v Gitea: Settings → Applications → OAuth2
# ==============================================================================

woodpecker_agent_secret: "changeme_woodpecker_agent"  # PŘEPIŠ! (openssl rand -hex 32)
woodpecker_gitea_client: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea
woodpecker_gitea_secret: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea

# ==============================================================================
# VOLITELNÉ – cesty (výchozí hodnoty fungují bez přepsání)
# ==============================================================================

# Dotfiles repozitář (povinné pokud configure_dotfiles: true v config.yml)
# Nastav na svůj vlastní repozitář s dotfiles.
# dotfiles_repo: "https://github.com/tvuj-github-nick/dotfiles.git"
# dotfiles_repo_local_destination: "~/Development/dotfiles"
# dotfiles_repo_version: "main"
# dotfiles_files:              # seznam souborů k symlinku do ~/
#   - .zshrc
#   - .gitconfig
#   - .vimrc

# OpenClaw model (výchozí: qwen3.5:27b pro 36 GB RAM)
# openclaw_model: "qwen3.5:14b"   # rychlejší varianta

# Homebrew prefix (výchozí: /opt/homebrew pro Apple Silicon)
# homebrew_prefix: "/usr/local"   # Intel Mac

# Externí SSD (pouze pokud configure_external_storage: true)
# external_storage_root: "/Volumes/SSD1TB"

# Kiwix ZIM soubory (výchozí: nestahovat)
# kiwix_data_dir: "/Users/{{ ansible_user_id }}/kiwix"
# kiwix_zim_files:
#   - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_cs_all_mini_2024-11.zim"
#     dest: "wikipedia_cs_mini.zim"
