---
# ============================================================================
# Documenso — open-source e-signature platform. Pilot 3/4 of the stress test.
#
# Surface: app container + embedded Postgres. Proves multi-container compose
# wiring inside a single Tier-2 manifest — the apps_runner produces ONE
# merged compose override and Docker brings both up in the same project.
#
# Upstream:    https://github.com/documenso/documenso
# License:     AGPL-3.0
# Images:      ghcr.io/documenso/documenso (multi-arch),
#              docker.io/postgres:15-alpine
#
# Note on registry: ghcr.io is in DEFAULT_EU_REGISTRIES (parser line 109).
# ============================================================================

meta:
  name: "documenso"
  version: "v2.9.1"
  summary: "Open-source DocuSign alternative — sign PDF documents in browser."
  homepage: "https://documenso.com/"
  category: "productivity"
  ports: [3000]
  tags: ["self-hosted", "e-signature", "pdf", "contract"]

# ── GDPR Article 30 — legal_basis = contract ───────────────────────────────
# E-signature is a paradigm contract-fulfilment tool: the WHOLE POINT of
# the app is to perform the operator's contract with the signing party.
# That choice of legal_basis is what bypasses the SSO gate (parser
# requires SSO only when legal_basis=consent). We still wire SSO via
# auth=proxy because operationally we want the Authentik gate.
gdpr:
  purpose: |
    Allow the operator to send PDFs for legally-binding e-signature and
    retain the signed copy + signature audit log. Required to fulfil
    contracts with counter-parties who agree to electronic execution.
  legal_basis: "contract"
  data_categories:
    - "name"
    - "email"
    - "ip_address"               # captured in the signature audit trail
    - "signature_image"
    - "document_content"         # PDFs; sensitive, encrypted at rest
  data_subjects:
    - "end_users"                # signing parties
    - "operators"
  # 365 days is the typical retention for active signed contracts.
  # Long-tail archive should be moved to RustFS via a separate workflow
  # (D8+) so the live DB stays small. Operators with longer regulatory
  # horizons (e.g. accounting law) bump this here.
  retention_days: 365
  processors: []
  transfers_outside_eu: false

# ── Compose fragment ───────────────────────────────────────────────────────
# Two services in one manifest:
#   - documenso (app)        — Next.js, listens on 3000
#   - documenso-db (postgres) — embedded; not shared with the infra-postgres
#     because the apps stack is supposed to be isolated and self-contained.
#     The volume is renamed app_documenso_db to avoid colliding with any
#     other Tier-2 app that also wants Postgres.
compose:
  services:
    documenso:
      # Image is on Docker Hub under documenso/documenso (not ghcr.io). Tag
      # uses the upstream `v` prefix. Verified 2026-04-29 against
      # hub.docker.com/v2/repositories/documenso/documenso/tags.
      image: "docker.io/documenso/documenso:v2.9.1"
      container_name: documenso
      restart: unless-stopped
      depends_on:
        documenso-db:
          condition: service_healthy
      # Tier-2 isolation: no host port mapping — Traefik routes via the
      # shared Docker network (label emitted by nos_apps_render).
      expose:
        - "3000"
      environment:
        - "PORT=3000"
        - "NEXTAUTH_URL=https://$SERVICE_FQDN_DOCUMENSO/"
        - "NEXTAUTH_SECRET=$SERVICE_BASE64_64_NEXTAUTH"
        - "NEXT_PRIVATE_ENCRYPTION_KEY=$SERVICE_BASE64_64_PRIVATEKEY"
        - "NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=$SERVICE_BASE64_64_PRIVATEKEY2"
        - "NEXT_PUBLIC_WEBAPP_URL=https://$SERVICE_FQDN_DOCUMENSO/"
        - "NEXT_PRIVATE_DATABASE_URL=postgresql://$SERVICE_USER_DB:$SERVICE_PASSWORD_DB@documenso-db:5432/documenso"
        - "NEXT_PRIVATE_DIRECT_DATABASE_URL=postgresql://$SERVICE_USER_DB:$SERVICE_PASSWORD_DB@documenso-db:5432/documenso"
        # Mail: log-only for the pilot. Wire SMTP env once Stalwart lands.
        - "NEXT_PRIVATE_SMTP_TRANSPORT=smtp"
        - "NEXT_PRIVATE_SMTP_HOST=mailpit"
        - "NEXT_PRIVATE_SMTP_PORT=1025"
        - "NEXT_PRIVATE_SMTP_FROM_NAME=Documenso"
        - "NEXT_PRIVATE_SMTP_FROM_ADDRESS=documenso@dev.local"
        # Local signing certificate (self-signed bundle generated by entrypoint)
        - "NEXT_PRIVATE_SIGNING_TRANSPORT=local"
        - "NEXT_PRIVATE_SIGNING_PASSPHRASE=$SERVICE_PASSWORD_SIGN"
        - "NEXT_PUBLIC_DISABLE_SIGNUP=false"
      volumes:
        - documenso_app:/app/data
      healthcheck:
        test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 10
        start_period: 60s
      mem_limit: 1g
      cpus: 1.0

    documenso-db:
      image: "docker.io/postgres:15-alpine"
      container_name: documenso-db
      restart: unless-stopped
      environment:
        - "POSTGRES_USER=$SERVICE_USER_DB"
        - "POSTGRES_PASSWORD=$SERVICE_PASSWORD_DB"
        - "POSTGRES_DB=documenso"
      volumes:
        - documenso_db:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d documenso"]
        interval: 10s
        timeout: 5s
        retries: 10
      mem_limit: 512m
      cpus: 0.5

  # Volumes namespace: documenso_*. Unique across all Tier-2 pilots
  # (tfa_* for twofauth, rcube_* for roundcube).
  volumes:
    documenso_app:
    documenso_db:

nginx:
  auth: "proxy"
  # Authentik RBAC tier — e-signature is a manager-level workflow
  # (signing parties get magic-link emails, only managers + admins
  # initiate signing flows from the UI).
  rbac_tier: 2
