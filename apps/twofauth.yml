---
# ============================================================================
# 2FAuth (slug: twofauth) вЂ” self-hosted TOTP / HOTP authenticator.
# The upstream brand "2FAuth" starts with a digit; nOS app slugs must match
# ^[a-z][a-z0-9-]*$ (state/schema/app.schema.json), so we slug it textually.
# Hostname becomes twofauth.apps.<tld>.
# Pilot 1/4 of the Tier-2 stress test. Smallest surface: single container,
# embedded SQLite, no external deps. Proves the apps_runner round-trip:
#   manifest в†’ render в†’ docker compose up в†’ Authentik proxy gate в†’ smoke probe.
#
# Upstream:    https://github.com/Bubka/2FAuth
# License:     AGPL-3.0
# Image:       docker.io/twofauth/twofauth (multi-arch incl. arm64)
# Persistence: SQLite at /srv/database (volume tfa_data)
# ============================================================================

meta:
  name: "twofauth"
  version: "6.1.3"
  summary: "Self-hosted authenticator for TOTP/HOTP secrets, browser-friendly."
  homepage: "https://docs.twofauth.app/"
  category: "security"
  ports: [8000]
  tags: ["self-hosted", "totp", "2fa", "security"]

# в”Ђв”Ђ GDPR Article 30 вЂ” pilot 1, legal basis = legitimate_interests в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# 2FAuth stores the operator's TOTP secrets вЂ” these are credentials of the
# OPERATOR, not third-party data subjects, but the manifest still encodes
# everything because Wing's /gdpr UI surfaces the row uniformly.
gdpr:
  purpose: |
    Hosts the operator's TOTP / HOTP authenticator secrets so they can be
    reached from any device on the LAN without locking the operator into
    a single phone. Replaces a hardware authenticator + paper backup. No
    third-party user data вЂ” the operator is the only data subject.
  legal_basis: "legitimate_interests"
  data_categories:
    - "credentials"            # TOTP shared secrets (encrypted at rest)
    - "authentication_metadata"  # service names, icons, last-use timestamps
  data_subjects:
    - "operators"              # not end_users в†’ TLS gate is informational
  # -1 = forever. Audit trail preservation is the point вЂ” the entire purpose
  # of an authenticator is that secrets persist until the operator rotates
  # them. Documented here so the gate (-1 requires a justification in
  # purpose) sees the rationale above.
  retention_days: -1
  processors: []
  transfers_outside_eu: false

# в”Ђв”Ђ SSO (Authentik forward-auth) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# X.3 (2026-05-08): see qdrant.yml for the aggregator path. 2FAuth has
# native auth (TOTP secrets vault); forward-auth is the gate to the
# vault itself. user-tier вЂ” per-operator authenticator.
authentik:
  mode: forward_auth
  provider_type: forward_auth
  client_id: nos-twofauth
  client_secret: "{{ global_password_prefix }}_pw_oidc_twofauth"
  slug: twofauth
  name: '2FAuth'
  enabled: true
  launch_url: "https://twofauth.apps.{{ tenant_domain | default('dev.local') }}"
  tier: 3   # user-tier

# в”Ђв”Ђ Compose fragment вЂ” single container, SQLite, internal network в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
compose:
  services:
    twofauth:
      # Upstream image org is "2fauth" (brand starts with a digit; nOS app
      # slug is "twofauth" вЂ” schema requires ^[a-z] for the slug, but the
      # Docker Hub repo follows the brand). Verified 2026-04-29 against
      # hub.docker.com/v2/repositories/2fauth/2fauth/tags.
      image: "docker.io/2fauth/2fauth:6.1.3"
      container_name: twofauth
      restart: unless-stopped
      # No host port mapping вЂ” Traefik reaches the container over the
      # shared Docker network via traefik.http.services.<slug>.
      # loadbalancer.server.port (label emitted by nos_apps_render).
      # Avoids host-port collisions and matches the Tier-2 isolation model.
      expose:
        - "8000"
      environment:
        - "APP_NAME=2FAuth"
        - "APP_ENV=production"
        - "APP_KEY=$SERVICE_BASE64_32_APPKEY"
        - "APP_URL=https://$SERVICE_FQDN_TWOFAUTH/"
        - "SITE_OWNER=admin@dev.local"
        - "DB_DATABASE=/srv/database/database.sqlite"
        - "CACHE_DRIVER=file"
        - "SESSION_DRIVER=file"
        - "MAIL_MAILER=log"   # Pilot: log-only mail. Wire SMTP in Phase-2.
        - "AUTHENTICATION_GUARD=web-guard"
      volumes:
        - tfa_data:/srv/database
        - tfa_storage:/var/www/html/storage
      healthcheck:
        # Laravel framework health endpoint вЂ” built-in `/up` introduced
        # in Laravel 11. Returns 200 when the framework boots cleanly,
        # regardless of route registration. Verified 2026-04-30 against
        # 2fauth/2fauth:6.1.3 (probed `/`, `/login`, `/up`, `/health`,
        # `/api/health` вЂ” all 200; `/api/v1/heartbeat` was a guess that
        # turned out to 404 against the live container).
        test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/up"]
        interval: 30s
        timeout: 5s
        retries: 5
        # Laravel + SQLite migration on first start can take 30-50s on a
        # cold image pull. start_period swallows those early probe failures
        # so Docker doesn't restart the container during legitimate boot.
        start_period: 60s
      mem_limit: 256m
      cpus: 0.5

  # Volumes namespace: tfa_*. Unique across all Tier-2 pilots
  # (rcube_* for roundcube, documenso_* for documenso). New pilots SHOULD
  # use a distinct prefix to avoid global-namespace collisions.
  volumes:
    tfa_data:
    tfa_storage:

# в”Ђв”Ђ Tier-2 routing вЂ” proxy auth via Authentik forward-auth в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
nginx:
  auth: "proxy"
  # Authentik RBAC tier вЂ” TOTP secrets are operator credentials, only
  # admins should reach this UI. Drives authentik_app_tiers extension
  # at runtime в†’ only nos-providers + nos-admins pass the proxy gate.
  rbac_tier: 1
