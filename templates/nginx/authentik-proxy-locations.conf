# ==============================================================================
# Authentik Proxy Outpost — location bloky (include v server {} kontextu)
# Fail-closed: pokud outpost neodpovídá, vrať 503 (service unavailable).
# PENTEST-002: Changed from graceful degradation (bypass auth) to fail-closed.
# ==============================================================================

location /outpost.goauthentik.io {
    proxy_pass         http://127.0.0.1:{{ authentik_port | default(9003) }}/outpost.goauthentik.io;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Original-URL    $scheme://$http_host$request_uri;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Content-Length     "";
    proxy_pass_request_body off;

    # Rewrite embedded outpost redirect to public Authentik URL
    proxy_redirect http://127.0.0.1:{{ authentik_port | default(9003) }}/ https://{{ authentik_domain | default('auth.dev.local') }}/;
    proxy_redirect http://localhost:9000/ https://{{ authentik_domain | default('auth.dev.local') }}/;
    proxy_redirect http://0.0.0.0:9000/ https://{{ authentik_domain | default('auth.dev.local') }}/;

    proxy_connect_timeout 3;
    proxy_read_timeout 5;

    # Fail-closed: pokud Authentik neodpovídá, vrať 503 (NE bypass auth).
    # Dříve: error_page 500 502 503 504 = @authentik_bypass (return 200)
    # PENTEST-002: DoS na outpost = auth bypass pro 13 služeb → opraveno.
    error_page 500 502 503 504 = @authentik_fail_closed;
}

location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$request_uri;
}

# Fail-closed: outpost error → deny access with 503 (service unavailable)
location @authentik_fail_closed {
    internal;
    default_type text/html;
    return 503 '<!DOCTYPE html><html><head><title>503 Service Unavailable</title></head><body><h1>Authentication service unavailable</h1><p>The authentication provider is temporarily unavailable. Please try again later.</p></body></html>';
}

# Bypass only for 404 (outpost not found for specific path — e.g. static assets)
location @authentik_bypass {
    internal;
    return 200;
}
