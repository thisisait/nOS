# ==============================================================================
# Authentik Proxy Outpost — location bloky (include v server {} kontextu)
# Graceful: pokud outpost neodpovídá, auth_request vrátí 200 (bypass)
# ==============================================================================

location /outpost.goauthentik.io {
    proxy_pass         http://127.0.0.1:{{ authentik_port | default(9003) }}/outpost.goauthentik.io;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Original-URL    $scheme://$http_host$request_uri;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Content-Length     "";
    proxy_pass_request_body off;

    # Rewrite embedded outpost redirect to public Authentik URL
    proxy_redirect http://127.0.0.1:{{ authentik_port | default(9003) }}/ https://{{ authentik_domain | default('auth.dev.local') }}/;
    proxy_redirect http://localhost:9000/ https://{{ authentik_domain | default('auth.dev.local') }}/;
    proxy_redirect http://0.0.0.0:9000/ https://{{ authentik_domain | default('auth.dev.local') }}/;

    proxy_connect_timeout 3;
    proxy_read_timeout 5;

    # Graceful degradation: pokud Authentik neodpovídá, vrať 200 (bypass auth)
    error_page 500 502 503 504 = @authentik_bypass;
}

location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$request_uri;
}

location @authentik_bypass {
    internal;
    return 200;
}
