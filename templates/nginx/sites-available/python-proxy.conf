# ==============================================================================
# Nginx – Python reverse proxy (FastAPI, Django, Flask …)
# Šablona: zkopíruj, přejmenuj a uprav server_name + upstream port
# Uvicorn/Gunicorn typicky běží na portu 8000
# ==============================================================================

upstream python_myapp {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name python.dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name python.dev.local;

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/python.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/python.error.log  warn;

    client_max_body_size 50m;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── FastAPI / OpenAPI docs ────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://python_myapp;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket / Server-Sent Events ───────────────────────────────────────
    location /ws/ {
        proxy_pass         http://python_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # ── API s rate limitingem ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://python_myapp;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        limit_req zone=api burst=200 nodelay;
        proxy_read_timeout 120;
    }

    # ── Statické soubory (Django collectstatic) ───────────────────────────────
    location /static/ {
        alias {{ ansible_facts['env']['HOME'] }}/projects/python-myapp/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias {{ ansible_facts['env']['HOME'] }}/projects/python-myapp/media/;
        expires 7d;
        access_log off;
    }

    # ── Vše ostatní ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://python_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
    }
}
