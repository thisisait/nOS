# ==============================================================================
# Nginx – Statický web (Hugo, Astro, Next.js export, Vite build …)
# Šablona: zkopíruj, přejmenuj a uprav server_name + root
# Optimalizované cachování + Brotli/Gzip
# ==============================================================================

server {
    listen 80;
    server_name static.dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name static.dev.local;

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    root  {{ ansible_facts['env']['HOME'] }}/projects/static-site/dist;
    index index.html;

    access_log {{ homebrew_prefix }}/var/log/nginx/static.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/static.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;

    # ── Hashed assety (vite/webpack: filename obsahuje hash) ─────────────────
    location ~* \.(js|css|woff2|woff|ttf)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Obrázky ───────────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── HTML a data – žádné cachování ─────────────────────────────────────────
    location ~* \.(html|htm|xml|json|txt)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback (React, Vue, Angular …) ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 404 stránka ───────────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
