# ==============================================================================
# Nginx – Vaultwarden (Bitwarden-kompatibilní password vault)
# WebSocket pro live sync mezi klienty
# ==============================================================================

upstream vaultwarden_backend {
    server 127.0.0.1:{{ vaultwarden_port | default(8062) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ vaultwarden_domain | default('pass.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ vaultwarden_domain | default('pass.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/vaultwarden.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/vaultwarden.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 128m;

    location / {
        proxy_pass         http://vaultwarden_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_buffering    off;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";
    }
}
