# ==============================================================================
# Nginx – BookStack (reverse proxy → Docker kontejner :{{ bookstack_port | default(3013) }})
# BookStack ma nativni OIDC (Authentik) — bez forward_auth, prihlaseni
# "Login with Authentik" zajistuje primo aplikace.
# ==============================================================================

server {
    listen 80;
    server_name {{ bookstack_domain | default('bookstack' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ bookstack_domain | default('bookstack' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/bookstack.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/bookstack.error.log  warn;

    # BookStack podporuje obrazky/prilohy (Cover image, gallery uploads).
    client_max_body_size 50m;
    client_body_timeout  300;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bookstack_port | default(3013) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 600;
        proxy_connect_timeout 30;
        proxy_buffering    off;
        proxy_request_buffering off;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" always;
    }
}
