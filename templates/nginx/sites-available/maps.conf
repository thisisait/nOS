# ==============================================================================
# Nginx – Offline Mapy reverse proxy (tileserver-gl, port 8080)
# ==============================================================================

server {
    listen 80;
    server_name {{ maps_domain | default('maps.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ maps_domain | default('maps.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/maps.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/maps.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;
    # CORS pro mapové tile requesty z jiných domén
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

    # ── Tile cache ────────────────────────────────────────────────────────────
    proxy_cache app_cache;
    proxy_cache_valid 200 7d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating;
    add_header X-Cache-Status $upstream_cache_status;

    # ── Proxy na tileserver-gl ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:{{ maps_port | default(8080) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;

        # Tile requesty cachovat
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
    }

    # ── API endpoint (no cache) ───────────────────────────────────────────────
    location ~* ^/(index\.json|styles|capabilities) {
        proxy_pass http://127.0.0.1:{{ maps_port | default(8080) }};
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache";
    }
}
