# ==============================================================================
# Nginx – Node.js reverse proxy (Express, Fastify, Next.js, Nuxt …)
# Template: set server_name and port of the Node.js process
# ==============================================================================

upstream nodejs_myapp {
    server {{ nginx_backend_host | default('127.0.0.1') }}:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name node.dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name node.dev.local;

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/node.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/node.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Static assets (Next.js /_next/static, Nuxt /_nuxt etc.) ──────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        proxy_pass http://nodejs_myapp;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket support (Socket.IO, HMR …) ─────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://nodejs_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Proxy everything else ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://nodejs_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;

        # Buffering – disable for SSE / streaming
        proxy_buffering    off;

        limit_req zone=general burst=100 nodelay;
    }
}
