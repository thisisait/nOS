# ==============================================================================
# Nginx – Portainer CE reverse proxy (port {{ portainer_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ portainer_domain | default('portainer.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ portainer_domain | default('portainer.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/portainer.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/portainer.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── WebSocket podpora (live logy kontejnerů, terminal v browseru) ─────────
    location /api/websocket {
        proxy_pass         http://127.0.0.1:{{ portainer_port | default(9002) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ portainer_port | default(9002) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
