# ==============================================================================
# Nginx – RustFS S3 console reverse proxy (port {{ rustfs_console_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ rustfs_domain | default('fs.dev.local') }} rustfs.{{ instance_tld | default('dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    # Canonical hostname is {{ rustfs_domain | default('fs.dev.local') }}; rustfs.<tld> is kept as a
    # friendlier alias for muscle-memory (the old name). Both hit the same console.
    server_name {{ rustfs_domain | default('fs.dev.local') }} rustfs.{{ instance_tld | default('dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/rustfs.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/rustfs.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 0;

    # RustFS serves the console SPA under /rustfs/console/, not /.
    # Redirect the bare URL so users can type the hostname without the path.
    location = / {
        return 302 /rustfs/console/;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ rustfs_console_port | default(9001) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 600;
    }
}
