# ==============================================================================
# Nginx – RustFS S3 console reverse proxy (port {{ rustfs_console_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ rustfs_domain | default('fs.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ rustfs_domain | default('fs.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/rustfs.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/rustfs.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 0;

    location / {
        proxy_pass         http://127.0.0.1:{{ rustfs_console_port | default(9001) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 600;
    }
}
