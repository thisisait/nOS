# ==============================================================================
# Nginx – Go reverse proxy (net/http, Gin, Echo, Fiber …)
# Go HTTP server typicky na portu 8080
# ==============================================================================

upstream go_myapp {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name go.dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name go.dev.local;

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/go.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/go.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── gRPC-Gateway / REST API ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=500 nodelay;

        proxy_pass         http://go_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;

        # Vypnout buffering pro streaming responses
        proxy_buffering off;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://go_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # ── Pprof endpoint (pouze lokálně!) ───────────────────────────────────────
    location /debug/pprof/ {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://go_myapp;
    }

    # ── Vše ostatní ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://go_myapp;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 10;
    }
}
