# ==============================================================================
# Nginx – Infisical CE secrets vault
# ==============================================================================

upstream infisical_backend {
    server 127.0.0.1:{{ infisical_port | default(8075) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ infisical_domain | default('vault.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ infisical_domain | default('vault.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/infisical.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/infisical.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Native OIDC via Infisical OIDC_* env vars — no forward_auth needed.
    # Infisical handles the "Continue with SSO" flow server-side.

    location / {
        proxy_pass         http://infisical_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_buffering    off;

        limit_req zone=general burst=100 nodelay;
    }
}
