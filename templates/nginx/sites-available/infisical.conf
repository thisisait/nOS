# ==============================================================================
# Nginx – Infisical CE secrets vault
# ==============================================================================

upstream infisical_backend {
    server 127.0.0.1:{{ infisical_port | default(8075) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ infisical_domain | default('vault.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ infisical_domain | default('vault.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/infisical.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/infisical.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://infisical_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_buffering    off;

        limit_req zone=general burst=100 nodelay;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
