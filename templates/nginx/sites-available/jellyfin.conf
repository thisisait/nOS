# ==============================================================================
# Nginx – Jellyfin media server reverse proxy (port {{ jellyfin_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ jellyfin_domain | default('media.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ jellyfin_domain | default('media.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/jellyfin.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/jellyfin.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Velké video soubory ───────────────────────────────────────────────────
    client_max_body_size 0;

    # ── WebSocket (live subtitly, sync přehrávání) ────────────────────────────
    location /socket {
        proxy_pass         http://127.0.0.1:{{ jellyfin_port | default(8096) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ jellyfin_port | default(8096) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming – buffering vypnout pro plynulé přehrávání
        proxy_buffering    off;
        proxy_request_buffering off;

        proxy_read_timeout    3600;
        proxy_connect_timeout 60;
        proxy_send_timeout    3600;
    }
}
