# ==============================================================================
# Nginx – WordPress (reverse proxy → Docker kontejner :{{ wordpress_port | default(8084) }})
# ==============================================================================

server {
    listen 80;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/wordpress.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/wordpress.error.log  warn;

    client_max_body_size 64m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "ALLOWALL" always;
    add_header X-Content-Type-Options "nosniff" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://127.0.0.1:{{ wordpress_port | default(8084) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_connect_timeout 30;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";
    }
}
