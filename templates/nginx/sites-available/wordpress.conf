# ==============================================================================
# Nginx – WordPress (reverse proxy → Docker kontejner :{{ wordpress_port | default(8084) }})
# Native OIDC (Authentik) via the openid-connect-generic WP plugin — no
# forward_auth, direct proxy_pass. Login flow is handled inside WordPress.
# ==============================================================================

server {
    listen 80;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/wordpress.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/wordpress.error.log  warn;

    client_max_body_size 64m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://127.0.0.1:{{ wordpress_port | default(8084) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_connect_timeout 30;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os.dev.local') }}" always;
    }
}
