# ==============================================================================
# Nginx – n8n workflow automation reverse proxy (port 5678)
# ==============================================================================

server {
    listen 80;
    server_name {{ n8n_domain | default('n8n.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ n8n_domain | default('n8n.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/n8n.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/n8n.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── WebSocket support (n8n editor live updates) ───────────────────────────
    location /rest/push {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ n8n_port | default(5678) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ n8n_port | default(5678) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os.dev.local') }}" always;

        # n8n needs larger limits for workflow JSON
        client_max_body_size 50m;
        proxy_buffer_size    128k;
        proxy_buffers        4 256k;
    }
}
