# ==============================================================================
# Nginx – n8n workflow automation reverse proxy (port 5678)
# ==============================================================================

server {
    listen 80;
    server_name {{ n8n_domain | default('n8n.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ n8n_domain | default('n8n.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/n8n.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/n8n.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── WebSocket podpora (n8n editor live updates) ───────────────────────────
    location /rest/push {
        proxy_pass         http://127.0.0.1:{{ n8n_port | default(5678) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ n8n_port | default(5678) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        # n8n potřebuje větší limity pro workflow JSON
        client_max_body_size 50m;
        proxy_buffer_size    128k;
        proxy_buffers        4 256k;
    }
}
