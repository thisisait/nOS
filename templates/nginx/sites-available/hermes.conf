# ==============================================================================
# Nginx – Hermes Agent web API (FastAPI on port {{ hermes_web_port | default(18790) }})
#
# SSO: Authentik proxy-auth (Tier 1 admin — Hermes muze executovat shell commands,
# modifikovat filesystem + volat external APIs). Gating strict.
# ==============================================================================

server {
    listen 80;
    server_name {{ hermes_domain | default('hermes' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ hermes_domain | default('hermes' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/hermes.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/hermes.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # Hermes Agent muze mit dlouhe streamovane odpovedi (agent loops)
    client_max_body_size 10m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ hermes_web_port | default(18790) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSE / streaming support pro agent loops
        proxy_buffering    off;
        proxy_cache        off;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
