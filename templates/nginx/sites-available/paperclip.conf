# ==============================================================================
# Nginx – Paperclip AI multi-agent orchestration
# React dashboard + REST API, vyžaduje WebSocket pro real-time updates
# ==============================================================================

upstream paperclip_backend {
    server 127.0.0.1:{{ paperclip_port | default(3006) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ paperclip_domain | default('paperclip.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ paperclip_domain | default('paperclip.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/paperclip.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/paperclip.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://paperclip_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_buffering    off;

        limit_req zone=general burst=100 nodelay;
    }
}
