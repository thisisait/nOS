# ==============================================================================
# Nginx – HedgeDoc collaborative markdown editor reverse proxy (port {{ hedgedoc_port | default(3012) }})
# Native OIDC (Authentik) – NO forward_auth.
# WebSocket upgrade required for real-time collaboration (socket.io).
# ==============================================================================

server {
    listen 80;
    server_name {{ hedgedoc_domain | default('hedgedoc.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ hedgedoc_domain | default('hedgedoc.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/hedgedoc.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/hedgedoc.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # HedgeDoc uploads (images in notes) can be sizeable
    client_max_body_size 100m;

    # socket.io upgrade map — injected once here for this vhost
    # (WebSocket required for real-time collaborative editing)
    location / {
        proxy_pass         http://127.0.0.1:{{ hedgedoc_port | default(3012) }};
        proxy_http_version 1.1;

        # WebSocket upgrade (real-time collab / socket.io)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived WS connections for collab editing
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;

        # Allow Puter iframe embedding (consistent with other b2b services)
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";
    }
}
