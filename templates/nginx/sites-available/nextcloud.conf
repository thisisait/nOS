# ==============================================================================
# Nginx – Nextcloud (reverse proxy → Docker kontejner :{{ nextcloud_port | default(8085) }})
# ==============================================================================

server {
    listen 80;
    server_name {{ nextcloud_domain | default('cloud.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ nextcloud_domain | default('cloud.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/nextcloud.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/nextcloud.error.log  warn;

    client_max_body_size 512m;
    client_body_timeout  300;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Frame-Options "ALLOWALL" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    # X-XSS-Protection removed (REM-010): deprecated, can cause XSS in older IE.
    # Modern browsers ignore it; CSP is the correct mitigation.

    # CalDAV / CardDAV
    location = /.well-known/carddav { return 301 $scheme://$host/remote.php/dav; }
    location = /.well-known/caldav  { return 301 $scheme://$host/remote.php/dav; }

    location / {
        proxy_pass         http://127.0.0.1:{{ nextcloud_port | default(8085) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 600;
        proxy_connect_timeout 30;
        proxy_buffering    off;
        proxy_request_buffering off;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";
    }
}
