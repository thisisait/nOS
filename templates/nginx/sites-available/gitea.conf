# ==============================================================================
# Nginx – Gitea self-hosted Git reverse proxy (port 3001)
# ==============================================================================

server {
    listen 80;
    server_name {{ gitea_domain | default('gitea.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ gitea_domain | default('gitea.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/gitea.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/gitea.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Git clone/push – velké repozitáře ────────────────────────────────────
    client_max_body_size 512m;

    location / {
        proxy_pass         http://127.0.0.1:{{ gitea_port | default(3003) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;

        # Git operace mohou trvat dlouho
        proxy_send_timeout 600;
    }
}
