# ==============================================================================
# Nginx – Authentik SSO / Identity Provider
# WebSocket required for real-time flows + outpost communication
# ==============================================================================

upstream authentik_backend {
    server {{ nginx_backend_host | default('127.0.0.1') }}:{{ authentik_port | default(9000) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ authentik_domain | default('auth.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ authentik_domain | default('auth.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/authentik.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/authentik.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://authentik_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering    off;    }
}
