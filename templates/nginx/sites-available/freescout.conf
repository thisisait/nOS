# ==============================================================================
# Nginx – FreeScout helpdesk reverse proxy (port {{ freescout_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ freescout_domain | default('helpdesk' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ freescout_domain | default('helpdesk' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/freescout.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/freescout.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50m;

    # Native OIDC SSO is handled INSIDE FreeScout via the freescout-oauth module
    # (wired by roles/pazny.freescout/tasks/post.yml). No Nginx forward-auth here
    # — the service renders its own "Sign in with Authentik" button.

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ freescout_port | default(8090) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" always;
    }
}
