# ==============================================================================
# Nginx – Woodpecker CI reverse proxy (port {{ woodpecker_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ woodpecker_domain | default('ci.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ woodpecker_domain | default('ci.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/woodpecker.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/woodpecker.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── SSE (Server-Sent Events) pro live logy pipeline ──────────────────────
    location /stream {
        proxy_pass         http://127.0.0.1:{{ woodpecker_port | default(8060) }};
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ woodpecker_port | default(8060) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        # Artifact uploads (Docker images, build výstupy)
        client_max_body_size 500m;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";
    }
}
