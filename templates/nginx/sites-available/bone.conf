# ==============================================================================
# Nginx — Bone API reverse proxy (port {{ bone_port | default(8099) }})
#
# Bone is the local FastAPI structure/state/dispatcher organ. It lives on
# api.<tld> and is the destination for the wing_telemetry callback plugin
# (POST /api/v1/events) plus an arbitrary Ansible-playbook RPC endpoint.
#
# Auth: HMAC at the application layer (BONE_SECRET / X-API-Key + per-route
# HMAC-SHA256 on /api/v1/events). NO Authentik forward_auth — the callback
# plugin posts events headlessly during playbook runs and must not get
# redirected through SSO. Operator-facing endpoints (if any) can be put
# behind Authentik separately by adding a /admin/ block in the future.
# ==============================================================================

server {
    listen 80;
    server_name {{ bone_domain | default('api' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ bone_domain | default('api' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/bone.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/bone.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Allow up to 5 MB request bodies (telemetry batches are normally < 100 KB
    # but state-snapshots from /api/state can grow if a host has many services).
    client_max_body_size 5m;

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bone_port | default(8099) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
