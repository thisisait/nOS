# ==============================================================================
# Nginx – Bluesky PDS (AT Protocol Personal Data Server)
# Handles WebSocket for AT Protocol firehose + XRPC API
# ==============================================================================

server {
    listen 80;
    server_name {{ bluesky_pds_hostname | default('{{ bluesky_pds_hostname | default('bsky.dev.lan') }}') }} *.{{ bluesky_pds_hostname | default('{{ bluesky_pds_hostname | default('bsky.dev.lan') }}') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ bluesky_pds_hostname | default('{{ bluesky_pds_hostname | default('bsky.dev.lan') }}') }} *.{{ bluesky_pds_hostname | default('{{ bluesky_pds_hostname | default('bsky.dev.lan') }}') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/bluesky-pds.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/bluesky-pds.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100m;

    # ── WebSocket (AT Protocol firehose / event stream) ─────────────────────
    location /xrpc/com.atproto.sync.subscribeRepos {
        proxy_pass         http://127.0.0.1:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # ── XRPC API + static ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
