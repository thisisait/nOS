# ==============================================================================
# Nginx – Bluesky PDS (AT Protocol Personal Data Server)
# Auth: XRPC API public (AT Protocol federation), web UI via Authentik proxy
#
# Canonical hostname is bsky.dev.lan — AT Protocol spec forbids .local
# (reserved for mDNS/Bonjour). A redirect block at the bottom catches the
# muscle-memory bsky.dev.local typo.
# ==============================================================================

server {
    listen 80;
    server_name {{ bluesky_pds_hostname | default('bsky.dev.lan') }} *.{{ bluesky_pds_hostname | default('bsky.dev.lan') }};
    return 301 https://$host$request_uri;
}

# ── Muscle-memory alias: bsky.<instance_tld> -> bsky.dev.lan (301) ──────────
# Every other nOS service uses instance_tld (default dev.local), so users
# routinely type bsky.dev.local. The canonical hostname is .lan (AT Proto
# spec forbids .local) — bounce the typo to the right place instead of
# silently dropping the connection.
{% set _pds_alias_host = 'bsky.' ~ (instance_tld | default('dev.local')) %}
{% if _pds_alias_host != (bluesky_pds_hostname | default('bsky.dev.lan')) %}
server {
    listen      80;
    listen      443 ssl http2;
    server_name {{ _pds_alias_host }};
    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};
    return 301 https://{{ bluesky_pds_hostname | default('bsky.dev.lan') }}$request_uri;
}
{% endif %}

server {
    listen      443 ssl http2;
    server_name {{ bluesky_pds_hostname | default('bsky.dev.lan') }} *.{{ bluesky_pds_hostname | default('bsky.dev.lan') }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/bluesky-pds.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/bluesky-pds.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100m;

    # ── PUBLIC: XRPC API (AT Protocol federation + client auth) ────────────
    # These MUST be public for AT Protocol to work (federation, client apps).
    location /xrpc/ {
        auth_request off;
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # ── PUBLIC: WebSocket (AT Protocol firehose / event stream) ────────────
    location /xrpc/com.atproto.sync.subscribeRepos {
        auth_request off;
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # ── PUBLIC: .well-known (DID resolution, handle verification) ──────────
    location /.well-known/ {
        auth_request off;
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

{% if install_authentik | default(false) %}
    # ── Authentik proxy auth (gates non-API access like admin endpoints) ────
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── Everything else (OAuth callback, admin, static) ────────────────────
    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ bluesky_pds_port | default(2583) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
