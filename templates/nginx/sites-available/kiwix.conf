# ==============================================================================
# Nginx – Kiwix reverse proxy (kiwix-serve in Docker, port 8888)
# ==============================================================================

server {
    listen 80;
    server_name {{ kiwix_domain | default('kiwix.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ kiwix_domain | default('kiwix.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/kiwix.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/kiwix.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── Proxy to kiwix-serve ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ kiwix_port | default(8888) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 30;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os.dev.local') }}" always;

        # Large ZIM files may have slow responses on first load
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }

    # ── Static assets from Kiwix ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        proxy_pass http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ kiwix_port | default(8888) }};
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

}
