# ==============================================================================
# Nginx – Kiwix reverse proxy (kiwix-serve v Docker, port 8888)
# ==============================================================================

server {
    listen 80;
    server_name {{ kiwix_domain | default('kiwix.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ kiwix_domain | default('kiwix.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/kiwix.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/kiwix.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── Proxy na kiwix-serve ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:{{ kiwix_port | default(8888) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 30;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";

        # Velké ZIM soubory mohou mít pomalé odpovědi při prvním načtení
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }

    # ── Statické assety z Kiwix ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:{{ kiwix_port | default(8888) }};
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

}
