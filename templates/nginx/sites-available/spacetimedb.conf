# ==============================================================================
# Nginx — SpacetimeDB Standalone reverse proxy (port {{ spacetimedb_port }})
# Forward-auth via Authentik (tier 1 — admins/providers only) — see
# `outpost-buffer` proxy upstream + auth_request snippet at the bottom.
# WebSocket upgrade is required for SpacetimeDB subscriptions (/v1/database/*).
# ==============================================================================

server {
    listen 80;
    server_name {{ spacetimedb_domain | default('spacetime' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ spacetimedb_domain | default('spacetime' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/spacetimedb.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/spacetimedb.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Generous timeouts + body size — module publishes upload WASM blobs.
    client_max_body_size 256M;
    proxy_read_timeout   3600;
    proxy_send_timeout   3600;

    # ── WebSocket upgrade (live subscriptions, reducer streaming) ────────────
    location ~ ^/v1/database/.+/subscribe {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ spacetimedb_port | default(3030) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── HTTP API + module publish ────────────────────────────────────────────
    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ spacetimedb_port | default(3030) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }
}
