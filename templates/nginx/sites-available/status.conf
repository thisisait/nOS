# ==============================================================================
# Nginx – Public status page (status.{{ tenant_domain | default('dev.local') }})
# Reverse-proxies to Uptime Kuma /status/<slug> — NO authentication required.
# The Uptime Kuma status page itself is public read-only; all admin paths
# (/manage, /dashboard, /login) are not exposed under this vhost.
# ==============================================================================

server {
    listen 80;
    server_name {{ uptime_kuma_status_page_domain | default('status' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ ' ' + tailscale_hostname if tailscale_hostname | default('') | length > 0 else '' }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ uptime_kuma_status_page_domain | default('status' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ ' ' + tailscale_hostname if tailscale_hostname | default('') | length > 0 else '' }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/status.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/status.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Root redirect → the actual public status page.
    location = / {
        return 302 /status/{{ uptime_kuma_status_page_slug | default('nos') }};
    }

    # ── WebSocket / socket.io — real-time status updates on the public page
    location /socket.io {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ uptime_kuma_port | default(3001) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # ── Public status page + its static / API subpaths ─────────────────────
    # Allowed prefixes: /status/*, /api/status-page/*, /assets/*, favicon,
    # icons, manifest, and a few upload/icon endpoints the status page needs.
    location ~ ^/(status/|api/status-page/|api/badge/|assets/|icon\.svg|favicon\.ico|apple-touch-icon|manifest\.json|robots\.txt|upload/) {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ uptime_kuma_port | default(3001) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;

        proxy_hide_header  X-Frame-Options;
        add_header         Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" always;
    }

    # Deny anything else (admin UI, /login, /dashboard, etc. — keep them on
    # uptime.dev.local behind Authentik proxy auth).
    location / {
        return 404;
    }
}
