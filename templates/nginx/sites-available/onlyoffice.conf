# ==============================================================================
# Nginx – ONLYOFFICE Document Server reverse proxy (port {{ onlyoffice_port | default(3015) }})
#
# DULEZITE – split location bloky:
#   location /                 → UI (welcome page, admin); Authentik forward_auth ON
#   location ~ ^/(healthcheck|ConvertService\.ashx|coauthoring|OfficeWeb|cache|info|[0-9.]+/).*$
#                              → API + embed + versioned assets; Authentik forward_auth OFF
#                                 (JWT validace probiha na ONLYOFFICE side)
#
# Bez tohoto splitu by Nextcloud/BookStack iframe nedokazaly dosahnout na
# /ConvertService.ashx — Authentik by je zablokoval i s validnim JWT tokenem.
# ==============================================================================

server {
    listen 80;
    server_name {{ onlyoffice_domain | default('office.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ onlyoffice_domain | default('office.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/onlyoffice.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/onlyoffice.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Document conversion muze posilat velke body (DOCX → PDF, ...) ──────
    client_max_body_size 100m;
    client_body_timeout  300s;

    # ── Proxy buffers nutne pro conversion odpovedi ────────────────────────
    proxy_buffer_size    32k;
    proxy_buffers        8 32k;
    proxy_busy_buffers_size 64k;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ──────────────────────────────────────────────────────────────────────
    # API + embed + versioned assets — BEZ Authentik auth
    # Hostitelske aplikace (Nextcloud, BookStack) volaji s JWT tokenem;
    # ONLYOFFICE validuje JWT podpis internally.
    # ──────────────────────────────────────────────────────────────────────
    location ~ ^/(healthcheck|ConvertService\.ashx|coauthoring|OfficeWeb|cache|info|fonts|sdkjs|web-apps|([0-9]+\.[0-9]+\.[0-9]+\.?[0-9]*)/).*$ {
        proxy_pass         http://127.0.0.1:{{ onlyoffice_port | default(3015) }};
        proxy_http_version 1.1;

        # WebSocket upgrade pro real-time collaboration
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Iframe embedding z hostitelskych aplikaci
        proxy_hide_header  X-Frame-Options;
        add_header         X-Frame-Options   "ALLOWALL";
    }

    # ──────────────────────────────────────────────────────────────────────
    # UI (welcome page, admin) — Authentik forward_auth ON
    # ──────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:{{ onlyoffice_port | default(3015) }};
        proxy_http_version 1.1;

        # WebSocket upgrade (pro pripady kdy UI otevre live editor)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Iframe embedding
        proxy_hide_header  X-Frame-Options;
        add_header         X-Frame-Options   "ALLOWALL";

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
