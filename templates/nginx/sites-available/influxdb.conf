# ==============================================================================
# Nginx – InfluxDB 2.x reverse proxy (port {{ influxdb_port | default(8086) }})
# ==============================================================================
# InfluxDB OSS 2.x has no native OIDC — UI access is gated by Authentik
# forward_auth (proxy-auth pattern, see templates/nginx/sites-available/uptime-kuma.conf).
# API clients use native InfluxDB tokens (Authorization: Token <token>)
# and bypass Authentik through forward_auth bypass on the Authorization header
# (if you want — by default forward_auth is applied to all requests).
# ==============================================================================

server {
    listen 80;
    server_name {{ influxdb_domain | default('influx.dev.local') }}{{ ' ' + tailscale_hostname if tailscale_hostname | default('') | length > 0 else '' }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ influxdb_domain | default('influx.dev.local') }}{{ ' ' + tailscale_hostname if tailscale_hostname | default('') | length > 0 else '' }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/influxdb.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/influxdb.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Large queries / CSV imports
    client_max_body_size 50m;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://127.0.0.1:{{ influxdb_port | default(8086) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long Flux/InfluxQL query timeouts
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os.dev.local') }}" always;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
