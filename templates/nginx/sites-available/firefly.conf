# ==============================================================================
# Nginx – Firefly III personal finance manager reverse proxy (port {{ firefly_port | default(3014) }})
#
# SSO: Authentik proxy outpost (auth_request). Firefly ocekava REMOTE_USER
# a REMOTE_EMAIL hlavicky — mapujeme je z Authentik claims zachycenych v
# authentik-proxy-auth.conf snippetu.
# ==============================================================================

server {
    listen 80;
    server_name {{ firefly_domain | default('firefly.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ firefly_domain | default('firefly.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/firefly.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/firefly.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Firefly CSV / OFX / QIF import uploads – 50 MB je dostatecne pro vetsinu bank
    client_max_body_size 50m;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://127.0.0.1:{{ firefly_port | default(3014) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;

        # Firefly remote_user_guard cte REMOTE_USER / REMOTE_EMAIL hlavicky
        # (Laravel konvence, underscore variant). authentik-proxy-auth.conf
        # zachytava Authentik claims do $authentik_username / $authentik_email
        # a nastavuje Remote-User / Remote-Email (hyphen) pro ostatni sluzby;
        # zde je pridavame i v underscore variante pro Firefly.
        proxy_set_header REMOTE_USER  $authentik_username;
        proxy_set_header REMOTE_EMAIL $authentik_email;
{% endif %}
    }
}
