# ==============================================================================
# Nginx – jsOS web desktop reverse proxy
# OS.js v3 runs on Node.js, requires WebSocket upgrade
# ==============================================================================

upstream jsos_backend {
    server {{ nginx_backend_host | default('127.0.0.1') }}:{{ jsos_port }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ jsos_domain }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ jsos_domain }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/jsos.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/jsos.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Static assets (webpack build output) ──────────────────────────────────
    location ~* ^/packages/.*\.(js|css|png|jpg|svg|woff2|ico)$ {
        proxy_pass http://jsos_backend;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket (OS.js realtime events) ─────────────────────────────────────
    location /socket {
        proxy_pass         http://jsos_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # ── API + VFS (file uploads can be large) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://jsos_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        client_max_body_size 100m;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://jsos_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;
        proxy_buffering    off;

        limit_req zone=general burst=100 nodelay;
    }
}
