# ==============================================================================
# Nginx – Open WebUI reverse proxy (port {{ openwebui_port }})
# ==============================================================================

server {
    listen 80;
    server_name {{ openwebui_domain | default('ai.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ openwebui_domain | default('ai.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/openwebui.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/openwebui.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── WebSocket support (live LLM response streaming) ──────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:{{ openwebui_port | default(3004) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ openwebui_port | default(3004) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os.dev.local') }}" always;

        # LLM responses can be slow – do not set timeout too low
        proxy_read_timeout    600;
        proxy_connect_timeout 60;

        # Token streaming (SSE)
        proxy_buffering    off;
        proxy_cache        off;

        # Document upload for RAG
        client_max_body_size 100m;
    }
}
