# ==============================================================================
# Nginx – Node-RED low-code flow automation reverse proxy (port {{ nodered_port | default(1880) }})
#
# Node-RED editor uses WebSockets (comms channel, debug sidebar) — proxy_pass
# must upgrade connections on `/comms` and generally across the whole vhost.
#
# β1.B (2026-05-05): when nodered_native_oidc_enabled=true, Node-RED's own
# adminAuth (passport-openidconnect) handles SSO. This vhost MUST NOT add
# Authentik forward_auth on top — that would double-authenticate the user.
# When OIDC is disabled (operator opt-out), the include lines fall back to
# the old proxy gate so the editor stays protected.
# ==============================================================================

server {
    listen 80;
    server_name {{ nodered_domain | default('nodered' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ nodered_domain | default('nodered' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/nodered.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/nodered.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) and not (nodered_native_oidc_enabled | default(false)) %}
    # Forward-auth fallback when native OIDC is opted out.
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── WebSocket support (Node-RED editor comms + debug sidebar) ────────────
    # /comms = shell-equivalent (function nodes send commands over WS). MUST
    # be behind the same Authentik gate as /. Otherwise SSO bypass.
    location /comms {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ nodered_port | default(1880) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

{% if install_authentik | default(false) and not (nodered_native_oidc_enabled | default(false)) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ nodered_port | default(1880) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" always;

        # Node-RED needs larger limits for flow JSON / node installs
        client_max_body_size 50m;
        proxy_buffer_size    128k;
        proxy_buffers        4 256k;

{% if install_authentik | default(false) and not (nodered_native_oidc_enabled | default(false)) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
