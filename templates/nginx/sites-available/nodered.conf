# ==============================================================================
# Nginx – Node-RED low-code flow automation reverse proxy (port {{ nodered_port | default(1880) }})
#
# Node-RED editor uses WebSockets (comms channel, debug sidebar) — proxy_pass
# must upgrade connections on `/comms` and generally across the whole vhost.
# Authentik forward_auth gates ALL editor/admin access (no built-in adminAuth
# in settings.js — function nodes are shell-equivalent, must stay behind SSO).
# ==============================================================================

server {
    listen 80;
    server_name {{ nodered_domain | default('nodered.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ nodered_domain | default('nodered.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/nodered.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/nodered.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── WebSocket podpora (Node-RED editor comms + debug sidebar) ────────────
    location /comms {
        proxy_pass         http://127.0.0.1:{{ nodered_port | default(1880) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://127.0.0.1:{{ nodered_port | default(1880) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # Allow Puter iframe embedding
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";

        # Node-RED potřebuje větší limity pro flow JSON / node installs
        client_max_body_size 50m;
        proxy_buffer_size    128k;
        proxy_buffers        4 256k;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
