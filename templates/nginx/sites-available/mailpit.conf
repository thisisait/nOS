# ==============================================================================
# Nginx — Mailpit web UI + REST API reverse proxy (port {{ mailpit_ui_port | default(8025) }})
#
# SSO: Authentik forward_auth (no native OIDC in Mailpit v1.x). Optional
# basic-auth (mailpit_ui_user/password) is layered inside the container as
# defense-in-depth — the Authentik group check still runs first.
# ==============================================================================

server {
    listen 80;
    server_name {{ mailpit_domain | default('mail.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ mailpit_domain | default('mail.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/mailpit.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/mailpit.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # Mailpit uses long-poll SSE for the live message stream
    location /api/v1/events {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ mailpit_ui_port | default(8025) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ mailpit_ui_port | default(8025) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
