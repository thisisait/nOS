# ==============================================================================
# Nginx – GitLab CE reverse proxy
#
# GitLab interní Omnibus nginx poslouchá na HTTP ({{ gitlab_http_port }}).
# Tento vhost přebírá SSL termination a forwarduje provoz dovnitř.
# Kontejner signalizuje HTTPS přes X-Forwarded-Proto header.
# ==============================================================================

server {
    listen 80;
    server_name {{ gitlab_domain | default('gitlab.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ gitlab_domain | default('gitlab.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/gitlab.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/gitlab.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Git push/clone – velké repozitáře a LFS objekty ──────────────────────
    client_max_body_size 0;           # Bez limitu (GitLab si hlídá sám)
    chunked_transfer_encoding on;

    # ── Timeouty pro dlouhé Git operace ──────────────────────────────────────
    proxy_read_timeout    3600;
    proxy_connect_timeout 300;
    proxy_send_timeout    3600;

    location / {
        proxy_pass         http://127.0.0.1:{{ gitlab_http_port | default(8929) }};
        proxy_http_version 1.1;

        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Ssl   on;

        # ── Buffering (velké response z GitLab API) ───────────────────────────
        proxy_buffering    off;
        proxy_request_buffering off;
    }
}
