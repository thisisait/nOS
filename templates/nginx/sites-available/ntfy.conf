# ==============================================================================
# Nginx – ntfy push notifications reverse proxy (port {{ ntfy_port }})
#
# KRITICKE tuning pro Server-Sent Events (ntfy /TOPIC/sse, /TOPIC/json streams):
#   - proxy_buffering off  → bez buffereni ihned vidime udalosti
#   - proxy_cache off      → nedovol cache pro push stream
#   - Connection ""        → clear hop-by-hop; inak by zustalo "close"
#   - chunked_transfer_encoding off
#   - proxy_read_timeout 300s → dlouhe sseny
# ==============================================================================

server {
    listen 80;
    server_name {{ ntfy_domain | default('ntfy.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ ntfy_domain | default('ntfy.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/ntfy.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/ntfy.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ntfy klienti posilaji velke attachments
    client_max_body_size {{ ntfy_attachment_file_size_limit | default('15M') }};

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://127.0.0.1:{{ ntfy_port | default(2586) }};

        # ── SSE / streaming tuning (kriticke pro ntfy push) ────────────────
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection        "";
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow Puter iframe embedding (consistent s jinymi vhosty)
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL";

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
