# ==============================================================================
# Nginx — Wing Security Dashboard (FrankenPHP host runtime, anatomy A3.5)
#
# Auth: Homepage (/) public, API (/api/) token-auth via PHP, rest via Authentik.
#
# Anatomy A3.5 (2026-05-04): FrankenPHP serves Wing on 127.0.0.1:9000 (plain
# HTTP). This vhost is the host-nginx fallback path (`install_nginx: true`);
# the default deployment uses Traefik (`install_nginx: false`) which routes
# directly to host:9000 without needing this file.
#
# Pre-A3.5: this vhost talked FastCGI to PHP-FPM on the same port. Now it
# proxies plain HTTP to FrankenPHP — much simpler. The frankenphp_pass
# direction is a `proxy_pass` to a Caddy-hosted Wing.
# ==============================================================================

server {
    listen 80;
    server_name {{ wing_domain | default('wing' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ wing_domain | default('wing' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    # ── Logy ────────────────────────────────────────────────────────────────
    access_log {{ homebrew_prefix }}/var/log/nginx/wing.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/wing.error.log  warn;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req zone=general burst=50 nodelay;

    # ── Bezpecnostni hlavicky ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ── PUBLIC: Homepage (bez autentizace) — proxy to FrankenPHP ─────────────
    location = / {
        auth_request off;
        proxy_pass http://127.0.0.1:{{ wing_port | default(9000) }};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── PUBLIC: API (PHP validuje Bearer token, nginx nepouziva proxy auth) ──
    location ~ ^/api/ {
        auth_request off;
        proxy_pass http://127.0.0.1:{{ wing_port | default(9000) }};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60;
    }

{% if install_authentik | default(false) %}
    # ── Authentik proxy auth (pro vsechny ostatni routes) ────────────────────
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── Wing front controller (za autentizaci, pokud je Authentik zapnuty) ───
    # FrankenPHP handles all PHP routing internally (php_server in Caddyfile).
    location / {
        proxy_pass http://127.0.0.1:{{ wing_port | default(9000) }};
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Forward Authentik headers from auth_request to FrankenPHP. Caddy/
        # FrankenPHP exposes incoming headers as HTTP_* on $_SERVER.
        proxy_set_header X-Authentik-Username $http_x_authentik_username;
        proxy_set_header X-Authentik-Groups   $http_x_authentik_groups;
        proxy_set_header X-Authentik-Email    $http_x_authentik_email;
        proxy_set_header X-Authentik-Uid      $http_x_authentik_uid;
        proxy_read_timeout 300;
    }
}
