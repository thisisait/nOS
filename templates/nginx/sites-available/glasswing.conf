# ==============================================================================
# Nginx – Glasswing Security Dashboard (Nette PHP-FPM)
# Auth: Homepage (/) public, API (/api/) token-auth via PHP, rest via Authentik
# ==============================================================================

server {
    listen 80;
    server_name {{ glasswing_domain | default('glasswing.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ glasswing_domain | default('glasswing.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    root  {{ glasswing_app_dir | default(ansible_facts['env']['HOME'] + '/glasswing/app') }}/www;
    index index.php;

    # ── Logy ────────────────────────────────────────────────────────────────
    access_log {{ homebrew_prefix }}/var/log/nginx/glasswing.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/glasswing.error.log  warn;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req zone=general burst=50 nodelay;

    # ── Bezpecnostni hlavicky ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ── Skryte soubory / citlive soubory ─────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~* /(\.env|composer\.(json|lock)|\.neon|data/) {
        deny all;
    }

    # ── PUBLIC: Staticke assety (bez autentizace, cache 30d) ─────────────────
    location ~* ^/assets/.*\.(css|js|png|jpg|svg|woff2|ico)$ {
        auth_request off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PUBLIC: Homepage (bez autentizace) ───────────────────────────────────
    location = / {
        auth_request off;
        fastcgi_pass php_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS           "on";
    }

    # ── PUBLIC: API (PHP validuje Bearer token, nginx nepouziva proxy auth) ──
    # fastcgi_pass inline — try_files internal redirect to \.php$ would
    # inherit the server-level auth_request and bounce to Authentik.
    # SCRIPT_NAME must be /index.php so Nette strips it from REQUEST_URI correctly.
    location ~ ^/api/ {
        auth_request off;
        fastcgi_pass php_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS           "on";
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

{% if install_authentik | default(false) %}
    # ── Authentik proxy auth (pro vsechny ostatni routes) ────────────────────
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # ── PHP-FPM ──────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS           "on";
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Nette front controller (za autentizaci, pokud je Authentik zapnuty) ──
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}
