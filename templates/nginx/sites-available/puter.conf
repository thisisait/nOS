# ==============================================================================
# Nginx – Puter cloud OS (webový desktop)
# Puter uses subdomains: os.dev.local (UI), api.os.dev.local (API),
# *.os.dev.local (iframe apps). All proxy to same backend.
# SSL cert must cover *.os.dev.local (mkcert SAN).
#
# Auth strategy: proxy-auth only on main UI domain (os.dev.local).
# API + wildcard subdomains bypass auth — Puter handles its own API auth.
# Outpost doesn't know about subdomains → would return 404 → bypass → empty 200.
# ==============================================================================

upstream puter_backend {
    server 127.0.0.1:{{ puter_port | default(5050) }};
}

server {
    listen 80;
    server_name {{ puter_domain | default('os.dev.local') }} {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }};
    return 301 https://$host$request_uri;
}

# ── API + wildcard subdomains — NO proxy-auth (Puter handles own API auth) ──
server {
    listen      443 ssl;
    server_name {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/puter-api.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/puter.error.log  warn;

    client_max_body_size 100m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;

        # CORS: Puter backend sets its own CORS headers — do NOT add duplicates here
    }
}

# ── Main UI domain — with proxy-auth (Authentik gates access) ───────────────
server {
    listen      443 ssl;
    server_name {{ puter_domain | default('os.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/puter.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/puter.error.log  warn;

    client_max_body_size 100m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    # Static assets — NO auth
    location /dist/ {
        proxy_pass         http://puter_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Socket.IO WebSocket — NO auth
    location /socket.io/ {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering    off;
    }

    # All other requests
    location / {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering    off;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }
}
