# ==============================================================================
# Nginx – Puter cloud OS (webový desktop)
# IMPORTANT: Puter needs relaxed security headers (iframes, CORS, camera/mic).
# Global nginx.conf add_header directives are overridden here per-location.
# ==============================================================================

upstream puter_backend {
    server 127.0.0.1:{{ puter_port | default(5050) }};
}

server {
    listen 80;
    server_name {{ puter_domain | default('os.dev.local') }} {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    server_name {{ puter_domain | default('os.dev.local') }} {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/puter.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/puter.error.log  warn;

    client_max_body_size 100m;

    # Override global security headers — Puter needs iframes, camera, mic, CORS
    # (add_header in server block overrides http{} level add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Credentials "true" always;
    # Deliberately NO X-Frame-Options (Puter uses iframes for apps)
    # Deliberately NO restrictive Permissions-Policy (Camera/Recorder apps need camera+mic)

    # ── Socket.IO WebSocket ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering    off;
    }

    # ── All other requests ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering    off;
    }
}
