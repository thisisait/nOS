# ==============================================================================
# Nginx – Puter cloud OS (webový desktop)
# Vyžaduje: os.dev.local + api.os.dev.local + *.os.dev.local (Dev Center)
# WebSocket povinný (Socket.IO)
# ==============================================================================

upstream puter_backend {
    server 127.0.0.1:{{ puter_port | default(5050) }};
    keepalive 64;
}

server {
    listen 80;
    server_name {{ puter_domain | default('os.dev.local') }} {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ puter_domain | default('os.dev.local') }} {{ puter_api_domain | default('api.os.dev.local') }} *.{{ puter_domain | default('os.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/puter.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/puter.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100m;

    location / {
        proxy_pass         http://puter_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering    off;
    }
}
