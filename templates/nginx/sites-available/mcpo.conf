# ==============================================================================
# Nginx – mcpo (MCP-to-OpenAPI proxy) reverse proxy
#
# Note: mcpo je volan primo z OpenWebUI kontejneru pres Docker interni sit
# (http://mcpo:8000). Tento vhost slouzi pro lidsky pristup k OpenAPI
# dokumentaci na https://{{ mcpo_domain }}/docs (Swagger UI).
# ==============================================================================

server {
    listen 80;
    server_name {{ mcpo_domain | default('mcp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ mcpo_domain | default('mcp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/mcpo.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/mcpo.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ mcpo_port | default(8765) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support pro Grafana MCP endpoint
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
