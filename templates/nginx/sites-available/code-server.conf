# ==============================================================================
# Nginx – code-server (VS Code v browseru) reverse proxy (port {{ code_server_port | default(3009) }})
#
# SSO: Authentik proxy auth (forward_auth). Built-in code-server login je
# vypnuty (PASSWORD="" v compose), takze gating resi vyhradne Authentik.
# WebSocket upgrade je povinny — code-server pouziva WS pro integrovany
# terminal i LSP komunikaci.
# ==============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name {{ code_server_domain | default('code' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ code_server_domain | default('code' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}{{ " " + (service_extra_hosts | default([]) | join(" ")) if (service_extra_hosts | default([]) | length > 0) else "" }};

    ssl_certificate     {{ ssl_cert_path }};
    ssl_certificate_key {{ ssl_cert_key }};

    access_log {{ homebrew_prefix }}/var/log/nginx/code-server.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/code-server.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Velky upload limit — VS Code file drag & drop, git push z terminalu atd.
    client_max_body_size 500m;
    client_body_buffer_size 1m;

{% if install_authentik | default(false) %}
    include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-locations.conf;
{% endif %}

    location / {
        proxy_pass         http://{{ nginx_backend_host | default('127.0.0.1') }}:{{ code_server_port | default(3009) }};
        proxy_http_version 1.1;

        # WebSocket upgrade (terminal + LSP)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Dlouhe timeouts — integrovany terminal / long-running tasks
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering    off;

        # Puter iframe embedding (CSP instead of blanket ALLOWALL)


        proxy_hide_header X-Frame-Options;


        add_header Content-Security-Policy "frame-ancestors 'self' {{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" always;

{% if install_authentik | default(false) %}
        include {{ homebrew_prefix }}/etc/nginx/authentik-proxy-auth.conf;
{% endif %}
    }

}
