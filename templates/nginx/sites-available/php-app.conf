# ==============================================================================
# Nginx – PHP aplikace (Laravel, Symfony, WordPress …)
# Šablona: zkopíruj, přejmenuj a uprav server_name + root
# ==============================================================================

server {
    listen 80;
    server_name myapp.dev.local;

    # Přesměrování na HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name myapp.dev.local;

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    root  {{ ansible_facts['env']['HOME'] }}/projects/myapp/public;
    index index.php index.html;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req zone=general burst=50 nodelay;

    # ── Logy ────────────────────────────────────────────────────────────────
    access_log {{ homebrew_prefix }}/var/log/nginx/myapp.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/myapp.error.log  warn;

    # ── Bezpečnostní hlavičky ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;

    # ── Statické soubory ─────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Skryté soubory ───────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~* /(\.env|composer\.lock|package-lock\.json) {
        deny all;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        # Předat HTTPS příznak PHP
        fastcgi_param HTTPS "on";
    }

    # ── Laravel / Symfony front controller ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
