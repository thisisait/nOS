# ==============================================================================
# Authentik Forward Auth (nginx auth_request)
# Fail-closed: pokud outpost vrátí 403 nebo chybu, request je zamítnut.
# ==============================================================================

auth_request        /outpost.goauthentik.io/auth/nginx;
error_page 401 = @goauthentik_proxy_signin;

# Fail-closed: 403 = Authentik denied access → block.
# 500/502/503 = outpost error/down → block (prefer security over availability).
# PENTEST-002: removed 403+5xx from @authentik_bypass to prevent auth bypass on outpost failure.
error_page 404 = @authentik_bypass;

auth_request_set $auth_cookie $upstream_http_set_cookie;
add_header Set-Cookie $auth_cookie;

# PENTEST-001: Capture ALL X-authentik-* headers from outpost response.
# Headers not captured here would pass through from client → backend unchanged,
# allowing authenticated users to forge identity/entitlements/JWT.
auth_request_set $authentik_username      $upstream_http_x_authentik_username;
auth_request_set $authentik_groups        $upstream_http_x_authentik_groups;
auth_request_set $authentik_email         $upstream_http_x_authentik_email;
auth_request_set $authentik_uid           $upstream_http_x_authentik_uid;
auth_request_set $authentik_name          $upstream_http_x_authentik_name;
auth_request_set $authentik_entitlements  $upstream_http_x_authentik_entitlements;
auth_request_set $authentik_jwt           $upstream_http_x_authentik_jwt;
auth_request_set $authentik_meta_jwks     $upstream_http_x_authentik_meta_jwks;
auth_request_set $authentik_meta_outpost  $upstream_http_x_authentik_meta_outpost;
auth_request_set $authentik_meta_provider $upstream_http_x_authentik_meta_provider;
auth_request_set $authentik_meta_app      $upstream_http_x_authentik_meta_app;

# Forward captured headers to backend (overrides any client-sent forgeries)
proxy_set_header X-authentik-username     $authentik_username;
proxy_set_header X-authentik-groups       $authentik_groups;
proxy_set_header X-authentik-email        $authentik_email;
proxy_set_header X-authentik-uid          $authentik_uid;
proxy_set_header X-authentik-name         $authentik_name;
proxy_set_header X-authentik-entitlements $authentik_entitlements;
proxy_set_header X-authentik-jwt          $authentik_jwt;
proxy_set_header X-authentik-meta-jwks    $authentik_meta_jwks;
proxy_set_header X-authentik-meta-outpost $authentik_meta_outpost;
proxy_set_header X-authentik-meta-provider $authentik_meta_provider;
proxy_set_header X-authentik-meta-app     $authentik_meta_app;
proxy_set_header Remote-User              $authentik_username;
proxy_set_header Remote-Email             $authentik_email;
