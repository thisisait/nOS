---
galaxy_info:
  role_name: glasswing
  namespace: pazny
  author: Pázny
  description: Nette PHP + SQLite security research dashboard (nOS)
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: MacOSX
      versions:
        - all

# No role dependencies — PHP / nginx / composer are installed in main.yml
# before the glasswing role. The handler "Restart php-fpm" is defined play-level
# in main.yml and globally visible to all roles.
dependencies: []

collections:
  - ansible.posix  # ansible.posix.synchronize
