---
# ==============================================================================
# pazny.n8n/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates the data dir, enables the nginx vhost (template already exists in
# {{ homebrew_prefix }}/etc/nginx/sites-available/), renders the compose
# override fragment to {{ stacks_dir }}/iiab/overrides/n8n.yml which
# pak stack-up.yml collects via `find` and passes as an additional -f flag.
#
# Post-start owner setup + admin password reconverge lives in tasks/post.yml
# — called from stack-up.yml az PO compose up.
# ==============================================================================

- name: "[pazny.n8n] Ensure n8n data and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ n8n_data_dir }}"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"

- name: "[pazny.n8n] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/n8n.yml"
    mode: '0600'
  notify: Restart n8n

- name: "[pazny.n8n] Enable n8n nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/n8n.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/n8n.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)
