---
# pazny.n8n — handlers
# Play-level "Restart n8n" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart n8n
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart n8n
  failed_when: false
