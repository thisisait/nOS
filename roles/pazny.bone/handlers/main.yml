---
# pazny.bone — handlers (host launchd, Anatomy A3a 2026-05-03).
#
# "Restart bone" is also defined at the play level in main.yml for cross-role
# notifies (e.g. when something rotates BONE_SECRET). The play-level handler
# takes priority, so this role-local one is the fallback for direct role
# invocations (`ansible-playbook --tags bone` without going through main.yml).
#
# Pre-Anatomy-A3a (Track A, 2026-04-26 → 2026-05-03): handler ran
#   `docker compose -p infra restart bone`
# Now: launchctl kickstart graceful-reload via -k flag.

- name: Restart bone
  ansible.builtin.shell: |
    launchctl kickstart -k "gui/$(id -u)/{{ bone_launchd_label | default('eu.thisisait.nos.bone') }}" 2>/dev/null || true
  changed_when: true
