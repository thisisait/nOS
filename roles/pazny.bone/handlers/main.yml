---
# pazny.bone — handlers.
# "Restart bone" is also defined at the play level in main.yml for
# cross-role notifies. The play-level handler takes priority, so this
# role-local one is effectively unreachable — kept for role independence.

- name: Restart bone
  ansible.builtin.command: >
    launchctl kickstart -k "gui/{{ ansible_facts['user_uid'] }}/eu.thisisait.nos.bone"
  failed_when: false
