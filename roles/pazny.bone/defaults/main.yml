---
# ==============================================================================
# pazny.bone — local FastAPI (structure / state / dispatcher organ).
# Formerly BoxAPI. See docs/anatomy.md for the organ metaphor.
#
# The secret (bone_secret) stays in top-level default.config.yml so prefix
# rotation via global_password_prefix works consistently.
# App sources files/bone/ and the template bone-launchd.plist.j2 stay in
# the playbook repo.
# ==============================================================================

bone_port: 8099
bone_domain: "api.{{ instance_tld | default('dev.local') }}"
