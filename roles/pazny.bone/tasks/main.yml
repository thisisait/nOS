---
# ==============================================================================
# BONE — local FastAPI (structure / state / dispatcher organ of nOS).
# Formerly BoxAPI. Provides the REST API every other organ talks to when it
# needs on-disk truth or an ansible-playbook subprocess.
# ==============================================================================

- name: "[Bone] Create application + log directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_facts['env']['HOME'] }}/bone"
    - "{{ ansible_facts['env']['HOME'] }}/bone/log"

- name: "[Bone] Copy application files"
  ansible.builtin.copy:
    src: "bone/{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/bone/{{ item }}"
    mode: '0644'
  loop:
    - main.py
    - requirements.txt
    # State & Migration Framework helpers
    - state.py
    - migrations.py
    - upgrades.py
    - coexistence.py
    - events.py
    - patches.py

- name: "[Bone] Create Python venv"
  ansible.builtin.command:
    cmd: python3 -m venv venv
    chdir: "{{ ansible_facts['env']['HOME'] }}/bone"
    creates: "{{ ansible_facts['env']['HOME'] }}/bone/venv/bin/python"

- name: "[Bone] Install Python dependencies"
  ansible.builtin.command:
    cmd: "{{ ansible_facts['env']['HOME'] }}/bone/venv/bin/pip install --no-cache-dir -r requirements.txt"
    chdir: "{{ ansible_facts['env']['HOME'] }}/bone"
  register: _bone_pip
  changed_when: "'Successfully installed' in _bone_pip.stdout"

- name: "[Bone] Deploy launchd plist"
  ansible.builtin.template:
    src: bone-launchd.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/eu.thisisait.nos.bone.plist"
    mode: '0644'
  notify: Restart bone

- name: "[Bone] Load launchd service"
  ansible.builtin.command: >
    launchctl load -w {{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/eu.thisisait.nos.bone.plist
  register: _bone_load
  changed_when: "'Bootstrap failed: 5' not in (_bone_load.stderr | default(''))"
  failed_when: >
    _bone_load.rc != 0 and
    'Bootstrap failed: 5' not in (_bone_load.stderr | default('')) and
    'service already loaded' not in (_bone_load.stderr | default(''))

- name: "[Bone] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/bone.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/bone.conf"
    state: link
    force: true
  when: install_nginx | default(true)
  notify: Restart nginx

- name: "[Bone] Print setup summary"
  ansible.builtin.debug:
    msg: |
      ======================================================
       Bone — local FastAPI (formerly BoxAPI) -- ready
      ======================================================
       URL:     https://{{ bone_domain | default('api.dev.local') }}
       Port:    {{ bone_port | default(8099) }}
       Health:  https://{{ bone_domain | default('api.dev.local') }}/api/health
       Status:  https://{{ bone_domain | default('api.dev.local') }}/api/status
      ======================================================
