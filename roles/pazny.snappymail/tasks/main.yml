---
# ==============================================================================
# pazny.snappymail/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`:
# creates the data directory, renders the compose override fragment to
# {{ stacks_dir }}/iiab/overrides/snappymail.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# SnappyMail needs NO post-start setup — admin configures IMAP/SMTP defaults
# via the admin panel at /?admin. Authentik forward-auth gates access at the
# Traefik layer.
# ==============================================================================

- name: "[pazny.snappymail] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ snappymail_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.snappymail] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/snappymail.yml"
    mode: '0600'
  notify: Restart snappymail