---
# pazny.boxapi — handlers
# Restart boxapi is also defined play-level in main.yml for backward
# kompatibilitu s notify: z tasku mimo tuto roli. Play-level handler
# takes priority, so this role-local one is effectively unreachable,
# but the definition stays for role independence.

- name: Restart boxapi
  ansible.builtin.command: >
    launchctl kickstart -k "gui/{{ ansible_facts['user_uid'] }}/eu.thisisait.nos.api"
  failed_when: false
