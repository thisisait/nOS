---
# ==============================================================================
# pazny.boxapi — Box Management API (FastAPI + uvicorn via launchd)
#
# The secret (boxapi_secret) stays in top-level default.credentials.yml so
# prefix rotation via global_password_prefix works consistently.
# App sources files/boxapi/ and the template boxapi-launchd.plist.j2 stay
# v playbook repo.
# ==============================================================================

boxapi_port: 8099
boxapi_domain: "api.{{ instance_tld | default('dev.local') }}"
