---
# ==============================================================================
# pazny.superset — Apache Superset v Docker (data compose stack)
#
# Credentials (superset_db_password, superset_admin_password, superset_secret_key)
# zustavaji v top-level default.config.yml / default.credentials.yml — stale
# centralizovane, role je jen cte pres Ansible var precedence.
# ==============================================================================

superset_version: "6.0.0"                # CVE-2026-23982 (auth bypass), CVE-2025-48912 (RLS SQLi)
superset_port: 8089
superset_data_dir: "{{ ansible_facts['env']['HOME'] }}/superset"
superset_db_name: "superset"
superset_db_user: "superset"
superset_mem_limit: "{{ docker_mem_limit_standard | default('1g') }}"
superset_cpus: "{{ docker_cpus_standard | default('1.0') }}"
