---
# ==============================================================================
# pazny.superset/tasks/post.yml
# SUPERSET — post-start: DB schema init and admin user
# Runs AFTER data stack startup (stack-up.yml).
# ==============================================================================

# Pre-check removed (2026-05-08): the previous version polled
# `docker compose exec -T superset python -c "socket.connect(('postgresql', 5432))"`
# 30× × 2s. It was meant to gate on Postgres readiness, but Postgres is
# verified healthy in tasks/stacks/core-up.yml long before this task can
# run; on cold blank the probe instead measured `docker exec` readiness
# of Superset itself (gunicorn + SQLAlchemy bootstrap) and fired 60s of
# noisy [ERROR] entries until exec attach started working — a false
# negative that obscured real failures. The downstream `superset db
# upgrade` already has its own retry (4 × 15s = 60s) and tolerates the
# same exec-attach delay correctly, so the probe was both redundant and
# misdiagnosing.

- name: "[pazny.superset Post] Run Superset db upgrade"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset db upgrade
  register: _superset_db
  retries: 4
  delay: 15
  until: _superset_db.rc == 0
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[pazny.superset Post] Initialize roles and permissions"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset init
  register: _superset_init
  changed_when: _superset_init.rc == 0
  failed_when: false
  when:
    - _superset_db.rc | default(1) == 0
    - not ansible_check_mode

- name: "[pazny.superset Post] Create admin user"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset fab create-admin
    --username admin
    --firstname Admin
    --lastname User
    --email "{{ superset_admin_email | default(default_admin_email) }}"
    --password {{ superset_admin_password | default(global_password_prefix + '_pw_superset') }}
  register: _superset_admin
  changed_when: "'was created' in (_superset_admin.stdout | default(''))"
  failed_when: false
  no_log: true
  when:
    - _superset_db.rc | default(1) == 0
    - not ansible_check_mode
