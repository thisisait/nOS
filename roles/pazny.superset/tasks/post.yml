---
# ==============================================================================
# pazny.superset/tasks/post.yml
# SUPERSET — post-start: DB schema init and admin user
# Runs AFTER data stack startup (stack-up.yml).
# ==============================================================================

# Pre-check: TCP-connect from inside the Superset container to Postgres.
# Cheap (a couple of system calls), so we can poll fast — saves the
# ~25s python+gunicorn boot every time `superset db upgrade` retries
# against an unreachable DB. This loop only fires while Postgres is
# still settling; once it answers, the rest is a one-shot.
- name: "[pazny.superset Post] Wait for Postgres reachable from Superset"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data exec -T superset
    python -c "import socket; s=socket.socket(); s.settimeout(2);
               s.connect(('postgresql', 5432)); s.close()"
  register: _superset_pg_probe
  retries: 30
  delay: 2
  until: _superset_pg_probe.rc == 0
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[pazny.superset Post] Run Superset db upgrade"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset db upgrade
  register: _superset_db
  retries: 4
  delay: 15
  until: _superset_db.rc == 0
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: "[pazny.superset Post] Initialize roles and permissions"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset init
  register: _superset_init
  changed_when: _superset_init.rc == 0
  failed_when: false
  when:
    - _superset_db.rc | default(1) == 0
    - not ansible_check_mode

- name: "[pazny.superset Post] Create admin user"
  ansible.builtin.command: >
    {{ docker_bin }} compose -p data
    exec -T superset superset fab create-admin
    --username admin
    --firstname Admin
    --lastname User
    --email "{{ superset_admin_email | default(default_admin_email) }}"
    --password {{ superset_admin_password | default(global_password_prefix + '_pw_superset') }}
  register: _superset_admin
  changed_when: "'was created' in (_superset_admin.stdout | default(''))"
  failed_when: false
  no_log: true
  when:
    - _superset_db.rc | default(1) == 0
    - not ansible_check_mode
