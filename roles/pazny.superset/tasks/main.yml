---
# ==============================================================================
# pazny.superset/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up data`:
# creates the data dir and renders the compose override fragment to
# {{ stacks_dir }}/data/overrides/superset.yml.
#
# Post-start setup (superset db upgrade + init + admin) je v tasks/post.yml
# — called from stack-up.yml az PO `docker compose up data --wait`.
# ==============================================================================

- name: "[pazny.superset] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ superset_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.superset] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/data/overrides/superset.yml"
    mode: '0600'
  notify: Restart superset
