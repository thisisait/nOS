---
# pazny.onlyoffice — handlers
# Fallback handler pro samostatne pouziti role; coordinator Phase B
# muze definovat play-level variantu (nebo tuto pouzit primo).

- name: Restart onlyoffice
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/b2b/docker-compose.yml" -p b2b
    restart onlyoffice
  failed_when: false
