---
# pazny.onlyoffice — handlers
# Fallback handler for standalone role use; Phase B coordinator
# can define a play-level variant (or use this one directly).

- name: Restart onlyoffice
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/b2b/docker-compose.yml" -p b2b
    restart onlyoffice
  failed_when: false
