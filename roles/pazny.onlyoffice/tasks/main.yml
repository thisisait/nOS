---
# ==============================================================================
# pazny.onlyoffice/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up b2b`:
#  - creates 4 data dirs (data, logs, lib, embedded postgres db)
#  - renders the compose override fragment do
#    {{ stacks_dir }}/b2b/overrides/onlyoffice.yml, which stack-up.yml collects
#    via `find` and passes as an additional -f flag.
#
# ONLYOFFICE CE uses an EMBEDDED postgres (inside the container) — it does not require
# external DB. Redis is optionally shared with the infra stack over the network.
# ==============================================================================

- name: "[pazny.onlyoffice] Ensure data directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ onlyoffice_data_dir }}"
    - "{{ onlyoffice_logs_dir }}"
    - "{{ onlyoffice_lib_dir }}"
    - "{{ onlyoffice_db_dir }}"

- name: "[pazny.onlyoffice] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/onlyoffice.yml"
    mode: '0600'
  notify: Restart onlyoffice

- name: "[pazny.onlyoffice] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       ONLYOFFICE Document Server (spousti se pres B2B stack)
      ══════════════════════════════════════════════════════
       URL:         https://{{ onlyoffice_domain }}
       Healthcheck: https://{{ onlyoffice_domain }}/healthcheck
       API:         https://{{ onlyoffice_domain }}/ConvertService.ashx
       Data:        {{ onlyoffice_data_dir }}

       Integrace s hostitelskymi aplikacemi (Nextcloud, Outline, BookStack):
         Document Server URL: https://{{ onlyoffice_domain }}/
         JWT secret:          <viz credentials.yml → onlyoffice_jwt_secret>
      ══════════════════════════════════════════════════════
