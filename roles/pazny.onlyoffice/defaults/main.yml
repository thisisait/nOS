---
# ==============================================================================
# pazny.onlyoffice — ONLYOFFICE Document Server (b2b compose stack)
#
# Dokumentovy editor backend (iframe embed v Nextcloud, Outline, BookStack, ...).
# End-users do not log in here directly — integration runs via JWT token
# shared with the host application. The nginx vhost protects only the UI part
# (/welcome, admin); API endpointy (/healthcheck, /ConvertService.ashx, ...)
# are accessible WITHOUT Authentik auth, secured by JWT signing.
#
# Credentials (onlyoffice_jwt_secret) stay in default.credentials.yml
# and are auto-generated on blank=true (see main.yml). Share this secret
# with every host application that will embed the editor.
# ==============================================================================

onlyoffice_version: "9.3.1.2"                      # CE stable (Apr 2026)
onlyoffice_domain: "office{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
onlyoffice_port: 3015                              # host -> container :80
onlyoffice_data_dir: "{{ ansible_facts['env']['HOME'] }}/onlyoffice/data"
onlyoffice_logs_dir: "{{ ansible_facts['env']['HOME'] }}/onlyoffice/logs"
onlyoffice_lib_dir: "{{ ansible_facts['env']['HOME'] }}/onlyoffice/lib"
onlyoffice_db_dir: "{{ ansible_facts['env']['HOME'] }}/onlyoffice/db"
onlyoffice_mem_limit: "{{ docker_mem_limit_critical | default('2g') }}"
onlyoffice_cpus: "{{ docker_cpus_standard | default('1.0') }}"

# JWT configuration (share the same secret with the host application)
onlyoffice_jwt_enabled: true
onlyoffice_jwt_header: "Authorization"
onlyoffice_jwt_in_body: true

# Font generation on first run (needed for PDF/DOCX conversion)
onlyoffice_generate_fonts: true
