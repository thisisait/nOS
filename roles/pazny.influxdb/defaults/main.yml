---
# ==============================================================================
# pazny.influxdb — InfluxDB 2.x time-series database (observability stack)
#
# InfluxDB OSS 2.x has no native OIDC — UI access is gated via Authentik
# forward_auth in the nginx vhost (proxy auth). API clients use native
# InfluxDB token (auto-generated at first-run setup).
#
# Credentials (influxdb_admin_password, influxdb_admin_token) stay
# v default.credentials.yml resp. main.yml auto-gen bloku.
# ==============================================================================

# InfluxDB 2.7 is the stable OSS release (3.x is alpha, do not use).
influxdb_version: "2.7.12"
influxdb_domain: "influx{{ _host_alias_seg }}.{{ tenant_domain | default('dev.local') }}"
influxdb_port: 8086
influxdb_data_dir: "{{ ansible_facts['env']['HOME'] }}/influxdb/data"
influxdb_config_dir: "{{ ansible_facts['env']['HOME'] }}/influxdb/config"

# First-run auto-setup parametry (DOCKER_INFLUXDB_INIT_*).
influxdb_init_mode: "setup"
influxdb_init_username: "admin"
influxdb_init_org: "nos"
influxdb_init_bucket: "default"
influxdb_init_retention: "90d"

influxdb_mem_limit: "{{ docker_mem_limit_standard | default('1g') }}"
influxdb_cpus: "{{ docker_cpus_standard | default('1.0') }}"

# For `blank=true` it is wiped in the reset phase (tasks/reset/):
influxdb_external_data_dir_override: ""
