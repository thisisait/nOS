---
# ==============================================================================
# pazny.influxdb/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose -p observability up`:
# creates data + config dirs, renders the compose override fragment to
# {{ stacks_dir }}/observability/overrides/influxdb.yml, which then core-up.yml
# collects via `find` and passes as an additional -f flag.
# ==============================================================================

- name: "[pazny.influxdb] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ influxdb_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.influxdb] Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ influxdb_config_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.influxdb] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/influxdb.yml"
    mode: '0600'
  notify: Restart influxdb
