---
# pazny.influxdb — handlers
# Play-level "Restart influxdb" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart influxdb
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart influxdb
  failed_when: false
