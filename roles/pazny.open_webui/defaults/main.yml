---
# ==============================================================================
# pazny.open_webui — Open WebUI (chat UI for Ollama)
#
# Connects to the Ollama daemon running on the host (host.docker.internal:11434).
# Credentials (openwebui_secret_key, openwebui_admin_password) staysji v
# default.config.yml + default.credentials.yml and are prefix-rotated.
#
# Note: the role name uses an underscore (`open_webui`), the compose service name
# uses a hyphen (`open-webui`) — matches the existing convention.
# ==============================================================================

openwebui_version: "0.8.12"                         # Native MCP + function calling + code exec (0.8.x)
openwebui_port: 3004                                # Container 8080 → host 3004
openwebui_domain: "ai{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
openwebui_data_dir: "{{ ansible_facts['env']['HOME'] }}/openwebui"
openwebui_enable_signup: true                       # false = admin manually adds users
openwebui_admin_name: "Admin"
openwebui_admin_email: "{{ default_admin_email }}"
openwebui_mem_limit: "{{ docker_mem_limit_critical | default('4g') }}"
openwebui_cpus: "{{ docker_cpus_standard | default('1.0') }}"
