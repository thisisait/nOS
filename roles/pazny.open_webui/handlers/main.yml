---
# pazny.open_webui — handlers
# Play-level "Restart openwebui" in main.yml takes priority for now; this handler
# stays for standalone use of the role outside the nOS playbook.
#
# Note: the compose service name is `open-webui` (hyphen), but the existing
# play-level handler uses `openwebui` without a hyphen — kept for
# binarni kompatibilitu s notify: Restart openwebui volanim mimo roli.

- name: Restart openwebui
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart open-webui
  failed_when: false
