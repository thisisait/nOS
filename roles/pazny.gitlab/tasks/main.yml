---
# ==============================================================================
# pazny.gitlab/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p devops up`:
# creates data/config/log dirs, renders the gitlab.rb Omnibus config,
# enables the nginx vhost and saves the compose override fragment to
# {{ stacks_dir }}/devops/overrides/gitlab.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start admin password reconverge lives in tasks/post.yml — called AFTER
# `docker compose up devops --wait`. GitLab startuje 2-5 min, post-start
# has a 60x10s retry loop for readiness.
# ==============================================================================

# ── Adresarova struktura ─────────────────────────────────────────────────────

- name: "[pazny.gitlab] Ensure data directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ gitlab_data_dir }}"
    - "{{ gitlab_config_dir }}"
    - "{{ ansible_facts['env']['HOME'] }}/gitlab-logs"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"

# ── Konfigurace (gitlab.rb) ──────────────────────────────────────────────────

- name: "[pazny.gitlab] Deploy gitlab.rb configuration"
  ansible.builtin.copy:
    dest: "{{ gitlab_config_dir }}/gitlab.rb"
    mode: '0600'
    backup: true
    content: |
      # ===========================================================================
      # GitLab Omnibus configuration — generated by Ansible
      # Edit via config.yml variables, not directly here.
      # ===========================================================================

      external_url 'https://{{ gitlab_domain | default("gitlab" ~ (_host_alias_seg | default("")) ~ "." ~ (tenant_domain | default("dev.local"))) }}'

      # ── Interni nginx (reverzni proxy prebira SSL) ────────────────────────────
      nginx['listen_port']  = 80
      nginx['listen_https'] = false

      # -- SSH for Git operations ───────────────────────────────────────────────────
      gitlab_rails['gitlab_shell_ssh_port'] = {{ gitlab_ssh_port | default(2224) }}

      # ── Databaze (Omnibus PostgreSQL) ─────────────────────────────────────────
      postgresql['shared_buffers'] = "256MB"
      postgresql['max_connections'] = 100

      # ── E-mail ────────────────────────────────────────────────────────────────
      gitlab_rails['smtp_enable'] = false
      gitlab_rails['gitlab_email_enabled'] = false

      # -- Performance (tuned for Mac Studio) ───────────────────────────────────
      puma['worker_processes'] = {{ gitlab_puma_workers | default(2) }}
      sidekiq['concurrency'] = {{ gitlab_sidekiq_concurrency | default(10) }}

      # ── Prometheus monitoring (we use our own stack) ───────────────────────
      prometheus['enable'] = false
      alertmanager['enable'] = false
      node_exporter['enable'] = false
      redis_exporter['enable'] = false
      postgres_exporter['enable'] = false
      gitlab_exporter['enable'] = false

      # ── Logging ────────────────────────────────────────────────────────────────
      logging['svlogd_size'] = 200 * 1024 * 1024
      logging['logrotate_frequency'] = "weekly"
      logging['logrotate_rotate'] = 4

      # ── Casove pasmo ─────────────────────────────────────────────────────────
      gitlab_rails['time_zone'] = '{{ gitlab_timezone | default("Europe/Prague") }}'

      # ── Registrace ────────────────────────────────────────────────────────────
      gitlab_rails['gitlab_signup_enabled'] = {{ gitlab_signup_enabled | default(false) | string | lower }}

- name: "[pazny.gitlab] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/gitlab.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/gitlab.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.gitlab] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/devops/overrides/gitlab.yml"
    mode: '0600'
  notify: Restart gitlab

- name: "[pazny.gitlab] Display post-install note"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════════╗
      ||  GITLAB - FIRST RUN                                                  ||
      ║                                                                      ║
      ||  GitLab takes 2-5 minutes to start. Watch:                           ||
      ║    docker logs -f gitlab                                             ║
      ║                                                                      ║
      ║  Admin URL: https://{{ gitlab_domain | default("gitlab" ~ (_host_alias_seg | default("")) ~ "." ~ (tenant_domain | default("dev.local"))) }}║
      ║  SSH klon: git clone ssh://git@localhost:{{ gitlab_ssh_port | default(2224) }}/group/repo.git
      ==========================================================================
