---
# ==============================================================================
# pazny.vaultwarden/tasks/main.yml
#
# Called (in Phase B) from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/iiab/overrides/vaultwarden.yml.
#
# Vaultwarden has no post-start setup — only the nginx vhost (shared role-less logic)
# a debug banner s admin tokenem.
# ==============================================================================

- name: "[pazny.vaultwarden] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ vaultwarden_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.vaultwarden] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/vaultwarden.yml"
    mode: '0600'
  notify: Restart vaultwarden

- name: "[pazny.vaultwarden] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Vaultwarden ready (starts via the IIAB stack)
      ══════════════════════════════════════════════════════
       URL:     https://{{ vaultwarden_domain }}
       Admin:   https://{{ vaultwarden_domain }}/admin
       Token:   {{ vaultwarden_admin_token }}
       Data:    {{ vaultwarden_data_dir }}
      ══════════════════════════════════════════════════════
