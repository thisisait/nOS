---
# pazny.homeassistant — handlers
# Play-level "Restart homeassistant" in main.yml takes priority; this one stays
# for standalone use of the role outside the nOS playbook.

- name: Restart homeassistant
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart homeassistant
  failed_when: false
