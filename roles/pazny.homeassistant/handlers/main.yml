---
# pazny.homeassistant — handlers
# Play-level "Restart homeassistant" v main.yml ma prednost; tento zustava
# pro samostatne pouziti role mimo devBoxNOS playbook.

- name: Restart homeassistant
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart homeassistant
  failed_when: false
