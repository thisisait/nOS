---
# pazny.kiwix — handlers
# Kiwix has no play-level handler in main.yml (before Wave 2.2). This role-local one
# handler is notified from tasks/main.yml on change of the compose override template.

- name: Restart kiwix
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart kiwix
  failed_when: false
