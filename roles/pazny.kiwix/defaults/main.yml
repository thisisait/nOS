---
# ==============================================================================
# pazny.kiwix — Kiwix offline knowledge server (iiab compose stack)
#
# Kiwix serves offline Wikipedia, Gutenberg and other ZIM files. More ZIM
# more files can be downloaded via the {{ kiwix_data_dir }}/download-zim.sh helper.
#
# Centralized variables (kiwix_domain, kiwix_port, kiwix_data_dir,
# kiwix_init_zim_url, kiwix_zim_files) staysji v top-level
# default.config.yml due to external consumers (nginx vhost render,
# blank-reset path resolver). Role defaults poskytuji fallback.
# ==============================================================================

kiwix_version: "latest"
kiwix_port: 8888
kiwix_domain: "kiwix{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
kiwix_data_dir: "{{ ansible_facts['env']['HOME'] }}/kiwix"

# Default to a tiny (~10 MB) demo ZIM so blank reaches a working Kiwix UI
# without manual onboarding. Override or set to "" in config.yml to opt out.
kiwix_init_zim_url: "https://download.kiwix.org/zim/other/alpinelinux_en_all_maxi_2026-04.zim"
kiwix_init_zim_dest: "alpinelinux.zim"

kiwix_zim_files: []

kiwix_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
kiwix_cpus: "{{ docker_cpus_light | default('0.5') }}"
