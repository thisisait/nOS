---
# ==============================================================================
# pazny.rustfs/tasks/main.yml
#
# Called (in Phase B) from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/iiab/overrides/rustfs.yml, which stack-up.yml then collects
# via `find` and passes as an additional -f flag.
#
# RustFS has no post-start setup — single container, local access.
# ==============================================================================

- name: "[pazny.rustfs] Ensure data and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ rustfs_data_dir }}"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"

- name: "[pazny.rustfs] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/rustfs.yml"
    mode: '0600'
  notify: Restart rustfs

- name: "[pazny.rustfs] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       RustFS ready (starts via the IIAB stack)
      ══════════════════════════════════════════════════════
       S3 API:    http://localhost:{{ rustfs_api_port }}
       Konzole:   http://localhost:{{ rustfs_console_port }}
       Data:      {{ rustfs_data_dir }}

       S3 endpoint pro klienty (aws-cli, rclone, restic…):
         endpoint-url: http://localhost:{{ rustfs_api_port }}
         access-key:   {{ rustfs_access_key }}
      ══════════════════════════════════════════════════════
