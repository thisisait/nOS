---
# pazny.rustfs — handlers
# Fallback handler pro samostatne pouziti role; coordinator Phase B
# muze definovat play-level variantu (nebo tuto pouzit primo).

- name: Restart rustfs
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart rustfs
  failed_when: false
