---
# pazny.rustfs — handlers
# Fallback handler for standalone role use; Phase B coordinator
# can define a play-level variant (or use this one directly).

- name: Restart rustfs
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart rustfs
  failed_when: false
