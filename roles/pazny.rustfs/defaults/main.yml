---
# ==============================================================================
# pazny.rustfs — RustFS (S3-compatible object storage, Rust drop-in MinIO)
#
# S3 API:  http://localhost:{{ rustfs_api_port }}
# Console: http://localhost:{{ rustfs_console_port }}
#
# Credentials (rustfs_access_key / rustfs_secret_key) live in
# default.config.yml and are prefix-rotated via global_password_prefix.
# ==============================================================================

rustfs_version: "1.0.0-alpha.93"                    # CVE-2025-68926 pin + alpha.91 multipart auth hardening (#2411) + OIDC claim matching fix (#2386)
rustfs_api_port: 9010                               # S3 API
rustfs_console_port: 9001                           # Web console
rustfs_domain: "fs{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
rustfs_data_dir: "{{ ansible_facts['env']['HOME'] }}/rustfs/data"
rustfs_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
rustfs_cpus: "{{ docker_cpus_light | default('0.5') }}"
