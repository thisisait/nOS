---
# ==============================================================================
# pazny.hermes/tasks/main.yml
#
# Instaluje Hermes Agent framework jako pip venv + launchd daemon.
# Called via import_role in main.yml after openclaw.
# ==============================================================================

# -- 1. Directories ---------------------------------------------------------

- name: "[Hermes] Create directory structure"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ hermes_home }}"
    - "{{ hermes_home }}/workspace"
    - "{{ hermes_config_dir }}"
    - "{{ hermes_config_dir }}/skills"
    - "{{ hermes_log_dir }}"

# ── 2. uv package manager + Python 3.11+ ─────────────────────────────────────
# Hermes Agent is NOT on PyPI — installed via git clone + `uv pip install -e .`
# (per official install.sh script). uv je rychlejsi nez pip, Python 3.11+ je
# required.

- name: "[Hermes] Ensure uv package manager via Homebrew"
  community.general.homebrew:
    name: uv
    state: present
  failed_when: false

- name: "[Hermes] Ensure Python 3.11+ via Homebrew"
  community.general.homebrew:
    name: "python@3.13"
    state: present
  failed_when: false

# ── 3. Git clone hermes-agent ─────────────────────────────────────────────────

- name: "[Hermes] Clone hermes-agent repository"
  ansible.builtin.git:
    repo: "{{ hermes_repo_url }}"
    dest: "{{ hermes_home }}/src"
    version: "{{ hermes_version_tag }}"
    force: false
    depth: 1
  register: _hermes_clone
  failed_when:
    - _hermes_clone.rc is defined
    - _hermes_clone.rc | default(0) != 0
    - "'Already up to date' not in (_hermes_clone.msg | default(''))"

# ── 4. Create venv + install via uv ──────────────────────────────────────────

- name: "[Hermes] Create uv venv with Python 3.11+"
  ansible.builtin.command: >
    {{ homebrew_prefix }}/bin/uv venv {{ hermes_venv }} --python 3.13
  args:
    creates: "{{ hermes_venv }}/bin/python"
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts['env']['PATH'] | default('', true) }}"

- name: "[Hermes] Install hermes-agent via uv pip install -e ."
  ansible.builtin.shell: |
    source {{ hermes_venv }}/bin/activate
    {{ homebrew_prefix }}/bin/uv pip install -e '.[{{ hermes_extras }}]'
  args:
    chdir: "{{ hermes_home }}/src"
    executable: /bin/bash
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts['env']['PATH'] | default('', true) }}"
    VIRTUAL_ENV: "{{ hermes_venv }}"
  register: _hermes_install
  changed_when: "'Installed' in (_hermes_install.stdout | default('')) or 'Successfully' in (_hermes_install.stdout | default(''))"
  failed_when:
    - _hermes_install.rc != 0
    - "'Requirement already satisfied' not in (_hermes_install.stdout | default(''))"

# ── 5. Config render (.env + cli-config.yaml) ───────────────────────────────
# Hermes hleda tyto soubory v ~/.hermes/:
#   .env            — env vars loaded at startup (API keys, provider, web port)
#   cli-config.yaml — main config (model, terminal, delegation, mcp_servers)

- name: "[Hermes] Render .env file"
  ansible.builtin.template:
    src: hermes.env.j2
    dest: "{{ hermes_config_dir }}/.env"
    mode: '0600'
  notify: Restart hermes

# Hermes looks up ~/.hermes/config.yaml (NOT cli-config.yaml — that one is only in the repo
# jako .example). `hermes config path` vraci presne ~/.hermes/config.yaml.
- name: "[Hermes] Render config.yaml"
  ansible.builtin.template:
    src: cli-config.yaml.j2
    dest: "{{ hermes_config_dir }}/config.yaml"
    mode: '0600'
  notify: Restart hermes

# ── 5.5. Persona + memory seed + custom skills ─────────────────────────────
# SOUL.md is the main persona ("Inspektor Klepitko" + nOS stack awareness).
# MEMORY.md is the persistent memory seed with the current enabled_* service state.
# SKILL.md under skills/nos/ provides DevOps action patterns.

- name: "[Hermes] Deploy SOUL.md persona (Inspektor Klepitko)"
  ansible.builtin.template:
    src: SOUL.md.j2
    dest: "{{ hermes_config_dir }}/SOUL.md"
    mode: '0644'
  notify: Restart hermes

- name: "[Hermes] Ensure memories dir exists"
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}/memories"
    state: directory
    mode: '0755'

- name: "[Hermes] Deploy MEMORY.md seed (current stack state)"
  ansible.builtin.template:
    src: MEMORY.md.j2
    dest: "{{ hermes_config_dir }}/memories/MEMORY.md"
    mode: '0644'
    force: "{{ hermes_force_memory_reset | default(false) }}"   # 2nd+ run preserves user memories

- name: "[Hermes] Ensure custom skills dir exists"
  ansible.builtin.file:
    path: "{{ hermes_config_dir }}/skills/nos"
    state: directory
    mode: '0755'

- name: "[Hermes] Deploy nOS custom skill"
  ansible.builtin.template:
    src: skills/nos/SKILL.md.j2
    dest: "{{ hermes_config_dir }}/skills/nos/SKILL.md"
    mode: '0644'

# ── Symlinks do Homebrew PATH ───────────────────────────────────────────────
# Venv bin is under ~/agents/hermes/.venv/bin — not in the global PATH.
# A symlink into /opt/homebrew/bin makes it available from every shell without export PATH.

- name: "[Hermes] Symlink hermes binary into Homebrew bin (global PATH)"
  ansible.builtin.file:
    src: "{{ hermes_venv }}/bin/{{ item }}"
    dest: "{{ homebrew_prefix }}/bin/{{ item }}"
    state: link
    force: true
  loop:
    - hermes
    - hermes-agent
    - hermes-acp
  failed_when: false

# -- 4. Model pull (Hermes 3 8B from the official Ollama library) ──────────────────

- name: "[Hermes] Pull Hermes 3 8B model via Ollama"
  ansible.builtin.command: ollama pull {{ hermes_primary_model }}
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts['env']['PATH'] | default('', true) }}"
    OLLAMA_MODELS: "{{ ollama_models_dir | default(ansible_facts['env']['HOME'] + '/.ollama/models') }}"
    OLLAMA_HOST: "http://127.0.0.1:11434"
  changed_when: false
  failed_when: false
  timeout: 1800

# ── 6. Doctor check (verify install) ─────────────────────────────────────────
# Hermes has no persistent daemon mode (just `gateway install` for messaging +
# `mcp serve` for MCP expose). We leave the daemon to the user — the playbook
# installs + configures it; the user starts it on demand:
#   hermes chat                  — interactive mode
#   hermes gateway install       — launchd plist for Telegram/Discord
#   hermes mcp serve             — expose Hermes conversations jako MCP server

- name: "[Hermes] Run hermes doctor to verify install"
  ansible.builtin.command: "{{ hermes_venv }}/bin/hermes doctor"
  register: _hermes_doctor
  changed_when: false
  failed_when: false
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"

- name: "[Hermes] Doctor output"
  ansible.builtin.debug:
    msg: "{{ _hermes_doctor.stdout_lines | default([]) | select('match', '.*(Python|Required|Configuration|Auth).*') | list }}"
  when: _hermes_doctor.stdout is defined

- name: "[Hermes] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════════
       Hermes Agent nainstalovan
      ══════════════════════════════════════════════════════════════════
       Version tag: {{ hermes_version_tag }}
       Venv:        {{ hermes_venv }}
       Source:      {{ hermes_home }}/src
       Config:      {{ hermes_config_dir }}/cli-config.yaml (+ .env)
       Skills:      {{ hermes_config_dir }}/skills

       Models:
         Primary:   {{ hermes_primary_model_shortname }}
                    (via Ollama, zdroj: {{ hermes_primary_model }})
         Heavy:     {{ hermes_heavy_model }} (delegation.model)
      {% if hermes_anthropic_api_key | length > 0 %}
         API:       Anthropic Claude (ANTHROPIC_API_KEY v .env)
      {% endif %}
      {% if hermes_claude_code_enabled | default(true) %}
         CLI:       Claude Code (hermes claw pro integration)
      {% endif %}

       MCP servery v configu: {{ hermes_mcp_servers | length }} (filesystem, git, fetch, memory, time)

       Prvni pouziti:
         {{ hermes_venv }}/bin/hermes                      # interactive TUI
         {{ hermes_venv }}/bin/hermes chat                 # chat mode
         {{ hermes_venv }}/bin/hermes claw                 # OpenClaw integration
         {{ hermes_venv }}/bin/hermes gateway install      # launchd pro messaging
         {{ hermes_venv }}/bin/hermes mcp serve            # Hermes jako MCP server

       Shell alias (muzes pridat do ~/.zshrc):
         alias hermes="{{ hermes_venv }}/bin/hermes"
      ══════════════════════════════════════════════════════════════════
