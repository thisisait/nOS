#   - hermes gateway restart  (messaging)
#   - launchctl kickstart com.hermes.gateway  (po `gateway install`)
# This handler is a stub — config re-renders propagate on the next CLI invocation.
- name: Restart hermes
  ansible.builtin.debug:
    msg: "Hermes config updated. Restart relevant mode manually: `hermes gateway restart` or `hermes mcp serve` etc."
