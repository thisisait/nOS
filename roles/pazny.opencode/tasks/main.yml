---
# ==============================================================================
# pazny.opencode/tasks/main.yml
#
# Installs OpenCode + configures the local Ollama provider.
# Called from main.yml via `import_role` (not Docker).
# ==============================================================================

# OpenCode install priority:
#   1. Brew formula (preferred, brew-managed upgrades)
#   2. Curl installer fallback (when brew does not have it)

- name: "[OpenCode] Check for existing brew install"
  ansible.builtin.stat:
    path: "{{ homebrew_prefix }}/bin/opencode"
  register: _opencode_brew

- name: "[OpenCode] Install via Homebrew (if not already present)"
  community.general.homebrew:
    name: opencode
    state: present
  when: not _opencode_brew.stat.exists
  register: _opencode_brew_install
  failed_when: false

- name: "[OpenCode] Re-check binary after brew install"
  ansible.builtin.stat:
    path: "{{ homebrew_prefix }}/bin/opencode"
  register: _opencode_final_check

- name: "[OpenCode] Fallback to curl installer (if brew failed)"  # noqa: command-instead-of-module
  # Upstream provides a `curl ... | bash` install pipeline; the get_url
  # module would download but not execute, and replicating the install
  # script's logic in Ansible is brittle (paths, shell rc setup, version
  # detection — upstream changes these without notice). Shell+curl|bash
  # mirrors the documented install path 1:1.
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://opencode.ai/install | bash
  args:
    executable: /bin/bash
  when: not _opencode_final_check.stat.exists
  register: _opencode_curl
  changed_when: _opencode_curl.rc == 0
  failed_when: false

- name: "[OpenCode] Set effective binary path"
  ansible.builtin.set_fact:
    opencode_effective_binary: "{{ homebrew_prefix + '/bin/opencode' if _opencode_final_check.stat.exists else opencode_binary }}"

# ── Config ───────────────────────────────────────────────────────────────────

- name: "[OpenCode] Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ opencode_config_dir }}"
    state: directory
    mode: '0755'

- name: "[OpenCode] Render opencode.json with Ollama provider"
  ansible.builtin.template:
    src: opencode.json.j2
    dest: "{{ opencode_config_file }}"
    mode: '0600'

# -- Symlink into Homebrew PATH (optional; without it opencode is only in ~/.opencode/bin) ─

# Symlink only if it is a curl install (brew is already in PATH)
- name: "[OpenCode] Symlink binary into Homebrew bin (curl install only)"
  ansible.builtin.file:
    src: "{{ opencode_binary }}"
    dest: "{{ homebrew_prefix }}/bin/opencode"
    state: link
    force: true
  when:
    - opencode_symlink_to_homebrew | default(true)
    - not _opencode_brew.stat.exists
    - not _opencode_final_check.stat.exists
  failed_when: false

# ── Verifikace ───────────────────────────────────────────────────────────────

- name: "[OpenCode] Verify opencode runs"
  ansible.builtin.command: "{{ opencode_effective_binary }} --version"
  register: _opencode_version
  changed_when: false
  failed_when: false

- name: "[OpenCode] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════════
       OpenCode nainstalovan
      ══════════════════════════════════════════════════════════════════
       Binary:      {{ opencode_binary }}
       Symlink:     {{ 'pazny.homebrew_prefix/bin/opencode' if opencode_symlink_to_homebrew else 'NO (add ~/.opencode/bin to PATH)' }}
       Config:      {{ opencode_config_file }}
       Version:     {{ _opencode_version.stdout | default('unknown') }}

       Providers:
         ollama      → {{ opencode_ollama_base_url }} ({{ opencode_ollama_models | length }} modelu)
      {% if opencode_add_anthropic | default(false) %}
         anthropic   → Claude Opus 4.7 / Sonnet 4.7 (API key nastaven)
      {% endif %}
      {% if opencode_add_openai | default(false) %}
         openai      → API key nastaven
      {% endif %}

       Default model: {{ opencode_default_model }}

       Spusteni:
         opencode                      # in the current directory (project)
         opencode --model ollama/hermes3:8b   # prepnout model

       Prepnout provider/model v TUI: /provider
      ══════════════════════════════════════════════════════════════════
