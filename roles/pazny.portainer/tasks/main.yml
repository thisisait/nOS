---
# ==============================================================================
# pazny.portainer/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir and renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/portainer.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start admin user init + OAuth2/Authentik config lives in tasks/post.yml —
# called from core-up.yml AFTER `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.portainer] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ portainer_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.portainer] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/portainer.yml"
    mode: '0600'
  notify: Restart portainer
