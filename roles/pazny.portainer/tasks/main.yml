---
# ==============================================================================
# pazny.portainer/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose up infra`:
# vytvori data dir a vyrenderuje compose override fragment do
# {{ stacks_dir }}/infra/overrides/portainer.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Post-start admin user init + OAuth2/Authentik config je v tasks/post.yml —
# volany z core-up.yml az PO `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.portainer] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ portainer_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.portainer] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/portainer.yml"
    mode: '0644'
  notify: Restart portainer
