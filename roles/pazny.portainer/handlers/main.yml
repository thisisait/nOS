---
# pazny.portainer — handlers
# Play-level "Restart portainer" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook. Wave 1 commit 73622b8
# fixed the stack path to infra (was previously mistakenly iiab).

- name: Restart portainer
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart portainer
  failed_when: false
