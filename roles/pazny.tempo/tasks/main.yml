---
# ==============================================================================
# pazny.tempo/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose -p observability up`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/observability/overrides/tempo.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Tempo konfig (tempo.yaml) stays rendered in core-up.yml
# from files/observability/tempo/tempo.yaml — the role owns only the compose
# fragment + handler.
# ==============================================================================

- name: "[pazny.tempo] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ tempo_storage_path | default(stacks_dir + '/observability/tempo/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.tempo] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/tempo.yml"
    mode: '0600'
  notify: Restart tempo
