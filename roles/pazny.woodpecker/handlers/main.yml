---
# pazny.woodpecker — handlers
# Restarts both compose services (server + agent) as a single logical unit.
# Woodpecker had no dedicated play-level handler in main.yml, so this
# the role is the only source. The coordinator in Phase B has nothing to remove.

- name: Restart woodpecker
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/devops/docker-compose.yml" -p devops
    restart woodpecker-server woodpecker-agent
  failed_when: false
