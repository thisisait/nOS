---
# pazny.woodpecker — handlers
# Restartuje obe compose sluzby (server + agent) jako jeden logicky celek.
# Woodpecker nemel dedikovany handler na play-level v main.yml, takze tato
# role je jediny zdroj. Coordinator v Phase B nema co odstranovat.

- name: Restart woodpecker
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/devops/docker-compose.yml" -p devops
    restart woodpecker-server woodpecker-agent
  failed_when: false
