---
# ==============================================================================
# pazny.freescout/tasks/post.yml
#
# FreeScout post-start — two jobs:
#   1. Admin user onboarding via Laravel Artisan (no REST API exists)
#   2. Install + enable the `freescout-oauth` community module for native OIDC
#      with Authentik, then persist OIDC settings into the module's DB rows so
#      the end-user does NOT have to fill in the Admin UI form.
#
# Called from tasks/stacks/stack-up.yml only AFTER `docker compose up b2b --wait`.
# ==============================================================================

- name: "[pazny.freescout Post] Wait for service"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ freescout_port | default(8090) }}/"
    method: GET
    timeout: 5
    status_code: [200, 302, 500]
  register: _fs_ready
  until: _fs_ready.status | default(0) in [200, 302, 500]
  retries: 12
  delay: 10
  failed_when: false

- name: "[pazny.freescout Post] Check if admin user exists"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p b2b
    exec -T freescout
    php artisan tinker --execute="echo App\User::where('email','{{ freescout_admin_email | default(default_admin_email) }}')->count();"
    2>/dev/null || echo "0"
  register: _fs_user_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: _fs_ready.status | default(0) in [200, 302, 500]

- name: "[pazny.freescout Post] Create admin user via Artisan (first-run only)"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p b2b
    exec -T freescout
    php artisan freescout:create-user
    --role=admin
    --firstName="{{ freescout_admin_first_name | default('Admin') }}"
    --lastName="{{ freescout_admin_last_name | default('nOS') }}"
    --email="{{ freescout_admin_email | default(default_admin_email) }}"
    --password="{{ freescout_admin_password }}"
    2>&1 || true
  when:
    - _fs_ready.status | default(0) in [200, 302, 500]
    - (_fs_user_check.stdout | default('0') | trim) == '0'
  changed_when: true
  failed_when: false
  check_mode: false

# ── Reconverge admin password every run (state-declarative UPDATE) ──────
# FreeScout has no dedicated change-password artisan command, we use tinker
# with App\User::where->update to work for existing users.
- name: "[pazny.freescout Post] Reconverge admin password (tinker UPDATE)"
  ansible.builtin.shell: |
    {{ docker_bin }} compose -p b2b exec -T freescout \
      php artisan tinker --execute="\$u=App\User::where('email','{{ freescout_admin_email | default(default_admin_email) }}')->first(); if(\$u){\$u->password=bcrypt('{{ freescout_admin_password }}'); \$u->save(); echo 'UPDATED';}"
  when:
    - _fs_ready.status | default(0) in [200, 302, 500]
    - (_fs_user_check.stdout | default('0') | trim) != '0'
  register: _fs_pw_update
  changed_when: "'UPDATED' in (_fs_pw_update.stdout | default(''))"
  failed_when: false
  check_mode: false

# ──────────────────────────────────────────────────────────────────────────
# Native OIDC wiring via the `freescout-oauth` community module
# Source: https://github.com/freescout-help-desk/oauth
# The module is dropped into /data/Modules/OAuth (persistent bind mount) and
# enabled via Artisan. Config is persisted in the `oauth_module` options table
# so it survives container restarts and does not require UI clicks.
# ──────────────────────────────────────────────────────────────────────────

- name: "[pazny.freescout Post][OIDC] Check if OAuth module directory exists"
  ansible.builtin.stat:
    path: "{{ freescout_data_dir | default(ansible_facts['env']['HOME'] + '/freescout/data') }}/Modules/OAuth/module.json"
  register: _fs_oauth_stat
  when: install_authentik | default(false)

- name: "[pazny.freescout Post][OIDC] Clone freescout-oauth module (first-run only)"
  ansible.builtin.shell: |
    {{ docker_bin }} compose -p b2b exec -T freescout bash -c '
      set -e
      cd /var/www/html/Modules 2>/dev/null || cd /data/Modules
      if [ ! -d OAuth ]; then
        git clone --depth 1 https://github.com/freescout-help-desk/oauth.git OAuth || \
        git clone --depth 1 https://github.com/tiredofit/freescout-module-oauth.git OAuth
      fi
      chown -R www-data:www-data OAuth 2>/dev/null || true
    '
  register: _fs_oauth_clone
  changed_when: "'Cloning' in (_fs_oauth_clone.stderr | default('')) or 'Cloning' in (_fs_oauth_clone.stdout | default(''))"
  failed_when: false
  check_mode: false
  when:
    - install_authentik | default(false)
    - _fs_ready.status | default(0) in [200, 302, 500]
    - not (_fs_oauth_stat.stat.exists | default(false))

- name: "[pazny.freescout Post][OIDC] Enable OAuth module + clear cache"
  ansible.builtin.shell: |
    {{ docker_bin }} compose -p b2b exec -T freescout bash -c '
      php artisan module:enable OAuth 2>&1 || true
      php artisan freescout:clear-cache 2>&1 || php artisan cache:clear 2>&1 || true
    '
  register: _fs_oauth_enable
  changed_when: "'Module enabled' in (_fs_oauth_enable.stdout | default('')) or 'has been enabled' in (_fs_oauth_enable.stdout | default(''))"
  failed_when: false
  check_mode: false
  when:
    - install_authentik | default(false)
    - _fs_ready.status | default(0) in [200, 302, 500]

# Persist OIDC settings into the options table. The freescout-oauth module
# reads keys prefixed `oauth.*`; we upsert via tinker for idempotency so the
# values always match the current authentik_oidc_apps + credentials state.
- name: "[pazny.freescout Post][OIDC] Persist OIDC config (tinker UPSERT)"
  ansible.builtin.shell: |
    {{ docker_bin }} compose -p b2b exec -T freescout \
      php artisan tinker --execute="
        \$cfg=[
          'oauth.provider'=>'oidc',
          'oauth.enabled'=>'1',
          'oauth.client_id'=>'{{ authentik_oidc_freescout_client_id | default('nos-freescout') }}',
          'oauth.client_secret'=>'{{ authentik_oidc_freescout_client_secret | default(global_password_prefix + '_pw_oidc_freescout') }}',
          'oauth.authorize_url'=>'https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/authorize/',
          'oauth.token_url'=>'https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/token/',
          'oauth.userinfo_url'=>'https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/userinfo/',
          'oauth.logout_url'=>'https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/freescout/end-session/',
          'oauth.discovery_url'=>'https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/freescout/.well-known/openid-configuration',
          'oauth.redirect_uri'=>'https://{{ freescout_domain | default('helpdesk' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/oauth/callback',
          'oauth.scopes'=>'openid profile email',
          'oauth.display_name'=>'Authentik',
          'oauth.auto_create_user'=>'1',
          'oauth.email_claim'=>'email',
          'oauth.name_claim'=>'name',
        ];
        foreach(\$cfg as \$k=>\$v){ \\Option::set(\$k,\$v); }
        echo 'OIDC_PERSISTED';
      "
  register: _fs_oidc_persist
  changed_when: "'OIDC_PERSISTED' in (_fs_oidc_persist.stdout | default(''))"
  failed_when: false
  check_mode: false
  when:
    - install_authentik | default(false)
    - _fs_ready.status | default(0) in [200, 302, 500]
