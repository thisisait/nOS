---
# ==============================================================================
# pazny.freescout/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up b2b`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/b2b/overrides/freescout.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start admin user setup + password reconverge lives in tasks/post.yml —
# called from stack-up.yml az PO `docker compose up b2b --wait`.
# ==============================================================================

- name: "[pazny.freescout] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ freescout_data_dir | default(ansible_facts['env']['HOME'] + '/freescout/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.freescout] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/freescout.yml"
    mode: '0600'
  notify: Restart freescout
