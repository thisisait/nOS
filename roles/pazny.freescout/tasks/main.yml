---
# ==============================================================================
# pazny.freescout/tasks/main.yml
#
# Volano z tasks/stacks/stack-up.yml PRED `docker compose up b2b`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/b2b/overrides/freescout.yml, ktery pak stack-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Post-start admin user setup + password reconverge je v tasks/post.yml —
# volany z stack-up.yml az PO `docker compose up b2b --wait`.
# ==============================================================================

- name: "[pazny.freescout] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ freescout_data_dir | default(ansible_facts['env']['HOME'] + '/freescout/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.freescout] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/freescout.yml"
    mode: '0644'
  notify: Restart freescout
