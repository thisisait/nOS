---
# ==============================================================================
# pazny.freepbx/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up voip`:
# creates the data dir and renders the compose override fragment to
# {{ stacks_dir }}/voip/overrides/freepbx.yml, which stack-up.yml
# collects via `find` and passes as an additional -f flag.
# ==============================================================================

- name: "[pazny.freepbx] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ freepbx_data_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - certs
    - data
    - logs
    - custom

- name: "[pazny.freepbx] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/voip/overrides/freepbx.yml"
    mode: '0600'
  notify: Restart freepbx
