---
# ==============================================================================
# pazny.bluesky_pds — Bluesky PDS (AT Protocol Personal Data Server)
#
# Secrets (bluesky_pds_jwt_secret, bluesky_pds_admin_password,
# bluesky_pds_rotation_key) live in default.credentials.yml —
# auto-generated on blank run by main.yml pre-tasks. This role is
# consume-only.
#
# Identity bridge (Authentik → PDS account auto-provision) lives in
# tasks/stacks/bluesky_pds_bridge.yml — cross-service orchestration,
# not role-owned.
# ==============================================================================

bluesky_pds_version: "0.4"                          # aligned with default.config.yml; ghcr.io/bluesky-social/pds has no semver tags, 0.4 tracks current
# AT Protocol forbids .local TLD. On dev (tenant_domain=dev.local) we fall back
# to .dev.lan; on a real public TLD we use bsky.<tenant_domain> directly.
# Federation only works on the public-TLD path (needs DNS + LE cert).
bluesky_pds_hostname: "{{ 'bsky.dev.lan' if (tenant_domain_is_local | default(true) | bool) else 'bsky.' + (tenant_domain | default('dev.local')) }}"
bluesky_pds_port: 2583
bluesky_pds_data_dir: "{{ ansible_facts['env']['HOME'] }}/bluesky-pds"
bluesky_pds_invite_required: true                   # Invite-only registrace
bluesky_pds_email_smtp_url: ""                      # Prazdne = email notifikace vypnute
bluesky_pds_email_from: ""                          # Default: noreply@bsky.dev.lan
bluesky_pds_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
bluesky_pds_cpus: "{{ docker_cpus_light | default('0.5') }}"

# Admin account (provisioned in post.yml)
# Handle MUST NOT be a reserved word (admin, root, pds, app, bsky, atproto, ...)
# AT Protocol handles = <handle>.{{ bluesky_pds_hostname }}
bluesky_pds_admin_handle: "pazny.{{ bluesky_pds_hostname }}"
bluesky_pds_admin_email: "{{ default_admin_email | default('admin@' ~ (tenant_domain | default('dev.local'))) }}"

# ── AT Protocol public federation (Track G) ────────────────────────────────
# Off by default — federation requires:
#   1. tenant_domain is a public TLD (not .local/.lan/.test)
#   2. DNS A record bsky.<tenant_domain> → public IP (or Tailscale Funnel)
#   3. ACME wildcard cert covers *.{tenant_domain} or explicit bsky cert
#   4. Inbound 443 from the open internet to Traefik
#
# When on, the PDS advertises itself as a federation peer (via
# /xrpc/com.atproto.server.describeServer + /.well-known/atproto-did).
# The PDS still works locally without federation — flag controls whether
# external relays (bsky.network) accept records from this PDS.
#
# To enable in production:
#   1. Switch tenant_domain to your public domain
#   2. Run pazny.acme to issue the wildcard
#   3. Add CF DNS A record bsky.<td> → your IP
#   4. Set bluesky_pds_public_federation: true in config.yml
#   5. Re-run with --tags bluesky-pds
bluesky_pds_public_federation: false

# Default: Bluesky AppView host (where users see their feeds). The official
# bsky.network AppView is the open public default; advanced operators can
# point this at their own AppView when self-hosting one.
bluesky_pds_appview_url: "https://api.bsky.app"
bluesky_pds_appview_did: "did:web:api.bsky.app"
