---
# ==============================================================================
# pazny.bluesky_pds/tasks/post.yml
#
# Post-start admin account create + password reconverge via goat CLI.
# goat nahradil stary pdsadmin bash script v oficialnim PDS image.
# Volano z tasks/stacks/core-up.yml PO `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.bluesky_pds Post] Wait for PDS to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ bluesky_pds_port | default(2583) }}/xrpc/_health"
    status_code: 200
    timeout: 5
  register: _pds_health
  retries: 20
  delay: 3
  until: _pds_health.status | default(0) == 200
  failed_when: false

- name: "[pazny.bluesky_pds Post] Check if admin account exists"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra exec -T bluesky-pds
    goat pds admin account list
    --pds-host http://localhost:3000
    --admin-password "{{ bluesky_pds_admin_password }}" 2>&1
  register: _pds_accounts
  changed_when: false
  failed_when: false

- name: "[pazny.bluesky_pds Post] Create admin account"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra exec -T bluesky-pds
    goat pds admin account create
    --pds-host http://localhost:3000
    --admin-password "{{ bluesky_pds_admin_password }}"
    --handle "pds.{{ bluesky_pds_hostname | default('bsky.dev.lan') }}"
    --email "pds@{{ bluesky_pds_hostname | default('bsky.dev.lan') }}"
    --password "{{ bluesky_pds_admin_password }}" 2>&1
  register: _pds_create
  when:
    - _pds_health.status | default(0) == 200
    - "'pds.' ~ (bluesky_pds_hostname | default('bsky.dev.lan')) not in (_pds_accounts.stdout | default(''))"
  failed_when: false
  changed_when: "'did:' in (_pds_create.stdout | default(''))"

- name: "[pazny.bluesky_pds Post] Account creation result"
  ansible.builtin.debug:
    msg: >-
      {{ _pds_create.stdout | default('Preskoceno (ucet jiz existuje nebo PDS nedostupny)') }}
  when: _pds_create is defined

# ── Reconverge admin password every run (state-declarative UPDATE) ──────
# goat pds admin account update-password funguje i na existujici ucet
# a pouziva aktualni admin_password jako bearer token. Idempotentni.
- name: "[pazny.bluesky_pds Post] Reconverge admin account password"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra exec -T bluesky-pds
    goat pds admin account update-password
    --pds-host http://localhost:3000
    --admin-password "{{ bluesky_pds_admin_password }}"
    --handle "pds.{{ bluesky_pds_hostname | default('bsky.dev.lan') }}"
    --new-password "{{ bluesky_pds_admin_password }}" 2>&1
  register: _pds_pw_update
  when:
    - _pds_health.status | default(0) == 200
    - "'pds.' ~ (bluesky_pds_hostname | default('bsky.dev.lan')) in (_pds_accounts.stdout | default(''))"
  changed_when: _pds_pw_update.rc | default(1) == 0
  failed_when: false
