---
# pazny.bluesky_pds — handlers
# Play-level "Restart bluesky-pds" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart bluesky-pds
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart bluesky-pds
  failed_when: false
