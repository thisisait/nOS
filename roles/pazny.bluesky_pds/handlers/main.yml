---
# pazny.bluesky_pds — handlers
# Play-level "Restart bluesky-pds" v main.yml ma prednost; tento zustava pro
# samostatne pouziti role mimo devBoxNOS playbook.

- name: Restart bluesky-pds
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart bluesky-pds
  failed_when: false
