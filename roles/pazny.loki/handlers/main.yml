---
# pazny.loki — handlers
# Role-local "Restart loki" — may be overridden by a play-level handler in main.yml.

- name: Restart loki
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart loki
  failed_when: false
