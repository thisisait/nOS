---
# ==============================================================================
# pazny.loki/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose -p observability up`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/observability/overrides/loki.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Loki konfig (local-config.yaml) zustava renderovany v core-up.yml
# z files/observability/loki/local-config.yaml — role vlastni jen compose
# fragment + handler.
# ==============================================================================

- name: "[pazny.loki] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ loki_storage_path | default(stacks_dir + '/observability/loki/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.loki] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/loki.yml"
    mode: '0644'
  notify: Restart loki
