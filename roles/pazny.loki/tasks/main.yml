---
# ==============================================================================
# pazny.loki/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose -p observability up`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/observability/overrides/loki.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Loki konfig (local-config.yaml) stays rendered in core-up.yml
# from files/observability/loki/local-config.yaml — the role owns only the compose
# fragment + handler.
# ==============================================================================

- name: "[pazny.loki] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ loki_storage_path | default(stacks_dir + '/observability/loki/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.loki] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/loki.yml"
    mode: '0600'
  notify: Restart loki
