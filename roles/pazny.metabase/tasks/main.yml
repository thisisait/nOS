---
# ==============================================================================
# pazny.metabase/tasks/main.yml
#
# Volano z tasks/stacks/stack-up.yml PRED `docker compose up data`:
# vytvori data dir a vyrenderuje compose override fragment do
# {{ stacks_dir }}/data/overrides/metabase.yml.
#
# Post-start setup (API-driven admin user + password reconverge) je v
# tasks/post.yml — volany z stack-up.yml az PO `docker compose up data --wait`.
# ==============================================================================

- name: "[pazny.metabase] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ metabase_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.metabase] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/data/overrides/metabase.yml"
    mode: '0644'
  notify: Restart metabase
