---
# ==============================================================================
# pazny.metabase — Metabase BI v Docker (data compose stack)
#
# Credentials (metabase_db_password, metabase_admin_password) staysji v
# top-level default.config.yml / default.credentials.yml — stale centralizovane,
# the role only reads them via Ansible var precedence (vars_files > role defaults).
# ==============================================================================

metabase_version: "latest"
metabase_port: 3002
metabase_data_dir: "{{ ansible_facts['env']['HOME'] }}/metabase"
metabase_db_name: "metabase"
metabase_db_user: "metabase"
metabase_timezone: "Europe/Prague"
metabase_admin_first_name: "Admin"
metabase_admin_last_name: "nOS"
metabase_mem_limit: "2g"  # JVM + Flyway migrations + sample DB — 1g causes OOM on larger schemas

metabase_cpus: "{{ docker_cpus_standard | default('1.0') }}"
