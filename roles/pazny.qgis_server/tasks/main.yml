---
# ==============================================================================
# pazny.qgis_server/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up engineering`:
# creates the projects dir and renders the compose override fragment to
# {{ stacks_dir }}/engineering/overrides/qgis_server.yml.
# ==============================================================================

- name: "[pazny.qgis_server] Ensure projects directory exists"
  ansible.builtin.file:
    path: "{{ qgis_data_dir }}/projects"
    state: directory
    mode: '0755'

- name: "[pazny.qgis_server] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/engineering/overrides/qgis_server.yml"
    mode: '0600'
  notify: Restart qgis_server
