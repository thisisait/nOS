---
# ==============================================================================
# pazny.bookstack/tasks/post.yml
#
# Volano z tasks/stacks/stack-up.yml PO `docker compose up b2b`.
#
# Problem:
#   Image `lscr.io/linuxserver/bookstack` pri prvnim startu spousti
#   `artisan migrate`. Pokud MariaDB jeste nestihne dobehnout
#   healthcheck k okamziku, kdy artisan otevre TCP spojeni, migrace
#   selze uprostred FK aliasu s "[2002] Connection refused" a s6-overlay
#   migration step se neopakuje — kontejner zustane bezet s prazdnou DB.
#
# Fix:
#   Po compose up zkontroluj logy bookstack kontejneru na "FAIL" u
#   migrace a pripadne restartuj kontejner. LinuxServer init pustí
#   migrate znovu pri restartu; MariaDB uz je davno ready.
# ==============================================================================

- name: "[pazny.bookstack] Check for migration errors in container logs"
  ansible.builtin.shell: >
    {{ docker_bin }} logs b2b-bookstack-1 2>&1 | tail -300 |
    grep -cE "FAIL|Connection refused.*mysql|already exists|SQLSTATE" || true
  register: _bookstack_migration_error
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[pazny.bookstack] Drop and recreate DB on partial migration (table already exists)"
  ansible.builtin.shell: |
    {{ docker_bin }} exec infra-mariadb-1 mariadb \
      -u root -p'{{ mariadb_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ bookstack_db_name | default('bookstack') }}; CREATE DATABASE {{ bookstack_db_name | default('bookstack') }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  when: (_bookstack_migration_error.stdout | default('0') | int) > 0
  changed_when: true
  failed_when: false
  register: _bookstack_db_reset

- name: "[pazny.bookstack] Restart container after DB reset (clean migration)"
  ansible.builtin.command: "{{ docker_bin }} restart b2b-bookstack-1"
  when: _bookstack_db_reset is changed
  changed_when: true
  register: _bookstack_restart

- name: "[pazny.bookstack] Wait for bookstack HTTP after migration"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ bookstack_port | default(3013) }}/"
    status_code: [200, 302, 401]
    follow_redirects: none
  register: _bookstack_http
  retries: 30
  delay: 5
  until: _bookstack_http.status | default(0) in [200, 302, 401]
  failed_when: false
  check_mode: false
