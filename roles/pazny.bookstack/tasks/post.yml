---
# ==============================================================================
# pazny.bookstack/tasks/post.yml
#
# Called from tasks/stacks/stack-up.yml AFTER `docker compose up b2b`.
#
# Root cause (LSIO BookStack image):
#   Migration 2015_08_29_105422_add_roles_and_permissions creates 4 tables
#   (roles, role_user, permissions, permission_role) + FK constraints.
#   MariaDB DDL is not transactional — if a TCP blip occurs between the first
#   create table and the ALTER FK (typical when the whole b2b stack starts
#   concurrently and MariaDB is under load), the migration FAILs with
#   "[2002] Connection refused" and leaves 2 orphan tables (roles, role_user).
#   The LSIO init step `migrations` does not repeat — the container runs with a
#   half-broken DB and every subsequent restart gets `1050 Table 'roles' already exists`.
#
# Fix:
#   1. Pre-emptively detect the partial-state signature (roles exists, permissions
#      missing -> classic migration #10 stop point).
#   2. Retry loop: DROP DATABASE -> restart -> wait -> recheck (max 3 attempts).
#   3. After a successful migration verify HTTP.
# ==============================================================================

- name: "[pazny.bookstack] Ensure container is running"
  ansible.builtin.shell: >
    {{ docker_bin }} ps --filter name=b2b-bookstack-1 --filter status=running --format '{{ "{{" }}.Names{{ "}}" }}'
  register: _bookstack_running
  changed_when: false
  failed_when: false
  check_mode: false

  # Landmine removed (was a `meta: end_play` gated by [never] — harmless today,
  # but `end_play` aborts the ENTIRE play, not just this role, so leaving it in
  # any form invites accidental discovery. The real skip is the `when:` on the
  # recovery block below.

- name: "[pazny.bookstack] Migration recovery loop (drop DB + restart on partial state)"
  when: (_bookstack_running.stdout | default('')) != ''
  block:

    - name: "[pazny.bookstack] Attempt migration recovery (up to 3 tries)"
      ansible.builtin.include_tasks: post_migration_attempt.yml
      loop: "{{ range(1, (bookstack_migration_max_tries | default(3)) + 1) | list }}"
      loop_control:
        loop_var: bookstack_try
        label: "try {{ bookstack_try }}"
      when: not (_bookstack_migration_ok | default(false))

- name: "[pazny.bookstack] Wait for BookStack HTTP after migration recovery"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ bookstack_port | default(3013) }}/"
    status_code: [200, 302, 401]
    follow_redirects: none
  register: _bookstack_http
  retries: 20
  delay: 3
  until: _bookstack_http.status | default(0) in [200, 302, 401]
  failed_when: false
  check_mode: false

- name: "[pazny.bookstack] Migration recovery outcome"
  ansible.builtin.debug:
    msg: >
      BookStack HTTP {{ _bookstack_http.status | default('N/A') }} after
      {{ _bookstack_migration_tries_used | default('?') }} migration recovery
      attempts (partial_state={{ _bookstack_partial | default('unknown') }}).
