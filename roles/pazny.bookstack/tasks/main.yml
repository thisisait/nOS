---
# ==============================================================================
# pazny.bookstack/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up b2b`:
# creates the data dir, deploys the nginx vhost, renders the compose override
# fragment to {{ stacks_dir }}/b2b/overrides/bookstack.yml which stack-up.yml
# then collects via `find` and passes as an additional -f flag.
#
# BookStack has native OIDC (Authentik) via env vars — no post-start setup is
# required (the user is created on the first OIDC login; if
# OIDC_USER_TO_GROUPS=true they are auto-joined to Authentik groups).
# The DB user and database are created in the MariaDB post-start
# (pazny.mariadb/post.yml) via the central mariadb_databases / mariadb_users
# list in default.config.yml.
# ==============================================================================

- name: "[pazny.bookstack] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ bookstack_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.bookstack] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/bookstack.yml"
    mode: '0600'
  notify: Restart bookstack

- name: "[pazny.bookstack] Deploy nginx vhost"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/nginx/sites-available/bookstack.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/bookstack.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.bookstack] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/bookstack.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/bookstack.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.bookstack] Print installation info"
  ansible.builtin.debug:
    msg: |
      ======================================================
       BookStack (Docker) ready
      ======================================================
       URL:       https://{{ bookstack_domain }}
       Container: bookstack -> 127.0.0.1:{{ bookstack_port | default(3013) }}
       Data:      {{ bookstack_data_dir }}
       DB:        {{ bookstack_db_name }} @ mariadb (b2b_net <-> shared)
       SSO:       {{ 'Authentik OIDC' if install_authentik | default(false) else 'local' }}

       Add to /etc/hosts:   127.0.0.1 {{ bookstack_domain }}
      ======================================================
