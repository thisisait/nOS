---
# ==============================================================================
# pazny.bookstack/tasks/post_migration_attempt.yml
#
# One round of the "recovery" attempt. Called from post.yml in a loop { 1..3 }.
# If it detects partial state OR a FAIL in recent logs -> drop DB + restart.
# If it detects healthy state (migrations count matches and the 'permissions'
# table exists) -> sets _bookstack_migration_ok=true and subsequent iterations
# are skipped.
# ==============================================================================

# 1) Success marker: migrations table has >= 30 rows.
#    The original check looked for a 'permissions' table but modern BookStack
#    (v26+) refactored permissions into entity_permissions / joint_permissions /
#    role_permissions / permission_role — a plain 'permissions' table never
#    gets created, so the old check always reported "partial state" on a
#    perfectly healthy install. Counting completed migrations is the robust
#    signal: any successful migrate run records > 30 rows (v26.03 has 101).
- name: "[pazny.bookstack] (try {{ bookstack_try }}) Count completed migrations"
  ansible.builtin.shell: |
    {{ docker_bin }} exec infra-mariadb-1 mariadb \
      -u root -p'{{ mariadb_root_password }}' \
      -N -B -e "SELECT COUNT(*) FROM \`{{ bookstack_db_name | default('bookstack') }}\`.migrations;" 2>/dev/null || echo 0
  register: _bookstack_migrations_done
  changed_when: false
  failed_when: false
  check_mode: false

# Partial-state detector: role_user exists but migrations table has < 30 rows.
# This is the classic mid-crash state from the old MariaDB 11.4.10 FK ALTER bug
# (now fixed by named volume + 11.8.6). Still worth detecting in case a future
# regression corrupts the migration run midway.
- name: "[pazny.bookstack] (try {{ bookstack_try }}) Detect partial migration state"
  ansible.builtin.shell: |
    {{ docker_bin }} exec infra-mariadb-1 mariadb \
      -u root -p'{{ mariadb_root_password }}' \
      -N -B -e "SELECT COUNT(*) FROM information_schema.tables \
                WHERE table_schema='{{ bookstack_db_name | default('bookstack') }}' \
                  AND table_name IN ('roles','role_user');"
  register: _bookstack_partial_tables
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Set partial-state flag"
  ansible.builtin.set_fact:
    _bookstack_partial: "{{ (_bookstack_migrations_done.stdout | trim | int) < 30 and (_bookstack_partial_tables.stdout | trim | int) > 0 }}"
    _bookstack_migration_ok: "{{ (_bookstack_migrations_done.stdout | trim | int) >= 30 }}"
    _bookstack_migration_tries_used: "{{ bookstack_try }}"

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Migration looks healthy — skip recovery"
  ansible.builtin.debug:
    msg: "{{ _bookstack_migrations_done.stdout | trim }} migrations recorded -> healthy, skipping recovery"
  when: _bookstack_migration_ok | default(false)

# 2) If partial — drop the whole DB + restart the container
- name: "[pazny.bookstack] (try {{ bookstack_try }}) DROP + recreate DB (partial state detected)"
  ansible.builtin.shell: |
    {{ docker_bin }} exec infra-mariadb-1 mariadb \
      -u root -p'{{ mariadb_root_password }}' \
      -e "DROP DATABASE IF EXISTS {{ bookstack_db_name | default('bookstack') }}; \
          CREATE DATABASE {{ bookstack_db_name | default('bookstack') }} \
            CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; \
          GRANT ALL ON {{ bookstack_db_name | default('bookstack') }}.* \
            TO '{{ bookstack_db_user | default('bookstack') }}'@'%'; \
          FLUSH PRIVILEGES;"
  when: not (_bookstack_migration_ok | default(false))
  changed_when: true
  failed_when: false

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Stop bookstack so it releases connections"
  ansible.builtin.command: "{{ docker_bin }} stop -t 10 b2b-bookstack-1"
  when: not (_bookstack_migration_ok | default(false))
  changed_when: true
  failed_when: false

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Start bookstack fresh (clean migration)"
  ansible.builtin.command: "{{ docker_bin }} start b2b-bookstack-1"
  when: not (_bookstack_migration_ok | default(false))
  changed_when: true
  failed_when: false

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Wait for migrations to complete"
  ansible.builtin.shell: |
    {{ docker_bin }} exec infra-mariadb-1 mariadb \
      -u root -p'{{ mariadb_root_password }}' \
      -N -B -e "SELECT COUNT(*) FROM information_schema.tables \
                WHERE table_schema='{{ bookstack_db_name | default('bookstack') }}' \
                  AND table_name='permissions';"
  register: _bookstack_perm_after
  retries: 24                       # 24 * 5s = 120s max per attempt
  delay: 5
  until: (_bookstack_perm_after.stdout | trim | int) > 0
  changed_when: false
  failed_when: false
  check_mode: false
  when: not (_bookstack_migration_ok | default(false))

- name: "[pazny.bookstack] (try {{ bookstack_try }}) Update migration_ok flag after restart"
  ansible.builtin.set_fact:
    _bookstack_migration_ok: "{{ (_bookstack_perm_after.stdout | default('0') | trim | int) > 0 }}"
  when: not (_bookstack_migration_ok | default(false))
