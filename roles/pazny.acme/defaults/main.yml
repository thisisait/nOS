---
# ==============================================================================
# pazny.acme — Let's Encrypt wildcard cert via acme.sh + DNS-01 challenge
#
# Issues *{host_alias_seg}.{tenant_domain} + {host_alias_seg}.{tenant_domain}
# (and *.{apps_subdomain}{host_alias_seg}.{tenant_domain} for Tier-2 apps)
# as a wildcard cert and symlinks the result into {{ ssl_cert_path }} /
# {{ ssl_cert_key }} so every nginx vhost picks it up without further
# changes.
#
# Why acme.sh (not certbot/Lego):
#   - pure Bash, no Python/Go runtime → tiny footprint
#   - first-class DNS-01 for 100+ providers (Cloudflare native)
#   - built-in cron renewal logic (we wrap it in a launchd plist)
#
# Why DNS-01 (not HTTP-01):
#   - HTTP-01 requires port 80 reachable from the public internet → we want
#     to hide the home IP behind Cloudflare proxy AND avoid running a public
#     port 80 listener.
#   - DNS-01 needs only outbound HTTPS to the Cloudflare API → no inbound.
#   - DNS-01 is the only way to get *wildcard* certs anyway.
# ==============================================================================

# Tied to install_acme in default.config.yml (auto-derived from tenant_domain).
# Skip rendering when running on a local TLD (dev.local / lan / test / localhost).
acme_provider: "cloudflare"
acme_email: "{{ default_admin_email | default('admin@' + tenant_domain) }}"
acme_renewal_days: 60                     # Re-issue when cert expires within N days
acme_staging: false                       # Use LE staging endpoint (testing)
acme_cloudflare_api_token: ""             # SET IN credentials.yml

# Where acme.sh lives + where it stores certs internally
acme_home: "{{ ansible_facts['env']['HOME'] }}/.acme.sh"
acme_brew_pkg: "acme.sh"

# Cert lands under the shared TLS tree so Traefik (mounts /certs:ro) and
# host nginx (reads ssl_certificate paths) consume the same files.
# Cert filename uses the wildcard zone apex (host_alias.tenant_domain when
# set, else just tenant_domain) to keep one file per fleet box.
acme_cert_dir: "{{ tls_cert_dir | default(stacks_dir + '/infra/tls') }}/acme"
acme_cert_zone: "{{ ((_host_alias_normalized + '.') if ((_host_alias_normalized | default('')) | length > 0) else '') + tenant_domain }}"
acme_cert_path: "{{ acme_cert_dir }}/{{ acme_cert_zone }}.crt"
acme_cert_key: "{{ acme_cert_dir }}/{{ acme_cert_zone }}.key"

# Domains to cover. **Apex MUST come first** — acme.sh creates its working
# directory using the literal first `-d` arg as the folder name, which means
# putting the wildcard first results in `~/.acme.sh/*.<tenant>/` (with a
# literal asterisk in the path) and breaks downstream symlink targets.
# Putting the apex first yields the clean `~/.acme.sh/<tenant>/` path.
# Surfaced 2026-05-02 during the first pazny.eu production blank (manual
# symlink fix-up was needed because the prior wildcard-first order had
# already issued the cert into the asterisk directory on this host).
#
# Default fleet config (host_alias=""):
#   1. <tenant_domain>                    → ~/.acme.sh/<tenant_domain>/  (clean)
#   2. *.<tenant_domain>                  → wildcard SAN
#   3. *.<apps_subdomain>.<tenant_domain> → Tier-2 wildcard SAN
#
# host_alias="lab":
#   1. lab.<tenant_domain>                  → ~/.acme.sh/lab.<tenant_domain>/
#   2. *.lab.<tenant_domain>                → wildcard SAN
#   3. *.lab.<apps_subdomain>.<tenant_domain> → Tier-2 wildcard SAN
acme_domains: >-
  {{ [((host_alias + '.') if (host_alias | default('') | length > 0) else '') + tenant_domain,
      '*' + (_host_alias_seg | default('')) + '.' + tenant_domain,
      '*' + (_host_alias_seg | default('')) + '.' + (apps_subdomain | default('apps')) + '.' + tenant_domain] }}

# Renewal launchd job (runs daily at 03:30; acme.sh internally checks expiry)
acme_renewal_label: "eu.thisisait.nos.acme-renew"
acme_renewal_hour: 3
acme_renewal_minute: 30
