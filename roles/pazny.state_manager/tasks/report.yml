---
# Emit a concise summary of what was introspected. Optionally push the
# state snapshot to Bone so Wing's read cache stays fresh.

- name: "[state] Summary"
  ansible.builtin.debug:
    msg: |
      nOS state written to {{ nos_state_file }}
      Services observed: {{ nos_observed_services | default({}) | length }}
      {% set installed = nos_observed_services | default({}) | dict2items | selectattr('value.installed', 'defined') | selectattr('value.installed', 'truthy') | list %}
      Services with installed version: {{ installed | length }}
      {% for item in installed | sort(attribute='key') %}
        - {{ item.key }}: {{ item.value.installed }}{% if item.value.desired and item.value.desired != item.value.installed %} (desired: {{ item.value.desired }}){% endif %}{% if item.value.healthy is sameas false %} [unhealthy]{% endif %}

      {% endfor %}

# Track B (2026-04-26): fetch a JWT from Authentik before posting state.
# We reach for httpx via Bone? No — the playbook talks to Authentik
# directly, no detour. Token is good for 12h but we ask for a fresh one
# each run because playbook runs are rare and Authentik's token endpoint
# is fast.
- name: "[state] Fetch OIDC client_credentials token"
  ansible.builtin.uri:
    url: "{{ nos_state_oidc_token_url }}"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ nos_state_oidc_client_id }}"
      client_secret: "{{ nos_state_oidc_client_secret }}"
      scope: "{{ nos_state_oidc_scopes | join(' ') }}"
    status_code: [200]
    timeout: 10
    validate_certs: "{{ not (instance_tld_is_local | default(false)) }}"
  register: _state_oidc_token
  when:
    - nos_state_push_bone | bool
    - nos_state_oidc_enabled | bool
    - nos_state_snapshot is defined
  failed_when: false      # best-effort — Authentik may be down on first blank run
  no_log: true
  tags: ['state', 'report']

- name: "[state] Push state to Bone"
  ansible.builtin.uri:
    url: "{{ nos_state_bone_url }}"
    method: POST
    body_format: json
    body: "{{ nos_state_snapshot | default({}) }}"
    headers:
      # Track B: Bearer JWT replaces the legacy X-API-Key. The nos-state-manager
      # OIDC client must have nos:state:write in its capabilities (configured
      # in authentik_agent_clients[nos-state-manager].capabilities).
      Authorization: "Bearer {{ _state_oidc_token.json.access_token | default('') }}"
    status_code: [200, 201, 202, 204]
    timeout: 5
  when:
    - nos_state_push_bone | bool
    - nos_state_oidc_enabled | bool
    - nos_state_snapshot is defined
    - _state_oidc_token.json.access_token is defined
  failed_when: false      # best-effort — never fail the playbook on a cache miss
  changed_when: false
  no_log: true
  tags: ['state', 'report']
