---
# pazny.traefik — handlers
# Play-level "Restart traefik" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart traefik
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart traefik
  failed_when: false
