---
# ==============================================================================
# pazny.traefik/vars/main.yml — auth-mode lookup for Tier-1 services.
#
# The auto-derived router list (see templates/dynamic/services.yml.j2) iterates
# every state/manifest.yml entry that has both `domain_var` and `port_var`.
# This map decides which Traefik middleware to attach per service id:
#
#   none   → service handles its own auth (Authentik itself, JWT APIs,
#            services with native OIDC env vars / API config).
#   oidc   → native OIDC was wired into the service via env / API; Traefik
#            does NOT add forward-auth — the service's own login button
#            redirects to Authentik. Same router as `none` in practice;
#            kept distinct for documentation + future per-mode policy.
#   proxy  → service has no native SSO support, so Traefik gates the
#            request via the Authentik forward-auth middleware (mirror
#            of nginx's `include authentik-proxy-locations.conf` pattern,
#            fail-closed semantics — see PENTEST-002).
#
# DEFAULT FOR UNLISTED SERVICES = 'proxy'. Anything new gets gated until
# the operator wires native OIDC or explicitly opts out.
# ==============================================================================

#
# Source of truth for native-OIDC vs proxy-auth: authentik_oidc_apps in
# default.config.yml. Entries with `redirect_uris:` get an OAuth2 provider
# (= service handles its own login); entries with `external_host:` +
# `type: "proxy"` get a Proxy provider (= forward_auth via outpost).
#
# Matching the wrong mode here breaks login two ways:
#   - oidc service marked as 'proxy' → Authentik outpost has no proxy
#     provider for that Host header → 404 from outpost (not Traefik!)
#   - proxy service marked as 'oidc' → Traefik just forwards anonymous
#     traffic to the upstream → service shows its own (un-gated) login.
traefik_auth_modes:
  # ── No auth (public or self-managed) ───────────────────────────────────────
  authentik: none           # IS the auth provider
  bone: none                # JWT-validated API
  bluesky_pds: none         # AT Protocol federation
  rustfs: none              # S3 API, own credentials
  onlyoffice: none          # DocServer for collab (JWT-secured)
  spacetimedb: none         # binary protocol
  traefik: none             # own dashboard (LAN-only via 127.0.0.1 bind)
  offline_maps: none        # public tile server (no Authentik provider entry exists)

  # ── Native OIDC (Authentik OAuth2 provider) ────────────────────────────────
  grafana: oidc
  gitea: oidc
  gitlab: oidc
  n8n: oidc
  nextcloud: oidc
  open_webui: oidc
  openwebui: oidc           # alias spelling guard
  outline: oidc
  portainer: oidc
  vaultwarden: oidc
  woodpecker: oidc          # delegated via Gitea OAuth
  hedgedoc: oidc
  bookstack: oidc
  superset: oidc            # SUPERSET_AUTH_TYPE=AUTH_OAUTH
  homeassistant: oidc       # Auth provider plugin
  jellyfin: oidc            # SSO-Auth plugin
  wordpress: oidc           # OpenID Connect Generic plugin
  erpnext: oidc             # Frappe OAuth2 social_login_keys
  freescout: oidc           # OAuth Module
  infisical: oidc           # /api/v1/sso/oidc/callback
  miniflux: oidc            # OAUTH2_PROVIDER=oidc
  nodered: oidc             # β1.B 2026-05-05 — passport-openidconnect adminAuth
                            # in /data/settings.js; service handles its own
                            # OIDC redirect, no outpost needed.

  # ── Proxy (Authentik forward-auth via outpost) ─────────────────────────────
  # Includes both:
  #   - true forward-auth gates (uptime_kuma, kiwix, etc.): no per-user state
  #     in service; Authentik session = "you're in".
  #   - header_oidc services (firefly): outpost MUST stay in path so it
  #     injects REMOTE_USER / REMOTE_EMAIL headers that the service uses to
  #     auto-create the local account. β1.A doctrine: the proxy provider
  #     entry in Authentik is required, so traefik_auth_mode stays `proxy`.
  metabase: proxy
  uptime_kuma: proxy
  calibre_web: proxy
  kiwix: proxy
  paperclip: proxy
  puter: proxy
  wing: proxy
  code_server: proxy
  ntfy: proxy               # has its own user DB but admin UI is gated
  firefly: proxy
  influxdb: proxy           # admin UI gated; token-based API still works
  mailpit: proxy            # admin tier
  mcp_gateway: proxy
  openclaw: proxy
  hermes: proxy
  qgis_server: proxy

  # Everything else falls through to 'proxy' as a safe default — but the
  # explicit catalog above should already cover every manifest entry.

# Service ids to skip even if their install flag is on (no Traefik router).
# These either expose a non-HTTP protocol or are intentionally LAN-only.
# Keep in mind: removing entries here exposes services on Traefik routes —
# make sure their auth_mode above is set sensibly first.
traefik_skip_ids:
  - bone             # Bone is on host; published only on 127.0.0.1; reach via Wing UI

# Service ids whose host-loopback bind is HTTPS (not HTTP). Traefik upstream
# URL gets the https:// prefix and `serversTransport: noverify` so the
# self-signed dev cert is tolerated.
#
# 2026-05-04: code_server REMOVED from this list. The LSIO image
# (lscr.io/linuxserver/code-server) serves PLAIN HTTP on 8443 unless
# `--cert` is passed via CLI. We don't pass it, so the upstream is
# `http://nos-host:3009`, not https. Previous (incorrect) entry caused
# Traefik to send a TLS handshake that the upstream answered with HTTP,
# producing `tls_get_more_records: packet length too long` SSL errors
# and a 502/404 user-visible state. Surfaced 2026-05-04 during operator
# verification of code.pazny.eu.
traefik_https_upstream_ids: []

# Special-case routes that don't follow the manifest auto-derivation pattern.
# Added to the rendered services.yml verbatim — bypass the manifest loop.
#
# Note: do NOT also list a service id here that already has a manifest entry
# with domain_var + port_var — the auto-loop will already emit a router and
# adding another with the same id breaks YAML parsing (mapping key duplicate).
# `traefik` is a manifest entry (domain_var=traefik_domain, port_var=traefik_dashboard_port)
# so the dashboard route is auto-derived; no extra_routers entry needed.
#
# auth: proxy here would require the operator to register a matching Authentik
# proxy provider for the Host header, otherwise the outpost returns 404. Use
# 'none' for things that already gate themselves or 'oidc' for endpoints with
# native OIDC support.
traefik_extra_routers: []

# Service ids whose backend is the host (bind on 0.0.0.0 or 127.0.0.1) — use
# `nos-host:<port>`. Everything else uses the same alias too because every
# Docker compose template publishes its primary port via 127.0.0.1:<port>:<int>.
# This map is informational; the template emits `nos-host:<port>` uniformly.
traefik_host_services:
  - openclaw
  - hermes
