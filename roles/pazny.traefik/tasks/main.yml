---
# ==============================================================================
# pazny.traefik/tasks/main.yml — render and run the edge proxy.
#
# Outputs:
#   - static config:     {{ traefik_config_dir }}/traefik.yml
#   - dynamic providers: {{ traefik_dynamic_dir }}/{middlewares,tls,services}.yml
#   - compose override:  {{ stacks_dir }}/infra/overrides/traefik.yml
#
# Tier-1 services.yml is auto-derived from state/manifest.yml + install_*
# flags (one router + one service per enabled domain-bound service).
# Tier-2 apps go through the Docker provider via apps_runner labels.
# ==============================================================================

# ── Coexistence guard ────────────────────────────────────────────────────────
# Host nginx may run alongside Traefik for niche workflows, but only one of
# them can own 80/443. Refuse the run early instead of failing midway with
# a cryptic Docker port-bind error.
- name: "[pazny.traefik] Refuse if host nginx and Traefik both want 80/443"
  ansible.builtin.fail:
    msg: |
      install_nginx ({{ install_nginx | default(false) }}) and
      install_traefik ({{ install_traefik | default(true) }}) are both true —
      they would clash on ports 80/443. Pick one.
  when:
    - install_nginx | default(false) | bool
    - install_traefik | default(true) | bool

# ── Host directory tree ──────────────────────────────────────────────────────
- name: "[pazny.traefik] Ensure config + dynamic + log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_dynamic_dir }}"
    - "{{ traefik_log_dir }}"

# Manifest catalog is loaded per-task via `vars:` scope on the services
# template render below (NOT include_vars at the role level). Loading it
# globally would pollute the host vars namespace with manifest health-check
# url_template strings like "http://localhost:{{ bookstack_port }}/login" —
# pazny.state_manager later does `role_vars: "{{ vars }}"` which forces
# resolution of every value, and an undefined port_var (e.g. install_bookstack
# is false → bookstack_port never defined) fails the whole introspect task.

# ── Static config ────────────────────────────────────────────────────────────
- name: "[pazny.traefik] Render Traefik static configuration"
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    mode: '0644'
  notify: Restart traefik

# ── Dynamic config (file provider) ───────────────────────────────────────────
- name: "[pazny.traefik] Render dynamic middlewares (Authentik forward-auth + headers)"
  ansible.builtin.template:
    src: dynamic/middlewares.yml.j2
    dest: "{{ traefik_dynamic_dir }}/middlewares.yml"
    mode: '0644'
  # File provider is hot-watched, no restart needed.

- name: "[pazny.traefik] Render dynamic TLS pairs"
  ansible.builtin.template:
    src: dynamic/tls.yml.j2
    dest: "{{ traefik_dynamic_dir }}/tls.yml"
    mode: '0644'

- name: "[pazny.traefik] Render Tier-1 services (auto-derived from manifest + install_* flags)"
  ansible.builtin.template:
    src: dynamic/services.yml.j2
    dest: "{{ traefik_dynamic_dir }}/services.yml"
    mode: '0644'
  vars:
    # Loaded per-task only — not via include_vars — to keep manifest's
    # url_template strings out of the global host-vars namespace. See
    # comment above the static-config block.
    nos_manifest: "{{ lookup('file', playbook_dir ~ '/state/manifest.yml') | from_yaml }}"

# ── Compose override fragment ────────────────────────────────────────────────
- name: "[pazny.traefik] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/traefik.yml"
    mode: '0600'
  notify: Restart traefik

# ── Print summary ────────────────────────────────────────────────────────────
- name: "[pazny.traefik] Print setup summary"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Traefik — edge proxy
      ══════════════════════════════════════════════════════
       Ports:           80 + 443 (edge), 127.0.0.1:{{ traefik_dashboard_port }} (dashboard)
       Static config:   {{ traefik_config_dir }}/traefik.yml
       Dynamic config:  {{ traefik_dynamic_dir }}/{middlewares,tls,services}.yml
       Cert tree:       {{ traefik_certs_dir }} (mounted /certs:ro)
       Logs:            {{ traefik_log_dir }} (json)
       Networks:        {{ traefik_networks | join(', ') }}
       Tier-1 catalog:  file provider — state/manifest.yml + install_* flags
       Tier-2 catalog:  Docker provider — apps_runner labels
      ══════════════════════════════════════════════════════
