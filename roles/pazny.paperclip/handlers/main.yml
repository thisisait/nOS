---
# pazny.paperclip — handlers
# Paperclip had no dedicated play-level handler in main.yml, so this
# the role is the only source. The coordinator in Phase B has nothing to remove.

- name: Restart paperclip
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/devops/docker-compose.yml" -p devops
    restart paperclip
  failed_when: false
