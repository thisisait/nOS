---
# ==============================================================================
# pazny.paperclip/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p devops up`:
# creates the data dir and renders the compose override fragment to
# {{ stacks_dir }}/devops/overrides/paperclip.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Paperclip is not part of the standard task/iiab/ set — pre-setup logic
# was minimal, a compose fragment render + data dir was enough.
#
# Post-start logic (allowed-hostname registration) lives in tasks/post.yml —
# called AFTER `docker compose up devops --wait` from stack-up.yml.
# ==============================================================================

- name: "[pazny.paperclip] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ paperclip_data_dir | default(ansible_facts['env']['HOME'] + '/paperclip') }}"
    state: directory
    mode: '0755'

- name: "[pazny.paperclip] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/devops/overrides/paperclip.yml"
    mode: '0600'
  notify: Restart paperclip
