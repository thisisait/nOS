---
# DISSOLUTION PLAN (Phase 2 C5): This file dissolves into
# files/anatomy/plugins/paperclip-base/ lifecycl.post_compose once the plugin
# loader gains a `replay_api_calls` runner with docker_exec + http support.
# Until C5 lands, this file remains the authoritative wiring path.
#
# NOTE: paperclip-base plugin does NOT exist yet — must be created before
# dissolution can proceed. Until then, this file is the sole wiring path.
#
# ==============================================================================
# pazny.paperclip/tasks/post.yml — allowed hostname registration + CEO bootstrap
#
# Extracted from tasks/stacks/stack-up.yml (Wave 2.2 Unit 10). Paperclip
# uses the BETTER_AUTH_TRUSTED_ORIGINS env var for CSRF/CORS, but allowed
# hostnames for the admin API must be registered via the pnpm CLI.
#
# Called from tasks/stacks/stack-up.yml AFTER `docker compose up devops --wait`.
# Idempotent-on-write — pnpm paperclipai allowed-hostname is safe to call
# on an existing hostname.
# ==============================================================================

- name: "[pazny.paperclip Post] Check if Paperclip is already onboarded"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    test -f /paperclip/instances/default/config.json && echo "exists"
  register: _paperclip_config_check
  changed_when: false
  failed_when: false

- name: "[pazny.paperclip Post] Initialize Paperclip instance (non-interactive onboard)"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    timeout 120 pnpm paperclipai onboard --yes --data-dir /paperclip 2>&1 || true
  register: _paperclip_onboard
  changed_when: "'Configuration ready' in (_paperclip_onboard.stdout | default(''))"
  failed_when: false
  when: "'exists' not in (_paperclip_config_check.stdout | default(''))"

# Paperclip closes TCP without an HTTP response if the Host header is not in
# BETTER_AUTH_TRUSTED_ORIGINS / allowed hostnames. 127.0.0.1 is not in them,
# so we must (a) wait only for the TCP port (fastest, reliable signal
# that the node server is running), and (b) try HTTP with the correct Host header.
- name: "[pazny.paperclip Post] Wait for Paperclip TCP port ready"
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ paperclip_port | default(3006) }}"
    state: started
    timeout: 120
    delay: 2

- name: "[pazny.paperclip Post] Verify Paperclip HTTP (with correct Host header)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ paperclip_port | default(3006) }}/"
    method: GET
    timeout: 5
    headers:
      Host: "{{ paperclip_domain | default('paperclip' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
    status_code: [200, 301, 302, 401, 403]
  register: _paperclip_ready
  until: _paperclip_ready.status | default(0) in [200, 301, 302, 401, 403]
  retries: 10
  delay: 3
  failed_when: false

- name: "[pazny.paperclip Post] Register primary allowed hostname"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    pnpm paperclipai allowed-hostname {{ paperclip_domain | default('paperclip' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
  register: _paperclip_hostname
  changed_when: _paperclip_hostname.rc | default(1) == 0
  failed_when: false

- name: "[pazny.paperclip Post] Hostname registration result"
  ansible.builtin.debug:
    msg: "{{ _paperclip_hostname.stdout_lines | default(['no output']) }}"
  when: _paperclip_hostname is defined

- name: "[pazny.paperclip Post] Register extra allowed hostnames"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    pnpm paperclipai allowed-hostname {{ item }}
  loop: "{{ service_extra_hosts | default([]) }}"
  when: service_extra_hosts | default([]) | length > 0
  failed_when: false
  changed_when: false

# ── CEO bootstrap ─────────────────────────────────────────────────────────
# Check whether any account rows already exist in the Paperclip DB before
# calling `auth bootstrap-ceo --force`. The earlier implementation ran
# --force on EVERY playbook run with `failed_when: false` — so (a) a real
# bootstrap regression would be invisible, and (b) on every run the CLI's
# side-effects depend on its internal idempotence (unverified).
#
# We check the DB directly; zero accounts means genuine first-run.

- name: "[pazny.paperclip Post] Check if a CEO account already exists"
  ansible.builtin.shell: >
    {{ docker_bin }} exec infra-postgresql-1 psql -U postgres -d
    {{ paperclip_db_name | default('paperclip') }}
    -tAc "SELECT COUNT(*) FROM account"
  register: _paperclip_accounts
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[pazny.paperclip Post] Bootstrap CEO admin invite (first-run only)"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    pnpm paperclipai auth bootstrap-ceo
    --data-dir /paperclip
    --base-url "https://{{ paperclip_domain | default('paperclip' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}" 2>&1
  register: _paperclip_bootstrap
  when:
    # Only run when we're reasonably sure it's a first-run. The 'Count 0'
    # check covers the happy path; the empty/failed output covers fresh DB
    # before the account table exists (during initial migrations).
    - (_paperclip_accounts.stdout | default('') | trim) in ['', '0']
  changed_when: "'Created bootstrap' in (_paperclip_bootstrap.stdout | default(''))"
  # Do NOT hide errors — a bootstrap failure in first-run means nobody can
  # log in, which the operator must see.
  failed_when:
    - _paperclip_bootstrap is defined
    - _paperclip_bootstrap.rc is defined
    - _paperclip_bootstrap.rc != 0
    - "'already exists' not in (_paperclip_bootstrap.stdout | default(''))"

- name: "[pazny.paperclip Post] Bootstrap CEO invite URL"
  ansible.builtin.debug:
    msg: "{{ _paperclip_bootstrap.stdout_lines | default(['No invite generated']) | select('search', 'Invite URL') | list | first | default('Check paperclip logs for invite URL') }}"
  when:
    - _paperclip_bootstrap is defined
    - _paperclip_bootstrap.changed | default(false)

# ── Native OIDC verification (staged) ─────────────────────────────────────
# Sprint 2c, 2026-04-22. Runs only when the operator has flipped
# `paperclip_native_oidc_enabled: true` AND Authentik is installed.
# The upstream image does not yet consume BETTER_AUTH_OIDC_* vars, so we
# only verify the env vars are wired and that the Authentik OIDC issuer
# endpoint is reachable from inside the container. Actual sign-in continues
# to go through the Nginx forward_auth outpost until upstream adds support.

- name: "[pazny.paperclip Post] Native OIDC — verify env vars reached the container"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    sh -c 'echo "ISSUER=$BETTER_AUTH_OIDC_ISSUER"; echo "CLIENT_ID=$BETTER_AUTH_OIDC_CLIENT_ID"'
  register: _paperclip_oidc_env
  changed_when: false
  failed_when: false
  when:
    - install_authentik | default(false)
    - paperclip_native_oidc_enabled | default(false)

- name: "[pazny.paperclip Post] Native OIDC — reachability check to Authentik issuer"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p devops exec -T paperclip
    sh -c 'curl -sfk -o /dev/null -w "%{http_code}" https://{{ authentik_domain | default("auth" ~ (_host_alias_seg | default("")) ~ "." ~ (tenant_domain | default("dev.local"))) }}/application/o/paperclip/.well-known/openid-configuration'
  register: _paperclip_oidc_reach
  changed_when: false
  failed_when: false
  when:
    - install_authentik | default(false)
    - paperclip_native_oidc_enabled | default(false)

- name: "[pazny.paperclip Post] Native OIDC — verification summary"
  ansible.builtin.debug:
    msg:
      - "ENV: {{ _paperclip_oidc_env.stdout_lines | default([]) }}"
      - "Authentik discovery HTTP status: {{ _paperclip_oidc_reach.stdout | default('n/a') }}"
      - "NOTE: Upstream Paperclip does not yet wire BetterAuth genericOAuth from env."
      - "Access control remains enforced by the Nginx Authentik outpost (proxy auth)."
  when:
    - install_authentik | default(false)
    - paperclip_native_oidc_enabled | default(false)
