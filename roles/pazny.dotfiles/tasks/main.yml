---
- name: Ensure dotfiles repository is cloned locally.
  git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_repo_local_destination }}"
    version: "{{ dotfiles_repo_version }}"
    accept_hostkey: "{{ dotfiles_repo_accept_hostkey }}"
  become: false

- name: Ensure all configured dotfiles are links.
  command: "ls -F {{ dotfiles_home }}/{{ item }}"
  register: existing_dotfile_info
  failed_when: false
  check_mode: false
  changed_when: false
  loop: "{{ dotfiles_files }}"

- name: Remove existing dotfiles file if a replacement is being linked.
  # Track H Phase 4 (2026-05-01): with_indexed_items removed in
  # ansible-core 2.24+. Modern equivalent = loop with index_var; the
  # old `item.0` (index) becomes `idx`, the old `item.1` (results dict)
  # becomes `item`.
  file:
    path: "{{ dotfiles_home }}/{{ dotfiles_files[idx] }}"
    state: absent
  when: "'@' not in item.stdout"
  loop: "{{ existing_dotfile_info.results }}"
  loop_control:
    index_var: idx
    label: "{{ dotfiles_files[idx] }}"

- name: Ensure parent folders of link dotfiles exist.
  file:
    path: "{{ (dotfiles_home ~ '/' ~ item) | dirname }}"
    state: directory
    follow: true
  become: false
  loop: "{{ dotfiles_files }}"

- name: Link dotfiles into home folder.
  file:
    src: "{{ dotfiles_repo_local_destination }}/{{ item }}"
    dest: "{{ dotfiles_home }}/{{ item }}"
    state: link
  become: false
  loop: "{{ dotfiles_files }}"
