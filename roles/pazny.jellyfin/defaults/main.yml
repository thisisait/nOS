---
# ==============================================================================
# pazny.jellyfin — Jellyfin media server (iiab compose stack)
#
# Centralized variables (jellyfin_domain, port, media dirs) staysji v
# default.config.yml due to external consumers (nginx vhost render,
# blank-reset path resolver). Role defaults poskytuji fallback.
# ==============================================================================

jellyfin_version: "10.10.7"                         # CVE-2025-31499 pin
jellyfin_port: 8096
jellyfin_domain: "media{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
jellyfin_lan_access: true                           # true = port dostupny z LAN
jellyfin_config_dir: "{{ ansible_facts['env']['HOME'] }}/jellyfin/config"
jellyfin_cache_dir: "{{ ansible_facts['env']['HOME'] }}/jellyfin/cache"
jellyfin_movies_dir: "{{ ansible_facts['env']['HOME'] }}/media/movies"
jellyfin_shows_dir: "{{ ansible_facts['env']['HOME'] }}/media/shows"
jellyfin_music_dir: "{{ ansible_facts['env']['HOME'] }}/media/music"

jellyfin_admin_user: "admin"
jellyfin_language: "en-US"
jellyfin_country: "CZ"

jellyfin_mem_limit: "{{ docker_mem_limit_critical | default('2g') }}"
jellyfin_cpus: "{{ docker_cpus_standard | default('1.0') }}"

# ----------------------------------------------------------------------------
# Native OIDC via jellyfin-plugin-sso (https://github.com/9p4/jellyfin-plugin-sso)
# Pinned to v3.5.2.4 — last release compatible with Jellyfin 10.10.x (see
# jellyfin_version). v4.x targets Jellyfin 10.11 only.
# ----------------------------------------------------------------------------
jellyfin_sso_plugin_version: "3.5.2.4"
jellyfin_sso_plugin_url: "https://github.com/9p4/jellyfin-plugin-sso/releases/download/v{{ jellyfin_sso_plugin_version }}/sso-authentication_{{ jellyfin_sso_plugin_version }}.zip"

# Authentik OIDC provider config (matches authentik_oidc_apps entry "jellyfin").
jellyfin_oidc_provider_name: "Authentik"
jellyfin_oidc_client_id: "nos-jellyfin"
jellyfin_oidc_client_secret: "{{ global_password_prefix }}_pw_oidc_jellyfin"
jellyfin_oidc_endpoint: "https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/application/o/jellyfin/"
jellyfin_oidc_admin_roles:
  - "nos-admins"
  - "nos-providers"
jellyfin_oidc_user_roles:
  - "nos-admins"
  - "nos-providers"
  - "nos-managers"
  - "nos-users"
  - "nos-guests"
