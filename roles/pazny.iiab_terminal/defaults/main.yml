---
# ==============================================================================
# pazny.iiab_terminal — SSH TUI hub for the homelab (Python Textual)
#
# Source files files/iiab-terminal/ and the template config.json.j2 stay
# in the playbook repo and the role references them via a relative path (Ansible role
# loader also finds files/ and templates/ in the playbook tree).
# ==============================================================================

iiab_terminal_user: "home"                         # macOS user for SSH access
iiab_terminal_password: ""                         # Empty = auto-generated random password
iiab_terminal_password_auth: true                  # true = login with password allowed
iiab_terminal_config_dir: "{{ homebrew_prefix }}/etc/iiab-terminal"
iiab_terminal_bin_path: "{{ homebrew_prefix }}/bin/iiab-terminal"
