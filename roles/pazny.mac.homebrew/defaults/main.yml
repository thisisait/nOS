---
homebrew_repo: https://github.com/Homebrew/brew

homebrew_prefix: "{{ (ansible_facts.machine == 'arm64') | ternary('/opt/homebrew', '/usr/local') }}"
homebrew_install_path: "{{ homebrew_prefix }}{{ '/Homebrew' if ansible_facts.machine != 'arm64' }}"
homebrew_brew_bin_path: "{{ homebrew_prefix }}/bin"

homebrew_installed_packages: []

homebrew_uninstalled_packages: []

# Run `brew upgrade` for every managed formula on each playbook run. Default
# true so the box stays current — every blank/run pulls latest patch
# versions of CLI tools (sqlite, jq, openssl, …). Set false in config.yml
# if a specific tool's behaviour is sensitive to its minor version.
homebrew_upgrade_all_packages: true

homebrew_taps: []

homebrew_cask_apps: []

homebrew_cask_uninstalled_apps: []

# Run `brew upgrade --cask --greedy` for every cask after install. Default
# true so installed apps (Brave, Blender, Discord, Sequel Ace, …) stay
# current. Without this, casks are pinned to their first-install version
# forever because the install task short-circuits on Caskroom existence.
homebrew_cask_auto_upgrade: true

homebrew_cask_appdir: /Applications
homebrew_cask_accept_external_apps: false

# Set this to your account password if casks need elevated privileges.
# ansible_become_password: ''

homebrew_use_brewfile: true
homebrew_brewfile_dir: '~'

homebrew_clear_cache: false

homebrew_folders_additional: []
