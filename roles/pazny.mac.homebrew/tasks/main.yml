---
- name: Determine Homebrew ownership variables
  set_fact:
    homebrew_user: '{{ homebrew_user | default(ansible_facts.user_id) }}'
    homebrew_group: '{{ homebrew_group | default(ansible_facts.user_gid) }}'

# Homebrew setup prerequisites.
- name: Ensure Homebrew parent directory has correct permissions (Apple Silicon).
  file:
    path: "{{ homebrew_prefix }}"
    owner: "{{ homebrew_user }}"
    state: directory
  become: true
  when: ansible_facts.machine == 'arm64'

- name: Ensure Homebrew parent directory has correct permissions (Intel).
  when: ansible_facts.machine == 'x86_64'
  block:
    - name: Ensure Homebrew parent directory has correct permissions (MacOS >= 10.13).
      file:
        path: "{{ homebrew_prefix }}"
        owner: root
        state: directory
      become: true
      when: "ansible_facts.distribution_version is version('10.13', '>=')"

    - name: Ensure Homebrew parent directory has correct permissions (MacOS < 10.13).
      file:
        path: "{{ homebrew_prefix }}"
        owner: root
        group: admin
        state: directory
        mode: "0775"
      become: true
      when: "ansible_facts.distribution_version is version('10.13', '<')"

- name: Check if homebrew already exists.
  stat:
    path: "{{ homebrew_brew_bin_path }}/brew"
  register: pre_installed_brew

- name: Ensure Homebrew directory exists.
  file:
    path: "{{ homebrew_install_path }}"
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_group }}"
    state: directory
    mode: "0775"
  become: true

# Clone Homebrew.
- name: Ensure Homebrew is installed.
  git:
    repo: "{{ homebrew_repo }}"
    version: master
    dest: "{{ homebrew_install_path }}"
    update: false
    depth: 1
  become: true
  become_user: "{{ homebrew_user }}"
  when: not pre_installed_brew.stat.exists

# Adjust Homebrew permissions.
- name: Ensure proper permissions and ownership on homebrew_brew_bin_path dirs.
  file:
    path: "{{ homebrew_brew_bin_path }}"
    state: directory
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_group }}"
    mode: "0775"
  become: true

- name: Ensure proper ownership on homebrew_install_path subdirs.
  file:
    path: "{{ homebrew_install_path }}"
    state: directory
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_group }}"
    recurse: true
    follow: false
  become: true

# Place brew binary in proper location and complete setup.
- name: Check if homebrew binary is already in place.
  stat:
    path: "{{ homebrew_brew_bin_path }}/brew"
  register: homebrew_binary
  check_mode: false

- name: Symlink brew to homebrew_brew_bin_path.
  file:
    src: "{{ homebrew_install_path }}/bin/brew"
    dest: "{{ homebrew_brew_bin_path }}/brew"
    state: link
  when: not homebrew_binary.stat.exists
  become: true

- name: Add missing folder if not on Apple-chipset
  set_fact:
    homebrew_folders_base: "{{ homebrew_folders_base + ['Homebrew'] }}"
  when: ansible_facts.machine != 'arm64'

- name: Ensure proper homebrew folders are in place.
  file:
    path: "{{ homebrew_prefix }}/{{ item }}"
    state: directory
    owner: "{{ homebrew_user }}"
    group: "{{ homebrew_group }}"
  become: true
  loop: "{{ homebrew_folders_base + homebrew_folders_additional }}"

- name: Collect package manager fact.
  setup:
    filter: ansible_facts.pkg_mgr

- name: Perform brew installation.
  # Privilege escalation is only required for inner steps when
  # the `homebrew_user` doesn't match the `ansible_facts.user_id`
  become: "{{ (homebrew_user != ansible_facts.user_id) | bool }}"
  become_user: "{{ homebrew_user }}"
  block:
    - name: Force update brew after installation.
      command: "{{ homebrew_brew_bin_path }}/brew update --force"
      when: not pre_installed_brew.stat.exists

    - name: Where is the cache?
      command: "{{ homebrew_brew_bin_path }}/brew --cache"
      register: homebrew_cache_path
      changed_when: false
      check_mode: false

    # Tap.
    - name: Ensure configured taps are tapped.
      homebrew_tap:
        tap: '{{ item.name | default(item) }}'
        url: '{{ item.url | default(omit) }}'
        state: present
      loop: "{{ homebrew_taps }}"

    # Cask.
    - name: Ensure blacklisted cask applications are not installed.
      homebrew_cask:
        name: "{{ item }}"
        state: absent
        sudo_password: "{{ ansible_become_password | default(omit) }}"
      loop: "{{ homebrew_cask_uninstalled_apps }}"

    # homebrew_cask Ansible modul je extremne pomaly (brew 4.x Ruby JSON API
    # parsing, 60s+ na cask). Nahrazeno rychlym Caskroom dir checkm.
    # Casks without a Caskroom entry install with a 90s timeout.
    #
    # Tolerance for upstream Homebrew API regressions (2026-05-07): the
    # cask_struct_generator.rb path occasionally trips on individual casks
    # whose API metadata has a malformed `depends_on` block (e.g. handbrake
    # circa 2026-05-07: `undefined method 'to_sym' for nil` during the
    # depends_on parse). One bad cask shouldn't kill an otherwise-green
    # blank run; the script tags those skips with `UPSTREAM_BUG:` so they
    # surface in the recap without poisoning the playbook. Operator can
    # re-run the cask manually once Homebrew ships a fix.
    - name: Install configured cask applications.
      ansible.builtin.shell: |
        cask_name="{{ item.name | default(item) }}"
        if [ -d "{{ homebrew_prefix }}/Caskroom/${cask_name}" ]; then
          echo "ALREADY_INSTALLED"
          exit 0
        fi
        echo "INSTALLING: ${cask_name}..."
        if command -v timeout &>/dev/null; then
          out=$(timeout 90 brew install --cask "${cask_name}" --appdir="{{ homebrew_cask_appdir }}" 2>&1)
        else
          out=$(brew install --cask "${cask_name}" --appdir="{{ homebrew_cask_appdir }}" 2>&1)
        fi
        rc=$?
        echo "$out"
        if [ $rc -eq 124 ]; then
          echo "TIMEOUT: ${cask_name} install exceeded 90s — install manually: brew install --cask ${cask_name}"
          exit 0
        fi
        # Tolerate upstream Homebrew internal errors so a single bad-cask
        # API entry doesn't fail the whole blank run. The fingerprint is
        # any "Please report this issue" signature in stdout — that's how
        # Homebrew tags its own internal exceptions vs user errors.
        if [ $rc -ne 0 ] && echo "$out" | grep -q "Please report this issue"; then
          echo "UPSTREAM_BUG: ${cask_name} hit a Homebrew internal error (likely cask metadata regression). Skipping; re-run when upstream fixes it: brew install --cask ${cask_name}"
          exit 0
        fi
        exit $rc
      args:
        executable: /bin/bash
      register: _cask_result
      changed_when:
        - "'ALREADY_INSTALLED' not in _cask_result.stdout"
        - "'UPSTREAM_BUG:' not in _cask_result.stdout"
        - "'TIMEOUT:' not in _cask_result.stdout"
      failed_when:
        - _cask_result.rc != 0
        - "'already an App' not in _cask_result.stderr"
        - "'already an App' not in _cask_result.stdout"
      loop: "{{ homebrew_cask_apps }}"
      loop_control:
        label: "{{ item.name | default(item) }}"
      environment:
        HOMEBREW_NO_AUTO_UPDATE: "1"
        HOMEBREW_NO_INSTALL_CLEANUP: "1"
      notify:
        - Clear homebrew cache

    # ── Cask upgrades — transparent reporting ────────────────────────────────
    # Without this every cask installed once stays pinned to its first version
    # forever (Brave, Blender, GIMP, 1password-cli, dotnet-sdk, ...). The
    # install task above short-circuits on `Caskroom/<name>` existing, which
    # means the playbook never re-runs `brew install --cask` to upgrade.
    #
    # Default: run the upgrade so the box stays current. Operators who want
    # to pin specific casks can add them to homebrew_cask_pinned_apps; we
    # honour `brew pin --cask <name>` semantics by passing --greedy and
    # respecting Homebrew's pin list (managed manually).
    # Self-updating casks (Brave, Discord, …) handle their own upgrades and
    # `brew outdated --cask` correctly omits them. We don't pass --greedy
    # for that reason — it would force re-installs that conflict with the
    # app's internal updater.
    - name: "List outdated casks (snapshot before upgrade)"
      ansible.builtin.command: brew outdated --cask --quiet
      register: _cask_outdated_before
      changed_when: false
      failed_when: false
      check_mode: false
      when: homebrew_cask_auto_upgrade | default(true) | bool

    # Detect which outdated casks are CURRENTLY RUNNING so we don't
    # interrupt the user's session. Apps in /Applications/<Name>.app
    # whose binary is in `pgrep`'s output get deferred to a manual run.
    - name: "Detect running cask apps"
      ansible.builtin.shell: |
        # For each outdated cask, look up its installed .app bundle via
        # `brew info --cask --json` (canonical artifacts list) and pgrep
        # the bundle name. Falls back to fuzzy match on cask name when
        # the JSON lookup fails (cask without an .app artifact = skip).
        set -o pipefail
        running=()
        while IFS= read -r cask; do
          [ -z "$cask" ] && continue
          # Pull artifact name from brew metadata (handles "Sequel Ace.app"
          # vs cask "sequel-ace" without heuristics).
          app=$(brew info --cask --json=v2 "$cask" 2>/dev/null \
                | python3 -c "import json,sys; d=json.load(sys.stdin); arts=d['casks'][0].get('artifacts',[]); apps=[a for art in arts if isinstance(art,dict) for a in (art.get('app') or []) if isinstance(a,str)]; print(apps[0] if apps else '')" 2>/dev/null || true)
          [ -z "$app" ] && continue
          app_name=$(basename "$app" .app)
          if pgrep -xfi "$app_name" >/dev/null 2>&1 \
             || pgrep -fi "/Applications/${app}/Contents/MacOS/" >/dev/null 2>&1; then
            running+=("$cask")
          fi
        done <<< "{{ (_cask_outdated_before.stdout_lines | default([])) | join('\n') }}"
        printf '%s\n' "${running[@]}"
      args:
        executable: /bin/bash
      register: _cask_running
      changed_when: false
      failed_when: false
      check_mode: false
      when:
        - homebrew_cask_auto_upgrade | default(true) | bool
        - (_cask_outdated_before.stdout_lines | default([]) | length) > 0

    # Two-phase upgrade strategy. The previous detector-based split was
    # fragile (bash heredoc + jinja join + python pipe = too many failure
    # modes). brew itself is the source of truth: the fast batch upgrades
    # everything it can, then `brew outdated --cask` re-snapshots — anything
    # still outdated is by definition something the fast batch couldn't
    # handle (sudo prompt, asset hash mismatch, etc.) and gets the slow
    # but sudo-aware module loop.

    - name: "Upgrade outdated casks (fast batch — best-effort)"
      ansible.builtin.command: >-
        brew upgrade --cask {{ _safe_to_upgrade | join(' ') }}
      vars:
        _safe_to_upgrade: >-
          {{ (_cask_outdated_before.stdout_lines | default([]))
             | difference(_cask_running.stdout_lines | default([])) }}
      register: _cask_fast_upgrade
      # Never halt on rc!=0 — pkg-installer casks predictably fail here on
      # sudo, and we recover via the homebrew_cask module loop below.
      failed_when: false
      changed_when:
        - _cask_fast_upgrade.rc == 0
        - (_safe_to_upgrade | length) > 0
      environment:
        HOMEBREW_NO_INSTALL_CLEANUP: "1"
      when:
        - homebrew_cask_auto_upgrade | default(true) | bool
        - (_safe_to_upgrade | length) > 0

    - name: "Re-snapshot outdated casks after the fast batch"
      # Anything still in `brew outdated --cask` is what the fast batch
      # couldn't upgrade — typically pkg-installer casks that need sudo.
      ansible.builtin.command: brew outdated --cask --quiet
      register: _cask_outdated_after
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "Upgrade still-outdated casks via homebrew_cask + sudo_password"
      # `community.general.homebrew_cask`'s `sudo_password:` parameter is
      # the canonical way to drive cask upgrades that touch /Library/*.
      # Password comes from the `nos_sudo_password` vars_prompt at playbook
      # start (NOT `ansible_become_password` — Ansible hides that variable
      # from Jinja templates as a security feature, which silently broke
      # the previous version of this task).
      # Module is slower per cask (~30s) than the batch CLI but cleanly
      # handles brew's internal sudo prompts — exactly what pkg-installer
      # casks like dotnet-sdk need. no_log: true keeps the password out
      # of the playbook log.
      community.general.homebrew_cask:
        name: "{{ item }}"
        state: latest
        sudo_password: "{{ nos_sudo_password }}"
      loop: "{{ _cask_outdated_after.stdout_lines | default([]) | difference(_cask_running.stdout_lines | default([])) }}"
      register: _cask_sudo_upgrade
      no_log: true
      when:
        - homebrew_cask_auto_upgrade | default(true) | bool
        - (_cask_outdated_after.stdout_lines | default([]) | length) > 0
        - (nos_sudo_password | default('') | length) > 0

    - name: "Notice: still-outdated casks left for manual upgrade (no sudo password)"
      # Operator pressed Enter at the vars_prompt instead of typing a sudo
      # password, so homebrew_cask can't supply sudo. The surviving
      # outdated casks need a terminal-with-sudo to upgrade. Single-line
      # copy-paste command — not a workaround, this is the deterministic
      # fallback when escalation isn't supplied.
      ansible.builtin.debug:
        msg: |
          {{ _cask_outdated_after.stdout_lines | length }} cask(s) still outdated after the fast batch
          (pkg-installer casks need sudo). Re-run and provide the sudo password at the prompt, or:
            brew upgrade --cask {{ _cask_outdated_after.stdout_lines | join(' ') }}
      when:
        - homebrew_cask_auto_upgrade | default(true) | bool
        - (_cask_outdated_after.stdout_lines | default([]) | length) > 0
        - (nos_sudo_password | default('') | length) == 0

    - name: "Cask upgrade report"
      ansible.builtin.debug:
        msg: |-
          {% set outdated_before = _cask_outdated_before.stdout_lines | default([]) %}
          {% set outdated_after  = _cask_outdated_after.stdout_lines  | default([]) %}
          {% set running = _cask_running.stdout_lines | default([]) %}
          {% set has_become = (nos_sudo_password | default('') | length) > 0 %}
          {% set fast_upgraded = outdated_before | difference(outdated_after) | difference(running) %}
          {% set sudo_upgraded = (outdated_after | difference(running)) if has_become else [] %}
          {% set deferred      = [] if has_become else (outdated_after | difference(running)) %}
          {% set total_upgraded = (fast_upgraded | length) + (sudo_upgraded | length) %}
          {% if outdated_before | length == 0 %}
          Casks: all up-to-date ({{ homebrew_cask_apps | length }} managed).
          {% else %}
          Casks: {{ total_upgraded }} upgraded ({{ fast_upgraded | length }} fast + {{ sudo_upgraded | length }} via sudo), {{ running | length }} skipped (running){% if deferred %}, {{ deferred | length }} skipped (no BECOME password){% endif %}.
          {% if fast_upgraded %}
          Upgraded (fast batch):
          {% for c in fast_upgraded %}  - {{ c }}
          {% endfor %}
          {% endif %}
          {% if sudo_upgraded %}
          Upgraded (sudo-aware path — pkg-installer):
          {% for c in sudo_upgraded %}  - {{ c }}
          {% endfor %}
          {% endif %}
          {% if running %}
          Deferred (quit the app + re-run --tags homebrew):
          {% for c in running %}  - {{ c }}
          {% endfor %}
          {% endif %}
          {% if deferred %}
          Skipped pkg-installer (no -K — re-run with -K or upgrade manually):
          {% for c in deferred %}  - {{ c }}
          {% endfor %}
          {% endif %}
          {% endif %}
      when: homebrew_cask_auto_upgrade | default(true) | bool

    # Brew.
    - name: Ensure blacklisted homebrew packages are not installed.
      homebrew:
        name: "{{ item }}"
        state: absent
      loop: "{{ homebrew_uninstalled_packages }}"

    # The homebrew Ansible module uses the brew Ruby API (60s+ per package in brew 4.x).
    # Replaced with a quick Cellar dir check — brew install only for missing ones.
    - name: Ensure configured homebrew packages are installed.
      ansible.builtin.shell: |
        pkg_name="{{ item.name | default(item) }}"
        pkg_state="{{ item.state | default('present') }}"
        if [ "$pkg_state" = "absent" ]; then
          if [ -d "{{ homebrew_prefix }}/Cellar/${pkg_name}" ]; then
            brew uninstall "${pkg_name}" 2>&1
          else
            echo "ALREADY_ABSENT"
          fi
          exit $?
        fi
        if [ -d "{{ homebrew_prefix }}/Cellar/${pkg_name}" ] || [ -d "{{ homebrew_prefix }}/opt/${pkg_name}" ]; then
          echo "ALREADY_INSTALLED"
          exit 0
        fi
        echo "INSTALLING: ${pkg_name}..."
        if command -v timeout &>/dev/null; then
          timeout 120 brew install "${pkg_name}" {{ item.install_options | default('') }} 2>&1
        else
          brew install "${pkg_name}" {{ item.install_options | default('') }} 2>&1
        fi
        rc=$?
        [ $rc -eq 124 ] && echo "TIMEOUT: ${pkg_name} — install manually: brew install ${pkg_name}" && exit 0
        exit $rc
      args:
        executable: /bin/bash
      register: _brew_result
      changed_when: "'ALREADY_INSTALLED' not in _brew_result.stdout and 'ALREADY_ABSENT' not in _brew_result.stdout"
      failed_when:
        - _brew_result.rc != 0
        - "'already installed' not in _brew_result.stderr"
      loop: "{{ homebrew_installed_packages }}"
      loop_control:
        label: "{{ item.name | default(item) }}"
      environment:
        HOMEBREW_NO_AUTO_UPDATE: "1"
        HOMEBREW_NO_INSTALL_CLEANUP: "1"
      notify:
        - Clear homebrew cache

    - name: "List outdated formulae (snapshot before upgrade)"
      ansible.builtin.command: brew outdated --formula --quiet
      register: _formula_outdated_before
      changed_when: false
      failed_when: false
      check_mode: false
      when: homebrew_upgrade_all_packages | default(false) | bool

    - name: Upgrade all homebrew packages (if configured).
      homebrew:
        update_homebrew: true
        upgrade_all: true
      when: homebrew_upgrade_all_packages
      notify:
        - Clear homebrew cache

    - name: "Formulae upgrade report"
      ansible.builtin.debug:
        msg: |-
          {% set before = _formula_outdated_before.stdout_lines | default([]) %}
          {% if before | length == 0 %}
          Formulae: all up-to-date.
          {% else %}
          Formulae upgraded: {{ before | length }}
          {% for f in before %}
            - {{ f }}
          {% endfor %}
          {% endif %}
      when: homebrew_upgrade_all_packages | default(false) | bool

    - name: Check for Brewfile.
      stat:
        path: "{{ homebrew_brewfile_dir }}/Brewfile"
      register: homebrew_brewfile
      check_mode: false

    - name: Install from Brewfile.
      command: "{{ homebrew_brew_bin_path }}/brew bundle"
      args:
        chdir: "{{ homebrew_brewfile_dir }}"
      when: homebrew_brewfile.stat.exists and homebrew_use_brewfile
