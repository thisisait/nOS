---
# ==============================================================================
# pazny.authentik/tasks/post.yml — post-start health-check only.
#
# Admin user + groups + OIDC providers + applications + RBAC policies are
# managed by the Authentik Blueprints engine (files in /blueprints/custom/,
# rendered by tasks/blueprints.yml). Blueprint reconcile runs on container
# startup, so password, client_secret and other state are applied declaratively
# on every restart.
#
# Service-side OIDC wiring (Gitea API, Nextcloud occ, Portainer UI) stays in
# tasks/stacks/authentik_service_post.yml and runs later in stack-up.yml.
# ==============================================================================

- name: "[pazny.authentik Post] Wait for server to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ authentik_port | default(9003) }}/-/health/ready/"
    status_code: [200, 204]
    timeout: 10
  register: _authentik_health
  retries: 30
  delay: 5
  until: _authentik_health.status | default(0) in [200, 204]
  failed_when: false

- name: "[pazny.authentik Post] Health status"
  ansible.builtin.debug:
    msg: >-
      Authentik {{ 'OK' if _authentik_health.status | default(0) in [200, 204] else 'UNAVAILABLE' }}
      | Admin: https://{{ authentik_domain | default('auth.dev.local') }}/if/admin/
      | Login: akadmin / {{ authentik_bootstrap_password }}
      | (password is re-applied by the blueprint on every container start)
