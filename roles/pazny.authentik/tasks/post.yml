---
# ==============================================================================
# pazny.authentik/tasks/post.yml — post-start health-check only.
#
# Admin user + skupiny + OIDC providery + aplikace + RBAC politiky spravuje
# Authentik Blueprints engine (soubory v /blueprints/custom/, render v
# tasks/blueprints.yml). Blueprint reconcile probiha pri startu containeru →
# password, client_secret a ostatni state se propisuji deklarativne na
# kazdy restart.
#
# Service-side OIDC napojeni (Gitea API, Nextcloud occ, Portainer UI)
# zustava v tasks/stacks/authentik_service_post.yml a bezi pozdeji v
# stack-up.yml.
# ==============================================================================

- name: "[pazny.authentik Post] Wait for server to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ authentik_port | default(9003) }}/-/health/ready/"
    status_code: [200, 204]
    timeout: 10
  register: _authentik_health
  retries: 30
  delay: 5
  until: _authentik_health.status | default(0) in [200, 204]
  failed_when: false

- name: "[pazny.authentik Post] Health status"
  ansible.builtin.debug:
    msg: >-
      Authentik {{ 'OK' if _authentik_health.status | default(0) in [200, 204] else 'NEDOSTUPNY' }}
      | Admin: https://{{ authentik_domain | default('auth.dev.local') }}/if/admin/
      | Login: akadmin / {{ authentik_bootstrap_password }}
      | (heslo se re-applyuje blueprintem pri kazdem startu containeru)
