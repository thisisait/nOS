---
# ==============================================================================
# Authentik Blueprints — declarative YAML state management
#
# Blueprints in /blueprints/custom/ are auto-discovered by Authentik and
# reconciled on every startup + on file change (inotify). The blueprint engine
# re-applies the `password` field on `authentik_core.user` on every reconcile
# cycle, so prefix drift propagates to the existing akadmin user without a DB DROP.
#
# Called from tasks/main.yml (which runs from core-up.yml BEFORE `docker compose
# up infra --wait`) so the /blueprints/custom bind source exists before Docker
# creates the mount point.
# ==============================================================================

- name: "[pazny.authentik Blueprints] Ensure directory"
  ansible.builtin.file:
    path: "{{ stacks_dir }}/infra/authentik/blueprints"
    state: directory
    mode: '0755'

- name: "[pazny.authentik Blueprints] Render admin + groups"
  ansible.builtin.template:
    src: "blueprints/00-admin-groups.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/00-admin-groups.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints

# 10-oidc-apps.yaml is authoritative-rendered by authentik-base plugin
# (D1.2 2026-05-05). The plugin's pre_compose hook iterates
# inputs.clients (per-plugin authentik: blocks harvested by the
# aggregator with feature_flag gating + Jinja pre-render). Role-side
# template + task removed in the same commit. See
# files/anatomy/plugins/authentik-base/blueprints/10-oidc-apps.yaml.j2.

- name: "[pazny.authentik Blueprints] Render RBAC expression policies + bindings"
  ansible.builtin.template:
    src: "blueprints/20-rbac-policies.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/20-rbac-policies.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints

- name: "[pazny.authentik Blueprints] Render agent OAuth2 clients (Track B)"
  # Track B: machine-to-machine OIDC clients used by Bone callers
  # (state-manager, OpenClaw, Wing). Source list:
  # `authentik_agent_clients` + `authentik_agent_scopes` in default.config.yml.
  ansible.builtin.template:
    src: "blueprints/30-agent-clients.yaml.j2"
    dest: "{{ stacks_dir }}/infra/authentik/blueprints/30-agent-clients.yaml"
    mode: '0640'
  notify: Reapply authentik blueprints
