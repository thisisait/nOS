---
# ==============================================================================
# pazny.authentik/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/authentik.yml and calls blueprints.yml
# to render 3 blueprints into {{ stacks_dir }}/infra/authentik/blueprints
# (bind source for /blueprints/custom in the compose env; blueprints.yml
# also creates this directory).
#
# Post-start health-check lives in tasks/post.yml — called from core-up.yml
# AFTER `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.authentik] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ authentik_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.authentik] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/authentik.yml"
    mode: '0600'
  notify: Restart authentik

- name: "[pazny.authentik] Render blueprints (admin/groups, OIDC apps, RBAC)"
  ansible.builtin.include_tasks: blueprints.yml
