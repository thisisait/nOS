---
# ==============================================================================
# pazny.firefly/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p b2b up`:
# creates the data dirs, renders the compose override fragment do
# {{ stacks_dir }}/b2b/overrides/firefly.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Firefly uses the remote_user_guard pattern (REMOTE_USER header) via Authentik
# proxy outpost — no post-start OIDC setup. User is created on the first
# login via nginx auth_request.
# ==============================================================================

- name: "[pazny.firefly] Assert firefly_app_key is valid Laravel APP_KEY"
  ansible.builtin.assert:
    that:
      - "'placeholder' not in firefly_app_key"
      - "firefly_app_key is match('^base64:[A-Za-z0-9+/=]{43,44}$')"
    fail_msg: |
      firefly_app_key is not a valid Laravel APP_KEY (base64:<32-byte base64>).
      Firefly III Laravel crashes at startup if APP_KEY is not exactly 32 bytes.

      Oprava — zvol jeden z:
        1. First run with -e blank=true (main.yml generates a valid key — destructive group)
        2. Set your own in credentials.yml:
             firefly_app_key: "base64:$(openssl rand -base64 32)"
        3. Manually run: openssl rand -base64 32 | sed 's|^|base64:|'

- name: "[pazny.firefly] Ensure data directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ firefly_upload_dir }}"
    - "{{ firefly_export_dir }}"

- name: "[pazny.firefly] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/firefly.yml"
    mode: '0600'
  notify: Restart firefly

- name: "[pazny.firefly] Deploy nginx vhost"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/nginx/sites-available/firefly.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/firefly.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.firefly] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/firefly.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/firefly.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.firefly] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Firefly III (Docker) ready
      ══════════════════════════════════════════════════════
       URL:       https://{{ firefly_domain }}
       Container: firefly → 127.0.0.1:{{ firefly_port | default(3014) }}
       Upload:    {{ firefly_upload_dir }}
       Export:    {{ firefly_export_dir }}
       DB:        {{ firefly_db_name }} @ mariadb (b2b_net)
       SSO:       Authentik proxy outpost (REMOTE_USER)

       Add to /etc/hosts:   127.0.0.1 {{ firefly_domain }}
      ══════════════════════════════════════════════════════
