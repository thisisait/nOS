---
# ==============================================================================
# pazny.firefly — Firefly III personal finance manager (b2b compose stack)
#
# Credentials (firefly_db_password, firefly_app_key) live in
# default.credentials.yml — centralized for prefix rotation.
# firefly_app_key is the Laravel APP_KEY (base64:<32b>) — auto-generated
# by main.yml on the first blank=true run (see INTEGRATION.md).
#
# Firefly III uses the remote_user_guard pattern: Authentik handles authentication
# proxy outpost via nginx auth_request, Firefly receives the REMOTE_USER header.
# No native OIDC env vars — hence they are not in the authentik_oidc_*_client_* list.
# ==============================================================================

firefly_version: "version-6.2.21"
firefly_domain: "firefly.{{ instance_tld | default('dev.local') }}"
firefly_port: 3014
firefly_upload_dir: "{{ ansible_facts['env']['HOME'] }}/firefly/upload"
firefly_export_dir: "{{ ansible_facts['env']['HOME'] }}/firefly/export"
firefly_db_name: "firefly"
firefly_db_user: "firefly"
firefly_db_host: "127.0.0.1"    # ignored when install_mariadb=true (uses 'mariadb' on b2b_net instead)
firefly_site_owner: "{{ default_admin_email }}"
firefly_tz: "Europe/Prague"
firefly_default_language: "en_US"
firefly_mem_limit: "{{ docker_mem_limit_standard | default('1g') }}"
firefly_cpus: "{{ docker_cpus_standard | default('1.0') }}"
