---
# pazny.firefly — handlers
# Triggered via notify: after the override template is re-rendered.
# (Restart nginx handler je definovany na play-level v main.yml.)

- name: Restart firefly
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/b2b/docker-compose.yml" -p b2b
    restart firefly
  failed_when: false
