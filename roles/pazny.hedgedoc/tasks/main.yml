---
# ==============================================================================
# pazny.hedgedoc/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up b2b`:
# creates the uploads data dir, renders the compose override fragment to
# {{ stacks_dir }}/b2b/overrides/hedgedoc.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# HedgeDoc has native OIDC (Authentik) via CMD_OAUTH2_* env vars —
# zadny post-start setup is not required (user is created on the first OIDC login).
# ==============================================================================

- name: "[pazny.hedgedoc] Ensure uploads directory exists"
  ansible.builtin.file:
    path: "{{ hedgedoc_data_dir | default(ansible_facts['env']['HOME'] + '/hedgedoc/uploads') }}"
    state: directory
    mode: '0755'

- name: "[pazny.hedgedoc] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/hedgedoc.yml"
    mode: '0600'
  notify: Restart hedgedoc
