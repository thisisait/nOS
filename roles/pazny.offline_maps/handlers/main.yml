---
# pazny.offline_maps — handlers
# Handler name odrazi role name (`offline_maps`); target je compose
# service `tileserver`. Called from tasks/main.yml on change of the compose override.

- name: Restart offline_maps
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart tileserver
  failed_when: false
