---
# ==============================================================================
# pazny.offline_maps/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates the data dir, renders tileserver-gl config.json, downloads
# volitelne MBTiles, enabluje nginx vhost, vyhodi helper download-maps.sh
# a renders the compose override fragment do
# {{ stacks_dir }}/iiab/overrides/tileserver.yml.
#
# Zadny post-start — tileserver slouzi MBTiles staticky.
#
# Pozn.: Legacy tasks/iiab/maps.yml obsahovalo npm install tileserver-gl +
# launchd plist (host-side install). Now runs via the Docker container
# `tileserver` from the compose override, so host-side npm/launchd is skipped.
# ==============================================================================

- name: "[pazny.offline_maps] Ensure maps data directory exists"
  ansible.builtin.file:
    path: "{{ maps_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.offline_maps] Ensure fonts and styles directories exist"
  ansible.builtin.file:
    path: "{{ maps_data_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - fonts
    - styles

- name: "[pazny.offline_maps] Check for MBTiles files"
  ansible.builtin.find:
    paths: "{{ maps_data_dir }}"
    patterns: "*.mbtiles"
  register: _mbtiles_found

- name: "[pazny.offline_maps] Download init MBTiles ({{ maps_init_mbtiles_dest }})"
  ansible.builtin.get_url:
    url: "{{ maps_init_mbtiles_url }}"
    dest: "{{ maps_data_dir }}/{{ maps_init_mbtiles_dest }}"
    mode: '0644'
    timeout: 600
  when:
    - _mbtiles_found.matched == 0
    - maps_init_mbtiles_url | default('') | length > 0
  failed_when: false

- name: "[pazny.offline_maps] Download configured MBTiles files"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ maps_data_dir }}/{{ item.dest }}"
    mode: '0644'
    timeout: 3600
  loop: "{{ maps_mbtiles_files | default([]) }}"
  when: (maps_mbtiles_files | default([])) | length > 0
  failed_when: false

- name: "[pazny.offline_maps] Re-check for MBTiles files after downloads"
  ansible.builtin.find:
    paths: "{{ maps_data_dir }}"
    patterns: "*.mbtiles"
  register: _mbtiles_post

- name: "[pazny.offline_maps] Create tileserver-gl configuration"
  ansible.builtin.copy:
    dest: "{{ maps_data_dir }}/config.json"
    # Without at least one .mbtiles the data block must be absent — tileserver-gl
    # logs "Not valid input file: /data/*.mbtiles" and refuses to start otherwise.
    content: |
      {
        "options": {
          "paths": {
            "root": "/data",
            "fonts": "/data/fonts",
            "styles": "/data/styles",
            "mbtiles": "/data"
          }
        },
        "styles": {}{% if _mbtiles_post.matched | default(0) > 0 %},
        "data": {
          "v3": {
            "mbtiles": "/data/*.mbtiles"
          }
        }{% endif %}
      }
    force: true
    mode: '0644'

- name: "[pazny.offline_maps] Deploy nginx reverse proxy vhost"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/nginx/sites-available/maps.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/maps.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.offline_maps] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/maps.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/maps.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.offline_maps] Create MBTiles download helper script"
  ansible.builtin.copy:
    dest: "{{ maps_data_dir }}/download-maps.sh"
    content: |
      #!/usr/bin/env zsh
      # Helper script for downloading MBTiles map data
      # After download, re-run the playbook to update tileserver config.json.
      #
      # FREE SOURCES (no registration required):
      #   OpenFreeMap — vector tiles, country/region extracts
      #     https://openfreemap.org/
      #   Natural Earth — world base map (zoom 0-6), ~30 MB
      #     https://github.com/lukasmartinelli/naturalearthdata/releases
      #
      # CZECH REPUBLIC — small, under 300 MB:
      #   1. Go to https://openfreemap.org/  → download the Czech Republic extract
      #   2. Save as {{ maps_data_dir }}/czech-republic.mbtiles
      #   3. Re-run: ansible-playbook main.yml -K --tags offline_maps
      #
      # MAPTILER (free tier, requires account):
      #   https://cloud.maptiler.com/tiles/  → download OpenStreetMap regional tiles
      #
      # Usage:
      #   ./download-maps.sh <url> <dest-filename>
      set -euo pipefail
      DATA_DIR="{{ maps_data_dir }}"

      if [ $# -lt 2 ]; then
        echo "Usage: $0 <url> <dest-filename>"
        echo "Example: $0 https://example.com/czech-republic.mbtiles czech-republic.mbtiles"
        exit 1
      fi

      URL="$1"
      FILENAME="$2"
      echo "Downloading: $URL -> $DATA_DIR/$FILENAME"
      curl -L --progress-bar -o "$DATA_DIR/$FILENAME" "$URL"
      echo "Done. Restart tileserver: docker compose -p iiab restart tileserver"
    mode: '0755'

- name: "[pazny.offline_maps] Print installation info"
  ansible.builtin.debug:
    msg: |
      ======================================================
       Tileserver-gl (offline mapy) nainstalovan
      ======================================================
       URL:       https://{{ maps_domain | default('maps' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
       Port:      {{ maps_port | default(8070) }}
       Data dir:  {{ maps_data_dir }}

       Stazeni mapovych dat:
         {{ maps_data_dir }}/download-maps.sh

       Or add to default.config.yml:
         maps_mbtiles_files:
           - url: "https://..."
             dest: "czech-republic.mbtiles"

       Add to /etc/hosts:  127.0.0.1 {{ maps_domain | default('maps' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
      ======================================================

- name: "[pazny.offline_maps] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/tileserver.yml"
    mode: '0600'
  notify: Restart offline_maps
