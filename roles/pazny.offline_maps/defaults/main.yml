---
# ==============================================================================
# pazny.offline_maps — tileserver-gl + MBTiles offline maps (iiab compose stack)
#
# Role name `offline_maps` odrazi celou offline-maps subsystemu:
#   - Docker service `tileserver` (compose override)
#   - MBTiles download (maps_mbtiles_files list)
#   - tileserver-gl config.json render
#
# Centralized variables staysji v default.config.yml (nginx vhost
# render, blank-reset path resolver).
# ==============================================================================

maps_tileserver_version: "latest"                   # maptiler/tileserver-gl image tag
maps_port: 8070                                     # Docker host port (compose template default)
maps_domain: "maps{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
maps_data_dir: "{{ ansible_facts['env']['HOME'] }}/maps"

# Init MBTiles — small file downloaded automatically so tileserver starts.
# Without at least one .mbtiles file tileserver-gl logs "No valid data input"
# and serves an empty tile map. Set to "" to disable auto-download.
# Zurich demo (~2 MB) is the tileserver-gl reference fixture — proof of life only.
# Replace with Czech Republic (see download-maps.sh) for a real local map.
maps_init_mbtiles_url: "https://raw.githubusercontent.com/maptiler/tileserver-gl/master/test_fixtures/zurich_switzerland.mbtiles"
maps_init_mbtiles_dest: "zurich_switzerland.mbtiles"

# Additional MBTiles files to download (empty = do not download automatically)
maps_mbtiles_files: []

tileserver_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
tileserver_cpus: "{{ docker_cpus_light | default('0.5') }}"
