---
# ==============================================================================
# pazny.gitea/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p devops up`:
# creates the data dir, enables the nginx vhost, renders the compose override
# fragment to {{ stacks_dir }}/devops/overrides/gitea.yml which then
# stack-up.yml collects via `find` and passes as an additional -f flag.
#
# Post-start admin-user setup lives in tasks/post.yml — called AFTER
# `docker compose up devops --wait`.
# ==============================================================================

- name: "[pazny.gitea] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ gitea_data_dir | default(ansible_facts['env']['HOME'] + '/gitea') }}"
    state: directory
    mode: '0755'

# Stop the old Homebrew Gitea (if running from an earlier iteration of the project)
- name: "[pazny.gitea] Stop old Homebrew Gitea service"
  ansible.builtin.command: "{{ playbook_dir }}/files/brew-svc.sh stop gitea"
  register: _gitea_brew_stop
  changed_when: "'Stopping' in (_gitea_brew_stop.stdout | default(''))"
  failed_when: false

- name: "[pazny.gitea] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/gitea.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/gitea.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.gitea] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/devops/overrides/gitea.yml"
    mode: '0600'
  notify: Restart gitea
