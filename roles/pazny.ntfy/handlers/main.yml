---
# pazny.ntfy — handlers
# Fallback handler pro samostatne pouziti role; coordinator Phase B
# muze definovat play-level variantu.

- name: Restart ntfy
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart ntfy
  failed_when: false
