---
# ==============================================================================
# pazny.ntfy/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`:
# 1) creates the data dir,
# 2) renders server.yml config into the data dir (mount :ro),
# 3) renders the compose override fragment.
# ==============================================================================

- name: "[pazny.ntfy] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ ntfy_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.ntfy] Ensure attachments directory exists"
  ansible.builtin.file:
    path: "{{ ntfy_data_dir }}/attachments"
    state: directory
    mode: '0755'

- name: "[pazny.ntfy] Render ntfy server.yml config"
  ansible.builtin.template:
    src: server.yml.j2
    dest: "{{ ntfy_data_dir }}/server.yml"
    mode: '0644'
  notify: Restart ntfy

- name: "[pazny.ntfy] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/ntfy.yml"
    mode: '0600'
  notify: Restart ntfy
