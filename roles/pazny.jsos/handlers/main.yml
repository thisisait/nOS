---
# pazny.jsos — handlers
# Restart jsos is also defined play-level in main.yml for backward
# kompatibilitu s notify: z tasku mimo tuto roli. Play-level handler
# takes priority, so this role-local one is effectively unreachable,
# but the definition stays for role independence.

- name: Restart jsos
  ansible.builtin.shell: |
    source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh && \
    pm2 restart jsos 2>/dev/null || \
    pm2 start {{ jsos_dir | default('~/projects/jsOs') }}/ecosystem.config.js
    pm2 save --force
  args:
    executable: /bin/bash
  failed_when: false
