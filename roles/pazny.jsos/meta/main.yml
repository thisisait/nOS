---
galaxy_info:
  role_name: jsos
  namespace: pazny
  author: Pázny
  description: jsOS web desktop (OS.js v3, Node.js, PM2) for nOS
  license: MIT
  min_ansible_version: "2.20"
  platforms:
    - name: MacOSX
      versions:
        - all

# No role dependencies — Node.js (NVM), PostgreSQL and Redis are
# installed / started outside this role in main.yml and tasks/stacks/core-up.yml.
# Source files (files/jsos/, files/project-jsOs/) and template files
# stay in the playbook repo and the role references them via {{ playbook_dir }}.
# Tasks use only ansible.builtin, no extra collections.
dependencies: []
