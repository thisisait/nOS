---
# ==============================================================================
# pazny.jsos — jsOS web desktop (OS.js v3)
#
# Sensitive data (jsos_session_secret, jsos_db_password) stay in top-level
# default.credentials.yml so prefix rotation via global_password_prefix
# works consistently. App source files/jsos/ and files/project-jsOs/
# stay in the playbook repo — the role references them via playbook_dir path.
# ==============================================================================

jsos_domain: "jsos.dev.local"
jsos_port: 8070
jsos_dir: "{{ ansible_facts['env']['HOME'] }}/projects/jsOs"
jsos_db_name: "jsos"
jsos_db_user: "jsos"
jsos_bluesky_pds_url: "https://bsky.social"
jsos_admin_handles: []
jsos_provision_s3_buckets: true
jsos_provision_databases: true
jsos_provision_redis_namespace: true
