---
# ==============================================================================
# pazny.wordpress/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates the data dir, nginx vhost, renders the compose override fragment do
# {{ stacks_dir }}/iiab/overrides/wordpress.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start wp-cli install + admin password reconverge lives in tasks/post.yml —
# called from stack-up.yml AFTER compose up (wordpress must be running before
# call `wp core install` and `wp user update`).
# ==============================================================================

- name: "[pazny.wordpress] Ensure WordPress directory exists"
  ansible.builtin.file:
    path: "{{ wordpress_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.wordpress] Ensure mu-plugins staging directory exists"
  ansible.builtin.file:
    path: "{{ stacks_dir }}/iiab/wordpress/mu-plugins"
    state: directory
    mode: '0755'

# Copy the OIDC auto-configurator as a must-use plugin. Mu-plugins load on
# every request with no activation step, so the openid-connect-generic
# settings get pushed as soon as the plugin itself is installed.
- name: "[pazny.wordpress] Stage OIDC mu-plugin (auto-configures openid-connect-generic)"
  ansible.builtin.copy:
    src: oidc-mu-plugin.php
    dest: "{{ stacks_dir }}/iiab/wordpress/mu-plugins/oidc-bootstrap.php"
    mode: '0644'
  notify: Restart wordpress

- name: "[pazny.wordpress] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/wordpress.yml"
    mode: '0600'
  notify: Restart wordpress

- name: "[pazny.wordpress] Deploy nginx vhost"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/nginx/sites-available/wordpress.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/wordpress.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.wordpress] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/wordpress.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/wordpress.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.wordpress] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       WordPress (Docker) ready
      ══════════════════════════════════════════════════════
       URL:       https://{{ wordpress_domain }}
       Container: wordpress → 127.0.0.1:{{ wordpress_port | default(8084) }}
       Data:      {{ wordpress_dir }}
       DB:        {{ wordpress_db_name }} @ mariadb (iiab_net)
       SSO:       {% if install_authentik | default(false) %}Authentik native OIDC (openid-connect-generic){% else %}disabled{% endif %}

       Finish: go to https://{{ wordpress_domain }}/wp-admin/install.php
       Add to /etc/hosts:   127.0.0.1 {{ wordpress_domain }}
      ══════════════════════════════════════════════════════
