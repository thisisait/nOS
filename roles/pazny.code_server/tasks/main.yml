---
# ==============================================================================
# pazny.code_server/tasks/main.yml
#
# Volano (v Phase B) z tasks/stacks/stack-up.yml PRED `docker compose up devops`:
# vytvori data + workspace adresar, vyrenderuje compose override fragment do
# {{ stacks_dir }}/devops/overrides/code-server.yml a linkuje nginx vhost.
#
# Post-start setup neni potreba — code-server je stateless web editor,
# autentizaci resi Authentik forward_auth v nginx.
# ==============================================================================

- name: "[pazny.code_server] Ensure data and workspace directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ code_server_data_dir }}"
    - "{{ code_server_workspace_dir }}"

- name: "[pazny.code_server] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/devops/overrides/code-server.yml"
    mode: '0644'
  notify: Restart code_server

- name: "[pazny.code_server] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/code-server.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/code-server.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)
