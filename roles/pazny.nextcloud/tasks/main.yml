---
# ==============================================================================
# pazny.nextcloud/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates the data dir, nginx vhost, renders the compose override fragment do
# {{ stacks_dir }}/iiab/overrides/nextcloud.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start DB password sync + admin reconverge + trusted_domains je
# v tasks/post.yml — called from stack-up.yml az PO compose up.
# ==============================================================================

- name: "[pazny.nextcloud] Ensure directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - "{{ nextcloud_dir }}"
    - "{{ nextcloud_data_dir }}"

- name: "[pazny.nextcloud] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/nextcloud.yml"
    mode: '0600'
  notify: Restart nextcloud

- name: "[pazny.nextcloud] Deploy nginx vhost"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/nginx/sites-available/nextcloud.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/nextcloud.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.nextcloud] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/nextcloud.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/nextcloud.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[pazny.nextcloud] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Nextcloud (Docker) ready
      ══════════════════════════════════════════════════════
       URL:       https://{{ nextcloud_domain }}
       Container: nextcloud → 127.0.0.1:{{ nextcloud_port | default(8085) }}
       Data:      {{ nextcloud_data_dir }}
       DB:        {{ nextcloud_db_name }} @ mariadb (iiab_net)

       Add to /etc/hosts:   127.0.0.1 {{ nextcloud_domain }}
      ══════════════════════════════════════════════════════
