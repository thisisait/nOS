---
# pazny.nextcloud — handlers
# Play-level "Restart nextcloud" in main.yml takes priority; this one stays
# for standalone use of the role outside the nOS playbook.

- name: Restart nextcloud
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart nextcloud
  failed_when: false
