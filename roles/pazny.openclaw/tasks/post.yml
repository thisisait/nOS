---
# ==============================================================================
# pazny.openclaw/tasks/post.yml — Wing API token provisioning for OpenClaw.
#
# Runs after Wing post.yml has already initialized wing.db (wing comes
# before openclaw in stack-up.yml ordering). Provisions a dedicated
# api_tokens row named "openclaw" so the agent has its own identity in
# the Wing audit trail, separate from the "ansible-provisioned" operator
# token. Idempotent — provision-token.php is INSERT-or-replace by name.
# ==============================================================================

- name: "[OpenClaw] Provision Wing API token for OpenClaw agent"
  ansible.builtin.command:
    argv:
      - php
      - "{{ wing_app_dir }}/bin/provision-token.php"
      - --db={{ wing_data_dir }}/wing.db
      - --token={{ openclaw_wing_api_token }}
      - --name=openclaw
    chdir: "{{ wing_app_dir }}"
  register: _oc_wing_token
  changed_when: >
    'Created' in (_oc_wing_token.stdout | default(''))
    or 'Updated' in (_oc_wing_token.stdout | default(''))
  no_log: true
