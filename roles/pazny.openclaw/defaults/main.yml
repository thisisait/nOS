---
# ==============================================================================
# pazny.openclaw — Self-hosted AI agent with Ollama MLX backend (Inspektor Klepitko)
#
# Dokumentace: https://github.com/openclaw/openclaw
# Ollama integrace: https://ollama.com/blog/openclaw
# ==============================================================================

# User and home directory for the agentic environment
openclaw_user: "{{ ansible_facts['user_id'] }}"
openclaw_base_dir: "{{ ansible_facts['env']['HOME'] }}"

# Directories of the agentic system
openclaw_agents_dir: "{{ ansible_facts['env']['HOME'] }}/agents"         # installation, agent configuration
openclaw_projects_dir: "{{ ansible_facts['env']['HOME'] }}/projects"     # projects hosted via nginx
openclaw_log_dir: "{{ ansible_facts['env']['HOME'] }}/agents/log"        # structured .md logs

# OpenClaw configuration (~/.openclaw/)
openclaw_config_dir: "~/.openclaw"

# ─────────────────────────────────────────────────────────────────────────────
# OLLAMA + MLX (Apple Silicon native, Ollama 0.20+)
# ─────────────────────────────────────────────────────────────────────────────
# MLX backend je default na Apple Silicon od 0.20 (0.19 preview, 0.21 stable).
# On M2 Ultra: +40-60% tok/s, unified-memory zero-copy, better scheduler.
# NPU speedups (M5+) do not work here, but MLX still beats llama.cpp.
#
# Primary agent model — qwen3-coder:30b MoE (3.3B active of 30B total):
#   - RL-trained for SWE-bench + tool calling (best for MCP agent loops)
#   - 256K context, ~19 GB disk, ~19 GB RAM when active
#   - Leaves ~15 GB for the Docker stack
openclaw_model: "qwen3-coder:30b"

# Dalsi modely ke stazeni (oprava: ollama pull v main.yml loopu)
# See `openclaw_additional_models` for MoE fallback + dense heavy-duty
ollama_max_loaded_models: 1      # 1 for MoE 30B (dense); 2 if you use 20B/14B
ollama_num_parallel: 2           # Max paralelnich inference requestu
ollama_keep_alive: "5m"          # Uvolnit model z RAM po necinnosti
ollama_flash_attention: 1        # Flash attention pro MLX (rychlejsi, mene pameti)

# KV cache quantization — pulka pameti kontextu vs f16, zanedbatelna ztrata kvality
# na Qwen3/Gemma/Llama-3.3 (command-r + vanilla llama3 nepodporovane → fallback f16).
# Requires flash_attention=1. Stay <= 256K ctx to avoid crash #11619.
ollama_kv_cache_type: "q8_0"     # q8_0 = -50% RAM kontextu; q4_0 = -75% ale horsi reasoning

# Context window limit — BEZ LIMITU Ollama rezervuje plny context modelu
# (qwen3-coder:30b = 262K = ~47GB RAM just for KV cache!).
# 32K is a reasonable default for agentic use cases; for specific large-context
# task muzes override per-request via API.
ollama_context_length: 32768

# Additional models — downloaded via ollama pull in main.yml.
# Default = just 1 dense for heavy tasks (qwen3-coder:30b primary + qwen2.5-coder:32b = ~40GB).
# Full stack (4 more models, +90GB) — add in config.yml via:
#   openclaw_additional_models:
#     - "qwen3:30b-a3b"      # MoE generalist
#     - "gpt-oss:20b"        # MoE lightweight fallback
#     - "qwen2.5-coder:32b"  # Dense coder
#     - "qwen3:32b"          # Dense reasoning
openclaw_additional_models:
  - "qwen2.5-coder:32b"          # Dense coder (20 GB) — GPT-4o-class code refactoring

# Path to downloaded models — persistent even with --blank.
# On external SSD: {{ external_storage_root }}/llmModels (override via external-paths.yml).
# Fallback: ~/.ollama/models (default Ollama path, does NOT survive --blank).
ollama_models_dir: "{{ ansible_facts['env']['HOME'] }}/.ollama/models"

# Run openclaw as a launchd daemon (always running, autorestart)
openclaw_install_daemon: true
openclaw_domain: "claw.dev.local"
openclaw_gateway_port: 18789

# Agent name (persona)
openclaw_agent_name: "Inspektor Klepítko"

# Concurrent sub-agents
openclaw_max_concurrent_agents: 4
openclaw_max_concurrent_subagents: 8
