---
# ==============================================================================
# pazny.openclaw — Self-hosted AI agent s Ollama MLX backendem (Inspektor Klepítko)
#
# Dokumentace: https://github.com/openclaw/openclaw
# Ollama integrace: https://ollama.com/blog/openclaw
# ==============================================================================

# Uživatel a domovský adresář pro agentické prostředí
openclaw_user: "{{ ansible_facts['user_id'] }}"
openclaw_base_dir: "{{ ansible_facts['env']['HOME'] }}"

# Adresáře agentického systému
openclaw_agents_dir: "{{ ansible_facts['env']['HOME'] }}/agents"         # instalace, konfigurace agentů
openclaw_projects_dir: "{{ ansible_facts['env']['HOME'] }}/projects"     # projekty hostované přes nginx
openclaw_log_dir: "{{ ansible_facts['env']['HOME'] }}/agents/log"        # strukturované .md logy

# OpenClaw konfigurace (~/.openclaw/)
openclaw_config_dir: "~/.openclaw"

# ─────────────────────────────────────────────────────────────────────────────
# OLLAMA + MLX (Apple Silicon native, Ollama 0.20+)
# ─────────────────────────────────────────────────────────────────────────────
# MLX backend je default na Apple Silicon od 0.20 (0.19 preview, 0.21 stable).
# Na M2 Ultra: +40-60% tok/s, unified-memory zero-copy, lepsi scheduler.
# NPU speedups (M5+) tady nefunguji, ale MLX stejne predci llama.cpp.
#
# Primarni agent model – qwen3-coder:30b MoE (3.3B aktivnich z 30B celkem):
#   - RL-trained pro SWE-bench + tool calling (nejlepsi pro MCP agent loops)
#   - 256K kontext, ~19 GB disk, ~19 GB RAM pri aktivnim
#   - Nechava ~15 GB pro Docker stack
openclaw_model: "qwen3-coder:30b"

# Dalsi modely ke stazeni (oprava: ollama pull v main.yml loopu)
# Viz `openclaw_additional_models` pro MoE fallback + dense heavy-duty
ollama_max_loaded_models: 1      # 1 pro MoE 30B (hustej); 2 pokud pouzivas 20B/14B
ollama_num_parallel: 2           # Max paralelnich inference requestu
ollama_keep_alive: "5m"          # Uvolnit model z RAM po necinnosti
ollama_flash_attention: 1        # Flash attention pro MLX (rychlejsi, mene pameti)

# KV cache quantization — pulka pameti kontextu vs f16, zanedbatelna ztrata kvality
# na Qwen3/Gemma/Llama-3.3 (command-r + vanilla llama3 nepodporovane → fallback f16).
# Vyzaduje flash_attention=1. Stay <= 256K ctx aby se vyhnuli crashi #11619.
ollama_kv_cache_type: "q8_0"     # q8_0 = -50% RAM kontextu; q4_0 = -75% ale horsi reasoning

# Context window limit — BEZ LIMITU Ollama rezervuje plny context modelu
# (qwen3-coder:30b = 262K = ~47GB RAM jen na KV cache!).
# 32K je rozumny default pro agentic use cases; pro specific large-context
# task muzes override per-request via API.
ollama_context_length: 32768

# Dalsi modely — stahne se pres ollama pull v main.yml.
# Default = jen 1 dense pro heavy tasks (qwen3-coder:30b primary + qwen2.5-coder:32b = ~40GB).
# Kompletni stack (4 dalsi modely, +90GB) pridej v config.yml pres:
#   openclaw_additional_models:
#     - "qwen3:30b-a3b"      # MoE generalist
#     - "gpt-oss:20b"        # MoE lightweight fallback
#     - "qwen2.5-coder:32b"  # Dense coder
#     - "qwen3:32b"          # Dense reasoning
openclaw_additional_models:
  - "qwen2.5-coder:32b"          # Dense coder (20 GB) — GPT-4o-class code refactoring

# Cesta ke stáhnutým modelům — persistent i při --blank.
# Na externím SSD: {{ external_storage_root }}/llmModels (override přes external-paths.yml).
# Fallback: ~/.ollama/models (default Ollama path, NEpřežije --blank).
ollama_models_dir: "{{ ansible_facts['env']['HOME'] }}/.ollama/models"

# Spustit openclaw jako launchd daemon (vždy běžící, autorestart)
openclaw_install_daemon: true
openclaw_domain: "claw.dev.local"
openclaw_gateway_port: 18789

# Jméno agenta (persona)
openclaw_agent_name: "Inspektor Klepítko"

# Concurrent sub-agents
openclaw_max_concurrent_agents: 4
openclaw_max_concurrent_subagents: 8
