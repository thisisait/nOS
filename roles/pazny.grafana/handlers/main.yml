---
# pazny.grafana — handlers
# Play-level "Restart grafana" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart grafana
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart grafana
  failed_when: false
