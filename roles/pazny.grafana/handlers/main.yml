---
# pazny.grafana — handlers
# Play-level "Restart grafana" v main.yml ma prednost; tento zustava pro
# samostatne pouziti role mimo devBoxNOS playbook.

- name: Restart grafana
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart grafana
  failed_when: false
