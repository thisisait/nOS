---
# ==============================================================================
# pazny.grafana/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose -p observability up`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/observability/overrides/grafana.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Provisioning renders (datasources/all.yml, dashboards/all.yml) zustavaji
# v core-up.yml — zavisi na authentik_oidc_* + service registry state a
# vyhraly jen nenulovou hodnotu zde.
#
# Post-start admin password reconverge je v tasks/post.yml — volany z
# core-up.yml az PO `docker compose up observability --wait`.
# ==============================================================================

- name: "[pazny.grafana] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ grafana_data_dir | default(stacks_dir + '/observability/grafana/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.grafana] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/grafana.yml"
    mode: '0644'
  notify: Restart grafana
