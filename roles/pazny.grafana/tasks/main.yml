---
# ==============================================================================
# pazny.grafana/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose -p observability up`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/observability/overrides/grafana.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Provisioning renders (datasources/all.yml, dashboards/all.yml) staysji
# v core-up.yml — zavisi na authentik_oidc_* + service registry state a
# will only take a non-zero value here.
#
# Post-start admin password reconverge lives in tasks/post.yml — called from
# core-up.yml az PO `docker compose up observability --wait`.
# ==============================================================================

- name: "[pazny.grafana] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ grafana_data_dir | default(stacks_dir + '/observability/grafana/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.grafana] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/grafana.yml"
    mode: '0600'
  notify: Restart grafana
