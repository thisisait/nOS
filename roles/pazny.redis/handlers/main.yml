---
# pazny.redis — handlers
# Restart redis je definovany i na play-level v main.yml pro zpetnou
# kompatibilitu s notify: z tasku mimo tuto roli. Play-level handler
# prebira prednost, takze tenhle role-lokalni je prakticky unreachable,
# ale definovany zustava kvuli samostatnosti role.

- name: Restart redis
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart redis
  failed_when: false
