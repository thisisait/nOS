---
# ==============================================================================
# pazny.redis/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/redis.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Redis has no post.yml — no setup is required after startup
# (authentication and persistence are configured in the compose command:).
# ==============================================================================

- name: "[pazny.redis] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ redis_data_dir | default(ansible_facts['env']['HOME'] + '/redis/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.redis] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/redis.yml"
    mode: '0600'
  notify: Restart redis
