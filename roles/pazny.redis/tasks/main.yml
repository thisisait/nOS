---
# ==============================================================================
# pazny.redis/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose up infra`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/infra/overrides/redis.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Redis nema post.yml — po startu neni potreba zadny setup
# (authentication a persistence jsou nakonfigurovane v compose command:).
# ==============================================================================

- name: "[pazny.redis] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ redis_data_dir | default(ansible_facts['env']['HOME'] + '/redis/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.redis] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/redis.yml"
    mode: '0644'
  notify: Restart redis
