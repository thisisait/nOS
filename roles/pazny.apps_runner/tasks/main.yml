---
# ==============================================================================
# pazny.apps_runner/tasks/main.yml — RENDER PHASE.
#
# Runs from tasks/stacks/apps-up.yml BEFORE `docker compose up apps --wait`.
# Wraps library/nos_apps_render.py:
#
#   1. discover apps/*.yml (skip _*, *.draft)
#   2. parse + validate each via nos_app_parser
#   3. run TLS / SSO / EU-residency deploy gates
#   4. resolve magic tokens (with secret_seed=app_secrets for stability)
#   5. emit per-app: compose block + Traefik labels + Authentik entry
#                    + Wing system + smoke entry + Kuma monitor + GDPR row
#
# Output:
#   - {{ apps_overrides_path }}              — merged compose override fragment
#   - app_secrets fragment in credentials.yml — newly-generated secrets persist
#   - _apps_render fact                       — full render result for post.yml
#
# Observability hooks (service-registry / Wing / Bone / Portainer / Kuma /
# smoke catalog extension) are in tasks/post.yml.
# ==============================================================================

# ── Skip cleanly if disabled ─────────────────────────────────────────────────
- name: "[pazny.apps_runner] Disabled — skipping render"
  ansible.builtin.debug:
    msg: "apps_runner_enabled={{ apps_runner_enabled }} — render skipped"
  when: not (apps_runner_enabled | default(true) | bool)

- name: "[pazny.apps_runner] Render block"
  when: apps_runner_enabled | default(true) | bool
  block:

    # ── Skip cleanly if there are no manifests ───────────────────────────────
    - name: "[pazny.apps_runner] Discover apps/*.yml manifests"
      ansible.builtin.find:
        paths: "{{ apps_dir }}"
        patterns: ["*.yml", "*.yaml"]
        excludes: ["_*", "*.draft", "*.draft.yml", "*.draft.yaml"]
        file_type: file
      register: _apps_manifests
      check_mode: false

    - name: "[pazny.apps_runner] No manifests — nothing to render"
      ansible.builtin.debug:
        msg: "No apps/*.yml manifests found in {{ apps_dir }} — render is a no-op"
      when: (_apps_manifests.files | default([])) | length == 0

    - name: "[pazny.apps_runner] Render block (manifests present)"
      when: (_apps_manifests.files | default([])) | length > 0
      block:

        # ── Ensure host directories exist ────────────────────────────────────
        - name: "[pazny.apps_runner] Ensure apps stack directory tree"
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "{{ stacks_dir }}/apps"
            - "{{ stacks_dir }}/apps/overrides"

        # ── Run the render module ────────────────────────────────────────────
        # Returns: {apps, generated_secrets, gate_violations, ids}
        - name: "[pazny.apps_runner] Run nos_apps_render"
          nos_apps_render:
            apps_dir: "{{ apps_dir }}"
            instance_tld: "{{ instance_tld | default('dev.local') }}"
            apps_subdomain: "{{ apps_subdomain | default('apps') }}"
            secret_seed: "{{ app_secrets | default({}) }}"
            eu_registries: "{{ apps_eu_registries | default([]) }}"
            strict: "{{ apps_strict | default(false) | bool }}"
            traefik_network: "{{ apps_traefik_network }}"
          register: _apps_render

        # ── Hard-fail on gate violations (unless apps_force) ─────────────────
        # Each violation already includes the app id and gate name — operator
        # sees the full list at once, not one error per re-run.
        - name: "[pazny.apps_runner] Refuse run when GDPR / EU / SSO gates fail"
          ansible.builtin.fail:
            msg: |
              {{ (_apps_render.gate_violations | length) }} Tier-2 gate violation(s)
              would block deploy. Fix the manifest(s) and re-run, or pass
              -e apps_force=true to deploy anyway (NOT recommended — the
              gates exist for GDPR Article 30 compliance reasons).

              {% for v in _apps_render.gate_violations %}
                - {{ v }}
              {% endfor %}
          when:
            - (_apps_render.gate_violations | default([])) | length > 0
            - not (apps_force | default(false) | bool)

        # ── Persist newly-generated secrets back to credentials.yml ──────────
        # blockinfile pattern is the same one used for the password-prefix
        # marker (see main.yml:[Blank] Persist prompted prefix). New runs
        # consume them via app_secrets var (defaults/main.yml).
        - name: "[pazny.apps_runner] Persist app_secrets to credentials.yml"
          ansible.builtin.blockinfile:
            path: "{{ playbook_dir }}/credentials.yml"
            create: true
            mode: '0600'
            marker: "# {mark} ANSIBLE MANAGED apps_runner secrets"
            block: |
              # Auto-generated by pazny.apps_runner; preserves PASSWORD/BASE64
              # values across runs so app DBs encrypted with these don't break
              # on the next blank=false run. Edit the values directly only if
              # you know what you're doing.
              app_secrets:
              {% for app, kv in (_apps_render.generated_secrets | default({})).items() %}
                {{ app }}:
                {% for k, v in kv.items() %}
                  {{ k }}: "{{ v }}"
                {% endfor %}
              {% endfor %}
          when: (_apps_render.generated_secrets | default({})) | length > 0
          no_log: true

        # ── Render the compose override fragment for the apps stack ──────────
        - name: "[pazny.apps_runner] Render apps compose override"
          ansible.builtin.template:
            src: apps-compose-override.yml.j2
            dest: "{{ apps_overrides_path }}"
            mode: '0600'

        # ── Per-app summary ──────────────────────────────────────────────────
        - name: "[pazny.apps_runner] Render summary"
          ansible.builtin.debug:
            msg: |
              ══════════════════════════════════════════════════════════
               Tier-2 apps_runner — RENDERED
              ══════════════════════════════════════════════════════════
               Manifests:   {{ _apps_render.ids | length }} ({{ _apps_render.ids | join(', ') }})
               Override:    {{ apps_overrides_path }}
               Secrets:     {{ (_apps_render.generated_secrets | default({})).keys() | length }} app(s) seeded
               Violations:  {{ (_apps_render.gate_violations | default([])) | length }}
              ══════════════════════════════════════════════════════════

              Each app ⇒
              {% for app in _apps_render.apps | default([]) %}
                · {{ app.id }} → https://{{ app.fqdn }}/  (auth={{ app.auth_mode }}, port={{ app.registry_entry.port }})
              {% endfor %}
