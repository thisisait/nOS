---
# ==============================================================================
# pazny.apps_runner/tasks/main.yml — RENDER PHASE.
#
# Runs from tasks/stacks/apps-up.yml BEFORE `docker compose up apps --wait`.
# Wraps library/nos_apps_render.py:
#
#   1. discover apps/*.yml (skip _*, *.draft)
#   2. parse + validate each via nos_app_parser
#   3. run TLS / SSO / EU-residency deploy gates
#   4. resolve magic tokens (with secret_seed=app_secrets for stability)
#   5. emit per-app: compose block + Traefik labels + Authentik entry
#                    + Wing system + smoke entry + Kuma monitor + GDPR row
#
# Output:
#   - {{ apps_overrides_path }}              — merged compose override fragment
#   - app_secrets fragment in credentials.yml — newly-generated secrets persist
#   - _apps_render fact                       — full render result for post.yml
#
# Observability hooks (service-registry / Wing / Bone / Portainer / Kuma /
# smoke catalog extension) are in tasks/post.yml.
# ==============================================================================

# ── Skip cleanly if disabled ─────────────────────────────────────────────────
- name: "[pazny.apps_runner] Disabled — skipping render"
  ansible.builtin.debug:
    msg: "apps_runner_enabled={{ apps_runner_enabled }} — render skipped"
  when: not (apps_runner_enabled | default(true) | bool)

- name: "[pazny.apps_runner] Render block"
  when: apps_runner_enabled | default(true) | bool
  block:

    # ── Skip cleanly if there are no manifests ───────────────────────────────
    - name: "[pazny.apps_runner] Discover apps/*.yml manifests"
      ansible.builtin.find:
        paths: "{{ apps_dir }}"
        patterns: ["*.yml", "*.yaml"]
        excludes: ["_*", "*.draft", "*.draft.yml", "*.draft.yaml"]
        file_type: file
      register: _apps_manifests
      check_mode: false

    - name: "[pazny.apps_runner] No manifests — nothing to render"
      ansible.builtin.debug:
        msg: "No apps/*.yml manifests found in {{ apps_dir }} — render is a no-op"
      when: (_apps_manifests.files | default([])) | length == 0

    - name: "[pazny.apps_runner] Render block (manifests present)"
      when: (_apps_manifests.files | default([])) | length > 0
      block:

        # ── Ensure host directories exist ────────────────────────────────────
        - name: "[pazny.apps_runner] Ensure apps stack directory tree"
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "{{ stacks_dir }}/apps"
            - "{{ stacks_dir }}/apps/overrides"

        # ── Ensure PyYAML is available for the Ansible Python interpreter ────
        # nos_apps_render → module_utils.nos_app_parser does `import yaml`.
        # On macOS the Ansible-discovered interpreter is /opt/homebrew/bin/
        # python3, and Homebrew's python@3.13 upgrades occasionally drop
        # pyyaml from site-packages (same scenario flagged in main.yml:82
        # for the Preflight YAML validator). Idempotent: pip is a no-op
        # when PyYAML is already present.
        - name: "[pazny.apps_runner] Ensure PyYAML is installed for the parser"
          # ansible.builtin.pip imports `packaging` controller-side; on
          # PEP-668 Homebrew Python 3.14 that import fails before pip
          # itself runs. Shelling out to `python -m pip` bypasses the
          # Ansible module entirely.
          ansible.builtin.command:
            cmd: "{{ ansible_python_interpreter | default('python3') }} -m pip install --quiet --disable-pip-version-check --user --break-system-packages PyYAML"
          register: _apps_pyyaml_pip
          failed_when: false
          changed_when: "'Successfully installed' in (_apps_pyyaml_pip.stdout | default(''))"

        # ── Run the render module ────────────────────────────────────────────
        # Returns: {apps, generated_secrets, gate_violations, ids}
        - name: "[pazny.apps_runner] Run nos_apps_render"
          nos_apps_render:
            apps_dir: "{{ apps_dir }}"
            tenant_domain: "{{ tenant_domain | default('dev.local') }}"
            host_alias: "{{ host_alias | default('') }}"
            apps_subdomain: "{{ apps_subdomain | default('apps') }}"
            secret_seed: "{{ app_secrets | default({}) }}"
            eu_registries: "{{ apps_eu_registries | default([]) }}"
            strict: "{{ apps_strict | default(false) | bool }}"
            traefik_network: "{{ apps_traefik_network }}"
          register: _apps_render

        # ── Defensive 0-app warning ──────────────────────────────────────────
        # Catches a class of silent failure: manifest dir non-empty but render
        # returns 0 apps AND 0 gate violations. Indicates a parser bug or an
        # exclude-pattern catching files it shouldn't (typical mistake: naming
        # a file `apps/draft-myapp.yml` and the pattern matches `*draft*`).
        - name: "[pazny.apps_runner] Warn when manifest dir non-empty but 0 apps rendered"
          ansible.builtin.debug:
            msg: >-
              WARNING: {{ (_apps_manifests.files | default([])) | length }} manifest
              file(s) under {{ apps_dir }} but nos_apps_render returned 0 apps and
              0 gate violations. Likely causes: parser swallowed an exception
              silently, or every file matched the skip-list (excludes={{ ['_*', '*.draft', '*.draft.yml', '*.draft.yaml'] | join(', ') }}).
              Inspect with:
                python3 -m module_utils.nos_app_parser apps/<file>.yml
          when:
            - (_apps_manifests.files | default([])) | length > 0
            - (_apps_render.apps | default([]) | length) == 0
            - (_apps_render.gate_violations | default([]) | length) == 0

        # ── Hard-fail on gate violations (unless apps_force) ─────────────────
        # Each violation already includes the app id and gate name — operator
        # sees the full list at once, not one error per re-run.
        - name: "[pazny.apps_runner] Refuse run when GDPR / EU / SSO gates fail"
          ansible.builtin.fail:
            msg: |
              {{ (_apps_render.gate_violations | length) }} Tier-2 gate violation(s)
              would block deploy. Fix the manifest(s) and re-run, or pass
              -e apps_force=true to deploy anyway (NOT recommended — the
              gates exist for GDPR Article 30 compliance reasons).

              {% for v in _apps_render.gate_violations %}
                - {{ v }}
              {% endfor %}
          when:
            - (_apps_render.gate_violations | default([])) | length > 0
            - not (apps_force | default(false) | bool)

        # ── Persist newly-generated secrets back to credentials.yml ──────────
        # The previous implementation (Jinja for-loop emitting `{{ app }}:`
        # then `{{ k }}: "{{ v }}"` lines via blockinfile) produced asymmetric
        # indentation — 6 spaces for documenso's keys but 4 for roundcube's
        # — making credentials.yml fail the playbook's own Preflight YAML
        # validator on the next run. Switch to `to_nice_yaml` over a real
        # dict: canonical emitter, no Jinja whitespace traps.
        - name: "[pazny.apps_runner] Persist app_secrets to credentials.yml"
          ansible.builtin.blockinfile:
            path: "{{ playbook_dir }}/credentials.yml"
            create: true
            mode: '0600'
            marker: "# {mark} ANSIBLE MANAGED apps_runner secrets"
            block: |
              # Auto-generated by pazny.apps_runner — preserves PASSWORD/BASE64
              # values across runs so app DBs encrypted with these don't break
              # on the next blank=false run. Edit values directly only if you
              # know what you're doing.
              {{ {'app_secrets': (_apps_render.generated_secrets | default({}))} | to_nice_yaml(indent=2, width=200) }}
          when: (_apps_render.generated_secrets | default({})) | length > 0
          no_log: true

        # ── Render the compose override fragment for the apps stack ──────────
        - name: "[pazny.apps_runner] Render apps compose override"
          ansible.builtin.template:
            src: apps-compose-override.yml.j2
            dest: "{{ apps_overrides_path }}"
            mode: '0600'

        # ── Pre-flight: verify each manifest's images actually exist ─────────
        # Two blanks lost to image typos (ghcr.io/documenso/documenso:1.10.4 —
        # wrong registry; docker.io/twofauth/twofauth — wrong org name from
        # accidental replace_all rename). `docker manifest inspect` queries
        # the registry without pulling — cheap, deterministic. Failure here
        # is more useful than a 60s wait + cascade-aborted compose-up.
        # `failed_when: false` → we COLLECT the list of bad images and fail
        # in the next task with all offenders at once.
        - name: "[pazny.apps_runner] Collect every image referenced by Tier-2 manifests"
          ansible.builtin.set_fact:
            _apps_images: "{{ _images_acc | unique | sort }}"
          vars:
            _images_acc: |-
              {%- set out = [] -%}
              {%- for app in (_apps_render.apps | default([])) -%}
                {%- for svc_name, svc_def in (app.compose.services | default({})).items() -%}
                  {%- if svc_def.image is defined -%}
                    {%- set _ = out.append(svc_def.image) -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endfor -%}
              {{ out }}

        - name: "[pazny.apps_runner] Probe each image with docker manifest inspect (pre-flight)"
          ansible.builtin.command: "{{ docker_bin | default('docker') }} manifest inspect {{ item }}"
          loop: "{{ _apps_images | default([]) }}"
          register: _apps_image_probes
          changed_when: false
          failed_when: false
          check_mode: false
          # Probes can be slow on cold registry caches; throttle parallelism
          # only via natural sequential loop here — Docker's own caching
          # makes the second probe of a layer-shared image fast.

        # Local-cache fallback: when `docker manifest inspect` fails (typically
        # Docker Hub anonymous rate limit — 100 pulls/6 h per IP — which we
        # routinely hit during multi-blank dev days), check whether the image
        # is already pulled locally. If yes, the deploy WILL succeed regardless
        # of the registry being momentarily unreachable, so refusing the run
        # is a false alarm. Operator's intent is "verify deploy will work";
        # local cache is a perfectly valid resolution.
        - name: "[pazny.apps_runner] Probe failed images against local Docker image cache"
          ansible.builtin.command: "{{ docker_bin | default('docker') }} image inspect {{ item.item }}"
          loop: "{{ (_apps_image_probes.results | default([])) | rejectattr('rc', 'equalto', 0) | list }}"
          loop_control:
            label: "{{ item.item }}"
          register: _apps_image_local_probes
          changed_when: false
          failed_when: false
          check_mode: false

        - name: "[pazny.apps_runner] Identify unreachable images (registry AND local cache miss)"
          ansible.builtin.set_fact:
            _apps_bad_images: >-
              {{ (_apps_image_local_probes.results | default([]))
                 | rejectattr('rc', 'equalto', 0)
                 | map(attribute='item')
                 | map(attribute='item') | list }}
            _apps_local_cache_hits: >-
              {{ (_apps_image_local_probes.results | default([]))
                 | selectattr('rc', 'equalto', 0)
                 | map(attribute='item')
                 | map(attribute='item') | list }}

        - name: "[pazny.apps_runner] Note images served from local cache (registry probe failed)"
          ansible.builtin.debug:
            msg: >-
              Local cache fallback: {{ _apps_local_cache_hits | length }}
              image(s) unreachable on registry but pulled locally — proceeding.
              ({{ _apps_local_cache_hits | join(', ') }})
          when: (_apps_local_cache_hits | default([])) | length > 0

        # Map each bad image back to the manifest(s) that reference it, so
        # the operator can `vim apps/<name>.yml` immediately. The lookup is
        # heuristic — a single image may legitimately appear in multiple
        # manifests (shared postgres, shared redis); we list every manifest
        # that contains it.
        - name: "[pazny.apps_runner] Map unreachable images back to manifest ids"
          ansible.builtin.set_fact:
            _apps_bad_image_owners: |-
              {%- set rows = [] -%}
              {%- for bad in _apps_bad_images -%}
                {%- set owners = [] -%}
                {%- for app in (_apps_render.apps | default([])) -%}
                  {%- for svc_name, svc_def in (app.compose.services | default({})).items() -%}
                    {%- if (svc_def.image | default('')) == bad -%}
                      {%- set _ = owners.append(app.id) -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
                {%- set _ = rows.append({'image': bad, 'manifests': (owners | unique | list)}) -%}
              {%- endfor -%}
              {{ rows }}

        - name: "[pazny.apps_runner] Refuse run when any image is unreachable"
          ansible.builtin.fail:
            msg: |
              {{ _apps_bad_images | length }} Tier-2 image(s) cannot be resolved
              on the registry.

              {% for row in _apps_bad_image_owners %}
                - {{ row.image }}
                  manifests: {{ row.manifests | join(', ') if row.manifests else '(none — orphaned image?)' }}
                  diagnose:  docker manifest inspect {{ row.image }}
              {% endfor %}

              Likely causes:
                · slug rename trap (e.g. {{ '`2fauth → twofauth`' }} accidentally
                  rewrote the image org too — check if the image org
                  matches an OLD slug you renamed)
                · tag does not exist on registry (look up the upstream
                  Dockerfile / GitHub releases for current stable tag)
                · Docker Hub anonymous pull rate-limit (100/6h per IP;
                  multi-blank dev days hit this routinely). If the
                  message says "toomanyrequests": run `docker login`
                  to bump the limit to 200/6h, or wait ~10 min. Note:
                  if the image is already in your LOCAL Docker cache,
                  this task auto-resolves via `docker image inspect`
                  fallback — you only see this fail when the registry
                  miss AND the local cache miss.
                · wrong registry host (e.g. ghcr.io vs docker.io)

              Fix the manifest(s) and re-run, or pass
                -e apps_force_image_check_skip=true
              to bypass (NOT recommended).
          when:
            - (_apps_bad_images | length) > 0
            - not (apps_force_image_check_skip | default(false) | bool)

        # ── Per-app summary ──────────────────────────────────────────────────
        - name: "[pazny.apps_runner] Render summary"
          ansible.builtin.debug:
            msg: |
              ══════════════════════════════════════════════════════════
               Tier-2 apps_runner — RENDERED
              ══════════════════════════════════════════════════════════
               Manifests:   {{ _apps_render.ids | length }} ({{ _apps_render.ids | join(', ') }})
               Override:    {{ apps_overrides_path }}
               Secrets:     {{ (_apps_render.generated_secrets | default({})).keys() | length }} app(s) seeded
               Violations:  {{ (_apps_render.gate_violations | default([])) | length }}
              ══════════════════════════════════════════════════════════

              Each app ⇒
              {% for app in _apps_render.apps | default([]) %}
                · {{ app.id }} → https://{{ app.fqdn }}/  (auth={{ app.auth_mode }}, port={{ app.registry_entry.port }})
              {% endfor %}
