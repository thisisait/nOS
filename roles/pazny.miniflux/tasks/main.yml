---
# ==============================================================================
# pazny.miniflux/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/iiab/overrides/miniflux.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Miniflux has native OIDC (Authentik) via env vars — no post-start setup
# is not required (user is created on the first OIDC login thanks to OAUTH2_USER_CREATION=1).
# The admin fallback account for bootstrap is created via the CREATE_ADMIN=1 env var.
# ==============================================================================

- name: "[pazny.miniflux] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/miniflux.yml"
    mode: '0600'
  notify: Restart miniflux
