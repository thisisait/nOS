---
# ==============================================================================
# pazny.miniflux/tasks/main.yml
#
# Volano z tasks/stacks/stack-up.yml PRED `docker compose up iiab`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/iiab/overrides/miniflux.yml, ktery pak stack-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Miniflux ma native OIDC (Authentik) pres env vary — zadny post-start setup
# neni potreba (user se vytvori pri prvnim OIDC loginu diky OAUTH2_USER_CREATION=1).
# Admin fallback ucet pro bootstrap se tvori pres CREATE_ADMIN=1 env var.
# ==============================================================================

- name: "[pazny.miniflux] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/miniflux.yml"
    mode: '0644'
  notify: Restart miniflux
