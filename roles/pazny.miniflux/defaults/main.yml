---
# ==============================================================================
# pazny.miniflux — Miniflux RSS reader (iiab compose stack)
#
# Credentials (miniflux_db_password, miniflux_admin_password) zustavaji v
# default.credentials.yml — centralizovane pro prefix rotation.
# ==============================================================================

miniflux_version: "2.2.19"
miniflux_domain: "rss.{{ instance_tld | default('dev.local') }}"
miniflux_port: 3011
miniflux_db_name: "miniflux"
miniflux_db_user: "miniflux"
miniflux_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
miniflux_cpus: "{{ docker_cpus_light | default('0.5') }}"
