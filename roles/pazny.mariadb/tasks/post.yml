---
# ==============================================================================
# pazny.mariadb/tasks/post.yml
#
# Post-start DB/user setup. Volano z tasks/stacks/core-up.yml PO
# `docker compose up infra --wait` — kontejner bezi, compose healthcheck
# potvrdil pripravenost, ale community.mysql muze stale narazit na race
# (socket vs. TCP, auth plugin init), proto zde retry loop.
# ==============================================================================

- name: "[pazny.mariadb Post] Verify MariaDB is accepting connections"
  community.mysql.mysql_info:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  register: mariadb_conn
  retries: 18
  delay: 5
  until: mariadb_conn is not failed
  ignore_errors: true  # noqa: ignore-errors – potrebujeme registrovat failed stav
  when: not ansible_check_mode

- name: "[pazny.mariadb Post] Connection failed – diagnostics"
  ansible.builtin.pause:
    prompt: |-
      ══════════════════════════════════════════════════════════════════════
       MariaDB: root pristup odepren ({{ mariadb_conn.msg | default('neznama chyba') }})

       Pravdepodobna pricina: DB byla inicializovana s jinym heslem nez je
       v credentials.yml. Env var MARIADB_ROOT_PASSWORD se cte jen pri prvni
       inicializaci.

       Oprava (smazani dat a reinicializace):
         docker compose -p infra stop mariadb
         rm -rf ~/mariadb/data/*
         docker compose -p infra up -d mariadb
         sleep 15
         # pak stiskni ENTER

       Nebo rucni reset hesla:
         docker compose -p infra exec -T mariadb mariadbd-safe --skip-grant-tables &
         docker compose -p infra exec -T mariadb mariadb -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mariadb_root_password }}';"
      ══════════════════════════════════════════════════════════════════════
  when:
    - mariadb_conn is failed
    - not ansible_check_mode

- name: "[pazny.mariadb Post] Remove test database"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: test
    state: absent
  failed_when: false
  when: mariadb_conn is not failed

- name: "[pazny.mariadb Post] Create databases"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
  loop: "{{ mariadb_databases | default([]) }}"
  no_log: true
  when: mariadb_conn is not failed

# host: '%' – PHP-FPM a dalsi klienti se pripojuji pres Docker port-forward;
# uvnitr MariaDB kontejneru to neprijde jako 127.0.0.1 ale jako gateway IP
- name: "[pazny.mariadb Post] Create database users"
  community.mysql.mysql_user:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host | default('%') }}"
    state: present
  loop: "{{ mariadb_users | default([]) }}"
  no_log: true
  when: mariadb_conn is not failed
