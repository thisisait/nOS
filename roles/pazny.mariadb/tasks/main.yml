---
# ==============================================================================
# pazny.mariadb/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose up infra`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/infra/overrides/mariadb.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Post-start DB/user setup je v tasks/post.yml — volany z core-up.yml
# az PO compose up (DB musi bezet, nez se vytvori uzivatele).
# ==============================================================================

- name: "[pazny.mariadb] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ mariadb_data_dir | default(ansible_facts['env']['HOME'] + '/mariadb/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.mariadb] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/mariadb.yml"
    mode: '0644'
  notify: Restart mariadb
