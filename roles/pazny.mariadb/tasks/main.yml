---
# ==============================================================================
# pazny.mariadb/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/mariadb.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start DB/user setup lives in tasks/post.yml — called from core-up.yml
# only AFTER compose up (DB must be running before the users are created).
# ==============================================================================

- name: "[pazny.mariadb] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ mariadb_data_dir | default(ansible_facts['env']['HOME'] + '/mariadb/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.mariadb] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/mariadb.yml"
    mode: '0600'
  notify: Restart mariadb
