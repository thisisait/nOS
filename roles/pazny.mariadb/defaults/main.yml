---
# ==============================================================================
# pazny.mariadb — MariaDB in Docker (infra compose stack)
#
# Credentials (mariadb_root_password) a seed data (mariadb_databases,
# mariadb_users) stay in top-level default.config.yml a
# default.credentials.yml — still centralized, the role only reads them via
# Ansible var precedence (vars_files > role defaults).
# ==============================================================================

mariadb_version: "11.8.6"                           # aligned with default.config.yml; CVE-2026-32710 + CVE-2026-3494 patched
mariadb_port: 3306
mariadb_data_dir: "{{ ansible_facts['env']['HOME'] }}/mariadb/data"
mariadb_mem_limit: "{{ docker_mem_limit_standard | default('1g') }}"
mariadb_cpus: "{{ docker_cpus_standard | default('1.0') }}"

# Seed databaze / users se cte z top-level default.config.yml. Role defaults
# provide an empty fallback for external consumers.
mariadb_databases: []
mariadb_users: []
