---
# ==============================================================================
# pazny.puter/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates data/config dir, renders config.json and the compose override
# fragment to {{ stacks_dir }}/iiab/overrides/puter.yml which then
# stack-up.yml collects via `find` and passes as an additional -f flag.
#
# Post-start admin user + bcrypt password reconverge lives in tasks/post.yml
# — called from stack-up.yml az PO compose up.
#
# App registry (iframe apps in Puter Start menu) lives in tasks/apps.yml —
# depends on a healthy Puter API, so it runs post-start. We call the role
# via include_tasks at the end, which mirrors the flow from main.yml:705 (import_tasks
# puter_apps.yml).
# ==============================================================================

- name: "[pazny.puter] Ensure data and config directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ puter_config_dir | default(ansible_facts['env']['HOME'] + '/puter/config') }}"
    - "{{ puter_data_dir | default(ansible_facts['env']['HOME'] + '/puter') }}/data"
    # Pre-create dynalite leveldb dir — dynalite()'s `path: ...` opens
    # a leveldb at that exact path; if the dir doesn't exist it crashes
    # mid-boot with `Error: Database is closed` (dynalite/db/index.js:265).
    # Better-sqlite3 creates its own file but dynalite expects the dir.
    - "{{ puter_data_dir | default(ansible_facts['env']['HOME'] + '/puter') }}/data/puter-ddb"

- name: "[pazny.puter] Deploy config.json"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/puter/config.json.j2"
    dest: "{{ puter_config_dir | default(ansible_facts['env']['HOME'] + '/puter/config') }}/config.json"
    mode: '0644'

- name: "[pazny.puter] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/puter.yml"
    mode: '0600'
  notify: Restart puter

- name: "[pazny.puter] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Puter cloud OS ready (starts via the IIAB stack)
      ══════════════════════════════════════════════════════
       URL:       https://{{ puter_domain | default('os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
       API:       https://{{ puter_api_domain | default('api.os' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
       Port:      {{ puter_port | default(5050) }}
       Data:      {{ puter_data_dir | default(ansible_facts['env']['HOME'] + '/puter') }}
       Ollama:    auto-detect (localhost:11434)
       Onboard:   First user = admin (password in Docker log)
      ══════════════════════════════════════════════════════

# NOTE: The app registry (apps.yml) is now included from tasks/post.yml, which
# runs AFTER `docker compose up iiab`. Calling it here in the render phase used
# to waste 150 s per run (15 retries x 10 s) waiting for the Puter API that only
# exists after compose up.
