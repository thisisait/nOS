---
# pazny.erpnext — handlers
# ERPNext has 6 compose services. We restart all of them at once via
# a single `docker compose restart` call — Docker properly restarts it that way
# celou sites-dependent skupinu. Called from notify: po re-renderu override
# sablony.

- name: Restart erpnext
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/b2b/docker-compose.yml" -p b2b
    restart erpnext-configurator erpnext-backend erpnext-frontend
    erpnext-queue-short erpnext-queue-long erpnext-scheduler
  failed_when: false
