---
# pazny.erpnext — handlers
# ERPNext ma 6 compose services. Restartujeme vsechny najednou pres
# jeden `docker compose restart` volani — Docker tim spravne znovuspusti
# celou sites-dependent skupinu. Volano z notify: po re-renderu override
# sablony.

- name: Restart erpnext
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/b2b/docker-compose.yml" -p b2b
    restart erpnext-configurator erpnext-backend erpnext-frontend
    erpnext-queue-short erpnext-queue-long erpnext-scheduler
  failed_when: false
