---
# DISSOLUTION PLAN (Phase 2 C5): This file dissolves into
# files/anatomy/plugins/erpnext-base/ lifecycl.post_compose once the plugin
# loader gains a `replay_api_calls` runner with docker_exec + http support.
# Until C5 lands, this file remains the authoritative wiring path.
#
# ==============================================================================
# pazny.erpnext/tasks/post.yml
#
# ERPNext post-start: retry configurator / run migrations
# The configurator (bench new-site) can fail if MariaDB was not ready,
# or the site was created but the migration did not finish (I/O error, timeout).
# Called from tasks/stacks/stack-up.yml only AFTER `docker compose up b2b --wait`.
# ==============================================================================

- name: "[pazny.erpnext Post] Check configurator exit code"
  ansible.builtin.shell: >
    {{ docker_bin }} inspect b2b-erpnext-configurator-1
    --format '{{ '{{' }}.State.ExitCode{{ '}}' }}' 2>/dev/null || echo "999"
  register: _erpnext_cfg_exit
  changed_when: false
  failed_when: false

- name: "[pazny.erpnext Post] Check if site already configured"
  ansible.builtin.stat:
    path: "{{ erpnext_data_dir | default(ansible_facts['env']['HOME'] + '/erpnext/sites') }}/{{ erpnext_site_name | default('erp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/site_config.json"
  register: _erpnext_site_config

# ── Pripad 1: site neexistuje → full retry ────────────────────────────────────
- name: "[pazny.erpnext Post] Full retry - site not created"
  when:
    - _erpnext_cfg_exit.stdout | default('0') | int != 0
    - not _erpnext_site_config.stat.exists
  block:
    - name: "[pazny.erpnext Post] Wait for MariaDB to accept connections"
      ansible.builtin.shell: >
        {{ docker_bin }} compose -p infra exec -T mariadb
        mariadb -u root -p{{ mariadb_root_password }} -e "SELECT 1" 2>&1
      register: _mariadb_check
      retries: 15
      delay: 4
      until: _mariadb_check.rc == 0
      changed_when: false
      failed_when: false

    - name: "[pazny.erpnext Post] Remove stale configurator container"
      ansible.builtin.shell: >
        {{ docker_bin }} rm -f b2b-erpnext-configurator-1 2>/dev/null || true
      changed_when: false

    - name: "[pazny.erpnext Post] Re-run configurator"
      ansible.builtin.shell: >
        {{ docker_bin }} compose
        -f "{{ stacks_dir }}/b2b/docker-compose.yml"
        -p b2b
        run --rm erpnext-configurator 2>&1
      register: _erpnext_cfg_retry
      failed_when: false

    - name: "[pazny.erpnext Post] Configurator retry result"
      ansible.builtin.debug:
        msg: "rc={{ _erpnext_cfg_retry.rc | default('?') }} {{ (_erpnext_cfg_retry.stdout_lines | default([]))[-5:] | join(' | ') }}"

# -- Case 2: site exists but migration did not finish -> bench migrate ───────────
# VirtioFS I/O chyba (macOS bind mount) shodi filelock.__exit__ s rc=1 i kdyz
# migrace prakticky uspela (stdout obsahuje "Queued rebuilding of search index"
# = the final post-migrate step). Retry reads either rc=0 or that final marker
# in stdout — we accept both as success. We delete stale lock files before
# on every attempt.
- name: "[pazny.erpnext Post] Run migrations with lock cleanup (partial setup recovery)"
  ansible.builtin.shell: |
    {{ docker_bin }} compose -p b2b exec -T erpnext-backend bash -c '
      find /home/frappe/frappe-bench/sites -name "*.lock" -delete 2>/dev/null || true
      bench --site {{ erpnext_site_name | default("erp" ~ (_host_alias_seg | default("")) ~ "." ~ (tenant_domain | default("dev.local"))) }} migrate 2>&1
    '
  register: _erpnext_migrate
  retries: 3
  delay: 15
  until: >
    (_erpnext_migrate.rc | default(1) == 0)
    or ('Queued rebuilding of search index' in (_erpnext_migrate.stdout | default('')))
  when:
    - _erpnext_site_config.stat.exists
    - _erpnext_cfg_exit.stdout | default('0') | int != 0
  failed_when: false

- name: "[pazny.erpnext Post] Migration result"
  ansible.builtin.debug:
    msg: "rc={{ _erpnext_migrate.rc | default('?') }} {{ (_erpnext_migrate.stdout_lines | default([]))[-5:] | join(' | ') }}"
  when: _erpnext_migrate is defined and _erpnext_migrate.changed | default(false)

# ── Restart po opravach ────────────────────────────────────────────────────────
- name: "[pazny.erpnext Post] Restart frontend + backend"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/b2b/docker-compose.yml"
    -p b2b
    restart erpnext-frontend erpnext-backend 2>&1
  when: >
    (_erpnext_cfg_retry is defined and _erpnext_cfg_retry.rc | default(1) == 0) or
    (_erpnext_migrate is defined and _erpnext_migrate.rc | default(1) == 0)
  failed_when: false

# ── Admin password reconverge (state-declarative UPDATE) ──────────────────
# `bench set-admin-password` is idempotent-on-write — always overwrites the
# Administrator password regardless of current value. Runs every playbook
# execution once the site exists (after configurator has completed).
- name: "[pazny.erpnext Post] Reconverge Administrator password"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p b2b exec -T erpnext-backend
    bench --site {{ erpnext_site_name | default('erp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
    set-admin-password {{ erpnext_admin_password | quote }} 2>&1
  register: _erpnext_pw_reset
  when: _erpnext_site_config.stat.exists
  changed_when: _erpnext_pw_reset.rc | default(1) == 0
  failed_when: false

# ── Health check ──────────────────────────────────────────────────────────────
# Frappe site routing vyzaduje `Host:` header (nginx frontend vybere site
# podle FRAPPE_SITE_NAME_HEADER=$host). ERPNext defaultne disabluje Guest
# user, so /api/method/frappe.ping returns 417 (ValidationError: "User
# Guest is disabled"). That is a valid "alive" signal — Frappe's HTTP stack
# answers. We accept both 200 (ping allowed) and 417 (Guest disabled, HTTP
# stack is alive) and 403 (generic forbidden). 404 means a missing route.
- name: "[pazny.erpnext Post] Verify site is accessible"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ erpnext_port | default(8082) }}/api/method/frappe.ping"
    headers:
      Host: "{{ erpnext_site_name | default('erp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
    status_code: [200, 403, 417]
    timeout: 10
  register: _erpnext_health
  retries: 18
  delay: 10
  until: _erpnext_health.status | default(0) in [200, 403, 417]
  failed_when: false

- name: "[pazny.erpnext Post] Status"
  ansible.builtin.debug:
    msg: >-
      ERPNext {{ 'OK (' ~ _erpnext_health.status ~ ')' if _erpnext_health.status | default(0) in [200, 403, 417]
      else 'UNAVAILABLE - check: ' ~ docker_bin ~ ' compose -f ' ~ stacks_dir ~ '/b2b/docker-compose.yml -p b2b logs' }}

# ── Authentik Social Login Key (native OIDC via Frappe doctype) ──────────────
# Frappe's "Social Login Key" doctype wires an OIDC/OAuth2 provider into the
# login page: it adds a "Login with Authentik" button that redirects to
# Authentik's authorize endpoint and completes the flow at the Frappe-built-in
# `/api/method/frappe.integrations.oauth2_logins.custom?provider=Authentik`
# callback. Configured via `bench execute frappe.client.*` calls (the site's
# Python API) against the running erpnext-backend container.
#
# Idempotent: we list existing keys first and only insert when none match
# provider_name="Authentik".
- name: "[pazny.erpnext Post] Authentik native OIDC setup"
  when:
    - install_authentik | default(false)
    - _erpnext_site_config.stat.exists
    - _erpnext_health.status | default(0) in [200, 403, 417]
  block:
    - name: "[pazny.erpnext Post] Check for existing Authentik Social Login Key"
      ansible.builtin.shell: >
        {{ docker_bin }} compose -p b2b exec -T erpnext-backend
        bench --site {{ erpnext_site_name | default('erp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
        execute frappe.client.get_list
        --kwargs '{"doctype":"Social Login Key","filters":{"provider_name":"Authentik"}}'
        2>&1
      register: _erpnext_slk_check
      changed_when: false
      failed_when: false

    - name: "[pazny.erpnext Post] Create Authentik Social Login Key (first run only)"
      ansible.builtin.shell: >
        {{ docker_bin }} compose -p b2b exec -T erpnext-backend
        bench --site {{ erpnext_site_name | default('erp' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
        execute frappe.client.insert
        --kwargs '{{ _erpnext_slk_payload | to_json }}'
        2>&1
      vars:
        _erpnext_slk_payload:
          doc:
            doctype: "Social Login Key"
            provider_name: "Authentik"
            social_login_provider: "Custom"
            client_id: "{{ authentik_oidc_erpnext_client_id | default('nos-erpnext') }}"
            client_secret: "{{ authentik_oidc_erpnext_client_secret | default(global_password_prefix + '_pw_oidc_erpnext') }}"
            base_url: "https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
            authorize_url: "/application/o/authorize/"
            access_token_url: "/application/o/token/"
            api_endpoint: "/application/o/userinfo/"
            redirect_url: "/api/method/frappe.integrations.oauth2_logins.custom"
            client_id_field_name: "preferred_username"
            icon: "fa fa-key"
            enable_social_login: 1
            sign_ups: "Allow"
            auth_url_data: '{"scope":"openid profile email"}'
      when: >-
        _erpnext_slk_check.rc | default(1) == 0
        and ('Authentik' not in (_erpnext_slk_check.stdout | default('')))
      register: _erpnext_slk_create
      changed_when: _erpnext_slk_create.rc | default(1) == 0
      failed_when: false

    - name: "[pazny.erpnext Post] Authentik Social Login Key result"
      ansible.builtin.debug:
        msg: >-
          {{ 'Authentik Social Login Key already present — skip.'
             if ('Authentik' in (_erpnext_slk_check.stdout | default('')))
             else ('Authentik Social Login Key created (rc=' ~ (_erpnext_slk_create.rc | default('?')) ~ ').'
                   if (_erpnext_slk_create is defined and _erpnext_slk_create.changed | default(false))
                   else 'Authentik Social Login Key setup skipped (check rc=' ~ (_erpnext_slk_check.rc | default('?')) ~ ').') }}
