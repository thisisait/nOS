---
# ==============================================================================
# pazny.erpnext/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up b2b`:
# renders the compose override fragment do
# {{ stacks_dir }}/b2b/overrides/erpnext.yml, which stack-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start recovery (retry configurator, bench migrate lock cleanup,
# admin password reconverge, site health check) lives in tasks/post.yml —
# called from stack-up.yml az PO `docker compose up b2b --wait`.
#
# ERPNext data lives in the Docker named volume `b2b_erpnext_sites` (P0.1 VirtioFS
# workaround), zadny host-side data dir se nevytvari.
# ==============================================================================

- name: "[pazny.erpnext] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/b2b/overrides/erpnext.yml"
    mode: '0600'
  notify: Restart erpnext
