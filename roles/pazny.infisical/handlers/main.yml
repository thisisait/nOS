---
# pazny.infisical — handlers
# Play-level "Restart infisical" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart infisical
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart infisical
  failed_when: false
