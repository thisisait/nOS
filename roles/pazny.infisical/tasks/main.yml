---
# ==============================================================================
# pazny.infisical/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose up infra`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/infra/overrides/infisical.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Post-start wait-for-ready je v tasks/post.yml — volany z core-up.yml
# az PO `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.infisical] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ infisical_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.infisical] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/infisical.yml"
    mode: '0644'
  notify: Restart infisical
