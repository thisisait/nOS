---
# ==============================================================================
# pazny.infisical/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/infisical.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start wait-for-ready lives in tasks/post.yml — called from core-up.yml
# az PO `docker compose up infra --wait`.
# ==============================================================================

- name: "[pazny.infisical] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ infisical_data_dir }}"
    state: directory
    mode: '0755'

- name: "[pazny.infisical] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/infisical.yml"
    mode: '0600'
  notify: Restart infisical
