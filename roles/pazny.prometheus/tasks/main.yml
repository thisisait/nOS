---
# ==============================================================================
# pazny.prometheus/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose -p observability up`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/observability/overrides/prometheus.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Prometheus konfig (prometheus.yml) stays rendered in core-up.yml
# from files/observability/prometheus/prometheus.yml — the role owns only the compose
# fragment + handler.
# ==============================================================================

- name: "[pazny.prometheus] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ prometheus_storage_path | default(stacks_dir + '/observability/prometheus/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.prometheus] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/prometheus.yml"
    mode: '0600'
  notify: Restart prometheus
