---
# ==============================================================================
# pazny.prometheus/tasks/main.yml
#
# Volano z tasks/stacks/core-up.yml PRED `docker compose -p observability up`:
# vytvori data dir, vyrenderuje compose override fragment do
# {{ stacks_dir }}/observability/overrides/prometheus.yml, ktery pak core-up.yml
# sesbira pres `find` a prida jako dodatecny -f flag.
#
# Prometheus konfig (prometheus.yml) zustava renderovany v core-up.yml
# z files/observability/prometheus/prometheus.yml — role vlastni jen compose
# fragment + handler.
# ==============================================================================

- name: "[pazny.prometheus] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ prometheus_storage_path | default(stacks_dir + '/observability/prometheus/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.prometheus] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/observability/overrides/prometheus.yml"
    mode: '0644'
  notify: Restart prometheus
