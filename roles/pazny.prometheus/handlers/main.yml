---
# pazny.prometheus — handlers
# Play-level "Restart prometheus" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart prometheus
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
    restart prometheus
  failed_when: false
