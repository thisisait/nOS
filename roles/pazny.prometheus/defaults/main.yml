---
# ==============================================================================
# pazny.prometheus — Prometheus in Docker (observability compose override)
#
# Config file prometheus.yml stays rendered in tasks/stacks/core-up.yml
# from files/observability/prometheus/prometheus.yml — the role owns only the compose
# fragment + handler (same deliberate decision as for grafana provisioning).
# ==============================================================================

prometheus_version: "latest"
prometheus_port: 9090
prometheus_retention: "30d"
prometheus_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/prometheus"
prometheus_mem_limit: "{{ docker_mem_limit_standard | default('1g') }}"
prometheus_cpus: "{{ docker_cpus_standard | default('1.0') }}"
