---
# ==============================================================================
# pazny.uptime_kuma — Uptime Kuma (self-hosted monitoring / status page)
#
# Credentials (uptime_kuma_admin_password) stay in default.credentials.yml
# and are prefix-rotated. Auto-monitors derive from install_* flags in
# default.config.yml — the monitor list lives in tasks/monitors.yml.
#
# SSO: Uptime Kuma v1.x has no native OIDC support. Access is gated via
# the Authentik Nginx forward_auth outpost (proxy auth). Native OIDC will
# be revisited when Uptime Kuma v2.x ships stable OIDC.
# ==============================================================================

uptime_kuma_version: "1"                            # "1" = latest v1.x; pin e.g. "1.23.13"
uptime_kuma_port: 3001
uptime_kuma_domain: "uptime{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
uptime_kuma_data_dir: "{{ ansible_facts['env']['HOME'] }}/uptime-kuma"
uptime_kuma_admin_user: "admin"
uptime_kuma_auto_monitors: true                     # Automatically create monitors for all install_* services
uptime_kuma_mem_limit: "{{ docker_mem_limit_light | default('512m') }}"
uptime_kuma_cpus: "{{ docker_cpus_light | default('0.5') }}"
