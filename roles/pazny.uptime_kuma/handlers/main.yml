---
# pazny.uptime_kuma — handlers
# Fallback handler for standalone role use; Phase B coordinator
# may define a play-level variant.

- name: Restart uptime_kuma
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart uptime-kuma
  failed_when: false
