        +
        (install_bluesky_pds | default(false)) | ternary(
          [{'name': 'Bluesky PDS', 'type': 'http',
            'url': 'http://127.0.0.1:' ~ (bluesky_pds_port | default(2583)) ~ '/xrpc/_health'}], [])
        +
        (install_freepbx | default(false)) | ternary(
          [{'name': 'FreePBX', 'type': 'http',
            'url': 'http://127.0.0.1:' ~ (freepbx_port | default(8088)) ~ '/'}], [])
        +
        (install_qgis_server | default(false)) | ternary(
