---
# ==============================================================================
# pazny.uptime_kuma/tasks/monitors.yml
#
# Auto-configure Uptime Kuma after container startup:
#   1. install uptime-kuma-api + PyYAML
#   2. wait for the web UI
#   3. load state/manifest.yml → derive the canonical monitor set
#   4. add DB TCP probes (MariaDB / PostgreSQL / Redis), FreePBX TCP,
#      Nginx HTTPS loopback, and optional Docker healthcheck pass-through
#   5. reconverge the admin password (reset-password.py)
#   6. invoke setup-monitors.py with a spec JSON that covers
#        monitors + ntfy + Glasswing webhook + public status page
#   7. verify monitor count
# ==============================================================================

- name: "[pazny.uptime_kuma] Install uptime-kuma-api + PyYAML"
  ansible.builtin.pip:
    name:
      - uptime-kuma-api
      - PyYAML
    state: present
    extra_args: "--user"
  register: _kuma_pip
  failed_when: false
  changed_when: "'Successfully installed' in (_kuma_pip.stdout | default(''))"

- name: "[pazny.uptime_kuma] Wait for API to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ uptime_kuma_port | default(3001) }}/"
    method: GET
    timeout: 5
    status_code: [200, 301, 302]
    validate_certs: false
  register: _kuma_ready
  until: _kuma_ready.status | default(0) | int in [200, 301, 302]
  retries: 12
  delay: 10
  failed_when: false

- name: "[pazny.uptime_kuma] Load state/manifest.yml"
  ansible.builtin.set_fact:
    _kuma_manifest: "{{ lookup('file', playbook_dir ~ '/state/manifest.yml') | from_yaml }}"

- name: "[pazny.uptime_kuma] Keep only manifest services with a domain_var that are currently enabled"
  ansible.builtin.set_fact:
    _kuma_domain_services: >-
      {{
        _kuma_manifest.services
        | selectattr('domain_var', 'defined')
        | selectattr('install_flag', 'defined')
        | list
      }}

- name: "[pazny.uptime_kuma] Seed monitor spec with an empty list"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: []

- name: "[pazny.uptime_kuma] Append one HTTP monitor per enabled domain-backed service"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [_m] }}"
  loop: "{{ _kuma_domain_services }}"
  loop_control:
    loop_var: svc
    label: "{{ svc.id }}"
  vars:
    _domain: "{{ vars[svc.domain_var] | default('') }}"
    _m:
      name: "{{ svc.id | replace('_', ' ') | title }}"
      type: "http"
      url: "https://{{ _domain }}"
      interval: 60
      maxretries: 2
      ignore_tls: true
      accepted_statuscodes: ["200-299", "301", "302", "401", "403"]
      expiry_notification: "{{ uptime_kuma_tls_expiry_monitors | default(true) }}"
      tags: ["{{ svc.stack | default('host') }}", "{{ svc.category | default('service') }}"]
  when:
    - svc.install_flag in vars
    - vars[svc.install_flag] | default(false)
    - vars[svc.domain_var] | default('') | length > 0

# ── Database / infra TCP probes ─────────────────────────────────────────────
- name: "[pazny.uptime_kuma] Append MariaDB TCP monitor"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'MariaDB TCP', 'type': 'tcp', 'hostname': '127.0.0.1', 'port': mariadb_port | default(3306), 'interval': 60, 'maxretries': 2, 'tags': ['infra', 'db']}] }}"
  when: install_mariadb | default(false)

- name: "[pazny.uptime_kuma] Append PostgreSQL TCP monitor"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'PostgreSQL TCP', 'type': 'tcp', 'hostname': '127.0.0.1', 'port': postgresql_port | default(5432), 'interval': 60, 'maxretries': 2, 'tags': ['infra', 'db']}] }}"
  when: install_postgresql | default(false)

- name: "[pazny.uptime_kuma] Append Redis TCP monitor"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'Redis TCP', 'type': 'tcp', 'hostname': '127.0.0.1', 'port': redis_port | default(6379), 'interval': 60, 'maxretries': 2, 'tags': ['infra', 'db']}] }}"
  when: install_redis | default(false)

- name: "[pazny.uptime_kuma] Append FreePBX TCP monitor"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'FreePBX Web', 'type': 'tcp', 'hostname': '127.0.0.1', 'port': freepbx_port | default(8088), 'interval': 60, 'maxretries': 2, 'tags': ['voip']}] }}"
  when: install_freepbx | default(false)

- name: "[pazny.uptime_kuma] Append Nginx HTTPS loopback monitor"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'Nginx HTTPS', 'type': 'http', 'url': 'https://127.0.0.1/', 'interval': 60, 'maxretries': 2, 'ignore_tls': true, 'accepted_statuscodes': ['200-299', '301', '302', '404'], 'tags': ['infra', 'proxy']}] }}"

# ── Optional: Docker container healthcheck pass-through ────────────────────
# Requires Uptime Kuma to reach the Docker socket. Disabled by default
# (uptime_kuma_docker_host_monitors: false in default.config.yml).
- name: "[pazny.uptime_kuma] Append Docker healthcheck monitors (opt-in)"
  ansible.builtin.set_fact:
    _kuma_spec_monitors: "{{ _kuma_spec_monitors + [{'name': 'Docker: ' ~ item, 'type': 'docker', 'docker_container': item, 'interval': 60, 'maxretries': 2, 'tags': ['docker']}] }}"
  loop:
    - infra-mariadb-1
    - infra-postgresql-1
    - infra-redis-1
    - infra-authentik-server-1
  when: uptime_kuma_docker_host_monitors | default(false)

- name: "[pazny.uptime_kuma] Assemble final spec document (monitors + notifications + status page)"
  ansible.builtin.set_fact:
    _kuma_spec:
      monitors: "{{ _kuma_spec_monitors }}"
      notifications:
        ntfy:
          enabled: "{{ install_ntfy | default(false) }}"
          name: "nOS → ntfy"
          server_url: "https://{{ ntfy_domain | default('ntfy.dev.local') }}"
          topic: "{{ uptime_kuma_ntfy_topic | default('nos-alerts') }}"
          is_default: true
        webhook:
          enabled: true
          name: "nOS → Wing (Bone)"
          url: "{{ uptime_kuma_notify_webhook_url | default('http://127.0.0.1:' ~ (bone_port | default(8099)) ~ '/api/events') }}"
          hmac_secret: "{{ wing_api_token | default('') }}"
          is_default: true
          body:
            source: "uptime-kuma"
            event_type: "probe.failed"
            payload:
              msg: "{{ '{{msg}}' }}"
              monitor: "{{ '{{monitorJSON}}' }}"
              heartbeat: "{{ '{{heartbeatJSON}}' }}"
      status_page:
        enabled: true
        slug: "{{ uptime_kuma_status_page_slug | default('nos') }}"
        title: "{{ uptime_kuma_status_page_title | default('nOS Service Status') }}"
        description: "Live health of every self-hosted service on this nOS instance."

- name: "[pazny.uptime_kuma] Deploy helper scripts from role"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ uptime_kuma_data_dir }}/{{ item }}"
    mode: '0755'
  loop:
    - setup-monitors.py
    - reset-password.py

- name: "[pazny.uptime_kuma] Write spec file (JSON) for setup-monitors.py"
  ansible.builtin.copy:
    dest: "{{ uptime_kuma_data_dir }}/monitors.spec.json"
    content: "{{ _kuma_spec | to_nice_json }}"
    mode: '0600'
  no_log: true

# ── Reconverge admin password BEFORE monitor setup ─────────────────────────
# Password reconverge runs first so login() in setup-monitors.py uses the
# current prefix. The helper tries current pw first (converged) → falls back
# to previous prefix + change_password → drift resolved.
- name: "[pazny.uptime_kuma] Reconverge admin password"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ uptime_kuma_data_dir }}/reset-password.py"
      - "http://127.0.0.1:{{ uptime_kuma_port | default(3001) }}"
      - "{{ uptime_kuma_admin_user | default('admin') }}"
      - "{{ uptime_kuma_admin_password }}"
      - "{{ previous_password_prefix | default(global_password_prefix) }}_pw_uptime_kuma"
  register: _kuma_pw_reset
  changed_when: "'UPDATED' in (_kuma_pw_reset.stdout | default(''))"
  failed_when: false
  when:
    - not (_kuma_pip.failed | default(false))
    - _kuma_ready.status | default(0) | int in [200, 301, 302]

- name: "[pazny.uptime_kuma] Auto-create monitors / notifications / status page"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ uptime_kuma_data_dir }}/setup-monitors.py"
      - "--url"
      - "http://127.0.0.1:{{ uptime_kuma_port | default(3001) }}"
      - "--user"
      - "{{ uptime_kuma_admin_user | default('admin') }}"
      - "--password"
      - "{{ uptime_kuma_admin_password }}"
      - "--config"
      - "{{ uptime_kuma_data_dir }}/monitors.spec.json"
      - "-v"
  register: _kuma_result
  changed_when: "'[+] Created' in (_kuma_result.stdout | default(''))"
  failed_when: false
  when:
    - not (_kuma_pip.failed | default(false))
    - _kuma_ready.status | default(0) | int in [200, 301, 302]
    - uptime_kuma_auto_monitors | default(true)

- name: "[pazny.uptime_kuma] Monitor setup output"
  ansible.builtin.debug:
    msg: "{{ _kuma_result.stdout_lines | default(_kuma_result.stderr_lines | default(['Skipped'])) }}"

# ── Post-setup verification: count monitors via the REST API ───────────────
# Uses the /metrics endpoint (public, no auth) to get a rough monitor count;
# falls back to the stdout summary from setup-monitors.py for the exact number.
- name: "[pazny.uptime_kuma] Verify monitor count summary"
  ansible.builtin.debug:
    msg: >-
      Requested {{ _kuma_spec.monitors | length }} monitors.
      Result: {{ (_kuma_result.stdout_lines | default([]) | select('match', '^Done:') | list) | default(['(skipped)']) | first }}
  when: _kuma_result is defined

- name: "[pazny.uptime_kuma] WARN: pip install failed"
  ansible.builtin.debug:
    msg: "uptime-kuma-api pip install failed: {{ _kuma_pip.msg | default('unknown') }}. Monitors were not created."
  when: _kuma_pip.failed | default(false)
