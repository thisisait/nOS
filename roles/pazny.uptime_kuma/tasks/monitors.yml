- name: "[pazny.uptime_kuma] Deploy helper scripts from role"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ uptime_kuma_data_dir }}/{{ item }}"
    mode: '0755'
  loop:
    - setup-monitors.py
    - reset-password.py

# ── Reconverge admin password BEFORE monitor setup ──────────────────────
# Password reconverge musi probehnout pred setup-monitors.py, aby login()
# v monitor skriptu pouzil aktualni prefix. Script tries new pw first
# (converged) → falls back to previous prefix + change_password → DRIFT.
- name: "[pazny.uptime_kuma] Reconverge admin password"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ uptime_kuma_data_dir }}/reset-password.py"
      - "http://127.0.0.1:{{ uptime_kuma_port | default(3001) }}"
      - "{{ uptime_kuma_admin_user | default('admin') }}"
      - "{{ uptime_kuma_admin_password }}"
      - "{{ previous_password_prefix | default(global_password_prefix) }}_pw_uptime_kuma"
  register: _kuma_pw_reset
  changed_when: "'UPDATED' in (_kuma_pw_reset.stdout | default(''))"
  failed_when: false
  when:
    - not (_kuma_pip.failed | default(false))
    - _kuma_ready.status | default(0) | int in [200, 301, 302]

- name: "[pazny.uptime_kuma] Auto-create monitors"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ uptime_kuma_data_dir }}/setup-monitors.py"
      - "http://127.0.0.1:{{ uptime_kuma_port | default(3001) }}"
      - "{{ uptime_kuma_admin_user | default('admin') }}"
      - "{{ uptime_kuma_admin_password }}"
      - "{{ _kuma_monitors | to_json }}"
  register: _kuma_result
  changed_when: "'Created' in (_kuma_result.stdout | default(''))"
  failed_when: false
  when:
    - not (_kuma_pip.failed | default(false))
    - _kuma_ready.status | default(0) | int in [200, 301, 302]
    - uptime_kuma_auto_monitors | default(true)

- name: "[pazny.uptime_kuma] Monitor setup result"
  ansible.builtin.debug:
    msg: "{{ _kuma_result.stdout_lines | default(_kuma_result.stderr_lines | default(['Skipped'])) }}"

- name: "[pazny.uptime_kuma] WARN: pip install failed"
  ansible.builtin.debug:
    msg: "uptime-kuma-api pip install selhalo: {{ _kuma_pip.msg | default('unknown') }}. Monitory nebyly vytvořeny."
  when: _kuma_pip.failed | default(false)
