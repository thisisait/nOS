---
# pazny.postgresql — handlers
# Restart postgresql is also defined play-level in main.yml for backward
# kompatibilitu s notify: z tasku mimo tuto roli. Play-level handler
# takes priority, so this role-local one is effectively unreachable,
# but the definition stays for role independence.

- name: Restart postgresql
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
    restart postgresql
  failed_when: false
