---
# ==============================================================================
# pazny.postgresql/tasks/main.yml
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`:
# creates the data dir, renders the compose override fragment to
# {{ stacks_dir }}/infra/overrides/postgresql.yml, which core-up.yml then
# collects via `find` and passes as an additional -f flag.
#
# Post-start DB/user/extension setup lives in tasks/post.yml — called from
# core-up.yml AFTER compose up (Postgres must be running before we create
# database, user and the pgcrypto extension).
# ==============================================================================

- name: "[pazny.postgresql] Ensure data directory exists"
  ansible.builtin.file:
    path: "{{ postgresql_data_dir | default(ansible_facts['env']['HOME'] + '/postgresql/data') }}"
    state: directory
    mode: '0755'

- name: "[pazny.postgresql] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/postgresql.yml"
    mode: '0600'
  notify: Restart postgresql
