---
galaxy_info:
  role_name: postgresql
  namespace: pazny
  author: Pázny
  description: PostgreSQL in Docker compose override (nOS infra stack)
  license: MIT
  min_ansible_version: "2.20"
  platforms:
    - name: MacOSX
      versions:
        - all

# No role dependencies — this role is the shared data base for
# authentik/infisical/outline/metabase/superset/paperclip.
# Orchestration (compose up sequencing, post-start sequence) lives in
# tasks/stacks/core-up.yml.
dependencies: []

# No declared collections — the role uses `docker compose exec` against the
# postgres container for schema setup (see tasks/stacks/core-up.yml's
# postgres post-start block). community.postgresql was declared
# aspirationally pre-2026; dropped 2026-05-01 (Track H Phase 1) once usage
# audit confirmed zero references in the codebase. Re-add with explicit
# version range if a future role needs the pg query modules.
collections: []
