---
galaxy_info:
  role_name: postgresql
  namespace: pazny
  author: Pázny
  description: PostgreSQL in Docker compose override (nOS infra stack)
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: MacOSX
      versions:
        - all

# No role dependencies — this role is the shared data base for
# authentik/infisical/outline/metabase/superset/paperclip/jsos.
# Orchestration (compose up sequencing, post-start sequence) lives in
# tasks/stacks/core-up.yml.
dependencies: []

collections:
  - community.postgresql  # pg query modules (volitelne; post.yml aktualne vola psql pres docker compose exec)
