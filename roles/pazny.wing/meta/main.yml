---
galaxy_info:
  role_name: wing
  namespace: pazny
  author: Pázny
  description: Wing — Nette PHP + SQLite read model / dashboard organ of nOS (formerly Glasswing)
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: MacOSX
      versions:
        - all

# No role dependencies — PHP / nginx / composer are installed in main.yml
# before the wing role. The handler "Restart php-fpm" is defined play-level
# in main.yml and globally visible to all roles.
dependencies: []

collections:
  - ansible.posix  # ansible.posix.synchronize
