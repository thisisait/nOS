---
# ==============================================================================
# pazny.wing — Nette security-research dashboard, host runtime via FrankenPHP.
#
# History:
#   pre-2026-04-26 — host PHP-FPM (Homebrew php@8.3) + host nginx vhost
#   2026-04-26 (Track A) — containerized: `wing` FPM service + `wing-nginx`
#                          sidecar in the iiab compose stack
#   2026-05-04 (Anatomy A3.5) — REVERSED back to host runtime, this time as
#                          a single FrankenPHP launchd daemon. Eliminates the
#                          wing-nginx sidecar entirely (FrankenPHP bundles
#                          PHP runtime + Caddy HTTP server in one binary).
#                          Mirrors A3a Bone host-revert (commit `7d31fd0..`).
#                          Closes the wing-nginx stale-IP 502 bug class
#                          surfaced 2026-05-04 — no sidecar = no Docker DNS
#                          cache to go stale.
#
# Source tree: files/anatomy/wing/  (committed as of A2)
# Runtime tree: ~/wing/{app,log,repos,patches}
# launchd label: eu.thisisait.nos.wing
#
# Credentials (wing_api_token) stay in top-level default.credentials.yml so
# prefix rotation via global_password_prefix works consistently.
# ==============================================================================

wing_domain: "wing{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
wing_app_dir: "{{ ansible_facts['env']['HOME'] }}/wing/app"
wing_data_dir: "{{ wing_app_dir }}/data"
wing_log_dir: "{{ ansible_facts['env']['HOME'] }}/wing/log"
wing_runtime_dir: "{{ ansible_facts['env']['HOME'] }}/wing"
wing_caddyfile_path: "{{ wing_runtime_dir }}/Caddyfile"
wing_json_source: "{{ playbook_dir }}/docs/llm/security"

# FrankenPHP listens on this loopback port. Traefik file provider routes
# wing.<tld> → host.docker.internal:9000. Don't change unless you also
# update state/manifest.yml port_var.
wing_port: 9000

# launchd label for the FrankenPHP daemon. Mirrors Bone (A3a) + Pulse (A4)
# under the eu.thisisait.nos.* namespace.
wing_launchd_label: "eu.thisisait.nos.wing"

# FrankenPHP binary path (Homebrew default). The role installs this via
# `community.general.homebrew` if missing — see tasks/main.yml.
frankenphp_bin: "/opt/homebrew/bin/frankenphp"
