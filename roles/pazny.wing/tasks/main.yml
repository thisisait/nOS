---
# ==============================================================================
# pazny.wing/tasks/main.yml — RENDER PHASE.
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`.
# Synchronises Wing source from the playbook to the host (so the bind-mount
# inside the wing container has actual code to serve), then renders the
# compose-override fragment.
#
# The post-start phase (composer install + DB init + token reconverge +
# legacy host-FPM teardown) runs in tasks/post.yml AFTER the iiab stack is up
# — those tasks call `docker compose run --rm wing-cli` and need the wing
# image to exist already (compose builds it on first `up`).
# ==============================================================================

- name: "[pazny.wing] Ensure host directories exist (bind-mount targets)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ wing_app_dir }}"
    - "{{ wing_data_dir }}"
    - "{{ wing_app_dir }}/temp"
    - "{{ wing_app_dir }}/log"
    - "{{ ansible_facts['env']['HOME'] }}/wing/repos"
    - "{{ ansible_facts['env']['HOME'] }}/wing/patches"

- name: "[pazny.wing] Rsync app source to host (read-only inside container)"
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/files/project-wing/"
    dest: "{{ wing_app_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=data/"
      - "--exclude=temp/"
      - "--exclude=log/"
      - "--exclude=vendor/"
      - "--exclude=*.bak"
      - "--exclude=.git/"
      - "--exclude=tests/node_modules/"
      - "--exclude=tests/playwright-report/"
      - "--exclude=tests/test-results/"
      - "--exclude=tests/.env"
  delegate_to: "{{ inventory_hostname }}"
  notify: Restart wing

# Track A → as of 2026-04-26: container UID is bound to the host user's UID
# (see wing_container_uid in defaults/main.yml) so files written by FPM
# inside the container have correct ownership on the host without a chown
# step. macOS Docker Desktop's filesystem proxy refuses writes when the
# container UID doesn't match a real host user — anchoring container UID
# to host UID sidesteps that entirely. On Linux (where bind-mount semantics
# are direct UID-equivalence), it's also the simplest valid setup.

- name: "[pazny.wing] Render compose-override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/wing.yml"
    mode: '0600'
  notify: Restart wing

# nginx sidecar config for the FPM HTTP front. Lives at ~/wing/wing-nginx.conf
# so it survives a wing_app_dir wipe.
- name: "[pazny.wing] Render wing-nginx sidecar config"
  ansible.builtin.template:
    src: wing-nginx.conf.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/wing/wing-nginx.conf"
    mode: '0644'
  when: wing_with_sidecar | default(true) | bool
  notify: Restart wing
