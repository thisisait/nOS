---
# ==============================================================================
# pazny.wing/tasks/main.yml — RENDER PHASE.
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose up iiab`.
# Synchronises Wing source from the playbook to the host (so the bind-mount
# inside the wing container has actual code to serve), then renders the
# compose-override fragment.
#
# The post-start phase (composer install + DB init + token reconverge +
# legacy host-FPM teardown) runs in tasks/post.yml AFTER the iiab stack is up
# — those tasks call `docker compose run --rm wing-cli` and need the wing
# image to exist already (compose builds it on first `up`).
# ==============================================================================

- name: "[pazny.wing] Ensure host directories exist (bind-mount targets)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ wing_app_dir }}"
    - "{{ wing_data_dir }}"
    - "{{ wing_app_dir }}/temp"
    - "{{ wing_app_dir }}/log"
    - "{{ ansible_facts['env']['HOME'] }}/wing/repos"
    - "{{ ansible_facts['env']['HOME'] }}/wing/patches"

- name: "[pazny.wing] Rsync app source to host (read-only inside container)"
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/files/project-wing/"
    dest: "{{ wing_app_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=data/"
      - "--exclude=temp/"
      - "--exclude=log/"
      - "--exclude=vendor/"
      - "--exclude=*.bak"
      - "--exclude=.git/"
      - "--exclude=tests/node_modules/"
      - "--exclude=tests/playwright-report/"
      - "--exclude=tests/test-results/"
      - "--exclude=tests/.env"
  delegate_to: "{{ inventory_hostname }}"
  notify: Restart wing

- name: "[pazny.wing] Chown wing tree to FPM container UID/GID"
  # The wing container runs FPM as uid={{ wing_container_uid }} (non-root).
  # Without this chown FPM can't write to temp/, log/, or data/wing.db.
  # Recursive but cheap (small tree, only changes on first run / blank).
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ wing_container_uid }}"
    group: "{{ wing_container_gid }}"
    recurse: true
  loop:
    - "{{ wing_data_dir }}"
    - "{{ wing_app_dir }}/temp"
    - "{{ wing_app_dir }}/log"
  become: true

- name: "[pazny.wing] Render compose-override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/wing.yml"
    mode: '0600'
  notify: Restart wing
