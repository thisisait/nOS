---
# ==============================================================================
# pazny.wing/tasks/post.yml — POST-START PHASE.
#
# Anatomy A3.5 (2026-05-04): all PHP CLI ops run host-native (no more
# `docker compose run --rm wing-cli`). Composer is host-installed via
# Homebrew; PHP is whatever frankenphp ships (or the Homebrew php@8.x in
# PATH for CLI scripts). The `wing-cli` profile service is gone.
#
# Runs from tasks/stacks/stack-up.yml AFTER the iiab stack is up, but the
# iiab stack no longer carries Wing — Wing has its own launchd daemon
# already-bootstrapped by tasks/main.yml. We could move post.yml earlier;
# kept here to preserve the "main.yml renders, post.yml does state ops"
# split that mirrors all other anatomy roles (Bone A3a, Pulse A4).
# ==============================================================================

# ── DB init: create schema if wing.db is empty ───────────────────────────────

- name: "[pazny.wing] Initialize SQLite database schema (idempotent)"
  ansible.builtin.command:
    cmd: php bin/init-db.php --data-dir={{ wing_data_dir }}
    chdir: "{{ wing_app_dir }}"
  register: _wing_initdb
  changed_when: "'Created' in (_wing_initdb.stdout | default(''))"

- name: "[pazny.wing] Migrate components → systems (idempotent)"
  ansible.builtin.command:
    cmd: php bin/migrate-systems.php --data-dir={{ wing_data_dir }}
    chdir: "{{ wing_app_dir }}"
  register: _wing_migrate_sys
  changed_when: >
    'Migrated' in (_wing_migrate_sys.stdout | default(''))
    or 'Created' in (_wing_migrate_sys.stdout | default(''))

# ── Legacy JSON migration (only on a brand-new install) ──────────────────────

- name: "[pazny.wing] Detect whether legacy JSON migration is still needed"
  ansible.builtin.command:
    argv:
      - php
      - -r
      - >-
        $db = new SQLite3('{{ wing_data_dir }}/wing.db');
        echo $db->querySingle('SELECT COUNT(*) FROM systems WHERE source IN ("components_db","manual")');
        $db->close();
  register: _wing_component_count
  changed_when: false

- name: "[pazny.wing] Stat legacy JSON source dir (skip migration if no markdown to import)"
  # The legacy migrate.php is an upgrade path from old Wing where component
  # metadata lived in markdown files under docs/llm/security. Fresh-blank
  # installs don't have anything to migrate from; skip cleanly so the
  # playbook doesn't trip on `migrate.php: Usage: ...` (rc=1) when the
  # directory is empty or absent.
  ansible.builtin.find:
    paths: "{{ wing_json_source }}"
    patterns: "*.md"
    file_type: file
  register: _wing_legacy_md
  changed_when: false
  failed_when: false

- name: "[pazny.wing] Run legacy JSON → SQLite import (only if no rows yet AND markdown sources exist)"
  ansible.builtin.command:
    cmd: php bin/migrate.php --json-dir={{ wing_json_source }} --data-dir={{ wing_data_dir }}
    chdir: "{{ wing_app_dir }}"
  register: _wing_migrate
  when:
    - (_wing_component_count.stdout | default('0') | trim | int) == 0
    - (_wing_legacy_md.files | default([]) | length) > 0

# ── Service registry ingestion ───────────────────────────────────────────────

- name: "[pazny.wing] Ingest service-registry.json into systems table"
  ansible.builtin.command:
    cmd: php bin/ingest-registry.php --registry={{ ansible_facts['env']['HOME'] }}/projects/default/service-registry.json
    chdir: "{{ wing_app_dir }}"
  register: _wing_ingest
  changed_when: >
    'Ingested' in (_wing_ingest.stdout | default(''))
    and 'Ingested 0' not in (_wing_ingest.stdout | default(''))

# ── API token reconverge ─────────────────────────────────────────────────────
# Provisions named tokens for every first-class Wing consumer. Each gets its
# own row so the audit trail carries a meaningful actor name. Idempotent.

- name: "[pazny.wing] Reconverge API token — ansible-provisioned (operator)"
  ansible.builtin.command:
    argv:
      - php
      - "{{ wing_app_dir }}/bin/provision-token.php"
      - --db={{ wing_data_dir }}/wing.db
      - --token={{ wing_api_token }}
      - --name=ansible-provisioned
    chdir: "{{ wing_app_dir }}"
  register: _wing_token_result
  changed_when: >
    'Created' in (_wing_token_result.stdout | default(''))
    or 'Updated' in (_wing_token_result.stdout | default(''))
  no_log: true

- name: "[pazny.wing] Reconverge API token — conductor (A8 Claude Code agent)"
  ansible.builtin.command:
    argv:
      - php
      - "{{ wing_app_dir }}/bin/provision-token.php"
      - --db={{ wing_data_dir }}/wing.db
      - --token={{ conductor_wing_api_token }}
      - --name=conductor
    chdir: "{{ wing_app_dir }}"
  register: _wing_conductor_token
  changed_when: >
    'Created' in (_wing_conductor_token.stdout | default(''))
    or 'Updated' in (_wing_conductor_token.stdout | default(''))
  no_log: true

- name: "[pazny.wing] Reconverge API token — openclaw (B1: A8 agent, wing-side provisioning)"
  ansible.builtin.command:
    argv:
      - php
      - "{{ wing_app_dir }}/bin/provision-token.php"
      - --db={{ wing_data_dir }}/wing.db
      - --token={{ openclaw_wing_api_token }}
      - --name=openclaw
    chdir: "{{ wing_app_dir }}"
  register: _wing_openclaw_token
  changed_when: >
    'Created' in (_wing_openclaw_token.stdout | default(''))
    or 'Updated' in (_wing_openclaw_token.stdout | default(''))
  no_log: true
  when: install_openclaw | default(false)

# ── Pulse job registration via Wing API ──────────────────────────────────────
# Plugin loader does not yet process pulse: blocks — jobs are registered here
# directly. Wing must be running at this point (started by main.yml above,
# docker compose stacks start before post.yml runs). B2 fix (2026-05-07).

- name: "[pazny.wing] Wait for Wing API health (hub/health 200, confirms DB init done)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ wing_port | default(9000) }}/api/v1/hub/health"
    method: GET
    status_code: 200
  register: _wing_health
  until: _wing_health.status == 200
  retries: 12
  delay: 5
  failed_when: false

# ── Pulse job registration — data-driven from plugin manifests + agents ─────
# X.2 (2026-05-08) refactor: the previous shape hardcoded two
# `ansible.builtin.uri` blocks (gitleaks + conductor) at ~50 LOC each.
# Source-of-truth is now each plugin's `pulse:` block (gitleaks/plugin.yml
# already had it) + each agent profile's `pulse:` block (conductor.yml
# already had it). The migration target is plugin loader's
# `replay_api_calls` action (Lane C5 in the C-series roadmap); until that
# lands, this loop is the bridge:
#   1. Glob plugin + agent yamls.
#   2. Extract `pulse.jobs[]` from each.
#   3. POST each to /api/v1/pulse_jobs (idempotent on plugin_name+job_name).
# pulse-base/plugin.yml pins the long-term contract (aggregator decl).
- name: "[pazny.wing] Discover Pulse job catalog from plugin manifests + agent profiles"
  ansible.builtin.shell: |
    python3 <<'PY'
    import json, glob, sys, yaml
    # Plugin manifests carry Jinja tokens like `{{ playbook_dir }}` and
    # `{{ global_password_prefix }}_pw_*` in command/env strings — they're
    # authored as templates, not literals. Pulse stores the rendered
    # command in pulse_jobs.command and execs it directly (no Jinja
    # engine at fire-time). We must therefore expand the tokens BEFORE
    # POSTing to Wing, otherwise Pulse later forks `bash {{ playbook_dir }}/...`
    # which exits 127 ("command not found"). Surfaced live 2026-05-07
    # when the conductor self-test job auto-fired with rc=127.
    SUBSTITUTIONS = {
        '{{ playbook_dir }}': '{{ playbook_dir }}',
        '{{ authentik_domain }}': '{{ authentik_domain | default("auth." ~ tenant_domain) }}',
        '{{ tenant_domain }}': '{{ tenant_domain | default("dev.local") }}',
        '{{ global_password_prefix }}': '{{ global_password_prefix }}',
        '{{ wing_api_token }}': '{{ wing_api_token }}',
        '{{ conductor_wing_api_token }}': '{{ conductor_wing_api_token }}',
        '{{ bone_secret }}': '{{ bone_secret }}',
    }
    def _expand(value):
        if isinstance(value, str):
            for token, replacement in SUBSTITUTIONS.items():
                value = value.replace(token, replacement)
            return value
        if isinstance(value, dict):
            return {k: _expand(v) for k, v in value.items()}
        if isinstance(value, list):
            return [_expand(v) for v in value]
        return value
    catalog = []
    sources = (
        glob.glob('{{ playbook_dir }}/files/anatomy/plugins/*/plugin.yml')
        + glob.glob('{{ playbook_dir }}/files/anatomy/agents/*.yml')
    )
    for path in sources:
        try:
            with open(path) as fh:
                doc = yaml.safe_load(fh) or {}
        except Exception:
            continue
        block = doc.get('pulse') or {}
        for job in (block.get('jobs') or []):
            catalog.append({
                'source': path.split('/anatomy/')[-1],
                'plugin_name': doc.get('name')
                              or doc.get('agent_id')
                              or path.split('/')[-1].replace('.yml', ''),
                'job': _expand(job),
            })
    print(json.dumps(catalog))
    PY
  args:
    executable: /bin/bash
  register: _pulse_catalog_raw
  changed_when: false
  check_mode: false

- name: "[pazny.wing] Parse Pulse job catalog"
  ansible.builtin.set_fact:
    _pulse_catalog: "{{ _pulse_catalog_raw.stdout | from_json }}"

- name: "[pazny.wing] Register discovered Pulse jobs (idempotent upsert)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ wing_port | default(9000) }}/api/v1/pulse_jobs"
    method: POST
    headers:
      Authorization: "Bearer {{ wing_api_token }}"
    body_format: json
    body:
      plugin_name: "{{ item.plugin_name | regex_replace('-base$', '') }}"
      job_name: "{{ item.job.name }}"
      command: "{{ item.job.command }}"
      runner: "{{ item.job.runner | default('subprocess') }}"
      schedule: "{{ item.job.schedule }}"
      jitter_min: "{{ item.job.jitter_min | default(0) }}"
      max_runtime_s: "{{ item.job.max_runtime_s | default(300) }}"
      max_concurrent: "{{ item.job.max_concurrent | default(1) }}"
      env: "{{ item.job.env | default({}) }}"
    status_code: [200, 201]
  loop: "{{ _pulse_catalog }}"
  loop_control:
    label: "{{ item.plugin_name }}:{{ item.job.name }}"
  register: _pulse_jobs_reg
  retries: 3
  delay: 5
  until: _pulse_jobs_reg.status in [200, 201]
  changed_when: _pulse_jobs_reg.status == 201
  no_log: true

# ── Local .env for Playwright + Wing ─────────────────────────────────────────
# Lives outside the bind-mount so it isn't part of the container payload.

- name: "[pazny.wing] Write .env with API token + e2e credentials"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/wing/.env"
    mode: '0600'
    content: |
      # Auto-generated by pazny.wing — do not edit
      WING_API_TOKEN={{ wing_api_token }}
      WING_URL=https://{{ wing_domain | default('wing' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}
      DEV_DOMAIN={{ tenant_domain | default('dev.local') }}
