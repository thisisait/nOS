---
# pazny.nodered — handlers
# Play-level "Restart nodered" in main.yml takes priority; this one stays for
# standalone use of the role outside the nOS playbook.

- name: Restart nodered
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart nodered
  failed_when: false
