---
# pazny.nodered — handlers
# Play-level "Restart nodered" v main.yml ma prednost; tento zustava pro
# samostatne pouziti role mimo devBoxNOS playbook.

- name: Restart nodered
  ansible.builtin.shell: >
    {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
    restart nodered
  failed_when: false
