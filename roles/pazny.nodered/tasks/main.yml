---
# ==============================================================================
# pazny.nodered/tasks/main.yml
#
# Called from tasks/stacks/stack-up.yml BEFORE `docker compose -p iiab up`:
# creates the data dir, renders settings.js (β1.B: native OIDC adminAuth via
# passport-openidconnect when install_authentik=true), pre-seeds
# /data/package.json so Node-RED's entrypoint installs the OIDC strategy
# package on first boot, and writes the compose override fragment.
#
# Nginx vhost (templates/nginx/sites-available/nodered.conf) se renderuje
# top-level nginx taskem a enabluje se symlinkem nize.
# ==============================================================================

- name: "[pazny.nodered] Ensure data directory exists"
  # The Docker nodered image runs as UID 1000 — if the host user has a different
  # UID, Docker Desktop for Mac handles it via osxfs/virtiofs user mapping.
  # We accept failures here because on macOS chown without `become: true`
  # may bounce against System Integrity Protection / TCC — the Docker
  # mount works regardless.
  ansible.builtin.file:
    path: "{{ nodered_data_dir }}"
    state: directory
    mode: '0755'
  failed_when: false

- name: "[pazny.nodered] Render settings.js (β1.B: native OIDC adminAuth)"
  ansible.builtin.template:
    src: settings.js.j2
    dest: "{{ nodered_data_dir }}/settings.js"
    mode: '0644'
  notify: Restart nodered

# β1.B — pre-seed /data/package.json so Node-RED's entrypoint installs
# `passport-openidconnect` into /data/node_modules on first boot.
- name: "[pazny.nodered] Render /data/package.json (OIDC strategy deps)"
  ansible.builtin.template:
    src: package.json.j2
    dest: "{{ nodered_data_dir }}/package.json"
    mode: '0644'
  notify: Restart nodered

# β1.B — pre-install OIDC npm deps on the HOST before the container starts.
# settings.js has a top-level require("passport-openidconnect") that runs
# when Node-RED loads the config file — BEFORE the container's entrypoint
# npm-install hook fires. Without this task the container crashes on first
# boot with "Cannot find module 'passport-openidconnect'".
- name: "[pazny.nodered] Pre-install OIDC npm deps into data dir (host npm)"
  ansible.builtin.command:
    cmd: npm install --prefer-offline
    chdir: "{{ nodered_data_dir }}"
  environment:
    PATH: "{{ homebrew_prefix }}/bin:/usr/local/bin:/usr/bin:/bin"
  when: install_authentik | default(false) | bool
  changed_when: false
  failed_when: false

- name: "[pazny.nodered] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/iiab/overrides/nodered.yml"
    mode: '0600'
  notify: Restart nodered
