---
# ==============================================================================
# pazny.nginx_container/tasks/main.yml — RENDER PHASE.
#
# Called from tasks/stacks/core-up.yml BEFORE `docker compose up infra`.
# Sets up the host directories nginx will bind-mount, then renders the
# compose-override fragment.
#
# The actual vhost / nginx.conf rendering is still done by tasks/nginx.yml —
# but to a different destination when this role is active. We set
# nginx_backend_host = "nos-host" so vhost templates' proxy_pass /
# fastcgi_pass values resolve to the host loopback alias the container
# can reach (see compose.yml.j2 extra_hosts).
# ==============================================================================

# ── Coexistence guard ────────────────────────────────────────────────────────
# Two reverse proxies on 80/443 = port collision. Refuse the run early
# rather than failing midway through compose-up with a cryptic Docker
# error.
- name: "[pazny.nginx_container] Refuse if host nginx is also enabled"
  ansible.builtin.fail:
    msg: |
      install_nginx ({{ install_nginx | default(true) }}) and
      install_nginx_container ({{ install_nginx_container | default(false) }})
      are both true. Pick one — they would clash on ports
      {{ nginx_container_http_port }}/{{ nginx_container_https_port }}.

      To migrate from host nginx to container nginx, run the migration
      recipe: ansible-playbook main.yml --tags migrate -e migration_id=2026-05-15-nginx-host-to-container
  when:
    - install_nginx | default(true) | bool
    - install_nginx_container | default(false) | bool

# ── Override the backend host alias for vhost templates ──────────────────────
# tasks/nginx.yml will render vhosts with this value; the container
# resolves nos-host to host-gateway via compose extra_hosts.
- name: "[pazny.nginx_container] Set backend host alias for vhost templates"
  ansible.builtin.set_fact:
    nginx_backend_host: "nos-host"

# ── Stack tree on the host ───────────────────────────────────────────────────
- name: "[pazny.nginx_container] Ensure host directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ nginx_container_root }}"
    - "{{ nginx_container_etc }}"
    - "{{ nginx_container_etc }}/sites-available"
    - "{{ nginx_container_etc }}/sites-enabled"
    - "{{ nginx_container_etc }}/conf.d"
    - "{{ nginx_container_etc }}/ssl"
    - "{{ nginx_container_logs }}"
    - "{{ nginx_container_cache }}"

# ── Render compose-override fragment ─────────────────────────────────────────
- name: "[pazny.nginx_container] Render compose override fragment"
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ stacks_dir }}/infra/overrides/nginx.yml"
    mode: '0600'
  notify: Restart nginx_container

# ── Print summary ────────────────────────────────────────────────────────────
- name: "[pazny.nginx_container] Print setup summary"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       nginx — containerized (Track post-A, 2026-04-27)
      ══════════════════════════════════════════════════════
       Image:          {{ nginx_container_image }}
       Config:         {{ nginx_container_etc }} (host, bind-mounted ro)
       Logs:           {{ nginx_container_logs }} (host, rw)
       Backend alias:  {{ nginx_backend_host }} → host-gateway
       Ports:          {{ nginx_container_http_port }} / {{ nginx_container_https_port }}
      ══════════════════════════════════════════════════════
