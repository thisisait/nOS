---
galaxy_info:
  role_name: nginx_container
  namespace: pazny
  author: Pazny
  description: |
    Containerized nginx for the infra stack — replacement for the
    Homebrew-on-macOS / apt-on-Linux host nginx. Reads the same vhost
    templates from {{ stacks_dir }}/infra/nginx/ as the host nginx
    rendered (paths just shifted from /opt/homebrew/etc/nginx → there).

    Coexistence: install_nginx + install_nginx_container together is
    refused at preflight (port 80/443 collision). Migration path is in
    migrations/2026-05-15-nginx-host-to-container.yml.
  license: Apache-2.0
  min_ansible_version: "2.15"
  platforms:
    - name: MacOSX
      versions: ["13", "14", "15"]
    - name: Ubuntu
      versions: ["22.04", "24.04"]
    - name: Debian
      versions: ["12"]

dependencies: []
