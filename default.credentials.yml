---
# credentials.yml - PASSWORDS, TOKENS and PERSONAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
# This file is in .gitignore - NEVER commit it!
#
# Usage:
#   cp credentials.example.yml credentials.yml
#   nano credentials.yml        # fill in passwords, optionally override paths
#
# Generate random passwords (run in terminal):
#   openssl rand -hex 32
#
# Note: Passwords are **Jinja templates** `{{ global_password_prefix }}_pw_*`.
#       The default prefix `changeme` is in `default.config.yml:8`. On
#       `ansible-playbook main.yml -K -e blank=true` the playbook prompts for
#       a new prefix and propagates it into downstream passwords via lazy
#       evaluation (vars_files Jinja eval). For a permanent custom password
#       write a **literal** into `credentials.yml` (e.g. `grafana_admin_password:
#       "my-secret-42"`) - the literal shadows the template.
# ─────────────────────────────────────────────────────────────────────────────

# ==============================================================================
# GIT CONFIGURATION
# ==============================================================================

git_user_name: "Pázny"                    # git config --global user.name (empty = skip)
git_user_email: "pazny.develop@gmail.com"                   # git config --global user.email

# ==============================================================================
# SYSTEM SERVICES
# ==============================================================================

# Tailscale pre-auth key (optional - without it an interactive login runs)
# tailscale_auth_key: ""    # Get one at: https://login.tailscale.com/admin/settings/keys

# ==============================================================================
# DATABASE - MariaDB (only if install_mariadb: true)
# Passwords in mariadb_users are taken automatically from wordpress_db_password
# and nextcloud_db_password below - DO NOT redefine them!
# ==============================================================================

vnc_password: "{{ global_password_prefix }}_pw_vnc"
ssh_allow_groups: "admin staff"

mariadb_root_password: "{{ global_password_prefix }}_pw_mariadb"
redis_password: "{{ global_password_prefix }}_pw_redis"      # CVE-2025-49844: Redis MUST have authentication

# ==============================================================================
# WORDPRESS (only if install_wordpress: true)
# Default login: admin / {{ global_password_prefix }}_pw_wordpress_admin
# Auto-install via wp-cli (no wizard)
# ==============================================================================

wordpress_db_password: "{{ global_password_prefix }}_pw_wordpress"
wordpress_admin_password: "{{ global_password_prefix }}_pw_wordpress_admin"
# wordpress_admin_email: "admin@dev.local"

# ==============================================================================
# NEXTCLOUD (only if install_nextcloud: true)
# Default login: admin / {{ global_password_prefix }}_pw_nextcloud_admin
# Password can be changed in Settings -> Personal info
# ==============================================================================

nextcloud_db_password: "{{ global_password_prefix }}_pw_nextcloud"
nextcloud_admin_password: "{{ global_password_prefix }}_pw_nextcloud_admin"

# ==============================================================================
# GRAFANA (only if install_observability: true)
# Default login: admin / {{ global_password_prefix }}_pw_grafana
# ==============================================================================

grafana_admin_password: "{{ global_password_prefix }}_pw_grafana"

# ==============================================================================
# GITEA (only if install_gitea: true)
# Default login: (system user) / {{ global_password_prefix }}_pw_gitea
# ==============================================================================

gitea_admin_password: "{{ global_password_prefix }}_pw_gitea"
gitea_admin_email: "pazny.develop@gmail.com"                          # FILL IN!
gitea_secret_key: "{{ global_password_prefix }}_pw_gitea_secret"   # openssl rand -hex 32

# ==============================================================================
# OPEN WEBUI (only if install_openwebui: true)
# Default login: admin@dev.local / {{ global_password_prefix }}_pw_openwebui_admin
# Auto-registration of the first admin user via API
# ==============================================================================

openwebui_secret_key: "{{ global_password_prefix }}_pw_openwebui"
openwebui_admin_password: "{{ global_password_prefix }}_pw_openwebui_admin"
# openwebui_admin_email: "admin@dev.local"

# ==============================================================================
# PORTAINER (only if install_portainer: true)
# Default login: admin / {{ global_password_prefix }}_pw_portainer
# WARNING: the admin account must be created within 5 minutes of startup!
# ==============================================================================

portainer_admin_password: "{{ global_password_prefix }}_pw_portainer"

# ==============================================================================
# UPTIME KUMA (only if install_uptime_kuma: true)
# Default login: admin / {{ global_password_prefix }}_pw_uptime_kuma
# (created automatically by a Python script on first playbook run)
# ==============================================================================

uptime_kuma_admin_password: "{{ global_password_prefix }}_pw_uptime_kuma"

# ==============================================================================
# CALIBRE-WEB (only if install_calibreweb: true)
# Default login: admin / admin123 (linuxserver image default)
# Change immediately after first login in Admin -> Edit Users
# ==============================================================================

# Calibre-Web does not support setting the password via env vars.
# calibreweb_admin_password: "admin123"   # informational only

# ==============================================================================
# JELLYFIN (only if install_jellyfin: true)
# Default login: created on first start (setup wizard)
# Open https://media.dev.local and run through the wizard
# ==============================================================================

# Jellyfin does not support automatic admin account setup.

# ==============================================================================
# HOME ASSISTANT (only if install_homeassistant: true)
# Default login: created on first start (onboarding wizard)
# Open https://home.dev.local and run through the wizard
# ==============================================================================

# Home Assistant does not support automatic admin account setup.

# ==============================================================================
# N8N (only if install_n8n: true)
# Default login: first registration = owner (no default password)
# Open https://n8n.dev.local and register
# For the Ollama AI agent: Settings -> Credentials -> Ollama
#   Base URL: http://host.docker.internal:11434
# ==============================================================================

# n8n since v1.0 does not support setting the password via env vars.

# ==============================================================================
# RUSTFS (only if install_rustfs: true)
# S3 API login: {{ global_password_prefix }}_pw_rustfs_access / {{ global_password_prefix }}_pw_rustfs_secret
# Web console: https://fs.dev.local
# ==============================================================================

rustfs_access_key: "{{ global_password_prefix }}_pw_rustfs_access"
rustfs_secret_key: "{{ global_password_prefix }}_pw_rustfs_secret"

# ==============================================================================
# WOODPECKER CI (only if install_woodpecker: true)
# Login: via Gitea OAuth2 (no local password)
# Requires an OAuth2 app in Gitea: Settings -> Applications -> OAuth2
# ==============================================================================

woodpecker_agent_secret: "{{ global_password_prefix }}_pw_woodpecker"
woodpecker_gitea_client: ""   # FILL IN after creating the OAuth2 app in Gitea
woodpecker_gitea_secret: ""   # FILL IN after creating the OAuth2 app in Gitea

# ==============================================================================
# GITLAB (only if install_gitlab: true)
# Default login: root / {{ global_password_prefix }}_pw_gitlab
# Reconverge every run via gitlab-rails runner (see tasks/iiab/gitlab_post.yml)
# ==============================================================================

gitlab_admin_password: "{{ global_password_prefix }}_pw_gitlab"

# ==============================================================================
# POSTGRESQL (only if install_postgresql: true)
# Root login: postgres / {{ global_password_prefix }}_pw_postgresql
# ==============================================================================

postgresql_root_password: "{{ global_password_prefix }}_pw_postgresql"

# ==============================================================================
# ERPNEXT (only if install_erpnext: true)
# Default login: Administrator / {{ global_password_prefix }}_pw_erpnext
# Requires: MariaDB + Redis Docker
# ==============================================================================

erpnext_admin_password: "{{ global_password_prefix }}_pw_erpnext"

# ==============================================================================
# FREESCOUT (only if install_freescout: true)
# Default login: admin@dev.local / {{ global_password_prefix }}_pw_freescout
# Auto-setup via ADMIN_EMAIL/ADMIN_PASS env vars
# ==============================================================================

freescout_db_password: "{{ global_password_prefix }}_pw_freescout"
freescout_admin_password: "{{ global_password_prefix }}_pw_freescout"

# ==============================================================================
# MATTERMOST (only if install_mattermost: true)
# Default login: first registration = admin
# Requires: PostgreSQL
# ==============================================================================

mattermost_db_password: "{{ global_password_prefix }}_pw_mattermost"

# ==============================================================================
# OUTLINE (only if install_outline: true)
# Default login: requires SSO/OAuth provider (Bluesky PDS, OIDC, etc.)
# Requires: PostgreSQL + Redis Docker
# ==============================================================================

outline_db_password: "{{ global_password_prefix }}_pw_outline"
outline_secret_key: "{{ global_password_prefix }}_pw_outline_secret"
outline_utils_secret: "{{ global_password_prefix }}_pw_outline_utils"

# ==============================================================================
# FREEPBX (only if install_freepbx: true)
# Default login: admin / (set during wizard)
# Requires: MariaDB
# ==============================================================================

freepbx_db_password: "{{ global_password_prefix }}_pw_freepbx"

# ==============================================================================
# METABASE (only if install_metabase: true)
# Default login: first registration = admin
# Requires: PostgreSQL
# ==============================================================================

metabase_db_password: "{{ global_password_prefix }}_pw_metabase"
metabase_admin_password: "{{ global_password_prefix }}_pw_metabase_admin"

# ==============================================================================
# SUPERSET (only if install_superset: true)
# Default login: admin / admin (after docker exec superset init)
# Requires: PostgreSQL + Redis Docker
# ==============================================================================

superset_db_password: "{{ global_password_prefix }}_pw_superset"
superset_secret_key: "{{ global_password_prefix }}_pw_superset_secret"

# ==============================================================================
# BLUESKY PDS (only if install_bluesky_pds: true)
# Admin login via pdsadmin CLI: pdsadmin account create
# Federated identity: @user.bsky.dev.local
# ==============================================================================

bluesky_pds_admin_password: "{{ global_password_prefix }}_pw_bluesky"
bluesky_pds_jwt_secret: "{{ global_password_prefix }}_pw_bluesky_jwt"
bluesky_pds_rotation_key: ""   # openssl rand -hex 32

# ==============================================================================
# JSOS (only if install_jsos: true)
# Login: Bluesky handle + app password (bsky.app/settings/app-passwords)
# ==============================================================================

jsos_session_secret: "{{ global_password_prefix }}_pw_jsos_session"   # Auto-generated if "changeme"
jsos_db_password: "{{ global_password_prefix }}_pw_jsos"
jsos_db_user: "jsos"                              # Override DB user (default: jsos)
jsos_admin_handles: []
# jsos_admin_handles:
#   - "your-handle.bsky.social"

# ==============================================================================
# PAPERCLIP (only if install_paperclip: true)
# Dashboard: https://paperclip.dev.local
# ==============================================================================

paperclip_db_password: "{{ global_password_prefix }}_pw_paperclip"
paperclip_db_user: "paperclip"                    # Override DB user (default: paperclip)

# ==============================================================================
# AUTHENTIK (only if install_authentik: true)
# SSO/IdP: https://auth.dev.local
# ==============================================================================

authentik_secret_key: "{{ global_password_prefix }}_pw_authentik_secret"   # openssl rand -hex 50
authentik_db_password: "{{ global_password_prefix }}_pw_authentik_db"
authentik_bootstrap_password: "{{ global_password_prefix }}_pw_authentik_admin"
authentik_bootstrap_email: "{{ default_admin_email }}"

# ── Tester identity for headless smoke + Playwright (Track G) ───────────────
# Dedicated account that nos-smoke uses to authenticate against proxy/OIDC
# protected services — proves end-to-end "auth flow returns 200" instead of
# accepting bare 30x redirects (AIT philosophy: no manual click-through tests).
nos_tester_password: "{{ global_password_prefix }}_pw_nos_tester"

# ── Stalwart Mail Server admin (Track G — gated install_smtp_stalwart) ──────
stalwart_admin_password: "{{ global_password_prefix }}_pw_stalwart_admin"

# ── Security agent OAuth2 client secrets (Track G/seed) ─────────────────────
# The blueprint references these via authentik_agent_clients; placing them
# here keeps the secrets next to the existing agent passwords (state_manager,
# openclaw, wing) and rotates with global_password_prefix.
# Note: these are templates referenced from default.config.yml itself —
# Ansible's vars_files merge resolves them at apply time, so the real
# secret values get baked into the Authentik blueprint at reconcile.
# (No separate var needed; default.config.yml already does the templating.)

# ==============================================================================
# INFISICAL (only if install_infisical: true)
# Secrets vault: https://vault.dev.local
# ==============================================================================

infisical_encryption_key: "{{ global_password_prefix }}_pw_infisical_enc"  # openssl rand -hex 16
infisical_auth_secret: "{{ global_password_prefix }}_pw_infisical_auth"    # openssl rand -base64 32
infisical_db_password: "{{ global_password_prefix }}_pw_infisical_db"

# ==============================================================================
# VAULTWARDEN (only if install_vaultwarden: true)
# Password vault: https://pass.dev.local
# ==============================================================================

vaultwarden_admin_token: "{{ global_password_prefix }}_pw_vaultwarden_admin"  # openssl rand -base64 48

# ==============================================================================
# WING (Security Research Dashboard)
# API token for CLI/agents: https://wing.dev.local/api/v1/
# ==============================================================================

wing_api_token: "{{ global_password_prefix }}_pw_wing_api"          # openssl rand -hex 32

# ==============================================================================
# NTFY (only if install_ntfy: true)
# Push notifications server: https://ntfy.dev.local
# Server has auth-default-access: deny-all - admin user MUST be provisioned
# (done by pazny.ntfy/tasks/post.yml on every run, reconverging the password).
# ==============================================================================

ntfy_admin_user: "admin"
ntfy_admin_password: "{{ global_password_prefix }}_pw_ntfy_admin"

# ==============================================================================
# MINIFLUX (only if install_miniflux: true)
# Default login: OIDC via Authentik (fallback admin / miniflux_admin_password)
# Requires: PostgreSQL
# ==============================================================================

miniflux_db_password: "{{ global_password_prefix }}_pw_miniflux"
miniflux_admin_password: "{{ global_password_prefix }}_pw_miniflux_admin"

# ==============================================================================
# HEDGEDOC (only if install_hedgedoc: true)
# Login: OIDC via Authentik (session secret auto-regenerated in main.yml safe group)
# Requires: PostgreSQL
# ==============================================================================

hedgedoc_db_password: "{{ global_password_prefix }}_pw_hedgedoc"
hedgedoc_session_secret: "{{ global_password_prefix }}_pw_hedgedoc_session"

# ==============================================================================
# BOOKSTACK (only if install_bookstack: true)
# Login: OIDC via Authentik (fallback admin@admin.com / password on first init)
# Requires: MariaDB
# APP_KEY is Laravel-style, auto-regenerated in main.yml (safe group) via
# `base64:$(openssl rand -base64 32)`. The fallback placeholder is only for
# the first non-blank run before the first regeneration.
# ==============================================================================

bookstack_db_password: "{{ global_password_prefix }}_pw_bookstack"
bookstack_app_key: "base64:{{ global_password_prefix }}_pw_bookstack_appkey_placeholder"

# ==============================================================================
# FIREFLY III (only if install_firefly: true)
# Login: via Authentik proxy outpost (remote_user_guard) - no local password
# Requires: MariaDB + Redis Docker
# APP_KEY is the Laravel APP_KEY. On blank=true main.yml auto-generates it
# (destructive group - encrypts OAuth2 secrets, 2FA tokens).
# ==============================================================================

firefly_db_password: "{{ global_password_prefix }}_pw_firefly"
firefly_app_key: "base64:{{ global_password_prefix }}_pw_firefly_appkey_placeholder"

# ==============================================================================
# INFLUXDB (only if install_influxdb: true)
# Login: admin / {{ influxdb_admin_password }} (native InfluxDB session)
# Token: auto-regenerated in main.yml (safe group); stable only after first init
# (InfluxDB 2.x reads DOCKER_INFLUXDB_INIT_ADMIN_TOKEN only on first-run).
# ==============================================================================

influxdb_admin_password: "{{ global_password_prefix }}_pw_influxdb"
influxdb_admin_token: "{{ global_password_prefix }}_pw_influxdb_token"

# ==============================================================================
# ONLYOFFICE (only if install_onlyoffice: true)
# JWT secret shared between ONLYOFFICE Document Server and host apps
# (Nextcloud, BookStack). Auto-regenerated in main.yml (safe group).
# ==============================================================================

onlyoffice_jwt_secret: "{{ global_password_prefix }}_pw_onlyoffice_jwt"

# ==============================================================================
# AI provider API keys (OpenWebUI multi-connector)
# Set in credentials.yml to activate them in OpenWebUI (optional, skip = chat
# only with Ollama). Anthropic uses the OpenAI-compatible /v1 endpoint.
# ==============================================================================

openai_api_key: ""          # sk-... (optional, for OpenAI GPT models)
anthropic_api_key: ""       # sk-ant-... (optional, for Claude models)

# ==============================================================================
# MCP Gateway (mcpo) - read-only DB for MCP postgres server
# ==============================================================================

mcp_postgres_password: "{{ global_password_prefix }}_pw_mcp_postgres_ro"
mcpo_api_key: "{{ global_password_prefix }}_pw_mcpo"

# ==============================================================================
# ACME / Let's Encrypt — wildcard cert via DNS-01 challenge
# Required ONLY when tenant_domain is a public TLD (default.config.yml gates
# install_acme to false on dev.local / .lan / .test). Override in your local
# credentials.yml (gitignored).
#
# Cloudflare API token: https://dash.cloudflare.com/profile/api-tokens
# Permissions: Zone:DNS:Edit + Zone:Zone:Read for the target zone only.
# ==============================================================================

acme_cloudflare_api_token: ""           # cf-XXXXXX… (empty = ACME role skips issuing)
