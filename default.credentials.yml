---
# credentials.yml – HESLA, TOKENY a OSOBNÍ NASTAVENÍ
# ─────────────────────────────────────────────────────────────────────────────
# Tento soubor je v .gitignore – NIKDY ho necommituj!
#
# Použití:
#   cp credentials.example.yml credentials.yml
#   nano credentials.yml        # vyplň hesla, případně přepiš cesty
#
# Generování náhodných hesel (spusť v terminálu):
#   openssl rand -hex 32
#
# Poznámka: Hesla jsou **Jinja šablony** `{{ global_password_prefix }}_pw_*`.
#           Default prefix `changeme` je v `default.config.yml:8`. Při
#           `ansible-playbook main.yml -K -e blank=true` si playbook vyžádá
#           nový prefix a propíše ho do downstream hesel lazy-evaluací
#           (vars_files Jinja eval). Pro trvalé vlastní heslo zapiš do
#           `credentials.yml` **literál** (např. `grafana_admin_password:
#           "my-secret-42"`) — literál stínuje šablonu.
# ─────────────────────────────────────────────────────────────────────────────

# ==============================================================================
# GIT KONFIGURACE
# ==============================================================================

git_user_name: "Pázny"                    # git config --global user.name (prázdné = přeskočit)
git_user_email: "pazny.develop@gmail.com"                   # git config --global user.email

# ==============================================================================
# SYSTÉMOVÉ SLUŽBY
# ==============================================================================

# Tailscale pre-auth key (volitelné – bez něj proběhne interaktivní login)
# tailscale_auth_key: ""    # Získej na: https://login.tailscale.com/admin/settings/keys

# ==============================================================================
# DATABÁZE – MariaDB (pouze pokud install_mariadb: true)
# Hesla v mariadb_users se automaticky berou z wordpress_db_password
# a nextcloud_db_password níže – NEDEFINUJ je znovu!
# ==============================================================================

vnc_password: "{{ global_password_prefix }}_pw_vnc"
ssh_allow_groups: "admin staff"

mariadb_root_password: "{{ global_password_prefix }}_pw_mariadb"
redis_password: "{{ global_password_prefix }}_pw_redis"      # CVE-2025-49844: Redis MUST have authentication

# ==============================================================================
# WORDPRESS (pouze pokud install_wordpress: true)
# Default login: admin / {{ global_password_prefix }}_pw_wordpress_admin
# Auto-install přes wp-cli (žádný wizard)
# ==============================================================================

wordpress_db_password: "{{ global_password_prefix }}_pw_wordpress"
wordpress_admin_password: "{{ global_password_prefix }}_pw_wordpress_admin"
# wordpress_admin_email: "admin@dev.local"

# ==============================================================================
# NEXTCLOUD (pouze pokud install_nextcloud: true)
# Default login: admin / {{ global_password_prefix }}_pw_nextcloud_admin
# Heslo lze změnit v Settings → Personal info
# ==============================================================================

nextcloud_db_password: "{{ global_password_prefix }}_pw_nextcloud"
nextcloud_admin_password: "{{ global_password_prefix }}_pw_nextcloud_admin"

# ==============================================================================
# GRAFANA (pouze pokud install_observability: true)
# Default login: admin / {{ global_password_prefix }}_pw_grafana
# ==============================================================================

grafana_admin_password: "{{ global_password_prefix }}_pw_grafana"

# ==============================================================================
# GITEA (pouze pokud install_gitea: true)
# Default login: (systémový uživatel) / {{ global_password_prefix }}_pw_gitea
# ==============================================================================

gitea_admin_password: "{{ global_password_prefix }}_pw_gitea"
gitea_admin_email: "pazny.develop@gmail.com"                          # VYPLŇ!
gitea_secret_key: "{{ global_password_prefix }}_pw_gitea_secret"   # openssl rand -hex 32

# ==============================================================================
# OPEN WEBUI (pouze pokud install_openwebui: true)
# Default login: admin@dev.local / {{ global_password_prefix }}_pw_openwebui_admin
# Auto-registrace prvního admin uživatele přes API
# ==============================================================================

openwebui_secret_key: "{{ global_password_prefix }}_pw_openwebui"
openwebui_admin_password: "{{ global_password_prefix }}_pw_openwebui_admin"
# openwebui_admin_email: "admin@dev.local"

# ==============================================================================
# PORTAINER (pouze pokud install_portainer: true)
# Default login: admin / {{ global_password_prefix }}_pw_portainer
# POZOR: admin účet musí být vytvořen do 5 minut po startu!
# ==============================================================================

portainer_admin_password: "{{ global_password_prefix }}_pw_portainer"

# ==============================================================================
# UPTIME KUMA (pouze pokud install_uptime_kuma: true)
# Default login: admin / {{ global_password_prefix }}_pw_uptime_kuma
# (vytvořeno automaticky Python skriptem při prvním spuštění playbooku)
# ==============================================================================

uptime_kuma_admin_password: "{{ global_password_prefix }}_pw_uptime_kuma"

# ==============================================================================
# CALIBRE-WEB (pouze pokud install_calibreweb: true)
# Default login: admin / admin123 (linuxserver image default)
# Změň ihned po prvním přihlášení v Admin → Edit Users
# ==============================================================================

# Calibre-Web nepodporuje nastavení hesla přes env vars.
# calibreweb_admin_password: "admin123"   # pouze informativní

# ==============================================================================
# JELLYFIN (pouze pokud install_jellyfin: true)
# Default login: vytvořen při prvním spuštění (setup wizard)
# Otevři https://media.dev.local a projdi průvodce
# ==============================================================================

# Jellyfin nepodporuje automatické nastavení admin účtu.

# ==============================================================================
# HOME ASSISTANT (pouze pokud install_homeassistant: true)
# Default login: vytvořen při prvním spuštění (onboarding wizard)
# Otevři https://home.dev.local a projdi průvodce
# ==============================================================================

# Home Assistant nepodporuje automatické nastavení admin účtu.

# ==============================================================================
# N8N (pouze pokud install_n8n: true)
# Default login: první registrace = owner (žádné default heslo)
# Otevři https://n8n.dev.local a zaregistruj se
# Pro Ollama AI agenta: Settings → Credentials → Ollama
#   Base URL: http://host.docker.internal:11434
# ==============================================================================

# n8n od v1.0 nepodporuje nastavení hesla přes env vars.

# ==============================================================================
# RUSTFS (pouze pokud install_rustfs: true)
# S3 API login: {{ global_password_prefix }}_pw_rustfs_access / {{ global_password_prefix }}_pw_rustfs_secret
# Web konzole: https://fs.dev.local
# ==============================================================================

rustfs_access_key: "{{ global_password_prefix }}_pw_rustfs_access"
rustfs_secret_key: "{{ global_password_prefix }}_pw_rustfs_secret"

# ==============================================================================
# WOODPECKER CI (pouze pokud install_woodpecker: true)
# Login: přes Gitea OAuth2 (žádné lokální heslo)
# Vyžaduje OAuth2 aplikaci v Gitea: Settings → Applications → OAuth2
# ==============================================================================

woodpecker_agent_secret: "{{ global_password_prefix }}_pw_woodpecker"
woodpecker_gitea_client: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea
woodpecker_gitea_secret: ""   # VYPLŇ po vytvoření OAuth2 app v Gitea

# ==============================================================================
# GITLAB (pouze pokud install_gitlab: true)
# Default login: root / {{ global_password_prefix }}_pw_gitlab
# Reconverge každý běh přes gitlab-rails runner (viz tasks/iiab/gitlab_post.yml)
# ==============================================================================

gitlab_admin_password: "{{ global_password_prefix }}_pw_gitlab"

# ==============================================================================
# POSTGRESQL (pouze pokud install_postgresql: true)
# Root login: postgres / {{ global_password_prefix }}_pw_postgresql
# ==============================================================================

postgresql_root_password: "{{ global_password_prefix }}_pw_postgresql"

# ==============================================================================
# ERPNEXT (pouze pokud install_erpnext: true)
# Default login: Administrator / {{ global_password_prefix }}_pw_erpnext
# Vyžaduje: MariaDB + Redis Docker
# ==============================================================================

erpnext_admin_password: "{{ global_password_prefix }}_pw_erpnext"

# ==============================================================================
# FREESCOUT (pouze pokud install_freescout: true)
# Default login: admin@dev.local / {{ global_password_prefix }}_pw_freescout
# Auto-setup přes ADMIN_EMAIL/ADMIN_PASS env vars
# ==============================================================================

freescout_db_password: "{{ global_password_prefix }}_pw_freescout"
freescout_admin_password: "{{ global_password_prefix }}_pw_freescout"

# ==============================================================================
# MATTERMOST (pouze pokud install_mattermost: true)
# Default login: první registrace = admin
# Vyžaduje: PostgreSQL
# ==============================================================================

mattermost_db_password: "{{ global_password_prefix }}_pw_mattermost"

# ==============================================================================
# OUTLINE (pouze pokud install_outline: true)
# Default login: vyžaduje SSO/OAuth provider (Bluesky PDS, OIDC, apod.)
# Vyžaduje: PostgreSQL + Redis Docker
# ==============================================================================

outline_db_password: "{{ global_password_prefix }}_pw_outline"
outline_secret_key: "{{ global_password_prefix }}_pw_outline_secret"
outline_utils_secret: "{{ global_password_prefix }}_pw_outline_utils"

# ==============================================================================
# FREEPBX (pouze pokud install_freepbx: true)
# Default login: admin / (nastaven při wizard)
# Vyžaduje: MariaDB
# ==============================================================================

freepbx_db_password: "{{ global_password_prefix }}_pw_freepbx"

# ==============================================================================
# METABASE (pouze pokud install_metabase: true)
# Default login: první registrace = admin
# Vyžaduje: PostgreSQL
# ==============================================================================

metabase_db_password: "{{ global_password_prefix }}_pw_metabase"
metabase_admin_password: "{{ global_password_prefix }}_pw_metabase_admin"

# ==============================================================================
# SUPERSET (pouze pokud install_superset: true)
# Default login: admin / admin (po docker exec superset init)
# Vyžaduje: PostgreSQL + Redis Docker
# ==============================================================================

superset_db_password: "{{ global_password_prefix }}_pw_superset"
superset_secret_key: "{{ global_password_prefix }}_pw_superset_secret"

# ==============================================================================
# BLUESKY PDS (pouze pokud install_bluesky_pds: true)
# Admin login přes pdsadmin CLI: pdsadmin account create
# Federovaná identita: @user.bsky.dev.local
# ==============================================================================

bluesky_pds_admin_password: "{{ global_password_prefix }}_pw_bluesky"
bluesky_pds_jwt_secret: "{{ global_password_prefix }}_pw_bluesky_jwt"
bluesky_pds_rotation_key: ""   # openssl rand -hex 32

# ==============================================================================
# JSOS (pouze pokud install_jsos: true)
# Login: Bluesky handle + app password (bsky.app/settings/app-passwords)
# ==============================================================================

jsos_session_secret: "{{ global_password_prefix }}_pw_jsos_session"   # Auto-generován pokud "changeme"
jsos_db_password: "{{ global_password_prefix }}_pw_jsos"
jsos_db_user: "jsos"                              # Override DB uživatel (default: jsos)
jsos_admin_handles: []
# jsos_admin_handles:
#   - "your-handle.bsky.social"

# ==============================================================================
# PAPERCLIP (pouze pokud install_paperclip: true)
# Dashboard: https://paperclip.dev.local
# ==============================================================================

paperclip_db_password: "{{ global_password_prefix }}_pw_paperclip"
paperclip_db_user: "paperclip"                    # Override DB uživatel (default: paperclip)

# ==============================================================================
# AUTHENTIK (pouze pokud install_authentik: true)
# SSO/IdP: https://auth.dev.local
# ==============================================================================

authentik_secret_key: "{{ global_password_prefix }}_pw_authentik_secret"   # openssl rand -hex 50
authentik_db_password: "{{ global_password_prefix }}_pw_authentik_db"
authentik_bootstrap_password: "{{ global_password_prefix }}_pw_authentik_admin"
authentik_bootstrap_email: "{{ default_admin_email }}"

# ==============================================================================
# INFISICAL (pouze pokud install_infisical: true)
# Secrets vault: https://vault.dev.local
# ==============================================================================

infisical_encryption_key: "{{ global_password_prefix }}_pw_infisical_enc"  # openssl rand -hex 16
infisical_auth_secret: "{{ global_password_prefix }}_pw_infisical_auth"    # openssl rand -base64 32
infisical_db_password: "{{ global_password_prefix }}_pw_infisical_db"

# ==============================================================================
# VAULTWARDEN (pouze pokud install_vaultwarden: true)
# Password vault: https://pass.dev.local
# ==============================================================================

vaultwarden_admin_token: "{{ global_password_prefix }}_pw_vaultwarden_admin"  # openssl rand -base64 48

# ==============================================================================
# GLASSWING (Security Research Dashboard)
# API token pro CLI/agenty: https://glasswing.dev.local/api/v1/
# ==============================================================================

glasswing_api_token: "{{ global_password_prefix }}_pw_glasswing_api"          # openssl rand -hex 32

# ==============================================================================
# MINIFLUX (pouze pokud install_miniflux: true)
# Default login: OIDC pres Authentik (fallback admin / miniflux_admin_password)
# Vyžaduje: PostgreSQL
# ==============================================================================

miniflux_db_password: "{{ global_password_prefix }}_pw_miniflux"
miniflux_admin_password: "{{ global_password_prefix }}_pw_miniflux_admin"

# ==============================================================================
# HEDGEDOC (pouze pokud install_hedgedoc: true)
# Login: OIDC pres Authentik (auto-regen session secret v main.yml safe group)
# Vyžaduje: PostgreSQL
# ==============================================================================

hedgedoc_db_password: "{{ global_password_prefix }}_pw_hedgedoc"
hedgedoc_session_secret: "{{ global_password_prefix }}_pw_hedgedoc_session"

# ==============================================================================
# BOOKSTACK (pouze pokud install_bookstack: true)
# Login: OIDC pres Authentik (fallback admin@admin.com / password pri prvni init)
# Vyžaduje: MariaDB
# APP_KEY je Laravel-style, auto-regen v main.yml (safe group) pres
# `base64:$(openssl rand -base64 32)`. Fallback placeholder je pouze pro
# prvni non-blank run pred prvni regeneraci.
# ==============================================================================

bookstack_db_password: "{{ global_password_prefix }}_pw_bookstack"
bookstack_app_key: "base64:{{ global_password_prefix }}_pw_bookstack_appkey_placeholder"

# ==============================================================================
# FIREFLY III (pouze pokud install_firefly: true)
# Login: pres Authentik proxy outpost (remote_user_guard) — zadne lokalni heslo
# Vyžaduje: MariaDB + Redis Docker
# APP_KEY je Laravel APP_KEY. Pri blank=true ho main.yml auto-generuje
# (destructive skupina — sifruje OAuth2 secrets, 2FA tokens).
# ==============================================================================

firefly_db_password: "{{ global_password_prefix }}_pw_firefly"
firefly_app_key: "base64:{{ global_password_prefix }}_pw_firefly_appkey_placeholder"

# ==============================================================================
# INFLUXDB (pouze pokud install_influxdb: true)
# Login: admin / {{ influxdb_admin_password }} (native InfluxDB session)
# Token: auto-regen v main.yml (safe group); stabilni jen po prvni inicializaci
# (InfluxDB 2.x cte DOCKER_INFLUXDB_INIT_ADMIN_TOKEN jen pri first-run).
# ==============================================================================

influxdb_admin_password: "{{ global_password_prefix }}_pw_influxdb"
influxdb_admin_token: "{{ global_password_prefix }}_pw_influxdb_token"

# ==============================================================================
# ONLYOFFICE (pouze pokud install_onlyoffice: true)
# JWT secret sdileny mezi ONLYOFFICE Document Server a hostitelskymi app
# (Nextcloud, BookStack). Auto-regen v main.yml (safe group).
# ==============================================================================

onlyoffice_jwt_secret: "{{ global_password_prefix }}_pw_onlyoffice_jwt"
