---
# config.yml – FEATURE TOGGLES (co nainstalovat / zapnout)
# ─────────────────────────────────────────────────────────────────────────────
# Účel:  Přepisuje výchozí hodnoty z default.config.yml.
#        Obsahuje POUZE přepínače true/false – žádná hesla ani cesty.
#        Bezpečné commitovat do gitu (hesla patří do credentials.yml).
#
# Použití:
#   cp config.example.yml config.yml
#   nano config.yml           # zapni/vypni co chceš
#   ansible-playbook main.yml -K
#
# Pravidlo: zakomentovaný řádek = použij výchozí hodnotu z default.config.yml
# ─────────────────────────────────────────────────────────────────────────────

# ── Homebrew & Apps ───────────────────────────────────────────────────────────
install_homebrew_packages: true   # CLI nástroje
install_cask_apps: true           # GUI aplikace
install_mas_apps: false           # Mac App Store (vyžaduje mas_password v credentials.yml)

# ── Web server ────────────────────────────────────────────────────────────────
install_nginx: true

# ── Jazyky / runtime ──────────────────────────────────────────────────────────
install_php: true
install_node: true
install_bun: true
install_python: true
install_golang: true
install_dotnet: true

# ── AI Agent ──────────────────────────────────────────────────────────────────
install_openclaw: true            # Ollama + OpenClaw daemon
install_pi_agents: false          # PI coding agent (pi.dev) + pi-autoresearch extension

# ── macOS systémová konfigurace ───────────────────────────────────────────────
configure_dotfiles: false         # Vyžaduje vlastní dotfiles repo – nastav v credentials.yml
configure_terminal: true
configure_osx: true               # .osx script (základní defaults)
configure_macos_defaults: true    # Rozšířená nastavení (Finder, Dock, klávesnice…)
configure_dock: false             # Dock layout (vyžaduje dockutil)
configure_sudoers: false          # Vlastní sudoers pravidla
configure_sublime: false          # Sublime Text (vyžaduje licenci)
install_shell_extras: true        # Starship + bat, eza, fzf, zoxide, lazygit

# ── Systémové služby ──────────────────────────────────────────────────────────
enable_ssh: false
enable_samba: false
enable_vnc: false
enable_remote_management: false

# ── Observability – Grafana LGTM stack ────────────────────────────────────────
install_observability: true       # Grafana + Prometheus + Loki + Tempo + Alloy

# ── Síť ───────────────────────────────────────────────────────────────────────
install_tailscale: true
install_dnsmasq: true             # auto *.dev.local DNS

# ── IIAB – self-hosted services ───────────────────────────────────────────────
# Vyžaduje: install_nginx: true, install_php: true (kde je uvedeno)
install_mariadb: false
install_wordpress: false          # [vyžaduje: mariadb, php, nginx]
install_nextcloud: false          # [vyžaduje: mariadb, php, nginx]
install_kiwix: false              # offline Wikipedia / ZIM soubory [Docker]
install_offline_maps: false       # tileserver-gl [vyžaduje: node]
install_n8n: false                # workflow automation [Docker]
install_gitea: false              # self-hosted Git [Homebrew]
install_gitlab: false             # GitLab CE [Docker, ~4 GB RAM]
install_woodpecker: false         # CI/CD [vyžaduje: gitea]
install_openwebui: false          # chat UI pro Ollama [Docker]
install_portainer: false          # Docker management UI [Docker]
install_jellyfin: false           # media server [Docker]
install_uptime_kuma: false        # monitoring dashboard [Docker]
install_calibreweb: false         # ebook server [Docker]

# ── Úložiště ──────────────────────────────────────────────────────────────────
configure_external_storage: false  # true = přesunout data na externí SSD
