---
name: CI
'on':
  pull_request:
    paths-ignore:
      - '*.md'
  push:
    paths-ignore:
      - '*.md'
    branches:
      - master
      - 'claude/**'
  schedule:
    - cron: "0 5 * * 4"

# Default minimum permissions for every job — read-only access to the
# repository. Closes GitHub Code Scanning's actions/missing-workflow-
# permissions alerts (#1, #2, #7). Per-job overrides may add more
# capabilities (e.g., write for release jobs) once we have any.
permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # LINT – fast static check (yamllint + ansible-lint), runs on Linux
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Pin ansible-core to operator's installed baseline (2.20.x). Avoids
      # CI drift when upstream cuts 2.21+ stable. Bump in a coordinated
      # commit when ansible-core 2.21/2.22/2.24 is intentionally adopted.
      - name: Install lint dependencies.
        run: pip3 install yamllint 'ansible-core>=2.20,<2.21' ansible-lint

      - name: yamllint – YAML syntax check.
        run: yamllint .

      - name: ansible-lint – Ansible best practices.
        run: ansible-lint

  # ──────────────────────────────────────────────────────────────────────────
  # SYNTAX CHECK – Ansible syntax-check across the supported OS matrix.
  # Adds Ubuntu LTS targets ahead of the Phase-1 Linux port. matrix.os is
  # a workflow-controlled value (no external input) so no escaping needed.
  # ──────────────────────────────────────────────────────────────────────────
  syntax:
    name: Syntax Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-14
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Pin to current operator baseline (2.20.x). See Lint job comment.
      - name: Install Ansible.
        run: pip3 install 'ansible-core>=2.20,<2.21'

      - name: Install Ansible Galaxy requirements.
        # Retry: Galaxy occasionally returns transient 502/Bad Gateway from
        # GitHub's archive endpoint. 3 attempts with backoff covers it.
        run: |
          for attempt in 1 2 3; do
            ansible-galaxy install -r requirements.yml && exit 0
            echo "ansible-galaxy attempt ${attempt} failed; sleeping ${attempt}0s"
            sleep "${attempt}0"
          done
          exit 1

      - name: Set up test inventory and config.
        run: |
          cp tests/ansible.cfg ./ansible.cfg
          cp tests/inventory ./inventory
          cp tests/config.yml ./config.yml

      - name: Ansible syntax check.
        run: ansible-playbook main.yml --syntax-check

  # ──────────────────────────────────────────────────────────────────────────
  # PYTEST – Python unit tests covering the callback plugin, migrate
  # engine, schema-handler consistency, upgrade actions, and state manager.
  # Fast (~2s) — runs on every PR. Excludes wing-api/wing-frontend (PHP).
  # ──────────────────────────────────────────────────────────────────────────
  pytest:
    name: Pytest (Python tests)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # PHP + composer needed by tests/anatomy/test_lockfile_sync.py.
      # The test gates files/anatomy/wing/{composer.json,composer.lock}
      # drift — added 2026-05-07 after a lockfile-only commit shipped
      # without re-running `composer update` and broke the operator's
      # next playbook run. Without composer in PATH the test self-skips
      # (Homebrew dev path) — the CI runner explicitly installs it so
      # the gate is binding here.
      - name: Set up PHP + composer.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install test dependencies.
        run: pip3 install pytest pyyaml jsonschema httpx

      - name: Run pytest suite.
        run: >
          python3 -m pytest tests/
          --ignore=tests/wing-api
          --ignore=tests/wing-frontend
          -q

  # ──────────────────────────────────────────────────────────────────────────
  # PYTEST-APPS – focused subset on tests/apps/ for fast per-submodule
  # failure visibility. Tier-2 apps_runner + Coolify importer regressions
  # surface here before they bleed into the full pytest suite. Runs in
  # parallel with the full pytest job; same Python pin so coverage is
  # consistent. ~0.2s today.
  # ──────────────────────────────────────────────────────────────────────────
  pytest-apps:
    name: Pytest (apps + importer)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install test dependencies.
        run: pip3 install pytest pyyaml jsonschema

      - name: Run apps + importer tests.
        run: python3 -m pytest tests/apps/ -v

  # ──────────────────────────────────────────────────────────────────────────
  # CONTRACTS DRIFT – regenerate Bone OpenAPI + Wing OpenAPI + Wing DDL
  # and diff against the committed artifacts under
  # files/anatomy/skills/contracts/. Anatomy A5 (2026-05-04) — surfaces
  # API/schema drift the moment a presenter or migration lands without
  # the artifact being refreshed.
  # ──────────────────────────────────────────────────────────────────────────
  contracts-drift:
    name: Contracts drift check
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up PHP 8.5.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3

      - name: Install Bone Python deps (FastAPI for OpenAPI introspection).
        run: |
          pip3 install --upgrade pip
          pip3 install -r files/anatomy/bone/requirements.txt

      - name: Regenerate contracts.
        run: |
          mkdir -p /tmp/contracts-rebuild
          python3 files/anatomy/bone/bin/export-openapi.py \
            --output /tmp/contracts-rebuild/bone.openapi.yml
          php files/anatomy/wing/bin/export-openapi.php \
            --output=/tmp/contracts-rebuild/wing.openapi.yml
          php files/anatomy/wing/bin/export-schema.php \
            --output=/tmp/contracts-rebuild/wing.db-schema.sql

      - name: Diff against committed artifacts.
        run: |
          set -e
          fail=0
          for f in bone.openapi.yml wing.openapi.yml wing.db-schema.sql; do
            committed="files/anatomy/skills/contracts/$f"
            rebuilt="/tmp/contracts-rebuild/$f"
            if ! diff -u "$committed" "$rebuilt"; then
              echo "::error::Drift detected in $f — regenerate via the export script and recommit."
              fail=1
            fi
          done
          exit "$fail"

  # ──────────────────────────────────────────────────────────────────────────
  # INTEGRATION – full run on real macOS (slower, expensive)
  # Runs only on master/claude/** pushes, not on every PR commit
  # ──────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # On feature branches run integration only on push, not on draft PRs
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-14

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      - name: Set up Python 3.
        id: python-setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Uninstall GitHub Actions' built-in Homebrew.
        run: tests/uninstall-homebrew.sh

      - name: Uninstall GitHub Actions' built-in browser installs.
        run: |
          sudo rm -rf /Applications/Firefox.app
          sudo rm -rf /Applications/Google\ Chrome.app
          sudo rm -rf /usr/local/bin/firefox

      # Install via the EXPLICIT setup-python python — `python3` in PATH
      # resolves to /Library/Frameworks/Python.framework/.../bin/python3 on
      # GitHub's macos-14/15 runners (the system framework install), NOT the
      # hostedtoolcache python that ANSIBLE_PYTHON_INTERPRETER points at.
      # Without this explicit path, pip lands packages in the wrong Python's
      # site-packages and `nos_state` fails with `PyYAML required` despite
      # the install step reporting success. Surfaced 2026-05-04 in CI run
      # 25303198873.
      - name: Install test dependencies.
        env:
          PY: ${{ steps.python-setup.outputs.python-path }}
        run: |
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install 'ansible-core>=2.20,<2.21' pyyaml jsonschema
          # Sanity probe — fail fast if pyyaml/jsonschema aren't reachable
          # from the SAME interpreter Ansible will use at runtime.
          "$PY" -c 'import yaml, jsonschema; print("ok", yaml.__version__, jsonschema.__version__, "@", __import__("sys").executable)'

      - name: Set up the test environment.
        run: |
          cp tests/ansible.cfg ./ansible.cfg
          cp tests/inventory ./inventory
          cp tests/config.yml ./config.yml
          # Retry Galaxy install — see Syntax Check job comment.
          for attempt in 1 2 3; do
            ansible-galaxy install -r requirements.yml && exit 0
            echo "ansible-galaxy attempt ${attempt} failed; sleeping ${attempt}0s"
            sleep "${attempt}0"
          done
          exit 1

      - name: Test the playbook's syntax.
        run: ansible-playbook main.yml --syntax-check
        env:
          # Pin Ansible's localhost Python to the same one we installed
          # pyyaml/jsonschema into (see Install test dependencies step).
          ANSIBLE_PYTHON_INTERPRETER: ${{ steps.python-setup.outputs.python-path || 'python3' }}

      - name: Test the playbook.
        run: ansible-playbook main.yml
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_PYTHON_INTERPRETER: ${{ steps.python-setup.outputs.python-path || 'python3' }}

      - name: Idempotence check.
        run: |
          idempotence=$(mktemp)
          ansible-playbook main.yml | tee -a "${idempotence}"
          tail "${idempotence}" | grep -q 'changed=0.*failed=0' \
            && (echo 'Idempotence test: pass' && exit 0) \
            || (echo 'Idempotence test: fail' && exit 1)
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_PYTHON_INTERPRETER: ${{ steps.python-setup.outputs.python-path || 'python3' }}
