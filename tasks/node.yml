---
# ==============================================================================
# NODE.JS - NVM, Node LTS, global npm packages
# ==============================================================================

- name: Install NVM via Homebrew
  community.general.homebrew:
    name: nvm
    state: present

- name: Ensure NVM directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.nvm"
    state: directory
    mode: '0755'

- name: Add NVM to shell profile (.zshrc)
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    marker: "# {mark} NVM - ANSIBLE MANAGED"
    block: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
      [ -s "{{ homebrew_prefix }}/opt/nvm/etc/bash_completion.d/nvm" ] && source "{{ homebrew_prefix }}/opt/nvm/etc/bash_completion.d/nvm"
    create: true
    mode: '0644'

- name: Install Node.js LTS via NVM
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm install '{{ node_nvm_version | default('lts/*') }}'
    nvm alias default '{{ node_nvm_version | default('lts/*') }}'
    nvm use default
  args:
    executable: /bin/bash
  changed_when: false
  environment:
    NVM_DIR: "{{ ansible_facts['env']['HOME'] }}/.nvm"

- name: Install global npm packages
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm use default
    npm install -g {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ node_global_packages | default([]) }}"
  changed_when: false
  environment:
    NVM_DIR: "{{ ansible_facts['env']['HOME'] }}/.nvm"

- name: Install extra npm packages from config
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm use default
    npm install -g {% if item.version is defined %}{{ item.name }}@{{ item.version }}{% else %}{{ item.name }}{% endif %}
  args:
    executable: /bin/bash
  loop: "{{ npm_packages | default([]) }}"
  changed_when: false
  environment:
    NVM_DIR: "{{ ansible_facts['env']['HOME'] }}/.nvm"

# ──────────────────────────────────────────────────────────────────────────────
# Bridge NVM-installed CLIs into the homebrew-prefix PATH so launchd daemons
# (Bone, Pulse, Wing, OpenClaw) — which start without the operator's shell
# config — can resolve them. Surfaced live 2026-05-07 when Pulse subprocess-
# forked pulse-run-agent.sh under launchd's minimal PATH and `command -v
# claude` failed → runner exited rc=2 before any Wing event landed.
#
# We symlink only the small set of CLIs that get invoked from launchd
# subprocess context — claude is the canonical case (conductor agent).
# Keep the list short on purpose; everything else stays NVM-isolated.
# ──────────────────────────────────────────────────────────────────────────────
- name: Detect NVM-installed claude CLI path
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm use default >/dev/null 2>&1
    command -v claude || true
  args:
    executable: /bin/bash
  environment:
    NVM_DIR: "{{ ansible_facts['env']['HOME'] }}/.nvm"
  register: _claude_path
  changed_when: false
  check_mode: false

- name: Symlink claude into homebrew_prefix/bin (PATH-bridge for launchd)
  ansible.builtin.file:
    src: "{{ _claude_path.stdout | trim }}"
    dest: "{{ homebrew_prefix }}/bin/claude"
    state: link
    force: true
  when: _claude_path.stdout | trim | length > 0
