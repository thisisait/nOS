---
# ==============================================================================
# PHP – instalace, PHP-FPM a konfigurace
# ==============================================================================

- name: Install PHP via Homebrew
  community.general.homebrew:
    name: "php@{{ php_version }}"
    state: present

- name: Install imagemagick (required for imagick PECL extension)
  community.general.homebrew:
    name: imagemagick
    state: present

- name: Install common PHP extensions via PECL
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      export PATH="{{ homebrew_prefix }}/opt/php@{{ php_version }}/bin:$PATH"
      pecl list | grep -q "^{{ item }}\b" || pecl install {{ item }}
    executable: /bin/bash
  loop:
    - redis
    - imagick
  failed_when: false   # extension availability varies by PHP version
  changed_when: true

- name: Install additional PHP extensions from config via PECL
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      export PATH="{{ homebrew_prefix }}/opt/php@{{ php_version }}/bin:$PATH"
      pecl list | grep -q "^{{ item }}\b" || pecl install {{ item }}
    executable: /bin/bash
  loop: "{{ php_extensions | default([]) }}"
  failed_when: false
  changed_when: true

- name: Install Composer
  ansible.builtin.shell: |
    EXPECTED_CHECKSUM="$(php -r 'copy("https://composer.github.io/installer.sig", "php://stdout");')"
    php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    ACTUAL_CHECKSUM="$(php -r "echo hash_file('sha384', 'composer-setup.php');")"
    if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
      >&2 echo 'ERROR: Invalid installer checksum'
      rm composer-setup.php
      exit 1
    fi
    php composer-setup.php --install-dir={{ homebrew_prefix }}/bin --filename=composer --quiet
    rm composer-setup.php
  args:
    creates: "{{ homebrew_prefix }}/bin/composer"
    executable: /bin/zsh

- name: Install global Composer packages
  community.general.composer:
    command: require
    global_command: true
    arguments: "{{ item.name }}{% if item.version is defined %}:{{ item.version }}{% endif %}"
  loop: "{{ php_composer_packages | default([]) }}"
  environment:
    COMPOSER_HOME: "{{ ansible_facts['env']['HOME'] }}/.composer"
    PATH: "{{ homebrew_prefix }}/opt/php@{{ php_version }}/bin:{{ ansible_facts['env']['PATH'] | default('', true) }}"

- name: Set PHP memory_limit
  community.general.ini_file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php.ini"
    section: PHP
    option: memory_limit
    value: "{{ php_memory_limit }}"
    mode: '0644'
  notify: Restart php-fpm

- name: Set PHP upload_max_filesize
  community.general.ini_file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php.ini"
    section: PHP
    option: upload_max_filesize
    value: "{{ php_upload_max_filesize }}"
    mode: '0644'
  notify: Restart php-fpm

- name: Set PHP post_max_size
  community.general.ini_file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php.ini"
    section: PHP
    option: post_max_size
    value: "{{ php_post_max_size }}"
    mode: '0644'
  notify: Restart php-fpm

- name: Set PHP max_execution_time
  community.general.ini_file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php.ini"
    section: PHP
    option: max_execution_time
    value: "{{ php_max_execution_time }}"
    mode: '0644'
  notify: Restart php-fpm

- name: Set PHP date.timezone
  community.general.ini_file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php.ini"
    section: Date
    option: date.timezone
    value: "{{ php_date_timezone }}"
    mode: '0644'
  notify: Restart php-fpm

- name: Ensure php-fpm.d directory exists
  ansible.builtin.file:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php-fpm.d"
    state: directory
    mode: '0755'

- name: Configure PHP-FPM pool (www.conf)
  ansible.builtin.blockinfile:
    path: "{{ homebrew_prefix }}/etc/php/{{ php_version }}/php-fpm.d/www.conf"
    create: true
    mode: '0644'
    marker: "; {mark} ANSIBLE MANAGED BLOCK"
    block: |
      ; Výkonnostní nastavení pro Mac Studio 36GB
      pm = dynamic
      pm.max_children = 20
      pm.start_servers = 4
      pm.min_spare_servers = 2
      pm.max_spare_servers = 6
      pm.max_requests = 500
      pm.status_path = /fpm-status
    insertafter: "^\\[www\\]"
    backup: true
  notify: Restart php-fpm

- name: Start PHP-FPM service
  ansible.builtin.command: brew services start "php@{{ php_version }}"
  register: phpfpm_svc
  changed_when: >
    'already started' not in (phpfpm_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (phpfpm_svc.stderr | default(''))
  failed_when: >
    phpfpm_svc.rc != 0 and
    'already started' not in (phpfpm_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (phpfpm_svc.stderr | default(''))
