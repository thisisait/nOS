---
# ==============================================================================
# BLANK RESET - clean reinstall of all services
#
# Run: ansible-playbook main.yml -K -e blank=true
#
# What gets DELETED:
#   - Docker containers, volumes, compose files
#   - Service configurations (nginx sites, SSL certs, dnsmasq, alloy)
#   - Service data directories (DB, app data, observability data)
#   - LaunchAgents (exporters, openclaw)
#
# What is KEPT:
#   - ~/media/ (movies, series, music) - user data
#   - ~/calibre/ (library) - user data
#   - ~/.ollama/ (models, tens of GB) - manual delete: rm -rf ~/.ollama
#   - Homebrew packages - kept, services just restart
#   - Shell configuration (.zshrc blocks) - overwritten during reinstall
# ==============================================================================

# ── 0. External storage path overrides ──────────────────────────────────
# CRITICAL: Must run BEFORE _blank_dirs is built. external-storage.yml
# normally runs later in main.yml tasks (after blank-reset), so without this
# include blank would delete non-existent ~/service directories and the real data
# on /Volumes/SSD1TB/{jellyfin,openwebui,portainer,...} would survive.
- name: "[BLANK] Apply external storage path overrides (if external_storage_root set)"
  ansible.builtin.include_tasks: "tasks/stacks/external-paths.yml"
  when:
    - external_storage_root is defined
    - external_storage_root | default('') | length > 0

# ── 1. Confirmation ─────────────────────────────────────────────────────
- name: "[BLANK/FLUSH] Confirm destructive operation"
  ansible.builtin.pause:
    prompt: |-

      ╔══════════════════════════════════════════════════════════════════════╗
      ║  {{ "FLUSH" + (" DEEP" if _flush_deep | default(false) | bool else "") if (flush is defined) else "BLANK" }} RESET — DELETE ALL DATA AND CONFIGURATIONS      ║
      ║                                                                    ║
      ║  Will be deleted:                                                  ║
      ║    - All Docker containers and volumes                             ║
      ║    - Databases (MariaDB), app data (Nextcloud, Gitea, n8n...)      ║
      ║    - Nginx configuration and SSL certificates                      ║
      ║    - Observability data (Grafana, Prometheus, Loki, Tempo)         ║
      ║    - Uptime Kuma monitors, Portainer settings                      ║
      ║  {{ "- Docker images + build cache (flush=deep)" if _flush_deep | default(false) | bool else "(blank/flush=true: Docker images kept)" }}
      ║                                                                    ║
      ║  Will remain:                                                      ║
      ║    - ~/media/ (movies, music), ~/calibre/ (books)                  ║
      ║    - ~/.ollama/ (models — add flush_ollama=true to wipe)           ║
      ║    - Homebrew packages (deep cleans cache, keeps packages)         ║
      ║                                                                    ║
      ║  After reset the playbook reinstalls everything with clean data.   ║
      ╚══════════════════════════════════════════════════════════════════════╝

       Press ENTER to continue or Ctrl+C -> A to cancel

# ── Plugin loader — post_blank hook (A6, 2026-05-03) ──────────────────
# Runs BEFORE the data-dir wipe so plugins can do orderly cleanup of
# their owned filesystem state (provisioning dirs, cached downloads).
# Audit-log rows in wing.db are NEVER cleared (regulatory requirement,
# enforced inside the loader). Reverse-topological order so consumers
# clean before sources.
- name: "[BLANK] Plugin loader — post_blank hook"
  nos_plugin_loader:
    hook: post_blank
    plugins_root: "{{ playbook_dir }}/files/anatomy/plugins"
    apps_root: "{{ playbook_dir }}/apps"
    agent_profiles_root: "{{ playbook_dir }}/files/anatomy/agents"
    template_vars: "{{ vars }}"
  tags: ['blank', 'reset', 'anatomy.plugins']
  failed_when: false  # blank must continue even if plugin cleanup misbehaves

# ── 2. Docker stacks - stop and remove volumes ──────────────────────────
- name: "[BLANK] Stop Docker stacks and remove volumes"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/{{ item }}/docker-compose.yml"
    -p {{ item }} down -v --remove-orphans -t {{ blank_stop_timeout | default(30) }} 2>&1 || true
  loop:
    - iiab
    - observability
    - infra
    - devops
    - b2b
    - voip
    - engineering
    - data
  failed_when: false
  changed_when: true

- name: "[BLANK] Wait for containers to fully stop"
  ansible.builtin.pause:
    seconds: "{{ blank_stop_timeout | default(30) }}"
    prompt: "Waiting {{ blank_stop_timeout | default(30) }}s for containers to stop..."

- name: "[BLANK] Remove shared Docker network"
  ansible.builtin.shell: >
    {{ docker_bin }} network rm {{ stacks_shared_network }} 2>/dev/null || true
  failed_when: false
  changed_when: false

- name: "[BLANK] Prune all unused Docker volumes (-a = named + anonymous)"
  ansible.builtin.shell: "{{ docker_bin }} volume prune -f -a 2>&1 || {{ docker_bin }} volume prune -f 2>&1"
  failed_when: false
  changed_when: true

- name: "[BLANK] Prune all unused Docker networks"
  ansible.builtin.command: "{{ docker_bin }} network prune -f"
  failed_when: false
  changed_when: true

# ── 3. Homebrew services - stop ─────────────────────────────────────────
# brew services stop is unreliable (Ruby API hangs 30min+ on brew 4.x).
# We use direct launchctl unload + pkill - immediate effect.
- name: "[BLANK] Stop Homebrew services (direct launchctl)"
  ansible.builtin.shell: |
    for svc in nginx "php@{{ php_version | default('8.3') }}" dnsmasq grafana-alloy ollama; do
      plist="$HOME/Library/LaunchAgents/homebrew.mxcl.${svc}.plist"
      [ -f "$plist" ] && launchctl unload "$plist" 2>/dev/null
      plist="/Library/LaunchDaemons/homebrew.mxcl.${svc}.plist"
      [ -f "$plist" ] && sudo launchctl unload "$plist" 2>/dev/null
    done
    pkill -f "nginx: master" 2>/dev/null || true
    pkill -f "php-fpm: master" 2>/dev/null || true
    pkill -f "dnsmasq" 2>/dev/null || true
    pkill -f "alloy" 2>/dev/null || true
    pkill -f "ollama serve" 2>/dev/null || true
    echo "DONE"
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: false

# ── 4. LaunchAgents - unload and remove ─────────────────────────────────
- name: "[BLANK] Find playbook-managed LaunchAgents"
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents"
    patterns:
      - "com.nginx.nginx-prometheus-exporter.plist"
      - "com.hipages.php-fpm-exporter.plist"
      - "com.openclaw.agent.plist"
      - "com.hermes.agent.plist"
      - "com.ollama.agent.plist"
      - "com.ollama.agent.plist.disabled"
      - "homebrew.mxcl.ollama.plist.disabled"
  register: _blank_plists

- name: "[BLANK] Unload LaunchAgents"
  ansible.builtin.command: "launchctl unload {{ item.path }}"
  loop: "{{ _blank_plists.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  failed_when: false
  changed_when: false

- name: "[BLANK] Remove LaunchAgent plists"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _blank_plists.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

# ── 5. Nginx - reset configuration ──────────────────────────────────────
- name: "[BLANK] Remove nginx sites-enabled symlinks"
  ansible.builtin.shell: "rm -f {{ homebrew_prefix }}/etc/nginx/sites-enabled/*.conf"
  failed_when: false
  changed_when: true

- name: "[BLANK] Remove nginx sites-available configs"
  ansible.builtin.shell: "rm -f {{ homebrew_prefix }}/etc/nginx/sites-available/*.conf"
  failed_when: false
  changed_when: true

- name: "[BLANK] Remove nginx SSL certificates"
  ansible.builtin.file:
    path: "{{ homebrew_prefix }}/etc/nginx/ssl"
    state: absent

- name: "[BLANK] Remove nginx logs"
  ansible.builtin.shell: "rm -f {{ homebrew_prefix }}/var/log/nginx/*.log"
  failed_when: false
  changed_when: false

# ── 6. dnsmasq - reset ──────────────────────────────────────────────────
- name: "[BLANK] Remove dnsmasq dev.local config"
  ansible.builtin.lineinfile:
    path: "{{ homebrew_prefix }}/etc/dnsmasq.conf"
    regexp: "dev\\.local"
    state: absent
  failed_when: false

- name: "[BLANK] Remove macOS resolver for dev.local"
  ansible.builtin.file:
    path: "/etc/resolver/{{ dnsmasq_dev_domain | default('dev.local') }}"
    state: absent
  become: true
  failed_when: false

# ── 7. Auto-dependency resolution (duplicated from main.yml) ───────────
# Services like ERPNext auto-enable MariaDB/Redis, but main.yml
# auto-deps have not run yet. We must resolve them here too, otherwise DB data won't be removed.
- name: "[BLANK] Resolve auto-dependencies for cleanup"
  ansible.builtin.set_fact:
    install_mariadb: >-
      {{ install_mariadb | default(false) or
         install_wordpress | default(false) or
         install_nextcloud | default(false) or
         install_erpnext | default(false) or
         install_freescout | default(false) or
         install_freepbx | default(false) }}
    install_postgresql: >-
      {{ install_postgresql | default(false) or
         install_outline | default(false) or
         install_metabase | default(false) or
         install_superset | default(false) }}
    redis_docker: >-
      {{ redis_docker | default(false) or
         install_erpnext | default(false) or
         install_outline | default(false) or
         install_superset | default(false) }}

# ── 8. Data directories - remove (only for enabled services) ───────────
- name: "[BLANK] Build list of data directories to remove"
  ansible.builtin.set_fact:
    _blank_dirs: >-
      {{
        [stacks_dir]
        +
        [mariadb_data_dir | default(ansible_facts['env']['HOME'] + '/mariadb/data')]
        +
        [postgresql_data_dir | default(ansible_facts['env']['HOME'] + '/postgresql/data')]
        +
        [redis_data_dir | default(ansible_facts['env']['HOME'] + '/redis/data')]
        +
        (install_wordpress | default(false)) | ternary(
          [wordpress_dir | default(ansible_facts['env']['HOME'] + '/projects/wordpress')], [])
        +
        (install_nextcloud | default(false)) | ternary(
          [nextcloud_dir | default(ansible_facts['env']['HOME'] + '/projects/nextcloud'),
           nextcloud_data_dir | default(ansible_facts['env']['HOME'] + '/nextcloud-data')], [])
        +
        (install_n8n | default(false)) | ternary(
          [n8n_data_dir | default(ansible_facts['env']['HOME'] + '/n8n')], [])
        +
        (install_kiwix | default(false)) | ternary(
          [kiwix_data_dir | default(ansible_facts['env']['HOME'] + '/kiwix')], [])
        +
        (install_offline_maps | default(false)) | ternary(
          [maps_data_dir | default(ansible_facts['env']['HOME'] + '/maps')], [])
        +
        (install_traefik | default(false)) | ternary(
          [traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik')], [])
        +
        (install_pi_agents | default(false)) | ternary(
          [pi_config_dir | default(ansible_facts['env']['HOME'] + '/.pi/agent')], [])
        +
        (install_gitea | default(false)) | ternary(
          [gitea_data_dir | default(ansible_facts['env']['HOME'] + '/gitea')], [])
        +
        (install_gitlab | default(false)) | ternary(
          [gitlab_data_dir | default(ansible_facts['env']['HOME'] + '/gitlab'),
           gitlab_config_dir | default(ansible_facts['env']['HOME'] + '/gitlab-config')], [])
        +
        (install_jellyfin | default(false)) | ternary(
          [jellyfin_config_dir | default(ansible_facts['env']['HOME'] + '/jellyfin/config'),
           jellyfin_cache_dir | default(ansible_facts['env']['HOME'] + '/jellyfin/cache')], [])
        +
        (install_openwebui | default(false)) | ternary(
          [openwebui_data_dir | default(ansible_facts['env']['HOME'] + '/openwebui')], [])
        +
        (install_uptime_kuma | default(false)) | ternary(
          [uptime_kuma_data_dir | default(ansible_facts['env']['HOME'] + '/uptime-kuma')], [])
        +
        (install_portainer | default(false)) | ternary(
          [portainer_data_dir | default(ansible_facts['env']['HOME'] + '/portainer')], [])
        +
        (install_woodpecker | default(false)) | ternary(
          [woodpecker_data_dir | default(ansible_facts['env']['HOME'] + '/woodpecker')], [])
        +
        (install_calibreweb | default(false)) | ternary(
          [ansible_facts['env']['HOME'] + '/calibre-web/config'], [])
        +
        (install_homeassistant | default(false)) | ternary(
          [homeassistant_config_dir | default(ansible_facts['env']['HOME'] + '/homeassistant')], [])
        +
        (install_rustfs | default(false)) | ternary(
          [rustfs_data_dir | default(ansible_facts['env']['HOME'] + '/rustfs/data')], [])
        +
        (install_observability | default(true)) | ternary(
          [ansible_facts['env']['HOME'] + '/observability',
           grafana_data_dir | default(stacks_dir + '/observability/grafana/data')], [])
        +
        (install_openclaw | default(false)) | ternary(
          [ansible_facts['env']['HOME'] + '/.openclaw'], [])
        +
        (install_freescout | default(false)) | ternary(
          [freescout_data_dir | default(ansible_facts['env']['HOME'] + '/freescout/data')], [])
        +
        (install_outline | default(false)) | ternary(
          [outline_data_dir | default(ansible_facts['env']['HOME'] + '/outline/data')], [])
        +
        (install_freepbx | default(false)) | ternary(
          [freepbx_data_dir | default(ansible_facts['env']['HOME'] + '/freepbx')], [])
        +
        (install_qgis_server | default(false)) | ternary(
          [qgis_data_dir | default(ansible_facts['env']['HOME'] + '/qgis')], [])
        +
        (install_metabase | default(false)) | ternary(
          [metabase_data_dir | default(ansible_facts['env']['HOME'] + '/metabase')], [])
        +
        (install_superset | default(false)) | ternary(
          [superset_data_dir | default(ansible_facts['env']['HOME'] + '/superset')], [])
        +
        (install_bluesky_pds | default(false)) | ternary(
          [bluesky_pds_data_dir | default(ansible_facts['env']['HOME'] + '/bluesky-pds')], [])
        +
        (install_paperclip | default(false)) | ternary(
          [paperclip_data_dir | default(ansible_facts['env']['HOME'] + '/paperclip')], [])
        +
        (install_puter | default(false)) | ternary(
          [puter_data_dir | default(ansible_facts['env']['HOME'] + '/puter')], [])
        +
        (install_authentik | default(false)) | ternary(
          [authentik_data_dir | default(ansible_facts['env']['HOME'] + '/authentik')], [])
        +
        (install_infisical | default(false)) | ternary(
          [infisical_data_dir | default(ansible_facts['env']['HOME'] + '/infisical')], [])
        +
        (install_vaultwarden | default(false)) | ternary(
          [vaultwarden_data_dir | default(ansible_facts['env']['HOME'] + '/vaultwarden')], [])
        +
        (install_ntfy | default(false)) | ternary(
          [ntfy_data_dir | default(ansible_facts['env']['HOME'] + '/ntfy/data')], [])
        +
        (install_nodered | default(false)) | ternary(
          [nodered_data_dir | default(ansible_facts['env']['HOME'] + '/nodered/data')], [])
        +
        (install_influxdb | default(false)) | ternary(
          [influxdb_data_dir | default(ansible_facts['env']['HOME'] + '/influxdb/data'),
           influxdb_config_dir | default(ansible_facts['env']['HOME'] + '/influxdb/config')], [])
        +
        (install_code_server | default(false)) | ternary(
          [code_server_data_dir | default(ansible_facts['env']['HOME'] + '/code-server/config'),
           code_server_workspace_dir | default(ansible_facts['env']['HOME'] + '/code-server/workspace')], [])
        +
        (install_bookstack | default(false)) | ternary(
          [bookstack_data_dir | default(ansible_facts['env']['HOME'] + '/bookstack/config')], [])
        +
        (install_firefly | default(false)) | ternary(
          [firefly_upload_dir | default(ansible_facts['env']['HOME'] + '/firefly/upload'),
           firefly_export_dir | default(ansible_facts['env']['HOME'] + '/firefly/export')], [])
        +
        (install_hedgedoc | default(false)) | ternary(
          [hedgedoc_data_dir | default(ansible_facts['env']['HOME'] + '/hedgedoc/uploads')], [])
        +
        (install_onlyoffice | default(false)) | ternary(
          [onlyoffice_data_dir | default(ansible_facts['env']['HOME'] + '/onlyoffice/data'),
           onlyoffice_logs_dir | default(ansible_facts['env']['HOME'] + '/onlyoffice/logs'),
           onlyoffice_lib_dir | default(ansible_facts['env']['HOME'] + '/onlyoffice/lib'),
           onlyoffice_db_dir | default(ansible_facts['env']['HOME'] + '/onlyoffice/db')], [])
        +
        (install_miniflux | default(false)) | ternary(
          [], [])
        +
        (install_mcp_gateway | default(false)) | ternary(
          [mcpo_data_dir | default(ansible_facts['env']['HOME'] + '/mcpo')], [])
        +
        (install_hermes | default(false)) | ternary(
          [hermes_home | default(ansible_facts['env']['HOME'] + '/agents/hermes'),
           hermes_config_dir | default(ansible_facts['env']['HOME'] + '/.hermes')], [])
        +
        (install_wing | default(true)) | ternary(
          [wing_app_dir | default(ansible_facts['env']['HOME'] + '/wing/app')], [])
      }}

- name: "[BLANK] Remove data directories (sudo - Docker creates files as www-data)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ _blank_dirs }}"
  loop_control:
    label: "{{ item }}"
  become: true

# ── 9. Generated files ──────────────────────────────────────────────────
- name: "[BLANK] Remove service registry"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/projects/default/service-registry.json"
    state: absent
  failed_when: false

- name: "[BLANK] Remove persisted runtime secrets (force-regenerate)"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.nos/secrets.yml"
    state: absent
  failed_when: false

- name: "[BLANK] Reset complete"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════════════
       BLANK RESET COMPLETE
       Removed: {{ _blank_dirs | length }} data directories, 4 Docker stacks,
       nginx configuration, SSL certificates, dnsmasq, LaunchAgents.
       Playbook now continues with clean installation...
      ══════════════════════════════════════════════════════════════════════
