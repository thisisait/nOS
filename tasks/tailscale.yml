---
# ==============================================================================
# TAILSCALE - WireGuard mesh VPN
# Exposes all self-hosted services from anywhere without port forwarding
#
# After install, run manually:
#   tailscale up
#   -> opens browser to log in at https://login.tailscale.com
#
# Services then available via ports (requires services_lan_access: true):
#   http://<hostname>.<tailnet>.ts.net:3000   (Grafana - homepage)
#   http://<hostname>.<tailnet>.ts.net:3003   (Gitea)
#   http://<hostname>.<tailnet>.ts.net:5678   (n8n)
#   http://<hostname>.<tailnet>.ts.net:8096   (Jellyfin)
#   http://<hostname>.<tailnet>.ts.net:8085   (Nextcloud)
#   http://<hostname>.<tailnet>.ts.net:8888   (Kiwix)
#   http://<hostname>.<tailnet>.ts.net:3004   (Open WebUI)
#   http://<hostname>.<tailnet>.ts.net:9002   (Portainer)
#
# Homepage (https://<tailscale_hostname>/) -> Grafana (set tailscale_hostname in config.yml)
# ==============================================================================

- name: Install Tailscale via Homebrew Cask
  community.general.homebrew_cask:
    name: tailscale
    state: present

- name: Check if tailscaled is running
  ansible.builtin.command: pgrep -x tailscaled
  register: tailscaled_check
  changed_when: false
  failed_when: false

- name: Start Tailscale system extension (GUI required for first run)
  ansible.builtin.debug:
    msg: |
      Tailscale has been installed. To finish setup:
        1. Open Tailscale in Applications
        2. Click "Log in" and sign in at https://login.tailscale.com
        3. After login, the Mac Studio will be available as a node in your tailnet

      For SSH over Tailscale: tailscale up --ssh
      For subnet router (whole home network): tailscale up --advertise-routes=192.168.1.0/24
  when: tailscaled_check.rc != 0
