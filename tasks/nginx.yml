---
# ==============================================================================
# NGINX - installation and configuration
#
# Two render targets are supported via a single task file. Host nginx
# (Homebrew on macOS, apt on Linux) writes to {{ nginx_etc_dir }}
# and is started via brew services / systemd. Container nginx (the
# pazny.nginx_container role) writes to {{ stacks_dir }}/infra/nginx/etc
# instead, and is bounced via `docker compose -p infra restart nginx`.
#
# Switch between them via:
#   install_nginx:           true (default) → host nginx on 80/443
#   install_nginx_container: true            → container nginx on 80/443
# Both true is rejected by pazny.nginx_container's preflight (port collision).
# ==============================================================================

# ── Resolve render target up front ────────────────────────────────────────────
- name: "[nginx] Resolve render target (host vs container)"
  ansible.builtin.set_fact:
    nginx_etc_dir: "{{ nginx_container_etc if (install_nginx_container | default(false) | bool) else (homebrew_prefix + '/etc/nginx') }}"
    nginx_log_dir: "{{ nginx_container_logs if (install_nginx_container | default(false) | bool) else (homebrew_prefix + '/var/log/nginx') }}"
  vars:
    nginx_container_etc:  "{{ stacks_dir }}/infra/nginx/etc"
    nginx_container_logs: "{{ stacks_dir }}/infra/nginx/log"

- name: Install nginx via Homebrew
  community.general.homebrew:
    name: nginx
    state: present
  when: not (install_nginx_container | default(false) | bool)

- name: Install mkcert for local SSL certificates
  community.general.homebrew:
    name:
      - mkcert
      - nss
    state: present
  when: instance_tld_is_local | default(true) | bool

- name: Ensure nginx sites directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ nginx_etc_dir }}/sites-available"
    - "{{ nginx_etc_dir }}/sites-enabled"
    - "{{ nginx_etc_dir }}/conf.d"
    - "{{ nginx_log_dir }}"

- name: Deploy main nginx.conf
  ansible.builtin.template:
    src: nginx/nginx.conf
    dest: "{{ nginx_etc_dir }}/nginx.conf"
    backup: true
    mode: '0644'
  notify: Restart nginx

- name: Deploy Authentik proxy auth snippets
  ansible.builtin.template:
    src: "nginx/{{ item }}"
    dest: "{{ nginx_etc_dir }}/{{ item }}"
    mode: '0644'
  loop:
    - authentik-proxy-auth.conf
    - authentik-proxy-locations.conf
  when: install_authentik | default(false)
  notify: Reload nginx

- name: Deploy nginx virtual host templates
  ansible.builtin.template:
    src: "nginx/sites-available/{{ item }}"
    dest: "{{ nginx_etc_dir }}/sites-available/{{ item }}"
    mode: '0644'
  loop:
    # ── Dev templates ─────────────────────────────────────────────────────────
    - default.conf
    - php-app.conf
    - node-proxy.conf
    - python-proxy.conf
    - go-proxy.conf
    - static-site.conf
    # ── IIAB templates (always deployed, enabled only if the service is enabled)
    - wordpress.conf
    - nextcloud.conf
    - kiwix.conf
    - maps.conf
    - grafana.conf
    - n8n.conf
    - gitea.conf
    - gitlab.conf
    - jellyfin.conf
    - openwebui.conf
    - portainer.conf
    - spacetimedb.conf
    - woodpecker.conf
    - uptime-kuma.conf
    - status.conf
    - calibreweb.conf
    - homeassistant.conf
    - rustfs.conf
    - traefik.conf
    - openclaw.conf
    # ── B2B stack
    - erpnext.conf
    - freescout.conf

    - outline.conf
    # ── VoIP / Engineering / Data stacks
    - freepbx.conf
    - qgis.conf
    - metabase.conf
    - superset.conf
    # ── IAM & Secrets
    - authentik.conf
    - infisical.conf
    - vaultwarden.conf
    # ── Identity
    - bluesky-pds.conf
    # ── Web desktop
    - puter.conf
    - jsos.conf
    # ── AI orchestration
    - paperclip.conf
    # ── Security dashboard
    - wing.conf
    # ── Wave A+B (2026-04) new services
    - ntfy.conf
    - miniflux.conf
    - nodered.conf
    - code-server.conf
    - hedgedoc.conf
    - bookstack.conf
    - firefly.conf
    - onlyoffice.conf
    - influxdb.conf
    # ── Mail tier
    - mailpit.conf
    # ── Local API (Bone)
    - bone.conf
  notify: Restart nginx

- name: Build list of nginx sites to enable
  ansible.builtin.set_fact:
    _nginx_sites_auto: >-
      {{ ['default.conf']
         + ((install_wordpress | default(false)) | ternary(['wordpress.conf'], []))
         + ((install_nextcloud | default(false)) | ternary(['nextcloud.conf'], []))
         + ((install_kiwix | default(false)) | ternary(['kiwix.conf'], []))
         + ((install_offline_maps | default(false)) | ternary(['maps.conf'], []))
         + ((install_observability | default(true)) | ternary(['grafana.conf'], []))
         + ((install_n8n | default(false)) | ternary(['n8n.conf'], []))
         + ((install_gitea | default(false)) | ternary(['gitea.conf'], []))
         + ((install_gitlab | default(false)) | ternary(['gitlab.conf'], []))
         + ((install_jellyfin | default(false)) | ternary(['jellyfin.conf'], []))
         + ((install_openwebui | default(false)) | ternary(['openwebui.conf'], []))
         + ((install_portainer | default(false)) | ternary(['portainer.conf'], []))
         + ((install_spacetimedb | default(false)) | ternary(['spacetimedb.conf'], []))
         + ((install_woodpecker | default(false)) | ternary(['woodpecker.conf'], []))
         + ((install_uptime_kuma | default(false)) | ternary(['uptime-kuma.conf', 'status.conf'], []))
         + ((install_calibreweb | default(false)) | ternary(['calibreweb.conf'], []))
         + ((install_homeassistant | default(false)) | ternary(['homeassistant.conf'], []))
         + ((install_rustfs | default(false)) | ternary(['rustfs.conf'], []))
         + ((install_traefik | default(false)) | ternary(['traefik.conf'], []))
         + ((install_openclaw | default(false)) | ternary(['openclaw.conf'], []))
         + ((install_erpnext | default(false)) | ternary(['erpnext.conf'], []))
         + ((install_freescout | default(false)) | ternary(['freescout.conf'], []))

         + ((install_outline | default(false)) | ternary(['outline.conf'], []))
         + ((install_freepbx | default(false)) | ternary(['freepbx.conf'], []))
         + ((install_qgis_server | default(false)) | ternary(['qgis.conf'], []))
         + ((install_metabase | default(false)) | ternary(['metabase.conf'], []))
         + ((install_superset | default(false)) | ternary(['superset.conf'], []))
         + ((install_authentik | default(false)) | ternary(['authentik.conf'], []))
         + ((install_infisical | default(false)) | ternary(['infisical.conf'], []))
         + ((install_vaultwarden | default(false)) | ternary(['vaultwarden.conf'], []))
         + ((install_bluesky_pds | default(false)) | ternary(['bluesky-pds.conf'], []))
         + ((install_puter | default(false)) | ternary(['puter.conf'], []))
         + ((install_jsos | default(false)) | ternary(['jsos.conf'], []))
         + ((install_paperclip | default(false)) | ternary(['paperclip.conf'], []))
         + ((install_wing | default(true)) | ternary(['wing.conf'], []))
         + ((install_ntfy | default(false)) | ternary(['ntfy.conf'], []))
         + ((install_miniflux | default(false)) | ternary(['miniflux.conf'], []))
         + ((install_nodered | default(false)) | ternary(['nodered.conf'], []))
         + ((install_code_server | default(false)) | ternary(['code-server.conf'], []))
         + ((install_hedgedoc | default(false)) | ternary(['hedgedoc.conf'], []))
         + ((install_bookstack | default(false)) | ternary(['bookstack.conf'], []))
         + ((install_firefly | default(false)) | ternary(['firefly.conf'], []))
         + ((install_onlyoffice | default(false)) | ternary(['onlyoffice.conf'], []))
         + ((install_influxdb | default(false)) | ternary(['influxdb.conf'], []))
         + ((install_mailpit | default(false)) | ternary(['mailpit.conf'], []))
         + ((install_bone | default(false)) | ternary(['bone.conf'], []))
         + (nginx_sites_extra | default([]))
      }}

- name: Enable nginx sites (symlink)
  ansible.builtin.file:
    src: "{{ nginx_etc_dir }}/sites-available/{{ item }}"
    dest: "{{ nginx_etc_dir }}/sites-enabled/{{ item }}"
    state: link
    force: true
  loop: "{{ nginx_sites_enabled | default(_nginx_sites_auto) }}"
  notify: Reload nginx

- name: Remove disabled nginx sites
  ansible.builtin.shell: |
    for f in {{ nginx_etc_dir }}/sites-enabled/*.conf; do
      name=$(basename "$f")
      found=false
      for enabled in {{ (nginx_sites_enabled | default(_nginx_sites_auto)) | join(' ') }}; do
        [ "$name" = "$enabled" ] && found=true && break
      done
      $found || rm -f "$f"
    done
  changed_when: false

- name: Ensure nginx SSL directory exists
  ansible.builtin.file:
    path: "{{ nginx_etc_dir }}/ssl"
    state: directory
    mode: '0700'

# ── mkcert (local-only TLDs) ─────────────────────────────────────────────────
# When instance_tld is real (pazny.eu etc.) the cert comes from pazny.acme
# instead. mkcert/local-dev.* tasks are gated as a single block to avoid
# polluting a public-TLD install with a local CA in the system trust store.
- name: "[mkcert] Install dev CA + generate local-dev wildcard cert"
  when: instance_tld_is_local | default(true) | bool
  block:
    - name: "[mkcert] Install CA into system trust store"
      ansible.builtin.command: mkcert -install
      become: true
      environment:
        CAROOT: "{{ ansible_facts['env']['HOME'] }}/Library/Application Support/mkcert"
      changed_when: false

    - name: "[mkcert] Build list of required SSL SANs"
      ansible.builtin.set_fact:
        _ssl_san_required:
          - "*.{{ instance_tld | default('dev.local') }}"
          - "{{ '*.os.' + (instance_tld | default('dev.local')) if (install_puter | default(false)) else '' }}"
          - "{{ '*.dev.lan' if (install_bluesky_pds | default(false)) else '' }}"
          - "{{ '*.' ~ (bluesky_pds_hostname | default('bsky.dev.lan')) if (install_bluesky_pds | default(false)) else '' }}"

    - name: "[mkcert] Check if SSL cert covers all required SANs"
      ansible.builtin.shell: >
        openssl x509 -in {{ nginx_etc_dir }}/ssl/local-dev.crt -noout -text 2>/dev/null
        | grep -qF '{{ item }}'
      loop: "{{ _ssl_san_required | select | list }}"
      register: _cert_san_check
      changed_when: false
      failed_when: false

    - name: "[mkcert] Remove old SSL cert if missing required SANs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ nginx_etc_dir }}/ssl/local-dev.crt"
        - "{{ nginx_etc_dir }}/ssl/local-dev.key"
      when: _cert_san_check.results | default([]) | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0

    - name: "[mkcert] Generate local dev wildcard certificate"
      ansible.builtin.command: >
        mkcert
        -cert-file {{ nginx_etc_dir }}/ssl/local-dev.crt
        -key-file  {{ nginx_etc_dir }}/ssl/local-dev.key
        "localhost" "127.0.0.1" "::1" "*.localhost"
        "*.{{ instance_tld | default('dev.local') }}"
        {{ '"*.os.' + (instance_tld | default('dev.local')) + '"' if (install_puter | default(false)) else '' }}
        {{ '"*.dev.lan"' if (install_bluesky_pds | default(false)) else '' }}
        {{ '"*.' ~ (bluesky_pds_hostname | default('bsky.dev.lan')) ~ '"' if (install_bluesky_pds | default(false)) else '' }}
      args:
        creates: "{{ nginx_etc_dir }}/ssl/local-dev.crt"

- name: Start and enable nginx via brew services
  # Host-side nginx only. Container nginx is managed by the
  # pazny.nginx_container role + `docker compose -p infra up nginx`.
  ansible.builtin.command: "{{ playbook_dir }}/files/brew-svc.sh start nginx"
  register: nginx_svc
  changed_when: >
    'already started' not in (nginx_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (nginx_svc.stderr | default(''))
  failed_when: >
    nginx_svc.rc != 0 and
    'already started' not in (nginx_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (nginx_svc.stderr | default(''))
  when: not (install_nginx_container | default(false) | bool)

- name: Test nginx configuration
  # Host-side nginx test. Container nginx self-tests via its compose
  # healthcheck (CMD nginx -t) — no need for a host-side dry-run.
  ansible.builtin.command: "{{ homebrew_prefix }}/bin/nginx -t"
  changed_when: false
  when: not (install_nginx_container | default(false) | bool)
