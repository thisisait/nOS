---
# ==============================================================================
# tasks/nginx.yml — optional host nginx (Homebrew on macOS / apt on Linux).
#
# Traefik runs the edge. This file exists for operators who want a thin
# host-side nginx alongside it — niche flows like SCRIPT_FILENAME-style
# tunnels through the legacy vhost templates, or local dev experiments
# without the Docker network.
#
# Behaviour when install_nginx: true
#   1. Brew installs nginx + main nginx.conf.
#   2. brew services starts the daemon.
#   3. sites-enabled stays EMPTY unless `nginx_sites_enabled` is set
#      explicitly in config.yml (e.g. ['gitea.conf', 'wing.conf']). The
#      operator opts in per-vhost — nothing auto-derives from install_*
#      flags any more.
#
# Vhost templates under templates/nginx/sites-available/*.conf are kept
# as a legacy archive (see templates/nginx/_LEGACY.md). They share the
# `nginx_backend_host` indirection with Traefik, so they keep working
# when explicitly enabled.
# ==============================================================================

# ── Render target ────────────────────────────────────────────────────────────
- name: "[nginx] Resolve render target"
  ansible.builtin.set_fact:
    nginx_etc_dir: "{{ homebrew_prefix }}/etc/nginx"
    nginx_log_dir: "{{ homebrew_prefix }}/var/log/nginx"
    nginx_enabled: "{{ nginx_sites_enabled | default([]) }}"

- name: Install nginx via Homebrew
  community.general.homebrew:
    name: nginx
    state: present

- name: Ensure nginx sites directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ nginx_etc_dir }}/sites-available"
    - "{{ nginx_etc_dir }}/sites-enabled"
    - "{{ nginx_etc_dir }}/conf.d"
    - "{{ nginx_log_dir }}"

- name: Deploy main nginx.conf
  ansible.builtin.template:
    src: nginx/nginx.conf
    dest: "{{ nginx_etc_dir }}/nginx.conf"
    backup: true
    mode: '0644'
  notify: Restart nginx

- name: Deploy Authentik proxy auth snippets
  # Required when any explicitly-enabled vhost uses auth_request. Skipped
  # when the operator hasn't opted any vhosts in.
  ansible.builtin.template:
    src: "nginx/{{ item }}"
    dest: "{{ nginx_etc_dir }}/{{ item }}"
    mode: '0644'
  loop:
    - authentik-proxy-auth.conf
    - authentik-proxy-locations.conf
  when:
    - install_authentik | default(false)
    - nginx_enabled | length > 0
  notify: Reload nginx

- name: Deploy explicitly enabled nginx vhost templates
  ansible.builtin.template:
    src: "nginx/sites-available/{{ item }}"
    dest: "{{ nginx_etc_dir }}/sites-available/{{ item }}"
    mode: '0644'
  loop: "{{ nginx_enabled }}"
  notify: Restart nginx

- name: Enable nginx sites (symlink)
  ansible.builtin.file:
    src: "{{ nginx_etc_dir }}/sites-available/{{ item }}"
    dest: "{{ nginx_etc_dir }}/sites-enabled/{{ item }}"
    state: link
    force: true
  loop: "{{ nginx_enabled }}"
  notify: Reload nginx

- name: Remove disabled nginx sites
  ansible.builtin.shell: |
    for f in {{ nginx_etc_dir }}/sites-enabled/*.conf; do
      name=$(basename "$f")
      found=false
      for enabled in {{ nginx_enabled | join(' ') }}; do
        [ "$name" = "$enabled" ] && found=true && break
      done
      $found || rm -f "$f"
    done
  changed_when: false

# Cert files live under {{ tls_cert_dir }} (written by tasks/tls-certs.yml).
# Host nginx vhosts read them via ssl_certificate {{ ssl_cert_path }};

- name: Start and enable nginx via brew services
  ansible.builtin.command: "{{ playbook_dir }}/files/brew-svc.sh start nginx"
  register: nginx_svc
  changed_when: >
    'already started' not in (nginx_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (nginx_svc.stderr | default(''))
  failed_when: >
    nginx_svc.rc != 0 and
    'already started' not in (nginx_svc.stdout | default('')) and
    'Bootstrap failed: 5' not in (nginx_svc.stderr | default(''))

- name: Test nginx configuration
  ansible.builtin.command: "{{ homebrew_prefix }}/bin/nginx -t"
  changed_when: false
