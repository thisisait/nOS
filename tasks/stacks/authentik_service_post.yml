---
# ==============================================================================
# Authentik Service-Side OIDC Post-Setup
# Konfigurace sluЕҫeb, kterГ© nepodporujГӯ OIDC pЕҷes env vars
# SpouЕЎtГӯ se po stack-up + authentik_oidc_setup
# ==============================================================================

# в”Җв”Җ Gitea: registrace OAuth2 source pЕҷes Admin API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

- name: "[AuthentikвҶ’Gitea] Check if OAuth2 source exists"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ gitea_port | default(3003) }}/api/v1/admin/identity-providers"
    method: GET
    headers:
      Authorization: "Basic {{ (gitea_admin_user ~ ':' ~ gitea_admin_password) | b64encode }}"
    status_code: [200]
  register: _gitea_oauth_sources
  when: install_gitea | default(false)
  failed_when: false

- name: "[AuthentikвҶ’Gitea] Create OAuth2 authentication source"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ gitea_port | default(3003) }}/api/v1/admin/identity-providers"
    method: POST
    headers:
      Authorization: "Basic {{ (gitea_admin_user ~ ':' ~ gitea_admin_password) | b64encode }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: "oauth2"
      name: "authentik"
      oauth2_config:
        provider: "openidConnect"
        client_id: "{{ (authentik_oidc_apps | selectattr('slug', 'equalto', 'gitea') | first).client_id }}"
        client_secret: "{{ (authentik_oidc_apps | selectattr('slug', 'equalto', 'gitea') | first).client_secret }}"
        open_id_connect_auto_discovery_url: "https://{{ authentik_domain | default('auth.dev.local') }}/application/o/gitea/.well-known/openid-configuration"
        scopes: ["openid", "profile", "email"]
    status_code: [200, 201]
  when:
    - install_gitea | default(false)
    - _gitea_oauth_sources.status | default(0) == 200
    - "'authentik' not in (_gitea_oauth_sources.json | default([]) | map(attribute='name') | list)"
  failed_when: false

# в”Җв”Җ Portainer: OAuth2 konfigurace pЕҷes Settings API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

- name: "[AuthentikвҶ’Portainer] Get current auth settings"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ portainer_port | default(9002) }}/api/settings"
    method: GET
    headers:
      X-API-Key: "{{ portainer_admin_password | default('') }}"
    status_code: [200]
  register: _portainer_settings
  when: install_portainer | default(false)
  failed_when: false

# Portainer OAuth vyЕҫaduje inicializovanГҪ admin ГәДҚet вҖ” pЕҷeskoДҚit pokud nepЕҷihlГЎЕЎen
- name: "[AuthentikвҶ’Portainer] Info"
  ansible.builtin.debug:
    msg: >-
      Portainer OIDC: ManuГЎlnГӯ konfigurace v Settings вҶ’ Authentication вҶ’ OAuth.
      Client ID: {{ (authentik_oidc_apps | selectattr('slug', 'equalto', 'portainer') | first).client_id }}
      Auth URL: https://{{ authentik_domain | default('auth.dev.local') }}/application/o/authorize/
  when: install_portainer | default(false)

# в”Җв”Җ Nextcloud: occ pЕҷГӯkazy pro user_oidc app в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

- name: "[AuthentikвҶ’Nextcloud] Check if Nextcloud container is running"
  ansible.builtin.command: >
    {{ docker_bin }} inspect iiab-nextcloud-1 --format '{{ '{{' }}.State.Running{{ '}}' }}'
  register: _nc_running
  changed_when: false
  failed_when: false
  when: install_nextcloud | default(false)

- name: "[AuthentikвҶ’Nextcloud] Install user_oidc app"
  ansible.builtin.command: >
    {{ docker_bin }} exec -u www-data iiab-nextcloud-1
    php occ app:install user_oidc
  when:
    - install_nextcloud | default(false)
    - _nc_running.stdout | default('') | trim == 'true'
  failed_when: false
  changed_when: false

- name: "[AuthentikвҶ’Nextcloud] Enable user_oidc app"
  ansible.builtin.command: >
    {{ docker_bin }} exec -u www-data iiab-nextcloud-1
    php occ app:enable user_oidc
  when:
    - install_nextcloud | default(false)
    - _nc_running.stdout | default('') | trim == 'true'
  failed_when: false
  changed_when: false

- name: "[AuthentikвҶ’Nextcloud] Check if OIDC provider registered"
  ansible.builtin.command: >
    {{ docker_bin }} exec -u www-data iiab-nextcloud-1
    php occ user_oidc:provider
  register: _nc_oidc_check
  when:
    - install_nextcloud | default(false)
    - _nc_running.stdout | default('') | trim == 'true'
  failed_when: false
  changed_when: false

- name: "[AuthentikвҶ’Nextcloud] Register OIDC provider"
  ansible.builtin.command: >
    {{ docker_bin }} exec -u www-data iiab-nextcloud-1
    php occ user_oidc:provider authentik
    --clientid="{{ (authentik_oidc_apps | selectattr('slug', 'equalto', 'nextcloud') | first).client_id }}"
    --clientsecret="{{ (authentik_oidc_apps | selectattr('slug', 'equalto', 'nextcloud') | first).client_secret }}"
    --discoveryuri="https://{{ authentik_domain | default('auth.dev.local') }}/application/o/nextcloud/.well-known/openid-configuration"
    --mapping-uid="preferred_username"
    --mapping-email="email"
    --mapping-displayname="name"
  when:
    - install_nextcloud | default(false)
    - _nc_running.stdout | default('') | trim == 'true'
    - "'authentik' not in (_nc_oidc_check.stdout | default(''))"
  failed_when: false
