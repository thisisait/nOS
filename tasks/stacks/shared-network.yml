---
# ==============================================================================
# DOCKER SHARED NETWORK - cross-stack communication
# Creates an external Docker network that all compose stacks join.
# ==============================================================================

- name: "[Stacks] Ensure shared Docker network exists"
  ansible.builtin.command: >
    {{ docker_bin }} network create {{ stacks_shared_network }}
    --driver bridge
    --subnet 172.30.0.0/16
  register: _shared_net
  changed_when: _shared_net.rc == 0
  failed_when:
    - _shared_net.rc != 0
    - "'already exists' not in (_shared_net.stderr | default(''))"
  check_mode: false

- name: "[Stacks] Ensure stack directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ stacks_dir }}/infra"
    - "{{ stacks_dir }}/observability"
    - "{{ stacks_dir }}/observability/grafana/provisioning/datasources"
    - "{{ stacks_dir }}/observability/grafana/provisioning/dashboards"
    - "{{ stacks_dir }}/observability/prometheus"
    - "{{ stacks_dir }}/observability/loki"
    - "{{ stacks_dir }}/observability/tempo"
    - "{{ stacks_dir }}/iiab"
    - "{{ stacks_dir }}/devops"
    - "{{ stacks_dir }}/devops/gitea"
    - "{{ stacks_dir }}/b2b"
    - "{{ stacks_dir }}/voip"
    - "{{ stacks_dir }}/engineering"
    - "{{ stacks_dir }}/data"
    - "{{ ansible_facts['env']['HOME'] }}/observability/dashboards"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"
