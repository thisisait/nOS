---
# ==============================================================================
# CORE STACKS - INFRA + OBSERVABILITY (always-first, always-required)
#
# This file brings up the FOUNDATION of nOS:
#   - infra - MariaDB, Postgres, Redis, Authentik, Infisical, Traefik,
#             Bluesky PDS, Portainer (gated flags)
#   - observability - Grafana, Prometheus, Loki, Tempo
#
# Runs ALWAYS first of all docker compose stacks - before any
# iiab/devops/b2b/voip/data/engineering task runs. All other
# roles can then assume DB/IAM/Vault/observability are listening
# and just inject their configs and notify handlers to restart.
#
# Order:
#   1) Shared prerequisites (mkcert CA, directories)
#   2) Deploy compose templates (infra + observability)
#   3) Deploy config files BEFORE compose up (critical - otherwise Docker creates
#      bind mount source as a directory and services fail)
#   4) docker compose up infra --wait
#   5) MariaDB / PostgreSQL post-start setup (DB users, grants)
#   6) docker compose up observability --wait
#   7) Authentik / Infisical / Bluesky PDS post-start
# ==============================================================================

# ── Plugin loader — pre_render hook (A6, 2026-05-03) ────────────────────────
# Discovers plugin manifests, validates, runs aggregators (e.g. authentik-base
# harvests OIDC blocks), installs host requirements (brew/docker/url),
# registers Authentik blueprint inputs. MUST run BEFORE the existing
# Authentik blueprint reconverge (P4 pitfall in role-thinning-recipe.md).
# Empty plugin set is the common case — clean no-op.
- name: "[Core] Plugin loader — pre_render hook"
  nos_plugin_loader:
    hook: pre_render
    plugins_root: "{{ playbook_dir }}/files/anatomy/plugins"
    template_vars: "{{ vars }}"
  tags: ['anatomy', 'anatomy.plugins']

# ── Flush handlers - nginx must listen on 443 before HTTPS services are verified ─
- name: "[Core] Flush handlers before core stack deployment"
  ansible.builtin.meta: flush_handlers

# ── mkcert CA for containers (OIDC discovery needs to trust self-signed) ─────

- name: "[Core] Resolve mkcert CAROOT path"
  ansible.builtin.command: mkcert -CAROOT
  register: _mkcert_caroot
  changed_when: false
  check_mode: false
  failed_when: false

- name: "[Core] Create shared certs directory for containers"
  ansible.builtin.file:
    path: "{{ stacks_dir }}/shared-certs"
    state: directory
    mode: '0755'
  when: _mkcert_caroot.rc | default(1) == 0

- name: "[Core] Copy mkcert root CA to shared-certs"
  ansible.builtin.copy:
    src: "{{ _mkcert_caroot.stdout | trim }}/rootCA.pem"
    dest: "{{ stacks_dir }}/shared-certs/rootCA.pem"
    mode: '0644'
    remote_src: true
  when:
    - _mkcert_caroot.rc | default(1) == 0
    - _mkcert_caroot.stdout | default('') | trim | length > 0

# ── Ensure stack subdirectories exist ───────────────────────────────────────
# Idempotent - without this, template tasks may fail or (worse) write the render
# into a directory that Docker meanwhile creates as a bind mount source.

- name: "[Core] Ensure infra and observability subdirectories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ stacks_dir }}/infra"
    - "{{ stacks_dir }}/infra/overrides"
    - "{{ stacks_dir }}/observability"
    - "{{ stacks_dir }}/observability/overrides"
    - "{{ stacks_dir }}/observability/prometheus"
    - "{{ stacks_dir }}/observability/prometheus/rules"
    - "{{ stacks_dir }}/observability/loki"
    - "{{ stacks_dir }}/observability/tempo"
    - "{{ stacks_dir }}/observability/grafana/provisioning/datasources"
    - "{{ stacks_dir }}/observability/grafana/provisioning/dashboards"
    - "{{ stacks_dir }}/observability/blackbox"
    # Override directories for non-core stacks (Wave 2 role fragments)
    # Must exist BEFORE the stack-up.yml find task, otherwise find task fails.
    - "{{ stacks_dir }}/iiab/overrides"
    - "{{ stacks_dir }}/devops/overrides"
    - "{{ stacks_dir }}/b2b/overrides"
    - "{{ stacks_dir }}/voip/overrides"
    - "{{ stacks_dir }}/engineering/overrides"
    - "{{ stacks_dir }}/data/overrides"
    # Tier-2 apps stack (apps_runner) — apps_runner main.yml writes the merged
    # compose override to {{ stacks_dir }}/apps/overrides/auto.yml; ensure the
    # parent directory exists up-front so the template task in tasks/stacks/
    # apps-up.yml doesn't race a missing path on the very first blank run.
    - "{{ stacks_dir }}/apps"
    - "{{ stacks_dir }}/apps/overrides"

# ── Ensure INFRA persistent data directories exist ──────────────────────────
# Otherwise Docker would create them as root:root 0755 which causes permission
# problems for services that run under a different UID inside the container (mariadb, postgres).
# We use set_fact-overridden variables so external SSD works correctly.

- name: "[Core] Ensure infra service data directories exist"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop:
    - { path: "{{ mariadb_data_dir | default(ansible_facts['env']['HOME'] + '/mariadb/data') }}", enabled: "{{ install_mariadb | default(false) | bool }}" }
    - { path: "{{ postgresql_data_dir | default(ansible_facts['env']['HOME'] + '/postgresql/data') }}", enabled: "{{ install_postgresql | default(false) | bool }}" }
    - { path: "{{ redis_data_dir | default(ansible_facts['env']['HOME'] + '/redis/data') }}", enabled: "{{ redis_docker | default(false) | bool }}" }
    - { path: "{{ authentik_data_dir | default(ansible_facts['env']['HOME'] + '/authentik') }}", enabled: "{{ install_authentik | default(false) | bool }}" }
    - { path: "{{ infisical_data_dir | default(ansible_facts['env']['HOME'] + '/infisical') }}", enabled: "{{ install_infisical | default(false) | bool }}" }
    - { path: "{{ portainer_data_dir | default(ansible_facts['env']['HOME'] + '/portainer') }}", enabled: "{{ install_portainer | default(false) | bool }}" }
    - { path: "{{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}", enabled: "{{ install_traefik | default(false) | bool }}" }
    - { path: "{{ bluesky_pds_data_dir | default(ansible_facts['env']['HOME'] + '/bluesky-pds') }}", enabled: "{{ install_bluesky_pds | default(false) | bool }}" }
    - { path: "{{ spacetimedb_data_dir | default(ansible_facts['env']['HOME'] + '/spacetimedb/data') }}", enabled: "{{ install_spacetimedb | default(false) | bool }}" }
    - { path: "{{ spacetimedb_keys_dir | default(ansible_facts['env']['HOME'] + '/spacetimedb/keys') }}", enabled: "{{ install_spacetimedb | default(false) | bool }}" }
    # Bone container bind-mount targets (Track A, 2026-04-26). Pre-creating
    # them here keeps Docker from racing the role tasks and creating empty
    # root-owned dirs.
    - { path: "{{ ansible_facts['env']['HOME'] }}/.nos", enabled: "{{ install_bone | default(false) | bool }}" }
    - { path: "{{ ansible_facts['env']['HOME'] }}/agents/log", enabled: true }
  when: item.enabled | bool
  loop_control:
    label: "{{ item.path }}"

# ── Guard against previous race state - remove bind-mount artifacts ─────────
# If a previous run left tempo.yaml (etc.) as an empty directory (Docker
# created mount source before the render), remove it so the template task succeeds.

- name: "[Core] Stat observability config paths that must be files"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ stacks_dir }}/observability/prometheus/prometheus.yml"
    - "{{ stacks_dir }}/observability/loki/local-config.yaml"
    - "{{ stacks_dir }}/observability/tempo/tempo.yaml"
    - "{{ stacks_dir }}/observability/grafana/provisioning/datasources/all.yml"
    - "{{ stacks_dir }}/observability/grafana/provisioning/dashboards/all.yml"
  register: _obs_config_stats
  loop_control:
    label: "{{ item }}"

- name: "[Core] Remove directory artifacts in place of config files (bind-mount race repair)"
  ansible.builtin.file:
    path: "{{ item.item }}"
    state: absent
  loop: "{{ _obs_config_stats.results }}"
  when:
    - item.stat.exists | default(false)
    - item.stat.isdir | default(false)
  loop_control:
    label: "{{ item.item }}"

# ── Deploy compose templates (infra + observability) ────────────────────────

- name: "[Core] Deploy infra compose"
  ansible.builtin.template:
    src: "stacks/infra/docker-compose.yml.j2"
    dest: "{{ stacks_dir }}/infra/docker-compose.yml"
    mode: '0644'
  when: >
    install_portainer | default(false) or install_traefik | default(false) or
    install_mariadb | default(false) or install_postgresql | default(false) or
    redis_docker | default(false) or install_bluesky_pds | default(false) or
    install_authentik | default(false) or install_infisical | default(false) or
    install_spacetimedb | default(false)

- name: "[Core] Deploy observability compose"
  ansible.builtin.template:
    src: "stacks/observability/docker-compose.yml.j2"
    dest: "{{ stacks_dir }}/observability/docker-compose.yml"
    mode: '0644'
  when: install_observability | default(true)

# ── Wave 2 per-role compose overrides (rendered BEFORE enumerate + compose up) ─
# Each role renders its compose fragment into {{ stacks_dir }}/<stack>/overrides/<svc>.yml.
# The find task below collects them and docker compose merges them via -f flags.
# Post-start tasks (tasks_from=post.yml) run only AFTER compose up below.

# Infra roles
- name: "[Core] pazny.mariadb render"
  ansible.builtin.include_role: { name: pazny.mariadb, apply: { tags: ['mariadb', 'database'] } }
  when: install_mariadb | default(false)
  tags: ['mariadb', 'database']

- name: "[Core] pazny.postgresql render"
  ansible.builtin.include_role: { name: pazny.postgresql, apply: { tags: ['postgresql', 'database'] } }
  when: install_postgresql | default(false)
  tags: ['postgresql', 'database']

- name: "[Core] pazny.redis render"
  ansible.builtin.include_role: { name: pazny.redis, apply: { tags: ['redis', 'database'] } }
  when: redis_docker | default(false)
  tags: ['redis', 'database']

- name: "[Core] pazny.authentik render + blueprints"
  ansible.builtin.include_role: { name: pazny.authentik, apply: { tags: ['authentik', 'iam'] } }
  when: install_authentik | default(false)
  tags: ['authentik', 'iam']

- name: "[Core] pazny.infisical render"
  ansible.builtin.include_role: { name: pazny.infisical, apply: { tags: ['infisical', 'iam'] } }
  when: install_infisical | default(false)
  tags: ['infisical', 'iam']

- name: "[Core] pazny.traefik render"
  ansible.builtin.include_role: { name: pazny.traefik, apply: { tags: ['traefik', 'infra'] } }
  when: install_traefik | default(true)
  tags: ['traefik', 'infra']

- name: "[Core] pazny.portainer render"
  ansible.builtin.include_role: { name: pazny.portainer, apply: { tags: ['portainer', 'infra'] } }
  when: install_portainer | default(false)
  tags: ['portainer', 'infra']

- name: "[Core] pazny.bluesky_pds render"
  ansible.builtin.include_role: { name: pazny.bluesky_pds, apply: { tags: ['bluesky-pds', 'infra'] } }
  when: install_bluesky_pds | default(false)
  tags: ['bluesky-pds', 'infra']

- name: "[Core] pazny.smtp_stalwart render (Track G — production SMTP/IMAP/JMAP)"
  ansible.builtin.include_role: { name: pazny.smtp_stalwart, apply: { tags: ['smtp', 'stalwart', 'mail', 'infra'] } }
  when: install_smtp_stalwart | default(false)
  tags: ['smtp', 'stalwart', 'mail', 'infra']

- name: "[Core] pazny.spacetimedb render"
  ansible.builtin.include_role: { name: pazny.spacetimedb, apply: { tags: ['spacetimedb', 'infra'] } }
  when: install_spacetimedb | default(false)
  tags: ['spacetimedb', 'infra']

- name: "[Core] pazny.bone render"
  # Bone is part of the infra stack now (Track A, 2026-04-26). The render
  # task seeds the state dir + service-registry placeholder so the bind
  # mounts have valid sources at compose-up time.
  ansible.builtin.include_role: { name: pazny.bone, apply: { tags: ['bone', 'api', 'infra'] } }
  when: install_bone | default(false)
  tags: ['bone', 'api', 'infra']

# Observability roles
- name: "[Core] pazny.grafana render"
  ansible.builtin.include_role: { name: pazny.grafana, apply: { tags: ['grafana', 'observability'] } }
  when: install_observability | default(true)
  tags: ['grafana', 'observability']

- name: "[Core] pazny.prometheus render"
  ansible.builtin.include_role: { name: pazny.prometheus, apply: { tags: ['prometheus', 'observability'] } }
  when: install_observability | default(true)
  tags: ['prometheus', 'observability']

- name: "[Core] pazny.loki render"
  ansible.builtin.include_role: { name: pazny.loki, apply: { tags: ['loki', 'observability'] } }
  when: install_observability | default(true)
  tags: ['loki', 'observability']

- name: "[Core] pazny.tempo render"
  ansible.builtin.include_role: { name: pazny.tempo, apply: { tags: ['tempo', 'observability'] } }
  when: install_observability | default(true)
  tags: ['tempo', 'observability']

- name: "[Core] pazny.influxdb render"
  ansible.builtin.include_role: { name: pazny.influxdb, apply: { tags: ['influxdb', 'observability'] } }
  when:
    - install_observability | default(true)
    - install_influxdb | default(false)
  tags: ['influxdb', 'observability']

# ── Deploy observability config files (MUST happen before docker compose up!) ─
# If Docker encounters a non-existent bind mount source, it creates it as a DIRECTORY
# and the container then crashes in the config phase. Rendering these files here
# guarantees tempo/prometheus/loki/grafana start with a valid config.

- name: "[Core] [Loki] Clean stale scratch dir (macOS VirtioFS workaround)"
  ansible.builtin.file:
    path: "{{ loki_storage_path | default(stacks_dir + '/observability/loki/data') }}/tsdb-shipper-active/scratch"
    state: absent

# Track Q1 (2026-05-04): Prometheus / Loki / Tempo / recording-rules config
# rendering moved to the plugin loader. The loader's pre_compose hook (further
# down) executes the equivalent `render` + `render_dir` actions reading from
# files/anatomy/plugins/{prometheus,loki,tempo}-base/provisioning/. Same target
# paths under {{ stacks_dir }}/observability/, single declarative manifest
# entry per plugin instead of 4 imperative tasks here. Doctrine reference:
# docs/bones-and-wings-refactor.md §1.1 + §13.1 Q1 batch.

# Anatomy A6.5 (2026-05-04): Grafana datasources/dashboards provisioning
# rendering moved to the plugin loader (grafana-base plugin). The loader's
# pre_compose hook (further down in this file) now runs the equivalent
# `render` actions reading from
#   files/anatomy/plugins/grafana-base/provisioning/{datasources,dashboards}/all.yml.j2
# Doctrine reference: docs/bones-and-wings-refactor.md §1.1 + Lane D in
# docs/bones-and-wings-bulk-plan.md.

- name: "[Core] Deploy blackbox-exporter configuration"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/observability/blackbox/config.yml"
    dest: "{{ stacks_dir }}/observability/blackbox/config.yml"
    mode: '0644'
    force: true
  when: install_observability | default(true)

# ── Pre-check: Docker daemon must be ready ──────────────────────────────────

- name: "[Core] Wait for Docker daemon to be ready"
  ansible.builtin.shell: >
    {{ docker_bin }} info >/dev/null 2>&1
  register: _core_docker_ready
  retries: 10
  delay: 5
  until: _core_docker_ready.rc == 0
  changed_when: false
  check_mode: false

# ── Build list of core stacks actually enabled ──────────────────────────────

- name: "[Core] Resolve which core stacks to bring up"
  ansible.builtin.set_fact:
    _core_infra_enabled: >-
      {{ (install_portainer | default(false)) or (install_traefik | default(false)) or
         (install_mariadb | default(false)) or (install_postgresql | default(false)) or
         (redis_docker | default(false)) or (install_bluesky_pds | default(false)) or
         (install_authentik | default(false)) or (install_infisical | default(false)) or
         (install_spacetimedb | default(false)) or (install_bone | default(false)) }}
    _core_observability_enabled: "{{ install_observability | default(true) | bool }}"

# ── Enumerate per-role compose overrides (Wave 2 role extraction) ───────────
# Each pazny.<svc> role renders its compose fragment into
# {{ stacks_dir }}/<stack>/overrides/<svc>.yml. This find task collects all
# existing overrides and expands them as additional -f flags in the `docker compose
# up` command below. Empty directory = fallback to base compose file (backward
# compatible with pre-Wave2 state).

- name: "[Core] Enumerate infra compose overrides"
  ansible.builtin.find:
    paths: "{{ stacks_dir }}/infra/overrides"
    patterns: "*.yml"
    file_type: file
  register: _infra_overrides
  check_mode: false

- name: "[Core] Enumerate observability compose overrides"
  ansible.builtin.find:
    paths: "{{ stacks_dir }}/observability/overrides"
    patterns: "*.yml"
    file_type: file
  register: _observability_overrides
  check_mode: false

# ── Plugin loader — pre_compose hook (A6, 2026-05-03) ──────────────────────
# Renders plugin compose-extension fragments (the "vessel" pattern from V3
# EC1) into {{ stacks_dir }}/<stack>/overrides/<plugin>.yml. The override
# enumeration above (find tasks) re-runs implicitly when the next compose-up
# fires because find re-reads the dir at task time.
- name: "[Core] Plugin loader — pre_compose hook"
  nos_plugin_loader:
    hook: pre_compose
    plugins_root: "{{ playbook_dir }}/files/anatomy/plugins"
    template_vars: "{{ vars }}"
  tags: ['anatomy', 'anatomy.plugins']

# Re-enumerate overrides after pre_compose hook may have rendered new fragments.
- name: "[Core] Re-enumerate infra compose overrides (after plugin loader)"
  ansible.builtin.find:
    paths: "{{ stacks_dir }}/infra/overrides"
    patterns: "*.yml"
    file_type: file
  register: _infra_overrides
  check_mode: false

- name: "[Core] Re-enumerate observability compose overrides (after plugin loader)"
  ansible.builtin.find:
    paths: "{{ stacks_dir }}/observability/overrides"
    patterns: "*.yml"
    file_type: file
  register: _observability_overrides
  check_mode: false

# ── Start INFRA stack first (DB must be ready before anything else) ─────────

- name: "[Core] Start INFRA stack (docker compose up --wait)"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/infra/docker-compose.yml"
    {% for f in _infra_overrides.files | default([]) | sort(attribute='path') %}-f "{{ f.path }}" {% endfor %}
    -p infra
    --progress plain
    up -d --build --remove-orphans --wait --wait-timeout 540
    {{ _docker_compose_pull | default('') }} 2>&1
  register: _core_infra_result
  failed_when: false
  check_mode: false
  when: _core_infra_enabled | bool

- name: "[Core] Infra stack result"
  ansible.builtin.debug:
    msg: "infra: rc={{ _core_infra_result.rc | default('?') }} {{ (_core_infra_result.stdout_lines | default([]))[-3:] | join(' | ') }}"
  when: _core_infra_result is defined and _core_infra_result.rc is defined

# ── DB post-start setup (MUST run AFTER infra and BEFORE observability) ─────
# Grafana in the observability stack may use PostgreSQL as its backend -
# DB user/DB must exist before grafana compose up.

- name: "[Core] MariaDB post-start (pazny.mariadb role -> tasks/post.yml)"
  ansible.builtin.include_role:
    name: pazny.mariadb
    tasks_from: post.yml
    apply:
      tags: ['mariadb', 'database']
  when:
    - install_mariadb | default(false)
    - _core_infra_enabled | bool
  tags: ['mariadb', 'database']

- name: "[Core] pazny.postgresql post-start"
  ansible.builtin.include_role: { name: pazny.postgresql, tasks_from: post.yml, apply: { tags: ['postgresql', 'database'] } }
  when:
    - install_postgresql | default(false)
    - _core_infra_enabled | bool
  tags: ['postgresql', 'database']

# ── Start OBSERVABILITY stack (DB and configs ready) ────────────────────────

- name: "[Core] Start OBSERVABILITY stack (docker compose up --wait)"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/observability/docker-compose.yml"
    {% for f in _observability_overrides.files | default([]) | sort(attribute='path') %}-f "{{ f.path }}" {% endfor %}
    -p observability
    --progress plain
    up -d --build --remove-orphans --wait --wait-timeout 540
    {{ _docker_compose_pull | default('') }} 2>&1
  register: _core_obs_result
  failed_when: false
  check_mode: false
  when: _core_observability_enabled | bool

- name: "[Core] Observability stack result"
  ansible.builtin.debug:
    msg: "observability: rc={{ _core_obs_result.rc | default('?') }} {{ (_core_obs_result.stdout_lines | default([]))[-3:] | join(' | ') }}"
  when: _core_obs_result is defined and _core_obs_result.rc is defined

- name: "[Core] Grafana admin password reconverge (pazny.grafana -> post.yml)"
  ansible.builtin.include_role:
    name: pazny.grafana
    tasks_from: post.yml
    apply:
      tags: ['grafana', 'observability']
  when:
    - install_observability | default(true)
    - _core_observability_enabled | bool
  tags: ['grafana', 'observability']

- name: "[Core] InfluxDB admin password reconverge + health (pazny.influxdb -> post.yml)"
  ansible.builtin.include_role:
    name: pazny.influxdb
    tasks_from: post.yml
    apply:
      tags: ['influxdb', 'observability']
  when:
    - install_observability | default(true)
    - install_influxdb | default(false)
    - _core_observability_enabled | bool
  tags: ['influxdb', 'observability']

# ── Core service post-start (Authentik / Infisical / Bluesky PDS) ───────────
# Other tasks in main.yml can then assume IAM / Vault / PDS
# are available (health check waits inside these include_tasks).

- name: "[Core] pazny.authentik post-start (readiness probe — blueprints applied by container on boot)"
  ansible.builtin.include_role: { name: pazny.authentik, tasks_from: health.yml, apply: { tags: ['authentik', 'iam'] } }
  when:
    - install_authentik | default(false)
    - _core_infra_enabled | bool
  tags: ['authentik', 'iam']

- name: "[Core] pazny.infisical post-start"
  ansible.builtin.include_role: { name: pazny.infisical, tasks_from: post.yml, apply: { tags: ['infisical', 'iam'] } }
  when:
    - install_infisical | default(false)
    - _core_infra_enabled | bool
  tags: ['infisical', 'iam']

- name: "[Core] pazny.bluesky_pds post-start (goat CLI admin account)"
  ansible.builtin.include_role: { name: pazny.bluesky_pds, tasks_from: post.yml, apply: { tags: ['bluesky-pds', 'infra'] } }
  when:
    - install_bluesky_pds | default(false)
    - _core_infra_enabled | bool
  tags: ['bluesky-pds', 'infra']

- name: "[Core] pazny.portainer post-start (admin init + password reconverge)"
  ansible.builtin.include_role: { name: pazny.portainer, tasks_from: post.yml, apply: { tags: ['portainer', 'infra'] } }
  when:
    - install_portainer | default(false)
    - _core_infra_enabled | bool
  tags: ['portainer', 'infra']

- name: "[Core] pazny.spacetimedb post-start (host CLI + server alias + onboarding)"
  ansible.builtin.include_role: { name: pazny.spacetimedb, tasks_from: post.yml, apply: { tags: ['spacetimedb', 'infra'] } }
  when:
    - install_spacetimedb | default(false)
    - _core_infra_enabled | bool
  tags: ['spacetimedb', 'infra']

- name: "[Core] pazny.bone post-start (health probe)"
  ansible.builtin.include_role: { name: pazny.bone, tasks_from: post.yml, apply: { tags: ['bone', 'api', 'infra'] } }
  when:
    - install_bone | default(false)
    - _core_infra_enabled | bool
  tags: ['bone', 'api', 'infra']

# ── Plugin loader — post_compose hook (A6, 2026-05-03) ─────────────────────
# After all core-stack containers are healthy, plugins do their API-side
# registrations (Wing routes, Pulse jobs, Grafana dashboards, GDPR row,
# ntfy/mail templates). Wing/Pulse reload happens at most once per loader
# run (debounced inside the loader).
- name: "[Core] Plugin loader — post_compose hook (infra + observability only)"
  nos_plugin_loader:
    hook: post_compose
    plugins_root: "{{ playbook_dir }}/files/anatomy/plugins"
    template_vars: "{{ vars }}"
    stack_filter:
      - infra
      - observability
  tags: ['anatomy', 'anatomy.plugins']

# ── Result ───────────────────────────────────────────────────────────────────

- name: "[Core] Summary"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       CORE STACKS UP - infra + observability are online
      ══════════════════════════════════════════════════════
       Infra:         {{ 'OK' if (_core_infra_result.rc | default(1)) == 0 else ('SKIP' if not _core_infra_enabled else 'FAILED') }}
       Observability: {{ 'OK' if (_core_obs_result.rc | default(1)) == 0 else ('SKIP' if not _core_observability_enabled else 'FAILED') }}
       Authentik:     {{ 'configured' if (install_authentik | default(false)) else 'disabled' }}
       Infisical:     {{ 'configured' if (install_infisical | default(false)) else 'disabled' }}
       Bluesky PDS:   {{ 'configured' if (install_bluesky_pds | default(false)) else 'disabled' }}
       SpacetimeDB:   {{ 'configured' if (install_spacetimedb | default(false)) else 'disabled' }}

      Remaining stacks (iiab/devops/b2b/voip/data/engineering) will come up
      later via tasks/stacks/stack-up.yml after service-side tasks have
      injected their configs.
