---
# ==============================================================================
# Authentik OIDC Setup — automatické vytvoření providerů a aplikací
# Single source of truth: authentik_oidc_apps v default.config.yml
# Idempotentní — kontroluje existenci před vytvořením
# ==============================================================================

# ── 1. API Token ─────────────────────────────────────────────────────────────
# ak create_token je idempotentní — vrátí existující nebo vytvoří nový

- name: "[Authentik OIDC] Create API token via ak CLI"
  ansible.builtin.shell: >
    {{ docker_bin }} exec infra-authentik-server-1
    ak create_token devboxnos-api --intent api 2>/dev/null
    | tail -1
  register: _ak_token_create
  changed_when: false
  failed_when: false

- name: "[Authentik OIDC] Read existing token from DB (fallback)"
  ansible.builtin.shell: >
    {{ docker_bin }} exec infra-authentik-server-1
    ak shell -c
    "from authentik.core.models import Token; t=Token.objects.filter(identifier='devboxnos-api',intent='api').first(); print(t.key if t else '')"
    2>/dev/null | tail -1
  register: _ak_token_read
  when: (_ak_token_create.stdout | default('') | trim | length) < 10
  changed_when: false
  failed_when: false

- name: "[Authentik OIDC] Set token fact"
  ansible.builtin.set_fact:
    _ak_token_raw:
      stdout: "{{ _ak_token_create.stdout if (_ak_token_create.stdout | default('') | trim | length) >= 10 else (_ak_token_read.stdout | default('')) }}"

- name: "[Authentik OIDC] Validate token"
  ansible.builtin.set_fact:
    _ak_token: "{{ _ak_token_raw.stdout | default('') | trim }}"
    _ak_base: "http://127.0.0.1:{{ authentik_port | default(9003) }}"

- name: "[Authentik OIDC] Token status"
  ansible.builtin.debug:
    msg: "{{ 'OK — token získán (' ~ _ak_token[:8] ~ '...)' if (_ak_token | length >= 10) else 'CHYBA — token nenalezen, OIDC setup přeskočen' }}"

# ── 2. Authorization Flow ────────────────────────────────────────────────────

- name: "[Authentik OIDC] Get authorization flow"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/flows/instances/?designation=authorization&ordering=slug"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_flow_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Set flow PK"
  ansible.builtin.set_fact:
    _ak_auth_flow_pk: "{{ (_ak_flow_resp.json.results | default([]))[0].pk | default('') }}"
  when: _ak_flow_resp is defined and _ak_flow_resp.status | default(0) == 200

# ── 3. Načíst existující providery (pro idempotenci) ────────────────────────

- name: "[Authentik OIDC] List existing OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_providers
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Build existing provider map"
  ansible.builtin.set_fact:
    _ak_existing_slugs: "{{ _ak_existing_providers.json.results | default([]) | map(attribute='name') | list }}"
  when: _ak_existing_providers is defined and _ak_existing_providers.status | default(0) == 200

# ── 3b. List existing proxy providers ────────────────────────────────────────

- name: "[Authentik OIDC] List existing proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_proxy
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Build existing proxy provider map"
  ansible.builtin.set_fact:
    _ak_existing_proxy_names: "{{ _ak_existing_proxy.json.results | default([]) | map(attribute='name') | list }}"
  when: _ak_existing_proxy is defined and _ak_existing_proxy.status | default(0) == 200

# ── 4. Filter enabled apps (split OAuth2 vs Proxy) ─────────────────────────

- name: "[Authentik OIDC] Build active app lists"
  ansible.builtin.set_fact:
    _ak_active_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | rejectattr('type', 'defined') | list + authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | rejectattr('type', 'equalto', 'proxy') | list }}"
    _ak_proxy_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | selectattr('type', 'equalto', 'proxy') | list }}"

# ── 5. Create providers (skip existing) ─────────────────────────────────────

- name: "[Authentik OIDC] Create OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      client_type: "confidential"
      client_id: "{{ item.client_id }}"
      client_secret: "{{ item.client_secret }}"
      redirect_uris: "{{ item.redirect_uris }}"
      sub_mode: "hashed_user_id"
    status_code: [200, 201]
  loop: "{{ _ak_active_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_slugs | default([]))
  register: _ak_created_providers
  failed_when: false

# ── 6. Get all providers (including newly created) ──────────────────────────

- name: "[Authentik OIDC] Refresh provider list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_providers
  when: _ak_token | length >= 10
  failed_when: false

# ── 7. List existing applications (idempotence) ─────────────────────────────

- name: "[Authentik OIDC] List existing applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_apps
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Build existing app slug list"
  ansible.builtin.set_fact:
    _ak_existing_app_slugs: "{{ _ak_existing_apps.json.results | default([]) | map(attribute='slug') | list }}"
  when: _ak_existing_apps is defined and _ak_existing_apps.status | default(0) == 200

# ── 8. Create applications (skip existing) ──────────────────────────────────

- name: "[Authentik OIDC] Create applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_providers.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_active_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_apps
  failed_when: false

# ── 9. Create proxy providers (for services without native OIDC) ─────────────

- name: "[Authentik OIDC] Create proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      external_host: "{{ item.external_host }}"
      mode: "forward_single"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_proxy_names | default([]))
  register: _ak_created_proxy
  failed_when: false

# ── 10. Refresh all providers for app linking ────────────────────────────────

- name: "[Authentik OIDC] Refresh all proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_proxy
  when: _ak_token | length >= 10
  failed_when: false

# ── 11. Create applications for proxy providers ─────────────────────────────

- name: "[Authentik OIDC] Create proxy applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_proxy.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_proxy_apps
  failed_when: false

# ── 12. Summary ──────────────────────────────────────────────────────────────

- name: "[Authentik OIDC] Summary"
  ansible.builtin.debug:
    msg: |
      OIDC Setup Complete:
        OAuth2 apps: {{ _ak_active_apps | map(attribute='name') | list | join(', ') }}
        Proxy apps: {{ _ak_proxy_apps | default([]) | map(attribute='name') | list | join(', ') | default('none') }}
        New OAuth2 providers: {{ _ak_created_providers.results | default([]) | selectattr('status', 'defined') | selectattr('status', 'in', [200, 201]) | map(attribute='item.name') | list | join(', ') | default('(all existed)') }}
        New proxy providers: {{ _ak_created_proxy.results | default([]) | selectattr('status', 'defined') | selectattr('status', 'in', [200, 201]) | map(attribute='item.name') | list | join(', ') | default('(all existed)') }}
  when: _ak_token | length >= 10
