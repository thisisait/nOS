---
# ==============================================================================
# Authentik OIDC Setup — automatické vytvoření providerů a aplikací
# Single source of truth: authentik_oidc_apps v default.config.yml
# Idempotentní — kontroluje existenci před vytvořením
# ==============================================================================

# ── 1. API Token (via Django shell — ak create_token neexistuje v 2025.2) ────

- name: "[Authentik OIDC] Create API token via Django shell"
  ansible.builtin.shell: >
    {{ docker_bin }} exec infra-authentik-server-1
    ak shell -c
    "from authentik.core.models import Token,User;
    u=User.objects.filter(username='akadmin').first();
    t,_=Token.objects.get_or_create(identifier='devboxnos-api',defaults={'user':u,'intent':'api','expiring':False});
    print(t.key)"
    2>/dev/null | tail -1
  register: _ak_token_raw
  changed_when: false
  failed_when: false

- name: "[Authentik OIDC] Validate token"
  ansible.builtin.set_fact:
    _ak_token: "{{ _ak_token_raw.stdout | default('') | trim }}"
    _ak_base: "http://127.0.0.1:{{ authentik_port | default(9003) }}"

- name: "[Authentik OIDC] Token status"
  ansible.builtin.debug:
    msg: "{{ 'OK — token získán' if (_ak_token | length >= 10) else 'CHYBA — token nenalezen, OIDC setup přeskočen' }}"

# ── 1b. RBAC skupiny (providers, admins, managers, users, guests) ────────────

- name: "[Authentik OIDC] List existing groups"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_groups_resp
  failed_when: false
  when: _ak_token | length >= 10

- name: "[Authentik OIDC] Create default RBAC groups"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/groups/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      is_superuser: "{{ item.name == 'devboxnos-providers' or item.name == 'devboxnos-admins' }}"
    status_code: [200, 201]
  loop: "{{ authentik_default_groups | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_groups_resp.json is defined
    - item.name not in (_ak_groups_resp.json.results | default([]) | map(attribute='name') | list)
  failed_when: false

- name: "[Authentik OIDC] Add provider admin to providers group"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/users/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      username: "provider-admin"
      name: "Provider Admin"
      email: "{{ provider_admin_email | default('') }}"
      path: "providers"
      groups: "{{ _ak_groups_resp.json.results | default([]) | selectattr('name', 'equalto', 'devboxnos-providers') | map(attribute='pk') | list }}"
    status_code: [200, 201, 400]
  when:
    - _ak_token | length >= 10
    - provider_admin_email | default('') | length > 0
    - _ak_groups_resp.json is defined
  failed_when: false

# ── 2. Flows ─────────────────────────────────────────────────────────────────

- name: "[Authentik OIDC] Get authorization flow"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/flows/instances/?designation=authorization&ordering=slug"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_auth_flow_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Get invalidation flow"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/flows/instances/?designation=invalidation&ordering=slug"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_inv_flow_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Set flow PKs"
  ansible.builtin.set_fact:
    _ak_auth_flow_pk: "{{ (_ak_auth_flow_resp.json.results | default([]))[0].pk | default('') }}"
    _ak_inv_flow_pk: "{{ (_ak_inv_flow_resp.json.results | default([]))[0].pk | default('') }}"
  when: _ak_token | length >= 10

# ── 2b. Scope mappings (email, profile, openid) ─────────────────────────────

- name: "[Authentik OIDC] Get OIDC scope mappings"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/propertymappings/all/?managed__icontains=oauth2/scope&page_size=50"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_scope_mappings_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Set scope mapping PKs"
  ansible.builtin.set_fact:
    _ak_scope_pks: "{{ _ak_scope_mappings_resp.json.results | default([]) | map(attribute='pk') | list }}"
  when: _ak_scope_mappings_resp is defined and _ak_scope_mappings_resp.status | default(0) == 200

# ── 3. Existing providers (idempotence) ──────────────────────────────────────

- name: "[Authentik OIDC] List existing OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_providers
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] List existing proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_proxy
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] List existing applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_existing_apps
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Build existing name/slug lists"
  ansible.builtin.set_fact:
    _ak_existing_provider_names: "{{ _ak_existing_providers.json.results | default([]) | map(attribute='name') | list }}"
    _ak_existing_proxy_names: "{{ _ak_existing_proxy.json.results | default([]) | map(attribute='name') | list }}"
    _ak_existing_app_slugs: "{{ _ak_existing_apps.json.results | default([]) | map(attribute='slug') | list }}"
  when: _ak_token | length >= 10

# ── 4. Split apps: OAuth2 vs Proxy ──────────────────────────────────────────

- name: "[Authentik OIDC] Build active app lists"
  ansible.builtin.set_fact:
    _ak_oauth_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | rejectattr('type', 'defined') | list + authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | rejectattr('type', 'equalto', 'proxy') | list }}"
    _ak_proxy_apps: "{{ authentik_oidc_apps | default([]) | selectattr('enabled', 'equalto', true) | selectattr('type', 'defined') | selectattr('type', 'equalto', 'proxy') | list }}"

# ── 5. Create OAuth2 providers ───────────────────────────────────────────────

- name: "[Authentik OIDC] Create OAuth2 providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      invalidation_flow: "{{ _ak_inv_flow_pk }}"
      client_type: "confidential"
      client_id: "{{ item.client_id }}"
      client_secret: "{{ item.client_secret }}"
      redirect_uris:
        - matching_mode: "strict"
          url: "{{ item.redirect_uris }}"
      property_mappings: "{{ _ak_scope_pks | default([]) }}"
      sub_mode: "hashed_user_id"
    status_code: [200, 201]
  loop: "{{ _ak_oauth_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_provider_names | default([]))
  register: _ak_created_providers
  failed_when: false

# ── 6. Create proxy providers ────────────────────────────────────────────────

- name: "[Authentik OIDC] Create proxy providers"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      authorization_flow: "{{ _ak_auth_flow_pk }}"
      invalidation_flow: "{{ _ak_inv_flow_pk }}"
      external_host: "{{ item.external_host }}"
      mode: "forward_single"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - _ak_auth_flow_pk | default('') | length > 0
    - item.name not in (_ak_existing_proxy_names | default([]))
  register: _ak_created_proxy
  failed_when: false

# ── 7. Refresh all providers for app linking ─────────────────────────────────

- name: "[Authentik OIDC] Refresh OAuth2 provider list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/oauth2/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_oauth
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Refresh proxy provider list"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/providers/proxy/?page_size=100"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_all_proxy
  when: _ak_token | length >= 10
  failed_when: false

# ── 8. Create applications ───────────────────────────────────────────────────

- name: "[Authentik OIDC] Create OAuth2 applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_oauth.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_oauth_apps }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_oauth_apps
  failed_when: false

- name: "[Authentik OIDC] Create proxy applications"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.slug }}"
      provider: "{{ (_ak_all_proxy.json.results | default([]) | selectattr('name', 'equalto', item.name) | first).pk | default(omit) }}"
      meta_launch_url: "{{ item.launch_url }}"
    status_code: [200, 201]
  loop: "{{ _ak_proxy_apps | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ak_token | length >= 10
    - item.slug not in (_ak_existing_app_slugs | default([]))
  register: _ak_created_proxy_apps
  failed_when: false

# ── 9. Assign proxy providers to embedded outpost ───────────────────────────

- name: "[Authentik OIDC] Get embedded outpost"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/outposts/instances/?managed=goauthentik.io/outposts/embedded"
    headers:
      Authorization: "Bearer {{ _ak_token }}"
    status_code: 200
  register: _ak_outpost_resp
  when: _ak_token | length >= 10
  failed_when: false

- name: "[Authentik OIDC] Assign proxy providers to embedded outpost"
  ansible.builtin.uri:
    url: "{{ _ak_base }}/api/v3/outposts/instances/{{ (_ak_outpost_resp.json.results | first).pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _ak_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      providers: "{{ _ak_all_proxy.json.results | default([]) | map(attribute='pk') | list }}"
      config:
        authentik_host: "http://localhost:9000"
        authentik_host_browser: "https://{{ authentik_domain | default('auth.dev.local') }}"
    status_code: [200]
  when:
    - _ak_token | length >= 10
    - _ak_outpost_resp.json.results | default([]) | length > 0
    - _ak_all_proxy.json.results | default([]) | length > 0
  failed_when: false

# ── 10. Summary ──────────────────────────────────────────────────────────────

- name: "[Authentik OIDC] Summary"
  ansible.builtin.debug:
    msg: >-
      OIDC: {{ (_ak_oauth_apps | default([])) | length }} OAuth2 +
      {{ (_ak_proxy_apps | default([])) | length }} proxy apps configured
  when: _ak_token | length >= 10
