---
# ==============================================================================
# AUTO-START configuration - NOS starts automatically after PC restart
#
# Components:
#   1. Docker Desktop -> macOS login items (otherwise containers won't start)
#   2. Homebrew services -> launchctl plists (nginx, php, dnsmasq, alloy, ollama)
#   3. Docker containers -> restart: unless-stopped (handled by compose templates)
#   4. OpenClaw daemon -> launchd plist (install-daemon flag during onboard)
#
# Called from main.yml in the final phase after all services.
# ==============================================================================

# ── 1. Docker Desktop - login item ───────────────────────────────────────────

- name: "[Auto-start] Check if Docker Desktop is in login items"
  ansible.builtin.shell: |
    set -o pipefail
    osascript -e 'tell application "System Events" to get the name of every login item' 2>/dev/null | tr ',' '\n' | grep -qi docker
  args:
    executable: /bin/bash
  register: _docker_login_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[Auto-start] Add Docker Desktop to login items"
  ansible.builtin.shell: |
    osascript -e 'tell application "System Events" to make new login item at end with properties {path:"/Applications/Docker.app", hidden:true}'
  when: _docker_login_check.rc != 0
  register: _docker_login_add
  changed_when: _docker_login_add.rc == 0
  failed_when: false

# ── 2. PM2 startup (jsOS) ────────────────────────────────────────────────────

- name: "[Auto-start] Check if jsOS is running under PM2"
  ansible.builtin.shell: |
    set -o pipefail
    pm2 list 2>/dev/null | grep -c "online" || echo "0"
  args:
    executable: /bin/bash
  register: _pm2_status
  changed_when: false
  failed_when: false
  check_mode: false
  when: install_jsos | default(false) | bool

- name: "[Auto-start] Save PM2 process list for resurrection on boot"
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm use default 2>/dev/null || true
    pm2 save --force
  args:
    executable: /bin/zsh
  when:
    - install_jsos | default(false) | bool
    - (_pm2_status.stdout | default('0') | int) > 0
  register: _pm2_save
  changed_when: _pm2_save.rc == 0
  failed_when: false

# ── 3. Docker container restart policy verification ─────────────────────────

- name: "[Auto-start] Verify Docker containers have restart policy"
  ansible.builtin.shell: |
    set -o pipefail
    docker ps -q 2>/dev/null | xargs -I {} docker inspect {} --format '{{ "{{" }}.Name{{ "}}" }}: {{ "{{" }}.HostConfig.RestartPolicy.Name{{ "}}" }}' 2>/dev/null | grep ": no$" || echo "ALL_OK"
  args:
    executable: /bin/bash
  register: _container_restart_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[Auto-start] Warn about containers without restart policy"
  ansible.builtin.debug:
    msg: |
      WARN: The following containers DO NOT have a restart policy (will not start after PC restart):
      {{ _container_restart_check.stdout }}

      Fix: add `restart: unless-stopped` to the compose template of that service.
  when:
    - _container_restart_check.stdout is defined
    - "'ALL_OK' not in (_container_restart_check.stdout | default(''))"
    - "':' in (_container_restart_check.stdout | default(''))"

# ── 4. Ollama persistent LaunchAgent check ──────────────────────────────────
# Brew plist does NOT have env vars (OLLAMA_MODELS, OLLAMA_KV_CACHE_TYPE, ...). After reboot
# Ollama would start with default ~/.ollama/models (empty). Our custom
# com.ollama.agent.plist has env directly in the LaunchAgent dict.

- name: "[Auto-start] Check Ollama persistent LaunchAgent"
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.ollama.agent.plist"
  register: _ollama_plist_check
  when: install_openclaw | default(false) | bool

- name: "[Auto-start] WARN if Ollama persistent plist missing"
  ansible.builtin.debug:
    msg: |
      WARN: Ollama persistent LaunchAgent missing - after reboot Ollama won't see SSD models.
      Fix: ansible-playbook main.yml -K --tags openclaw
  when:
    - install_openclaw | default(false) | bool
    - not (_ollama_plist_check.stat.exists | default(false))

# ── 5. Summary ────────────────────────────────────────────────────────────────

- name: "[Auto-start] Summary"
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════════════════════════════════
       AUTO-START STATUS (after PC restart)
      ═══════════════════════════════════════════════════════════════════
       Docker Desktop:     {{ 'login item OK' if _docker_login_check.rc == 0 else 'added to login items' }}
       Docker containers:  {{ 'all restart=unless-stopped' if 'ALL_OK' in (_container_restart_check.stdout | default('')) else 'see warning above' }}
       Homebrew services:  launchctl plists (nginx/php/dnsmasq/alloy)
      {% if install_openclaw | default(false) | bool %}
       Ollama:             {{ 'custom LaunchAgent (env vars for SSD + KV cache)' if _ollama_plist_check.stat.exists | default(false) else 'WARN brew plist (env vars lost after reboot)' }}
      {% endif %}
      {% if install_jsos | default(false) | bool %}
       jsOS (PM2):         {{ 'resurrect list saved' if (_pm2_save.rc | default(1)) == 0 else 'PM2 inactive' }}
      {% endif %}
      ═══════════════════════════════════════════════════════════════════
