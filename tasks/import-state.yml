---
# ==============================================================================
# STATE IMPORT - restore data and databases from export tarball
#
# Run: ansible-playbook main.yml -K --tags import \
#      -e "import_tarball=/path/to/nos-export-YYYY-MM-DD.tar.gz"
#
# Restores:
#   - config.yml, credentials.yml
#   - PostgreSQL dump (pg_dumpall)
#   - MariaDB dump (mysqldump)
#   - Service data directories (gitea, nextcloud, n8n, grafana, agents, observability)
#   - service-registry.json
# ==============================================================================

# ── Validate input ───────────────────────────────────────────────────────────

- name: "[Import] Validate import_tarball is provided"
  ansible.builtin.assert:
    that:
      - import_tarball is defined
      - import_tarball | length > 0
    fail_msg: >
      Missing path to export tarball. Run with:
      ansible-playbook main.yml -K --tags import -e "import_tarball=/path/to/export.tar.gz"

- name: "[Import] Check tarball exists"
  ansible.builtin.stat:
    path: "{{ import_tarball }}"
  register: _import_tarball_stat

- name: "[Import] Fail if tarball not found"
  ansible.builtin.assert:
    that: _import_tarball_stat.stat.exists
    fail_msg: "File {{ import_tarball }} does not exist."

# ── Extract ──────────────────────────────────────────────────────────────────

- name: "[Import] Create temp extraction directory"
  ansible.builtin.tempfile:
    state: directory
    prefix: nos-import-
  register: _import_tmpdir

- name: "[Import] Extract tarball"  # noqa: command-instead-of-module
  # ansible.builtin.unarchive would work but its `dest:` extraction
  # behavior (preserves absolute paths from inside archive) doesn't
  # round-trip cleanly with the export-state.yml `-C parent basename`
  # creation pattern. Shell+tar keeps the import/export pair symmetric.
  ansible.builtin.shell: >
    tar xzf "{{ import_tarball }}" -C "{{ _import_tmpdir.path }}"
  check_mode: false

- name: "[Import] Find extracted directory"
  ansible.builtin.find:
    paths: "{{ _import_tmpdir.path }}"
    file_type: directory
    recurse: false
  register: _import_extracted_dirs

- name: "[Import] Set import source directory"
  ansible.builtin.set_fact:
    _import_src: "{{ _import_extracted_dirs.files[0].path }}"

# ── Read manifest ────────────────────────────────────────────────────────────

- name: "[Import] Read manifest.json"
  ansible.builtin.slurp:
    src: "{{ _import_src }}/manifest.json"
  register: _import_manifest_raw
  failed_when: false

- name: "[Import] Parse manifest"
  ansible.builtin.set_fact:
    _import_manifest: "{{ _import_manifest_raw.content | b64decode | from_json }}"
  when: _import_manifest_raw is not failed

- name: "[Import] Display source info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════════════
       IMPORT - source export
       Date:     {{ _import_manifest.date | default('unknown') }}
       Hostname: {{ _import_manifest.hostname | default('unknown') }}
       OS:       {{ _import_manifest.os | default('unknown') }}
       Files:    {{ _import_manifest.files | default([]) | join(', ') }}
      ══════════════════════════════════════════════════════════════════════
  when: _import_manifest is defined

# ── Stop Docker stacks ───────────────────────────────────────────────────────

- name: "[Import] Stop Docker stacks"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/{{ item }}/docker-compose.yml"
    -p {{ item }} down -t 30 2>&1 || true
  loop:
    - iiab
    - observability
    - infra
    - devops
    - b2b
    - voip
    - engineering
    - data
  failed_when: false
  changed_when: true

- name: "[Import] Wait for containers to stop"
  ansible.builtin.pause:
    seconds: 10
    prompt: "Waiting 10s for containers to stop..."

# ── Restore config files ────────────────────────────────────────────────────

- name: "[Import] Check for config.yml in export"
  ansible.builtin.stat:
    path: "{{ _import_src }}/config.yml"
  register: _import_config_stat

- name: "[Import] Restore config.yml"
  ansible.builtin.copy:
    src: "{{ _import_src }}/config.yml"
    dest: "{{ playbook_dir }}/config.yml"
    mode: '0600'
    remote_src: true
  when: _import_config_stat.stat.exists | default(false)

- name: "[Import] Check for credentials.yml in export"
  ansible.builtin.stat:
    path: "{{ _import_src }}/credentials.yml"
  register: _import_creds_stat

- name: "[Import] Restore credentials.yml"
  ansible.builtin.copy:
    src: "{{ _import_src }}/credentials.yml"
    dest: "{{ playbook_dir }}/credentials.yml"
    mode: '0600'
    remote_src: true
  when: _import_creds_stat.stat.exists | default(false)

- name: "[Import] Check for service-registry.json in export"
  ansible.builtin.stat:
    path: "{{ _import_src }}/service-registry.json"
  register: _import_registry_stat

- name: "[Import] Restore service-registry.json"
  ansible.builtin.copy:
    src: "{{ _import_src }}/service-registry.json"
    dest: "{{ openclaw_projects_dir | default(ansible_facts['env']['HOME'] + '/projects') }}/default/service-registry.json"
    mode: '0644'
    remote_src: true
  when: _import_registry_stat.stat.exists | default(false)

# ── Restore data directories ────────────────────────────────────────────────

- name: "[Import] Define data archives to restore"
  ansible.builtin.set_fact:
    _import_archive_names:
      - gitea
      - nextcloud
      - n8n
      - grafana
      - agents
      - observability

- name: "[Import] Check which data archives exist in export"
  ansible.builtin.stat:
    path: "{{ _import_src }}/{{ item }}.tar.gz"
  loop: "{{ _import_archive_names }}"
  register: _import_archive_stats

- name: "[Import] Restore data archives"  # noqa: command-instead-of-module
  # Symmetric with the export tar: see [Import] Extract tarball comment.
  ansible.builtin.shell: >
    tar xzf "{{ _import_src }}/{{ item.item }}.tar.gz"
    -C "{{ ansible_facts['env']['HOME'] }}"
  loop: "{{ _import_archive_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists | default(false)
  check_mode: false

# ── Restore databases ───────────────────────────────────────────────────────

- name: "[Import] Start infra stack for database restore"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/infra/docker-compose.yml"
    -p infra up -d 2>&1 || true
  failed_when: false
  check_mode: false

- name: "[Import] Wait for database containers to be ready"
  ansible.builtin.pause:
    seconds: 15
    prompt: "Waiting 15s for database containers to start..."

- name: "[Import] Check for PostgreSQL dump"
  ansible.builtin.stat:
    path: "{{ _import_src }}/postgresql.sql"
  register: _import_pg_dump

- name: "[Import] Check if PostgreSQL container is running"
  ansible.builtin.shell: >
    {{ docker_bin }} ps --filter name=postgresql --filter status=running -q
  register: _import_pg_running
  changed_when: false
  failed_when: false
  check_mode: false
  when: _import_pg_dump.stat.exists | default(false)

- name: "[Import] Restore PostgreSQL from dump"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra exec -T postgresql psql -U postgres
    < "{{ _import_src }}/postgresql.sql"
  when:
    - _import_pg_dump.stat.exists | default(false)
    - _import_pg_running.stdout | default('') | length > 0
  check_mode: false
  failed_when: false

- name: "[Import] Check for MariaDB dump"
  ansible.builtin.stat:
    path: "{{ _import_src }}/mariadb.sql"
  register: _import_maria_dump

- name: "[Import] Check if MariaDB container is running"
  ansible.builtin.shell: >
    {{ docker_bin }} ps --filter name=mariadb --filter status=running -q
  register: _import_maria_running
  changed_when: false
  failed_when: false
  check_mode: false
  when: _import_maria_dump.stat.exists | default(false)

- name: "[Import] Restore MariaDB from dump"
  ansible.builtin.shell: >
    {{ docker_bin }} compose -p infra exec -T mariadb mariadb -u root
    -p{{ mariadb_root_password }}
    < "{{ _import_src }}/mariadb.sql"
  when:
    - _import_maria_dump.stat.exists | default(false)
    - _import_maria_running.stdout | default('') | length > 0
  check_mode: false
  failed_when: false
  no_log: true

# ── Start all stacks ────────────────────────────────────────────────────────

- name: "[Import] Start all Docker stacks"
  ansible.builtin.shell: >
    {{ docker_bin }} compose
    -f "{{ stacks_dir }}/{{ item }}/docker-compose.yml"
    -p {{ item }} up -d 2>&1 || true
  loop:
    - infra
    - observability
    - iiab
    - devops
    - b2b
    - voip
    - engineering
    - data
  failed_when: false
  check_mode: false

# ── Cleanup ──────────────────────────────────────────────────────────────────

- name: "[Import] Remove temp extraction directory"
  ansible.builtin.file:
    path: "{{ _import_tmpdir.path }}"
    state: absent

- name: "[Import] Print import summary"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════════════════════
       IMPORT COMPLETE
       Source: {{ import_tarball }}
       Restored from: {{ _import_manifest.hostname | default('unknown') }}
             ({{ _import_manifest.date | default('unknown date') }})
       Recommendation: run the full playbook to reconfigure services:
         ansible-playbook main.yml -K
      ══════════════════════════════════════════════════════════════════════
