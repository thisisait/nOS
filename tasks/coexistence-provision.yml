---
# =============================================================================
# Coexistence — provision a new track for a service.
#
# Thin wrapper around the ``nos_coexistence`` custom module (see
# library/nos_coexistence.py).  Emits a ``coexistence_provision`` event
# name so Agent 3's callback plugin can capture it.
#
# Invoke::
#
#   ansible-playbook main.yml -K --tags coexist-provision \
#     -e coexist_service=grafana \
#     -e coexist_tag=new \
#     -e coexist_version=12.0.0 \
#     -e coexist_base_port=3000 \
#     -e coexist_stack=observability \
#     -e coexist_data_path=/Volumes/SSD1TB/observability/grafana-new \
#     -e coexist_data_source=clone_from:legacy
#
# Required extra-vars:
#   coexist_service      -- one of SUPPORTED_SERVICES
#   coexist_tag          -- unique tag for the new track
#   coexist_version      -- version string (e.g. "12.0.0")
#
# Optional extra-vars:
#   coexist_base_port       (default: service-specific baseline)
#   coexist_port            (explicit port override)
#   coexist_port_offset     (default: 10)
#   coexist_data_path       (default: autogenerated under stacks_dir)
#   coexist_data_source     (default: empty; use clone_from:<tag> to copy)
#   coexist_stack           (default: observability)
#   coexist_domain          (default: <service>.dev.local)
#   coexist_clone_strategy  (override default strategy)
#   coexist_clone_spec      (extra kwargs for the clone call)
#   coexist_force           (default: false)
#   coexist_web_service     (default: true)
#   coexist_dry_run         (default: false)
# =============================================================================

- name: "[coexistence_provision] Validate required inputs"
  ansible.builtin.assert:
    that:
      - coexist_service is defined
      - coexist_tag is defined
      - coexist_version is defined
    fail_msg: |
      tasks/coexistence-provision.yml requires coexist_service, coexist_tag
      and coexist_version (pass them via -e).
  tags: ['coexist-provision']

- name: "[coexistence_provision] Provision track {{ coexist_service }}/{{ coexist_tag }}"
  nos_coexistence:
    action: provision_track
    service: "{{ coexist_service }}"
    tag: "{{ coexist_tag }}"
    version: "{{ coexist_version }}"
    port: "{{ coexist_port | default(omit) }}"
    base_port: "{{ coexist_base_port | default(omit) }}"
    coexistence_port_offset: "{{ coexist_port_offset | default(10) }}"
    data_path: "{{ coexist_data_path | default(stacks_dir + '/' + (coexist_stack | default('observability')) + '/' + coexist_service + '-' + coexist_tag) }}"
    data_source: "{{ coexist_data_source | default('empty') }}"
    stack: "{{ coexist_stack | default('observability') }}"
    stacks_dir: "{{ stacks_dir }}"
    nginx_sites_dir: "{{ nginx_sites_dir | default(homebrew_prefix + '/etc/nginx/servers') }}"
    nginx_log_dir: "{{ nginx_log_dir | default(homebrew_prefix + '/var/log/nginx') }}"
    domain: "{{ coexist_domain | default(coexist_service + '.' + (nos_tld | default('dev.local'))) }}"
    state_path: "{{ nos_state_path | default(ansible_facts['env']['HOME'] + '/.nos/state.yml') }}"
    clone_strategy: "{{ coexist_clone_strategy | default(omit) }}"
    clone_spec: "{{ coexist_clone_spec | default(omit) }}"
    force: "{{ coexist_force | default(false) | bool }}"
    web_service: "{{ coexist_web_service | default(true) | bool }}"
    dry_run: "{{ coexist_dry_run | default(false) | bool }}"
  register: _coexist_provision_result
  tags: ['coexist-provision']

- name: "[coexistence_provision] Summary"
  ansible.builtin.debug:
    msg: |
      Provisioned {{ coexist_service }}/{{ coexist_tag }} on port
      {{ _coexist_provision_result.result.port }}
      - compose override: {{ _coexist_provision_result.result.compose_override }}
      - nginx vhost: {{ _coexist_provision_result.result.nginx_vhost }}
      {% if _coexist_provision_result.result.clone is not none %}
      - clone: {{ _coexist_provision_result.result.clone.method }} ({{ 'ok' if _coexist_provision_result.result.clone.success else 'failed' }})
      {% endif %}
  tags: ['coexist-provision']

- name: "[coexistence_provision] Reload nginx"
  ansible.builtin.command: "{{ homebrew_prefix }}/bin/brew services reload nginx"
  changed_when: true
  when: not (coexist_dry_run | default(false) | bool)
  tags: ['coexist-provision']
