---
# ==============================================================================
# HOME ASSISTANT – home automation platform (Docker)
# Spouštěno přes IIAB stack (docker compose)
# Web UI: http://localhost:{{ homeassistant_port | default(8123) }}
# ==============================================================================

- name: "[HomeAssistant] Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ homeassistant_config_dir | default(ansible_env.HOME + '/homeassistant') }}"
    state: directory
    mode: '0755'

- name: "[HomeAssistant] Pull Docker image"
  community.docker.docker_image:
    name: "homeassistant/home-assistant:{{ homeassistant_version | default('stable') }}"
    source: pull

- name: "[HomeAssistant] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Home Assistant připraven (spouští se přes IIAB stack)
      ══════════════════════════════════════════════════════
       Web UI:    http://localhost:{{ homeassistant_port | default(8123) }}
       Konfig:    {{ homeassistant_config_dir | default(ansible_env.HOME + '/homeassistant') }}
      ══════════════════════════════════════════════════════
