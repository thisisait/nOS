---
# ==============================================================================
# GitLab CE – self-hosted Git platform (Docker)
#
# Architektura:
#   - Docker kontejner (gitlab/gitlab-ce) s vlastním Omnibus stackem
#   - Náš Nginx sedí před ním jako reverzní proxy (SSL termination)
#   - GitLab interní nginx poslouchá na HTTP portu (bez SSL)
#   - SSH git operace jdou přes port 2224 (2222 = Gitea, 22 = systémový SSH)
#
# Datové adresáře:
#   config  → gitlab.rb + klíče + certifikáty (malé, důležité)
#   logs    → Omnibus logy (doporučeno na interní SSD)
#   data    → repozitáře, uploads, artefakty (velké → ideálně externi SSD)
# ==============================================================================

# ── Adresářová struktura ─────────────────────────────────────────────────────

- name: "[GitLab] Ensure data directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ gitlab_data_dir }}"
    - "{{ gitlab_config_dir }}"
    - "{{ ansible_env.HOME }}/gitlab-logs"
    - "{{ ansible_env.HOME }}/agents/log"

# ── Konfigurace (gitlab.rb) ───────────────────────────────────────────────────

- name: "[GitLab] Deploy gitlab.rb configuration"
  ansible.builtin.copy:
    dest: "{{ gitlab_config_dir }}/gitlab.rb"
    mode: '0600'
    backup: true
    content: |
      # ===========================================================================
      # GitLab Omnibus konfigurace – generováno Ansiblem
      # Edituj přes config.yml proměnné, ne přímo zde.
      # ===========================================================================

      external_url 'https://{{ gitlab_domain | default("gitlab.dev.local") }}'

      # ── Interní nginx (reverzní proxy přebírá SSL) ────────────────────────────
      nginx['listen_port']  = {{ gitlab_http_port | default(8929) }}
      nginx['listen_https'] = false
      nginx['proxy_set_headers'] = {
        "X-Forwarded-Proto" => "https",
        "X-Forwarded-Ssl"   => "on"
      }

      # ── SSH pro Git operace ───────────────────────────────────────────────────
      gitlab_rails['gitlab_shell_ssh_port'] = {{ gitlab_ssh_port | default(2224) }}

      # ── Databáze (Omnibus PostgreSQL) ─────────────────────────────────────────
      # PostgreSQL je součástí Omnibus – není potřeba MariaDB.
      postgresql['shared_buffers'] = "256MB"
      postgresql['max_connections'] = 100

      # ── E-mail ────────────────────────────────────────────────────────────────
      gitlab_rails['smtp_enable'] = false
      gitlab_rails['gitlab_email_enabled'] = false

      # ── Výkon (přizpůsobeno pro Mac Studio) ──────────────────────────────────
      puma['worker_processes'] = {{ gitlab_puma_workers | default(2) }}
      sidekiq['concurrency'] = {{ gitlab_sidekiq_concurrency | default(10) }}

      # ── Prometheus monitoring (port se nepřekrývá s naším stackem) ────────────
      prometheus['enable'] = false          # Používáme vlastní Prometheus
      alertmanager['enable'] = false
      node_exporter['enable'] = false
      redis_exporter['enable'] = false
      postgres_exporter['enable'] = false
      gitlab_exporter['enable'] = false

      # ── Grafana (vypnuto – máme vlastní) ──────────────────────────────────────
      grafana['enable'] = false

      # ── Loki (vypnuto – máme vlastní) ─────────────────────────────────────────
      logging['svlogd_size'] = 200 * 1024 * 1024  # 200 MB rotace
      logging['logrotate_frequency'] = "weekly"
      logging['logrotate_rotate'] = 4

      # ── Časové pásmo ─────────────────────────────────────────────────────────
      gitlab_rails['time_zone'] = '{{ gitlab_timezone | default("Europe/Prague") }}'

      # ── Registrace ────────────────────────────────────────────────────────────
      gitlab_rails['gitlab_signup_enabled'] = {{ gitlab_signup_enabled | default(false) | string | lower }}

# ── launchd plist (docker run jako systémová služba) ─────────────────────────

- name: "[GitLab] Pull Docker image"
  community.docker.docker_image:
    name: "gitlab/gitlab-ce:{{ gitlab_version | default('latest') }}"
    source: pull
  async: 600
  poll: 30

- name: "[GitLab] Create launchd plist"
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.gitlab.plist"
    mode: '0644'
    backup: true
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.gitlab</string>
        <key>ProgramArguments</key>
        <array>
          <string>/usr/local/bin/docker</string>
          <string>run</string>
          <string>--rm</string>
          <string>--name</string>
          <string>gitlab</string>

          <!-- HTTP port (Nginx proxy → GitLab interní) -->
          <string>-p</string>
          <string>{{ gitlab_http_port | default(8929) }}:{{ gitlab_http_port | default(8929) }}</string>

          <!-- SSH port pro Git operace -->
          <string>-p</string>
          <string>{{ gitlab_ssh_port | default(2224) }}:22</string>

          <!-- Datové adresáře -->
          <string>-v</string>
          <string>{{ gitlab_config_dir }}:/etc/gitlab</string>
          <string>-v</string>
          <string>{{ ansible_env.HOME }}/gitlab-logs:/var/log/gitlab</string>
          <string>-v</string>
          <string>{{ gitlab_data_dir }}:/var/opt/gitlab</string>

          <!-- Sdílená paměť pro Omnibus (výchozí 64m je málo) -->
          <string>--shm-size</string>
          <string>256m</string>

          <string>gitlab/gitlab-ce:{{ gitlab_version | default('latest') }}</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
        <key>KeepAlive</key>
        <dict>
          <key>Crashed</key>
          <true/>
        </dict>
        <!-- GitLab startuje dlouho – dej mu čas -->
        <key>ThrottleInterval</key>
        <integer>60</integer>
        <key>StandardOutPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/gitlab.log</string>
        <key>StandardErrorPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/gitlab.error.log</string>
      </dict>
      </plist>

- name: "[GitLab] Load launchd agent"
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.gitlab.plist
  register: gitlab_load
  changed_when: gitlab_load.rc == 0
  failed_when: false

- name: "[GitLab] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/gitlab.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/gitlab.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[GitLab] Display post-install note"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════════╗
      ║  GITLAB – PRVNÍ SPUŠTĚNÍ                                           ║
      ║                                                                     ║
      ║  GitLab startuje 2–5 minut. Sleduj:                                ║
      ║    docker logs -f gitlab                                            ║
      ║                                                                     ║
      ║  Výchozí root heslo:                                               ║
      ║    cat {{ gitlab_config_dir }}/initial_root_password               ║
      ║    (soubor zmizí po 24 hodinách – okamžitě změň heslo!)           ║
      ║                                                                     ║
      ║  Admin URL: https://{{ gitlab_domain | default("gitlab.dev.local") }}      ║
      ║  SSH klon: git clone ssh://git@localhost:{{ gitlab_ssh_port | default(2224) }}/group/repo.git ║
      ╚══════════════════════════════════════════════════════════════════════╝
