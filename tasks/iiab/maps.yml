---
# ==============================================================================
# OFFLINE MAPY – tileserver-gl + OpenMapTiles / MBTiles
# tileserver-gl je Node.js aplikace → vyžaduje Node.js
# ==============================================================================

- name: "[Maps] Ensure maps data directory exists"
  ansible.builtin.file:
    path: "{{ maps_data_dir }}"
    state: directory
    mode: '0755'

- name: "[Maps] Install tileserver-gl globally via npm"
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] && source "{{ homebrew_prefix }}/opt/nvm/nvm.sh"
    nvm use default
    npm install -g @maplibre/tileserver-gl 2>/dev/null || \
      npm install -g tileserver-gl-light
  args:
    executable: /bin/zsh
  environment:
    NVM_DIR: "{{ ansible_facts['env']['HOME'] }}/.nvm"
  changed_when: false

- name: "[Maps] Create tileserver-gl configuration"
  ansible.builtin.copy:
    dest: "{{ maps_data_dir }}/config.json"
    content: |
      {
        "options": {
          "paths": {
            "root": "{{ maps_data_dir }}",
            "fonts": "{{ maps_data_dir }}/fonts",
            "styles": "{{ maps_data_dir }}/styles",
            "mbtiles": "{{ maps_data_dir }}"
          }
        },
        "styles": {},
        "data": {
          "v3": {
            "mbtiles": "{{ maps_data_dir }}/*.mbtiles"
          }
        }
      }
    force: false
    mode: '0644'

- name: "[Maps] Ensure fonts directory exists"
  ansible.builtin.file:
    path: "{{ maps_data_dir }}/fonts"
    state: directory
    mode: '0755'

- name: "[Maps] Download MBTiles files"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ maps_data_dir }}/{{ item.dest }}"
    mode: '0644'
    timeout: 3600
  loop: "{{ maps_mbtiles_files | default([]) }}"
  when: (maps_mbtiles_files | default([])) | length > 0

- name: "[Maps] Create launchd plist for tileserver-gl"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.tileserver.maps.plist"
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>Label</key>
          <string>com.tileserver.maps</string>

          <key>ProgramArguments</key>
          <array>
              <string>/bin/zsh</string>
              <string>-c</string>
              <string>
                export NVM_DIR="$HOME/.nvm";
                [ -s "{{ homebrew_prefix }}/opt/nvm/nvm.sh" ] &amp;&amp; source "{{ homebrew_prefix }}/opt/nvm/nvm.sh";
                tileserver-gl --config {{ maps_data_dir }}/config.json --port {{ maps_port | default(8080) }}
              </string>
          </array>

          <key>EnvironmentVariables</key>
          <dict>
              <key>HOME</key>
              <string>{{ ansible_facts['env']['HOME'] }}</string>
              <key>NVM_DIR</key>
              <string>{{ ansible_facts['env']['HOME'] }}/.nvm</string>
          </dict>

          <key>RunAtLoad</key>
          <true/>

          <key>KeepAlive</key>
          <true/>

          <key>StandardOutPath</key>
          <string>{{ openclaw_agents_dir | default(ansible_facts['env']['HOME'] + '/agents') }}/maps.stdout.log</string>

          <key>StandardErrorPath</key>
          <string>{{ openclaw_agents_dir | default(ansible_facts['env']['HOME'] + '/agents') }}/maps.stderr.log</string>

          <key>WorkingDirectory</key>
          <string>{{ maps_data_dir }}</string>
      </dict>
      </plist>
    mode: '0644'

- name: "[Maps] Load launchd daemon"
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.tileserver.maps.plist
  register: maps_launchd
  changed_when: maps_launchd.rc == 0
  failed_when: false

- name: "[Maps] Deploy nginx reverse proxy vhost"
  ansible.builtin.template:
    src: nginx/sites-available/maps.conf
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/maps.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Maps] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/maps.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/maps.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Maps] Create MBTiles download helper script"
  ansible.builtin.copy:
    dest: "{{ maps_data_dir }}/download-maps.sh"
    content: |
      #!/usr/bin/env zsh
      # Pomocný script pro stahování mapových dat
      # Zdroje dat:
      #   MapTiler Cloud (free tier):   https://cloud.maptiler.com/maps/
      #   OpenMapTiles:                 https://data.maptiler.com/downloads/
      #   BBBike extracts:             https://download.bbbike.org/osm/
      #   Geofabrik:                   https://download.geofabrik.de/
      #
      # Příklad – ČR z BBBike (volně dostupné):
      #   curl -L -o czech-republic.mbtiles \
      #     "https://download.bbbike.org/osm/bbbike/Prague/Prague.osm.pbf"
      #   # Potom konvertuj pomocí: tippecanoe nebo tilemaker

      echo "Viz komentáře v tomto souboru pro zdroje mapových dat."
      echo "MBTiles dir: {{ maps_data_dir }}"
    mode: '0755'

- name: "[Maps] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       🗺️  Tileserver-gl (offline mapy) nainstalován
      ══════════════════════════════════════════════════════
       URL:       https://{{ maps_domain | default('maps.dev.local') }}
       Port:      {{ maps_port | default(8080) }}
       Data dir:  {{ maps_data_dir }}

       Stažení mapových dat:
         {{ maps_data_dir }}/download-maps.sh

       Nebo přidej do default.config.yml:
         maps_mbtiles_files:
           - url: "https://..."
             dest: "czech-republic.mbtiles"

       Přidej do /etc/hosts:   127.0.0.1 {{ maps_domain | default('maps.dev.local') }}

       Tipy:
         • MapTiler Cloud (free): https://cloud.maptiler.com
         • BBBike (free):         https://download.bbbike.org/osm/
         • Geofabrik (free):      https://download.geofabrik.de/
      ══════════════════════════════════════════════════════
