---
# ==============================================================================
# STACK VERIFY – verifikace služeb po docker compose up
#
# Data-driven: metadata (URL, status kody, porty, hinty) jsou v
# files/health-probes.yml. Zde je jen orchestrace:
#   1. Load catalog
#   2. Nginx :443 quick check (restart pokud nebezi)
#   3. Auto-retry HTTP + TCP probes (2 minuty)
#   4. Pause prompt pro onboarding probes
#   5. Summary
#
# Pridani nove sluzby = 1 entry v files/health-probes.yml. Zadna uprava
# tohoto souboru.
#
# Proc loopujeme katalog primo z uri/wait_for tasku (misto intermediate
# _active_probes listu): Ansible nema jinja2_native aktivovany, takze
# set_fact s multi-line Jinja by vracel string reprezentaci listu misto
# native objectu. Inline resolve per-iteration je typove bezpeci.
# ==============================================================================

# ── 0. Load catalog ────────────────────────────────────────────────────────
- name: "[Verify] Load health probe catalog"
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/health-probes.yml"
    name: _probe_catalog

# ── 1. Nginx :443 quick check ──────────────────────────────────────────────
- name: "[Verify] Check Nginx HTTPS port"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 443
    timeout: 5
    state: started
  register: _nginx_443
  failed_when: false

- name: "[Verify] Nginx not listening on 443 – restarting"
  ansible.builtin.command: brew services restart nginx
  when: _nginx_443.failed | default(false)

# ══════════════════════════════════════════════════════════════════════════
# FÁZE 1: Automatický retry infrastrukturních služeb
# ══════════════════════════════════════════════════════════════════════════

- name: "[Verify] Auto-retry HTTP probes"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ _port }}{{ item.path | default('/') }}"
    method: GET
    timeout: 5
    status_code: "{{ item.status | default(_probe_catalog._default_status) }}"
    validate_certs: false
    headers: "{{ _headers }}"
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
    _host_header: >-
      {{ hostvars[inventory_hostname][item.host_header_var] | default(item.host_header_default | default(''))
         if item.host_header_var is defined else '' }}
    _headers: "{{ {'Host': _host_header} if _host_header | length > 0 else {} }}"
  register: _auto_http
  until: _auto_http.status | default(0) | int in (item.status | default(_probe_catalog._default_status))
  retries: 12
  delay: 10
  loop: "{{ _probe_catalog.health_probes | selectattr('proto', 'equalto', 'http') | rejectattr('onboarding', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: false
  when: _enabled | bool

- name: "[Verify] Auto-retry TCP probes"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ _port | int }}"
    timeout: 120
    state: started
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
  loop: "{{ _probe_catalog.health_probes | selectattr('proto', 'equalto', 'tcp') | rejectattr('onboarding', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: _auto_tcp
  failed_when: false
  when: _enabled | bool

# ── Vyhodnocení auto-retry ─────────────────────────────────────────────
# Failure reporting: union vsech acceptable status codes z katalogu +
# default_status. Imperecizni (417 pro ERPNext je globalni), ale per-task
# `status_code:` nahore je per-item presny — tohle je jen summary hlaseni.
# Single-expression Jinja = Ansible preservuje native list type.
- name: "[Verify] Evaluate auto-retry results"
  ansible.builtin.set_fact:
    _auto_failed: >-
      {{
        (_auto_http.results | default([])
          | rejectattr('skipped', 'defined')
          | rejectattr('status', 'in', _accepted_union)
          | map(attribute='item')
          | list)
        +
        (_auto_tcp.results | default([])
          | rejectattr('skipped', 'defined')
          | selectattr('failed', 'equalto', true)
          | map(attribute='item')
          | list)
      }}
  vars:
    _accepted_union: >-
      {{
        ((_probe_catalog.health_probes
          | selectattr('status', 'defined')
          | map(attribute='status') | list | flatten)
         + _probe_catalog._default_status) | unique | list
      }}

- name: "[Verify] Infrastructure services that failed after retries"
  ansible.builtin.debug:
    msg: |
      VAROVANI: Tyto sluzby nenabehly ani po 2 minutach:
      {% for svc in _auto_failed %}
        - {{ svc.name }}: {{ svc.hint | default('zkontroluj docker logs') }}
      {% endfor %}
  when: (_auto_failed | length) > 0

# ══════════════════════════════════════════════════════════════════════════
# FÁZE 2: Onboarding služby – kontrola + pause jen pokud je potřeba
# ══════════════════════════════════════════════════════════════════════════

- name: "[Verify] Check onboarding probes"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ _port }}{{ item.path | default('/') }}"
    method: GET
    timeout: 10
    status_code: "{{ item.status | default(_probe_catalog._default_status) }}"
    validate_certs: false
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
  register: _onboarding_checks
  loop: "{{ _probe_catalog.health_probes | selectattr('onboarding', 'defined') | selectattr('onboarding', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: false
  when: _enabled | bool

- name: "[Verify] Identify onboarding services needing attention"
  ansible.builtin.set_fact:
    _onboarding_needed: >-
      {{
        _onboarding_checks.results | default([])
          | rejectattr('skipped', 'defined')
          | rejectattr('status', 'in', _accepted_union)
          | map(attribute='item')
          | list
      }}
  vars:
    _accepted_union: >-
      {{
        ((_probe_catalog.health_probes
          | selectattr('status', 'defined')
          | map(attribute='status') | list | flatten)
         + _probe_catalog._default_status) | unique | list
      }}

- name: "[Verify] Manual onboarding required"
  ansible.builtin.pause:
    prompt: |-
      {% for svc in _onboarding_needed %}

      ══════════════════════════════════════════════════════════════════════
       {{ svc.name }} – VYZADUJE MANUALNI ONBOARDING
       {{ svc.hint }}
      ══════════════════════════════════════════════════════════════════════
      {% endfor %}

       Proved manualni kroky a stiskni ENTER pro pokracovani
  when:
    - _onboarding_needed | default([]) | length > 0

# ── Souhrn ──────────────────────────────────────────────────────────────
- name: "[Verify] Summary"
  ansible.builtin.debug:
    msg: >-
      Overeno {{ _probe_catalog.health_probes | length }} sluzeb v katalogu.
      {{ (_auto_failed | default([]) | length) }} infrastrukturnich selhalo,
      {{ (_onboarding_needed | default([]) | length) }} onboarding ceka.
