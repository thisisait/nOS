---
# ==============================================================================
# STACK VERIFY - verify services after docker compose up
#
# Data-driven: metadata (URL, status codes, ports, hints) live in
# files/health-probes.yml. Here is just orchestration:
#   1. Load catalog
#   2. Nginx :443 quick check (restart if not running)
#   3. Auto-retry HTTP + TCP probes (2 minutes)
#   4. Pause prompt for onboarding probes
#   5. Summary
#
# Adding a new service = 1 entry in files/health-probes.yml. No edits
# to this file.
#
# Why we loop the catalog directly from uri/wait_for tasks (instead of an intermediate
# _active_probes list): Ansible does not have jinja2_native enabled, so
# set_fact with multi-line Jinja would return a string representation of the list
# instead of a native object. Inline resolve per-iteration is type-safe.
# ==============================================================================

# ── 0. Load catalog ────────────────────────────────────────────────────────
- name: "[Verify] Load health probe catalog"
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/health-probes.yml"
    name: _probe_catalog

# ── 1. Nginx :443 quick check ──────────────────────────────────────────────
- name: "[Verify] Check Nginx HTTPS port"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 443
    timeout: 5
    state: started
  register: _nginx_443
  failed_when: false

- name: "[Verify] Nginx not listening on 443 - restarting"
  ansible.builtin.command: "{{ playbook_dir }}/files/brew-svc.sh restart nginx"
  when: _nginx_443.failed | default(false)

# ══════════════════════════════════════════════════════════════════════════
# PHASE 1: Auto-retry infrastructure services
# ══════════════════════════════════════════════════════════════════════════

- name: "[Verify] Auto-retry HTTP probes"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ _port }}{{ item.path | default('/') }}"
    method: GET
    timeout: 5
    status_code: "{{ item.status | default(_probe_catalog._default_status) }}"
    validate_certs: false
    headers: "{{ _headers }}"
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
    _host_header: >-
      {{ hostvars[inventory_hostname][item.host_header_var] | default(item.host_header_default | default(''))
         if item.host_header_var is defined else '' }}
    _headers: "{{ {'Host': _host_header} if _host_header | length > 0 else {} }}"
  register: _auto_http
  until: _auto_http.status | default(0) | int in (item.status | default(_probe_catalog._default_status))
  # Per-probe retries override (X.4, 2026-05-08): some services have
  # genuinely long cold-start (GitLab Omnibus = 3-5 min), and the
  # default 12×10s = 120s window produces a noisy [ERROR] line plus
  # SSL_WRONG_VERSION_NUMBER from in-flight nginx state. Catalog
  # entries can declare `retries: N` to extend their probe window;
  # default stays 12 so well-behaved services don't slow blank.
  retries: "{{ item.retries | default(12) }}"
  delay: 10
  loop: "{{ _probe_catalog.health_probes | selectattr('proto', 'equalto', 'http') | rejectattr('onboarding', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: false
  when: _enabled | bool

- name: "[Verify] Auto-retry TCP probes"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ _port | int }}"
    timeout: 120
    state: started
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
  loop: "{{ _probe_catalog.health_probes | selectattr('proto', 'equalto', 'tcp') | rejectattr('onboarding', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  register: _auto_tcp
  failed_when: false
  when: _enabled | bool

# ── Evaluate auto-retry ────────────────────────────────────────────────
# Failure reporting: union of all acceptable status codes from the catalog +
# default_status. Imprecise (417 for ERPNext is global), but per-task
# `status_code:` above is per-item precise - this is just summary reporting.
# Single-expression Jinja = Ansible preserves native list type.
- name: "[Verify] Evaluate auto-retry results"
  ansible.builtin.set_fact:
    _auto_failed: >-
      {{
        (_auto_http.results | default([])
          | rejectattr('skipped', 'defined')
          | rejectattr('status', 'in', _accepted_union)
          | map(attribute='item')
          | list)
        +
        (_auto_tcp.results | default([])
          | rejectattr('skipped', 'defined')
          | selectattr('failed', 'equalto', true)
          | map(attribute='item')
          | list)
      }}
  vars:
    _accepted_union: >-
      {{
        ((_probe_catalog.health_probes
          | selectattr('status', 'defined')
          | map(attribute='status') | list | flatten)
         + _probe_catalog._default_status) | unique | list
      }}

- name: "[Verify] Infrastructure services that failed after retries"
  ansible.builtin.debug:
    msg: |
      WARNING: The following services did not come up even after 2 minutes:
      {% for svc in _auto_failed %}
        - {{ svc.name }}: {{ svc.hint | default('check docker logs') }}
      {% endfor %}
  when: (_auto_failed | length) > 0

# ══════════════════════════════════════════════════════════════════════════
# PHASE 2: Onboarding services - check + pause only if needed
# ══════════════════════════════════════════════════════════════════════════

- name: "[Verify] Check onboarding probes"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ _port }}{{ item.path | default('/') }}"
    method: GET
    timeout: 10
    status_code: "{{ item.status | default(_probe_catalog._default_status) }}"
    validate_certs: false
  vars:
    _port: "{{ hostvars[inventory_hostname][item.port_var] | default(item.port_default) }}"
    _enabled: "{{ (hostvars[inventory_hostname][item.toggle] | default(item.toggle_default | default(false))) | bool }}"
  register: _onboarding_checks
  loop: "{{ _probe_catalog.health_probes | selectattr('onboarding', 'defined') | selectattr('onboarding', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: false
  when: _enabled | bool

- name: "[Verify] Identify onboarding services needing attention"
  ansible.builtin.set_fact:
    _onboarding_needed: >-
      {{
        _onboarding_checks.results | default([])
          | rejectattr('skipped', 'defined')
          | rejectattr('status', 'in', _accepted_union)
          | map(attribute='item')
          | list
      }}
  vars:
    _accepted_union: >-
      {{
        ((_probe_catalog.health_probes
          | selectattr('status', 'defined')
          | map(attribute='status') | list | flatten)
         + _probe_catalog._default_status) | unique | list
      }}

- name: "[Verify] Manual onboarding required"
  ansible.builtin.pause:
    prompt: |-
      {% for svc in _onboarding_needed %}

      ══════════════════════════════════════════════════════════════════════
       {{ svc.name }} - REQUIRES MANUAL ONBOARDING
       {{ svc.hint }}
      ══════════════════════════════════════════════════════════════════════
      {% endfor %}

       Perform the manual steps and press ENTER to continue
  when:
    - _onboarding_needed | default([]) | length > 0

# ── Summary ─────────────────────────────────────────────────────────────
- name: "[Verify] Summary"
  ansible.builtin.debug:
    msg: >-
      Verified {{ _probe_catalog.health_probes | length }} services in the catalog.
      {{ (_auto_failed | default([]) | length) }} infrastructure services failed,
      {{ (_onboarding_needed | default([]) | length) }} onboarding pending.
