---
# ==============================================================================
# n8n – workflow automation (Docker)
# ==============================================================================

- name: Ensure n8n data and log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/pazny/n8n"
    - "{{ ansible_env.HOME }}/pazny/agents/log"

- name: Pull n8n Docker image
  community.docker.docker_image:
    name: "n8nio/n8n:{{ n8n_version | default('latest') }}"
    source: pull

- name: Create n8n launchd plist
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.n8n.plist"
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.n8n</string>
        <key>ProgramArguments</key>
        <array>
          <string>/usr/local/bin/docker</string>
          <string>run</string>
          <string>--rm</string>
          <string>--name</string>
          <string>n8n</string>
          <string>-p</string>
          <string>{{ n8n_port | default(5678) }}:5678</string>
          <string>-v</string>
          <string>{{ ansible_env.HOME }}/pazny/n8n:/home/node/.n8n</string>
          <string>-e</string>
          <string>N8N_HOST={{ n8n_domain | default('n8n.dev.local') }}</string>
          <string>-e</string>
          <string>N8N_PORT=5678</string>
          <string>-e</string>
          <string>N8N_PROTOCOL=https</string>
          <string>-e</string>
          <string>WEBHOOK_URL=https://{{ n8n_domain | default('n8n.dev.local') }}/</string>
          <string>n8nio/n8n:{{ n8n_version | default('latest') }}</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
        <key>KeepAlive</key>
        <dict>
          <key>Crashed</key>
          <true/>
        </dict>
        <key>ThrottleInterval</key>
        <integer>30</integer>
        <key>StandardOutPath</key>
        <string>{{ ansible_env.HOME }}/pazny/agents/log/n8n.log</string>
        <key>StandardErrorPath</key>
        <string>{{ ansible_env.HOME }}/pazny/agents/log/n8n.error.log</string>
      </dict>
      </plist>

- name: Load n8n launchd agent
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.n8n.plist
  register: n8n_load
  changed_when: n8n_load.rc == 0
  failed_when: false

- name: Enable n8n nginx vhost
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/n8n.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/n8n.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)
