---
# ==============================================================================
# NEXTCLOUD – self-hosted cloud storage
# Vyžaduje: MariaDB, PHP-FPM, Nginx
# ==============================================================================

- name: "[Nextcloud] Ensure directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
  loop:
    - "{{ nextcloud_dir }}"
    - "{{ nextcloud_data_dir }}"

- name: "[Nextcloud] Check if Nextcloud is already installed"
  ansible.builtin.stat:
    path: "{{ nextcloud_dir }}/index.php"
  register: nc_installed

- name: "[Nextcloud] Remove stale/partial archive"
  ansible.builtin.file:
    path: /tmp/nextcloud.tar.bz2
    state: absent
  when: not nc_installed.stat.exists

- name: "[Nextcloud] Download latest Nextcloud"
  ansible.builtin.shell: |
    curl -L --fail --retry 3 --retry-delay 5 \
      -o /tmp/nextcloud.tar.bz2 \
      https://download.nextcloud.com/server/releases/latest.tar.bz2
  when: not nc_installed.stat.exists

- name: "[Nextcloud] Verify downloaded archive"
  ansible.builtin.stat:
    path: /tmp/nextcloud.tar.bz2
  register: nc_archive
  when: not nc_installed.stat.exists

- name: "[Nextcloud] Fail if download incomplete"
  ansible.builtin.fail:
    msg: "Nextcloud archive /tmp/nextcloud.tar.bz2 missing or empty after download"
  when:
    - not nc_installed.stat.exists
    - not nc_archive.stat.exists or nc_archive.stat.size < 10000000

- name: "[Nextcloud] Extract Nextcloud"
  ansible.builtin.unarchive:
    src: /tmp/nextcloud.tar.bz2
    dest: /tmp/
    remote_src: true
  when: not nc_installed.stat.exists

- name: "[Nextcloud] Copy Nextcloud files to project dir"
  ansible.builtin.shell: |
    cp -r /tmp/nextcloud/. {{ nextcloud_dir }}/
    rm -rf /tmp/nextcloud /tmp/nextcloud.tar.bz2
  args:
    creates: "{{ nextcloud_dir }}/index.php"

- name: "[Nextcloud] Set permissions on Nextcloud directory"
  ansible.builtin.file:
    path: "{{ nextcloud_dir }}"
    mode: '0750'
    recurse: true

- name: "[Nextcloud] Run Nextcloud installation (occ)"
  ansible.builtin.shell: |
    php {{ nextcloud_dir }}/occ maintenance:install \
      --database "mysql" \
      --database-host "{{ nextcloud_db_host | default('127.0.0.1') }}" \
      --database-name "{{ nextcloud_db_name }}" \
      --database-user "{{ nextcloud_db_user }}" \
      --database-pass "{{ nextcloud_db_password }}" \
      --admin-user "{{ nextcloud_admin_user }}" \
      --admin-pass "{{ nextcloud_admin_password }}" \
      --data-dir "{{ nextcloud_data_dir }}"
  args:
    executable: /bin/zsh
    creates: "{{ nextcloud_dir }}/config/config.php"
  environment:
    PATH: "{{ homebrew_prefix }}/opt/php@{{ php_version | default('8.3') }}/bin:{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  no_log: true

- name: "[Nextcloud] Add trusted domain"
  ansible.builtin.shell: |
    php {{ nextcloud_dir }}/occ config:system:set \
      trusted_domains 1 --value="{{ nextcloud_domain }}"
  args:
    executable: /bin/zsh
  environment:
    PATH: "{{ homebrew_prefix }}/opt/php@{{ php_version | default('8.3') }}/bin:{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  changed_when: false

- name: "[Nextcloud] Set background job to cron"
  ansible.builtin.shell: |
    php {{ nextcloud_dir }}/occ background:cron
  args:
    executable: /bin/zsh
  environment:
    PATH: "{{ homebrew_prefix }}/opt/php@{{ php_version | default('8.3') }}/bin:{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  changed_when: false

- name: "[Nextcloud] Add Nextcloud cron job"
  ansible.builtin.cron:
    name: "Nextcloud background jobs"
    minute: "*/5"
    job: >
      {{ homebrew_prefix }}/opt/php@{{ php_version | default('8.3') }}/bin/php
      -f {{ nextcloud_dir }}/cron.php

- name: "[Nextcloud] Deploy nginx vhost"
  ansible.builtin.template:
    src: "nginx/sites-available/nextcloud.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/nextcloud.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Nextcloud] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/nextcloud.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/nextcloud.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Nextcloud] Print installation info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Nextcloud nainstalován
      ══════════════════════════════════════════════════════
       URL:       https://{{ nextcloud_domain }}
       Dir:       {{ nextcloud_dir }}
       Data:      {{ nextcloud_data_dir }}
       Admin:     {{ nextcloud_admin_user }}
       DB:        {{ nextcloud_db_name }} @ {{ nextcloud_db_host }}

       Přidej do /etc/hosts:   127.0.0.1 {{ nextcloud_domain }}
      ══════════════════════════════════════════════════════
