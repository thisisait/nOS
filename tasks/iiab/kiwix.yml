---
# ==============================================================================
# KIWIX – offline Wikipedia, Gutenberg, ZIM soubory
# Docker kontejner v IIAB stacku. Vyžaduje alespoň jeden .zim soubor.
# ==============================================================================

- name: "[Kiwix] Ensure Kiwix data directory exists"
  ansible.builtin.file:
    path: "{{ kiwix_data_dir }}"
    state: directory
    mode: '0755'

# Init ZIM – malý soubor stažený automaticky aby Kiwix mohl nastartovat.
# Bez alespoň jednoho .zim kontejner crashloopuje.
- name: "[Kiwix] Check if any ZIM files exist"
  ansible.builtin.find:
    paths: "{{ kiwix_data_dir }}"
    patterns: "*.zim"
  register: _kiwix_zims

- name: "[Kiwix] Download init ZIM ({{ kiwix_init_zim_dest }})"
  ansible.builtin.get_url:
    url: "{{ kiwix_init_zim_url }}"
    dest: "{{ kiwix_data_dir }}/{{ kiwix_init_zim_dest }}"
    mode: '0644'
    timeout: 600
  when:
    - _kiwix_zims.matched == 0
    - kiwix_init_zim_url | default('') | length > 0

# Další ZIM soubory (volitelné, z config.yml)
- name: "[Kiwix] Download configured ZIM files"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ kiwix_data_dir }}/{{ item.dest }}"
    mode: '0644'
    timeout: 3600
  loop: "{{ kiwix_zim_files | default([]) }}"
  when: (kiwix_zim_files | default([])) | length > 0

- name: "[Kiwix] Deploy nginx reverse proxy vhost"
  ansible.builtin.template:
    src: nginx/sites-available/kiwix.conf
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-available/kiwix.conf"
    mode: '0644'
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Kiwix] Enable nginx vhost (symlink)"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/kiwix.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/kiwix.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Kiwix] Create ZIM file download helper script"
  ansible.builtin.copy:
    dest: "{{ kiwix_data_dir }}/download-zim.sh"
    content: |
      #!/usr/bin/env zsh
      # Pomocný script pro stahování ZIM souborů
      # Použití: ./download-zim.sh <url>
      # Seznam ZIM souborů: https://download.kiwix.org/zim/
      #
      # Doporučené soubory:
      #   Wikipedia EN (top):  https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_mini_2026-03.zim (~315MB)
      #   Wikipedia CS (mini): https://download.kiwix.org/zim/wikipedia/wikipedia_cs_all_mini_2024-11.zim (~500MB)
      #   Gutenberg CS:        https://download.kiwix.org/zim/gutenberg/gutenberg_cs_all_2023-06.zim (~300MB)

      set -euo pipefail
      DATA_DIR="{{ kiwix_data_dir }}"

      if [ $# -eq 0 ]; then
        echo "Použití: $0 <url-zim-souboru>"
        exit 1
      fi

      URL="$1"
      FILENAME=$(basename "$URL")
      echo "Stahuji: $URL → $DATA_DIR/$FILENAME"
      curl -L --progress-bar -o "$DATA_DIR/$FILENAME" "$URL"
      echo "Hotovo! Restartuj Kiwix: docker compose -p iiab restart kiwix"
    mode: '0755'
