---
# ==============================================================================
# TRAEFIK – reverse proxy / ingress pro lokální vývoj (Docker)
# Spouštěno přes IIAB stack (docker compose)
# Dashboard: http://localhost:{{ traefik_dashboard_port | default(8080) }}
# ==============================================================================

- name: "[Traefik] Create config and conf.d directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}"
    - "{{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}/conf.d"

- name: "[Traefik] Deploy traefik.yml config"
  ansible.builtin.copy:
    dest: "{{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}/traefik.yml"
    mode: '0644'
    content: |
      api:
        dashboard: true
        insecure: true   # dashboard → http://localhost:{{ traefik_dashboard_port | default(8080) }}

      entryPoints:
        web:
          address: ":80"
        websecure:
          address: ":443"

      providers:
        docker:
          exposedByDefault: false
          network: iiab_net
        file:
          directory: "/etc/traefik/conf.d"
          watch: true

      log:
        level: "{{ traefik_log_level | default('INFO') }}"

      accessLog: {}
  notify: Restart traefik

- name: "[Traefik] Print info"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════════════
       Traefik připraven (spouští se přes IIAB stack)
      ══════════════════════════════════════════════════════
       Dashboard:  http://localhost:{{ traefik_dashboard_port | default(8080) }}/dashboard/
       HTTP:       :{{ traefik_http_port | default(80) }}
       HTTPS:      :{{ traefik_https_port | default(443) }}
       Konfig:     {{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}/traefik.yml
       conf.d:     {{ traefik_config_dir | default(ansible_facts['env']['HOME'] + '/iiab/traefik') }}/conf.d/
      ══════════════════════════════════════════════════════
