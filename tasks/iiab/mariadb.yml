---
# ==============================================================================
# MARIADB – Docker
# Nativní Homebrew na macOS trpí problémy s inicializací dat a launchd.
# Docker je spolehlivější a konzistentní s ostatními IIAB službami (n8n, kiwix…).
# TCP: 127.0.0.1:{{ mariadb_port | default(3306) }}
# Kompatibilní s: WordPress, Nextcloud, IIAB dashboard, Kiwix
# ==============================================================================

- name: "[MariaDB] Ensure data and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ mariadb_data_dir | default(ansible_env.HOME + '/mariadb/data') }}"
    - "{{ ansible_env.HOME }}/agents/log"

# PyMySQL potřebuje community.mysql moduly na control node (Mac → Docker TCP)
- name: "[MariaDB] Install PyMySQL (required by community.mysql modules)"
  ansible.builtin.shell: >-
    {{ homebrew_prefix }}/bin/python3 -m pip install
    --break-system-packages PyMySQL
  register: pymysql_result
  changed_when: "'Successfully installed' in pymysql_result.stdout"
  failed_when:
    - pymysql_result.rc != 0
    - "'already satisfied' not in pymysql_result.stdout"
  check_mode: false

- name: "[MariaDB] Pull MariaDB Docker image"
  community.docker.docker_image:
    name: "mariadb:{{ mariadb_version | default('lts') }}"
    source: pull

- name: "[MariaDB] Create launchd plist"
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.mariadb.plist"
    mode: '0644'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.mariadb</string>
        <key>ProgramArguments</key>
        <array>
          <string>/usr/local/bin/docker</string>
          <string>run</string>
          <string>--rm</string>
          <string>--name</string>
          <string>mariadb</string>
          <string>-p</string>
          <string>127.0.0.1:{{ mariadb_port | default(3306) }}:3306</string>
          <string>-v</string>
          <string>{{ mariadb_data_dir | default(ansible_env.HOME + '/mariadb/data') }}:/var/lib/mysql</string>
          <string>-e</string>
          <string>MARIADB_ROOT_PASSWORD={{ mariadb_root_password }}</string>
          <string>-e</string>
          <string>MARIADB_CHARACTER_SET_SERVER=utf8mb4</string>
          <string>-e</string>
          <string>MARIADB_COLLATION_SERVER=utf8mb4_unicode_ci</string>
          <string>mariadb:{{ mariadb_version | default('lts') }}</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
        <key>KeepAlive</key>
        <dict>
          <key>Crashed</key>
          <true/>
        </dict>
        <key>ThrottleInterval</key>
        <integer>30</integer>
        <key>StandardOutPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/mariadb.log</string>
        <key>StandardErrorPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/mariadb.error.log</string>
      </dict>
      </plist>
  notify: Restart mariadb

- name: "[MariaDB] Check if launchd service is already loaded"
  ansible.builtin.shell: |
    launchctl list 2>/dev/null | grep -q com.mariadb && echo loaded || echo not_loaded
  register: mariadb_launchd_status
  changed_when: false
  failed_when: false
  check_mode: false

- name: "[MariaDB] Load MariaDB launchd agent"
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.mariadb.plist
  when: mariadb_launchd_status.stdout | trim == 'not_loaded'
  register: mariadb_load
  changed_when: mariadb_load.rc == 0
  failed_when: false
  check_mode: false

- name: "[MariaDB] Wait for MariaDB port to be ready"
  ansible.builtin.wait_for:
    port: "{{ mariadb_port | default(3306) }}"
    host: "127.0.0.1"
    timeout: 60
  check_mode: false

- name: "[MariaDB] Remove test database"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: test
    state: absent
  ignore_errors: true

- name: "[MariaDB] Create databases"
  community.mysql.mysql_db:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
  loop: "{{ mariadb_databases | default([]) }}"
  no_log: true

# host: '%' – spojení přicházejí přes Docker port-forward, ne přímo z 127.0.0.1
- name: "[MariaDB] Create database users"
  community.mysql.mysql_user:
    login_host: "127.0.0.1"
    login_port: "{{ mariadb_port | default(3306) }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host | default('%') }}"
    state: present
  loop: "{{ mariadb_users | default([]) }}"
  no_log: true
