---
# ==============================================================================
# MARIADB – instalace a konfigurace (sdílená závislost pro WP + Nextcloud)
# ==============================================================================

- name: "[MariaDB] Install MariaDB via Homebrew"
  community.general.homebrew:
    name: mariadb
    state: present

# shell (ne command) se spustí i v check_mode; homebrew_prefix místo
# ansible_python_interpreter – přímý path, žádná auto-resolution ani 'packaging'.
- name: "[MariaDB] Install PyMySQL (required by community.mysql modules)"
  ansible.builtin.shell: >-
    {{ homebrew_prefix }}/bin/python3 -m pip install
    --break-system-packages PyMySQL
  register: pymysql_result
  changed_when: "'Successfully installed' in pymysql_result.stdout"
  failed_when:
    - pymysql_result.rc != 0
    - "'already satisfied' not in pymysql_result.stdout"
  check_mode: false

# bind-address se nastaví PŘED startem → první spuštění nevyžaduje restart
- name: "[MariaDB] Set MariaDB bind-address"
  ansible.builtin.ini_file:
    path: "{{ homebrew_prefix }}/etc/my.cnf"
    section: mysqld
    option: bind-address
    value: "{{ mariadb_bind_address | default('127.0.0.1') }}"
    mode: '0644'
    create: true
  notify: Restart mariadb

- name: "[MariaDB] Start MariaDB service"
  ansible.builtin.shell: "{{ homebrew_prefix }}/bin/brew services start mariadb"
  register: mariadb_svc
  changed_when: mariadb_svc.rc == 0 and 'already started' not in mariadb_svc.stdout
  failed_when: mariadb_svc.rc != 0 and 'already started' not in mariadb_svc.stdout
  check_mode: false

- name: "[MariaDB] Wait for MariaDB to be ready"
  ansible.builtin.wait_for:
    port: 3306
    host: "{{ mariadb_bind_address | default('127.0.0.1') }}"
    timeout: 30
  check_mode: false

# První spuštění: root bez hesla. Ignore_errors → idempotentní při dalším běhu.
- name: "[MariaDB] Set root password (first run – no existing password)"
  community.mysql.mysql_user:
    login_unix_socket: "{{ mariadb_socket | default(homebrew_prefix + '/var/mysql/mysql.sock') }}"
    login_user: root
    login_password: ""
    name: root
    password: "{{ mariadb_root_password }}"
    host_all: true
    state: present
  no_log: true
  ignore_errors: true

- name: "[MariaDB] Remove anonymous users"
  community.mysql.mysql_user:
    login_unix_socket: "{{ mariadb_socket | default(homebrew_prefix + '/var/mysql/mysql.sock') }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: ""
    host_all: true
    state: absent
  no_log: true
  ignore_errors: true

- name: "[MariaDB] Remove test database"
  community.mysql.mysql_db:
    login_unix_socket: "{{ mariadb_socket | default(homebrew_prefix + '/var/mysql/mysql.sock') }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: test
    state: absent
  ignore_errors: true

- name: "[MariaDB] Create databases"
  community.mysql.mysql_db:
    login_unix_socket: "{{ mariadb_socket | default(homebrew_prefix + '/var/mysql/mysql.sock') }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
  loop: "{{ mariadb_databases | default([]) }}"
  no_log: true

- name: "[MariaDB] Create database users"
  community.mysql.mysql_user:
    login_unix_socket: "{{ mariadb_socket | default(homebrew_prefix + '/var/mysql/mysql.sock') }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    priv: "{{ item.priv }}"
    host: "{{ item.host | default('127.0.0.1') }}"
    state: present
  loop: "{{ mariadb_users | default([]) }}"
  no_log: true
