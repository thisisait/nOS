---
# ==============================================================================
# Jellyfin – self-hosted media server (Docker)
#
# Streamuje filmy, seriály, hudbu a fotky do prohlížeče / Jellyfin klientů.
# Na Apple Silicon není hardwarová akcelerace v Dockeru dostupná → software.
#
# Mediální knihovna:
#   jellyfin_movies_dir   – filmy (MP4, MKV, …)
#   jellyfin_shows_dir    – seriály (složky po sezónách)
#   jellyfin_music_dir    – hudba (MP3, FLAC, …)
# ==============================================================================

- name: "[Jellyfin] Ensure config, cache and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"
    - "{{ jellyfin_movies_dir }}"
    - "{{ jellyfin_shows_dir }}"
    - "{{ jellyfin_music_dir }}"
    - "{{ ansible_facts['env']['HOME'] }}/agents/log"

- name: "[Jellyfin] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/jellyfin.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/jellyfin.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)

- name: "[Jellyfin] Display post-install note"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════════╗
      ║  JELLYFIN – PRVNÍ SPUŠTĚNÍ                                         ║
      ║                                                                     ║
      ║  Otevři: https://{{ jellyfin_domain | default('media.dev.local') }}                ║
      ║  Projdi průvodce nastavením (admin účet, knihovny).                ║
      ║                                                                     ║
      ║  Mediální složky v kontejneru:                                     ║
      ║    /media/movies  → {{ jellyfin_movies_dir }}
      ║    /media/shows   → {{ jellyfin_shows_dir }}
      ║    /media/music   → {{ jellyfin_music_dir }}
      ║                                                                     ║
      ║  Poznámka: Apple Silicon nemá HW akceleraci v Dockeru.            ║
      ║  Transcoding bude software (CPU) – pro přímé přehrávání bez       ║
      ║  transcodování to nevadí.                                          ║
      ╚══════════════════════════════════════════════════════════════════════╝
