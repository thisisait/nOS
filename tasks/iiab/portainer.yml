---
# ==============================================================================
# Portainer CE – Docker management UI (Docker)
#
# Připojuje se na lokální Docker socket → plná správa kontejnerů, imagí,
# volumes, sítí a logů přes browser.
# ==============================================================================

- name: "[Portainer] Ensure data and log directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ portainer_data_dir }}"
    - "{{ ansible_env.HOME }}/agents/log"

- name: "[Portainer] Pull Docker image"
  community.docker.docker_image:
    name: "portainer/portainer-ce:{{ portainer_version | default('latest') }}"
    source: pull

- name: "[Portainer] Create launchd plist"
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.portainer.plist"
    mode: '0644'
    backup: true
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.portainer</string>
        <key>ProgramArguments</key>
        <array>
          <string>/usr/local/bin/docker</string>
          <string>run</string>
          <string>--rm</string>
          <string>--name</string>
          <string>portainer</string>
          <string>-p</string>
          <string>{{ portainer_port | default(9000) }}:9000</string>
          <!-- Docker socket pro správu kontejnerů -->
          <string>-v</string>
          <string>/var/run/docker.sock:/var/run/docker.sock</string>
          <!-- Persistentní data Portaineru (uživatelé, nastavení, zálohy) -->
          <string>-v</string>
          <string>{{ portainer_data_dir }}:/data</string>
          <string>portainer/portainer-ce:{{ portainer_version | default('latest') }}</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
        <key>KeepAlive</key>
        <dict>
          <key>Crashed</key>
          <true/>
        </dict>
        <key>ThrottleInterval</key>
        <integer>30</integer>
        <key>StandardOutPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/portainer.log</string>
        <key>StandardErrorPath</key>
        <string>{{ ansible_env.HOME }}/agents/log/portainer.error.log</string>
      </dict>
      </plist>

- name: "[Portainer] Load launchd agent"
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_env.HOME }}/Library/LaunchAgents/com.portainer.plist
  register: portainer_load
  changed_when: portainer_load.rc == 0
  failed_when: false

- name: "[Portainer] Enable nginx vhost"
  ansible.builtin.file:
    src: "{{ homebrew_prefix }}/etc/nginx/sites-available/portainer.conf"
    dest: "{{ homebrew_prefix }}/etc/nginx/sites-enabled/portainer.conf"
    state: link
    force: true
  notify: Restart nginx
  when: install_nginx | default(true)
