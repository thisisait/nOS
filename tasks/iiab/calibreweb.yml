---
# ==============================================================================
# Calibre-Web – e-book library management (Docker)
# ==============================================================================

- name: Ensure Calibre-Web directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/calibre-web/config"
    - "{{ ansible_env.HOME }}/calibre-web/books"
    - "{{ ansible_env.HOME }}/agents/log"

- name: Pull Calibre-Web Docker image
  community.docker.docker_image:
    name: "lscr.io/linuxserver/calibre-web:{{ calibreweb_version | default('latest') }}"
    source: pull
