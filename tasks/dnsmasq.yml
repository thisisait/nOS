---
# ==============================================================================
# DNSMASQ - automatic DNS resolver for *.dev.local
# Removes the need to manually edit /etc/hosts
#
# How it works:
#   1. dnsmasq listens on 127.0.0.1:53
#   2. macOS /etc/resolver/dev.local redirects *.dev.local queries to dnsmasq
#   3. dnsmasq responds 127.0.0.1 for all *.dev.local domains
#
# Result: grafana.dev.local, gitea.dev.local, n8n.dev.local... work
# automatically without any manual configuration.
# ==============================================================================

- name: Install dnsmasq via Homebrew
  community.general.homebrew:
    name: dnsmasq
    state: present

- name: "[dnsmasq] Detect LAN IP for DNS responses"
  ansible.builtin.shell: ipconfig getifaddr en0 2>/dev/null || echo "127.0.0.1"
  register: _lan_ip
  changed_when: false
  check_mode: false
  when: dnsmasq_lan_access | default(true)

- name: "[dnsmasq] Build listen addresses"
  ansible.builtin.set_fact:
    _dnsmasq_listen: "{{ '127.0.0.1,' ~ (_lan_ip.stdout | default('127.0.0.1')) if (dnsmasq_lan_access | default(true)) else '127.0.0.1' }}"
    _dnsmasq_target: "{{ _lan_ip.stdout | default(dnsmasq_dev_address | default('127.0.0.1')) }}"

- name: Deploy dnsmasq configuration
  ansible.builtin.blockinfile:
    path: "{{ homebrew_prefix }}/etc/dnsmasq.conf"
    marker: "# {mark} DEV.LOCAL (ansible managed)"
    block: |
      # *.dev.local -> {{ _dnsmasq_target }} (LAN IP)
      address=/.{{ dnsmasq_dev_domain | default('dev.local') }}/{{ _dnsmasq_target }}

      {% if install_bluesky_pds | default(false) %}
      # *.dev.lan -> {{ _dnsmasq_target }} (Bluesky PDS - AT Protocol forbids .local)
      address=/.dev.lan/{{ _dnsmasq_target }}
      {% endif %}

      # Optional custom records
      {% for entry in dnsmasq_additional_addresses | default([]) %}
      address=/{{ entry.domain }}/{{ entry.address }}
      {% endfor %}

      # Interfaces: {{ _dnsmasq_listen }}
      listen-address={{ _dnsmasq_listen }}
      bind-interfaces

      # Do not forward queries for the configured tenant_domain to upstream
      # DNS (treats e.g. .local / .lan / .test as authoritative locally —
      # honouring tenant_domain so the dnsmasq scope follows operator's TLD).
      local=/{{ dnsmasq_dev_domain | default('dev.local') }}/
      {% if install_bluesky_pds | default(false) %}
      local=/dev.lan/
      {% endif %}

      # Faster cache
      cache-size=1000
    create: true
    mode: '0644'
  notify: Restart dnsmasq

- name: Ensure /etc/resolver directory exists
  ansible.builtin.file:
    path: /etc/resolver
    state: directory
    mode: '0755'
  become: true
  when: not ansible_check_mode

- name: Create macOS resolver for dev.local domain
  ansible.builtin.copy:
    dest: "/etc/resolver/{{ dnsmasq_dev_domain | default('dev.local') }}"
    content: |
      # Generated by Ansible - *.{{ dnsmasq_dev_domain | default('dev.local') }} -> dnsmasq
      nameserver 127.0.0.1
      port {{ dnsmasq_port | default(53) }}
    mode: '0644'
  become: true
  when: not ansible_check_mode

- name: Create macOS resolver for dev.lan domain (Bluesky PDS)
  ansible.builtin.copy:
    dest: "/etc/resolver/dev.lan"
    content: |
      # Generated by Ansible - *.dev.lan -> dnsmasq (Bluesky PDS)
      nameserver 127.0.0.1
      port {{ dnsmasq_port | default(53) }}
    mode: '0644'
  become: true
  when:
    - install_bluesky_pds | default(false)
    - not ansible_check_mode

# Force restart (not just start) — config blockinfile notifies handler but
# handler runs at end of playbook. If playbook is interrupted, running
# dnsmasq keeps stale config. Forcing restart here is idempotent and cheap.
- name: Restart dnsmasq to apply config (requires root for port 53)  # noqa: command-instead-of-shell
  ansible.builtin.shell: >-
    {{ playbook_dir }}/files/brew-svc.sh restart dnsmasq
  environment:
    SUDO_ASKPASS: "{{ lookup('env', 'HOME') }}/.ansible_askpass"
  register: dnsmasq_svc
  changed_when: true
  failed_when:
    - dnsmasq_svc.rc != 0
    - "'already started' not in (dnsmasq_svc.stdout | default(''))"

- name: "Verify dnsmasq resolves {{ dnsmasq_dev_domain | default('dev.local') }} correctly"
  ansible.builtin.command: "dig +short grafana{{ _host_alias_seg | default('') }}.{{ dnsmasq_dev_domain | default('dev.local') }} @127.0.0.1"
  register: dns_check
  changed_when: false
  failed_when: false

- name: Show DNS verification result
  ansible.builtin.debug:
    msg: "DNS check grafana.dev.local -> {{ dns_check.stdout | default('(empty - dnsmasq is starting)') }}"
