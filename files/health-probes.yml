---
# ==============================================================================
# HEALTH PROBE CATALOG — single source of truth for stack verification
#
# Consumed by tasks/iiab/stack_verify.yml. Adding a new service = add an
# entry here and turn on the appropriate install_* flag — no edits to
# stack_verify logic.
#
# Entry structure:
#   toggle:             Ansible install_* variable (bool)
#   toggle_default:     Default value of the toggle (true = observability, false = everything else)
#   proto:              "http" | "tcp"
#   port_var:           Name of the variable holding the port on 127.0.0.1
#   port_default:       Fallback if port_var is not defined
#   path:               (http only) URL path, default "/"
#   status:             (http only) Accepted HTTP status codes. Default _default_status.
#   host_header_var:    (http, optional) Name of the variable for the Host: header
#   host_header_default:(http, optional) Fallback hostname
#   onboarding:         true = requires manual onboarding (pause prompt); default false
#   hint:               Message shown in the summary on probe failure
# ==============================================================================

# Accepted HTTP statuses for the generic "alive" probe. Overridable per entry.
_default_status: [200, 301, 302, 303, 401, 403, 404]

health_probes:

  # ── Infra / data services (auto-retry) ────────────────────────────────────
  - slug: mariadb
    name: "MariaDB"
    toggle: install_mariadb
    proto: tcp
    port_var: mariadb_port
    port_default: 3306
    hint: "docker compose -p infra logs mariadb"

  - slug: postgresql
    name: "PostgreSQL"
    toggle: install_postgresql
    proto: tcp
    port_var: postgresql_port
    port_default: 5432
    hint: "docker compose -p infra logs postgresql"

  # ── Observability stack (default on) ───────────────────────────────────────
  - slug: grafana
    name: "Grafana"
    toggle: install_observability
    toggle_default: true
    proto: http
    port_var: grafana_port
    port_default: 3000
    path: "/api/health"
    status: [200]
    hint: "docker compose -p observability logs grafana"

  - slug: prometheus
    name: "Prometheus"
    toggle: install_observability
    toggle_default: true
    proto: http
    port_var: prometheus_port
    port_default: 9090
    path: "/-/ready"
    status: [200]
    hint: "docker compose -p observability logs prometheus"

  - slug: loki
    name: "Loki"
    toggle: install_observability
    toggle_default: true
    proto: http
    port_var: loki_port
    port_default: 3100
    path: "/ready"
    status: [200]
    hint: "docker compose -p observability logs loki"

  - slug: tempo
    name: "Tempo"
    toggle: install_observability
    toggle_default: true
    proto: http
    port_var: tempo_http_port
    port_default: 3200
    path: "/ready"
    status: [200]
    hint: "docker compose -p observability logs tempo"

  # ── DevOps stack (Gitea/GitLab/Woodpecker) ──────────────────────────────────
  - slug: gitea
    name: "Gitea"
    toggle: install_gitea
    proto: http
    port_var: gitea_port
    port_default: 3003
    hint: "docker compose -p devops logs gitea"

  - slug: gitlab
    name: "GitLab"
    toggle: install_gitlab
    proto: http
    port_var: gitlab_http_port
    port_default: 8929
    hint: "docker compose -p devops logs gitlab (slow to boot ~3-5 min)"

  - slug: woodpecker
    name: "Woodpecker CI"
    toggle: install_woodpecker
    proto: http
    port_var: woodpecker_port
    port_default: 8060
    hint: "docker compose -p devops logs woodpecker-server"

  # ── IIAB content apps ──────────────────────────────────────────────────────
  - slug: nextcloud
    name: "Nextcloud"
    toggle: install_nextcloud
    proto: http
    port_var: nextcloud_port
    port_default: 8085
    path: "/status.php"
    status: [200]
    hint: "docker compose -p iiab logs nextcloud"

  - slug: n8n
    name: "n8n"
    toggle: install_n8n
    proto: http
    port_var: n8n_port
    port_default: 5678
    path: "/healthz"
    status: [200]
    hint: "docker compose -p iiab logs n8n"

  - slug: openwebui
    name: "Open WebUI"
    toggle: install_openwebui
    proto: http
    port_var: openwebui_port
    port_default: 3004
    hint: "docker compose -p iiab logs openwebui"

  - slug: calibreweb
    name: "Calibre-Web"
    toggle: install_calibreweb
    proto: http
    port_var: calibreweb_port
    port_default: 8083
    hint: "docker compose -p iiab logs calibre-web"

  - slug: jellyfin
    name: "Jellyfin"
    toggle: install_jellyfin
    proto: http
    port_var: jellyfin_port
    port_default: 8096
    path: "/health"
    status: [200]
    hint: "docker compose -p iiab logs jellyfin"

  - slug: homeassistant
    name: "Home Assistant"
    toggle: install_homeassistant
    proto: http
    port_var: homeassistant_port
    port_default: 8123
    hint: "docker compose -p iiab logs homeassistant"

  - slug: portainer
    name: "Portainer"
    toggle: install_portainer
    proto: http
    port_var: portainer_port
    port_default: 9002
    path: "/api/status"
    status: [200]
    hint: "docker compose -p infra logs portainer"

  - slug: rustfs
    name: "RustFS"
    toggle: install_rustfs
    proto: http
    port_var: rustfs_console_port
    port_default: 9001
    hint: "docker compose -p iiab logs rustfs"

  - slug: bluesky_pds
    name: "Bluesky PDS"
    toggle: install_bluesky_pds
    proto: http
    port_var: bluesky_pds_port
    port_default: 2583
    path: "/xrpc/_health"
    status: [200]
    hint: "docker compose -p infra logs bluesky-pds"

  # ── B2B stack (ERPNext, FreeScout) ──────────────────────────────────────────
  - slug: erpnext
    name: "ERPNext"
    toggle: install_erpnext
    proto: http
    port_var: erpnext_port
    port_default: 8082
    path: "/api/method/frappe.ping"
    # 200 = ping allowed, 403 = forbidden (still alive), 417 = Guest disabled
    # (default Frappe hardening — HTTP stack is alive and answering).
    status: [200, 403, 417]
    host_header_var: erpnext_site_name
    host_header_default: erp.dev.local
    hint: "docker compose -p b2b logs erpnext-backend (VirtioFS filelock?)"

  - slug: freescout
    name: "FreeScout"
    toggle: install_freescout
    proto: http
    port_var: freescout_port
    port_default: 8090
    hint: "docker compose -p b2b logs freescout"

  - slug: firefly
    name: "Firefly III"
    toggle: install_firefly
    proto: http
    port_var: firefly_port
    port_default: 3014
    # Firefly has no /health endpoint — /api/v1/about returns 302 for an
    # unauthenticated user, which confirms that the Laravel stack is responding.
    # /, /login return 500 if TRUSTED_PROXIES is not configured correctly, but
    # that still counts as "alive" — combined with the container healthcheck
    # from the Firefly image, it suffices.
    path: "/api/v1/about"
    status: [200, 302, 401, 403]
    hint: "docker compose -p b2b logs firefly"

  - slug: bookstack
    name: "BookStack"
    toggle: install_bookstack
    proto: http
    port_var: bookstack_port
    port_default: 3013
    # / redirects to /login (302). /status is 500 on a half-broken install
    # (failed migration) — but a / 302 means Apache + Laravel have started.
    # Note: After a failed migration, pazny.bookstack/tasks/post.yml restarts
    # the container and the migration finishes.
    status: [200, 302, 401, 500]
    hint: "docker compose -p b2b logs bookstack (if 500 persists, restart the container for migration retry)"

  - slug: hedgedoc
    name: "HedgeDoc"
    toggle: install_hedgedoc
    proto: http
    port_var: hedgedoc_port
    port_default: 3012
    # HedgeDoc is not behind a reverse proxy → / returns 200. /status is a
    # collaborative realtime endpoint that may not be reachable over
    # plain HTTP (socket.io).
    path: "/"
    status: [200, 302]
    hint: "docker compose -p b2b logs hedgedoc (if empty reply, check the Postgres pool — CONN_MAX_AGE)"

  # ── Data stack (Metabase, Superset) ─────────────────────────────────────────
  - slug: metabase
    name: "Metabase"
    toggle: install_metabase
    proto: http
    port_var: metabase_port
    port_default: 3002
    path: "/api/health"
    status: [200]
    hint: "docker compose -p data logs metabase"

  - slug: superset
    name: "Superset"
    toggle: install_superset
    proto: http
    port_var: superset_port
    port_default: 8089
    path: "/health"
    status: [200]
    hint: "docker compose -p data logs superset"

  # ── Engineering (QGIS) ─────────────────────────────────────────────────────
  - slug: qgis_server
    name: "QGIS Server"
    toggle: install_qgis_server
    proto: http
    port_var: qgis_port
    port_default: 8071
    hint: "docker compose -p engineering logs qgis"

  # ══════════════════════════════════════════════════════════════════════════
  # Onboarding services – require manual setup (pause prompt)
  # ══════════════════════════════════════════════════════════════════════════

  - slug: uptime_kuma
    name: "Uptime Kuma"
    toggle: install_uptime_kuma
    proto: http
    port_var: uptime_kuma_port
    port_default: 3001
    onboarding: true
    hint: "Open https://{{ uptime_kuma_domain | default('uptime.dev.local') }} and create an admin account"

  - slug: wordpress
    name: "WordPress"
    toggle: install_wordpress
    proto: http
    port_var: wordpress_port
    port_default: 8084
    onboarding: true
    hint: "Open https://{{ wordpress_domain | default('wp.dev.local') }}/wp-admin/install.php"

  - slug: kiwix
    name: "Kiwix"
    toggle: install_kiwix
    proto: http
    port_var: kiwix_port
    port_default: 8888
    onboarding: true
    hint: "Kiwix needs ZIM files. Run download-zim.sh and restart."

  - slug: outline
    name: "Outline"
    toggle: install_outline
    proto: http
    port_var: outline_port
    port_default: 3005
    onboarding: true
    hint: "Outline requires an SSO provider (Authentik OIDC). Configure under Settings → Authentication."

  - slug: freepbx
    name: "FreePBX"
    toggle: install_freepbx
    proto: http
    port_var: freepbx_port
    port_default: 8088
    onboarding: true
    hint: "Open https://{{ freepbx_domain | default('pbx.dev.local') }} and go through the setup wizard."
