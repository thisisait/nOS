# Manifest fragment — operator merges this into state/manifest.yml during
# the Phase 2 cutover (this fragment is NOT auto-applied; FORBIDDEN_WRITES
# rules forbid this plugin from touching state/manifest.yml directly).
#
# Placement: under the `services:` list, in the observability block, after
# the `tempo` row. Diff target shape ≈ identical structure to the prometheus
# / loki / tempo entries already in state/manifest.yml (lines 196-233).
#
# NOTE: alloy is HOST-installed (Homebrew brew service), not a Docker image,
# so:
#   - no `stack:` value (the Docker stack rows imply compose ownership;
#     alloy lives outside compose). Operator may choose to omit the row
#     entirely or surface it as `stack: host` after a future schema
#     extension.
#   - `version_source: brew` (vs. `docker_image`). State manager will need
#     a brew-info shim to populate version_var from `brew info --json
#     grafana-alloy`.
#   - `port_var: alloy_ui_port` — but the port is localhost-only, no Traefik
#     route is auto-derived (the file-provider templates skip rows whose
#     domain_var is unset, which is the desired behaviour here).
#
- id: alloy
  category: observability
  install_flag: install_observability
  version_var: alloy_version
  version_source: brew                   # NEW source kind — state-manager extension
  formula: grafana-alloy
  port_var: alloy_ui_port                # 12345, localhost-only
  health_check:
    type: http
    url_template: "http://localhost:{{ alloy_ui_port | default(12345) }}/-/ready"
    expect_status: 200
  # Intentionally no `domain_var` — alloy is not Traefik-routed (no UI behind
  # SSO; operators reach :12345 over localhost or via tailscale).
