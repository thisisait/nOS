# =============================================================================
# superset-base — service plugin (Q2, U6, D1.0 corrected 2026-05-05).
#
# CORRECTION (D1.0): U6 worker mis-classified as forward_auth because
# "no OIDC env in compose = proxy". Superset's native OIDC is wired via
# superset_config.py (Flask-AppBuilder OAUTH_PROVIDERS — file-based, not env)
# rendered by roles/pazny.superset/templates/superset_config.py.j2. Central
# authentik_oidc_apps lists Superset as oauth2 with redirect_uri
# `/oauth-authorized/authentik`. → native_oidc. RBAC tier 2 per CLAUDE.md.
# =============================================================================

name: superset-base
version: 0.1.0
description: |
  Wiring layer for Apache Superset: Authentik forward-auth gate (Traefik
  middleware), GDPR Article 30 row, /hub card.
upstream: https://superset.apache.org/
license: Apache-2.0

type:
  - service
  - ui-extension

requires:
  role: pazny.superset
  feature_flag: install_superset
  variables:
    - superset_domain
    - superset_port
    - tenant_domain
    - host_alias

authentik:
  mode: native_oidc
  provider_type: native_oidc
  client_id: nos-superset
  client_secret: "{{ global_password_prefix }}_pw_oidc_superset"
  slug: superset
  name: 'Superset'
  enabled: "{{ install_superset | default(false) }}"
  redirect_uris:
    - "https://{{ superset_domain | default('superset' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/oauth-authorized/authentik"
  launch_url: "https://{{ superset_domain | default('superset' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
  scopes:
    - openid
    - profile
    - email
  tier: 2

# No compose_extension — OIDC is wired via superset_config.py rendered
# by the role; no env-driven knobs to override.

lifecycle:
  pre_compose: []
  post_compose:
    - wait_health: "http://127.0.0.1:{{ superset_port }}/health"

gdpr:
  purpose: |
    Hosts the operator's BI dashboards (Apache Superset). Stores dataset
    metadata, dashboard definitions, query history, and user sessions.
  legal_basis: legitimate_interests
  data_categories:
    - dashboard_definitions
    - query_history
    - user_accounts
  data_subjects:
    - operators
  retention_days: 365
  processors: []
  eu_residency: true

ui-extension:
  hub_card:
    title: "Superset"
    icon: bar-chart
    url: "https://{{ superset_domain }}"
    tier: 2
    description: "BI / data exploration"
    health_check: "https://{{ superset_domain }}/health"
