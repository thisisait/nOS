# =============================================================================
# nodered-base — service plugin (β1.B native OIDC, 2026-05-05)
#
# Pre-β1.B: Q2 proxy-auth batch shipped this as forward_auth (Authentik
# gate at the proxy layer; Node-RED editor open behind it). β1.B
# (2026-05-05) flipped to native_oidc by wiring passport-openidconnect
# into /data/settings.js's `adminAuth.strategy` via the
# `nodered_native_oidc_enabled` toggle in roles/pazny.nodered/defaults.
#
# Tier 2 (manager) per CLAUDE.md RBAC. Authentik creates an oauth2
# provider; users sign in inside Node-RED with their Authentik identity
# (full admin permissions — RBAC granularity belongs to Authentik
# group expression policies, not Node-RED).
# =============================================================================

name: nodered-base
version: 0.1.0
description: |
  Node-RED — flow-based programming for IoT and integration.

  Wiring layer for proxy-authenticated access via Authentik forward-auth
  (Traefik middleware `authentik@file`). The role `pazny.nodered` keeps install-
  only responsibilities (image, ports, volumes); this plugin owns the
  Traefik labels + Authentik tier binding + GDPR Article 30 row + Wing
  /hub deep-link card.
upstream: https://nodered.org/
license: AGPL-3.0  # plugin manifest is repo-licensed

type:
  - service
  - ui-extension

# Defensive sentinel — pin the plugin slug for any tool that introspects
# manifests via the loader (P0.12 doctrine).
_NOS_PLUGIN: "nodered-base"

# =============================================================================
# REQUIRES
# =============================================================================

requires:
  role: pazny.nodered
  feature_flag: install_nodered
  variables:
    - nodered_port
    - nodered_domain
    - tenant_domain
    - host_alias

# =============================================================================
# AUTHENTIK — native OIDC (passport-openidconnect adminAuth strategy)
# =============================================================================
# Node-RED's `adminAuth: { type: "strategy", ... }` consumes
# passport-openidconnect (pre-seeded into /data/node_modules via
# /data/package.json). The strategy reads NODERED_OIDC_CLIENT_ID +
# NODERED_OIDC_CLIENT_SECRET from env (rendered from this block via the
# role's compose template).

authentik:
  mode: native_oidc
  provider_type: native_oidc
  client_id: nos-nodered
  client_secret: "{{ global_password_prefix }}_pw_oidc_nodered"
  slug: nodered
  name: 'Node-RED'
  enabled: "{{ install_nodered | default(false) }}"
  redirect_uris:
    - "https://{{ nodered_domain | default('nodered' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/auth/strategy/callback"
  launch_url: "https://{{ nodered_domain | default('nodered' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
  scopes:
    - openid
    - profile
    - email
  tier: 2

# =============================================================================
# COMPOSE-EXTENSION — Traefik labels (forward-auth middleware)
# =============================================================================
compose_extension:
  template: templates/nodered-base.compose.yml.j2
  target_stack: iiab
  target_service: nodered
  hardening_refs: []

# =============================================================================
# LIFECYCLE HOOKS
# =============================================================================

lifecycle:
  pre_compose:
    - render_compose_extension: compose_extension
  post_compose:
    - wait_health:
        url: "http://127.0.0.1:{{ nodered_port }}/"
        timeout: 60
        accept_any_2xx_3xx_4xx: true   # forward-auth returns 401/302; that's healthy

# =============================================================================
# OBSERVABILITY — Loki labels (forward-auth has no /metrics natively)
# =============================================================================

observability:
  loki:
    labels:
      app: nodered
      stack: iiab
      tier: "2"

# =============================================================================
# GDPR — Article 30 register row
# =============================================================================

gdpr:
  purpose: |
    Operator-hosted flow-based programming for IoT and integration. Forward-auth gate ensures only
    Authentik-authenticated principals reach the service.
  legal_basis: legitimate_interests
  data_categories:
    - flow_definitions
    - credential_nodes
    - oauth_session_data
  data_subjects:
    - operators
  retention_days: 365
  processors: []
  eu_residency: true
  transfers_outside_eu: false

# =============================================================================
# UI-EXTENSION — Wing /hub deep-link card
# =============================================================================

ui-extension:
  hub_card:
    title: "Node-RED"
    icon: git-branch
    url: "https://{{ nodered_domain }}"
    tier: 2
    description: "Flow-based automation"
