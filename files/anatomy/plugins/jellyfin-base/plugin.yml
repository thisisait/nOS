# =============================================================================
# jellyfin-base — service plugin (Q2, U6, D1.0 corrected 2026-05-05).
#
# CORRECTION (D1.0): U6 worker mis-classified as forward_auth because the
# heuristic was "no OIDC env in compose template = proxy". That's wrong for
# Jellyfin: native SSO is wired via the SSO-Auth Jellyfin SERVER PLUGIN
# (XML config at roles/pazny.jellyfin/templates/SSO-Auth.xml.j2), not env.
# Central authentik_oidc_apps lists Jellyfin as oauth2 with redirect_uri
# `/sso/OID/redirect/Authentik` — that's the SSO-Auth callback. Authentik
# creates an oauth2 provider; Jellyfin server-plugin consumes it. → native_oidc.
# RBAC tier 4 (guest) per CLAUDE.md.
# =============================================================================

name: jellyfin-base
version: 0.1.0
description: |
  Wiring layer for Jellyfin media server: Authentik forward-auth gate
  (Traefik middleware), GDPR Article 30 row, /hub card. No env-driven
  native OIDC — Jellyfin OSS doesn't ship that.
upstream: https://jellyfin.org/
license: GPL-2.0

type:
  - service
  - ui-extension

requires:
  role: pazny.jellyfin
  feature_flag: install_jellyfin
  variables:
    - jellyfin_domain
    - jellyfin_port
    - tenant_domain
    - host_alias

authentik:
  mode: native_oidc
  provider_type: native_oidc
  client_id: nos-jellyfin
  client_secret: "{{ global_password_prefix }}_pw_oidc_jellyfin"
  slug: jellyfin
  name: 'Jellyfin'
  enabled: "{{ install_jellyfin | default(false) }}"
  redirect_uris:
    - "https://{{ jellyfin_domain | default('media' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/sso/OID/redirect/Authentik"
  launch_url: "https://{{ jellyfin_domain | default('media' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
  scopes:
    - openid
    - profile
    - email
  tier: 4

# No compose_extension — Jellyfin SSO is wired through the server-side
# SSO-Auth plugin (XML config). The role manages the plugin install +
# SSO-Auth.xml render. Plugin-self compose-extension would have nothing
# to render.

lifecycle:
  pre_compose: []
  post_compose:
    - wait_health: "http://127.0.0.1:{{ jellyfin_port }}/health"

gdpr:
  purpose: |
    Hosts the operator's media library (movies / TV / music). Stores user
    accounts (per-family-member profiles), watch history, and library
    metadata.
  legal_basis: legitimate_interests
  data_categories:
    - user_accounts
    - watch_history
    - media_metadata
  data_subjects:
    - operators
    - end_users
  retention_days: 365
  processors: []
  eu_residency: true

ui-extension:
  hub_card:
    title: "Jellyfin"
    icon: tv
    url: "https://{{ jellyfin_domain }}"
    tier: 4
    description: "Media server (movies / TV / music)"
    health_check: "https://{{ jellyfin_domain }}/health"
