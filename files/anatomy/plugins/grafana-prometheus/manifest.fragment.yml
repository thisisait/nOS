# manifest.fragment.yml — state/manifest.yml contribution
# =============================================================================
# Composition plugins do NOT add a top-level service row to state/manifest.yml.
# They wire two existing service rows together; the manifest already lists
# `grafana` (domain_var, port_var) and `prometheus` (domain_var, port_var)
# via grafana-base and prometheus-base.
