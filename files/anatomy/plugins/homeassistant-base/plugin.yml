# =============================================================================
# homeassistant-base — service plugin (Track Q U5, Phase 1, D1.0 corrected
# 2026-05-05).
#
# Replaces the `authentik_oidc_apps[slug=homeassistant]` row. HA has TRUE
# native OIDC via the `auth_oidc` HACS plugin
# (christiaangoossens/hass-oidc-auth) installed by
# roles/pazny.homeassistant/tasks/main.yml. The plugin reads client_id /
# client_secret from secrets.yaml (not env) and wires HA's auth provider
# chain through Authentik. → `mode: native_oidc`.
#
# Pre-D1.0 the plugin (and CLAUDE.md) labelled this forward_auth because
# "no OIDC env in compose ≈ proxy" — wrong heuristic. Central
# authentik_oidc_apps lists HA as oauth2 with redirect_uri
# `/auth/oidc/callback`.
#
# Special: HA can run in `network_mode: host` (homeassistant_privileged=true
# for mDNS/Bonjour). The compose-extension's extra_hosts only render in
# bridge mode — host mode shares the host's /etc/hosts, so the alias is
# unnecessary AND would conflict.
# =============================================================================

name: homeassistant-base
version: 0.1.0
description: |
  Wiring layer for Home Assistant. Authentik integration is forward-auth at
  the proxy layer today; this plugin carries the OIDC client metadata for
  future native HA OIDC, plus the `extra_hosts authentik:host-gateway`
  alias gated on bridge networking + `install_authentik`.
upstream: https://www.home-assistant.io/
license: Apache-2.0

type:
  - service

# =============================================================================
# REQUIRES
# =============================================================================

requires:
  role: pazny.homeassistant
  feature_flag: install_homeassistant
  variables:
    - homeassistant_domain
    - homeassistant_port
    - tenant_domain
    - host_alias
    - global_password_prefix

# =============================================================================
# AUTHENTIK — native OIDC client metadata (auth_oidc HACS plugin)
# =============================================================================
# `mode: native_oidc` because the role installs the auth_oidc HACS plugin
# (christiaangoossens/hass-oidc-auth) and renders secrets.yaml with the
# Authentik client credentials. Authentik creates an oauth2 provider; the
# HA plugin consumes it. Pre-D1.0 mis-labelled forward_auth.

authentik:
  mode: native_oidc
  provider_type: native_oidc
  client_id: nos-homeassistant
  client_secret: "{{ global_password_prefix }}_pw_oidc_homeassistant"
  slug: homeassistant
  name: 'Home Assistant'
  enabled: "{{ install_homeassistant | default(false) }}"
  redirect_uris:
    - "https://{{ homeassistant_domain | default('home' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/auth/oidc/callback"
  launch_url: "https://{{ homeassistant_domain | default('home' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
  scopes:
    - openid
    - profile
    - email
  tier: 3   # user — household-facing UI

# =============================================================================
# COMPOSE-EXTENSION
# =============================================================================

compose_extension:
  template: templates/homeassistant-base.compose.yml.j2
  target_stack: iiab
  target_service: homeassistant

# =============================================================================
# LIFECYCLE HOOKS
# =============================================================================

lifecycle:
  pre_compose:
    - render_compose_extension: compose_extension
  post_compose:
    - wait_health: "http://127.0.0.1:{{ homeassistant_port | default(8123) }}/"

gdpr:
  purpose: |
    Hosts the operator's Home Assistant smart-home hub. Stores device
    states, automations, sensor history, user accounts, and OIDC
    session data. Telemetry from physical IoT devices stays on-host.
  legal_basis: legitimate_interests
  data_categories:
    - device_telemetry
    - sensor_history
    - automation_definitions
    - user_accounts
    - oauth_session_data
  data_subjects:
    - operators
    - household_members
  retention_days: 365
  processors: []
  eu_residency: true
