# =============================================================================
# firefly-base — service plugin (Q2 proxy-auth batch, 2026-05-04)
#
# Status: live manifest. Wires `pazny.firefly` into the proxy-auth doctrine —
# Authentik forward-auth via Traefik middleware (no native OIDC).
#
# Tier 2 (manager) per CLAUDE.md RBAC mapping. Forward-auth gates
# access at the proxy layer; the service still renders its own login UI
# (or, for stateless services, the Authentik session IS the auth).
# =============================================================================

name: firefly-base
version: 0.1.0
description: |
  Firefly III — personal finance manager.

  Wiring layer for proxy-authenticated access via Authentik forward-auth
  (Traefik middleware `authentik@file`). The role `pazny.firefly` keeps install-
  only responsibilities (image, ports, volumes); this plugin owns the
  Traefik labels + Authentik tier binding + GDPR Article 30 row + Wing
  /hub deep-link card.
upstream: https://www.firefly-iii.org/
license: AGPL-3.0  # plugin manifest is repo-licensed

type:
  - service
  - ui-extension

# Defensive sentinel — pin the plugin slug for any tool that introspects
# manifests via the loader (P0.12 doctrine).
_NOS_PLUGIN: "firefly-base"

# =============================================================================
# REQUIRES
# =============================================================================

requires:
  role: pazny.firefly
  feature_flag: install_firefly
  variables:
    - firefly_port
    - firefly_domain
    - tenant_domain
    - host_alias

# =============================================================================
# AUTHENTIK — header_oidc (Authentik outpost → REMOTE_USER/REMOTE_EMAIL)
# =============================================================================
# Firefly III's `remote_user_guard` consumes REMOTE_USER + REMOTE_EMAIL
# headers set by the Authentik proxy outpost (env block in
# roles/pazny.firefly/templates/compose.yml.j2: AUTHENTICATION_GUARD /
# AUTHENTICATION_GUARD_HEADER / AUTHENTICATION_GUARD_EMAIL).
#
# This is **header_oidc** in the β1.A trichotomy (docs/native-sso-survey.md):
# Authentik authenticates the user, the outpost injects trusted headers,
# Firefly auto-creates the local user account on first request. True SSO
# from the user POV — they never see Firefly's own login screen — but
# without a per-app OIDC client. It's NOT forward_auth (which is a pure
# access gate without per-user provisioning).
#
# Upstream-PR-opportunity: Firefly III ships native OIDC in v6+ via
# Sanctum, but it's `auth.json`-file-driven (not env-driven). A clean
# upstream PR adding env-driven OIDC config would let nOS flip this
# plugin to `mode: native_oidc`.

authentik:
  mode: header_oidc
  provider_type: header_oidc
  client_id: nos-firefly
  client_secret: "{{ global_password_prefix }}_pw_oidc_firefly"
  slug: firefly
  name: 'Firefly III'
  enabled: "{{ install_firefly | default(false) }}"
  launch_url: "https://{{ firefly_domain | default('firefly' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}"
  tier: 2

# =============================================================================
# COMPOSE-EXTENSION — Traefik labels (forward-auth middleware)
# =============================================================================
compose_extension:
  template: templates/firefly-base.compose.yml.j2
  target_stack: b2b
  target_service: firefly
  hardening_refs: []

# =============================================================================
# LIFECYCLE HOOKS
# =============================================================================

lifecycle:
  pre_compose:
    - render_compose_extension: compose_extension
  post_compose:
    - wait_health:
        url: "http://127.0.0.1:{{ firefly_port }}/"
        timeout: 60
        accept_any_2xx_3xx_4xx: true   # forward-auth returns 401/302; that's healthy

# =============================================================================
# OBSERVABILITY — Loki labels (forward-auth has no /metrics natively)
# =============================================================================

observability:
  loki:
    labels:
      app: firefly
      stack: b2b
      tier: "2"

# =============================================================================
# GDPR — Article 30 register row
# =============================================================================

gdpr:
  purpose: |
    Operator-hosted personal finance manager. Forward-auth gate ensures only
    Authentik-authenticated principals reach the service.
  legal_basis: legitimate_interests
  data_categories:
    - transaction_history
    - account_balances
    - tags
    - oauth_session_data
  data_subjects:
    - operators
    - end_users
  retention_days: -1
  processors: []
  eu_residency: true
  transfers_outside_eu: false

# =============================================================================
# UI-EXTENSION — Wing /hub deep-link card
# =============================================================================

ui-extension:
  hub_card:
    title: "Firefly III"
    icon: dollar-sign
    url: "https://{{ firefly_domain }}"
    tier: 2
    description: "Personal finance manager"
