# ==============================================================================
# nOS Prometheus Alert Rules — Security
#
# Covers: Glasswing CVE tracker, Vaultwarden admin token aging, failed-sudo
# bursts (Loki), suspicious Nginx probe paths (Loki).
# Domain label: security
# ==============================================================================

groups:
  - name: nos_security_cve
    interval: 5m
    rules:
      # Glasswing pushes `nos_cve_open{severity="HIGH|CRITICAL",cve="CVE-...",service="..."}` via its callback plugin.
      # TODO: confirm exact label names when A5 ships the Glasswing pushgateway.
      - alert: NosCriticalCveFoundHigh
        expr: nos_cve_open{severity="HIGH"} > 0
        for: 1h
        labels:
          severity: critical
          nos_domain: security
        annotations:
          summary: "HIGH-severity CVE open: {{ $labels.cve }} ({{ $labels.service }})"
          description: |
            Glasswing reports {{ $value }} open HIGH-severity CVE(s) affecting
            {{ $labels.service }} (example: {{ $labels.cve }}). Patch window
            should be prioritized within the next sprint.
          runbook_url: "https://github.com/thisisait/nOS/blob/master/docs/runbooks/NosCriticalCveFoundHigh.md"

      - alert: NosCriticalCveFoundCritical
        expr: nos_cve_open{severity="CRITICAL"} > 0
        for: 10m
        labels:
          severity: critical
          nos_domain: security
        annotations:
          summary: "CRITICAL CVE open: {{ $labels.cve }} ({{ $labels.service }})"
          description: |
            Glasswing reports {{ $value }} open CRITICAL CVE(s) affecting
            {{ $labels.service }} (example: {{ $labels.cve }}). Patch immediately
            — consider taking the service offline until remediated.
          runbook_url: "https://github.com/thisisait/nOS/blob/master/docs/runbooks/NosCriticalCveFoundCritical.md"

  - name: nos_security_secrets
    interval: 1h
    rules:
      # Vaultwarden admin-token rotation monitor. Expects an exporter (or Glasswing
      # hook) that publishes `nos_vaultwarden_admin_token_age_seconds`.
      # TODO: add a scraper for the admin_token mtime in the vaultwarden role.
      - alert: NosWarningVaultwardenAdminTokenOld
        expr: nos_vaultwarden_admin_token_age_seconds > 180 * 86400
        for: 1h
        labels:
          severity: warning
          nos_domain: security
        annotations:
          summary: "Vaultwarden admin token >180 days old"
          description: |
            The Vaultwarden admin token has not been rotated in
            {{ $value | humanizeDuration }}. Rotate it via the role:
            `ansible-playbook main.yml -K --tags vaultwarden -e rotate_admin_token=true`.
          runbook_url: "https://github.com/thisisait/nOS/blob/master/docs/runbooks/NosWarningVaultwardenAdminTokenOld.md"

  - name: nos_security_auth
    interval: 1m
    rules:
      # Loki -> Prometheus log-pattern bridge (see 03-apps.yml for convention).
      # Equivalent LogQL:
      #   count_over_time({job="auth.log"} |= "sudo: authentication failure" [10m]) > 5
      # TODO: confirm `log_pattern_matches_total` metric name with A1.
      - alert: NosWarningFailedSudoBurst
        expr: sum by (host) (increase(log_pattern_matches_total{pattern="sudo_auth_failure"}[10m])) > 5
        for: 0m
        labels:
          severity: warning
          nos_domain: security
        annotations:
          summary: "Failed sudo burst on {{ $labels.host }}"
          description: |
            More than 5 failed sudo authentications in the last 10 minutes on
            {{ $labels.host }}. Could indicate a brute-force attempt or a
            misconfigured automation. Review the auth.log stream in Grafana Explore.
          runbook_url: "https://github.com/thisisait/nOS/blob/master/docs/runbooks/NosWarningFailedSudoBurst.md"

      # Suspicious path scanning detection — common opportunistic bots probe for
      # .env, /wp-admin, /admin.php. A sustained rate signals an active scan.
      # Equivalent LogQL:
      #   sum(rate({job="nginx"} |~ "/\.env|/wp-admin|/admin\.php" [5m])) > 0.5
      # TODO: confirm `log_pattern_matches_total` metric name with A1.
      - alert: NosWarningSuspiciousNginxPath
        expr: sum(rate(log_pattern_matches_total{pattern="nginx_suspicious_path"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          nos_domain: security
        annotations:
          summary: "Nginx receiving scans for sensitive paths"
          description: |
            Nginx is seeing {{ $value | printf "%.2f" }} req/s to suspicious paths
            (.env, /wp-admin, /admin.php) over 5 minutes. Usually harmless
            background noise from the internet, but consider fail2ban / CrowdSec
            if the rate stays elevated.
          runbook_url: "https://github.com/thisisait/nOS/blob/master/docs/runbooks/NosWarningSuspiciousNginxPath.md"
