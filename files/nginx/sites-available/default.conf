# ==============================================================================
# Nginx – Default catch-all server (localhost)
# Serves static files from ~/Sites/default
# ==============================================================================

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  localhost;

    root  {{ openclaw_projects_dir | default(ansible_facts['env']['HOME'] + '/projects') }}/default;
    index index.php index.html index.htm;

    # ── Security ────────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(wp-config\.php|\.env|\.git|composer\.(json|lock)|package\.json) {
        deny all;
    }

    # ── Static files – aggressive caching ────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot|css|js|pdf|zip)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── PHP via PHP-FPM ──────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Default try_files ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Nginx status (local only) ────────────────────────────────────────────
    location /nginx-status {
        stub_status on;
        access_log  off;
        allow       127.0.0.1;
        deny        all;
    }

    # ── PHP-FPM status (local only) ─────────────────────────────────────────
    location /fpm-status {
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        allow 127.0.0.1;
        deny  all;
    }
}

