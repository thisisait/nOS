# ==============================================================================
# Nginx – WordPress (s PHP-FPM)
# Root: ~/projects/wordpress
# ==============================================================================

server {
    listen 80;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ wordpress_domain | default('wordpress.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    root  {{ wordpress_dir | default('/Users/' + ansible_facts['user_id'] + '/projects/wordpress') }};
    index index.php index.html;

    access_log {{ homebrew_prefix }}/var/log/nginx/wordpress.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/wordpress.error.log  warn;

    client_max_body_size 64m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    limit_req zone=general burst=50 nodelay;

    # ── WordPress security ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~* /(?:wp-config\.php|xmlrpc\.php|wp-login\.php)$ {
        limit_req zone=api burst=5 nodelay;
        try_files $uri =404;
        fastcgi_pass php_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS "on";
    }

    # ── Statické assety ───────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # ── PHP ───────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param HTTPS           "on";
        fastcgi_read_timeout 300;
    }

    # ── WordPress permalinks ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}
