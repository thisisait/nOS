# ==============================================================================
# Nginx – Nextcloud (self-hosted cloud)
# Dle doporučené Nextcloud nginx konfigurace
# ==============================================================================

upstream nextcloud_php {
    server unix:{{ homebrew_prefix }}/var/run/php/php{{ php_version | default('8.3') }}-fpm.sock;
    # Fallback na TCP pokud socket neexistuje:
    # server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name {{ nextcloud_domain | default('cloud.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ nextcloud_domain | default('cloud.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    root  {{ nextcloud_dir | default('/Users/' + ansible_facts['user_id'] + '/projects/nextcloud') }};
    index index.php index.html /index.php$request_uri;

    access_log {{ homebrew_prefix }}/var/log/nginx/nextcloud.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/nextcloud.error.log  warn;

    client_max_body_size 512m;
    client_body_timeout  300;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Download-Options "noopen" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Zakázat přístup k citlivým souborům
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)               { return 404; }

    # Přesměrování CalDAV / CardDAV
    location = /.well-known/carddav { return 301 $scheme://$host/remote.php/dav; }
    location = /.well-known/caldav  { return 301 $scheme://$host/remote.php/dav; }
    location /.well-known/acme-challenge { try_files $uri /index.php$request_uri; }
    location /.well-known/security.txt  { try_files $uri /index.php$request_uri; }
    location = /robots.txt              { allow all; log_not_found off; access_log off; }

    # Statické assety
    location ~ ^/(?:index|remote|public|cron|core/ajax/update|status|ocs/v[12]|updater/.+|ocs-provider/.+)\.php(?:$|/) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $path_info;
        fastcgi_param HTTPS           "on";
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass  php_fpm;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 600;
    }

    location ~ ^/(?:updater|ocs-provider)(?:$|/)       { try_files $uri/ =404; index index.php; }
    location ~ \.(?:css|js|woff2?|svg|gif|map)$        { try_files $uri /index.php$request_uri; add_header Cache-Control "public, max-age=15778463"; access_log off; }
    location ~ \.(?:png|html|ttf|ico|jpg|jpeg|bcmap)$  { try_files $uri /index.php$request_uri; }

    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }
}
