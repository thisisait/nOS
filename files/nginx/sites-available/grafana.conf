# ==============================================================================
# Nginx – Grafana reverse proxy (port 3000)
# ==============================================================================

server {
    listen 80;
    server_name {{ grafana_domain | default('grafana.dev.local') }};
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name {{ grafana_domain | default('grafana.dev.local') }};

    ssl_certificate     {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.crt;
    ssl_certificate_key {{ homebrew_prefix }}/etc/nginx/ssl/local-dev.key;

    access_log {{ homebrew_prefix }}/var/log/nginx/grafana.access.log main;
    error_log  {{ homebrew_prefix }}/var/log/nginx/grafana.error.log  warn;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Grafana WebSocket podpora (live panels, alerts) ───────────────────────
    location /api/live/ {
        proxy_pass         http://127.0.0.1:{{ grafana_port | default(3000) }};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Hlavní proxy ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:{{ grafana_port | default(3000) }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;

        # Velká data pro dashboardy
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;
    }
}
