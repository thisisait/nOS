# ==============================================================================
# Nginx – hlavní konfigurace pro Mac Studio vývojové prostředí
# Homebrew on Apple Silicon: {{ homebrew_prefix }}/etc/nginx/nginx.conf
# ==============================================================================

worker_processes auto;
worker_rlimit_nofile 65536;

error_log {{ homebrew_prefix }}/var/log/nginx/error.log warn;
pid       {{ homebrew_prefix }}/var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 kqueue;   # macOS optimalizovaný event model
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Logování ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log {{ homebrew_prefix }}/var/log/nginx/access.log main;

    # ── Výkon ─────────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 4096;
    server_tokens       off;   # skrýt verzi nginx

    # ── Upload / body ─────────────────────────────────────────────────────────
    client_max_body_size        100m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;
    client_body_timeout         60;
    client_header_timeout       60;
    send_timeout                60;

    # ── Gzip komprese ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── SSL/TLS výchozí nastavení ──────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              off;   # Lokální certifikáty nepodporují OCSP

    # ── Bezpečnostní hlavičky (výchozí) ───────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 20;

    # ── Proxy cache nastavení ──────────────────────────────────────────────────
    proxy_cache_path {{ homebrew_prefix }}/var/cache/nginx
                     levels=1:2
                     keys_zone=app_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ── PHP-FPM upstream ──────────────────────────────────────────────────────
    upstream php_fpm {
        server 127.0.0.1:9000;
        keepalive 16;
    }

    # ── Příklady proxy upstream pro různé stacky ──────────────────────────────
    # Uncomment / přidej do site konfigurace

    # Node.js (pm2 / výchozí port 3000)
    # upstream nodejs_app {
    #     server 127.0.0.1:3000;
    #     keepalive 64;
    # }

    # Python FastAPI / Django (uvicorn / gunicorn, port 8000)
    # upstream python_app {
    #     server 127.0.0.1:8000;
    #     keepalive 64;
    # }

    # Go HTTP server (port 8080)
    # upstream go_app {
    #     server 127.0.0.1:8080;
    #     keepalive 64;
    # }

    # .NET Kestrel (port 5000)
    # upstream dotnet_app {
    #     server 127.0.0.1:5000;
    #     keepalive 64;
    # }

    # ── Virtuální hosté ────────────────────────────────────────────────────────
    include {{ homebrew_prefix }}/etc/nginx/sites-enabled/*.conf;
}
