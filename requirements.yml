---
roles:
  - name: elliotweiser.osx-command-line-tools
  - name: geerlingguy.dotfiles

collections:
  - name: geerlingguy.mac
  # Homebrew management (homebrew, homebrew_tap, homebrew_cask, ini_file, osx_defaults, composer, …)
  - name: community.general
    version: ">=8.0.0"
  # Docker image/container management (n8n, Kiwix, Uptime Kuma, Calibre-Web)
  - name: community.docker
    version: ">=3.0.0"
  # MariaDB/MySQL management (wordpress, nextcloud databases)
  - name: community.mysql
    version: ">=3.0.0"
  # PostgreSQL query module (idempotence refactor — Metabase/n8n admin pw fallback)
  - name: community.postgresql
    version: ">=3.0.0"
  # Nextcloud admin (run_occ wrapper, user/group modules)
  - name: nextcloud.admin
    version: ">=1.0.0"
