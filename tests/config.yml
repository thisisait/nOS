---
# ==============================================================================
# CI TEST CONFIG - minimal configuration for GitHub Actions
# Disables all heavy Docker / network components; exercises the base dev stack.
# ==============================================================================

# -- INSTALLATION QUEUE --------------------------------------------------------
install_homebrew_packages: true
install_cask_apps: true
install_mas_apps: false

install_nginx: true
install_php: true
install_node: true
install_bun: true
install_python: true
install_golang: true
install_dotnet: true

install_openclaw: false     # Ollama 27GB model - impractical in CI
install_shell_extras: true
configure_macos_defaults: true
configure_power_management: false  # pmset requires sudo - CI runner has none

enable_ssh: false
enable_samba: false
enable_vnc: false
enable_remote_management: false

install_observability: false  # Grafana stack - not blocking, but adds ~5min
install_tailscale: false      # Requires interactive login
services_lan_access: false    # CI does not need LAN / Tailscale access
install_dnsmasq: true         # Exercises DNS resolver setup

install_mariadb: false
install_wordpress: false
install_nextcloud: false
install_kiwix: false
install_offline_maps: false
install_n8n: false
install_gitea: false
install_gitlab: false
install_woodpecker: false
install_uptime_kuma: false
install_calibreweb: false
install_portainer: false
install_traefik: false
install_jellyfin: false
install_openwebui: false
install_homeassistant: false
install_rustfs: false
install_postgresql: false
redis_docker: false
install_erpnext: false
install_freescout: false
install_mattermost: false
install_outline: false
install_freepbx: false
install_qgis_server: false
install_engineering_apps: false
install_metabase: false
install_superset: false
install_bluesky_pds: false
install_jsos: false              # Requires PostgreSQL + Redis Docker
install_paperclip: false         # Requires PostgreSQL Docker
install_authentik: false         # Requires PostgreSQL + Redis Docker
install_infisical: false         # Requires PostgreSQL + Redis Docker
install_vaultwarden: false       # Docker
install_puter: false             # Docker

configure_dotfiles: false   # Geerlingguy dotfiles - unneeded in CI
configure_sublime: false

# -- Minimal package set for fast CI -------------------------------------------
homebrew_installed_packages:
  - autoconf
  - bash-completion
  - git
  - gh
  - wget
  - curl
  - jq
  - readline
  - openssl
  - sqlite
  - gettext
  - ssh-copy-id
  - mkcert
  - nss
  - ripgrep
  - bat
  - eza
  - fd
  - zoxide
  - starship
  - fzf

homebrew_cask_apps:
  - firefox
  - licecap

# -- Languages - base config ---------------------------------------------------
php_version: "8.3"
node_nvm_version: "lts/*"
python_version: "3.13"

node_global_packages:
  - typescript

pip_packages:
  - name: virtualenv
  - name: ansible

go_packages: []

# -- Shell extras --------------------------------------------------------------
starship_preset: "gruvbox-rainbow"
shell_aliases:
  - alias: ll
    command: "eza -la --icons"
  - alias: cat
    command: "bat --style=numbers"

# -- dnsmasq -------------------------------------------------------------------
dnsmasq_dev_domain: "dev.local"
dnsmasq_dev_address: "127.0.0.1"

# -- Nginx - auto-detected from install_* flags (CI renders default.conf only)--

# -- Dummy passwords for CI (unused because install_* flags are off) ----------
mariadb_root_password: "ci-test-password"
grafana_admin_password: "ci-test-password"
wordpress_db_password: "ci-test-password"
nextcloud_admin_password: "ci-test-password"
gitea_secret_key: "ci-test-secret-key-32-characters"
openclaw_user: "runner"
openclaw_base_dir: "/Users/runner"
