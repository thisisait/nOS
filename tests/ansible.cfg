[defaults]
inventory = inventory
# Anatomy A1 (2026-05-03): custom modules + module_utils live under
# files/anatomy/. CI's syntax + integration jobs `cp tests/ansible.cfg
# ./ansible.cfg`, so this file must mirror the project root paths or
# `nos_state` / `nos_migrate` / `nos_apps_render` won't resolve.
library = ./files/anatomy/library
module_utils = ./files/anatomy/module_utils
