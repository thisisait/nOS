# ==============================================================================
# TAILSCALE – WireGuard mesh VPN
# Po instalaci: tailscale up (interaktivní login v prohlížeči)
# Služby pak dostupné přes: http://mac-studio.<tailnet>.ts.net:<PORT>
# ==============================================================================

tailscale_accept_routes: false    # Přijímat subnet routes od jiných nodů
tailscale_exit_node: false        # Používat tento Mac jako exit node
# tailscale_auth_key: ""          # Pre-auth key pro neinteraktivní setup (z admin console)
tailscale_hostname: ""            # Tailscale FQDN (např. mac-studio.tailnet-abc.ts.net) – homepage → Grafana
services_lan_access: false        # true = Docker služby na 0.0.0.0 (přístup přes Tailscale/LAN po portech)

# Alternativní hosty pro přístup ke službám (LAN IP, Tailscale hostname/IP)
# Automaticky se přidají do nginx server_name + Nextcloud trusted_domains
service_extra_hosts: []
# service_extra_hosts:
#   - "192.168.1.64"
#   - "studio.tail9f5625.ts.net"
#   - "100.106.211.106"

# ==============================================================================
# POWER MANAGEMENT – pmset nastavení (pouze při napájení -c)
# Cíl: displej spí, ale počítač zůstává dostupný na síti (Jellyfin, SSH, Grafana…)
# ==============================================================================

configure_power_management: true       # Nastavit pmset
blank_stop_timeout: 30                # Sekundy čekání po docker compose down (blank reset)
pmset_sleep: 0                         # Počítač nikdy nespí (0 = disabled)
pmset_displaysleep: 20                 # Displej spí po 20 min
pmset_disksleep: 0                     # Disk nikdy nespí
pmset_womp: 1                          # Wake on LAN
pmset_tcpkeepalive: 1                  # Udržovat TCP spojení při sleep
pmset_powernap: 1                      # Power Nap (background updates)
pmset_networkoversleep: 0              # Neuspávat síťovku při sleep displeje
pmset_ttyskeepawake: 1                 # TTY session zabraňuje spánku

# ==============================================================================
# DNSMASQ – automatický *.dev.local DNS resolver
# Odstraňuje nutnost ručně editovat /etc/hosts
# ==============================================================================

dnsmasq_dev_domain: "dev.local"           # Doména pro lokální vývoj
dnsmasq_dev_address: "127.0.0.1"          # Cíl *.dev.local z localhostu
dnsmasq_port: 53                          # DNS port (53 = výchozí)
dnsmasq_lan_access: true                  # true = dnsmasq poslouchá i na LAN (pro TV, mobily, hosty)
dnsmasq_additional_addresses: []          # Další vlastní DNS záznamy
# dnsmasq_additional_addresses:
#   - domain: "api.external.test"
#     address: "192.168.1.100"

# ==============================================================================
# RESTIC – zálohy
# Dokumentace: https://restic.readthedocs.io/
# ==============================================================================

restic_backup_paths:
  - "{{ ansible_facts['env']['HOME'] }}"     # Domovský adresář uživatele

# Restic repozitář – nakonfiguruj dle cíle:
# restic_repo: "s3:s3.us-east-005.backblazeb2.com/bucket-name"
# restic_repo: "sftp:user@nas:/backup/mac-studio"
# restic_repo: "/Volumes/Backup/restic"

# ==============================================================================
# EXTERNÍ ÚLOŽIŠTĚ – přesun datových adresářů na sekundární SSD
# Interní SSD (0.5 TB) = macOS, Homebrew, zdrojový kód, MariaDB (nízká latence)
# Externí SSD (1 TB)   = Kiwix ZIM, Calibre, mapy, Docker, Ollama, observability
#
# Jak to funguje:
#   1. Nastav configure_external_storage: true
#   2. Připoj SSD na external_storage_root (např. /Volumes/SSD1TB)
#   3. Spusť playbook – task přesměruje všechny data-heavy cesty na SSD
#   4. Původní cesty v domovském adresáři se NEPOUŽIJÍ (set_fact override)
#
# Co zůstává na interním SSD (výkon):
#   - macOS systém, Homebrew, zdrojový kód, MariaDB, Redis
# ==============================================================================

configure_external_storage: false       # true = přesměrovat data na externí SSD
external_storage_root: "/Volumes/SSD1TB"

# Volitelné přesuny (pouze pokud configure_external_storage: true)
external_storage_docker: true           # Docker Desktop disk image (~20-100 GB)
external_storage_docker_app: true      # Přesun Docker.app na SSD + symlink v /Applications
external_storage_ollama: true           # Ollama modely (~10-150 GB)
external_storage_caches: true           # npm, pip, Composer, Homebrew cache (~10-50 GB)

# ==============================================================================
# POST-PROVISION
# ==============================================================================

post_provision_tasks: []

