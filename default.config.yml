# ── OIDC Service Registry (single source of truth) ──────────────────────────
# Authentik post-start automatically creates OIDC providers + applications.
# Compose templates reference {{ authentik_oidc_apps[N].client_id }} etc.
# To add a new service: add an entry here + OIDC env vars to the compose file.
authentik_oidc_apps:
  - name: "Grafana"
    slug: "grafana"
    enabled: "{{ install_observability | default(true) }}"
    client_id: "nos-grafana"
    client_secret: "{{ global_password_prefix }}_pw_oidc_grafana"
    redirect_uris: "https://{{ grafana_domain | default('grafana.dev.local') }}/login/generic_oauth"
