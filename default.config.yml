# Restic repository – configure depending on target:
# restic_repo: "s3:s3.us-east-005.backblazeb2.com/bucket-name"
# restic_repo: "sftp:user@nas:/backup/mac-studio"
# restic_repo: "/Volumes/Backup/restic"

# ==============================================================================
# EXTERNAL STORAGE – move data directories to a secondary SSD
# Internal SSD (0.5 TB) = macOS, Homebrew, source code, MariaDB (low latency)
# External SSD (1 TB)   = Kiwix ZIM, Calibre, maps, Docker, Ollama, observability
#
# How it works:
#   1. Set configure_external_storage: true
#   2. Mount the SSD at external_storage_root (e.g. /Volumes/SSD1TB)
#   3. Run the playbook – the task redirects all data-heavy paths to the SSD
#   4. The original paths in the home directory will NOT be used (set_fact override)
#
# What stays on the internal SSD (performance):
#   - macOS system, Homebrew, source code, MariaDB, Redis
# ==============================================================================

configure_external_storage: false       # true = redirect data to the external SSD
external_storage_root: "/Volumes/SSD1TB"

# Optional moves (only if configure_external_storage: true)
external_storage_docker: true           # Docker Desktop disk image (~20-100 GB)
external_storage_docker_app: true      # Move Docker.app to the SSD + symlink in /Applications
external_storage_ollama: true           # Ollama models (~10-150 GB)
external_storage_caches: true           # npm, pip, Composer, Homebrew cache (~10-50 GB)

# ==============================================================================
# POST-PROVISION
# ==============================================================================

post_provision_tasks: []

# ==============================================================================
# TRAEFIK
# ==============================================================================

# ── Docker Stacks ────────────────────────────────────────────────────────────
# All Docker services are organized into 4 stacks managed via Portainer.
# Each stack has its own docker-compose.yml in a subdirectory of stacks_dir.
stacks_dir: "{{ ansible_facts['env']['HOME'] }}/stacks"
stacks_shared_network: "shared_net"

# Backward compatibility – old monolithic compose dir (will be removed after migration)
iiab_compose_dir: "{{ stacks_dir }}/iiab"

# ── Traefik ────────────────────────────────────────────────────────────────────
traefik_image_version: "v3.6.12"        # CVE-2026-33186 (gRPC auth bypass) + CVE-2026-33433 (BasicAuth spoofing). Was v3.6.11
traefik_http_port: 80
traefik_https_port: 443
traefik_dashboard_port: 8082            # 8080=cadvisor, 8081=tileserver, 8090=freescout — 8082 is the first free slot
traefik_domain: "traefik{{ _host_alias_seg }}.{{ tenant_domain | default('dev.local') }}"
traefik_log_level: "INFO"               # DEBUG / INFO / WARN / ERROR
# traefik_config_dir / traefik_dynamic_dir / traefik_certs_dir live in
# roles/pazny.traefik/defaults/main.yml — they reference {{ stacks_dir }}.

# ── Tier-1 service ports lifted from role defaults ────────────────────────────
# These are referenced via lookup('vars', '<svc>_port') in the Traefik file
# provider template. Role defaults aren't visible to that lookup because the
# role isn't included for *every* service during the Traefik render — operator
# would only have role defaults loaded for services they're actively running
# include_role on. Lifting the port numbers up here makes the lookup succeed
# and avoids the "default(80) → infinite loop on Traefik's own :80" footgun.
# Domain hostname overrides — must match the value baked into authentik_oidc_apps
# entries below. The Traefik file-provider falls back to '<id>.<tld>' when these
# aren't defined, which would mismatch Authentik's redirect_uris and break SSO.
miniflux_domain: "rss{{ _host_alias_seg }}.{{ tenant_domain | default('dev.local') }}"
code_server_domain: "code{{ _host_alias_seg }}.{{ tenant_domain | default('dev.local') }}"
# Wave A/B service domains (added 2026-05-03 — without top-level definition,
# nos-smoke catalog auto-derive skips them because vars_dict.get('<svc>_domain')
# returned None even though the var was used inside Jinja default(...) filters
# in authentik_oidc_apps. Surfaced during pazny.eu prod blank — 8 healthy
# Wave A/B services were silently absent from the smoke output.)
