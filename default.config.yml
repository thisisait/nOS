---
# ==============================================================================
# GLOBÁLNÍ NASTAVENÍ HESEL
# Prefix pro všechna výchozí hesla. Formát: [prefix]_pw_[služba]
# Při prvním spuštění přepiš prefix v credentials.yml nebo nastav vlastní hesla.
# ==============================================================================

global_password_prefix: "changeme"

# ==============================================================================
# INSTANCE IDENTITY & FLEET
# Kazdy box ma unikatni identitu. Provider (Czechbot.eu) spravuje fleet.
# ==============================================================================

instance_name: "devboxnos"                # Unikatni nazev instance (lowercase, bez mezer)
instance_tld: "dev.local"                 # TLD pro vsechny sluzby (napr. grafana.<tld>)
default_admin_email: "admin@{{ instance_tld | default('dev.local') }}"  # Fallback admin email pro vsechny sluzby
instance_org: ""                          # Nazev organizace klienta
instance_location: ""                     # Lokalita (napr. "Praha, CZ")
instance_role: "standalone"               # standalone | headquarters | factory | office | division
instance_parent: ""                       # Slug nadrazeneho boxu (pro hierarchii)

# ── Fleet / Heartbeat ────────────────────────────────────────────────────────
configure_heartbeat: false                # Heartbeat daemon pro fleet reporting
heartbeat_endpoint: ""                    # URL fleet management serveru
heartbeat_interval: 300                   # Interval v sekundach (5 minut)
heartbeat_api_key: "{{ global_password_prefix }}_pw_heartbeat"

# ── Box Management API ───────────────────────────────────────────────────────
install_boxapi: false                     # FastAPI management API
boxapi_port: 8099
boxapi_domain: "api.{{ instance_tld }}"
boxapi_secret: "{{ global_password_prefix }}_pw_boxapi"

# ── Provider Access ──────────────────────────────────────────────────────────
provider_admin_email: ""                  # Email providera (Czechbot.eu) — same rights as CEO
provider_tailscale_tag: "tag:provider"    # Tailscale ACL tag pro providera

# ── Backup (Restic) ──────────────────────────────────────────────────────────
configure_backup: false
restic_repo: ""                           # "/Volumes/Backup/restic" | "s3:endpoint/bucket" | "sftp:user@host:/path"
restic_password: "{{ global_password_prefix }}_pw_restic"
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_backup_schedule_hour: 3            # Hodina denni zalohy (0-23)

# ── Vulnerability Scanner (NOS Security Auditor) ─────────────────────────────
configure_vulnerability_scan: false
vulnscan_schedule_hours: [6, 18]          # 2x denně: 06:00 a 18:00
vulnscan_batch_size: 5                    # Počet komponent per scan run

# ── Version Policy ────────────────────────────────────────────────────────────
# "stable" = pinned CVE-patched versions (default, recommended for production)
# "latest" = always pull newest available images/packages
# "lts"    = LTS/stable release branches for databases and core infra;
#            stable pins for services without LTS concept
#
# Per-service override: set individual *_version variables in config.yml
#
# Použití:
#   ansible-playbook main.yml -K                          # stable (default)
#   ansible-playbook main.yml -K -e version_policy=latest # latest
#   ansible-playbook main.yml -K -e version_policy=lts    # lts
#   ./security-update.sh                                  # security-only update
version_policy: "stable"

# ── Docker Resource Limits ────────────────────────────────────────────────────
# mem_limit per service tier. Override per service: {service}_mem_limit
docker_mem_limit_heavy: "4g"             # GitLab
docker_mem_limit_critical: "2g"          # Authentik, ERPNext, Nextcloud, Grafana
docker_mem_limit_standard: "1g"          # většina služeb
docker_mem_limit_light: "512m"           # Redis, Kiwix, Tileserver, exporters
docker_cpus_heavy: "2.0"
docker_cpus_standard: "1.0"
docker_cpus_light: "0.5"

# ==============================================================================
# INSTALLATION QUEUE
# Zakomentuj (#) libovolný řádek pro PŘESKOČENÍ dané komponenty.
# Comment out (#) any line to SKIP that component during provisioning.
# ==============================================================================

# ── Homebrew & Apps ───────────────────────────────────────────────────────────
install_homebrew_packages: true   # CLI nástroje (včetně build tools: cmake, ninja, llvm…)
install_cask_apps: true           # GUI aplikace přes Homebrew Cask
install_mas_apps: false           # Mac App Store aplikace

# ── Web server ────────────────────────────────────────────────────────────────
install_nginx: true               # Nginx (reverse proxy, PHP-FPM, vhosts)

# ── Jazyky / runtime ──────────────────────────────────────────────────────────
install_php: true                 # PHP 8.x + PHP-FPM + Composer
install_node: true                # Node.js + NVM + globální npm balíčky
install_bun: true                 # Bun JavaScript runtime / bundler
install_python: true              # Python + pyenv + pip balíčky
install_golang: true              # Go jazyk + gopls, golangci-lint, air
install_dotnet: true              # .NET SDK (C#, F#) + EF CLI

# ── AI Agent ──────────────────────────────────────────────────────────────────
install_openclaw: true            # OpenClaw (Inspektor Klepítko, Ollama, bez API klíče)
install_pi_agents: false          # PI agent framework + pi-autoresearch extension (pi.dev)
install_glasswing: true           # Glasswing Security Dashboard (Nette PHP + SQLite) [vyžaduje: php, nginx]

# ── macOS systémová konfigurace ────────────────────────────────────────────────
configure_dotfiles: false         # Dotfiles – vyžaduje vlastní repo! Nastav dotfiles_repo v credentials.yml
configure_terminal: true          # Terminal téma
configure_osx: true               # Základní macOS defaults (.osx script)
configure_macos_defaults: true    # Rozšířená macOS nastavení (Finder, klávesnice, Dock…)
configure_dock: false             # Dock layout (vyžaduje dockutil)
configure_sudoers: false          # Vlastní sudoers pravidla
configure_sublime: false          # Sublime Text editor
install_shell_extras: true        # Starship prompt + shell aliasy (bat, eza, fzf, zoxide, lazygit)

# ── Systémové služby (vyžadují sudo) ──────────────────────────────────────────
enable_ssh: false                 # Remote Login / SSH server
enable_samba: false               # Sdílení souborů přes SMB (Windows/Linux)
enable_vnc: false                 # Sdílení obrazovky (VNC / Apple Remote Desktop)
enable_remote_management: false   # Apple Remote Desktop (ARD) – plná správa

# ── Observability – Grafana LGTM stack ────────────────────────────────────────
install_observability: true       # Grafana + Prometheus + Loki + Tempo + Alloy
install_influxdb: false           # InfluxDB 2.x – time-series DB [Docker]

# ── IIAB – self-hosted knowledge & productivity services ──────────────────────
# Vyžaduje: install_nginx: true, install_php: true
install_mariadb: true            # MariaDB databáze (nutná pro WordPress + Nextcloud)
install_wordpress: false          # WordPress CMS            [vyžaduje: mariadb, php, nginx]
install_nextcloud: true          # Nextcloud – self-hosted cloud  [vyžaduje: mariadb, php, nginx]
install_kiwix: true              # Kiwix – offline Wikipedia, Gutenberg, ZIM  [vyžaduje: Docker]
install_offline_maps: false       # Offline mapy – tileserver-gl + MBTiles    [vyžaduje: node]
install_n8n: false                # n8n – workflow automation                  [vyžaduje: Docker]
install_gitea: true              # Gitea – self-hosted Git server             [Homebrew]
install_gitlab: false             # GitLab CE – full DevOps platform           [vyžaduje: Docker, ~4 GB RAM]
install_woodpecker: false         # Woodpecker CI – CI/CD pro Gitea            [vyžaduje: Docker, Gitea OAuth2]
install_openwebui: false          # Open WebUI – chat UI pro Ollama            [vyžaduje: Docker, Ollama]
install_portainer: true          # Portainer CE – Docker management UI        [vyžaduje: Docker]
install_jellyfin: false           # Jellyfin – media server                    [vyžaduje: Docker]
install_uptime_kuma: false        # Uptime Kuma – monitoring dashboard         [vyžaduje: Docker]
install_calibreweb: true         # Calibre-Web – ebook server                [vyžaduje: Docker, calibre]
install_ntfy: false               # ntfy – push notifications server [Docker]
install_miniflux: false           # Miniflux – RSS reader [Docker, vyžaduje: PostgreSQL]
install_nodered: false            # Node-RED – flow automation [Docker]
install_traefik: true            # Traefik – reverse proxy / ingress pro lokální vývoj  [Docker]
install_homeassistant: false      # Home Assistant – home automation                        [Docker]
install_rustfs: true             # RustFS – S3-compatible object storage (drop-in MinIO)   [Docker]

# ── B2B stack (CRM/ERP/helpdesk/chat/wiki) ──────────────────────────────────
install_erpnext: false            # ERPNext – CRM + ERP + HR + Accounting              [vyžaduje: MariaDB, Redis Docker]
install_freescout: true          # FreeScout – helpdesk / ticketing                    [vyžaduje: MariaDB]
install_mattermost: true         # Mattermost – team chat                              [vyžaduje: PostgreSQL]
install_outline: true            # Outline – team wiki / knowledge base                [vyžaduje: PostgreSQL, Redis Docker]
install_hedgedoc: false           # HedgeDoc – collaborative markdown [Docker, vyžaduje: PostgreSQL]
install_bookstack: false          # BookStack – wiki platform [Docker, vyžaduje: MariaDB]
install_firefly: false            # Firefly III – personal finance [Docker, vyžaduje: MariaDB, Redis]
install_onlyoffice: false         # ONLYOFFICE Document Server [Docker]

# ── VoIP stack (telekomunikace) ──────────────────────────────────────────────
install_freepbx: false            # FreePBX + Asterisk – PBX / call center              [Docker]

# ── Engineering stack (HW/CAD/GIS) ───────────────────────────────────────────
install_qgis_server: false        # QGIS Server – GIS mapový server                     [Docker]
install_engineering_apps: false   # KiCad, FreeCAD, Arduino IDE                          [Homebrew Cask]

# ── Data stack (analytika/BI) ────────────────────────────────────────────────
install_metabase: true           # Metabase – BI dashboardy                             [vyžaduje: PostgreSQL]
install_superset: true           # Apache Superset – data vizualizace                   [vyžaduje: PostgreSQL, Redis Docker]

# ── IIAB Terminal (veřejný SSH TUI hub) ───────────────────────────────────────
install_iiab_terminal: false      # TUI přístup přes SSH pro kohokoli na LAN [vyžaduje: SSH]

# ── Webový desktop ────────────────────────────────────────────────────────────
install_puter: true              # Puter – cloud OS webový desktop (multi-user, AI, iframe apps) [Docker]
install_jsos: false               # jsOS – starší alternativa (OS.js v3) [vyžaduje: PostgreSQL, Redis Docker, Node.js]

# ── AI orchestrace ────────────────────────────────────────────────────────────
install_paperclip: true          # Paperclip – multi-agent orchestration platform [vyžaduje: PostgreSQL]
install_code_server: false        # code-server – VS Code v browseru [Docker]

# ── IAM & Secrets ─────────────────────────────────────────────────────────────
install_authentik: true          # Authentik – SSO/IdP (OIDC/SAML/LDAP) pro všechny služby [vyžaduje: PostgreSQL, Redis]
install_infisical: true          # Infisical CE – centrální secrets vault s REST API + CLI [vyžaduje: PostgreSQL, Redis]
install_vaultwarden: true        # Vaultwarden – Bitwarden-kompatibilní personal password vault [Docker]

# ── Identita / federace ───────────────────────────────────────────────────────
install_bluesky_pds: true        # Bluesky PDS – AT Protocol identity server (SSO @user.dev.local)

# ── Síť / přístup ─────────────────────────────────────────────────────────────
install_tailscale: true           # Tailscale – WireGuard mesh VPN (vzdálený přístup ke všem službám)
install_dnsmasq: true             # dnsmasq – auto *.dev.local DNS (bez /etc/hosts editace)

# ==============================================================================
# HOMEBREW – obecné nastavení
# ==============================================================================

homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['machine'] == 'arm64' else '/usr/local' }}"

# Docker Desktop instaluje binárky do /usr/local/bin bez ohledu na architekturu
docker_bin: /usr/local/bin/docker

homebrew_installed_packages:
  # Základní nástroje
  - autoconf
  - bash-completion
  - git
  - gh
  - gpg
  - wget
  - curl
  - jq
  - yq
  - htop
  - tmux
  - tree
  - pv
  - watch
  - readline
  - openssl
  - libevent
  - sqlite
  - gettext
  - ssh-copy-id
  - zsh-history-substring-search
  # Síť / diagnostika
  - nmap
  - httpie
  - iperf
  - wrk
  - mkcert               # lokální SSL certifikáty
  - nss                  # mkcert backend
  # Média
  - gifsicle
  - pngpaste
  - doxygen
  # Vývojové nástroje (zahrnuty i když konkrétní stack skip)
  - git-lfs
  - pre-commit
  - act                  # GitHub Actions lokálně
  # ── Moderní CLI náhrady ──────────────────────────────────────────────────
  - ripgrep              # rg  – rychlejší grep (regex, .gitignore-aware)
  - fd                   # fd  – rychlejší find
  - bat                  # bat – cat se syntax highlighting + git diff
  - eza                  # eza – moderní ls (ikony, stromy, git status)
  - fzf                  # fzf – fuzzy finder (Ctrl+R history, Ctrl+T files)
  - zoxide               # z   – chytré cd (váhuje historii)
  - starship             # starship – GPU-fast cross-shell prompt
  - lazygit              # lazygit – TUI pro git (add/commit/push/merge)
  - ncdu                 # ncdu – interaktivní disk usage TUI
  - duf                  # duf  – moderní df (diskový přehled)
  - tldr                 # tldr – zkrácené man pages s příklady
  - hyperfine            # hyperfine – CLI benchmarking
  # ── Media (Blender renders, FL Studio exports, video workflow) ────────────
  - ffmpeg               # ffmpeg – konverze audio/video (nutné pro Blender+FL)
  - imagemagick          # convert – batch zpracování obrázků
  - yt-dlp               # yt-dlp – stahování videa/audia z YT a dalších
  - exiftool             # exiftool – čtení/zápis metadat médií
  # ── Databáze ─────────────────────────────────────────────────────────────
  - redis                # Redis – in-memory cache + pub/sub (projekty, Nextcloud)
  # ── Zálohy a údržba ──────────────────────────────────────────────────────
  - restic               # Restic – šifrované zálohy (Backblaze B2, SFTP, lokální disk)
  - mac-cleanup-go       # TUI macOS cleaner – cache, logy, Xcode, brew (github.com/2ykwang/mac-cleanup-go)
  # ── Security research tools (SBOM, SAST, secrets, CVE scan) ──────────────
  - trivy                # Trivy – vulnerability scanner (Docker images, FS, IaC, SBOM)
  - grype                # Grype – CVE scanner proti SBOM / image
  - syft                 # Syft – SBOM generátor (produkuje SPDX/CycloneDX pro grype)
  - gitleaks             # Gitleaks – detekce secrets v git historii
  - nuclei               # Nuclei – template-based vulnerability scanner (web/API)
  - semgrep              # Semgrep CE – SAST / pattern-based static analysis
  # ── Self-hosted CLI / agenty ─────────────────────────────────────────────
  - ntfy                 # ntfy – CLI klient pro push notifications (server je Docker role)
  - opencode             # OpenCode – AI-first terminal code agent (SST)
  # ── Build tools – NENÍ toggleable, vyžadují je další nástroje ────────────
  # cmake:      Ollama build, nativní Python/Node extensions (numpy, sharp…)
  # ninja:      Rychlý build systém (cmake backend, meson backend)
  # llvm:       Clang/LLVM – vyžaduje kiwix-tools build, některé Rust crates
  # ccache:     Compiler cache – zrychlí opakovanou kompilaci 5–10×
  # pkg-config: Správa knihovních závislostí (nutný pro many brew --HEAD formulas)
  # libomp:     OpenMP parallelism – Ollama CPU inference, numpy, scipy
  # openblas:   BLAS/LAPACK – numpy, scipy, ML workloads bez GPU
  # protobuf:   Protocol Buffers – gRPC, ONNX, TFLite, OpenClaw tools
  # meson:      Build systém (kiwix-tools, libzim)
  - cmake
  - ninja
  - llvm
  - ccache
  - pkg-config
  - libomp
  - openblas
  - protobuf
  - meson

homebrew_taps: []

homebrew_cask_appdir: /Applications
homebrew_cask_accept_external_apps: true

homebrew_cask_apps:
  # ── Infrastruktura ────────────────────────────────────────────────────────
  - docker               # Docker Desktop (nutné pro Kiwix a OpenClaw)

  # ── Editory / IDE ─────────────────────────────────────────────────────────
  - visual-studio-code   # VS Code – hlavní editor
  - windsurf             # Codeium Windsurf – AI-first IDE
  - sublime-text         # Sublime Text – rychlý editor

  # ── Terminály ─────────────────────────────────────────────────────────────
  - ghostty              # Ghostty – GPU-accelerated terminál (nový standard)
  - iterm2               # iTerm2 – záložní terminál
  # - warp              # Warp – AI terminál (alternativa)

  # ── Prohlížeče ────────────────────────────────────────────────────────────
  - brave-browser        # Brave – privacy-first prohlížeč (doporučeno)
  - google-chrome        # Chrome – pro testování
  - firefox              # Firefox – pro testování
  # - arc               # Arc – alternativní prohlížeč

  # ── Produktivita / Systém ─────────────────────────────────────────────────
  - raycast              # Raycast – Spotlight replacement (AI, snippets, scripts)

  # ── Komunikace ────────────────────────────────────────────────────────────
  - slack                # Slack – teamová komunikace
  - discord              # Discord – komunity a voice chat

  # ── Správa souborů / DB ───────────────────────────────────────────────────
  - transmit             # Transmit – SFTP / S3 / cloud storage
  - sequel-ace           # Sequel Ace – GUI pro MySQL/MariaDB
  - tableplus            # TablePlus – multi-DB GUI (Postgres, SQLite…)

  # ── Vývojové nástroje ─────────────────────────────────────────────────────
  - insomnia             # Insomnia – REST / GraphQL klient
  # - postman            # Postman – alternativa k Insomnia
  - balenaetcher         # balenaEtcher – zápis OS image na SD/USB
  - licecap              # LiCEcap – záznam GIF screenshotů

  # ── Bezpečnost / VPN ──────────────────────────────────────────────────────
  - lastpass             # LastPass – správce hesel
  - openvpn-connect      # OpenVPN Connect – VPN klient
  # - 1password          # 1Password – alternativa k LastPass
  # - mullvadvpn         # Mullvad – privacy VPN

  # ── Media / Zábava ────────────────────────────────────────────────────────
  - vlc                  # VLC – univerzální přehrávač médií
  - spotify              # Spotify – hudba
  - handbrake            # HandBrake – konverze video formátů
  # - plex               # Plex – domácí media server

  # ── Kreativní nástroje ────────────────────────────────────────────────────
  - blender              # Blender – 3D modelování, animace, rendering
  # - fl-studio            # FL Studio – není v Homebrew, instaluj manuálně z image-line.com
  # - gimp               # GIMP – rastrová grafika (open-source PS)
  # - inkscape           # Inkscape – vektorová grafika (open-source AI)
  # - davinci-resolve    # DaVinci Resolve – video střih

  # ── Observability ─────────────────────────────────────────────────────────
  - obsidian             # Obsidian – lokální .md knowledge base + kanban
                         # ↳ Propojí se s ~/agents/log/ a Grafana

  # ── Síť / přístup ─────────────────────────────────────────────────────────
  - tailscale            # Tailscale – WireGuard mesh VPN (přístup ke všem službám odkudkoliv)

  # ── Virtualizace ──────────────────────────────────────────────────────────
  # - utm                # UTM – macOS/Linux VM na Apple Silicon (testování Ansible, OS images)

  # ── Systémové utility ─────────────────────────────────────────────────────
  # - dropbox              # Dropbox – cloud sync (odkomentuj v config.yml pokud chceš)
  - jordanbaird-ice      # Ice – free Bartender (organizace menu baru)
  - hiddenbar            # Hidden Bar – schovávání ikon v menu baru (MAS alt.)
  - stats                # Stats – CPU/GPU/RAM/network v menu baru
  - onyx                 # OnyX – údržba macOS, cache cleanup, hidden prefs
  - cheatsheet           # CheatSheet – přehled klávesových zkratek (hold ⌘)
  - shottr               # Shottr – pokročilé screenshoty + scrolling capture + OCR
  - dockdoor             # DockDoor – Windows-like preview oken v Docku
  - hyperkey             # Hyperkey – capslock jako hyper modifier (⌃⌥⇧⌘)
  - linearmouse          # LinearMouse – customizace myši/trackpadu (scroll, cursor)
  - syncthing-app        # Syncthing – P2P file sync mezi zařízeními
  - imazing              # iMazing v3 – správa iOS/iPadOS zařízení, zálohy
  # - rectangle          # Rectangle – window manager
  # - alt-tab            # AltTab – Windows-like app switcher
  # - bettertouchtool    # BetterTouchTool – trackpad/klávesnice customization
  # ── Volitelné produktivitní nástroje (default: opt-in v config.yml) ──────
  # - antinote           # Antinote – rychlé poznámky, alternativa Apple Notes
  # - cotypist           # Cotypist – AI text autocomplete (není v brew, manuální)
  # - boring-notch       # boring.notch – customizace notche (GitHub, manuální)
  # - flux-markdown      # flux-markdown – markdown editor (GitHub, manuální)
  # - typewhisper        # TypeWhisper – dictation util (manuální install)

# ==============================================================================
# MAC APP STORE
# Vyžaduje install_mas_apps: true + přihlášení k App Store (mas login).
# Každá aplikace je [id, name] — ID najdeš v URL appstore.com/.../id<ID>.
# ==============================================================================
mas_installed_apps: []
#  - { id: 1351639930, name: "Gifski" }             # GIF encoder (ffmpeg wrapper)
#  - { id: 931571202,  name: "QuickShade" }         # Dimmer pro externí monitory
#  - { id: 1355679052, name: "Dropover" }           # Drag & drop shelf buffer
#  - { id: 1452453066, name: "Hidden Bar" }         # Alt: použij hiddenbar cask (výše)
mas_email: ""
mas_password: ""

# ==============================================================================
# NGINX
# ==============================================================================

nginx_worker_processes: "auto"
nginx_worker_connections: 2048
nginx_keepalive_timeout: 65
nginx_client_max_body_size: "100m"
nginx_gzip: true
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"
nginx_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

# Nginx sites – aktivují se AUTOMATICKY podle install_* flagů.
# Pro ruční override nastav nginx_sites_enabled v config.yml.
# Pro přidání vlastních sites použij nginx_sites_extra:
# nginx_sites_extra:
#   - php-app.conf
#   - python-proxy.conf
  # - static-site.conf      # Statické soubory s cachováním

# ==============================================================================
# PHP
# ==============================================================================

php_version: "8.3"
php_memory_limit: "256M"
php_upload_max_filesize: "64M"
php_post_max_size: "64M"
php_max_execution_time: 300
php_date_timezone: "Europe/Prague"

php_extensions:
  - "php@{{ php_version }}-redis"
  - "php@{{ php_version }}-imagick"

php_composer_packages:
  []
  # - name: laravel/installer
  #   state: present
  # - name: drush/drush
  #   state: present

# ── Glasswing Security Dashboard ─────────────────────────────────────────────
glasswing_domain: "glasswing.dev.local"
glasswing_app_dir: "{{ ansible_facts['env']['HOME'] }}/glasswing/app"
glasswing_data_dir: "{{ glasswing_app_dir }}/data"
glasswing_json_source: "{{ playbook_dir }}/docs/llm/security"

# ==============================================================================
# NODE.JS
# ==============================================================================

node_nvm_version: "lts/*"   # nebo konkrétní: "22", "20"

node_global_packages:
  - yarn
  - pnpm
  - typescript
  - ts-node
  - tsx
  - nodemon
  - pm2
  - eslint
  - prettier
  - "@anthropic-ai/sdk"          # Claude API SDK
  - "@anthropic-ai/claude-code"  # Claude Code CLI (tento nástroj)

npm_packages: []
# - name: webpack
#   state: present
#   version: "^5.0"

# ==============================================================================
# BUN
# ==============================================================================

bun_global_packages: []
# - name: "@hono/hono"
#   state: present

# ==============================================================================
# PYTHON
# ==============================================================================

python_version: "3.13"   # pyenv install target

pip_packages:
  # ── Dev základ ──────────────────────────────────────────────────────────
  - name: virtualenv
  - name: black
  - name: ruff
  - name: mypy
  - name: pytest
  - name: httpx
  - name: fastapi
  - name: uvicorn
  - name: rich
  - name: ansible
  - name: anthropic     # Claude API SDK
  # ── Data Science / AI ────────────────────────────────────────────────────
  - name: jupyterlab    # Jupyter notebooks (Ollama experimenty, data analýza)
  - name: numpy
  - name: pandas
  - name: matplotlib
  - name: transformers  # HuggingFace modely (lokální inference vedle Ollama)
  - name: langchain     # LLM orchestrace + chains
  - name: langchain-community
  - name: openai        # OpenAI SDK (kompatibilní s Ollama API)
  # ── Observability klient ─────────────────────────────────────────────────
  - name: opentelemetry-sdk
  - name: opentelemetry-exporter-otlp  # OTLP traces z Python projektů → Tempo

# ==============================================================================
# GO
# ==============================================================================

go_packages:
  - "golang.org/x/tools/gopls@latest"
  - "github.com/golangci/golangci-lint/cmd/golangci-lint@latest"
  - "github.com/go-task/task/v3/cmd/task@latest"
  - "github.com/air-verse/air@latest"

gem_packages: []
# - name: bundler
#   state: present

composer_packages: []

# ==============================================================================
# .NET / C#
# ==============================================================================

dotnet_sdk_cask: "dotnet-sdk"   # Homebrew Cask název

dotnet_global_tools:
  - name: dotnet-ef             # Entity Framework CLI
  - name: dotnet-script         # C# scripting

# ==============================================================================
# OPENCLAW – self-hosted AI agent (Ollama backend, žádný API klíč)
# Dokumentace: https://github.com/openclaw/openclaw
# Ollama integrace: https://ollama.com/blog/openclaw
# ==============================================================================

# Uživatel a domovský adresář pro agentické prostředí
openclaw_user: "{{ ansible_facts['user_id'] }}"
openclaw_base_dir: "{{ ansible_facts['env']['HOME'] }}"

# Adresáře agentického systému
openclaw_agents_dir: "{{ ansible_facts['env']['HOME'] }}/agents"         # instalace, konfigurace agentů
openclaw_projects_dir: "{{ ansible_facts['env']['HOME'] }}/projects"     # projekty hostované přes nginx
openclaw_log_dir: "{{ ansible_facts['env']['HOME'] }}/agents/log"        # strukturované .md logy

# OpenClaw konfigurace (~/.openclaw/)
openclaw_config_dir: "~/.openclaw"

# Ollama model – doporučeno pro 36GB RAM: qwen3:14b
# Alternativy: qwen3.5:14b (rychlejší), llama3.3:70b (silnější, pomalejší)
# Od Ollama 0.19 se na Apple Silicon automaticky používá MLX backend
# (57% rychlejší prefill, 93% rychlejší decode vs llama.cpp)
openclaw_model: "qwen3:14b"
ollama_max_loaded_models: 1    # Max modelů v RAM (1 = šetří SWAP na 36GB)
ollama_num_parallel: 2         # Max paralelních inference requestů
ollama_keep_alive: "5m"        # Uvolnit model z RAM po nečinnosti (default 5m, 0 = ihned)
ollama_flash_attention: 1      # Flash attention pro MLX (rychlejší, méně paměti)

# Spustit openclaw jako launchd daemon (vždy běžící, autorestart)
openclaw_install_daemon: true
openclaw_domain: "claw.dev.local"
openclaw_gateway_port: 18789

# Jméno agenta (persona)
openclaw_agent_name: "Inspektor Klepítko"

# Concurrent sub-agents
openclaw_max_concurrent_agents: 4
openclaw_max_concurrent_subagents: 8

# ==============================================================================
# PI AGENTS – coding agent framework (pi.dev / @mariozechner/pi-coding-agent)
# Dokumentace: https://github.com/badlogic/pi-mono
# Autoresearch extension: https://github.com/davebcn87/pi-autoresearch
# ==============================================================================

# Adresář PI agenta
pi_config_dir: "{{ ansible_facts['env']['HOME'] }}/.pi/agent"

# Nainstalovat pi-autoresearch extension (optimalizační smyčka pro experimenty)
pi_install_autoresearch: true

# ==============================================================================
# DOTFILES
# ==============================================================================

dotfiles_repo: https://github.com/geerlingguy/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/Development/GitHub/dotfiles
dotfiles_repo_version: master
dotfiles_files:
  - .zshrc
  - .gitignore
  - .inputrc
  - .osx
  - .vimrc

# ==============================================================================
# macOS DEFAULTS (.osx script)
# ==============================================================================

osx_script: "~/.osx --no-restart"

sudoers_custom_config: ""
# sudoers_custom_config: |
#   %admin ALL=(ALL) NOPASSWD: ALL

# ==============================================================================
# macOS ROZŠÍŘENÁ NASTAVENÍ (configure_macos_defaults)
# Automatizuje vše z "Manual settings to automate someday" + developer defaults
# ==============================================================================

# ── Finder ────────────────────────────────────────────────────────────────────
macos_finder_show_hidden_files: true          # Zobrazit skryté soubory (Cmd+Shift+.)
macos_finder_show_extensions: true           # Zobrazit přípony souborů
macos_finder_show_path_bar: true             # Zobrazit path bar dole
macos_finder_show_status_bar: true           # Zobrazit status bar dole
macos_finder_disable_desktop_click: true     # Zakázat klik na plochu (Stage Manager)
macos_finder_default_search_scope: "SCcf"   # Hledat v aktuální složce (SCcf) / počítači (SCev)
macos_finder_show_posix_path_title: false    # Zobrazit POSIX path v title baru

# ── Klávesnice ────────────────────────────────────────────────────────────────
macos_keyboard_repeat_rate: 2        # 0=fastest … 120=slowest (2 = Fast)
macos_keyboard_repeat_delay: 15      # 0=shortest … 120=longest (15 = Short)
macos_keyboard_press_hold: false     # false = key repeat (ne accent menu)
# Caps Lock → Esc: NELZE plně automatizovat (HW-specific IOKit), viz README

# ── Accessibility ─────────────────────────────────────────────────────────────
macos_reduce_transparency: true      # Snížit průhlednost (výkon)
macos_reduce_motion: false           # Snížit pohyb animací

# ── Screenshot ────────────────────────────────────────────────────────────────
macos_screenshot_location: "~/Desktop"   # Kam ukládat screenshoty
macos_screenshot_format: "png"           # png | jpg | pdf | tiff

# ── Dock ──────────────────────────────────────────────────────────────────────
macos_dock_autohide: true            # Automaticky skrýt Dock
macos_dock_show_recents: false       # Nezobrazovat nedávné aplikace
macos_dock_tilesize: 48              # Velikost ikon (pixels)
macos_dock_minimize_effect: "scale"  # genie | scale

# ── Safari (vývojářské) ───────────────────────────────────────────────────────
macos_safari_show_status_bar: true        # Zobrazit status bar
macos_safari_show_full_url: true          # Zobrazit plnou URL
macos_safari_developer_menu: true         # Zapnout Developer menu
# Poznámka: Userscripts (Return YouTube Dislike) je třeba instalovat manuálně

# ── Terminal ──────────────────────────────────────────────────────────────────
macos_terminal_secure_keyboard: true  # Secure keyboard entry

# ── Systém ────────────────────────────────────────────────────────────────────
macos_computer_name: ""               # NetBIOS název počítače; prázdné = použij ansible_hostname
macos_disable_gatekeeper: false       # NEDOPORUČENO – nechej false pro bezpečnost
# Full Disk Access pro Terminal: NELZE automatizovat (SIP protected)
# Installer sám o to požádá při prvním spuštění

# ==============================================================================
# SYSTÉMOVÉ SLUŽBY
# ==============================================================================

# SSH
ssh_port: 22
ssh_allow_groups: "admin staff"   # Skupiny s SSH přístupem
ssh_password_auth: true           # true = heslo i klíče; false = pouze klíče (po ssh-copy-id)

# Samba / SMB
samba_workgroup: "WORKGROUP"
samba_shares:
  - name: "projects"
    path: "{{ ansible_facts['env']['HOME'] }}/projects"
    comment: "{{ ansible_facts['user_id'] }} projects"
    browseable: true
    writable: true

# VNC
vnc_password: "{{ global_password_prefix }}_pw_vnc"

# ==============================================================================
# DOCK
# ==============================================================================

dockitems_remove: []
dockitems_persist: []

# ==============================================================================
# SUBLIME TEXT
# ==============================================================================

sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "Theme - Cobalt2"
  - "TrailingSpaces"
  - "WordingStatus"

# ==============================================================================
# IIAB – MARIADB
# ==============================================================================

mariadb_root_password: "{{ global_password_prefix }}_pw_mariadb"   # PŘEPIŠ v credentials.yml!
mariadb_version: "11.4.10"              # CVE-2026-32710 (CVSS 8.6 buffer overflow). Pinned from 'lts'
mariadb_port: 3306
mariadb_data_dir: "{{ ansible_facts['env']['HOME'] }}/mariadb/data"   # persistence dat mimo kontejner

# ==============================================================================
# INFRA – POSTGRESQL (sdílená DB pro Mattermost, Outline, Metabase, Superset)
# ==============================================================================

install_postgresql: false
postgresql_version: "16.13-alpine"      # CVE-2026-2005 (pgcrypto RCE), CVE-2026-2006 (multibyte RCE), CVE-2026-2004/2007 (buffer overflow). Was 16.10
postgresql_port: 5432
postgresql_root_user: "postgres"
postgresql_root_password: "{{ global_password_prefix }}_pw_postgresql"
postgresql_data_dir: "{{ ansible_facts['env']['HOME'] }}/postgresql/data"

# ==============================================================================
# INFRA – REDIS (Docker, alternativa k Homebrew Redis)
# Pokud redis_docker: true, Homebrew Redis se nepoužívá
# ==============================================================================

redis_docker: false                    # true = Redis v Docker (pro cross-stack přístup)
redis_version: "7.4.6-alpine"           # CVE-2025-49844 (CVSS 10.0 RediShell RCE)
redis_data_dir: "{{ ansible_facts['env']['HOME'] }}/redis/data"

# ==============================================================================
# IIAB – MARIADB (pokračování)
# ==============================================================================

mariadb_databases:
  - name: "wordpress"
  - name: "nextcloud"
  - name: "freescout"
  - name: "erpnext"
  - name: "asterisk"
  - name: "bookstack"
  - name: "firefly"

mariadb_users:
  - name: "wordpress"
    password: "{{ wordpress_db_password }}"
    priv: "wordpress.*:ALL"
  - name: "nextcloud"
    password: "{{ nextcloud_db_password }}"
    priv: "nextcloud.*:ALL"
  - name: "freescout"
    password: "{{ freescout_db_password | default(global_password_prefix + '_pw_freescout') }}"
    priv: "freescout.*:ALL"
  - name: "erpnext"
    password: "{{ erpnext_admin_password | default(global_password_prefix + '_pw_erpnext') }}"
    priv: "erpnext.*:ALL"
  - name: "asterisk"
    password: "{{ freepbx_db_password | default(global_password_prefix + '_pw_freepbx') }}"
    priv: "asterisk.*:ALL"
  - name: "bookstack"
    password: "{{ bookstack_db_password | default(global_password_prefix + '_pw_bookstack') }}"
    priv: "bookstack.*:ALL"
  - name: "firefly"
    password: "{{ firefly_db_password | default(global_password_prefix + '_pw_firefly') }}"
    priv: "firefly.*:ALL"

# ==============================================================================
# IIAB – WORDPRESS
# ==============================================================================

wordpress_domain: "wordpress.dev.local"
wordpress_dir: "{{ ansible_facts['env']['HOME'] }}/projects/wordpress"
wordpress_db_name: "wordpress"
wordpress_db_user: "wordpress"
wordpress_db_password: "{{ global_password_prefix }}_pw_wordpress"
wordpress_db_host: "127.0.0.1"          # ignorováno pokud install_mariadb=true (použije se 'mariadb' z iiab_net)
wordpress_table_prefix: "wp_"
wordpress_version: "latest"             # Docker image tag
wordpress_port: 8084                    # Lokální port kontejneru (nginx proxy)
wordpress_admin_user: "admin"
wordpress_admin_password: "{{ global_password_prefix }}_pw_wordpress_admin"
wordpress_admin_email: "{{ default_admin_email }}"

# ==============================================================================
# IIAB – NEXTCLOUD
# ==============================================================================

nextcloud_domain: "cloud.dev.local"
nextcloud_dir: "{{ ansible_facts['env']['HOME'] }}/projects/nextcloud"
nextcloud_data_dir: "{{ ansible_facts['env']['HOME'] }}/nextcloud-data"
nextcloud_db_name: "nextcloud"
nextcloud_db_user: "nextcloud"
nextcloud_db_password: "{{ global_password_prefix }}_pw_nextcloud"
nextcloud_db_host: "127.0.0.1"         # ignorováno pokud install_mariadb=true (použije se 'mariadb' z iiab_net)
nextcloud_admin_user: "admin"
nextcloud_admin_password: "{{ global_password_prefix }}_pw_nextcloud_admin"
nextcloud_version: "stable"             # Docker image tag (stable / latest / 29)
nextcloud_port: 8085                    # Lokální port kontejneru (nginx proxy)

# ==============================================================================
# IIAB – KIWIX (offline Wikipedia, Gutenberg, ZIM soubory)
# Kiwix běží v Docker kontejneru (nejjednodušší na macOS)
# ==============================================================================

kiwix_domain: "kiwix.dev.local"
kiwix_port: 8888                           # Lokální port kiwix-serve
kiwix_version: "latest"                            # Docker image tag
kiwix_data_dir: "{{ ansible_facts['env']['HOME'] }}/kiwix"       # Sem ukládej .zim soubory

# ZIM soubory ke stažení (prázdné = nestahovat automaticky)
# Velikosti: Wikipedia CZ ~2GB, EN ~90GB, Gutenberg ~60GB
# Viz: https://download.kiwix.org/zim/
# Init ZIM – malý soubor stažený automaticky aby Kiwix nastartoval.
# Větší ZIM soubory přidej do kiwix_zim_files nebo stáhni přes download-zim.sh.
kiwix_init_zim_url: "https://download.kiwix.org/zim/zimit/based.cooking_en_all_2026-02.zim"
kiwix_init_zim_dest: "based-cooking.zim"

kiwix_zim_files: []
# Příklady (přidej do config.yml):
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_mini_2026-03.zim"
#   dest: "wikipedia_en_top_mini.zim"    # ~315 MB
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_cs_all_mini_2024-11.zim"
#   dest: "wikipedia_cs_mini.zim"        # ~500 MB

# ==============================================================================
# IIAB – OFFLINE MAPY (tileserver-gl + MBTiles)
# ==============================================================================

maps_domain: "maps.dev.local"
maps_port: 8081                               # 8080 obsazen Traefik dashboard
maps_tileserver_version: "latest"                  # Docker image tag (maptiler/tileserver-gl)
maps_data_dir: "{{ ansible_facts['env']['HOME'] }}/maps"        # Sem ukládej .mbtiles soubory

# MBTiles soubory ke stažení (prázdné = nestahovat automaticky)
# Viz: https://data.maptiler.com/downloads/ nebo https://openmaptiles.org/
maps_mbtiles_files: []
# - url: "https://data.maptiler.com/downloads/europe/czech-republic/"
#   dest: "czech-republic.mbtiles"
#   # POZOR: Vyžaduje registraci na maptiler.com (free tier k dispozici)

# ==============================================================================
# SHELL EXTRAS – Starship + aliasy
# ==============================================================================

# Starship preset: plain-text | bracketed-segments | gruvbox-rainbow | tokyo-night
starship_preset: "gruvbox-rainbow"

# Aliasy přidané do ~/.zshrc
shell_aliases:
  - alias: ls
    command: "eza --icons --group-directories-first"
  - alias: ll
    command: "eza -la --icons --git --group-directories-first"
  - alias: lt
    command: "eza --tree --icons --level=3"
  - alias: cat
    command: "bat --style=numbers,changes,header"
  - alias: grep
    command: "rg"
  - alias: find
    command: "fd"
  - alias: du
    command: "ncdu"
  - alias: df
    command: "duf"
  - alias: lg
    command: "lazygit"
  - alias: nr
    command: "npm run"
  - alias: br
    command: "bun run"

# ==============================================================================
# OBSERVABILITY – Grafana LGTM stack + Alloy
# Architektura:
#   Alloy (collector) → Prometheus (metrics) → Grafana (dashboards)
#                    → Loki (logs)            →
#                    → Tempo (traces)         →
# ==============================================================================

# ── Porty ─────────────────────────────────────────────────────────────────────
grafana_port: 3000
prometheus_port: 9090
loki_port: 3100
tempo_version: "2.10.0"           # github.com/grafana/tempo/releases – no Homebrew formula
nginx_prometheus_exporter_version: "1.4.1"  # github.com/nginxinc/nginx-prometheus-exporter/releases – no Homebrew formula
phpfpm_exporter_version: "2.2.0"         # github.com/hipages/php-fpm_exporter/releases – no Homebrew formula
tempo_http_port: 3200
tempo_otlp_grpc_port: 4327    # Tempo interní OTLP gRPC (Alloy → Tempo)
tempo_otlp_http_port: 4328    # Tempo interní OTLP HTTP (Alloy → Tempo)
alloy_ui_port: 12345
alloy_otlp_grpc_port: 4317    # Alloy veřejný OTLP gRPC (apps → Alloy)
alloy_otlp_http_port: 4318    # Alloy veřejný OTLP HTTP (apps → Alloy)

# ── Domény ────────────────────────────────────────────────────────────────────
grafana_domain: "grafana.dev.local"
# Ostatní služby nejsou veřejně exponovány (localhost only), přes Grafana
observability_hostname: "{{ ansible_facts['hostname'] }}"  # Hostname v Grafana labelech

# ── Docker image verze (observability + devops) ──────────────────────────────
grafana_version: "12.4.2"               # CVE-2026-27876 (CVSS 9.1 file write → RCE)
prometheus_version: "latest"
loki_version: "latest"
grafana_data_dir: "{{ stacks_dir }}/observability/grafana/data"

# Gitea Docker
gitea_version: "1.25.5"                 # CVE-2026-gitea-template-traversal (authenticated RCE)

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana_admin_user: "admin"
grafana_admin_password: "{{ global_password_prefix }}_pw_grafana"
grafana_allow_embedding: false
grafana_analytics: false    # Vypnout telemetrii

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus_retention: "30d"
prometheus_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/prometheus"

# ── Loki ──────────────────────────────────────────────────────────────────────
loki_retention: "744h"   # 31 dní
loki_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/loki"

# ── Tempo ─────────────────────────────────────────────────────────────────────
tempo_retention: "168h"  # 7 dní (traces bývají objemnější)
tempo_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/tempo"

# ── Alloy – co sbírat ─────────────────────────────────────────────────────────
alloy_scrape_nginx: true           # nginx stub_status → Prometheus
alloy_scrape_phpfpm: true          # PHP-FPM status → Prometheus
phpfpm_exporter_port: 9253         # Port php-fpm_exporteru
alloy_scrape_mariadb: false        # MariaDB metriky (zapni pokud install_mariadb: true)
alloy_scrape_redis: true           # Redis metriky → Prometheus
redis_port: 6379                   # Redis port
alloy_tail_nginx_logs: true        # Nginx access+error logy → Loki
alloy_tail_agent_logs: true        # ~/agents/*.log → Loki
alloy_tail_php_logs: true          # PHP-FPM logy → Loki
alloy_receive_otlp: true           # OTLP přijímač pro app traces/metrics/logs → Tempo

# ── Grafana dashboardy ke stažení z grafana.com ───────────────────────────────
# ID dashboardů z https://grafana.com/grafana/dashboards/
grafana_dashboards:
  - id: 1860    # Node Exporter Full (system metrics)
    revision: 37
  - id: 12708   # NGINX exporter
    revision: 1

# ==============================================================================
# IIAB – N8N (workflow automation)
# ==============================================================================

n8n_domain: "n8n.dev.local"
n8n_port: 5678
n8n_version: "2.14.1"      # CVE-2026-33660+33696+33663+33713 (Merge RCE, GSuiteAdmin proto pollution). Was 2.10.1
n8n_data_dir: "{{ ansible_facts['env']['HOME'] }}/n8n"
n8n_timezone: "Europe/Prague"
n8n_admin_email: "{{ default_admin_email }}"
n8n_admin_password: "{{ global_password_prefix }}_pw_n8n"
n8n_admin_firstname: "Admin"
n8n_admin_lastname: "devBoxNOS"

# ==============================================================================
# IIAB – GITEA (self-hosted Git)
# ==============================================================================

gitea_domain: "git.dev.local"
gitea_port: 3003         # 3000=Grafana, 3001=Uptime Kuma, 3002=rezerva → Gitea na 3003
gitea_ssh_port: 2222
gitea_data_dir: "{{ ansible_facts['env']['HOME'] }}/gitea"
gitea_admin_user: "{{ ansible_facts['user_id'] }}"
gitea_admin_password: "{{ global_password_prefix }}_pw_gitea"
gitea_admin_email: ""                          # VYPLŇ!
gitea_secret_key: "{{ global_password_prefix }}_pw_gitea_secret"
gitea_disable_registration: false              # true = pouze admin může přidávat uživatele

# ==============================================================================
# IIAB – GITLAB CE (full DevOps platform)
# Poznámka: GitLab Omnibus je těžká aplikace (~4 GB RAM v klidu, ~1 GB image).
#           Doporučeno pouze pokud nepotřebuješ jen Git (na to stačí Gitea).
#           Interní PostgreSQL, Redis, Sidekiq – vše v jednom kontejneru.
# ==============================================================================

gitlab_domain: "gitlab.dev.local"
gitlab_http_port: 8929          # Interní HTTP port (nginx přebírá SSL, forwarduje sem)
gitlab_ssh_port: 2224           # Git SSH (22=systém, 2222=Gitea → Gitlab na 2224)
gitlab_version: "18.10.3-ce.0"  # CVE-2026-5173 (websocket bypass CVSS 8.5), CVE-2026-1092 (DoS), CVE-2025-12664 (GraphQL DoS)
gitlab_data_dir: "{{ ansible_facts['env']['HOME'] }}/gitlab"          # Repozitáře, uploads, artefakty (velké!)
gitlab_config_dir: "{{ ansible_facts['env']['HOME'] }}/gitlab-config" # gitlab.rb + klíče (malé, ale důležité)
gitlab_timezone: "Europe/Prague"
gitlab_signup_enabled: false    # Zakáže registraci nových uživatelů
gitlab_puma_workers: 2          # Worker procesy (min 2, pro 36 GB klidně 4)
gitlab_sidekiq_concurrency: 10  # Background job vlákna

# ==============================================================================
# IIAB – OPEN WEBUI (chat UI pro Ollama)
# Vyžaduje: install_openclaw: true (Ollama musí běžet na portu 11434)
# ==============================================================================

openwebui_domain: "ai.dev.local"
openwebui_port: 3004             # Interní port kontejneru 8080 → host 3004
openwebui_version: "0.6.35"      # CVE-2025-64495/64496 (XSS→RCE, JWT theft). Switched from :main
openwebui_data_dir: "{{ ansible_facts['env']['HOME'] }}/openwebui"
openwebui_secret_key: "{{ global_password_prefix }}_pw_openwebui"
openwebui_enable_signup: true    # false = admin musí přidávat uživatele ručně
openwebui_admin_name: "Admin"
openwebui_admin_email: "{{ default_admin_email }}"
openwebui_admin_password: "{{ global_password_prefix }}_pw_openwebui_admin"

# ==============================================================================
# IIAB – WOODPECKER CI (CI/CD napojen na Gitea)
# Vyžaduje: install_gitea: true + manuální OAuth2 aplikace v Gitee
# ==============================================================================

woodpecker_domain: "ci.dev.local"
woodpecker_port: 8060            # Web UI
