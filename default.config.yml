    name: "tier-user"
    description: "Standard employee services (productivity, collaboration)"
    groups: ["nos-providers", "nos-admins", "nos-managers", "nos-users"]
  - tier: 4
    name: "tier-guest"
    description: "Guest/public access (content, media)"
    groups: ["nos-providers", "nos-admins", "nos-managers", "nos-users", "nos-guests"]

