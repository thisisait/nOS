# ── OIDC Service Registry — REPLACED (D1.3, 2026-05-05) ──────────────────
# Pre-D1.3: 35-row static central authentik_oidc_apps list. Source-of-truth
# now lives in per-plugin authentik: blocks harvested into
# authentik-base.inputs.clients by load_plugins.run_aggregators; blueprint
# 10-oidc-apps.yaml.j2 iterates inputs.clients (D1.2).
#
# This empty list survives ONLY as the Tier-2 apps_runner extension
# channel: apps_runner appends entries for each apps/<name>.yml
# manifest's `authentik_entry` (Tier-1 services have plugins; Tier-2 apps
# don't yet). The blueprint merges both sources until apps_runner gets
