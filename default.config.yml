authentik_rbac_tiers:
  - tier: 1
    name: "tier-admin"
    description: "Admin-only services (infrastructure, secrets, monitoring)"
    groups: ["nos-providers", "nos-admins"]
  - tier: 2
    name: "tier-manager"
    description: "Manager+ services (dev tools, analytics, automation)"
    groups: ["nos-providers", "nos-admins", "nos-managers"]
