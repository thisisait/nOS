  - "WordingStatus"

# ==============================================================================
# IIAB – MARIADB
# ==============================================================================

mariadb_root_password: "{{ global_password_prefix }}_pw_mariadb"   # OVERRIDE in credentials.yml!
mariadb_version: "11.8.6"               # CVE-2026-32710 fixed; bumped from 11.4.10 which crashed on FK ALTER on Apple Silicon Docker Desktop (broke BookStack migration #10)
mariadb_port: 3306
mariadb_data_dir: "{{ ansible_facts['env']['HOME'] }}/mariadb/data"   # data persistence outside the container

# ==============================================================================
# INFRA – POSTGRESQL (shared DB for Mattermost, Outline, Metabase, Superset)
# ==============================================================================

install_postgresql: false
postgresql_version: "16.13-alpine"      # CVE-2026-2005 (pgcrypto RCE), CVE-2026-2006 (multibyte RCE), CVE-2026-2004/2007 (buffer overflow). Was 16.10
postgresql_port: 5432
postgresql_root_user: "postgres"
postgresql_root_password: "{{ global_password_prefix }}_pw_postgresql"
postgresql_data_dir: "{{ ansible_facts['env']['HOME'] }}/postgresql/data"

# ==============================================================================
# INFRA – REDIS (Docker, alternative to Homebrew Redis)
# If redis_docker: true, Homebrew Redis is not used
# ==============================================================================

redis_docker: false                    # true = Redis in Docker (for cross-stack access)
redis_version: "7.4.6-alpine"           # CVE-2025-49844 (CVSS 10.0 RediShell RCE)
redis_data_dir: "{{ ansible_facts['env']['HOME'] }}/redis/data"

# ==============================================================================
# IIAB – MARIADB (continued)
# ==============================================================================

mariadb_databases:
  - name: "wordpress"
  - name: "nextcloud"
  - name: "freescout"
  - name: "erpnext"
  - name: "asterisk"
  - name: "bookstack"
  - name: "firefly"

mariadb_users:
  - name: "wordpress"
    password: "{{ wordpress_db_password }}"
    priv: "wordpress.*:ALL"
  - name: "nextcloud"
    password: "{{ nextcloud_db_password }}"
    priv: "nextcloud.*:ALL"
  - name: "freescout"
    password: "{{ freescout_db_password | default(global_password_prefix + '_pw_freescout') }}"
    priv: "freescout.*:ALL"
  - name: "erpnext"
    password: "{{ erpnext_admin_password | default(global_password_prefix + '_pw_erpnext') }}"
    priv: "erpnext.*:ALL"
  - name: "asterisk"
    password: "{{ freepbx_db_password | default(global_password_prefix + '_pw_freepbx') }}"
    priv: "asterisk.*:ALL"
  - name: "bookstack"
    password: "{{ bookstack_db_password | default(global_password_prefix + '_pw_bookstack') }}"
    priv: "bookstack.*:ALL"
  - name: "firefly"
    password: "{{ firefly_db_password | default(global_password_prefix + '_pw_firefly') }}"
    priv: "firefly.*:ALL"
  # mysqld-exporter (observability stack) — scraped by Grafana Alloy on the
  # observability_net via stacks_shared_network. Needs the three "slave"/monitoring
  # privileges that Percona/MariaDB's stock exporter queries require. Host "%" so
  # it works from any Docker network (exporter lives in the observability project).
  - name: "mysqld_exporter"
    password: "{{ mysqld_exporter_password | default(global_password_prefix + '_pw_mysqld_exporter') }}"
    host: "%"
    priv: "*.*:PROCESS,REPLICATION CLIENT,SELECT"

# ==============================================================================
# IIAB – WORDPRESS
# ==============================================================================

wordpress_domain: "wordpress.dev.local"
wordpress_dir: "{{ ansible_facts['env']['HOME'] }}/projects/wordpress"
wordpress_db_name: "wordpress"
wordpress_db_user: "wordpress"
wordpress_db_password: "{{ global_password_prefix }}_pw_wordpress"
wordpress_db_host: "127.0.0.1"          # ignored if install_mariadb=true (uses 'mariadb' from iiab_net)
wordpress_table_prefix: "wp_"
wordpress_version: "6.9.4"              # Docker image tag
wordpress_port: 8084                    # Local container port (nginx proxy)
wordpress_admin_user: "admin"
wordpress_admin_password: "{{ global_password_prefix }}_pw_wordpress_admin"
wordpress_admin_email: "{{ default_admin_email }}"

# ==============================================================================
# IIAB – NEXTCLOUD
# ==============================================================================

nextcloud_domain: "cloud.dev.local"
nextcloud_dir: "{{ ansible_facts['env']['HOME'] }}/projects/nextcloud"
nextcloud_data_dir: "{{ ansible_facts['env']['HOME'] }}/nextcloud-data"
nextcloud_db_name: "nextcloud"
nextcloud_db_user: "nextcloud"
nextcloud_db_password: "{{ global_password_prefix }}_pw_nextcloud"
nextcloud_db_host: "127.0.0.1"         # ignored if install_mariadb=true (uses 'mariadb' from iiab_net)
nextcloud_admin_user: "admin"
nextcloud_admin_password: "{{ global_password_prefix }}_pw_nextcloud_admin"
nextcloud_version: "stable"             # Docker image tag (stable / latest / 29)
nextcloud_port: 8085                    # Local container port (nginx proxy)

# ==============================================================================
# IIAB – KIWIX (offline Wikipedia, Gutenberg, ZIM files)
# Kiwix runs in a Docker container (simplest on macOS)
# ==============================================================================

kiwix_domain: "kiwix.dev.local"
kiwix_port: 8888                           # Local kiwix-serve port
kiwix_version: "3.8.2"                             # Docker image tag (ghcr.io/kiwix/kiwix-serve)
kiwix_data_dir: "{{ ansible_facts['env']['HOME'] }}/kiwix"       # Put .zim files here

# ZIM files to download (empty = do not download automatically)
# Sizes: Wikipedia CZ ~2GB, EN ~90GB, Gutenberg ~60GB
# See: https://download.kiwix.org/zim/
# Init ZIM – a small file downloaded automatically so Kiwix starts.
# Add larger ZIM files to kiwix_zim_files or download via download-zim.sh.
kiwix_init_zim_url: "https://download.kiwix.org/zim/zimit/based.cooking_en_all_2026-02.zim"
kiwix_init_zim_dest: "based-cooking.zim"

kiwix_zim_files: []
# Examples (add to config.yml):
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_mini_2026-03.zim"
#   dest: "wikipedia_en_top_mini.zim"    # ~315 MB
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_cs_all_mini_2024-11.zim"
#   dest: "wikipedia_cs_mini.zim"        # ~500 MB

# ==============================================================================
# IIAB – OFFLINE MAPS (tileserver-gl + MBTiles)
# ==============================================================================

maps_domain: "maps.dev.local"
maps_port: 8081                               # 8080 taken by Traefik dashboard
maps_tileserver_version: "latest"                  # Docker image tag (maptiler/tileserver-gl)
maps_data_dir: "{{ ansible_facts['env']['HOME'] }}/maps"        # Put .mbtiles files here

# MBTiles files to download (empty = do not download automatically)
# See: https://data.maptiler.com/downloads/ or https://openmaptiles.org/
maps_mbtiles_files: []
# - url: "https://data.maptiler.com/downloads/europe/czech-republic/"
#   dest: "czech-republic.mbtiles"
#   # WARNING: Requires registration at maptiler.com (free tier available)

# ==============================================================================
# SHELL EXTRAS – Starship + aliases
# ==============================================================================

# Starship preset: plain-text | bracketed-segments | gruvbox-rainbow | tokyo-night
starship_preset: "gruvbox-rainbow"

# Aliases added to ~/.zshrc
shell_aliases:
  - alias: ls
    command: "eza --icons --group-directories-first"
  - alias: ll
    command: "eza -la --icons --git --group-directories-first"
  - alias: lt
    command: "eza --tree --icons --level=3"
  - alias: cat
    command: "bat --style=numbers,changes,header"
  - alias: grep
    command: "rg"
  - alias: find
    command: "fd"
  - alias: du
    command: "ncdu"
  - alias: df
    command: "duf"
  - alias: lg
    command: "lazygit"
  - alias: nr
    command: "npm run"
  - alias: br
    command: "bun run"

# ==============================================================================
# OBSERVABILITY – Grafana LGTM stack + Alloy
# Architektura:
#   Alloy (collector) → Prometheus (metrics) → Grafana (dashboards)
#                    → Loki (logs)            →
#                    → Tempo (traces)         →
# ==============================================================================

# ── Ports ─────────────────────────────────────────────────────────────────────
grafana_port: 3000
prometheus_port: 9090
loki_port: 3100
tempo_version: "2.10.0"           # github.com/grafana/tempo/releases – no Homebrew formula
nginx_prometheus_exporter_version: "1.4.1"  # github.com/nginxinc/nginx-prometheus-exporter/releases – no Homebrew formula
phpfpm_exporter_version: "2.2.0"         # github.com/hipages/php-fpm_exporter/releases – no Homebrew formula
tempo_http_port: 3200
tempo_otlp_grpc_port: 4327    # Tempo internal OTLP gRPC (Alloy → Tempo)
tempo_otlp_http_port: 4328    # Tempo internal OTLP HTTP (Alloy → Tempo)
alloy_ui_port: 12345
alloy_otlp_grpc_port: 4317    # Alloy public OTLP gRPC (apps → Alloy)
alloy_otlp_http_port: 4318    # Alloy public OTLP HTTP (apps → Alloy)

# ── Domains ───────────────────────────────────────────────────────────────────
grafana_domain: "grafana.dev.local"
# Other services are not publicly exposed (localhost only), accessed via Grafana
observability_hostname: "{{ ansible_facts['hostname'] }}"  # Hostname in Grafana labels

# ── Docker image versions (observability + devops) ───────────────────────────
grafana_version: "12.4.2"               # CVE-2026-27876 (CVSS 9.1 file write → RCE)
prometheus_version: "v3.11.2"
loki_version: "3.7.1"
grafana_data_dir: "{{ stacks_dir }}/observability/grafana/data"

# Gitea Docker
gitea_version: "1.25.5"                 # CVE-2026-gitea-template-traversal (authenticated RCE)

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana_admin_user: "admin"
grafana_admin_password: "{{ global_password_prefix }}_pw_grafana"
grafana_allow_embedding: false
grafana_analytics: false    # Disable telemetry

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus_retention: "30d"
prometheus_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/prometheus"

# ── Loki ──────────────────────────────────────────────────────────────────────
loki_retention: "744h"   # 31 days
loki_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/loki"

# ── Tempo ─────────────────────────────────────────────────────────────────────
tempo_retention: "168h"  # 7 days (traces tend to be larger)
tempo_storage_path: "{{ ansible_facts['env']['HOME'] }}/observability/tempo"

# ── Alloy – what to collect ───────────────────────────────────────────────────
alloy_scrape_nginx: true           # nginx stub_status → Prometheus
alloy_scrape_phpfpm: true          # PHP-FPM status → Prometheus
phpfpm_exporter_port: 9253         # Port of php-fpm_exporter
alloy_scrape_mariadb: false        # MariaDB metrics (enable if install_mariadb: true)
alloy_scrape_redis: true           # Redis metrics → Prometheus
redis_port: 6379                   # Redis port
alloy_tail_nginx_logs: true        # Nginx access+error logs → Loki
alloy_tail_agent_logs: true        # ~/agents/*.log → Loki
alloy_tail_php_logs: true          # PHP-FPM logs → Loki
alloy_tail_docker_logs: true       # All Docker container stdout/stderr → Loki
alloy_receive_otlp: true           # OTLP receiver for app traces/metrics/logs → Tempo

# ── Exporter containers (observability stack) ─────────────────────────────────
# Sprint 1 / Wave 1: expand metrics coverage with infra + container exporters.
# Toggle individual exporters with alloy_scrape_* flags below.
postgres_exporter_port: 9187       # prometheuscommunity/postgres-exporter
mysqld_exporter_port: 9104         # prom/mysqld-exporter (requires `mysqld_exporter` MariaDB user)
redis_exporter_port: 9121          # oliver006/redis_exporter
cadvisor_port: 8080                # gcr.io/cadvisor/cadvisor — container resource metrics
blackbox_exporter_port: 9115       # prom/blackbox-exporter — HTTP/TCP probes

postgres_exporter_version: "v0.15.0"
mysqld_exporter_version: "v0.15.1"
redis_exporter_version: "v1.58.0"
cadvisor_version: "v0.49.1"
blackbox_exporter_version: "v0.25.0"

alloy_scrape_postgres_exporter: "{{ install_postgresql | default(false) }}"
alloy_scrape_mysqld_exporter:   "{{ install_mariadb   | default(false) }}"
alloy_scrape_redis_exporter:    "{{ redis_docker      | default(false) }}"
alloy_scrape_cadvisor: true
alloy_scrape_blackbox_self: true   # scrape blackbox-exporter's own /metrics (probe results come from prometheus rules — A2)

# ── Grafana dashboards to download from grafana.com ───────────────────────────
# Dashboard IDs from https://grafana.com/grafana/dashboards/
grafana_dashboards:
  - id: 1860    # Node Exporter Full (system metrics)
    revision: 37
  - id: 12708   # NGINX exporter
    revision: 1

# ==============================================================================
# IIAB – N8N (workflow automation)
# ==============================================================================

n8n_domain: "n8n.dev.local"
n8n_port: 5678
n8n_version: "2.14.1"      # CVE-2026-33660+33696+33663+33713 (Merge RCE, GSuiteAdmin proto pollution). Was 2.10.1
n8n_data_dir: "{{ ansible_facts['env']['HOME'] }}/n8n"
n8n_timezone: "Europe/Prague"
n8n_admin_email: "{{ default_admin_email }}"
n8n_admin_password: "{{ global_password_prefix }}_pw_n8n"
n8n_admin_firstname: "Admin"
n8n_admin_lastname: "nOS"

# ==============================================================================
# IIAB – GITEA (self-hosted Git)
# ==============================================================================

gitea_domain: "git.dev.local"
gitea_port: 3003         # 3000=Grafana, 3001=Uptime Kuma, 3002=reserve → Gitea on 3003
gitea_ssh_port: 2222
gitea_data_dir: "{{ ansible_facts['env']['HOME'] }}/gitea"
gitea_admin_user: "{{ ansible_facts['user_id'] }}"
gitea_admin_password: "{{ global_password_prefix }}_pw_gitea"
gitea_admin_email: ""                          # FILL IN!
gitea_secret_key: "{{ global_password_prefix }}_pw_gitea_secret"
gitea_disable_registration: false              # true = only admin can add users

# ==============================================================================
# IIAB – GITLAB CE (full DevOps platform)
# Note: GitLab Omnibus is a heavy application (~4 GB RAM idle, ~1 GB image).
#       Recommended only if you need more than just Git (Gitea is enough for that).
#       Internal PostgreSQL, Redis, Sidekiq – all in one container.
# ==============================================================================

gitlab_domain: "gitlab.dev.local"
gitlab_http_port: 8929          # Internal HTTP port (nginx handles SSL, forwards here)
gitlab_ssh_port: 2224           # Git SSH (22=system, 2222=Gitea → Gitlab on 2224)
