# ==============================================================================
# OPENCLAW – self-hosted AI agent (Ollama backend, no API key)
# Documentation: https://github.com/openclaw/openclaw
# Ollama integration: https://ollama.com/blog/openclaw
# ==============================================================================

# User and home directory for the agentic environment
openclaw_user: "{{ ansible_facts['user_id'] }}"
openclaw_base_dir: "{{ ansible_facts['env']['HOME'] }}"

# Agent system directories
openclaw_agents_dir: "{{ ansible_facts['env']['HOME'] }}/agents"         # agent installation, configuration
openclaw_projects_dir: "{{ ansible_facts['env']['HOME'] }}/projects"     # projects hosted via nginx
openclaw_log_dir: "{{ ansible_facts['env']['HOME'] }}/agents/log"        # structured .md logs

# OpenClaw configuration (~/.openclaw/)
openclaw_config_dir: "~/.openclaw"

# Ollama model – recommended for 36GB RAM: qwen3:14b
# Alternatives: qwen3.5:14b (faster), llama3.3:70b (stronger, slower)
# Since Ollama 0.19 the MLX backend is used automatically on Apple Silicon
# (57% faster prefill, 93% faster decode vs llama.cpp)
openclaw_model: "qwen3:14b"
ollama_max_loaded_models: 1    # Max models in RAM (1 = saves SWAP on 36GB)
ollama_num_parallel: 2         # Max parallel inference requests
ollama_keep_alive: "5m"        # Release model from RAM after idle (default 5m, 0 = immediate)
ollama_flash_attention: 1      # Flash attention for MLX (faster, less memory)

# Run openclaw as a launchd daemon (always running, autorestart)
openclaw_install_daemon: true
openclaw_domain: "claw.dev.local"
openclaw_gateway_port: 18789

# Agent name (persona)
openclaw_agent_name: "Inspektor Klepítko"

# Concurrent sub-agents
openclaw_max_concurrent_agents: 4
openclaw_max_concurrent_subagents: 8

# ==============================================================================
# PI AGENTS – coding agent framework (pi.dev / @mariozechner/pi-coding-agent)
# Documentation: https://github.com/badlogic/pi-mono
# Autoresearch extension: https://github.com/davebcn87/pi-autoresearch
# ==============================================================================

# PI agent directory
pi_config_dir: "{{ ansible_facts['env']['HOME'] }}/.pi/agent"

# Install pi-autoresearch extension (optimization loop for experiments)
pi_install_autoresearch: true

# ==============================================================================
# DOTFILES
# ==============================================================================

dotfiles_repo: https://github.com/geerlingguy/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/Development/GitHub/dotfiles
dotfiles_repo_version: master
dotfiles_files:
  - .zshrc
  - .gitignore
  - .inputrc
  - .osx
  - .vimrc

# ==============================================================================
# macOS DEFAULTS (.osx script)
# ==============================================================================

osx_script: "~/.osx --no-restart"

sudoers_custom_config: ""
# sudoers_custom_config: |
#   %admin ALL=(ALL) NOPASSWD: ALL

# ==============================================================================
# macOS EXTENDED SETTINGS (configure_macos_defaults)
# Automates everything from "Manual settings to automate someday" + developer defaults
# ==============================================================================

# ── Finder ────────────────────────────────────────────────────────────────────
macos_finder_show_hidden_files: true          # Show hidden files (Cmd+Shift+.)
macos_finder_show_extensions: true           # Show file extensions
macos_finder_show_path_bar: true             # Show path bar at the bottom
macos_finder_show_status_bar: true           # Show status bar at the bottom
macos_finder_disable_desktop_click: true     # Disable click-to-show-desktop (Stage Manager)
macos_finder_default_search_scope: "SCcf"   # Search in current folder (SCcf) / computer (SCev)
macos_finder_show_posix_path_title: false    # Show POSIX path in title bar

# ── Keyboard ──────────────────────────────────────────────────────────────────
macos_keyboard_repeat_rate: 2        # 0=fastest ... 120=slowest (2 = Fast)
macos_keyboard_repeat_delay: 15      # 0=shortest ... 120=longest (15 = Short)
macos_keyboard_press_hold: false     # false = key repeat (not accent menu)
# Caps Lock → Esc: CANNOT be fully automated (HW-specific IOKit), see README

# ── Accessibility ─────────────────────────────────────────────────────────────
macos_reduce_transparency: true      # Reduce transparency (performance)
macos_reduce_motion: false           # Reduce motion of animations

# ── Screenshot ────────────────────────────────────────────────────────────────
macos_screenshot_location: "~/Desktop"   # Where to save screenshots
macos_screenshot_format: "png"           # png | jpg | pdf | tiff

# ── Dock ──────────────────────────────────────────────────────────────────────
macos_dock_autohide: true            # Automatically hide the Dock
macos_dock_show_recents: false       # Do not show recent applications
macos_dock_tilesize: 48              # Icon size (pixels)
macos_dock_minimize_effect: "scale"  # genie | scale

# ── Safari (developer) ────────────────────────────────────────────────────────
macos_safari_show_status_bar: true        # Show status bar
macos_safari_show_full_url: true          # Show full URL
macos_safari_developer_menu: true         # Enable Developer menu
# Note: Userscripts (Return YouTube Dislike) must be installed manually

# ── Terminal ──────────────────────────────────────────────────────────────────
macos_terminal_secure_keyboard: true  # Secure keyboard entry

# ── System ────────────────────────────────────────────────────────────────────
macos_computer_name: ""               # NetBIOS computer name; empty = use ansible_hostname
macos_disable_gatekeeper: false       # NOT RECOMMENDED – leave false for security
# Full Disk Access for Terminal: CANNOT be automated (SIP protected)
# The installer will ask for it on first run

# ==============================================================================
# SYSTEM SERVICES
# ==============================================================================

# SSH
ssh_port: 22
ssh_allow_groups: "admin staff"   # Groups with SSH access
ssh_password_auth: true           # true = password + keys; false = keys only (after ssh-copy-id)

# Samba / SMB
samba_workgroup: "WORKGROUP"
samba_shares:
  - name: "projects"
    path: "{{ ansible_facts['env']['HOME'] }}/projects"
    comment: "{{ ansible_facts['user_id'] }} projects"
    browseable: true
    writable: true

# VNC
vnc_password: "{{ global_password_prefix }}_pw_vnc"

# ==============================================================================
# DOCK
# ==============================================================================

dockitems_remove: []
dockitems_persist: []

# ==============================================================================
# SUBLIME TEXT
# ==============================================================================

sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "Theme - Cobalt2"
