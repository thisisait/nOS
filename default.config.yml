authentik_bootstrap_password: "{{ global_password_prefix }}_pw_authentik_admin"
authentik_bootstrap_email: "{{ default_admin_email }}"

# ── Authentik RBAC groups (created automatically on blank run) ────────────────
authentik_default_groups:
  - name: "nos-providers"
    description: "Provider admins (full remote access, same as CEO)"
  - name: "nos-admins"
    description: "Client CEO/CTO (full local + remote access)"
  - name: "nos-managers"
    description: "Division/department managers"
  - name: "nos-users"
    description: "Standard employees"
  - name: "nos-guests"
    description: "Guest access (IIAB terminal only)"

# ── Authentik RBAC tiers (group → application access) ──────────────────────────
# Tier 1 = admin only, Tier 4 = guest/public. Higher tier = broader access.
# Policies auto-created by Authentik Blueprints (templates/authentik/blueprints/20-rbac-policies.yaml.j2).
authentik_rbac_tiers:
  - tier: 1
    name: "tier-admin"
    description: "Admin-only services (infrastructure, secrets, monitoring)"
    groups: ["nos-providers", "nos-admins"]
  - tier: 2
    name: "tier-manager"
    description: "Manager+ services (dev tools, analytics, automation)"
    groups: ["nos-providers", "nos-admins", "nos-managers"]
  - tier: 3
    name: "tier-user"
    description: "Standard employee services (productivity, collaboration)"
    groups: ["nos-providers", "nos-admins", "nos-managers", "nos-users"]
  - tier: 4
    name: "tier-guest"
    description: "Guest/public access (content, media)"
    groups: ["nos-providers", "nos-admins", "nos-managers", "nos-users", "nos-guests"]

# Mapping slug → tier. Services without an entry default to tier 3 (user+).
authentik_app_tiers:
  portainer: 1
  infisical: 1
  grafana: 1
  gitea: 2
  gitlab: 2
  n8n: 2
  superset: 2
  metabase: 2
  paperclip: 2
  erpnext: 2
  freescout: 2
  nextcloud: 3
  outline: 3
  open-webui: 3
  puter: 3
  vaultwarden: 3
  uptime-kuma: 3
  calibre-web: 3
  home-assistant: 3
  kiwix: 4
  jellyfin: 4
  wing: 1
  wordpress: 4
  code-server: 1
  influxdb: 1
  ntfy: 2
  nodered: 2
  firefly: 2
  miniflux: 3
  mailpit: 2
  hedgedoc: 3
  bookstack: 3
