# ==============================================================================
# INFISICAL CE – Secrets Management (REST API, CLI, SDK)
# Centrální vault pro DB hesla, API klíče, certifikáty. E2EE.
# ==============================================================================

infisical_version: "latest"
infisical_domain: "vault.dev.local"
infisical_port: 8075
infisical_data_dir: "{{ ansible_facts['env']['HOME'] }}/infisical"
infisical_encryption_key: "{{ global_password_prefix }}_pw_infisical_enc"
infisical_auth_secret: "{{ global_password_prefix }}_pw_infisical_auth"
infisical_db_name: "infisical"
infisical_db_user: "infisical"
infisical_db_password: "{{ global_password_prefix }}_pw_infisical_db"
infisical_disable_signup: true                     # Admin creates all users

# ==============================================================================
# VAULTWARDEN – Personal Password Vault (Bitwarden-kompatibilní)
# Každý tenant devBoxNOS má svůj vault pro osobní hesla.
# ==============================================================================

vaultwarden_version: "1.35.4"            # CVE-2026-27802/27803 (priv escalation), CVE-2025-24364 (RCE)
vaultwarden_domain: "pass.dev.local"
vaultwarden_port: 8062
vaultwarden_data_dir: "{{ ansible_facts['env']['HOME'] }}/vaultwarden"
vaultwarden_signups_allowed: false                 # Admin creates accounts
vaultwarden_admin_token: "{{ global_password_prefix }}_pw_vaultwarden_admin"
