# ==============================================================================
# AGENT IDENTITY — Authentik OIDC client_credentials (Track B, 2026-04-26)
#
# Replaces the old shared BONE_SECRET on operational endpoints. Each
# autonomous component (state-manager, OpenClaw, Wing reads) gets its own
# OIDC client at Authentik with a discrete client_id + secret + capability
# scope list. Bone validates incoming JWTs against Authentik's JWKS and
# enforces the required scope per route.
#
# The wing_telemetry callback's POST /api/v1/events keeps its HMAC channel —
# it has a different threat model (fires from inside a playbook run, must
# not depend on Authentik being up at the time). Everything else moves to
# JWT.
#
# Token lifetime: 12 hours (decision O3, 2026-04-26).
# ==============================================================================

# Capability scopes Bone recognises. Adding a scope here ALSO requires:
#   - a route in files/anatomy/bone/main.py decorated with require_scope(...)
#   - the matching scopemapping entry in the Authentik blueprint
authentik_agent_scopes:
  - "nos:state:read"
  - "nos:state:write"
  - "nos:migrations:read"
  - "nos:migrations:apply"
  - "nos:upgrades:read"
  - "nos:upgrades:apply"
  - "nos:patches:read"
  - "nos:patches:apply"
  - "nos:coexistence:read"
  - "nos:coexistence:write"
  - "nos:run-tag"
  # ── Track G/seed: security agent scopes ────────────────────────────────────
  # Per-agent identity for the security pipeline. Each scope maps to a Bone
  # route guarded by require_scope(...) when the corresponding endpoint
  # ships (post-refactor §A4). Until then these scopes are declarative —
  # available for clients to request, no enforcement surface yet. The
  # bones&wings refactor's Conductor primary will wire enforcement.
  - "nos:security:read"          # read scan-state, remediation-queue, advisories
  - "nos:security:write"         # append findings, update remediation status
  - "nos:security:scan"          # trigger ad-hoc scan run (between scheduled batches)
  - "nos:pentest:execute"        # actually run the inspektor's attack probes (high blast radius)

# Default agents seeded into Authentik. Add custom agents by extending this
# list in your local config.yml (Ansible vars_files merge appends).
#
# capabilities:  scopes the agent is allowed to request. Any scope outside
#                this list is dropped at token-emit time by Authentik.
authentik_agent_clients:
  - name: "nOS State Manager"
    slug: "nos-state-manager"
    client_id: "nos-state-manager"
    client_secret: "{{ global_password_prefix }}_pw_agent_state_manager"
    capabilities:
      - "nos:state:read"
      - "nos:state:write"
      - "nos:migrations:read"
      - "nos:upgrades:read"
      - "nos:patches:read"
      - "nos:coexistence:read"

  - name: "nOS OpenClaw"
    slug: "nos-openclaw"
    client_id: "nos-openclaw"
    client_secret: "{{ global_password_prefix }}_pw_agent_openclaw"
    capabilities: "{{ authentik_agent_scopes }}"  # full operational

  - name: "nOS Wing"
    slug: "nos-wing"
    client_id: "nos-wing"
    client_secret: "{{ global_password_prefix }}_pw_agent_wing"
    capabilities:
      - "nos:state:read"
      - "nos:migrations:read"
      - "nos:upgrades:read"
      - "nos:patches:read"
      - "nos:coexistence:read"

  # ── Track G/seed: security agent identities (per-actor SSO) ───────────────
  # Distinct from `nos-tester` (smoke probe — proves apps respond after auth)
  # and `nos-state-manager` (operational state pushes). These three are the
  # security-research agent profiles from the bones&wings refactor (§7),
  # provisioned NOW so wing.db audit trail tags every finding/scan/probe with
  # the right actor_id from day one.

  - name: "nOS Inspektor"
    slug: "nos-inspektor"
    client_id: "nos-inspektor"
    client_secret: "{{ global_password_prefix }}_pw_agent_inspektor"
    # Pentest agent — full security read/write + scan trigger + probe execute.
    # System-prompt source: docs/llm/security/pentest-task.md (drop-in ready).
    # Audit: every wing.db row tagged actor_id=nos-inspektor; GDPR Article 30
    # query is one SELECT.
    capabilities:
      - "nos:state:read"
      - "nos:security:read"
      - "nos:security:write"
      - "nos:security:scan"
      - "nos:pentest:execute"

  - name: "nOS Librarian"
    slug: "nos-librarian"
    client_id: "nos-librarian"
    client_secret: "{{ global_password_prefix }}_pw_agent_librarian"
    # Knowledge/RAG agent — read-only across state + security (so it can
    # surface "have we already remediated this before?" context); future
    # write scope for indexing into a RAG store post-PoC.
    capabilities:
      - "nos:state:read"
      - "nos:security:read"
      - "nos:migrations:read"
      - "nos:upgrades:read"
      - "nos:patches:read"

  - name: "nOS Scout"
    slug: "nos-scout"
    client_id: "nos-scout"
    client_secret: "{{ global_password_prefix }}_pw_agent_scout"
    # Drift/visibility agent — read-only on state + security state.
    # The 20-cve-drift-check.sh hook (programmatic) is its dumb cousin;
    # Scout adds the LLM layer post-PoC (correlates drift trends across
    # services + suggests prioritization). Same client_id used by the
    # Grafana annotation push when a finding lands on a critical row.
    capabilities:
      - "nos:state:read"
      - "nos:security:read"

  - name: "nOS Conductor"
    slug: "nos-conductor"
    client_id: "nos-conductor"
    client_secret: "{{ global_password_prefix }}_pw_agent_conductor"
    # Conductor agent (A8) — orchestrates the Phase 5 e2e ceremony and
    # ongoing operator automation. Full operational + security scopes so
    # it can read findings, trigger scans, and push approvals. Wing bearer
    # token provisioned separately (conductor_wing_api_token) for the
    # pulse-run-agent.sh script that execs claude with this identity.
    capabilities: "{{ authentik_agent_scopes }}"

# Hardcoded once Track B lands; flip if you want to fall back to BONE_SECRET
# during the cutover (NOT recommended — both sides should agree on JWT only).
authentik_agent_token_validity: "hours=12"

# Authentik OIDC discovery URL — derived. Bone reads /.well-known/openid-configuration
# from this base, then loads JWKS from there. The role ensures Authentik is
# up before Bone's post-start runs, so this lookup never races.
# Authentik with `issuer_mode: global` (set per-provider in the agent
# clients blueprint) emits `iss = https://<authentik_domain>/` — the root
# URL with a trailing slash, NOT /application/o/. Bone's JWT validator
# matches this string exactly, so the trailing slash matters.
authentik_oidc_issuer: "https://{{ authentik_domain | default('auth' ~ (_host_alias_seg | default('')) ~ '.' ~ (tenant_domain | default('dev.local'))) }}/"

# ==============================================================================
# INFISICAL CE – Secrets Management (REST API, CLI, SDK)
# Central vault for DB passwords, API keys, certificates. E2EE.
# ==============================================================================

infisical_version: "v0.159.16"
infisical_domain: "vault{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
infisical_port: 8075
infisical_data_dir: "{{ ansible_facts['env']['HOME'] }}/infisical"
infisical_encryption_key: "{{ global_password_prefix }}_pw_infisical_enc"
infisical_auth_secret: "{{ global_password_prefix }}_pw_infisical_auth"
infisical_db_name: "infisical"
infisical_db_user: "infisical"
infisical_db_password: "{{ global_password_prefix }}_pw_infisical_db"
infisical_disable_signup: true                     # Admin creates all users

# ==============================================================================
# VAULTWARDEN – Personal Password Vault (Bitwarden-compatible)
# Each nOS tenant has their own vault for personal passwords.
# ==============================================================================

vaultwarden_version: "1.35.4"            # CVE-2026-27802/27803 (priv escalation), CVE-2025-24364 (RCE)
vaultwarden_domain: "pass{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
vaultwarden_port: 8062
vaultwarden_data_dir: "{{ ansible_facts['env']['HOME'] }}/vaultwarden"
vaultwarden_signups_allowed: false                 # Admin creates accounts
vaultwarden_admin_token: "{{ global_password_prefix }}_pw_vaultwarden_admin"

# ==============================================================================
# BACKUP — pazny.backup role (nightly DBs + volumes + Authentik blueprints)
# Runs as a launchd agent on the host; writes to the RustFS S3 bucket.
# See roles/pazny.backup/README.md + docs/restore-runbook.md.
# ==============================================================================

backup_schedule_hour: 3                          # local-time 03:00
backup_schedule_minute: 0
backup_target_bucket: "backups"
backup_target_endpoint: "http://127.0.0.1:9010"  # RustFS S3 API
backup_target_access_key: "{{ rustfs_access_key }}"
backup_target_secret_key: "{{ rustfs_secret_key }}"
backup_retention_daily: 7                        # last-N dailies
backup_retention_weekly: 4                       # last-N Sundays
backup_retention_monthly: 12                     # last-N month-firsts
backup_volumes_to_dump:
  - mariadb_data                                 # extend as more services migrate to named volumes
backup_databases_mariadb: true
backup_databases_postgresql: true
backup_authentik_blueprints: "{{ install_authentik | default(false) }}"
backup_overwrite_same_day: true
backup_run_now: false
backup_status_file: "{{ ansible_facts['env']['HOME'] }}/.nos/backup-status.json"
backup_log_file: "{{ ansible_facts['env']['HOME'] }}/.nos/backup.log"

# Consumed by Alloy's textfile collector (Agent A1 + C3).
node_exporter_textfile_dir: "/var/lib/node_exporter/textfile"
