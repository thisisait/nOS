---
# ==============================================================================
# GLOBAL PASSWORD SETTINGS
# Prefix for all default passwords. Format: [prefix]_pw_[service]
# On first run override the prefix in credentials.yml or set custom passwords.
# ==============================================================================

global_password_prefix: "changeme"

# ==============================================================================
# INSTANCE IDENTITY & FLEET
# Each box has a unique identity. Provider (thisisait.eu) manages the fleet.
# ==============================================================================

instance_name: "nos"                # Unique instance name (lowercase, no spaces)

# ── Domain composition (Track F decomposition, 2026-05) ──────────────────────
# Three vars compose every nOS hostname. Defaults reproduce today's flat layout
# (`<svc>.dev.local`, `<svc>.apps.dev.local`); set `host_alias` to slot a
# per-host segment between the service name and the rest (lab/factory/branch).
#
#   Tier-1 service host:  <svc>[.<host_alias>].<tenant_domain>
#   Tier-2 app host:      <svc>[.<host_alias>].<apps_subdomain>.<tenant_domain>
#
# Examples (tenant_domain=dev.local, apps_subdomain=apps):
#   host_alias=""    → bone.dev.local           |  documenso.apps.dev.local
#   host_alias="lab" → bone.lab.dev.local       |  documenso.lab.apps.dev.local
#
# `instance_tld` is kept as a backwards-compat shim that resolves to
# `tenant_domain`; existing consumers (179 occurrences across 69 files at the
# Track-F kickoff) continue to work unchanged. Phase 3 of Track F migrates
# them to the explicit segment layout. See docs/operator-domain-naming.md.
tenant_domain: "dev.local"                # Primary TLD; all FQDNs resolve here
host_alias: ""                            # Per-host segment ("" drops it; "lab" yields bone.lab.dev.local)
apps_subdomain: "apps"                    # Subdomain segment for Tier-2 apps (Coolify-imported et al.)

# Normalize host_alias by stripping leading/trailing dots. Operators may
# accidentally type '.lab' or 'lab.' — both should produce a clean '.lab'
# segment without double-dot artefacts in the rendered FQDN.
_host_alias_normalized: "{{ host_alias | default('') | regex_replace('^\\.+|\\.+$', '') }}"

# Helper: ".<host_alias>" when host_alias is set, "" otherwise. Consumer
# templates compose hostnames as: "<svc>{{ _host_alias_seg }}.{{ tenant_domain }}".
_host_alias_seg: "{{ ('.' + _host_alias_normalized) if (_host_alias_normalized | length > 0) else '' }}"

# Same normalization for apps_subdomain — operators may type 'apps.' or '.apps';
# Tier-2 Jinja consumers (mkcert SANs, ACME domains list) should both render cleanly.
_apps_subdomain_normalized: "{{ apps_subdomain | default('apps') | regex_replace('^\\.+|\\.+$', '') }}"

# Backwards-compat shim — Phase 3 will migrate consumers to tenant_domain
# directly, then this can be removed in a follow-up cleanup commit.
instance_tld: "{{ tenant_domain }}"

default_admin_email: "admin@{{ tenant_domain | default('dev.local') }}"  # Fallback admin email for all services

# ── TLD class detection (drives mkcert vs ACME, dnsmasq vs real DNS) ─────────
# tenant_domain_is_local: true  → use mkcert + dnsmasq + /etc/resolver (dev mode)
#                        false → use ACME (Let's Encrypt) + public DNS (prod mode)
# Heuristic: anything ending in .local, .lan, .test, .localhost, or literally
# 'localhost' is treated as local. Everything else is assumed public.
# Override with `-e tenant_domain_is_local=false` if you want to force ACME on
# a custom local TLD (e.g. if you have your own internal CA).
tenant_domain_is_local: "{{ (tenant_domain | regex_search('\\.(local|lan|test|localhost)$|^localhost$')) is not none }}"
instance_tld_is_local: "{{ tenant_domain_is_local }}"  # Backwards-compat shim

# ── TLS cert paths ───────────────────────────────────────────────────────────
# Cert tree lives under the infra stack dir. mkcert writes here for local
# TLDs; pazny.acme symlinks LE certs here for public TLDs. Traefik mounts
# this dir as /certs:ro; host nginx (if enabled) reads the same paths.
tls_cert_dir: "{{ stacks_dir }}/infra/tls"
# Cert filename uses the wildcard zone apex (host_alias.tenant_domain when
# host_alias is set, else just tenant_domain). Keeps one cert file per fleet
# box so multiple host_alias deploys against the same tenant_domain coexist.
_acme_zone: "{{ ((_host_alias_normalized + '.') if (_host_alias_normalized | length > 0) else '') + tenant_domain }}"
ssl_cert_path: "{{ tls_cert_dir }}/{{ 'local-dev.crt' if tenant_domain_is_local else 'acme/' + _acme_zone + '.crt' }}"
ssl_cert_key: "{{ tls_cert_dir }}/{{ 'local-dev.key' if tenant_domain_is_local else 'acme/' + _acme_zone + '.key' }}"

# ── ACME (Let's Encrypt) — auto-enabled for public TLDs ──────────────────────
# Wildcard cert *{host_alias_seg}.{tenant_domain} (+ Tier-2 wildcard) via
# DNS-01 challenge to Cloudflare. Keys & state stored at ~/.acme.sh/, certs
# symlinked into nginx/ssl/acme/.
install_acme: "{{ not (tenant_domain_is_local | bool) }}"
acme_provider: "cloudflare"               # cloudflare | manual | http
acme_email: "{{ default_admin_email }}"
acme_renewal_days: 60                     # Re-issue when cert expires within N days
acme_staging: false                       # true → use LE staging endpoint (testing)
# Cloudflare API token with "Zone:DNS:Edit" + "Zone:Zone:Read" — set in
# credentials.yml as `acme_cloudflare_api_token`. Not defined here to
# prevent the empty default silently shadowing a credentials.yml value
# on machines where credentials.yml was just created (blank first run).

# Hybrid mode — keep dnsmasq + /etc/resolver active even on a public TLD so
# `*.pazny.eu` resolves to 127.0.0.1 locally while public DNS (Cloudflare)
# can independently point at the home IP for external clients later. Useful
# for staged transitions where you want a valid LE cert + real domain
# identity NOW but aren't yet ready to expose ports / set CF A records.
# Default false (clean separation: local TLD → dnsmasq, public TLD → real DNS).
dnsmasq_force_local_domains: false
instance_org: ""                          # Client organization name
instance_location: ""                     # Location (e.g. "Prague, CZ")
instance_role: "standalone"               # standalone | headquarters | factory | office | division
instance_parent: ""                       # Slug of parent box (for hierarchy)

# ── Playbook behavior ─────────────────────────────────────────────────────────
# Fail playbook if any `docker compose up <stack>` returns non-zero exit.
# Default true — silent stack bringup failures (image pull errors, port
# collisions) previously got masked by `failed_when: false` on the shell task;
# this turns them into hard errors so they're visible. Set false to tolerate
# partial stack failures (e.g., `-e fail_on_stack_errors=false` during debug).
fail_on_stack_errors: true

# ── Fleet / Heartbeat ────────────────────────────────────────────────────────
configure_heartbeat: false                # Heartbeat daemon for fleet reporting
heartbeat_endpoint: ""                    # URL of the fleet management server
heartbeat_interval: 300                   # Interval in seconds (5 minutes)
heartbeat_api_key: "{{ global_password_prefix }}_pw_heartbeat"

# ── Bone (local FastAPI — structure/state/dispatcher organ) ──────────────────
# Formerly BoxAPI. See docs/anatomy.md.
install_bone: true                        # FastAPI management API — required for Wing telemetry sink
bone_port: 8099
bone_domain: "api{{ _host_alias_seg }}.{{ tenant_domain }}"
bone_secret: "{{ global_password_prefix }}_pw_bone"
# HMAC secret for /api/v1/events ingestion. Both sides (Bone server +
# apps_runner client + callback_plugins/wing_telemetry.py) MUST share this.
# Default mirrors bone_secret so the symmetry holds without operator setup.
# Override in credentials.yml for stronger hardening (recommended: 32+
# random bytes — see docs/secrets-hardening.md once it lands).
wing_events_hmac_secret: "{{ bone_secret }}"

# ── Pulse (host launchd — scheduled-job daemon, A4 of bones-and-wings) ───────
# Local Python daemon that polls Wing API for due jobs and fires them.
# A4 PoC (2026-05-03): non-agentic only; agent runner lands in A8.
# Anatomy default is ON — Pulse is part of the nOS skeleton (not opt-in).
# Wing API endpoints (/api/v1/pulse_jobs/due, /pulse_runs/start|finish)
# return 404 today and Pulse idle-tolerates that gracefully (warns once
# per minute, no crash-loop). Endpoints land alongside A7 (gitleaks plugin).
install_pulse: true

# wing_telemetry_enabled lives in main.yml as a PLAY-level var (not here)
# because Ansible callback plugins can only see play.get_vars(), not the
# vars_files-loaded scope. Override per-run with `-e wing_telemetry_enabled=false`.

# ── Mailpit (dev SMTP capture-all + modern web UI) ───────────────────────────
# Default ON — every other service relays SMTP into mailpit:1025 inside the
# iiab_net docker network. UI at https://mail.<tld>, gated by Authentik
# forward_auth (Tier 2 manager). See roles/pazny.mailpit/README.md.
install_mailpit: true                     # SMTP sink + web UI for dev mail capture
mailpit_domain: "mail{{ _host_alias_seg }}.{{ tenant_domain }}"
mailpit_smtp_port: 1025                   # Apps relay here (mailpit:1025 inside iiab_net)
mailpit_ui_port: 8025                     # Web UI + REST API port (nginx fronts at mail.<tld>)

# ── Stalwart Mail Server (production SMTP / IMAP / JMAP — Track G) ──────────
# Disabled by default. Enable AFTER:
#   1. tenant_domain switched to a public TLD (your real domain)
#   2. pazny.acme has issued the wildcard cert via Cloudflare DNS-01
#   3. CF DNS records added: MX, A mail.<td>, SPF/DKIM/DMARC TXT
#   4. router/Tailscale Funnel forwards 25/465/587/993 to host
# When install_smtp_stalwart is on, role refuses to render on a local TLD
# (Mailpit covers dev capture). See roles/pazny.smtp_stalwart/defaults
# and docs/operator-domain-switch.md.
install_smtp_stalwart: false

# ── Mastodon (ActivityPub federation — future-proofing flag, Track G) ───────
# Off by default; role doesn't exist yet. Reserved here so config.yml /
# operator overrides validate cleanly + the flag is discoverable. Full
# implementation lands as roles/pazny.mastodon when operator commits the
# bsky+mastodon dual-federation work (post-PoC).
#
# When enabled it'll need: PostgreSQL + Redis (already on) + dedicated S3
# bucket (rustfs or external) + DNS for mastodon.<tenant_domain> +
# ACME wildcard cert. See docs/operator-domain-switch.md for prep.
install_mastodon: false
mastodon_domain: "social{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"

# ── Watchtower (Docker image freshness watcher) ──────────────────────────────
# Default ON in NOTIFY-ONLY mode — surfaces stale images in Mailpit without
# auto-restarting anything. Stateful upgrades stay manual via upgrade
# recipes. See roles/pazny.watchtower/defaults/main.yml for tuning.
install_watchtower: true                  # Docker image drift watcher
watchtower_mode: "notify"                 # notify | apply (per-host opt-in)

# ── Provider Access ──────────────────────────────────────────────────────────
provider_admin_email: ""                  # Provider (thisisait.eu) email — same rights as CEO
provider_tailscale_tag: "tag:provider"    # Tailscale ACL tag for the provider

# ── Backup (Restic) ──────────────────────────────────────────────────────────
configure_backup: false
restic_repo: ""                           # "/Volumes/Backup/restic" | "s3:endpoint/bucket" | "sftp:user@host:/path"
restic_password: "{{ global_password_prefix }}_pw_restic"
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_backup_schedule_hour: 3            # Hour of daily backup (0-23)

# ── Vulnerability Scanner (NOS Security Auditor) ─────────────────────────────
configure_vulnerability_scan: false
vulnscan_schedule_hours: [6, 18]          # 2x per day: 06:00 and 18:00
vulnscan_batch_size: 5                    # Number of components per scan run

# ── Version Policy ────────────────────────────────────────────────────────────
# "stable" = pinned CVE-patched versions (default, recommended for production)
# "latest" = always pull newest available images/packages
# "lts"    = LTS/stable release branches for databases and core infra;
#            stable pins for services without LTS concept
#
# Per-service override: set individual *_version variables in config.yml
#
# Usage:
#   ansible-playbook main.yml -K                          # stable (default)
#   ansible-playbook main.yml -K -e version_policy=latest # latest
#   ansible-playbook main.yml -K -e version_policy=lts    # lts
#   ./security-update.sh                                  # security-only update
version_policy: "stable"

# ── Docker Resource Limits ────────────────────────────────────────────────────
# mem_limit per service tier. Override per service: {service}_mem_limit
docker_mem_limit_heavy: "4g"             # GitLab
docker_mem_limit_critical: "2g"          # Authentik, ERPNext, Nextcloud, Grafana
docker_mem_limit_standard: "1g"          # most services
docker_mem_limit_light: "512m"           # Redis, Kiwix, Tileserver, exporters
docker_cpus_heavy: "2.0"
docker_cpus_standard: "1.0"
docker_cpus_light: "0.5"

# ==============================================================================
# INSTALLATION QUEUE
# Comment out (#) any line to SKIP that component during provisioning.
# ==============================================================================

# ── Homebrew & Apps ───────────────────────────────────────────────────────────
install_homebrew_packages: true   # CLI tools (including build tools: cmake, ninja, llvm...)
install_cask_apps: true           # GUI applications via Homebrew Cask
install_mas_apps: false           # Mac App Store applications

# ── Reverse proxy ─────────────────────────────────────────────────────────────
# Traefik is the edge proxy (binds 80/443). It auto-discovers Tier-2 apps
# via Docker labels and routes Tier-1 services from a file provider that
# pazny.traefik renders out of state/manifest.yml + the install_* flags.
#
# install_nginx is for operators who want a thin host-side nginx alongside
# Traefik — e.g. for SCRIPT_FILENAME flows that tunnel through the legacy
# vhost templates under templates/nginx/sites-available/. When enabled,
# nginx starts EMPTY: the operator opts in per-vhost via `nginx_sites_enabled`
# (no auto-derivation from install_* flags). install_nginx + install_traefik
# both true is rejected — they would collide on 80/443.
install_nginx: false

# Track C+D (2026-04-26): Linux-only flags. Ignored on macOS.
install_docker: true              # Linux: install Docker CE + compose plugin via APT
install_hardening: true           # Linux: ANSSI baseline (ufw + fail2ban + sysctl + auditd + apparmor + chrony + ssh + unattended). Decision O5: default ON, opt-out via this flag.

# ── Languages / runtimes ──────────────────────────────────────────────────────
# PHP at the host level is no longer needed by default — Track A (2026-04-26)
# moved Wing's PHP-FPM into a container and Composer runs inside that
# container via the wing-cli sidecar. Re-enabling this flag will install
# Homebrew php@8.3 + start its launchd service, which then steals port 9000
# from the Wing container (FPM upstream `php_fpm` in nginx is also at :9000).
# Only flip this back to true if you have host-side PHP needs that don't go
# through Wing.
install_php: false                # PHP 8.x + PHP-FPM + Composer (host) — Track A makes this superfluous
install_node: true                # Node.js + NVM + global npm packages
install_bun: true                 # Bun JavaScript runtime / bundler
install_python: true              # Python + pyenv + pip packages
install_golang: true              # Go language + gopls, golangci-lint, air
install_dotnet: true              # .NET SDK (C#, F#) + EF CLI

# ── AI Agent ──────────────────────────────────────────────────────────────────
install_openclaw: true            # OpenClaw (Inspektor Klepitko, Ollama, no API key)
install_hermes: false             # Hermes Agent (Nous) – Python daemon, MCP client, cross-channel gateway
install_opencode: false           # OpenCode AI coding TUI (sst.dev) with local Ollama provider
install_pi_agents: false          # PI agent framework + pi-autoresearch extension (pi.dev)
install_backup: true             # pazny.backup — nightly DB + volumes + blueprints → RustFS (launchd agent)
install_wing: true           # Wing Security Dashboard + Hub (Nette PHP + SQLite) [requires: php, nginx]
install_playwright_tests: false   # Playwright e2e tests under files/anatomy/wing/tests (smoke + first-admin provisioning)

# ── macOS system configuration ────────────────────────────────────────────────
configure_dotfiles: false         # Dotfiles – requires your own repo! Set dotfiles_repo in credentials.yml
configure_terminal: true          # Terminal theme
configure_osx: true               # Base macOS defaults (.osx script)
configure_macos_defaults: true    # Extended macOS settings (Finder, keyboard, Dock...)
configure_dock: false             # Dock layout (requires dockutil)
configure_sudoers: false          # Custom sudoers rules
configure_sublime: false          # Sublime Text editor
install_shell_extras: true        # Starship prompt + shell aliases (bat, eza, fzf, zoxide, lazygit)

# ── System services (require sudo) ────────────────────────────────────────────
enable_ssh: false                 # Remote Login / SSH server
enable_samba: false               # File sharing via SMB (Windows/Linux)
enable_vnc: false                 # Screen sharing (VNC / Apple Remote Desktop)
enable_remote_management: false   # Apple Remote Desktop (ARD) – full management

# ── Observability – Grafana LGTM stack ────────────────────────────────────────
install_observability: true       # Grafana + Prometheus + Loki + Tempo + Alloy
install_influxdb: false           # InfluxDB 2.x – time-series DB [Docker]

# ── IIAB – self-hosted knowledge & productivity services ──────────────────────
# Requires: install_nginx: true, install_php: true
install_mariadb: true            # MariaDB database (required for WordPress + Nextcloud)
install_wordpress: false          # WordPress CMS            [requires: mariadb, php, nginx]
install_nextcloud: true          # Nextcloud – self-hosted cloud  [requires: mariadb, php, nginx]
install_kiwix: true              # Kiwix – offline Wikipedia, Gutenberg, ZIM  [requires: Docker]
install_offline_maps: false       # Offline maps – tileserver-gl + MBTiles    [requires: node]
install_n8n: true                # n8n – workflow automation                  [requires: Docker]
install_gitea: true              # Gitea – self-hosted Git server             [Homebrew]
install_gitlab: false             # GitLab CE – full DevOps platform           [requires: Docker, ~4 GB RAM]
install_woodpecker: false         # Woodpecker CI – CI/CD for Gitea            [requires: Docker, Gitea OAuth2]
install_openwebui: true          # Open WebUI – chat UI for Ollama            [requires: Docker, Ollama]
install_mcp_gateway: false        # mcpo – MCP-to-OpenAPI proxy for OpenWebUI  [Docker, requires: Open WebUI]
install_portainer: true          # Portainer CE – Docker management UI        [requires: Docker]
install_spacetimedb: false       # SpacetimeDB Standalone – realtime DB (BSL 1.1, internal-SaaS use only) [Docker]
install_jellyfin: false           # Jellyfin – media server                    [requires: Docker]
install_uptime_kuma: true        # Uptime Kuma – monitoring dashboard         [requires: Docker]
install_calibreweb: true         # Calibre-Web – ebook server                [requires: Docker, calibre]
install_ntfy: false               # ntfy – push notifications server [Docker]
install_miniflux: false           # Miniflux – RSS reader [Docker, requires: PostgreSQL]
install_nodered: false            # Node-RED – flow automation [Docker]
install_traefik: true            # Traefik – edge reverse proxy (file + Docker providers) [Docker]
install_homeassistant: false      # Home Assistant – home automation                        [Docker]
install_rustfs: true             # RustFS – S3-compatible object storage (drop-in MinIO)   [Docker]

# ── B2B stack (CRM/ERP/helpdesk/chat/wiki) ──────────────────────────────────
install_erpnext: false            # ⚠️  EXPERIMENTAL / NON-WORKING — see roles/pazny.erpnext/README.md (parked for rework, hard-blocked at role-load: requires erpnext_experimental_override: true to attempt enable)
install_freescout: true          # FreeScout – helpdesk / ticketing                    [requires: MariaDB]
install_mattermost: false        # Mattermost – REMOVED (no ARM64 FOSS image). DB/user retained for migration.
install_outline: true            # Outline – team wiki / knowledge base                [requires: PostgreSQL, Redis Docker]
install_hedgedoc: false           # HedgeDoc – collaborative markdown [Docker, requires: PostgreSQL]
install_bookstack: false          # BookStack – wiki platform [Docker, requires: MariaDB]
install_firefly: false            # Firefly III – personal finance [Docker, requires: MariaDB, Redis]
install_onlyoffice: false         # ONLYOFFICE Document Server [Docker]

# ── VoIP stack (telecommunications) ──────────────────────────────────────────
install_freepbx: false            # FreePBX + Asterisk – PBX / call center              [Docker]

# ── Engineering stack (HW/CAD/GIS) ───────────────────────────────────────────
install_qgis_server: false        # QGIS Server – GIS map server                        [Docker]
install_engineering_apps: false   # KiCad, FreeCAD, Arduino IDE                          [Homebrew Cask]

# ── Data stack (analytics/BI) ────────────────────────────────────────────────
install_metabase: true           # Metabase – BI dashboards                             [requires: PostgreSQL]
install_superset: true           # Apache Superset – data visualization                 [requires: PostgreSQL, Redis Docker]

# ── IIAB Terminal (public SSH TUI hub) ────────────────────────────────────────
install_iiab_terminal: false      # TUI access via SSH for anyone on LAN [requires: SSH]

# ── Web desktop ───────────────────────────────────────────────────────────────
install_puter: true              # Puter – cloud OS web desktop (multi-user, AI, iframe apps) [Docker]

# ── AI orchestration ──────────────────────────────────────────────────────────
install_paperclip: true          # Paperclip – multi-agent orchestration platform [requires: PostgreSQL]
install_code_server: false        # code-server – VS Code in the browser [Docker]

# ── IAM & Secrets ─────────────────────────────────────────────────────────────
install_authentik: true          # Authentik – SSO/IdP (OIDC/SAML/LDAP) for all services [requires: PostgreSQL, Redis]
install_infisical: true          # Infisical CE – central secrets vault with REST API + CLI [requires: PostgreSQL, Redis]
install_vaultwarden: true        # Vaultwarden – Bitwarden-compatible personal password vault [Docker]

# ── Identity / federation ─────────────────────────────────────────────────────
install_bluesky_pds: true        # Bluesky PDS – AT Protocol identity server (SSO @user.dev.local)

# ── Network / access ──────────────────────────────────────────────────────────
install_tailscale: true           # Tailscale – WireGuard mesh VPN (remote access to all services)
install_dnsmasq: true             # dnsmasq – auto *.dev.local DNS (no /etc/hosts edits)

# ==============================================================================
# HOMEBREW – general settings
# ==============================================================================

homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['machine'] == 'arm64' else '/usr/local' }}"

# Docker Desktop installs binaries into /usr/local/bin regardless of architecture
docker_bin: /usr/local/bin/docker

homebrew_installed_packages:
  # Base tools
  - autoconf
  - bash-completion
  - git
  - gh
  - gpg
  - wget
  - curl
  - jq
  - yq
  - htop
  - tmux
  - tree
  - pv
  - watch
  - readline
  - openssl
  - libevent
  - sqlite
  - gettext
  - ssh-copy-id
  - zsh-history-substring-search
  # Network / diagnostics
  - nmap
  - httpie
  - iperf
  - wrk
  - mkcert               # local SSL certificates
  - nss                  # mkcert backend
  # Media
  - gifsicle
  - pngpaste
  - doxygen
  # Development tools (included even if a specific stack is skipped)
  - git-lfs
  - pre-commit
  - act                  # GitHub Actions locally
  # ── Modern CLI replacements ──────────────────────────────────────────────
  - ripgrep              # rg  – faster grep (regex, .gitignore-aware)
  - fd                   # fd  – faster find
  - bat                  # bat – cat with syntax highlighting + git diff
  - eza                  # eza – modern ls (icons, trees, git status)
  - fzf                  # fzf – fuzzy finder (Ctrl+R history, Ctrl+T files)
  - zoxide               # z   – smart cd (weights by history)
  - starship             # starship – GPU-fast cross-shell prompt
  - lazygit              # lazygit – TUI for git (add/commit/push/merge)
  - ncdu                 # ncdu – interactive disk usage TUI
  - duf                  # duf  – modern df (disk overview)
  - tldr                 # tldr – shortened man pages with examples
  - hyperfine            # hyperfine – CLI benchmarking
  # ── Media (Blender renders, FL Studio exports, video workflow) ────────────
  - ffmpeg               # ffmpeg – audio/video conversion (needed for Blender+FL)
  - imagemagick          # convert – batch image processing
  - yt-dlp               # yt-dlp – video/audio download from YT and others
  - exiftool             # exiftool – read/write media metadata
  # ── Databases ────────────────────────────────────────────────────────────
  - redis                # Redis – in-memory cache + pub/sub (projects, Nextcloud)
  # ── Backups and maintenance ──────────────────────────────────────────────
  - restic               # Restic – encrypted backups (Backblaze B2, SFTP, local disk)
  - mac-cleanup-go       # TUI macOS cleaner – cache, logs, Xcode, brew (github.com/2ykwang/mac-cleanup-go)
  # ── Security research tools (SBOM, SAST, secrets, CVE scan) ──────────────
  - trivy                # Trivy – vulnerability scanner (Docker images, FS, IaC, SBOM)
  - grype                # Grype – CVE scanner against SBOM / image
  - syft                 # Syft – SBOM generator (produces SPDX/CycloneDX for grype)
  - gitleaks             # Gitleaks – detection of secrets in git history
  - nuclei               # Nuclei – template-based vulnerability scanner (web/API)
  - semgrep              # Semgrep CE – SAST / pattern-based static analysis
  # ── Self-hosted CLI / agents ─────────────────────────────────────────────
  - ntfy                 # ntfy – CLI client for push notifications (server is a Docker role)
  - opencode             # OpenCode – AI-first terminal code agent (SST)
  # ── Build tools – NOT toggleable, required by other tools ────────────────
  # cmake:      Ollama build, native Python/Node extensions (numpy, sharp...)
  # ninja:      Fast build system (cmake backend, meson backend)
  # llvm:       Clang/LLVM – required by kiwix-tools build, some Rust crates
  # ccache:     Compiler cache – speeds up repeated compilation 5–10x
  # pkg-config: Library dependency management (required for many brew --HEAD formulas)
  # libomp:     OpenMP parallelism – Ollama CPU inference, numpy, scipy
  # openblas:   BLAS/LAPACK – numpy, scipy, ML workloads without GPU
  # protobuf:   Protocol Buffers – gRPC, ONNX, TFLite, OpenClaw tools
  # meson:      Build system (kiwix-tools, libzim)
  - cmake
  - ninja
  - llvm
  - ccache
  - pkg-config
  - libomp
  - openblas
  - protobuf
  - meson

# ── FrankenPHP — Wing host runtime (anatomy A3.5, 2026-05-04) ────────────────
# FrankenPHP = single binary bundling Caddy HTTP server + PHP runtime + Mercure +
# Vulcain. Replaces the wing PHP-FPM container + wing-nginx sidecar pair with a
# host-native launchd daemon listening on 127.0.0.1:9000. Ships PHP 8.5 +
# Caddy 2.x; Wing's composer.json minimum is PHP 8.3 — backward compatible.
#
# The frankenphp formula depends on shivammathur/php's php-zts (PHP-ZTS variant
# required for FrankenPHP's worker mode). The shivammathur tap is added here
# unconditionally — the formula itself only links if frankenphp is also in
# `homebrew_installed_packages` AND install_wing is true (gate in
# pazny.wing/tasks/main.yml).
homebrew_taps:
  - dunglas/frankenphp
  - shivammathur/php

homebrew_cask_appdir: /Applications
homebrew_cask_accept_external_apps: true

