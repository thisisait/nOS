# ── Authentik RBAC skupiny (vytvorene automaticky pri blank run) ──────────────
authentik_default_groups:
  - name: "devboxnos-providers"
    description: "Provider admins (full remote access, same as CEO)"
  - name: "devboxnos-admins"
    description: "Client CEO/CTO (full local + remote access)"
  - name: "devboxnos-managers"
    description: "Division/department managers"
  - name: "devboxnos-users"
    description: "Standard employees"
  - name: "devboxnos-guests"
    description: "Guest access (IIAB terminal only)"

# ── Authentik RBAC tiers (group → application access) ──────────────────────────
# Tier 1 = admin only, Tier 4 = guest/public. Higher tier = broader access.
# Policies auto-created by Authentik Blueprints (templates/authentik/blueprints/20-rbac-policies.yaml.j2).
authentik_rbac_tiers:
  - tier: 1
    name: "tier-admin"
    description: "Admin-only services (infrastructure, secrets, monitoring)"
    groups: ["devboxnos-providers", "devboxnos-admins"]
  - tier: 2
    name: "tier-manager"
    description: "Manager+ services (dev tools, analytics, automation)"
    groups: ["devboxnos-providers", "devboxnos-admins", "devboxnos-managers"]
  - tier: 3
    name: "tier-user"
    description: "Standard employee services (productivity, collaboration)"
    groups: ["devboxnos-providers", "devboxnos-admins", "devboxnos-managers", "devboxnos-users"]
  - tier: 4
    name: "tier-guest"
    description: "Guest/public access (content, media)"
    groups: ["devboxnos-providers", "devboxnos-admins", "devboxnos-managers", "devboxnos-users", "devboxnos-guests"]

# Mapování slug → tier. Služby bez záznamu = tier 3 (výchozí = user+).
authentik_app_tiers:
  portainer: 1
  infisical: 1
  grafana: 1
  gitea: 2
  gitlab: 2
  n8n: 2
  superset: 2
  metabase: 2
  paperclip: 2
  erpnext: 2
  freescout: 2
  nextcloud: 3
  outline: 3
  open-webui: 3
  puter: 3
  vaultwarden: 3
  uptime-kuma: 3
  calibre-web: 3
  home-assistant: 3
  kiwix: 4
  jellyfin: 4
  glasswing: 1
  wordpress: 4
  code-server: 1
  influxdb: 1
  ntfy: 2
  nodered: 2
  firefly: 2
  miniflux: 3
  hedgedoc: 3
  bookstack: 3
  onlyoffice: 3

# ── OIDC Service Registry (single source of truth) ──────────────────────────
# Authentik post-start automaticky vytvoří OIDC providery + aplikace.
# Compose templates referencují {{ authentik_oidc_apps[N].client_id }} atd.
# Pro přidání nové služby: přidej entry sem + OIDC env vars do compose.
authentik_oidc_apps:
  - name: "Grafana"
    slug: "grafana"
    enabled: "{{ install_observability | default(true) }}"
    client_id: "devboxnos-grafana"
    client_secret: "{{ global_password_prefix }}_pw_oidc_grafana"
    redirect_uris: "https://{{ grafana_domain | default('grafana.dev.local') }}/login/generic_oauth"
    launch_url: "https://{{ grafana_domain | default('grafana.dev.local') }}"
  - name: "Gitea"
    slug: "gitea"
