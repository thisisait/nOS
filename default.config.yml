# ==============================================================================
# OPENCLAW – self-hosted AI agent (Ollama backend, no API key)
# Documentation: https://github.com/openclaw/openclaw
# Ollama integration: https://ollama.com/blog/openclaw
# ==============================================================================

# User and home directory for the agentic environment
openclaw_user: "{{ ansible_facts['user_id'] }}"
openclaw_base_dir: "{{ ansible_facts['env']['HOME'] }}"

# Agent system directories
openclaw_agents_dir: "{{ ansible_facts['env']['HOME'] }}/agents"         # agent installation, configuration
openclaw_projects_dir: "{{ ansible_facts['env']['HOME'] }}/projects"     # projects hosted via nginx
openclaw_log_dir: "{{ ansible_facts['env']['HOME'] }}/agents/log"        # structured .md logs

# OpenClaw configuration (~/.openclaw/)
openclaw_config_dir: "~/.openclaw"

# Ollama model – recommended for 36GB RAM: qwen3:14b
# Alternatives: qwen3.5:14b (faster), llama3.3:70b (stronger, slower)
# Since Ollama 0.19 the MLX backend is used automatically on Apple Silicon
# (57% faster prefill, 93% faster decode vs llama.cpp)
openclaw_model: "qwen3:14b"
ollama_max_loaded_models: 1    # Max models in RAM (1 = saves SWAP on 36GB)
ollama_num_parallel: 2         # Max parallel inference requests
ollama_keep_alive: "5m"        # Release model from RAM after idle (default 5m, 0 = immediate)
ollama_flash_attention: 1      # Flash attention for MLX (faster, less memory)

# Run openclaw as a launchd daemon (always running, autorestart)
openclaw_install_daemon: true
openclaw_domain: "claw{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
openclaw_gateway_port: 18789

# Agent name (persona)
openclaw_agent_name: "Inspektor Klepítko"

# Concurrent sub-agents
openclaw_max_concurrent_agents: 4
openclaw_max_concurrent_subagents: 8

# ==============================================================================
# PI AGENTS – coding agent framework (pi.dev / @mariozechner/pi-coding-agent)
# Documentation: https://github.com/badlogic/pi-mono
# Autoresearch extension: https://github.com/davebcn87/pi-autoresearch
# ==============================================================================

# PI agent directory
pi_config_dir: "{{ ansible_facts['env']['HOME'] }}/.pi/agent"

# Install pi-autoresearch extension (optimization loop for experiments)
pi_install_autoresearch: true

# ==============================================================================
# DOTFILES
# ==============================================================================

dotfiles_repo: https://github.com/geerlingguy/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/Development/GitHub/dotfiles
dotfiles_repo_version: master
dotfiles_files:
  - .zshrc
  - .gitignore
  - .inputrc
  - .osx
  - .vimrc

# ==============================================================================
# macOS DEFAULTS (.osx script)
# ==============================================================================

osx_script: "~/.osx --no-restart"

sudoers_custom_config: ""
# sudoers_custom_config: |
#   %admin ALL=(ALL) NOPASSWD: ALL

# ==============================================================================
# macOS EXTENDED SETTINGS (configure_macos_defaults)
# Automates everything from "Manual settings to automate someday" + developer defaults
# ==============================================================================

# ── Finder ────────────────────────────────────────────────────────────────────
macos_finder_show_hidden_files: true          # Show hidden files (Cmd+Shift+.)
macos_finder_show_extensions: true           # Show file extensions
macos_finder_show_path_bar: true             # Show path bar at the bottom
macos_finder_show_status_bar: true           # Show status bar at the bottom
macos_finder_disable_desktop_click: true     # Disable click-to-show-desktop (Stage Manager)
macos_finder_default_search_scope: "SCcf"   # Search in current folder (SCcf) / computer (SCev)
macos_finder_show_posix_path_title: false    # Show POSIX path in title bar

# ── Keyboard ──────────────────────────────────────────────────────────────────
macos_keyboard_repeat_rate: 2        # 0=fastest ... 120=slowest (2 = Fast)
macos_keyboard_repeat_delay: 15      # 0=shortest ... 120=longest (15 = Short)
macos_keyboard_press_hold: false     # false = key repeat (not accent menu)
# Caps Lock → Esc: CANNOT be fully automated (HW-specific IOKit), see README

# ── Accessibility ─────────────────────────────────────────────────────────────
macos_reduce_transparency: true      # Reduce transparency (performance)
macos_reduce_motion: false           # Reduce motion of animations

# ── Screenshot ────────────────────────────────────────────────────────────────
macos_screenshot_location: "~/Desktop"   # Where to save screenshots
macos_screenshot_format: "png"           # png | jpg | pdf | tiff

# ── Dock ──────────────────────────────────────────────────────────────────────
macos_dock_autohide: true            # Automatically hide the Dock
macos_dock_show_recents: false       # Do not show recent applications
macos_dock_tilesize: 48              # Icon size (pixels)
macos_dock_minimize_effect: "scale"  # genie | scale

# ── Safari (developer) ────────────────────────────────────────────────────────
macos_safari_show_status_bar: true        # Show status bar
macos_safari_show_full_url: true          # Show full URL
macos_safari_developer_menu: true         # Enable Developer menu
# Note: Userscripts (Return YouTube Dislike) must be installed manually

# ── Terminal ──────────────────────────────────────────────────────────────────
macos_terminal_secure_keyboard: true  # Secure keyboard entry

# ── System ────────────────────────────────────────────────────────────────────
macos_computer_name: ""               # NetBIOS computer name; empty = use ansible_hostname
macos_disable_gatekeeper: false       # NOT RECOMMENDED – leave false for security
# Full Disk Access for Terminal: CANNOT be automated (SIP protected)
# The installer will ask for it on first run

# ==============================================================================
# SYSTEM SERVICES
# ==============================================================================

# SSH
ssh_port: 22
ssh_allow_groups: "admin staff"   # Groups with SSH access
ssh_password_auth: true           # true = password + keys; false = keys only (after ssh-copy-id)

# Samba / SMB
samba_workgroup: "WORKGROUP"
samba_shares:
  - name: "projects"
    path: "{{ ansible_facts['env']['HOME'] }}/projects"
    comment: "{{ ansible_facts['user_id'] }} projects"
    browseable: true
    writable: true

# VNC
vnc_password: "{{ global_password_prefix }}_pw_vnc"

# ==============================================================================
# DOCK
# ==============================================================================

dockitems_remove: []
dockitems_persist: []

# ==============================================================================
# SUBLIME TEXT
# ==============================================================================

sublime_base_path: "~/Library/Application Support/Sublime Text"
sublime_config_path: "Packages/User"
sublime_package_control:
  - "DocBlockr"
  - "Dockerfile Syntax Highlighting"
  - "FileDiffs"
  - "GitHub Flavored Markdown Preview"
  - "Jinja2"
  - "Package Control"
  - "Pretty JSON"
  - "SublimeLinter"
  - "SublimeLinter-contrib-yamllint"
  - "Theme - Cobalt2"
  - "TrailingSpaces"
  - "WordingStatus"

# ==============================================================================
# IIAB – MARIADB
# ==============================================================================

mariadb_root_password: "{{ global_password_prefix }}_pw_mariadb"   # OVERRIDE in credentials.yml!
mariadb_version: "11.8.6"               # CVE-2026-32710 fixed; bumped from 11.4.10 which crashed on FK ALTER on Apple Silicon Docker Desktop (broke BookStack migration #10)
mariadb_port: 3306
mariadb_data_dir: "{{ ansible_facts['env']['HOME'] }}/mariadb/data"   # data persistence outside the container

# ==============================================================================
# INFRA – POSTGRESQL (shared DB for Mattermost, Outline, Metabase, Superset)
# ==============================================================================

install_postgresql: false
postgresql_version: "16.13-alpine"      # CVE-2026-2005 (pgcrypto RCE), CVE-2026-2006 (multibyte RCE), CVE-2026-2004/2007 (buffer overflow). Was 16.10
postgresql_port: 5432
postgresql_root_user: "postgres"
postgresql_root_password: "{{ global_password_prefix }}_pw_postgresql"
postgresql_data_dir: "{{ ansible_facts['env']['HOME'] }}/postgresql/data"

# ==============================================================================
# INFRA – REDIS (Docker, alternative to Homebrew Redis)
# If redis_docker: true, Homebrew Redis is not used
# ==============================================================================

redis_docker: false                    # true = Redis in Docker (for cross-stack access)
redis_version: "7.4.6-alpine"           # CVE-2025-49844 (CVSS 10.0 RediShell RCE)
redis_data_dir: "{{ ansible_facts['env']['HOME'] }}/redis/data"

# ==============================================================================
# IIAB – MARIADB (continued)
# ==============================================================================

mariadb_databases:
  - name: "wordpress"
  - name: "nextcloud"
  - name: "freescout"
  - name: "erpnext"
  - name: "asterisk"
  - name: "bookstack"
  - name: "firefly"

mariadb_users:
  - name: "wordpress"
    password: "{{ wordpress_db_password }}"
    priv: "wordpress.*:ALL"
  - name: "nextcloud"
    password: "{{ nextcloud_db_password }}"
    priv: "nextcloud.*:ALL"
  - name: "freescout"
    password: "{{ freescout_db_password | default(global_password_prefix + '_pw_freescout') }}"
    priv: "freescout.*:ALL"
  - name: "erpnext"
    password: "{{ erpnext_admin_password | default(global_password_prefix + '_pw_erpnext') }}"
    priv: "erpnext.*:ALL"
  - name: "asterisk"
    password: "{{ freepbx_db_password | default(global_password_prefix + '_pw_freepbx') }}"
    priv: "asterisk.*:ALL"
  - name: "bookstack"
    password: "{{ bookstack_db_password | default(global_password_prefix + '_pw_bookstack') }}"
    priv: "bookstack.*:ALL"
  - name: "firefly"
    password: "{{ firefly_db_password | default(global_password_prefix + '_pw_firefly') }}"
    priv: "firefly.*:ALL"
  # mysqld-exporter (observability stack) — scraped by Grafana Alloy on the
  # observability_net via stacks_shared_network. Needs the three "slave"/monitoring
  # privileges that Percona/MariaDB's stock exporter queries require. Host "%" so
  # it works from any Docker network (exporter lives in the observability project).
  - name: "mysqld_exporter"
    password: "{{ mysqld_exporter_password | default(global_password_prefix + '_pw_mysqld_exporter') }}"
    host: "%"
    priv: "*.*:PROCESS,REPLICATION CLIENT,SELECT"

# ==============================================================================
# IIAB – WORDPRESS
# ==============================================================================

wordpress_domain: "wordpress{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
wordpress_dir: "{{ ansible_facts['env']['HOME'] }}/projects/wordpress"
wordpress_db_name: "wordpress"
wordpress_db_user: "wordpress"
wordpress_db_password: "{{ global_password_prefix }}_pw_wordpress"
wordpress_db_host: "127.0.0.1"          # ignored if install_mariadb=true (uses 'mariadb' from iiab_net)
wordpress_table_prefix: "wp_"
wordpress_version: "6.9.4"              # Docker image tag
wordpress_port: 8084                    # Local container port (nginx proxy)
wordpress_admin_user: "admin"
wordpress_admin_password: "{{ global_password_prefix }}_pw_wordpress_admin"
wordpress_admin_email: "{{ default_admin_email }}"

# ==============================================================================
# IIAB – NEXTCLOUD
# ==============================================================================

nextcloud_domain: "cloud{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
nextcloud_dir: "{{ ansible_facts['env']['HOME'] }}/projects/nextcloud"
nextcloud_data_dir: "{{ ansible_facts['env']['HOME'] }}/nextcloud-data"
nextcloud_db_name: "nextcloud"
nextcloud_db_user: "nextcloud"
nextcloud_db_password: "{{ global_password_prefix }}_pw_nextcloud"
nextcloud_db_host: "127.0.0.1"         # ignored if install_mariadb=true (uses 'mariadb' from iiab_net)
nextcloud_admin_user: "admin"
nextcloud_admin_password: "{{ global_password_prefix }}_pw_nextcloud_admin"
nextcloud_version: "stable"             # Docker image tag (stable / latest / 29)
nextcloud_port: 8085                    # Local container port (nginx proxy)

# ==============================================================================
# IIAB – KIWIX (offline Wikipedia, Gutenberg, ZIM files)
# Kiwix runs in a Docker container (simplest on macOS)
# ==============================================================================

kiwix_domain: "kiwix{{ _host_alias_seg | default('') }}.{{ tenant_domain | default('dev.local') }}"
kiwix_port: 8888                           # Local kiwix-serve port
kiwix_version: "3.8.2"                             # Docker image tag (ghcr.io/kiwix/kiwix-serve)
kiwix_data_dir: "{{ ansible_facts['env']['HOME'] }}/kiwix"       # Put .zim files here

# Init ZIM — downloaded automatically on first blank run so Kiwix can start
# with a working demo (no manual onboarding step). based-cooking is ~10 MB
# (recipe site) — fast on cold blank, validates UI render end-to-end. Set
# to "" in config.yml to opt out and rely on kiwix_zim_files / download-zim.sh.
# WARNING: large ZIMs (>50 MB) block the playbook for the full download duration.
kiwix_init_zim_url: "https://download.kiwix.org/zim/other/alpinelinux_en_all_maxi_2026-04.zim"
kiwix_init_zim_dest: "alpinelinux.zim"

# ZIM files to download (empty = do not download automatically)
# See: https://download.kiwix.org/zim/
kiwix_zim_files: []
# Examples (add to config.yml):
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_top_mini_2024-11.zim"
#   dest: "wikipedia_en_top_mini.zim"    # ~315 MB
# - url: "https://download.kiwix.org/zim/wikipedia/wikipedia_cs_all_mini_2024-11.zim"
