# ==============================================================================
# TAILSCALE – WireGuard mesh VPN
# After install: tailscale up (interactive browser login)
# Services then available via: http://mac-studio.<tailnet>.ts.net:<PORT>
# ==============================================================================

tailscale_accept_routes: false    # Accept subnet routes from other nodes
tailscale_exit_node: false        # Use this Mac as an exit node
# tailscale_auth_key: ""          # Pre-auth key for non-interactive setup (from admin console)
tailscale_hostname: ""            # Tailscale FQDN (e.g. mac-studio.tailnet-abc.ts.net) – homepage → Grafana
services_lan_access: false        # true = Docker services on 0.0.0.0 (access via Tailscale/LAN by ports)

# Alternative hosts for service access (LAN IP, Tailscale hostname/IP)
# Automatically added to nginx server_name + Nextcloud trusted_domains
service_extra_hosts: []
# service_extra_hosts:
#   - "192.168.1.64"
#   - "studio.tail9f5625.ts.net"
#   - "100.106.211.106"

# ==============================================================================
# POWER MANAGEMENT – pmset settings (only on AC power -c)
# Goal: display sleeps but the computer remains reachable on the network (Jellyfin, SSH, Grafana...)
# ==============================================================================

configure_power_management: true       # Configure pmset
blank_stop_timeout: 30                # Seconds to wait after docker compose down (blank reset)
pmset_sleep: 0                         # Computer never sleeps (0 = disabled)
pmset_displaysleep: 20                 # Display sleeps after 20 min
pmset_disksleep: 0                     # Disk never sleeps
pmset_womp: 1                          # Wake on LAN
pmset_tcpkeepalive: 1                  # Keep TCP connections during sleep
pmset_powernap: 1                      # Power Nap (background updates)
pmset_networkoversleep: 0              # Do not sleep NIC when display sleeps
pmset_ttyskeepawake: 1                 # TTY session prevents sleep

# ==============================================================================
# DNSMASQ – automatic *.dev.local DNS resolver
# Removes the need to manually edit /etc/hosts
# ==============================================================================

dnsmasq_dev_domain: "dev.local"           # Domain for local development
dnsmasq_dev_address: "127.0.0.1"          # Target for *.dev.local from localhost
dnsmasq_port: 53                          # DNS port (53 = default)
dnsmasq_lan_access: true                  # true = dnsmasq also listens on LAN (for TVs, mobiles, guests)
dnsmasq_additional_addresses: []          # Additional custom DNS records
# dnsmasq_additional_addresses:
#   - domain: "api.external.test"
#     address: "192.168.1.100"

# ==============================================================================
# RESTIC – backups
# Documentation: https://restic.readthedocs.io/
# ==============================================================================

restic_backup_paths:
  - "{{ ansible_facts['env']['HOME'] }}"     # User home directory

# Restic repository – configure depending on target:
# restic_repo: "s3:s3.us-east-005.backblazeb2.com/bucket-name"
# restic_repo: "sftp:user@nas:/backup/mac-studio"
# restic_repo: "/Volumes/Backup/restic"

# ==============================================================================
# EXTERNAL STORAGE – move data directories to a secondary SSD
# Internal SSD (0.5 TB) = macOS, Homebrew, source code, MariaDB (low latency)
# External SSD (1 TB)   = Kiwix ZIM, Calibre, maps, Docker, Ollama, observability
#
# How it works:
#   1. Set configure_external_storage: true
#   2. Mount the SSD at external_storage_root (e.g. /Volumes/SSD1TB)
#   3. Run the playbook – the task redirects all data-heavy paths to the SSD
#   4. The original paths in the home directory will NOT be used (set_fact override)
#
# What stays on the internal SSD (performance):
#   - macOS system, Homebrew, source code, MariaDB, Redis
# ==============================================================================

configure_external_storage: false       # true = redirect data to the external SSD
external_storage_root: "/Volumes/SSD1TB"

# Optional moves (only if configure_external_storage: true)
external_storage_docker: true           # Docker Desktop disk image (~20-100 GB)
external_storage_docker_app: true      # Move Docker.app to the SSD + symlink in /Applications
external_storage_ollama: true           # Ollama models (~10-150 GB)
external_storage_caches: true           # npm, pip, Composer, Homebrew cache (~10-50 GB)

