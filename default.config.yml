dnsmasq_additional_addresses: []          # Další vlastní DNS záznamy
# dnsmasq_additional_addresses:
#   - domain: "api.external.test"
#     address: "192.168.1.100"

# ==============================================================================
# RESTIC – zálohy
# Dokumentace: https://restic.readthedocs.io/
# ==============================================================================

restic_backup_paths:
  - "{{ ansible_facts['env']['HOME'] }}"     # Domovský adresář uživatele

# Restic repozitář – nakonfiguruj dle cíle:
# restic_repo: "s3:s3.us-east-005.backblazeb2.com/bucket-name"
# restic_repo: "sftp:user@nas:/backup/mac-studio"
# restic_repo: "/Volumes/Backup/restic"

# ==============================================================================
# EXTERNÍ ÚLOŽIŠTĚ – přesun datových adresářů na sekundární SSD
# Interní SSD (0.5 TB) = macOS, Homebrew, zdrojový kód, MariaDB (nízká latence)
# Externí SSD (1 TB)   = Kiwix ZIM, Calibre, mapy, Docker, Ollama, observability
#
# Jak to funguje:
#   1. Nastav configure_external_storage: true
#   2. Připoj SSD na external_storage_root (např. /Volumes/SSD1TB)
#   3. Spusť playbook – task přesměruje všechny data-heavy cesty na SSD
#   4. Původní cesty v domovském adresáři se NEPOUŽIJÍ (set_fact override)
#
# Co zůstává na interním SSD (výkon):
#   - macOS systém, Homebrew, zdrojový kód, MariaDB, Redis
# ==============================================================================

configure_external_storage: false       # true = přesměrovat data na externí SSD
external_storage_root: "/Volumes/SSD1TB"

# Volitelné přesuny (pouze pokud configure_external_storage: true)
external_storage_docker: true           # Docker Desktop disk image (~20-100 GB)
external_storage_ollama: true           # Ollama modely (~10-150 GB)
external_storage_caches: true           # npm, pip, Composer, Homebrew cache (~10-50 GB)

# ==============================================================================
# POST-PROVISION
# ==============================================================================

post_provision_tasks: []

# ==============================================================================
# TRAEFIK
# ==============================================================================

# ── IIAB Stack ────────────────────────────────────────────────────────────────
iiab_compose_dir: "{{ ansible_facts['env']['HOME'] }}/iiab"   # umístění docker-compose.yml

# ── Traefik ────────────────────────────────────────────────────────────────────
traefik_image_version: "latest"
traefik_http_port: 80
traefik_https_port: 443
traefik_dashboard_port: 8080
traefik_log_level: "INFO"           # DEBUG / INFO / WARN / ERROR
traefik_config_dir: "{{ ansible_facts['env']['HOME'] }}/iiab/traefik"

# ── Home Assistant ─────────────────────────────────────────────────────────────
homeassistant_version: "stable"     # stable / latest / konkrétní tag (2025.1.0)
homeassistant_port: 8123
homeassistant_timezone: "Europe/Prague"
homeassistant_config_dir: "{{ ansible_facts['env']['HOME'] }}/homeassistant"
# true = privileged + network_mode: host → mDNS/Bonjour auto-discovery
# Pozor (macOS): host mode sahá do Docker VM sítě, ne přímo na Mac fyzickou síť.
# Pro plný Bonjour/mDNS na Mac je potřeba nativní instalace HA nebo host networking
# přes --network host v Docker Desktop (experimentální funkce).
homeassistant_privileged: false

# ==============================================================================
# RUSTFS – S3-compatible object storage
# ==============================================================================

rustfs_version: "latest"
rustfs_api_port: 9000               # S3 API (aws-cli, rclone, restic, SDK…)
rustfs_console_port: 9001           # Web konzole
rustfs_data_dir: "{{ ansible_facts['env']['HOME'] }}/rustfs/data"
rustfs_access_key: "rustfsadmin"    # PŘEPIŠ před spuštěním!
rustfs_secret_key: "changeme_rustfs_secret"   # PŘEPIŠ!
