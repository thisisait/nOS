---
- name: Configure host.
  hosts: all
  gather_facts: true

  # Sudo heslo – nahrazuje -K flag. vars_prompt zajistí, že heslo je dostupné
  # jako Jinja2 proměnná (ansible_become_password z -K není přístupné v tasku).
  # Spuštění: ansible-playbook main.yml (heslo se zeptá automaticky)
  vars_prompt:
    - name: sudo_password
      prompt: "Sudo heslo (Enter pro přeskočení sudo tasků)"
      private: true
      default: ""

  vars:
    ansible_become_password: "{{ sudo_password }}"

  vars_files:
    - default.config.yml
    - default.credentials.yml

  pre_tasks:
    - name: Include playbook configuration overrides.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

    - name: Include credentials overrides.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/credentials.yml"
      tags: ['always']

    # ── Version Policy ─────────────────────────────────────────────────────────
    # stable (default) = pinned CVE-patched versions from default.config.yml
    # latest           = override all pinned Docker image tags to latest
    # lts              = LTS/stable branches for databases + core infra
    - name: "Override pinned versions to latest (version_policy={{ version_policy }})"
      ansible.builtin.set_fact:
        mariadb_version: "latest"
        postgresql_version: "alpine"
        redis_version: "alpine"
        traefik_image_version: "latest"
        homeassistant_version: "latest"
        rustfs_version: "latest"
        erpnext_version: "latest"
        n8n_version: "latest"
        gitea_version: "latest"
        gitlab_version: "latest"
        openwebui_version: "latest"
        woodpecker_version: "latest"
        portainer_version: "latest"
        jellyfin_version: "latest"
        uptime_kuma_version: "latest"
        freescout_version: "latest"
        grafana_version: "latest"
        tempo_version: "latest"
        authentik_version: "latest"
        vaultwarden_version: "latest"
        superset_version: "latest"
        nextcloud_version: "latest"
      when: version_policy | default('stable') == 'latest'
      tags: ['always']

    - name: "Override database/infra versions to LTS (version_policy={{ version_policy }})"
      ansible.builtin.set_fact:
        mariadb_version: "lts"
        postgresql_version: "16-alpine"
        redis_version: "7.2-alpine"
        nextcloud_version: "stable"
        traefik_image_version: "v3.6"
      when: version_policy | default('stable') == 'lts'
      tags: ['always']

    - name: "Set docker compose pull flag for mutable tags"
      ansible.builtin.set_fact:
        _docker_compose_pull: "{{ '--pull always' if version_policy | default('stable') in ['latest', 'lts'] else '' }}"
      tags: ['always']

    # sudo askpass helper – Homebrew cask installer (a další) interně volá
    # sudo, ale nezná Ansible become password. Tento skript ho předá přes
    # SUDO_ASKPASS env var, aby cask install nepadal na "sudo: a password is required".
    - name: Create sudo askpass helper script.
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          echo "{{ sudo_password }}"
        dest: "{{ ansible_facts['env']['HOME'] }}/.ansible_askpass"
        mode: '0700'
      no_log: true
      changed_when: false
      tags: ['always']
      when: sudo_password | default('') | length > 0

  environment:
    SUDO_ASKPASS: "{{ lookup('env', 'HOME') + '/.ansible_askpass' if (sudo_password | default('') | length > 0) else '' }}"

  # ============================================================================
  # HANDLERS – centralizované, volatelné přes notify: z libovolného task souboru
  # ============================================================================
  handlers:
    - name: Restart nginx
      ansible.builtin.command: brew services restart nginx

    - name: Reload nginx
      ansible.builtin.command: >
        {{ homebrew_prefix }}/bin/nginx -s reload
      register: nginx_reload
      failed_when: false
      # Pokud reload selže (nginx neběží), spustí se restart
      changed_when: nginx_reload.rc != 0
      notify: Restart nginx

    - name: Restart php-fpm
      ansible.builtin.command: brew services restart "php@{{ php_version | default('8.3') }}"

    - name: Restart mariadb
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart mariadb
      failed_when: false

    - name: Restart traefik
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart traefik
      failed_when: false

    - name: Restart homeassistant
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart homeassistant
      failed_when: false

    - name: Restart openclaw
      ansible.builtin.command: >
        launchctl kickstart -k "gui/{{ ansible_facts['user_uid'] }}/com.openclaw.agent"
      failed_when: false

    - name: Restart grafana
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
        restart grafana
      failed_when: false

    - name: Restart alloy
      ansible.builtin.command: brew services restart grafana-alloy
      failed_when: false

    - name: Restart prometheus
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
        restart prometheus
      failed_when: false

    - name: Restart dnsmasq
      ansible.builtin.command: brew services restart dnsmasq
      failed_when: false

    - name: Restart ssh
      ansible.builtin.command: launchctl kickstart -k system/com.openssh.sshd
      become: true
      changed_when: false
      failed_when: false

    - name: Restart jsos
      ansible.builtin.shell: |
        source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh && \
        pm2 restart jsos 2>/dev/null || \
        pm2 start {{ jsos_dir | default('~/projects/jsOs') }}/ecosystem.config.js
        pm2 save --force
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart authentik
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart authentik-server authentik-worker
      failed_when: false

    - name: Restart infisical
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart infisical
      failed_when: false

    - name: Restart postgresql
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart postgresql
      failed_when: false

    - name: Restart redis
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart redis
      failed_when: false

    - name: Restart gitea
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/devops/docker-compose.yml" -p devops
        restart gitea
      failed_when: false

    - name: Restart nextcloud
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart nextcloud
      failed_when: false

    - name: Restart n8n
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart n8n
      failed_when: false

    - name: Restart openwebui
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart openwebui
      failed_when: false

    - name: Restart portainer
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart portainer
      failed_when: false

    - name: Restart boxapi
      ansible.builtin.command: >
        launchctl kickstart -k "gui/{{ ansible_facts['user_uid'] }}/com.devboxnos.api"
      failed_when: false

    - name: Restart bluesky-pds
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart bluesky-pds
      failed_when: false

    - name: Reapply authentik blueprints
      ansible.builtin.shell: |
        for bp in 00-admin-groups 10-oidc-apps 20-rbac-policies; do
          {{ docker_bin }} compose -p infra exec -T authentik-worker \
            ak apply_blueprint "/blueprints/custom/${bp}.yaml" 2>&1 || true
        done
      failed_when: false

  roles:
    - role: elliotweiser.osx-command-line-tools

    - role: pazny.mac.homebrew
      when: install_homebrew_packages | default(true)
      tags: ['homebrew']

    - role: pazny.dotfiles
      when: configure_dotfiles | default(true)
      tags: ['dotfiles']

    - role: pazny.mac.mas
      when: |
        (install_mas_apps | default(false)) and
        ((mas_installed_apps | length > 0) or (mas_installed_app_ids | default([]) | length > 0))
      tags: ['mas']

    - role: pazny.mac.dock
      when: configure_dock | default(false)
      tags: ['dock']

  tasks:
    # ──────────────────────────────────────────────────────────────────────────
    # Blank reset – čistá reinstalace (ansible-playbook main.yml -K -e blank=true)
    # ──────────────────────────────────────────────────────────────────────────
    - name: "[Blank] Prompt for password prefix"
      ansible.builtin.pause:
        prompt: "Prefix pro všechna hesla (formát: PREFIX_pw_SLUŽBA, Enter = {{ global_password_prefix }})"
      register: _prefix_prompt
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    - name: "[Blank] Set password prefix from prompt"
      ansible.builtin.set_fact:
        global_password_prefix: "{{ _prefix_prompt.user_input if (_prefix_prompt.user_input | default('') | length > 0) else global_password_prefix }}"
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    - name: "[Blank] Persist prompted prefix to credentials.yml"
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/credentials.yml"
        regexp: '^global_password_prefix:'
        line: 'global_password_prefix: "{{ global_password_prefix }}"'
        create: true
        mode: '0600'
      when:
        - blank | default(false) | bool
        - _prefix_prompt.user_input | default('') | length > 0
      tags: ['blank', 'reset']

    # ──────────────────────────────────────────────────────────────────────────
    # Previous-prefix state file — pro služby s "PUT needs old password" API
    # (Portainer, Jellyfin, Metabase). Soubor je gitignored.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "[State] Read previous password prefix (if exists)"
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/.ansible-prefix-state"
      register: _prev_prefix_raw
      failed_when: false
      changed_when: false
      tags: ['always']

    - name: "[State] Expose previous_password_prefix fact (fallback = current)"
      ansible.builtin.set_fact:
        previous_password_prefix: >-
          {{ (_prev_prefix_raw.content | b64decode | trim)
             if (_prev_prefix_raw.content is defined)
             else global_password_prefix }}
      tags: ['always']

    - import_tasks: tasks/blank-reset.yml
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    # ──────────────────────────────────────────────────────────────────────────
    # Auto-enable dependencies (ERPNext → MariaDB+Redis, Mattermost → PostgreSQL, atd.)
    # ──────────────────────────────────────────────────────────────────────────
    - name: Auto-enable MariaDB for services that require it
      ansible.builtin.set_fact:
        install_mariadb: true
      when: >
        (install_wordpress | default(false)) or
        (install_nextcloud | default(false)) or
        (install_erpnext | default(false)) or
        (install_freescout | default(false)) or
        (install_freepbx | default(false))
      tags: ['always']

    - name: Auto-enable PostgreSQL for services that require it
      ansible.builtin.set_fact:
        install_postgresql: true
      when: >
        (install_authentik | default(false)) or
        (install_infisical | default(false)) or
        (install_jsos | default(false)) or
        (install_paperclip | default(false)) or
        (install_mattermost | default(false)) or
        (install_outline | default(false)) or
        (install_metabase | default(false)) or
        (install_superset | default(false))
      tags: ['always']

    - name: Auto-enable Redis Docker for services that require it
      ansible.builtin.set_fact:
        redis_docker: true
      when: >
        (install_authentik | default(false)) or
        (install_infisical | default(false)) or
        (install_jsos | default(false)) or
        (install_erpnext | default(false)) or
        (install_outline | default(false)) or
        (install_superset | default(false))
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # Stateless secret regeneration — každý běh
    #
    # Safe group: krypto tajemství, která nešifrují perzistentní uživatelská data
    # (sessions/tokens jsou znovu-vytvořitelné, blueprints/API reapplyují state).
    # Destructive group: šifrují uživatelská data — regeneraci gatujeme přes
    # blank=true nebo destroy_state=true a na non-blank runu ukážeme warning.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Auto-regenerate stateless secrets (every run — safe group)"
      ansible.builtin.set_fact:
        authentik_secret_key: "{{ lookup('pipe', 'openssl rand -hex 50') }}"
        vaultwarden_admin_token: "{{ lookup('pipe', 'openssl rand -base64 48') }}"
        paperclip_auth_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        jsos_session_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        glasswing_api_token: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        outline_utils_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
      tags: ['always']

    - name: "Regenerate DESTRUCTIVE stateless secrets (blank or destroy_state)"
      ansible.builtin.set_fact:
        infisical_encryption_key: "{{ lookup('pipe', 'openssl rand -hex 16') }}"
        infisical_auth_secret: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
        outline_secret_key: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        bluesky_pds_rotation_key: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
      when: (blank | default(false) | bool) or (destroy_state | default(false) | bool)
      tags: ['always']

    - name: "WARNING — destructive secrets preserved (use -e destroy_state=true to reset)"
      ansible.builtin.debug:
        msg: |
          NEBEZPECI: infisical_encryption_key, outline_secret_key, bluesky_pds_rotation_key
          zachovany z predchoziho runu (nemaji lazy regeneraci v non-blank runech).
          Pro reset pridej -e destroy_state=true — smaze Infisical vault, Outline sifrovana data,
          Bluesky PLC rotaci.
      when:
        - not (blank | default(false) | bool)
        - not (destroy_state | default(false) | bool)
      tags: ['always']

    - name: Stop Homebrew Redis if Docker Redis is enabled (port conflict)
      ansible.builtin.shell: |
        brew services stop redis 2>/dev/null || true
        launchctl bootout gui/$(id -u)/homebrew.mxcl.redis 2>/dev/null || true
        launchctl unload ~/Library/LaunchAgents/homebrew.mxcl.redis.plist 2>/dev/null || true
        pkill -9 -f "redis-server" 2>/dev/null || true
        sleep 2
        rm -f ~/Library/LaunchAgents/homebrew.mxcl.redis.plist 2>/dev/null || true
      when: redis_docker | default(false) | bool
      failed_when: false
      changed_when: false
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # macOS systémová nastavení
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/sudoers.yml
      when: configure_sudoers | default(false)
      tags: ['sudoers']

    - import_tasks: tasks/terminal.yml
      when: configure_terminal | default(true)
      tags: ['terminal']

    - import_tasks: tasks/osx.yml
      when: configure_osx | default(true)
      tags: ['osx']

    - import_tasks: tasks/macos-defaults.yml
      when: configure_macos_defaults | default(true)
      tags: ['macos-defaults', 'osx']

    # ──────────────────────────────────────────────────────────────────────────
    # Power management – pmset (server-like provoz: displej spí, síť běží)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/power-management.yml
      when: configure_power_management | default(true)
      tags: ['power', 'pmset', 'power-management']

    # ──────────────────────────────────────────────────────────────────────────
    # Systémové služby (SSH, Samba, VNC)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/system-services.yml
      when: >
        not ansible_check_mode and
        ((enable_ssh | default(false)) or
        (enable_samba | default(false)) or
        (enable_vnc | default(false)) or
        (enable_remote_management | default(false)))
      tags: ['system-services', 'ssh', 'samba', 'vnc']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB Terminal – veřejný SSH TUI hub (vyžaduje SSH)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/iiab-terminal.yml
      when:
        - install_iiab_terminal | default(false)
        - enable_ssh | default(false)
      tags: ['iiab-terminal', 'ssh']

    # ──────────────────────────────────────────────────────────────────────────
    # Jazyky a runtime prostředí
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/php.yml
      when: install_php | default(true)
      tags: ['php']

    # ──────────────────────────────────────────────────────────────────────────
    # Web server (až po PHP, aby socket existoval před nginx -t)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/nginx.yml
      when: install_nginx | default(true)
      tags: ['nginx', 'webserver']

    - import_tasks: tasks/node.yml
      when: install_node | default(true)
      tags: ['node', 'nodejs']

    - import_tasks: tasks/bun.yml
      when: install_bun | default(true)
      tags: ['bun']

    - import_tasks: tasks/python.yml
      when: install_python | default(true)
      tags: ['python']

    - import_tasks: tasks/golang.yml
      when: install_golang | default(true)
      tags: ['go', 'golang']

    - import_tasks: tasks/dotnet.yml
      when: install_dotnet | default(true)
      tags: ['dotnet', 'csharp']

    # ──────────────────────────────────────────────────────────────────────────
    # Extra balíčky (composer, gem, npm, pip)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/extra-packages.yml
      tags: ['extra-packages']

    # ──────────────────────────────────────────────────────────────────────────
    # Editory
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/sublime-text.yml
      when: configure_sublime | default(false)
      tags: ['sublime-text']

    # ──────────────────────────────────────────────────────────────────────────
    # Externí úložiště – přesměrování dat na SSD (MUSÍ běžet před IIAB/observ.)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/external-storage.yml
      when: configure_external_storage | default(false)
      tags: ['external-storage', 'storage']

    # ──────────────────────────────────────────────────────────────────────────
    # Docker stacks – sdílená síť a prerekvizity
    # ──────────────────────────────────────────────────────────────────────────

    # Python docker SDK + PyMySQL – prerekvizita pro všechny community.docker.*
    # a community.mysql.* moduly; rychlé no-op pokud jsou už nainstalovány
    - import_tasks: tasks/iiab/docker-prereqs.yml
      tags: ['iiab', 'docker', 'stacks']

    # Shared Docker network + adresářová struktura pro všechny stacky
    - import_tasks: tasks/stacks/shared-network.yml
      tags: ['iiab', 'docker', 'stacks']

    # ──────────────────────────────────────────────────────────────────────────
    # CORE STACKS – infra (DB/IAM/Vault) + observability VŽDY JAKO PRVNÍ
    #
    # Tyto dva stacky jsou backbone celého systému: ostatní role mohou
    # předpokládat, že MariaDB / Postgres / Redis / Authentik / Infisical /
    # Bluesky PDS / Grafana / Prometheus / Loki / Tempo běží a jen injectují
    # své konfigy + notify handlery pro restart kontejnerů.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/stacks/core-up.yml
      tags: ['iiab', 'docker', 'stacks', 'core', 'infra', 'observability']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB – self-hosted knowledge services
    # ──────────────────────────────────────────────────────────────────────────

    # MariaDB byl vytazen do role pazny.mariadb (Wave 2.1). Role je volana
    # z tasks/stacks/core-up.yml — render compose override PRED `docker
    # compose up infra`, post-start DB/user setup PO compose up.
    - import_tasks: tasks/iiab/wordpress.yml
      when: install_wordpress | default(false)
      tags: ['iiab', 'wordpress']

    - import_tasks: tasks/iiab/nextcloud.yml
      when: install_nextcloud | default(false)
      tags: ['iiab', 'nextcloud']

    - import_tasks: tasks/iiab/kiwix.yml
      when: install_kiwix | default(false)
      tags: ['iiab', 'kiwix', 'zim']

    - import_tasks: tasks/iiab/maps.yml
      when: install_offline_maps | default(false)
      tags: ['iiab', 'maps']

    # ──────────────────────────────────────────────────────────────────────────
    # Síť – Tailscale + dnsmasq
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/tailscale.yml
      when: install_tailscale | default(true)
      tags: ['tailscale', 'network', 'vpn']

    - import_tasks: tasks/dnsmasq.yml
      when: install_dnsmasq | default(true)
      tags: ['dnsmasq', 'dns', 'network']

    # ──────────────────────────────────────────────────────────────────────────
    # Shell extras – starship prompt + aliases
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/shell-extras.yml
      when: install_shell_extras | default(true)
      tags: ['shell', 'shell-extras', 'starship']

    # ──────────────────────────────────────────────────────────────────────────
    # Git globální konfigurace (user.name, user.email)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/git-config.yml
      when: git_user_name | default('') | length > 0
      tags: ['git']

    # ──────────────────────────────────────────────────────────────────────────
    # OpenClaw – self-hosted AI agent (Ollama, žádný API klíč)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/openclaw.yml
      when: install_openclaw | default(false)
      tags: ['openclaw', 'ai', 'agent']

    - import_tasks: tasks/pi-agents.yml
      when: install_pi_agents | default(false)
      tags: ['pi', 'pi-agents', 'ai', 'agent']

    # ──────────────────────────────────────────────────────────────────────────
    # Observability – Grafana + Prometheus + Loki + Tempo + Alloy
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/observability.yml
      when: install_observability | default(true)
      tags: ['observability', 'grafana', 'prometheus', 'loki', 'tempo', 'alloy']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB extra – n8n, Gitea, Uptime Kuma, Calibre-Web
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/iiab/n8n.yml
      when: install_n8n | default(false)
      tags: ['iiab', 'n8n', 'automation']

    - import_tasks: tasks/iiab/gitea.yml
      when: install_gitea | default(false)
      tags: ['iiab', 'gitea', 'git']

    - import_tasks: tasks/iiab/gitlab.yml
      when: install_gitlab | default(false)
      tags: ['iiab', 'gitlab', 'git']

    - import_tasks: tasks/iiab/woodpecker.yml
      when: install_woodpecker | default(false)
      tags: ['iiab', 'woodpecker', 'ci', 'cicd']

    - import_tasks: tasks/iiab/openwebui.yml
      when: install_openwebui | default(false)
      tags: ['iiab', 'openwebui', 'ai']

    - import_tasks: tasks/iiab/portainer.yml
      when: install_portainer | default(false)
      tags: ['iiab', 'portainer', 'docker']

    - import_tasks: tasks/iiab/jellyfin.yml
      when: install_jellyfin | default(false)
      tags: ['iiab', 'jellyfin', 'media']

    - import_tasks: tasks/iiab/uptime-kuma.yml
      when: install_uptime_kuma | default(false)
      tags: ['iiab', 'uptime-kuma', 'monitoring']

    - import_tasks: tasks/iiab/calibreweb.yml
      when: install_calibreweb | default(false)
      tags: ['iiab', 'calibre', 'ebooks']

    - import_tasks: tasks/iiab/traefik.yml
      when: install_traefik | default(false)
      tags: ['iiab', 'traefik', 'proxy']

    - import_tasks: tasks/iiab/homeassistant.yml
      when: install_homeassistant | default(false)
      tags: ['iiab', 'homeassistant', 'iot']

    - import_tasks: tasks/iiab/rustfs.yml
      when: install_rustfs | default(false)
      tags: ['iiab', 'rustfs', 's3', 'storage']

    - import_tasks: tasks/iiab/puter.yml
      when: install_puter | default(false)
      tags: ['iiab', 'puter', 'desktop']

    - import_tasks: tasks/iiab/vaultwarden.yml
      when: install_vaultwarden | default(false)
      tags: ['iiab', 'vaultwarden', 'iam']

    # ──────────────────────────────────────────────────────────────────────────
    # Docker stacks – deploy compose souborů a spuštění všech stacků
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/stacks/stack-up.yml
      tags: ['iiab', 'stack', 'docker', 'stacks']

    # DB setup nyní běží UVNITŘ stack-up.yml (infra → DB setup → remaining stacks)

    # Nextcloud post-start: sync DB hesla a trusted_domains
    - import_tasks: tasks/iiab/nextcloud_post.yml
      when: install_nextcloud | default(false)
      tags: ['iiab', 'nextcloud', 'stacks']

    # Gitea post-start: vytvoření admin uživatele
    - import_tasks: tasks/iiab/gitea_post.yml
      when: install_gitea | default(false)
      tags: ['iiab', 'gitea', 'stacks']

    # WordPress post-start: wp-cli auto-install (admin účet + site title)
    - import_tasks: tasks/iiab/wordpress_post.yml
      when: install_wordpress | default(false)
      tags: ['iiab', 'wordpress', 'stacks']

    # Open WebUI post-start: auto-registrace prvního admin uživatele
    - import_tasks: tasks/iiab/openwebui_post.yml
      when: install_openwebui | default(false)
      tags: ['iiab', 'openwebui', 'stacks']

    # n8n post-start: owner setup (první uživatel = admin)
    - import_tasks: tasks/iiab/n8n_post.yml
      when: install_n8n | default(false)
      tags: ['iiab', 'n8n', 'stacks']

    # Puter post-start: auto-create admin user
    - import_tasks: tasks/iiab/puter_post.yml
      when: install_puter | default(false)
      tags: ['iiab', 'puter', 'stacks']

    # Puter apps: register devBoxNOS services as iframe apps
    - import_tasks: tasks/iiab/puter_apps.yml
      when: install_puter | default(false)
      tags: ['iiab', 'puter', 'puter-apps', 'stacks']

    # Portainer post-start: admin init + OIDC settings
    - import_tasks: tasks/iiab/portainer_post.yml
      when: install_portainer | default(false)
      tags: ['iiab', 'portainer', 'stacks']

    # Metabase post-start: auto-setup admin via /api/setup
    - import_tasks: tasks/iiab/metabase_post.yml
      when: install_metabase | default(false)
      tags: ['iiab', 'metabase', 'stacks']

    # Home Assistant post-start: auto-onboarding via API
    - import_tasks: tasks/iiab/homeassistant_post.yml
      when: install_homeassistant | default(false)
      tags: ['iiab', 'homeassistant', 'stacks']

    # Jellyfin post-start: auto-setup via Startup API
    - import_tasks: tasks/iiab/jellyfin_post.yml
      when: install_jellyfin | default(false)
      tags: ['iiab', 'jellyfin', 'stacks']

    # Calibre-Web post-start: change default admin password
    - import_tasks: tasks/iiab/calibreweb_post.yml
      when: install_calibreweb | default(false)
      tags: ['iiab', 'calibreweb', 'stacks']

    # FreeScout post-start: create admin via Artisan CLI
    - import_tasks: tasks/iiab/freescout_post.yml
      when: install_freescout | default(false)
      tags: ['iiab', 'freescout', 'stacks']

    # GitLab post-start: admin password reconverge via gitlab-rails runner
    - import_tasks: tasks/iiab/gitlab_post.yml
      when: install_gitlab | default(false)
      tags: ['iiab', 'gitlab', 'stacks']

    # Verifikace: ověří že všechny služby odpovídají (po post-start úlohách)
    - import_tasks: tasks/iiab/stack_verify.yml
      tags: ['iiab', 'stack', 'verify', 'stacks']

    # ──────────────────────────────────────────────────────────────────────────
    # jsOS – webový desktop (OS.js v3 + Bluesky auth + homelab integrace)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/jsos.yml
      when: install_jsos | default(false)
      tags: ['jsos', 'desktop']

    # ──────────────────────────────────────────────────────────────────────────
    # Service Registry – JSON katalog + Grafana dashboard
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/service-registry.yml
      tags: ['service-registry', 'registry']

    # ──────────────────────────────────────────────────────────────────────────
    # Box Management API – FastAPI health/status/execution endpoint
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/boxapi.yml
      when: install_boxapi | default(false)
      tags: ['boxapi', 'api']

    # ──────────────────────────────────────────────────────────────────────────
    # Heartbeat – fleet reporting daemon
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/heartbeat.yml
      when: configure_heartbeat | default(false)
      tags: ['heartbeat', 'fleet']

    # ──────────────────────────────────────────────────────────────────────────
    # Backup – Restic automated backups
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/backup.yml
      when: configure_backup | default(false)
      tags: ['backup']

    # ──────────────────────────────────────────────────────────────────────────
    # Vulnerability Scanner – NOS Security Auditor (2x daily scheduled scan)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/vulnerability-scan.yml
      when: configure_vulnerability_scan | default(false)
      tags: ['vulnscan']

    # ──────────────────────────────────────────────────────────────────────────
    # Glasswing — Security Research Dashboard (Nette PHP + SQLite)
    # Wave 2.1 role extraction — viz docs/wave2-role-migration.md
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Glasswing (pazny.glasswing role)"
      ansible.builtin.import_role:
        name: pazny.glasswing
      when: install_glasswing | default(install_php | default(true))
      tags: ['glasswing', 'security']

    # ──────────────────────────────────────────────────────────────────────────
    # Export/Import – hardware migration (run only with --tags)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/export-state.yml
      tags: ['export', 'never']

    - import_tasks: tasks/import-state.yml
      tags: ['import', 'never']

    # ──────────────────────────────────────────────────────────────────────────
    # Finální přehled služeb (vždy na konci)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/final-summary.yml
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # Post-provision háky
    # ──────────────────────────────────────────────────────────────────────────
    - name: Run post-provision task files in a block.
      tags: ['post']
      block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"

  post_tasks:
    - name: Remove sudo askpass helper script.
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.ansible_askpass"
        state: absent
      changed_when: false
      tags: ['always']

    - name: "[State] Persist current prefix for next run"
      ansible.builtin.copy:
        content: "{{ global_password_prefix }}"
        dest: "{{ playbook_dir }}/.ansible-prefix-state"
        mode: '0600'
      changed_when: false
      tags: ['always']
