---
- name: Configure host.
  hosts: all
  gather_facts: true

  # Sudo password is prompted ONCE via vars_prompt (see below). Don't pass
  # -K — the vars_prompt'd value is also wired into ansible_become_password
  # (in the vars: block below), so Ansible's native `become: true` and
  # template-visible sudo (homebrew_cask, askpass) share a single source.
  # Run:
  #   ansible-playbook main.yml                  # full install (prompts for password)
  #   ansible-playbook main.yml -e blank=true    # clean reinstall (also prompts)
  # Press Enter at the prompt for read-only / dry-run checks:
  #   ansible-playbook main.yml --tags preflight --check
  # but any sudo task (dnsmasq, /etc/resolver, system-services) will then fail.

  vars_files:
    - default.config.yml
    - default.credentials.yml

  # Sudo password — captured ONCE at playbook start as `nos_sudo_password`.
  # This SINGLE variable serves both:
  #
  #   1. Tasks that need it template-visible (homebrew_cask sudo_password,
  #      askpass helper, anything else that forwards sudo into a child
  #      process tree). Ansible's own -K populates `ansible_become_password`
  #      but deliberately hides that variable from Jinja templates as a
  #      security feature, which varies by version — vars_prompt sidesteps
  #      that entirely.
  #
  #   2. Ansible's own `become: true` escalation, via the
  #      `ansible_become_password` assignment in the `vars:` block below
  #      (Ansible reads that magic var and uses it for sudo).
  #
  # The upshot: run plain `ansible-playbook main.yml -e blank=true`
  # (no -K). Type the password once at the prompt. Press Enter to skip
  # — pkg-installer cask upgrades + sudo-needing system tasks will then
  # fall back to manual one-liners.
  vars_prompt:
    - name: nos_sudo_password
      prompt: |-

        ──────────────────────────────────────────────────────────────────
         macOS sudo password (one-stop — replaces -K).
         Used for system tasks AND Homebrew cask pkg-installer cleanup.
         Press Enter to skip (those tasks will fall back to manual mode).
        ──────────────────────────────────────────────────────────────────
      private: true
      confirm: false
      default: ""

  # Play-level vars are visible to callback plugins via play.get_vars(); vars
  # from vars_files (default.config.yml / config.yml) are NOT — Ansible only
  # surfaces the play's own vars: block. Anything that a callback plugin must
  # see goes here. Override via `-e wing_telemetry_enabled=false` if you want
  # to silence the callback on a specific run.
  vars:
    # Make the vars_prompt'd password also serve Ansible's internal `become:
    # true` escalation. This eliminates the need for -K — typing at the
    # vars_prompt above is sufficient for both template-visible sudo
    # (homebrew_cask) AND Ansible's native become path (system tasks like
    # /etc/resolver, dnsmasq, network-services).
    ansible_become_password: "{{ nos_sudo_password }}"

    wing_telemetry_enabled: "{{ install_bone | default(false) }}"
    # Bone events ingestion URL — read by the apps_runner post-hook AND
    # by callback_plugins/wing_telemetry.py (which honours play vars).
    #
    # 2026-05-03 (A3a): Bone now runs as a host launchd process bound to
    # 127.0.0.1:{{ bone_port }} and is INTENTIONALLY not Traefik-routed.
    # The previous default `http://{{ bone_domain }}/api/v1/events` walked
    # through the public proxy, which on a real TLD got HTTP→HTTPS 308'd
    # by Traefik and the Ansible URI module dropped POST bodies on
    # redirect → events vanished, apps_runner summary read "FAILED 308".
    # Going straight to localhost both fixes that and shaves the round-trip.
    wing_events_url: "http://127.0.0.1:{{ bone_port | default(8099) }}/api/v1/events"
    # HMAC secret the callback plugin signs every batch with. Bone verifies
    # using the same value (BONE_SECRET / WING_EVENTS_HMAC_SECRET in its
    # plist env). The default at default.config.yml level resolves to
    # `{{ bone_secret }}`, which itself derives from
    # `{{ global_password_prefix }}_pw_bone`. Surfacing the same value
    # at play scope lets the callback plugin read it via play_vars
    # without depending on operator's shell env or the legacy
    # ~/.nos/secrets.yml fallback (the latter was wiped 2026-05-03 to
    # close the prefix-rotation stale-secret bug).
    wing_events_hmac_secret: "{{ wing_events_hmac_secret | default(bone_secret | default(global_password_prefix + '_pw_bone')) }}"

  pre_tasks:
    # ── Platform detection (Track C, 2026-04-26) ──────────────────────────
    # Resolves nos_* variables (nginx paths, service manager, docker bin)
    # so cross-platform tasks below can use them instead of hardcoded
    # /opt/homebrew / launchctl paths.
    - import_tasks: tasks/_platform.yml
      tags: ['always', 'platform']

    # ── Preflight: ensure host Python interpreter has plugin loader deps ───
    # Anatomy P0.13 (2026-05-04): the plugin loader (nos_plugin_loader
    # Ansible module) is pure Python and lazily imports jinja2 + pyyaml
    # + jsonschema at first hook call. Some macOS Homebrew Python
    # installs ship without these in site-packages — when Ansible's
    # interpreter (operator's `ansible_python_interpreter` from
    # inventory) is one of those, the loader silently degraded every
    # plugin (status=degraded, no files written). Docker compose then
    # bind-mounted the missing config files as DIRECTORIES → tempo /
    # loki / prometheus crashed at startup. P0.9 added a fail-loud
    # preflight inside run_hook(). This task is the proactive twin —
    # auto-install the deps via pip --break-system-packages so the
    # next blank doesn't need a manual install step.
    #
    # Idempotent: pip skips already-installed packages. The
    # --break-system-packages flag is required for Homebrew Python on
    # macOS (PEP 668); harmless on Linux Pythons (silently ignored).
    - name: "[Preflight] Ensure host Python has plugin loader deps (jinja2, pyyaml, jsonschema)"
      ansible.builtin.pip:
        name:
          - jinja2>=3.1
          - pyyaml>=6.0
          - jsonschema>=4.0
        state: present
        extra_args: "--break-system-packages"
      tags: ['always', 'preflight']

    # ── Preflight: fail fast on malformed YAML in any config file ──────────
    # Uses Ansible's own YAML loader via `include_vars` — no external Python
    # interpreter, no PyYAML dependency on the host (some Homebrew Python
    # upgrades drop pyyaml from site-packages and broke the previous python3
    # -based validator). The loaded vars go into a throwaway scope name so
    # they don't pollute the real var namespace; the real vars_files +
    # config.yml include below this block do the actual loading.
    - name: "[Preflight] Stat config files (skip cleanly if user overrides absent)"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ playbook_dir }}/default.config.yml"
        - "{{ playbook_dir }}/default.credentials.yml"
        - "{{ playbook_dir }}/config.yml"
        - "{{ playbook_dir }}/credentials.yml"
      register: _preflight_stats
      changed_when: false
      tags: ['always', 'preflight']

    - name: "[Preflight] Validate YAML config files are well-formed"
      ansible.builtin.include_vars:
        file: "{{ item.item }}"
        name: "_preflight_throwaway"
      loop: "{{ _preflight_stats.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.stat.exists | default(false)
      tags: ['always', 'preflight']

    - name: Include playbook configuration overrides.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

    # ── Track F compat: legacy `instance_tld` → `tenant_domain` auto-promote ──
    # Pre-Track-F config.yml may pin `instance_tld: pazny.eu` (or similar). The
    # default.config.yml shim makes `instance_tld` resolve to `tenant_domain`,
    # but Ansible's vars-merge silently drops the shim's Jinja expression when
    # the operator overrides the bare key — leaving `tenant_domain` stuck at
    # its default (`dev.local`) while `instance_tld` reflects the operator's
    # real choice. All Tier-1 svc_domain vars now read `tenant_domain`, so
    # without this fix the operator's TLD override would be silently lost.
    #
    # This task detects that exact mismatch and promotes the legacy override
    # forward, then warns once. Idempotent: no-op when the operator has
    # already moved to `tenant_domain` in their config.yml.
    # ── Track F input validation: tenant_domain must be non-empty + DNS-safe ─
    # Catches typos before they propagate into 100+ template renders. Empty
    # tenant_domain produces 'bone=api.' (truncated FQDN); spaces or invalid
    # chars produce broken DNS records that look correct in Jinja but fail
    # at the resolver. Cheaper to fail here than spend 30 min of blank time
    # to discover it.
    - name: "[Track F validate] tenant_domain must be set + DNS-safe"
      ansible.builtin.fail:
        msg: |-
          tenant_domain is invalid: '{{ tenant_domain | default('<unset>') }}'
          Must be a non-empty DNS-safe string (a-z, 0-9, '.', '-').
          Set in config.yml:   tenant_domain: "dev.local"   (or your real TLD)
      when: >-
        (tenant_domain | default('') | length == 0) or
        (not (tenant_domain | regex_search('^[a-z0-9][a-z0-9.\\-]*[a-z0-9]$', ignorecase=True)))
      tags: ['always', 'preflight']

    - name: "[Track F validate] host_alias must be DNS-safe (or empty)"
      ansible.builtin.fail:
        msg: |-
          host_alias is invalid: '{{ host_alias }}'
          Must be empty (default) OR a DNS-safe label (a-z, 0-9, '.', '-').
          Leading/trailing dots are stripped automatically — but middle
          spaces or special chars are rejected.
          Examples: "" (default) | "lab" | "factory" | "my-lab" | "lab.staging"
      when:
        - host_alias | default('') | length > 0
        - not (host_alias | regex_search('^[a-z0-9][a-z0-9.\\-]*[a-z0-9]$|^[a-z0-9]$', ignorecase=True))
      tags: ['always', 'preflight']

    - name: "[Track F compat] Auto-promote legacy instance_tld override to tenant_domain"
      ansible.builtin.set_fact:
        tenant_domain: "{{ instance_tld }}"
        _legacy_instance_tld_promoted: true
      when:
        - instance_tld is defined
        - tenant_domain | default('dev.local') == 'dev.local'   # operator did NOT explicitly set tenant_domain
        - instance_tld != (tenant_domain | default('dev.local'))  # but instance_tld differs
      tags: ['always']

    - name: "[Track F compat] Warn on legacy instance_tld override (one-time deprecation notice)"
      ansible.builtin.debug:
        msg: |
          ⚠️  DEPRECATION NOTICE — Track F variable rename
          ─────────────────────────────────────────────────────
          Your config.yml still defines:    instance_tld: {{ instance_tld }}
          Auto-promoted at runtime to:      tenant_domain: {{ tenant_domain }}

          Please update config.yml at your convenience:

              # Before (legacy):
              instance_tld: {{ instance_tld }}

              # After (Track F):
              tenant_domain: {{ tenant_domain }}
              # host_alias: ""             # optional per-host segment, e.g. "lab"

          The compat shim will remain through Q3 2026 then be removed in a
          follow-up cleanup commit. See docs/operator-domain-naming.md.
      when: _legacy_instance_tld_promoted | default(false) | bool
      tags: ['always']

    # ── Preflight: edge-proxy sanity ─────────────────────────────────────────
    # Catch a misconfigured config.yml early — Docker services run happily
    # on internal networks even when nothing answers 80/443, so the failure
    # mode is "every URL silently broken" rather than a loud crash. Better
    # to refuse the run than sit through a 15-min blank with no edge proxy.
    - name: "[Preflight] Refuse if no edge proxy is enabled"
      ansible.builtin.fail:
        msg: |
          Both install_nginx and install_traefik are false — nothing will
          listen on 80/443. Pick one:
            install_traefik: true   (default — Docker container, file + Docker providers)
            install_nginx: true     (host nginx via Homebrew/apt)

          Advanced override (running behind a separate proxy on the host):
            -e nos_skip_edge_check=true
      when:
        - not (install_nginx | default(false) | bool)
        - not (install_traefik | default(true) | bool)
        - not (nos_skip_edge_check | default(false) | bool)
      tags: ['always', 'preflight']

    - name: "[Preflight] Refuse if BOTH install_nginx and install_traefik are true"
      ansible.builtin.fail:
        msg: |
          install_nginx and install_traefik are both true — they would clash
          on ports 80/443. Pick one edge proxy.
      when:
        - install_nginx | default(false) | bool
        - install_traefik | default(true) | bool
      tags: ['always', 'preflight']

    # ── State & Migration Framework: orchestrator (runs before roles) ────────
    # Reads ~/.nos/state.yml, evaluates migrations/*.yml, applies any that
    # gate true and have not been recorded as applied. Idempotent — if
    # nothing pending, the orchestrator is a no-op. See docs/framework-plan.md.
    - name: "[Framework] Pre-migrate (load state + apply pending migrations)"
      ansible.builtin.import_tasks: tasks/pre-migrate.yml
      tags: ['migrate']

    # ── Apply a single patch recipe (explicit opt-in via --tags apply-patches)
    # Skipped on a normal playbook run because of the 'never' tag — invoked
    # either manually (ansible-playbook ... --tags apply-patches -e patch_id=PATCH-001)
    # or from Bone /api/patches/<id>/apply which subprocesses ansible-playbook
    # with that tag. The when-guard prevents accidental runs if someone adds
    # 'apply-patches' to a broader tag group.
    - name: "[Framework] Apply a single patch recipe (opt-in)"
      ansible.builtin.import_tasks: tasks/apply-patches.yml
      when: patch_id is defined and (patch_id | length) > 0
      tags: ['apply-patches', 'never']

    - name: Include credentials overrides.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/credentials.yml"
      tags: ['always']

    # ── Persisted runtime secrets (encryption keys, APP_KEYs, JWT secrets) ──
    # File ~/.nos/secrets.yml is created on the first run (at the end of
    # the generation phase). On subsequent runs we load it BEFORE lazy-regen blocks,
    # so guards see the real value and not a placeholder.
    - name: "[Secrets] Check for persisted secrets file"
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.nos/secrets.yml"
      register: _persisted_secrets_stat
      tags: ['always']

    - name: "[Secrets] Load persisted secrets (if exists)"
      ansible.builtin.include_vars:
        file: "{{ ansible_facts['env']['HOME'] }}/.nos/secrets.yml"
      when: _persisted_secrets_stat.stat.exists | default(false)
      tags: ['always']

    # ── Version Policy ─────────────────────────────────────────────────────────
    # stable (default) = pinned CVE-patched versions from default.config.yml
    # latest           = override all pinned Docker image tags to latest
    # lts              = LTS/stable branches for databases + core infra
    - name: "Override pinned versions to latest (version_policy={{ version_policy }})"
      ansible.builtin.set_fact:
        mariadb_version: "latest"
        postgresql_version: "alpine"
        redis_version: "alpine"
        traefik_image_version: "latest"
        homeassistant_version: "latest"
        rustfs_version: "latest"
        erpnext_version: "latest"
        n8n_version: "latest"
        gitea_version: "latest"
        gitlab_version: "latest"
        openwebui_version: "latest"
        woodpecker_version: "latest"
        portainer_version: "latest"
        jellyfin_version: "latest"
        uptime_kuma_version: "latest"
        freescout_version: "latest"
        grafana_version: "latest"
        tempo_version: "latest"
        authentik_version: "latest"
        vaultwarden_version: "latest"
        superset_version: "latest"
        nextcloud_version: "latest"
      when: version_policy | default('stable') == 'latest'
      tags: ['always']

    - name: "Override database/infra versions to LTS (version_policy={{ version_policy }})"
      ansible.builtin.set_fact:
        mariadb_version: "lts"
        postgresql_version: "16-alpine"
        redis_version: "7.2-alpine"
        nextcloud_version: "stable"
        traefik_image_version: "v3.6"
      when: version_policy | default('stable') == 'lts'
      tags: ['always']

    - name: "Set docker compose pull flag for mutable tags"
      ansible.builtin.set_fact:
        _docker_compose_pull: "{{ '--pull always' if version_policy | default('stable') in ['latest', 'lts'] else '' }}"
      tags: ['always']

    # sudo askpass helper — Homebrew cask installer (and other tools) internally
    # calls plain `sudo` and only respects SUDO_ASKPASS when sudo is invoked
    # with -A. The askpass script is set on the play environment below so
    # any task / shell invocation that does spawn `sudo -A` reaches the
    # password. The password itself comes from the `nos_sudo_password`
    # vars_prompt above (NOT `ansible_become_password`, which Ansible hides
    # from templates).
    - name: Create sudo askpass helper script.
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          printf '%s' '{{ nos_sudo_password }}'
        dest: "{{ ansible_facts['env']['HOME'] }}/.ansible_askpass"
        mode: '0700'
      no_log: true
      changed_when: false
      tags: ['always']
      when: (nos_sudo_password | default('') | length) > 0

  environment:
    SUDO_ASKPASS: "{{ lookup('env', 'HOME') + '/.ansible_askpass' if ((nos_sudo_password | default('') | length) > 0) else '' }}"

  # ============================================================================
  # HANDLERS - centralized, callable via notify: from any task file
  # ============================================================================
  handlers:
    # brew services is unreliable on brew 4.x (Ruby API hangs 30min+).
    # We use direct launchctl unload/load - immediate effect.
    - name: Restart nginx
      ansible.builtin.shell: |
        plist="$HOME/Library/LaunchAgents/homebrew.mxcl.nginx.plist"
        [ -f "$plist" ] && launchctl unload "$plist" 2>/dev/null
        sleep 1
        [ -f "$plist" ] && launchctl load "$plist" 2>/dev/null
      args:
        executable: /bin/bash
      failed_when: false

    - name: Reload nginx
      ansible.builtin.command: >
        {{ homebrew_prefix }}/bin/nginx -s reload
      register: nginx_reload
      failed_when: false
      changed_when: nginx_reload.rc != 0
      notify: Restart nginx

    - name: Restart php-fpm
      # Legacy handler — kept for backwards compatibility with any role still
      # notifying it. As of Track A (2026-04-26) Wing's PHP-FPM runs in the
      # `wing` compose service (see "Restart wing" below) and Homebrew
      # php@8.x is no longer installed by the playbook. The launchctl path
      # is a defensive no-op for hosts that haven't run the migration yet.
      ansible.builtin.shell: |
        svc="php@{{ php_version | default('8.3') }}"
        plist="$HOME/Library/LaunchAgents/homebrew.mxcl.${svc}.plist"
        [ -f "$plist" ] && launchctl unload "$plist" 2>/dev/null
        sleep 1
        [ -f "$plist" ] && launchctl load "$plist" 2>/dev/null
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart wing
      # Anatomy A3.5 (2026-05-04): Wing now runs as a host launchd daemon
      # backed by FrankenPHP (replaces the Track-A container + wing-nginx
      # sidecar). `kickstart -k` reloads the plist's env + restarts gracefully
      # so source rsync / Caddyfile / token reconverge changes propagate
      # without a full bootstrap cycle.
      ansible.builtin.shell: |
        launchctl kickstart -k "gui/$(id -u)/{{ wing_launchd_label | default('eu.thisisait.nos.wing') }}" 2>/dev/null || true
      changed_when: true
      failed_when: false

    - name: Restart mariadb
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart mariadb
      failed_when: false

    - name: Restart traefik
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart traefik
      failed_when: false

    - name: Restart homeassistant
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart homeassistant
      failed_when: false

    - name: Restart openclaw
      ansible.builtin.command: >
        launchctl kickstart -k "gui/{{ ansible_facts['user_uid'] }}/com.openclaw.agent"
      failed_when: false

    - name: Restart grafana
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
        restart grafana
      failed_when: false

    - name: Restart alloy
      ansible.builtin.shell: |
        plist="$HOME/Library/LaunchAgents/homebrew.mxcl.grafana-alloy.plist"
        [ -f "$plist" ] && launchctl unload "$plist" 2>/dev/null
        sleep 1
        [ -f "$plist" ] && launchctl load "$plist" 2>/dev/null
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart prometheus
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/observability/docker-compose.yml" -p observability
        restart prometheus
      failed_when: false

    - name: Restart dnsmasq
      ansible.builtin.shell: |
        sudo launchctl unload /Library/LaunchDaemons/homebrew.mxcl.dnsmasq.plist 2>/dev/null
        sleep 1
        sudo launchctl load /Library/LaunchDaemons/homebrew.mxcl.dnsmasq.plist 2>/dev/null
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart ssh
      ansible.builtin.command: launchctl kickstart -k system/com.openssh.sshd
      become: true
      changed_when: false
      failed_when: false

    - name: Restart jsos
      ansible.builtin.shell: |
        source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh && \
        pm2 restart jsos 2>/dev/null || \
        pm2 start {{ jsos_dir | default('~/projects/jsOs') }}/ecosystem.config.js
        pm2 save --force
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart authentik
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart authentik-server authentik-worker
      failed_when: false

    - name: Restart infisical
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart infisical
      failed_when: false

    - name: Restart postgresql
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart postgresql
      failed_when: false

    - name: Restart redis
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart redis
      failed_when: false

    - name: Restart gitea
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/devops/docker-compose.yml" -p devops
        restart gitea
      failed_when: false

    - name: Restart nextcloud
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart nextcloud
      failed_when: false

    - name: Restart n8n
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart n8n
      failed_when: false

    - name: Restart openwebui
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/iiab/docker-compose.yml" -p iiab
        restart openwebui
      failed_when: false

    - name: Restart portainer
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart portainer
      failed_when: false

    - name: Restart bone
      # Anatomy A3a (2026-05-03): Bone reverted from container → host launchd.
      # Restart via launchctl kickstart -k for graceful drain. The Track A
      # docker compose restart path is gone — the container is removed by
      # the role's track-A reversal cleanup.
      ansible.builtin.shell: |
        launchctl kickstart -k "gui/$(id -u)/eu.thisisait.nos.bone" 2>/dev/null || true
      changed_when: false

    - name: Restart bluesky-pds
      ansible.builtin.shell: >
        {{ docker_bin }} compose -f "{{ stacks_dir }}/infra/docker-compose.yml" -p infra
        restart bluesky-pds
      failed_when: false

    - name: Reapply authentik blueprints
      ansible.builtin.shell: |
        for bp in 00-admin-groups 10-oidc-apps 20-rbac-policies; do
          {{ docker_bin }} compose -p infra exec -T authentik-worker \
            ak apply_blueprint "/blueprints/custom/${bp}.yaml" 2>&1 || true
        done
      failed_when: false

  roles:
    # ── macOS-only host roles ───────────────────────────────────────────────
    # Gated on Darwin so the playbook is preflight-safe on Linux. Linux
    # siblings live under pazny.linux.* and are wired below.
    - role: elliotweiser.osx-command-line-tools
      when: ansible_os_family == 'Darwin'

    - role: pazny.mac.homebrew
      when:
        - ansible_os_family == 'Darwin'
        - install_homebrew_packages | default(true)
      tags: ['homebrew']

    # Dotfiles is OS-portable (drops files into $HOME); no OS gate needed.
    - role: pazny.dotfiles
      when: configure_dotfiles | default(true)
      tags: ['dotfiles']

    - role: pazny.mac.mas
      when:
        - ansible_os_family == 'Darwin'
        - install_mas_apps | default(false)
        - (mas_installed_apps | length > 0) or (mas_installed_app_ids | default([]) | length > 0)
      tags: ['mas']

    - role: pazny.mac.dock
      when:
        - ansible_os_family == 'Darwin'
        - configure_dock | default(false)
      tags: ['dock']

    # ── Linux-only host roles (Phase 1: stubs only) ─────────────────────────
    # Activate on Debian/RedHat families. Currently empty — real
    # implementation lands after the cross-platform refactor is validated
    # end-to-end on Ubuntu 24.04 LTS. See docs/agent-operable-nos.md
    # roadmap section "Linux port".
    - role: pazny.linux.apt
      when:
        - ansible_os_family in ['Debian', 'RedHat']
        - install_linux_packages | default(true)
      tags: ['apt', 'packages']

    - role: pazny.linux.systemd_user
      when:
        - ansible_os_family in ['Debian', 'RedHat']
      tags: ['systemd']

    # Track C (2026-04-26) — Docker CE + nginx via APT, the Linux equivalents
    # of Docker Desktop + Homebrew nginx on macOS. Both are gated on Linux
    # platform AND the matching install_* flag so operators that opt out
    # (e.g. "I'll bring my own docker") get clean skips.
    - role: pazny.linux.docker
      when:
        - ansible_os_family in ['Debian']
        - install_docker | default(true)
      tags: ['docker', 'linux']

    - role: pazny.linux.nginx
      when:
        - ansible_os_family in ['Debian']
        - install_nginx | default(true)
      tags: ['nginx', 'linux']

    # Track D (2026-04-26) — ANSSI baseline. Default ON, opt-out via
    # `install_hardening: false`. Decision O5 (2026-04-26) noted that
    # surprise-on-deploy is acceptable for a security-positioned product;
    # operators who don't want it set the flag in config.yml.
    - role: pazny.linux.hardening
      when:
        - ansible_os_family in ['Debian']
        - install_hardening | default(true)
      tags: ['hardening', 'linux', 'security']

  tasks:
    # ──────────────────────────────────────────────────────────────────────────
    # Blank reset - clean reinstall (ansible-playbook main.yml -K -e blank=true)
    # ──────────────────────────────────────────────────────────────────────────
    - name: "[Blank] Prompt for password prefix"
      ansible.builtin.pause:
        prompt: "Prefix for all passwords (format: PREFIX_pw_SERVICE, Enter = {{ global_password_prefix }})"
      register: _prefix_prompt
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    - name: "[Blank] Set password prefix from prompt"
      ansible.builtin.set_fact:
        global_password_prefix: "{{ _prefix_prompt.user_input if (_prefix_prompt.user_input | default('') | length > 0) else global_password_prefix }}"
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    - name: "[Blank] Persist prompted prefix to credentials.yml"
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/credentials.yml"
        regexp: '^global_password_prefix:'
        line: 'global_password_prefix: "{{ global_password_prefix }}"'
        create: true
        mode: '0600'
      when:
        - blank | default(false) | bool
        - _prefix_prompt.user_input | default('') | length > 0
      tags: ['blank', 'reset']

    # ──────────────────────────────────────────────────────────────────────────
    # Previous-prefix state file - for services with "PUT needs old password" API
    # (Portainer, Jellyfin, Metabase). File is gitignored.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "[State] Read previous password prefix (if exists)"
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/.ansible-prefix-state"
      register: _prev_prefix_raw
      failed_when: false
      changed_when: false
      tags: ['always']

    - name: "[State] Expose previous_password_prefix fact (fallback = current)"
      ansible.builtin.set_fact:
        previous_password_prefix: >-
          {{ (_prev_prefix_raw.content | b64decode | trim)
             if (_prev_prefix_raw.content is defined)
             else global_password_prefix }}
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # Detect password-prefix change + auto-promote to destroy_state.
    #
    # When the prefix changes, every {{ prefix }}_pw_* template — DB passwords,
    # OIDC client secrets, admin passwords across the whole fleet — resolves
    # to a fresh value. Keeping the independent DESTRUCTIVE secrets (APP_KEYs,
    # encryption keys, JWT secrets) stable across that boundary is a semantic
    # mismatch: the user is saying "new identity" and we half-honor it.
    #
    # So: prefix change == destroy_state. Explicit rather than implicit via
    # the blank gate, so any future destroy_state-gated feature (e.g. wiping
    # ~/.nos/secrets.yml selectively) also triggers.
    #
    # Edge case: first run has no .ansible-prefix-state file; previous defaults
    # to current, so `_prefix_changed` is False — no auto-promote, good.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "[State] Detect password prefix change"
      ansible.builtin.set_fact:
        _prefix_changed: "{{ (previous_password_prefix | default('')) != (global_password_prefix | default('')) }}"
      tags: ['always']

    - name: "[State] Auto-enable destroy_state when prefix changed"
      ansible.builtin.set_fact:
        destroy_state: true
      when:
        - _prefix_changed | bool
        - not (destroy_state | default(false) | bool)
      tags: ['always']

    - name: "[State] Announce prefix change (auto-destroy_state engaged)"
      ansible.builtin.debug:
        msg: |
          Password prefix changed: '{{ previous_password_prefix }}' -> '{{ global_password_prefix }}'.
          Auto-promoted destroy_state=true so DESTRUCTIVE secrets (APP_KEYs,
          encryption keys, JWT secrets) regenerate alongside the prefix-derived
          passwords. The Bluesky PDS rotation key remains preserved regardless
          (rotating it would orphan every DID — see main.yml line ~506).
      when: _prefix_changed | bool
      tags: ['always']

    - import_tasks: tasks/blank-reset.yml
      when: blank | default(false) | bool
      tags: ['blank', 'reset']

    # ──────────────────────────────────────────────────────────────────────────
    # Restore — pull a dated backup from RustFS and replay it live.
    # Usage:  ansible-playbook main.yml -K --tags restore -e restore_date=YYYY-MM-DD
    # Tag 'never' so a regular playbook run with restore_date left over in
    # config doesn't surprise-trigger the destructive replay.
    # See docs/restore-runbook.md.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/restore.yml
      when: restore_date is defined
      tags: ['restore', 'never']

    # ──────────────────────────────────────────────────────────────────────────
    # Auto-enable dependencies (ERPNext → MariaDB+Redis, Mattermost → PostgreSQL, atd.)
    # ──────────────────────────────────────────────────────────────────────────
    - name: Auto-enable MariaDB for services that require it
      ansible.builtin.set_fact:
        install_mariadb: true
      when: >
        (install_wordpress | default(false)) or
        (install_nextcloud | default(false)) or
        (install_erpnext | default(false)) or
        (install_freescout | default(false)) or
        (install_freepbx | default(false)) or
        (install_bookstack | default(false)) or
        (install_firefly | default(false))
      tags: ['always']

    - name: Auto-enable PostgreSQL for services that require it
      ansible.builtin.set_fact:
        install_postgresql: true
      when: >
        (install_authentik | default(false)) or
        (install_infisical | default(false)) or
        (install_jsos | default(false)) or
        (install_paperclip | default(false)) or
        (install_mattermost | default(false)) or
        (install_outline | default(false)) or
        (install_metabase | default(false)) or
        (install_superset | default(false)) or
        (install_miniflux | default(false)) or
        (install_hedgedoc | default(false))
      tags: ['always']

    - name: Auto-enable Redis Docker for services that require it
      ansible.builtin.set_fact:
        redis_docker: true
      when: >
        (install_authentik | default(false)) or
        (install_infisical | default(false)) or
        (install_jsos | default(false)) or
        (install_erpnext | default(false)) or
        (install_outline | default(false)) or
        (install_superset | default(false)) or
        (install_bookstack | default(false)) or
        (install_firefly | default(false)) or
        (install_onlyoffice | default(false))
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # Stateless secret regeneration - every run
    #
    # Safe group: crypto secrets that do not encrypt persistent user data
    # (sessions/tokens are re-creatable, blueprints/API reapply state).
    # Destructive group: encrypt user data - regeneration gated via
    # blank=true or destroy_state=true; on non-blank run we show a warning.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Auto-regenerate stateless secrets (every run — safe group)"
      ansible.builtin.set_fact:
        # authentik_secret_key: moved to persisted secrets - regen on every run
        # invalidated all SSO sessions (Django SECRET_KEY = CSRF + session signing)
        vaultwarden_admin_token: "{{ lookup('pipe', 'openssl rand -base64 48') }}"
        paperclip_auth_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        jsos_session_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        wing_api_token: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        outline_utils_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        hedgedoc_session_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
      tags: ['always']

    - name: "Lazy-regenerate placeholder APP_KEYs / tokens (first non-blank enable)"
      # UX: user can flip install_firefly: true (or bookstack / onlyoffice /
      # influxdb) in config.yml and run 'ansible-playbook main.yml -K' WITHOUT -e blank=true.
      # Without this task the role assert (e.g. roles/pazny.firefly/tasks/main.yml)
      # would fail on the placeholder value from default.credentials.yml.
      # Each ternary: regenerate ONLY if the value is a placeholder (or empty / too short).
      # On the second run the real value is loaded from ~/.nos/secrets.yml and the guard short-circuits.
      ansible.builtin.set_fact:
        firefly_app_key: "{% if 'placeholder' in (firefly_app_key | default('')) %}{{ 'base64:' ~ lookup('pipe', 'openssl rand -base64 32') }}{% else %}{{ firefly_app_key }}{% endif %}"
        onlyoffice_jwt_secret: "{% if '_pw_' in (onlyoffice_jwt_secret | default('')) or 'placeholder' in (onlyoffice_jwt_secret | default('')) or (onlyoffice_jwt_secret | default('') | length) < 32 %}{{ lookup('pipe', 'openssl rand -hex 32') }}{% else %}{{ onlyoffice_jwt_secret }}{% endif %}"
        influxdb_admin_token: "{% if 'placeholder' in (influxdb_admin_token | default('')) or (influxdb_admin_token | default('') | length) < 32 %}{{ lookup('pipe', 'openssl rand -hex 32') }}{% else %}{{ influxdb_admin_token }}{% endif %}"
        bookstack_app_key: "{% if 'placeholder' in (bookstack_app_key | default('')) or not (bookstack_app_key | default('')).startswith('base64:') or ((bookstack_app_key | default('')) | length) < 50 %}{{ 'base64:' ~ lookup('pipe', 'openssl rand -base64 32') }}{% else %}{{ bookstack_app_key }}{% endif %}"
        infisical_encryption_key: "{% if '_pw_' in (infisical_encryption_key | default('')) or (infisical_encryption_key | default('') | length) != 32 %}{{ lookup('pipe', 'openssl rand -hex 16') }}{% else %}{{ infisical_encryption_key }}{% endif %}"
        infisical_auth_secret: "{% if '_pw_' in (infisical_auth_secret | default('')) or (infisical_auth_secret | default('') | length) < 32 %}{{ lookup('pipe', 'openssl rand -base64 32') }}{% else %}{{ infisical_auth_secret }}{% endif %}"
        bluesky_pds_jwt_secret: "{% if '_pw_' in (bluesky_pds_jwt_secret | default('')) or (bluesky_pds_jwt_secret | default('') | length) < 32 %}{{ lookup('pipe', 'openssl rand -hex 16') }}{% else %}{{ bluesky_pds_jwt_secret }}{% endif %}"
        bluesky_pds_rotation_key: "{% if (bluesky_pds_rotation_key | default('') | length) < 32 %}{{ lookup('pipe', 'openssl rand -hex 32') }}{% else %}{{ bluesky_pds_rotation_key }}{% endif %}"
        outline_secret_key: "{% if '_pw_' in (outline_secret_key | default('')) or (outline_secret_key | default('') | length) != 64 %}{{ lookup('pipe', 'openssl rand -hex 32') }}{% else %}{{ outline_secret_key }}{% endif %}"
        authentik_secret_key: "{% if '_pw_' in (authentik_secret_key | default('')) or (authentik_secret_key | default('') | length) < 50 %}{{ lookup('pipe', 'openssl rand -hex 50') }}{% else %}{{ authentik_secret_key }}{% endif %}"
      tags: ['always']

    - name: "Regenerate DESTRUCTIVE stateless secrets (prefix change, blank, or destroy_state)"
      ansible.builtin.set_fact:
        infisical_encryption_key: "{{ lookup('pipe', 'openssl rand -hex 16') }}"
        infisical_auth_secret: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
        outline_secret_key: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        # bluesky_pds_rotation_key: DELIBERATELY NOT in the destructive group.
        # Rotating this key invalidates every DID's signature chain on the PDS,
        # orphaning every account and breaking AT Protocol federation. Survives
        # `-e blank=true` so the post-blank PDS keeps its identity. Reset it
        # explicitly with `-e destroy_bluesky_identity=true` (not wired yet —
        # add a gate here if/when the federation story goes live).
        firefly_app_key: "base64:{{ lookup('pipe', 'openssl rand -base64 32') }}"
        bookstack_app_key: "base64:{{ lookup('pipe', 'openssl rand -base64 32') }}"
        # onlyoffice_jwt_secret: host apps (Nextcloud, BookStack...) store the JWT secret
        # in their own config. Regen on every run would silently break the integration.
        onlyoffice_jwt_secret: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
        # influxdb_admin_token: InfluxDB 2.x keeps the token in /var/lib/influxdb2 volume.
        # Regen would create a token mismatch for Grafana datasource (until we finish auto-provisioning).
        influxdb_admin_token: "{{ lookup('pipe', 'openssl rand -hex 32') }}"
      # Trigger gates (any of):
      #   - destroy_state=true  — explicit user intent (manual flag or auto-promoted by prefix change)
      #   - blank=true          — full wipe; data is gone so stable keys are moot
      # Prefix-change-without-blank no longer directly appears here because it
      # already auto-promoted destroy_state above.
      when: (blank | default(false) | bool) or (destroy_state | default(false) | bool)
      tags: ['always']

    - name: "WARNING — destructive secrets preserved (use -e destroy_state=true to reset)"
      ansible.builtin.debug:
        msg: |
          Destructive secrets (infisical_encryption_key, outline_secret_key,
          firefly_app_key, bookstack_app_key, onlyoffice_jwt_secret,
          influxdb_admin_token) were loaded from ~/.nos/secrets.yml and preserved.
          To reset: (a) change global_password_prefix in credentials.yml — the
          next run auto-promotes destroy_state, OR (b) add -e destroy_state=true
          explicitly. This wipes Infisical vault, Outline data, Firefly/BookStack
          encrypted data, ONLYOFFICE/InfluxDB tokens.
          Bluesky PDS rotation key is PERMANENTLY preserved across every run
          (regenerating it would orphan every DID on the PDS — AT Protocol-safe).
      when:
        - not (blank | default(false) | bool)
        - not (destroy_state | default(false) | bool)
      tags: ['always']

    # ── Persist runtime secrets to ~/.nos/secrets.yml ─────────────────
    # Runs unconditionally: normal run preserves existing keys, blank run
    # overwrites with freshly-generated keys. Mode 0600 — only owner can read.
    - name: "[Secrets] Ensure ~/.nos directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.nos"
        state: directory
        mode: '0700'
      tags: ['always']

    - name: "[Secrets] Persist runtime secrets to ~/.nos/secrets.yml"
      ansible.builtin.template:
        src: "secrets.yml.j2"
        dest: "{{ ansible_facts['env']['HOME'] }}/.nos/secrets.yml"
        mode: '0600'
      tags: ['always']

    - name: Stop Homebrew Redis if Docker Redis is enabled (port conflict)
      ansible.builtin.shell: |
        {{ playbook_dir }}/files/brew-svc.sh stop redis 2>/dev/null || true
        launchctl bootout gui/$(id -u)/homebrew.mxcl.redis 2>/dev/null || true
        launchctl unload ~/Library/LaunchAgents/homebrew.mxcl.redis.plist 2>/dev/null || true
        pkill -9 -f "redis-server" 2>/dev/null || true
        sleep 2
        rm -f ~/Library/LaunchAgents/homebrew.mxcl.redis.plist 2>/dev/null || true
      when: redis_docker | default(false) | bool
      failed_when: false
      changed_when: false
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # macOS system settings
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/sudoers.yml
      when: configure_sudoers | default(false)
      tags: ['sudoers']

    - import_tasks: tasks/terminal.yml
      when: configure_terminal | default(true)
      tags: ['terminal']

    - import_tasks: tasks/osx.yml
      when: configure_osx | default(true)
      tags: ['osx']

    - import_tasks: tasks/macos-defaults.yml
      when: configure_macos_defaults | default(true)
      tags: ['macos-defaults', 'osx']

    # ──────────────────────────────────────────────────────────────────────────
    # Power management - pmset (server-like operation: display sleeps, network stays on)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/power-management.yml
      when: configure_power_management | default(true)
      tags: ['power', 'pmset', 'power-management']

    # ──────────────────────────────────────────────────────────────────────────
    # System services (SSH, Samba, VNC)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/system-services.yml
      when: >
        not ansible_check_mode and
        ((enable_ssh | default(false)) or
        (enable_samba | default(false)) or
        (enable_vnc | default(false)) or
        (enable_remote_management | default(false)))
      tags: ['system-services', 'ssh', 'samba', 'vnc']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB Terminal - public SSH TUI hub (requires SSH)
    # ──────────────────────────────────────────────────────────────────────────
    - name: "IIAB Terminal (pazny.iiab_terminal role)"
      ansible.builtin.import_role:
        name: pazny.iiab_terminal
      when:
        - install_iiab_terminal | default(false)
        - enable_ssh | default(false)
      tags: ['iiab-terminal', 'ssh']

    # ──────────────────────────────────────────────────────────────────────────
    # Languages and runtime environments
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/php.yml
      when: install_php | default(true)
      tags: ['php']

    # ──────────────────────────────────────────────────────────────────────────
    # ACME (Let's Encrypt wildcard cert via Cloudflare DNS-01) — runs BEFORE
    # nginx so the cert exists when nginx -t validates the config.
    # Skipped automatically on local TLDs (dev.local, .lan, .test) where
    # mkcert generates the dev cert in tasks/nginx.yml instead.
    # ──────────────────────────────────────────────────────────────────────────
    # ──────────────────────────────────────────────────────────────────────────
    # TLS certs — runs before acme + nginx so {{ tls_cert_dir }} exists.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/tls-certs.yml
      tags: ['tls', 'cert', 'mkcert']

    - name: "ACME — Let's Encrypt wildcard cert"
      ansible.builtin.include_role:
        name: pazny.acme
      when:
        - install_acme | default(false) | bool
        - not (tenant_domain_is_local | default(true) | bool)
      tags: ['acme', 'tls', 'cert']

    # ──────────────────────────────────────────────────────────────────────────
    # Host nginx — optional. Empty by default. Operator opts in per-vhost via
    # `nginx_sites_enabled`. See tasks/nginx.yml header + templates/nginx/_LEGACY.md.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/nginx.yml
      when: install_nginx | default(false)
      tags: ['nginx', 'webserver']

    - import_tasks: tasks/node.yml
      when: install_node | default(true)
      tags: ['node', 'nodejs']

    - import_tasks: tasks/bun.yml
      when: install_bun | default(true)
      tags: ['bun']

    - import_tasks: tasks/python.yml
      when: install_python | default(true)
      tags: ['python']

    - import_tasks: tasks/golang.yml
      when: install_golang | default(true)
      tags: ['go', 'golang']

    - import_tasks: tasks/dotnet.yml
      when: install_dotnet | default(true)
      tags: ['dotnet', 'csharp']

    # ──────────────────────────────────────────────────────────────────────────
    # Extra packages (composer, gem, npm, pip)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/extra-packages.yml
      tags: ['extra-packages']

    # ──────────────────────────────────────────────────────────────────────────
    # Editors
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/sublime-text.yml
      when: configure_sublime | default(false)
      tags: ['sublime-text']

    # ──────────────────────────────────────────────────────────────────────────
    # External storage - redirect data to SSD (MUST run before IIAB/observ.)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/external-storage.yml
      when: configure_external_storage | default(false)
      # 'always' so the SSD-redirection set_facts apply even on tagged runs
      # (e.g. ansible-playbook main.yml --tags traefik). Without it, render
      # tasks fall back to the {{ stacks_dir }}/<svc> defaults and write to
      # /Users/<user>/stacks/... while Docker bind-mounts still point at
      # the SSD path the previous full run used. That mismatch silently
      # ships stale config to the running container.
      tags: ['always', 'external-storage', 'storage']

    # ──────────────────────────────────────────────────────────────────────────
    # Docker stacks - shared network and prerequisites
    # ──────────────────────────────────────────────────────────────────────────

    # Python docker SDK + PyMySQL - prerequisite for all community.docker.*
    # and community.mysql.* modules; fast no-op if already installed
    - import_tasks: tasks/iiab/docker-prereqs.yml
      tags: ['iiab', 'docker', 'stacks']

    # Shared Docker network + directory structure for all stacks
    - import_tasks: tasks/stacks/shared-network.yml
      tags: ['iiab', 'docker', 'stacks']

    # ──────────────────────────────────────────────────────────────────────────
    # CORE STACKS - infra (DB/IAM/Vault) + observability ALWAYS FIRST
    #
    # These two stacks are the backbone of the whole system: other roles can
    # assume MariaDB / Postgres / Redis / Authentik / Infisical /
    # Bluesky PDS / Grafana / Prometheus / Loki / Tempo are running and just inject
    # their configs + notify handlers to restart containers.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/stacks/core-up.yml
      tags: ['iiab', 'docker', 'stacks', 'core', 'infra', 'observability']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB – self-hosted knowledge services
    # ──────────────────────────────────────────────────────────────────────────

    # Wave 2.2: all IIAB/DevOps/B2B/VoIP/Data service tasks moved to
    # roles/pazny.*/. Role renders + post-start are called from
    # tasks/stacks/core-up.yml (infra/observability) and tasks/stacks/stack-up.yml
    # (other stacks). Nginx vhost renders are part of role tasks/main.yml.

    # ──────────────────────────────────────────────────────────────────────────
    # Network - Tailscale + dnsmasq
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/tailscale.yml
      when: install_tailscale | default(true)
      tags: ['tailscale', 'network', 'vpn']

    # dnsmasq runs for local TLDs (*.local / .lan / .test) by default, OR for
    # public TLDs when the operator wants HYBRID mode (real domain + valid LE
    # cert + box reachable only locally on 127.0.0.1). Set
    # `dnsmasq_force_local_domains: true` in config.yml to keep /etc/resolver
    # active on a public TLD.
    - import_tasks: tasks/dnsmasq.yml
      when:
        - install_dnsmasq | default(true)
        - (tenant_domain_is_local | default(true) | bool)
          or (dnsmasq_force_local_domains | default(false) | bool)
      tags: ['dnsmasq', 'dns', 'network']

    # ──────────────────────────────────────────────────────────────────────────
    # Shell extras – starship prompt + aliases
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/shell-extras.yml
      when: install_shell_extras | default(true)
      tags: ['shell', 'shell-extras', 'starship']

    # ──────────────────────────────────────────────────────────────────────────
    # Git global configuration (user.name, user.email)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/git-config.yml
      when: git_user_name | default('') | length > 0
      tags: ['git']

    # ──────────────────────────────────────────────────────────────────────────
    # OpenClaw - self-hosted AI agent (Ollama, no API key)
    # ──────────────────────────────────────────────────────────────────────────
    - name: "OpenClaw (pazny.openclaw role)"
      ansible.builtin.import_role:
        name: pazny.openclaw
      when: install_openclaw | default(false)
      tags: ['openclaw', 'ai', 'agent']

    # ──────────────────────────────────────────────────────────────────────────
    # Hermes Agent (Nous Research) — Python framework, Ollama-backed, MCP-enabled
    # Orchestrator + MCP caller, delegates heavy tasks to qwen2.5-coder:32b or
    # Claude Code CLI / Anthropic API. See roles/pazny.hermes/defaults/main.yml.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Hermes Agent (pazny.hermes role)"
      ansible.builtin.import_role:
        name: pazny.hermes
      when: install_hermes | default(false)
      tags: ['hermes', 'ai', 'agent']

    # ──────────────────────────────────────────────────────────────────────────
    # OpenCode - AI coding TUI (sst.dev) with local Ollama provider
    # Alternative to Claude Code / Cursor, but open-source and local.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "OpenCode AI TUI (pazny.opencode role)"
      ansible.builtin.import_role:
        name: pazny.opencode
      when: install_opencode | default(false)
      tags: ['opencode', 'ai']

    # ──────────────────────────────────────────────────────────────────────────
    # Pulse — local launchd Python daemon for scheduled jobs (A4, 2026-05-03).
    # Polls Wing API for due pulse_jobs and fires them as subprocess (A4 PoC) or
    # claude SDK invocations (A8). First host-launchd organ in the bones-and-wings
    # refactor — A3 (track-A-reversal) follows by reverting Wing+Bone too.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Pulse — scheduled-job daemon (pazny.pulse role)"
      ansible.builtin.import_role:
        name: pazny.pulse
      when: install_pulse | default(false)
      tags: ['pulse', 'anatomy']

    # ──────────────────────────────────────────────────────────────────────────
    # Nightly backup orchestrator (pazny.backup) — dumps DBs + volumes +
    # Authentik blueprints to RustFS. Runs as a launchd agent on the host.
    # See roles/pazny.backup/README.md + docs/restore-runbook.md.
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Backup orchestrator (pazny.backup role)"
      ansible.builtin.import_role:
        name: pazny.backup
      when: install_backup | default(false)
      tags: ['backup', 'ops']

    - import_tasks: tasks/pi-agents.yml
      when: install_pi_agents | default(false)
      tags: ['pi', 'pi-agents', 'ai', 'agent']

    # ──────────────────────────────────────────────────────────────────────────
    # Observability – Grafana + Prometheus + Loki + Tempo + Alloy
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/observability.yml
      when: install_observability | default(true)
      tags: ['observability', 'grafana', 'prometheus', 'loki', 'tempo', 'alloy']

    # ──────────────────────────────────────────────────────────────────────────
    # IIAB extra – n8n, Gitea, Uptime Kuma, Calibre-Web
    # ──────────────────────────────────────────────────────────────────────────
    # (service-specific pre-stack tasks are now in roles/pazny.*/tasks/main.yml,
    #  called from tasks/stacks/stack-up.yml before compose up)

    # ──────────────────────────────────────────────────────────────────────────
    # Docker stacks - deploy compose files and start all stacks
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/stacks/stack-up.yml
      tags: ['iiab', 'stack', 'docker', 'stacks']

    # DB setup now runs INSIDE stack-up.yml (infra → DB setup → remaining stacks)

    # (all service post-start tasks are now called from tasks/stacks/stack-up.yml
    #  and tasks/stacks/core-up.yml via include_role tasks_from=post.yml)

    # ──────────────────────────────────────────────────────────────────────────
    # Tier-2 apps stack (apps_runner) — render + deploy + observability hooks
    #
    # Runs AFTER the Tier-1 stacks so apps can rely on Postgres / Authentik /
    # Traefik / Bone / Wing being online. Empty apps/ is a clean no-op.
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/stacks/apps-up.yml
      tags: ['apps', 'tier2', 'stack', 'stacks', 'apps-runner']

    # Verification: confirms all services respond (after post-start tasks)
    - import_tasks: tasks/iiab/stack_verify.yml
      tags: ['iiab', 'stack', 'verify', 'stacks']

    # ──────────────────────────────────────────────────────────────────────────
    # jsOS - web desktop (OS.js v3 + Bluesky auth + homelab integration)
    # ──────────────────────────────────────────────────────────────────────────
    - name: "jsOS (pazny.jsos role)"  # noqa: name[casing]
      # noqa rationale: 'jsOS' is the project's brand name (deliberate
      # lowercase 'j', uppercase 'OS'). Capitalising it would be
      # misleading (the user-facing name is jsOS, not JsOS).
      ansible.builtin.import_role:
        name: pazny.jsos
      when: install_jsos | default(false)
      tags: ['jsos', 'desktop']

    # ──────────────────────────────────────────────────────────────────────────
    # Service Registry - JSON catalog + Grafana dashboard
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/service-registry.yml
      tags: ['service-registry', 'registry']

    # ──────────────────────────────────────────────────────────────────────────
    # Bone – local FastAPI service (structure / state / dispatcher).
    # Former BoxAPI. See docs/anatomy.md for the organ metaphor.
    #
    # As of Track A (2026-04-26) Bone runs as a container in the `infra`
    # compose stack, not a host launchd process. The render + post-start
    # tasks now live in tasks/stacks/core-up.yml alongside MariaDB / Postgres
    # / Authentik so they all come up together. This block stays as a
    # documentary anchor; the actual wiring is upstream.
    # ──────────────────────────────────────────────────────────────────────────

    # ──────────────────────────────────────────────────────────────────────────
    # Heartbeat – fleet reporting daemon
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/heartbeat.yml
      when: configure_heartbeat | default(false)
      tags: ['heartbeat', 'fleet']

    # ──────────────────────────────────────────────────────────────────────────
    # Backup – Restic automated backups
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/backup.yml
      when: configure_backup | default(false)
      tags: ['backup']

    # ──────────────────────────────────────────────────────────────────────────
    # Vulnerability Scanner – NOS Security Auditor (2x daily scheduled scan)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/vulnerability-scan.yml
      when: configure_vulnerability_scan | default(false)
      tags: ['vulnscan']

    # ──────────────────────────────────────────────────────────────────────────
    # Wing - Security Research Dashboard (Nette PHP-FPM + SQLite)
    #
    # As of Track A (2026-04-26) Wing runs as the `wing` service in the iiab
    # compose stack, not via Homebrew php-fpm. Render + post tasks now live
    # in tasks/stacks/stack-up.yml alongside other iiab services. This block
    # is a documentary anchor; the actual wiring is upstream.
    # ──────────────────────────────────────────────────────────────────────────

    # ──────────────────────────────────────────────────────────────────────────
    # Export/Import – hardware migration (run only with --tags)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/export-state.yml
      tags: ['export', 'never']

    - import_tasks: tasks/import-state.yml
      tags: ['import', 'never']

    # ──────────────────────────────────────────────────────────────────────────
    # Auto-start configuration (Docker Desktop login item, PM2 save, restart policies)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/autostart.yml
      tags: ['autostart', 'always']

    # ──────────────────────────────────────────────────────────────────────────
    # Final services overview (always at the end)
    # ──────────────────────────────────────────────────────────────────────────
    - import_tasks: tasks/final-summary.yml
      tags: ['always']

    # ──────────────────────────────────────────────────────────────────────────
    # Post-provision hooks
    # ──────────────────────────────────────────────────────────────────────────
    - name: Run post-provision task files in a block.
      tags: ['post']
      block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"

  post_tasks:
    - name: Remove sudo askpass helper script.
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.ansible_askpass"
        state: absent
      changed_when: false
      tags: ['always']

    - name: "[State] Persist current prefix for next run"
      ansible.builtin.copy:
        content: "{{ global_password_prefix }}"
        dest: "{{ playbook_dir }}/.ansible-prefix-state"
        mode: '0600'
      changed_when: false
      tags: ['always']

    # ── State & Migration Framework: post-provision state report ─────────────
    # Introspects running services + persists ~/.nos/state.yml with the result.
    # Pushes a snapshot to Wing so the dashboard reflects the current run.
    - name: "[Framework] State report (persist + push to Wing)"
      ansible.builtin.import_tasks: tasks/state-report.yml
      tags: ['always', 'state', 'report']

    # ── Post-run web-UI smoke check ──────────────────────────────────────────
    # tools/nos-smoke.py auto-derives one probe per Tier-1 service from
    # state/manifest.yml + applies overrides from state/smoke-catalog.yml.
    # Output goes to stdout and ~/.nos/events/smoke.jsonl (cross-tool hook).
    # Non-fatal by default — set -e nos_smoke_strict=true to fail the run.
    - name: "[Smoke] Run post-run smoke check"
      ansible.builtin.import_tasks: tasks/post-smoke.yml
      tags: ['always', 'smoke']
