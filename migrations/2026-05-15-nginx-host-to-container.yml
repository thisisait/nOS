---
# ==============================================================================
# nOS migration: nginx-host-to-container
#
# Pre-2026-04-27 installs ran nginx as a Homebrew/apt host service.
# pazny.nginx_container moves it into the infra compose stack instead.
# This migration retires the host service so it can't fight the
# container for ports 80/443.
#
# Trigger: any host that has Homebrew nginx loaded via launchd. Operators
# explicitly opt in to the container path by setting install_nginx_container:
# true in config.yml — the migration's `severity: breaking` then prompts
# for confirmation at the next ansible-playbook run.
#
# Schema: state/schema/migration.schema.json
# Engine: library/nos_migrate.py + module_utils/nos_migrate_engine.py
# ==============================================================================

id: "2026-05-15-nginx-host-to-container"
title: "Retire host-side nginx, hand 80/443 to the infra stack container"
summary: |
  Stops the Homebrew nginx launchd service and removes its plist so the
  pazny.nginx_container compose service can bind ports 80/443 cleanly on
  the next `docker compose up infra`. No vhost data is touched — the
  config tree just relocates to {{ stacks_dir }}/infra/nginx/etc on the
  next blank/run.
severity: breaking
authors: ["pazny.develop@gmail.com"]
created_at: "2026-05-15"

tags: [nginx, containerize, post-q2]
references:
  - "roles/pazny.nginx_container/"

notes: |
  Safe to skip on hosts that prefer host nginx — Ctrl+C at the
  confirmation prompt aborts. Operators that DON'T set
  install_nginx_container: true in config.yml should also Ctrl+C; the
  migration assumes the new container path is wired up.

allow_shell: true

downtime:
  estimated_sec: 30
  services_affected: [nginx]

# Trigger condition: any host with Homebrew nginx loaded. Once applied
# (plist removed), this returns false and the migration is dormant.
applies_if:
  any_of:
    - launchagent_matches: "homebrew.mxcl.nginx*"
    - fs_path_exists: "~/Library/LaunchAgents/homebrew.mxcl.nginx.plist"

preconditions: []

steps:
  # ── Stop brew services nginx (graceful) ─────────────────────────────────
  - id: "nginx_brew_stop"
    description: "Stop Homebrew nginx service so it releases ports 80/443."
    detect:
      launchagent_matches: "homebrew.mxcl.nginx*"
    action:
      type: exec.shell
      allow_shell: true
      cmd:
        - "/bin/sh"
        - "-c"
        - "command -v brew >/dev/null 2>&1 && brew services list 2>/dev/null | awk '/^nginx[[:space:]]+started/{print $1}' | xargs -I{} brew services stop {} || true"
    verify:
      - type: negate
        of:
          launchagent_matches: "homebrew.mxcl.nginx*"
    on_failure: continue

  # ── Remove launchd plist (keeps it from auto-starting on reboot) ─────────
  - id: "nginx_plist_remove"
    description: "Delete homebrew.mxcl.nginx.plist so launchd doesn't restart nginx on reboot."
    detect:
      fs_path_exists: "~/Library/LaunchAgents/homebrew.mxcl.nginx.plist"
    action:
      type: launchd.bootout_and_delete
      pattern: "homebrew.mxcl.nginx*.plist"
    verify:
      - type: negate
        of:
          fs_path_exists: "~/Library/LaunchAgents/homebrew.mxcl.nginx.plist"
    on_failure: continue

  # ── State marker ─────────────────────────────────────────────────────────
  - id: "record_nginx_container_marker"
    description: "Record nginx_path=container in ~/.nos/state.yml."
    action:
      type: state.set
      key: "nginx.path"
      value: "container"
    verify: []
    on_failure: continue

post_verify:
  - type: negate
    of:
      launchagent_matches: "homebrew.mxcl.nginx*"
  - type: negate
    of:
      fs_path_exists: "~/Library/LaunchAgents/homebrew.mxcl.nginx.plist"
